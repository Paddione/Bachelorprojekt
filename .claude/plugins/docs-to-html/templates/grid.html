<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title><!--TITLE--></title>
<style>
<!--SHARED_STYLES-->

/* grid layout */
.layout-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1em; padding: 1.6em; max-width: 1500px; margin: 0 auto; }
.card {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.1em 1.2em;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.15s;
  display: flex;
  flex-direction: column;
  gap: 0.5em;
  text-decoration: none;
  color: inherit;
}
.card:hover { border-color: var(--accent); transform: translateY(-2px); }
.card-file { font-family: var(--font-mono); font-size: 0.74rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-faint); }
.card-title { font-family: var(--font-display); font-size: 1.1rem; line-height: 1.3; color: var(--fg); }
.card-excerpt { font-size: 0.88rem; line-height: 1.5; color: var(--fg-dim); flex: 1; }
.card-tags { display: flex; flex-wrap: wrap; gap: 0.3em; }
.card-tag { font-family: var(--font-mono); font-size: 0.7rem; color: var(--accent-2); border: 1px solid var(--border); border-radius: 999px; padding: 0.1em 0.55em; }

.detail { display: none; padding: 2em 2.4em 6em; max-width: 88ch; margin: 0 auto; }
.detail > .file-section { scroll-margin-top: 1em; }
.back-btn {
  background: var(--bg-2);
  color: var(--fg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.4em 0.9em;
  margin: 1.2em 0 0.6em 1.6em;
  font-family: var(--font-mono);
  font-size: 0.8rem;
  cursor: pointer;
  display: none;
}
.back-btn:hover { border-color: var(--accent); }

body[data-grid-active="true"] .layout-grid { display: none; }
body[data-grid-active="true"] .detail { display: block; }
body[data-grid-active="true"] .back-btn { display: inline-block; }
body[data-grid-active="true"] .file-section[data-section-target] { display: block; }
body[data-grid-active="true"] .file-section:not([data-section-target]) { display: none; }
</style>
</head>
<body>
<header class="topbar">
  <div class="topbar-title"><!--TITLE--></div>
  <div class="search-wrap">
    <input type="text" class="search-input" placeholder="Search…" aria-label="Search">
    <span class="search-shortcut">⌘K</span>
  </div>
  <button class="theme-toggle" data-theme-toggle>Light theme</button>
</header>
<nav class="chips" aria-label="Tag filters">
  <!--CHIPS-->
</nav>
<button class="back-btn" data-grid-back>← All files</button>
<section class="layout-grid">
  <!--FILES_NAV-->
</section>
<main class="detail">
  <!--CONTENT-->
</main>
<script>
window.__DOCS_INDEX__ = <!--SEARCH_INDEX-->;
</script>
<script>
<!--SHARED_SCRIPT-->
</script>
</body>
</html>
