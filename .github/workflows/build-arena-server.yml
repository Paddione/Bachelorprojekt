name: Build Arena Server

on:
  push:
    tags: ['arena-server-v*']

jobs:
  build:
    name: Build & push arena-server image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"               # arena-server-v1.2.3
          VERSION="${TAG#arena-server-v}"        # 1.2.3
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Docker image
        run: |
          IMAGE="ghcr.io/paddione/arena-server"
          VERSION="${{ steps.version.outputs.version }}"
          docker build \
            -t "${IMAGE}:v${VERSION}" \
            -t "${IMAGE}:latest" \
            -f arena-server/Dockerfile \
            .
          docker push "${IMAGE}:v${VERSION}"
          docker push "${IMAGE}:latest"

      - name: Deploy to korczewski
        env:
          KUBECONFIG_DATA: ${{ secrets.KORCZEWSKI_KUBECONFIG }}
        run: |
          curl -sSL "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl" \
            -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl rollout restart deployment/arena-server -n workspace-korczewski
          kubectl rollout status deployment/arena-server -n workspace-korczewski --timeout=120s
