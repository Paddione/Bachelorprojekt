name: Build Brett

on:
  push:
    tags: ['brett-v*']

jobs:
  build:
    name: Build & push Brett image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      # Quality gate: a tag cut from a branch that skipped PR CI cannot ship a
      # type-broken or test-failing image. Typecheck is a no-op until brett's TS
      # refactor lands (npm run --if-present), then enforces automatically.
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: brett/package-lock.json

      - name: Typecheck & test before build
        run: |
          npm ci --prefix brett
          npm --prefix brett run typecheck --if-present
          npm --prefix brett test
        env:
          MOCK_DB: 'true'

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"           # brett-v1.2.3
          VERSION="${TAG#brett-v}"           # 1.2.3
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Docker image
        run: |
          IMAGE="ghcr.io/paddione/workspace-brett"
          VERSION="${{ steps.version.outputs.version }}"
          docker build \
            -t "${IMAGE}:v${VERSION}" \
            -t "${IMAGE}:latest" \
            -f brett/Dockerfile \
            brett
          docker push "${IMAGE}:v${VERSION}"
          docker push "${IMAGE}:latest"

      - name: Deploy to mentolder
        env:
          KUBECONFIG_DATA: ${{ secrets.FLEET_KUBECONFIG }}
        run: |
          curl -sSL "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl" \
            -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl rollout restart deployment/brett -n workspace
          kubectl rollout status deployment/brett -n workspace --timeout=120s

      - name: Deploy to korczewski
        env:
          KUBECONFIG_DATA: ${{ secrets.FLEET_KUBECONFIG }}
        run: |
          curl -sSL "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl" \
            -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl rollout restart deployment/brett -n workspace-korczewski
          kubectl rollout status deployment/brett -n workspace-korczewski --timeout=120s
