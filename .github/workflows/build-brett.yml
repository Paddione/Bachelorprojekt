name: Build Brett

on:
  push:
    branches: [main]
    paths: ['brett/**']

env:
  OPENSPEC_TELEMETRY: '0'

jobs:
  build:
    name: Build & push Brett image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: brett/package-lock.json

      - name: Typecheck & test before build
        run: |
          npm ci --prefix brett
          npm --prefix brett run typecheck --if-present
          npm --prefix brett test
        env:
          MOCK_DB: 'true'

      - name: Get short SHA
        id: version
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Build & push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: brett
          file: brett/Dockerfile
          push: true
          tags: |
            ghcr.io/paddione/workspace-brett:sha-${{ steps.version.outputs.sha }}
            ghcr.io/paddione/workspace-brett:latest
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Deploy to mentolder
        env:
          KUBECONFIG_DATA: ${{ secrets.FLEET_KUBECONFIG }}
        run: |
          curl -sSL "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl" \
            -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl rollout restart deployment/brett -n workspace
          kubectl rollout status deployment/brett -n workspace --timeout=120s

      - name: Deploy to korczewski
        env:
          KUBECONFIG_DATA: ${{ secrets.FLEET_KUBECONFIG }}
        run: |
          curl -sSL "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl" \
            -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl rollout restart deployment/brett -n workspace-korczewski
          kubectl rollout status deployment/brett -n workspace-korczewski --timeout=120s
