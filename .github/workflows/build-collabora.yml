name: Build Collabora (setcap)

# Rebuild the thin Collabora CODE layer that adds file capabilities to
# /usr/bin/coolwsd whenever the Dockerfile (or the tag baked into it)
# changes, and publish to ghcr.io/paddione/collabora-code. Manual
# dispatch is supported for ad-hoc tag bumps.

on:
  push:
    # Any branch — path filters keep it cheap. Safe to build + push
    # from branches because the resulting tag is the upstream version,
    # not a branch-derived name, so nothing a PR author could poison.
    paths:
      - "docker/collabora/Dockerfile"
      - ".github/workflows/build-collabora.yml"
  pull_request:
    paths:
      - "docker/collabora/Dockerfile"
      - ".github/workflows/build-collabora.yml"
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "Upstream collabora/code tag to base on"
        required: true
        default: "25.04.9.4.1"

concurrency:
  group: build-collabora-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: paddione/collabora-code

  OPENSPEC_TELEMETRY: '0'
jobs:
  build-push:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-tags: false

      - name: Resolve upstream tag
        id: tag
        env:
          # workflow_dispatch input, quoted into an env var to avoid
          # any run-shell interpolation of untrusted content.
          INPUT_TAG: ${{ inputs.upstream_tag }}
        run: |
          TAG="${INPUT_TAG:-}"
          if [ -z "$TAG" ]; then
            TAG=$(grep -E '^ARG UPSTREAM_TAG=' docker/collabora/Dockerfile | cut -d= -f2)
          fi
          echo "upstream=$TAG" >> "$GITHUB_OUTPUT"
          echo "published=${TAG}-setcap" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: docker/collabora
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            UPSTREAM_TAG=${{ steps.tag.outputs.upstream }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.published }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Collabora CODE with file-capabilities on coolwsd
            org.opencontainers.image.licenses=MPL-2.0
          cache-from: type=gha
          cache-to: type=gha,mode=min
