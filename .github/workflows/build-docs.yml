name: Build Docs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/build-docs.mjs'
      - 'scripts/docs-gen/**'
      - 'scripts/docs.Dockerfile'

env:
  OPENSPEC_TELEMETRY: '0'

jobs:
  build:
    name: Build & push docs image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha_tag: ${{ steps.version.outputs.sha }}

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          fetch-tags: false

      - name: Get short SHA
        id: version
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: '22'

      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611  # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install root deps
        run: npm install

      - name: Regenerate freshness artifacts before build
        run: |
          bash scripts/ci-dummy-secrets.sh
          task freshness:regenerate

      - name: Build docs
        run: node scripts/build-docs.mjs

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Build & push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          file: scripts/docs.Dockerfile
          push: true
          tags: |
            ghcr.io/paddione/workspace-docs:sha-${{ steps.version.outputs.sha }}
            ghcr.io/paddione/workspace-docs:latest
          cache-from: type=gha
          cache-to: type=gha,mode=min

  deploy-mentolder:
    name: Deploy Docs (mentolder)
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          fetch-tags: false

      - name: Deploy to mentolder
        env:
          KUBECONFIG_DATA: ${{ secrets.FLEET_KUBECONFIG }}
        run: |
          curl -sSL "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl" \
            -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl rollout restart deployment/docs -n workspace
          kubectl rollout status deployment/docs -n workspace --timeout=120s

  deploy-korczewski:
    name: Deploy Docs (korczewski)
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          fetch-tags: false

      - name: Deploy to korczewski
        env:
          KUBECONFIG_DATA: ${{ secrets.FLEET_KUBECONFIG }}
        run: |
          curl -sSL "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl" \
            -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl rollout restart deployment/docs -n workspace-korczewski
          kubectl rollout status deployment/docs -n workspace-korczewski --timeout=120s
