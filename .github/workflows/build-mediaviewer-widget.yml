name: Build Mediaviewer Widget

on:
  push:
    branches: [main]
    paths:
      - 'mediaviewer-widget/**'
      - 'packages/videovault-player/**'
      - '.github/workflows/build-mediaviewer-widget.yml'
  workflow_dispatch:

env:
  OPENSPEC_TELEMETRY: '0'

jobs:
  build:
    name: Build & push Mediaviewer Widget image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha_tag: ${{ steps.version.outputs.sha }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-tags: false

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mediaviewer-widget/package-lock.json

      - name: Test gate (player package + widget)
        run: |
          cd packages/videovault-player && npm ci && npm test
          cd ../../mediaviewer-widget && npm ci --legacy-peer-deps && npm run typecheck && npm test

      - name: Get short SHA
        id: version
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Build & push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          file: mediaviewer-widget/Dockerfile
          push: true
          build-args: |
            VITE_ALLOWED_PARENT_ORIGINS=https://web.mentolder.de,https://web.korczewski.de,http://localhost:4321,http://web.localhost
          tags: |
            ghcr.io/paddione/mediaviewer-widget:sha-${{ steps.version.outputs.sha }}
            ghcr.io/paddione/mediaviewer-widget:latest
          cache-from: type=gha
          cache-to: type=gha,mode=min

  deploy-mentolder:
    name: Deploy Mediaviewer Widget (mentolder)
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-tags: false

      - name: Deploy to mentolder
        env:
          KUBECONFIG_DATA: ${{ secrets.FLEET_KUBECONFIG }}
        run: |
          curl -sSL "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl" \
            -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl rollout restart deployment/mediaviewer-widget -n workspace
          kubectl rollout status deployment/mediaviewer-widget -n workspace --timeout=120s

  deploy-korczewski:
    name: Deploy Mediaviewer Widget (korczewski)
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-tags: false

      - name: Deploy to korczewski
        env:
          KUBECONFIG_DATA: ${{ secrets.FLEET_KUBECONFIG }}
        run: |
          curl -sSL "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl" \
            -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl rollout restart deployment/mediaviewer-widget -n workspace-korczewski
          kubectl rollout status deployment/mediaviewer-widget -n workspace-korczewski --timeout=120s
