name: Build Talk Transcriber

on:
  push:
    paths:
      - "k3d/talk-transcriber/**"
      - ".github/workflows/build-transcriber.yml"
  pull_request:
    paths:
      - "k3d/talk-transcriber/**"
      - ".github/workflows/build-transcriber.yml"
  workflow_dispatch:

concurrency:
  group: build-transcriber-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: paddione/talk-transcriber

jobs:
  build-push:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build date
        run: echo "BUILD_DATE=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: k3d/talk-transcriber
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ env.BUILD_DATE }}-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Nextcloud Talk Transcriber Bot
          cache-from: type=gha
          cache-to: type=gha,mode=max