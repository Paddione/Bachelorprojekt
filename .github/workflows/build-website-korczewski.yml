name: Build & Deploy Website (korczewski)

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/build-website-korczewski.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy Website (korczewski)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          submodules: recursive

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Docker image
        env:
          PROD_DOMAIN: korczewski.de
          BRAND_NAME: KORE
          CONTACT_EMAIL: info@korczewski.de
          CONTACT_PHONE: ${{ secrets.KORCZEWSKI_CONTACT_PHONE }}
          CONTACT_CITY: Lüneburg
          CONTACT_NAME: Patrick Korczewski
          LEGAL_STREET: ${{ secrets.KORCZEWSKI_LEGAL_STREET }}
          LEGAL_ZIP: ${{ secrets.KORCZEWSKI_LEGAL_ZIP }}
          LEGAL_JOBTITLE: Software Engineer, IT-Security-Berater
          LEGAL_UST_ID: ${{ secrets.KORCZEWSKI_LEGAL_UST_ID }}
          LEGAL_WEBSITE: korczewski.de
        run: |
          IMAGE="ghcr.io/paddione/korczewski-website"
          SHA_TAG="sha-$(date +%Y%m%d-%H%M%S)-$(git rev-parse --short HEAD)"
          docker build --no-cache \
            -t "${IMAGE}:${SHA_TAG}" \
            -t "${IMAGE}:latest" \
            -f website/Dockerfile \
            --build-arg PROD_DOMAIN="$PROD_DOMAIN" \
            --build-arg BRAND_NAME="$BRAND_NAME" \
            --build-arg CONTACT_EMAIL="$CONTACT_EMAIL" \
            --build-arg CONTACT_PHONE="$CONTACT_PHONE" \
            --build-arg CONTACT_CITY="$CONTACT_CITY" \
            --build-arg CONTACT_NAME="$CONTACT_NAME" \
            --build-arg LEGAL_STREET="$LEGAL_STREET" \
            --build-arg LEGAL_ZIP="$LEGAL_ZIP" \
            --build-arg LEGAL_JOBTITLE="$LEGAL_JOBTITLE" \
            --build-arg LEGAL_UST_ID="$LEGAL_UST_ID" \
            --build-arg LEGAL_WEBSITE="$LEGAL_WEBSITE" \
            .
          docker push "${IMAGE}:${SHA_TAG}"
          docker push "${IMAGE}:latest"
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV
          echo "SHA_TAG=${SHA_TAG}" >> $GITHUB_ENV

      - name: Deploy to korczewski
        env:
          KUBECONFIG_DATA: ${{ secrets.FLEET_KUBECONFIG }}
        run: |
          curl -sSL "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl" \
            -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl set image deployment/website website="${IMAGE}:${SHA_TAG}" -n website-korczewski
          kubectl rollout status deployment/website -n website-korczewski --timeout=120s