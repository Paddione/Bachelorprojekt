name: Build & Deploy Website (korczewski)

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/build-website-korczewski.yml'

jobs:
  build-and-deploy:
    name: Build & Deploy Website (korczewski)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Docker image
        env:
          PROD_DOMAIN: korczewski.de
          BRAND_NAME: KORE
          CONTACT_EMAIL: info@korczewski.de
          CONTACT_PHONE: ${{ secrets.KORCZEWSKI_CONTACT_PHONE }}
          CONTACT_CITY: Lüneburg
          CONTACT_NAME: Patrick Korczewski
          LEGAL_STREET: ${{ secrets.KORCZEWSKI_LEGAL_STREET }}
          LEGAL_ZIP: ${{ secrets.KORCZEWSKI_LEGAL_ZIP }}
          LEGAL_JOBTITLE: Software Engineer, IT-Security-Berater
          LEGAL_UST_ID: ${{ secrets.KORCZEWSKI_LEGAL_UST_ID }}
          LEGAL_WEBSITE: korczewski.de
        run: |
          IMAGE="ghcr.io/paddione/korczewski-website"
          docker build --no-cache \
            -t "${IMAGE}:latest" \
            -f website/Dockerfile \
            --build-arg PROD_DOMAIN="$PROD_DOMAIN" \
            --build-arg BRAND_NAME="$BRAND_NAME" \
            --build-arg CONTACT_EMAIL="$CONTACT_EMAIL" \
            --build-arg CONTACT_PHONE="$CONTACT_PHONE" \
            --build-arg CONTACT_CITY="$CONTACT_CITY" \
            --build-arg CONTACT_NAME="$CONTACT_NAME" \
            --build-arg LEGAL_STREET="$LEGAL_STREET" \
            --build-arg LEGAL_ZIP="$LEGAL_ZIP" \
            --build-arg LEGAL_JOBTITLE="$LEGAL_JOBTITLE" \
            --build-arg LEGAL_UST_ID="$LEGAL_UST_ID" \
            --build-arg LEGAL_WEBSITE="$LEGAL_WEBSITE" \
            .
          docker push "${IMAGE}:latest"
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV

      - name: Set up kubectl
        run: |
          curl -sSL "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl" \
            -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl

      - name: Configure kubeconfig (korczewski)
        env:
          KUBECONFIG_B64: ${{ secrets.KORCZEWSKI_KUBECONFIG_B64 }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_B64" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Rollout restart website (korczewski)
        run: |
          # Un-pin to :latest in case a past `task website:deploy ENV=korczewski`
          # set the deployment image to a specific digest — otherwise rollout
          # restart re-pulls the same old digest and the new :latest is ignored.
          kubectl --context korczewski -n website-korczewski set image deployment/website website=ghcr.io/paddione/korczewski-website:latest
          kubectl --context korczewski -n website-korczewski rollout restart deployment/website
          kubectl --context korczewski -n website-korczewski rollout status deployment/website --timeout=180s
          echo "✓ Website live auf https://web.korczewski.de"
