name: Build & Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/build-website.yml'

jobs:
  build-and-deploy:
    name: Build & Deploy Website (mentolder)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Docker image
        env:
          PROD_DOMAIN: mentolder.de
          BRAND_NAME: Mentolder
          CONTACT_EMAIL: info@mentolder.de
          CONTACT_PHONE: ${{ secrets.CONTACT_PHONE }}
          CONTACT_CITY: "L\u00fcneburg, Hamburg und Umgebung"
          CONTACT_NAME: Gerald Korczewski
          LEGAL_STREET: ${{ secrets.LEGAL_STREET }}
          LEGAL_ZIP: ${{ secrets.LEGAL_ZIP }}
          LEGAL_JOBTITLE: Coach und digitaler Begleiter
          LEGAL_UST_ID: ${{ secrets.LEGAL_UST_ID }}
          LEGAL_WEBSITE: mentolder.de
        run: |
          IMAGE="ghcr.io/paddione/mentolder-website"
          docker build --no-cache \
            -t "${IMAGE}:latest" \
            -f website/Dockerfile \
            --build-arg PROD_DOMAIN="$PROD_DOMAIN" \
            --build-arg BRAND_NAME="$BRAND_NAME" \
            --build-arg CONTACT_EMAIL="$CONTACT_EMAIL" \
            --build-arg CONTACT_PHONE="$CONTACT_PHONE" \
            --build-arg CONTACT_CITY="$CONTACT_CITY" \
            --build-arg CONTACT_NAME="$CONTACT_NAME" \
            --build-arg LEGAL_STREET="$LEGAL_STREET" \
            --build-arg LEGAL_ZIP="$LEGAL_ZIP" \
            --build-arg LEGAL_JOBTITLE="$LEGAL_JOBTITLE" \
            --build-arg LEGAL_UST_ID="$LEGAL_UST_ID" \
            --build-arg LEGAL_WEBSITE="$LEGAL_WEBSITE" \
            .
          docker push "${IMAGE}:latest"
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV

      - name: Set up kubectl
        run: |
          curl -sSL "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl" \
            -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl

      - name: Configure kubeconfig (mentolder)
        env:
          KUBECONFIG_B64: ${{ secrets.MENTOLDER_KUBECONFIG_B64 }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_B64" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Rollout restart website (mentolder)
        run: |
          kubectl --context mentolder -n website rollout restart deployment/website
          kubectl --context mentolder -n website rollout status deployment/website --timeout=180s
          echo "\u2713 Website live auf https://web.mentolder.de"
