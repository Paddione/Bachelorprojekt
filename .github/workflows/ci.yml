name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  offline-tests:
    name: Offline Tests (Manifests, Configs, Unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y jq curl python3-pip
          curl -sSL "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl" \
            -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl
          sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin

      - name: Install node dependencies (docs-gen generator + tests)
        run: npm ci

      - name: Create CI dummy secrets
        run: bash scripts/ci-dummy-secrets.sh

      - name: Run all offline tests
        run: task test:all

      - name: Verify test inventory is up to date
        run: |
          task test:inventory
          if ! git diff --exit-code website/src/data/test-inventory.json; then
            echo "ERROR: website/src/data/test-inventory.json is stale — run 'task test:inventory' locally and commit"
            exit 1
          fi

      - name: Verify route manifest is up to date
        run: |
          task routes:manifest
          if ! git diff --exit-code website/src/data/route-manifest.json; then
            echo "ERROR: website/src/data/route-manifest.json is stale — run 'task routes:manifest' locally and commit"
            exit 1
          fi

      - name: Assert route manifest invariants (count + auth tiers)
        run: |
          node -e '
            const fs = require("fs");
            const m = JSON.parse(fs.readFileSync("website/src/data/route-manifest.json", "utf8"));
            const errs = [];
            if (m.generatedFrom !== "website/src/pages") {
              errs.push(`generatedFrom must be "website/src/pages", got ${JSON.stringify(m.generatedFrom)}`);
            }
            if (!Array.isArray(m.routes)) {
              errs.push("routes must be an array");
            }
            if (m.count !== 99) {
              errs.push(`expected count===99, got ${m.count}`);
            }
            for (const r of (m.routes || [])) {
              const isAdmin = r.route.startsWith("/admin");
              const isPortal = r.route.startsWith("/portal");
              if ((isAdmin || isPortal) && r.authTier === "public") {
                errs.push(`${r.route} is under /admin or /portal but tagged authTier=public`);
              }
              if (!isAdmin && !isPortal && r.authTier !== "public") {
                errs.push(`${r.route} is public-namespace but tagged authTier=${r.authTier}`);
              }
            }
            if (errs.length) {
              console.error("ERROR: route-manifest invariants violated:\n  - " + errs.join("\n  - "));
              process.exit(1);
            }
            console.log(`route-manifest OK: ${m.count} page files, ${m.routes.length} sweep routes, auth tiers consistent`);
          '

      - name: Verify agent-guide docs are up to date
        run: |
          task agent-guide:docs
          if ! git diff --exit-code docs/agent-guide/10-ziele.md docs/agent-guide/20-werkzeuge.md docs/agent-guide/30-bausteine.md; then
            echo "ERROR: generated agent-guide docs are stale — run 'task agent-guide:docs' locally and commit"
            exit 1
          fi

      - name: Verify agent-guide webapp JSON is up to date
        run: |
          task agent-guide:webapp
          if ! git diff --exit-code website/src/lib/agent-guide.generated.json; then
            echo "ERROR: website/src/lib/agent-guide.generated.json is stale — run 'task agent-guide:webapp' locally and commit"
            exit 1
          fi

      - name: Verify agent-guide maps are up to date
        run: |
          task agent-guide:maps
          if ! git diff --exit-code docs/agent-guide/maps/; then
            echo "ERROR: generated agent-guide maps are stale — run 'task agent-guide:maps' locally and commit"
            exit 1
          fi

      - name: Validate Systembrett template
        run: ./scripts/tests/systembrett-template.test.sh

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check image pinning in k3d manifests
        run: |
          # Several dev images (MCP servers, whisper, locally-built services) intentionally
          # use :latest. This step is advisory only — it reports which images are unpinned.
          pinned=true
          for f in k3d/*.yaml; do
            if grep -q ':latest' "$f"; then
              echo "INFO: $f contains :latest tag(s)"
              pinned=false
            fi
          done
          $pinned && echo "All images are version-pinned" || echo "WARNING: some images use :latest (see above)"

      - name: Check for secrets in code
        run: |
          if grep -rn 'password.*=.*[^$]' k3d/*.yaml \
               | grep -iv 'secretKeyRef\|configMapKeyRef\|valueFrom\|KEYCLOAK_ADMIN_PASSWORD\|_PASSWORD}\|getenv(' \
               | grep -iv '^\s*#'; then
            echo "ERROR: Possible hardcoded secrets found (see above)"
            exit 1
          fi
          echo "No hardcoded secrets detected"

  brett-server-test:
    name: Brett Server Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm ci --prefix brett
      - run: node --test brett/test/*.test.js brett/test/*.test.mjs
        env:
          MOCK_DB: 'true'

  commit-lint:
    name: Conventional Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install commitlint
        run: npm install -g @commitlint/cli @commitlint/config-conventional
      - name: Lint commit messages
        run: |
          npx commitlint \
            --from ${{ github.event.pull_request.base.sha }} \
            --to ${{ github.event.pull_request.head.sha }} \
            --verbose
