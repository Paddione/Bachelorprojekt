name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-manifests:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | sudo tar xz -C /usr/local/bin kubeconform

      - name: Create CI dummy secrets
        run: |
          for f in k3d/secrets.yaml k3d/backup-secrets.yaml; do
            if [ ! -f "$f" ]; then
              echo -e "apiVersion: v1\nkind: Secret\nmetadata:\n  name: $(basename $f .yaml)\ntype: Opaque\nstringData:\n  PLACEHOLDER: ci-dummy" > "$f"
            fi
          done

      - name: Validate kustomize output
        run: |
          kubectl kustomize k3d/ > /dev/null
          echo "Kustomize build succeeded"

      - name: Validate manifests with kubeconform
        run: |
          kubectl kustomize k3d/ | kubeconform -strict -summary \
            -kubernetes-version 1.31.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
          echo "Manifest validation passed"

  lint-yaml:
    name: Lint YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint k3d manifests
        run: |
          yamllint -d '{extends: relaxed, rules: {line-length: {max: 200}}}' \
            k3d/*.yaml

  lint-scripts:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Check scripts
        run: |
          shellcheck -x scripts/*.sh k3d/*.sh tests/lib/*.sh || true
          echo "Shellcheck completed"

  test-configs:
    name: Validate Configs
    runs-on: ubuntu-latest
    needs: [validate-manifests]
    steps:
      - uses: actions/checkout@v4

      - name: Validate realm JSON
        run: |
          python3 -c "import json; json.load(open('k3d/realm-workspace-dev.json'))"
          echo "realm-workspace-dev.json is valid JSON"

      - name: Validate PHP config
        run: |
          php -l k3d/nextcloud-oidc-dev.php
          echo "PHP config is syntactically valid"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check image pinning in k3d manifests
        run: |
          if grep -r ':latest' k3d/*.yaml 2>/dev/null; then
            echo "WARNING: Some k3d manifests use :latest tags"
          else
            echo "All images are version-pinned"
          fi

      - name: Check for secrets in code
        run: |
          if grep -rn 'password.*=.*[^$]' k3d/*.yaml --include='*.yaml' \
               | grep -iv 'secretKeyRef\|configMapKeyRef\|valueFrom\|KEYCLOAK_ADMIN_PASSWORD\|_PASSWORD}' \
               | grep -iv '^\s*#'; then
            echo "WARNING: Possible hardcoded secrets found"
          else
            echo "No hardcoded secrets detected"
          fi
