name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  offline-tests:
    name: Offline Tests (Manifests, Configs, Unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y jq curl python3-pip
          curl -sSL "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl" \
            -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl
          sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin

      - name: Create CI dummy secrets
        run: bash scripts/ci-dummy-secrets.sh

      - name: Run all offline tests
        run: task test:all

      - name: Verify test inventory is up to date
        run: |
          task test:inventory
          if ! git diff --exit-code website/src/data/test-inventory.json; then
            echo "ERROR: website/src/data/test-inventory.json is stale — run 'task test:inventory' locally and commit"
            exit 1
          fi

      - name: Validate Systembrett template
        run: ./scripts/tests/systembrett-template.test.sh

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check image pinning in k3d manifests
        run: |
          # Several dev images (MCP servers, whisper, locally-built services) intentionally
          # use :latest. This step is advisory only — it reports which images are unpinned.
          pinned=true
          for f in k3d/*.yaml; do
            if grep -q ':latest' "$f"; then
              echo "INFO: $f contains :latest tag(s)"
              pinned=false
            fi
          done
          $pinned && echo "All images are version-pinned" || echo "WARNING: some images use :latest (see above)"

      - name: Check for secrets in code
        run: |
          if grep -rn 'password.*=.*[^$]' k3d/*.yaml \
               | grep -iv 'secretKeyRef\|configMapKeyRef\|valueFrom\|KEYCLOAK_ADMIN_PASSWORD\|_PASSWORD}\|getenv(' \
               | grep -iv '^\s*#'; then
            echo "ERROR: Possible hardcoded secrets found (see above)"
            exit 1
          fi
          echo "No hardcoded secrets detected"

  e2e-smoke:
    name: E2E Smoke (prod)
    runs-on: ubuntu-latest
    needs: offline-tests
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install Playwright
        working-directory: tests/e2e
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Run @smoke specs against prod
        working-directory: tests/e2e
        env:
          WEBSITE_URL: https://web.mentolder.de
          CI: 'true'
        run: npx playwright test --project=smoke --grep '@smoke'

      - name: Upload JUnit + traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-results
          path: |
            tests/results/junit.xml
            tests/results/playwright-traces/
          if-no-files-found: warn

      - name: Publish JUnit summary
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: 'tests/results/junit.xml'
          require_tests: false
