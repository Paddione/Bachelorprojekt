name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  offline-tests:
    name: Offline Tests (Manifests, Configs, Unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y jq curl python3-pip
          curl -sSL "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl" \
            -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl
          sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin

      - name: Create CI dummy secrets
        run: bash scripts/ci-dummy-secrets.sh

      - name: Run all offline tests
        run: task test:all

      - name: Verify test inventory is up to date
        run: |
          task test:inventory
          if ! git diff --exit-code website/src/data/test-inventory.json; then
            echo "ERROR: website/src/data/test-inventory.json is stale — run 'task test:inventory' locally and commit"
            exit 1
          fi

      - name: Validate Systembrett template
        run: ./scripts/tests/systembrett-template.test.sh

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check image pinning in k3d manifests
        run: |
          # Several dev images (MCP servers, whisper, locally-built services) intentionally
          # use :latest. This step is advisory only — it reports which images are unpinned.
          pinned=true
          for f in k3d/*.yaml; do
            if grep -q ':latest' "$f"; then
              echo "INFO: $f contains :latest tag(s)"
              pinned=false
            fi
          done
          $pinned && echo "All images are version-pinned" || echo "WARNING: some images use :latest (see above)"

      - name: Check for secrets in code
        run: |
          if grep -rn 'password.*=.*[^$]' k3d/*.yaml \
               | grep -iv 'secretKeyRef\|configMapKeyRef\|valueFrom\|KEYCLOAK_ADMIN_PASSWORD\|_PASSWORD}\|getenv(' \
               | grep -iv '^\s*#'; then
            echo "ERROR: Possible hardcoded secrets found (see above)"
            exit 1
          fi
          echo "No hardcoded secrets detected"

  arena-server:
    name: arena-server (build + tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: arena_test
          POSTGRES_PASSWORD: arena_test
          POSTGRES_DB: arena_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arena_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: arena-server/pnpm-lock.yaml

      - name: Install
        working-directory: arena-server
        run: pnpm install --frozen-lockfile

      - name: Seed public.brands for arena FK
        run: |
          psql postgresql://arena_test:arena_test@localhost:5432/arena_test \
            -c "CREATE TABLE IF NOT EXISTS public.brands (id text PRIMARY KEY);" \
            -c "INSERT INTO public.brands (id) VALUES ('mentolder'),('korczewski') ON CONFLICT DO NOTHING;"

      - name: Test (unit + integration via TEST_DB_URL)
        working-directory: arena-server
        env:
          TEST_DB_URL: postgresql://arena_test:arena_test@localhost:5432/arena_test
        run: pnpm test

      - name: Build
        working-directory: arena-server
        run: pnpm build

  arena-proto-drift:
    name: Arena protocol drift guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Diff arena-server proto vs website lobbyTypes
        run: |
          if ! diff -u \
              arena-server/src/proto/messages.ts \
              website/src/components/arena/shared/lobbyTypes.ts; then
            echo "::error::Arena protocol drift between server and website."
            echo "Sync the two files (they must stay byte-identical):"
            echo "  cp arena-server/src/proto/messages.ts \\"
            echo "     website/src/components/arena/shared/lobbyTypes.ts"
            exit 1
          fi
          echo "Arena protocol files are in sync"
