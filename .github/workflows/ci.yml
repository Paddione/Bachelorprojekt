name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-manifests:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate kustomize output
        run: |
          kubectl kustomize k3d/ > /dev/null
          echo "Kustomize build succeeded"

      - name: Dry-run apply
        run: |
          kubectl kustomize k3d/ | kubectl apply --dry-run=client -f - 2>&1
          echo "Dry-run apply passed"

  lint-yaml:
    name: Lint YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint k3d manifests
        run: |
          yamllint -d '{extends: relaxed, rules: {line-length: {max: 200}}}' \
            k3d/*.yaml

      - name: Lint docker-compose
        run: |
          yamllint -d '{extends: relaxed, rules: {line-length: {max: 200}}}' \
            docker-compose.yml

  lint-scripts:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Check scripts
        run: |
          shellcheck -x scripts/*.sh k3d/*.sh || true
          echo "Shellcheck completed"

  test-configs:
    name: Validate Configs
    runs-on: ubuntu-latest
    needs: [validate-manifests]
    steps:
      - uses: actions/checkout@v4

      - name: Validate environment template
        run: |
          REQUIRED_VARS=$(grep -c '^[A-Z]' .env.example || true)
          echo "Found $REQUIRED_VARS environment variables in template"
          [ "$REQUIRED_VARS" -gt 0 ] || exit 1

      - name: Validate realm JSON configs
        run: |
          python3 -c "import json; json.load(open('realm-homeoffice.json'))"
          echo "realm-homeoffice.json is valid JSON"
          python3 -c "import json; json.load(open('k3d/realm-homeoffice-dev.json'))"
          echo "realm-homeoffice-dev.json is valid JSON"

      - name: Validate PHP configs
        run: |
          php -l nextcloud/oidc.config.php
          php -l k3d/nextcloud-oidc-dev.php
          echo "PHP configs are syntactically valid"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Docker image pinning
        run: |
          if grep -r ':latest' docker-compose.yml 2>/dev/null; then
            echo "WARNING: docker-compose.yml uses :latest tags"
          else
            echo "Production images are version-pinned"
          fi
