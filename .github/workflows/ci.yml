name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]
    # No `paths-ignore` here: docs-only PRs (e.g. AGENTS.md/CLAUDE.md edits) must
    # still trigger this workflow so the branch-protection required checks
    # (BATS Unit + Quality Gates, Manifest Validation,
    # Factory + OpenSpec + Guards, Security Scan, Brett TypeScript,
    # Vitest (website), Conventional Commits) report success — otherwise
    # mergeStateStatus stays BLOCKED indefinitely and admin-merge is required.
    # See mishap T001149-M3.
  push:
    branches:
      - main
      # release-please PRs are opened by github-actions[bot] with GITHUB_TOKEN,
      # which GitHub does not re-trigger pull_request workflows for (loop-prevention).
      # Triggering on push to the release-please branch gives branch-protection the
      # required check run so the PR can auto-merge.
      - 'release-please--branches--main'
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '**/CLAUDE.md'

concurrency:
  # Cancel superseded runs on the same PR (rapid iteration / stacked Factory pushes);
  # never cancel push-to-main runs, which gate the deployable history.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  OPENSPEC_TELEMETRY: '0'
jobs:
  # ── Scoped test jobs (replaces offline-tests monolith) ─────────────

  test-bats:
    # BATS unit tests (scoped via find-changed-tests.sh) + code-quality
    # gates + API auth regression + freshness check. The core offline job
    # that most PRs hit. Does NOT need Go, kubectl, or pnpm. [T001860]
    name: BATS Unit + Quality Gates
    if: github.event.action != 'edited'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          fetch-tags: false
          submodules: recursive

      - name: Fetch origin/main for diffing (shallow)
        run: git fetch --no-tags --prune --depth=1 origin main:refs/remotes/origin/main

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - uses: arduino/setup-task@bfe25a35f5c1f609e1d6153197b3b42a04ae054c  # v3.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install node dependencies
        run: npm ci

      - name: Create CI dummy secrets
        run: bash scripts/ci-dummy-secrets.sh

      - name: Scoped unit BATS + coverage guard
        run: |
          JOBS=$(nproc 2>/dev/null || echo 2)
          CHANGED_FILES=$(bash scripts/find-changed-tests.sh unit)
          if [ -n "$CHANGED_FILES" ]; then
            echo "→ Running changed unit tests:"
            echo "$CHANGED_FILES"
            ./tests/unit/lib/bats-core/bin/bats -j $JOBS --no-parallelize-within-files $CHANGED_FILES
          else
            echo "→ No matching unit tests for this PR"
          fi
          CHANGED=$(git diff --name-only HEAD origin/main 2>/dev/null || true)
          if echo "$CHANGED" | grep -qE "^(tests/figure-pack-assets|assets/)"; then
            bash tests/figure-pack-assets.test.sh
          fi
          bash scripts/tests/unit-coverage-guard.sh

      - name: Code-quality gates (always)
        run: node --test scripts/code-quality/*.test.mjs scripts/code-quality/gates/*.test.mjs

      - name: API auth regression gate
        run: |
          git show origin/main:docs/generated/api-map.json > /tmp/api-map-main.json 2>/dev/null || echo '{"generatedAt":"","endpoints":[]}' > /tmp/api-map-main.json
          node scripts/api-auth-check.mjs --regression --main-map /tmp/api-map-main.json

      - name: Ensure freshness artifacts are up to date
        if: github.event_name == 'pull_request'
        run: |
          if ! task freshness:check; then
            echo ""
            echo "❌ Freshness / quality gate failed — see above for the specific cause."
            echo ""
            echo "   Stale generated artifacts  →  task freshness:regenerate  (then commit + push)"
            echo "   New code-quality violation →  task quality:check  (then fix or 'task quality:baseline:freeze')"
            exit 1
          fi
          echo "✅ Freshness and quality gates passed"

      - name: OpenSpec spec-drift advisory gate [T001979]
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Advisory Phase 1: drift => exit 0 (warnings only). exit >=2 means the
          # script itself broke and MUST fail CI — so NO continue-on-error here.
          bash scripts/openspec-drift-check.sh

  test-manifests:
    # kustomize manifest validation — the ONLY job that needs kubectl.
    # Very fast setup (~1 min) + ~5s test execution. [T001860]
    name: Manifest Validation
    if: github.event.action != 'edited'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-tags: false
          submodules: recursive

      - name: Install kubectl
        run: |
          curl --fail -sSL "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl" \
            -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl

      - name: Run manifest tests
        run: |
          ./tests/unit/lib/bats-core/bin/bats \
            tests/unit/manifests.bats tests/unit/changed-manifests.bats

  test-factory:
    # Factory FA-*/FA-AR-* BATS + openspec validation + agent-library +
    # MCP tooling guardrails. Factory tests skip live-DB cases without
    # a cluster (CI-safe). Does NOT need Go, kubectl, or pnpm. [T001860]
    name: Factory + OpenSpec + Guards
    if: github.event.action != 'edited'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-tags: false
          submodules: recursive

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - uses: arduino/setup-task@bfe25a35f5c1f609e1d6153197b3b42a04ae054c  # v3.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install node dependencies
        run: npm ci

      - name: Create CI dummy secrets
        run: bash scripts/ci-dummy-secrets.sh

      - name: Factory BATS
        run: |
          ./tests/unit/lib/bats-core/bin/bats \
            tests/spec/software-factory.bats tests/local/FA-AR-*.bats

      - name: OpenSpec validation
        run: npm run test:openspec

      - name: Agent library guardrail
        run: ./tests/unit/lib/bats-core/bin/bats tests/spec/agent-library.bats

      - name: MCP tooling guardrail
        run: ./tests/unit/lib/bats-core/bin/bats tests/spec/mcp-tooling.bats

      - name: Agent setup replay reminder
        run: |
          changed=$(git diff --name-only origin/main...HEAD || true)
          if echo "$changed" | grep -Eq '^(.opencode/agent-models.jsonc|scripts/factory/review-[^/]+\.prompt\.md|scripts/factory/provider-router\.js|AGENTS\.md)$'; then
            echo "::warning::Agenten-Setup geändert — lokal 'task factory:eval:replay' ausführen"
          fi

  # ── End scoped test jobs ──────────────────────────────────────────

  security-scan:
    name: Security Scan
    if: github.event.action != 'edited'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-tags: false

      - name: Check image pinning in k3d manifests
        run: |
          # Several dev images (MCP servers, whisper, locally-built services) intentionally
          # use :latest. This step is advisory only — it reports which images are unpinned.
          pinned=true
          for f in k3d/*.yaml; do
            if grep -q ':latest' "$f"; then
              echo "INFO: $f contains :latest tag(s)"
              pinned=false
            fi
          done
          $pinned && echo "All images are version-pinned" || echo "WARNING: some images use :latest (see above)"

      - name: Check for secrets in code
        run: |
          if grep -rn 'password.*=.*[^$]' k3d/*.yaml \
               | grep -iv 'secretKeyRef\|configMapKeyRef\|valueFrom\|KEYCLOAK_ADMIN_PASSWORD\|_PASSWORD}\|getenv(' \
               | grep -iv '^\s*#'; then
            echo "ERROR: Possible hardcoded secrets found (see above)"
            exit 1
          fi
          echo "No hardcoded secrets detected"

      - name: Verify secrets are git-crypt-encrypted
        run: |
          if ! bash scripts/git-crypt-guard.sh check-tracked; then
            echo "ERROR: a tracked secret is stored in plaintext (must be git-crypt-encrypted)"
            exit 1
          fi
          echo "All managed secret files are git-crypt-encrypted"

      - name: Install Trivy
        run: |
          sudo apt-get update && sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Trivy container image scan (pinned images)
        continue-on-error: true
        run: |
          result=$(bash scripts/trivy-scan.sh --json 2>/dev/null || echo '{"total_critical":0,"total_high":0}')
          crit=$(echo "$result" | jq '.total_critical')
          high=$(echo "$result" | jq '.total_high')
          echo "### Trivy Container Image Scan" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Total: $crit critical, $high high**" >> "$GITHUB_STEP_SUMMARY"
          echo "trivy-critical=$crit" >> "$GITHUB_OUTPUT"
          echo "trivy-high=$high" >> "$GITHUB_OUTPUT"
          if [[ "$crit" -gt 0 ]]; then
            echo "::warning::Found $crit CRITICAL CVEs across pinned images"
          fi

  brett-typescript:
    name: Brett TypeScript
    if: github.event.action != 'edited'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-tags: false
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: brett/package-lock.json
      - run: npm ci --prefix brett
      - name: Typecheck
        run: npm run typecheck --prefix brett
      - name: Unit tests
        run: npm test --prefix brett
        env:
          MOCK_DB: 'true'
      - run: npm run build --prefix brett

  vitest-website:
    # Always runs on every PR (no job-level path filter) so the branch-protection
    # required-check "Vitest (website)" reports on chore / config-only PRs too.
    # See mishap: Vitest (website) was required by main but no workflow
    # produced it, blocking auto-merge of chore PRs (e.g. #2094 admin-merged).
    # Smart selection happens INSIDE the vitest run via `--changed`
    # (mirrors local `task test:changed`): a chore PR runs zero tests in
    # ~1s, a website-feature PR runs only the affected ones. The
    # coverage gate below treats the no-changes case as a pass.
    name: Vitest (website)
    if: github.event.action != 'edited'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-tags: false

      - name: Set up pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda  # v4.1.0
        with:
          version: 10

      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install website dependencies
        run: cd website && pnpm install --frozen-lockfile

      - name: Fetch origin/main for --changed diffing
        run: git fetch --no-tags --prune --depth=1 origin main:refs/remotes/origin/main

      - name: Check coverage relevance
        id: check-cov
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD 2>/dev/null || true)
          if echo "$CHANGED" | grep -q "^website/src/lib/"; then
            echo "run-coverage=true" >> "$GITHUB_OUTPUT"
          else
            echo "run-coverage=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run ESLint (--max-warnings 0 fail-closed gate)
        run: cd website && pnpm lint

      - name: Run vitest + Astro check + Knip (parallel)
        # Mirrors the local `task test:changed` smart selection via explicit
        # --changed origin/main (requires fetch-origin-main step above).
        # Astro typecheck and Knip dead-code analysis run concurrently with
        # vitest to shave ~2-3 min off wall-clock time.
        # --coverage is conditional: only added when the PR touches
        # website/src/lib/ (where coverage gates apply), so trivial PRs
        # skip instrumentation overhead. The coverage gate step below
        # handles the missing-report case gracefully. [T003164]
        # Default 5s per-test timeout is too tight for DB-heavy tests
        # (e.g. tickets/cockpit-db.test.ts seeds 1005 rows) when vitest
        # runs ~243 files in parallel on shared CI runners. [T001336, T001651]
        run: |
          cd website
          ARGS="run --changed origin/main --testTimeout=30000"
          [[ "${{ steps.check-cov.outputs.run-coverage }}" == "true" ]] && ARGS="$ARGS --coverage"
          pnpm exec vitest $ARGS &
          V=$!
          pnpm run astro:check &
          A=$!
          pnpm exec knip --no-exit-code || true &
          K=$!
          EXIT=0
          wait $V || EXIT=$?
          wait $A || EXIT=$?
          wait $K || true
          exit $EXIT

      - name: Upload Vitest JUnit report
        # Runs even if the tests above failed, so a red PR still gets a
        # downloadable per-test breakdown (not just the raw log).
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vitest-junit-report
          path: website/test-results/junit.xml
          retention-days: 14
          if-no-files-found: ignore

      - name: Vitest line coverage gate (>= 60% on src/lib)
        # G-TEST05 — belt-and-braces check against the coverage-summary.json
        # produced by the run above. Does NOT re-run vitest. [T001336]
        # Skipped gracefully when:
        #   a) no coverage report exists (--coverage wasn't passed because
        #      the PR doesn't touch src/lib/), or
        #   b) --changed found zero website/ source changes (pct: "Unknown").
        # In both cases there is no source delta to regress. [T001651, T003164]
        run: |
          cd website
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "::notice::No coverage-summary.json (--coverage not needed / no report) — skipping gate"
            exit 0
          fi
          COV=$(jq -r '.total.lines.pct' coverage/coverage-summary.json)
          if [ "$COV" = "Unknown" ] || [ "$COV" = "null" ] || [ -z "$COV" ]; then
            echo "::notice::Coverage pct: ${COV:-empty} (--changed found no website/ changes) — skipping gate"
            exit 0
          fi
          echo "Total line coverage: ${COV}%"
          awk -v cov="$COV" 'BEGIN { if (cov + 0 < 60) { print "::error::Coverage gate failed: " cov "% < 60%"; exit 1 } else { print "::notice::Coverage gate passed: " cov "% >= 60%" } }'

      - name: Build website
        run: cd website && pnpm build

      - name: Upload website dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: website-dist
          path: website/dist
          retention-days: 1

  bundle-budget:
    name: Client-JS Bundle Budget
    if: github.event.action != 'edited'
    needs: [vitest-website]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-tags: false

      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'

      - name: Download website dist artifact
        uses: actions/download-artifact@v8
        with:
          name: website-dist
          path: website/dist

      - name: Check client-JS bundle budget
        run: node scripts/check-bundle-size.mjs --check --fail --threshold=5

  lighthouse:
    name: Lighthouse Performance
    if: github.event.action != 'edited'
    needs: [vitest-website]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # LHCI posts an advisory commit status; the built-in GITHUB_TOKEN needs
    # statuses:write to do so (no more expiring personal access token to maintain).
    permissions:
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-tags: false

      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli --loglevel=error

      - name: Run Lighthouse audit
        continue-on-error: true
        env:
          # Built-in Actions token (statuses:write above) — replaces the expired
          # personal access token that caused "GitHub responded with 401".
          LHCI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          lhci autorun || true

      - name: Lighthouse summary
        if: always()
        run: |
          echo "### Lighthouse Performance Audit" >> "$GITHUB_STEP_SUMMARY"
          echo "URL: https://web.mentolder.de" >> "$GITHUB_STEP_SUMMARY"
          echo "Budget: lighthouserc.json assertions (Performance ≥ 90)" >> "$GITHUB_STEP_SUMMARY"
          echo "Status: advisory only (does not block CI); GitHub status check posted via LHCI_GITHUB_TOKEN" >> "$GITHUB_STEP_SUMMARY"

  commit-lint:
    name: Conventional Commits
    runs-on: ubuntu-latest
    # 5min was too tight for the full-history checkout below on a repo with
    # many short-lived feature/chore branches — observed cancellations
    # ("The operation was canceled") mid-fetch on PR #3029 [T002049].
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    steps:
      # Checkout IS needed here despite the PR-title check above being pure
      # API — the later "Validate individual commit messages" and
      # "commit-vs-diff consistency" steps diff every commit in the PR range
      # locally and need those commit objects present.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: false
          filter: blob:none
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50  # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Mirror repo conventions — these are the types used in practice
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            build
            ci
            perf
            revert
          # Scopes are NOT enforced here — ticket-number scopes (Tdddddd) are
          # always valid, and named-scope enforcement happens later via
          # scripts/validate-commit-msg.sh range (individual commit messages).
          # Ticket references like [T000436] can extend subject length
          subjectPattern: ^.{1,200}$
          subjectPatternError: |
            The subject must be between 1 and 200 characters.
            If your PR title includes ticket references like [T000436], that counts toward the limit.
      - name: Validate ticket tag [T000XXX] in PR title (advisory)
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "PR title: $PR_TITLE"
          if echo "$PR_TITLE" | grep -qP '\[T\d+\]'; then
            echo "✅ Ticket tag found"
          else
            echo "⚠️  PR title has no ticket tag — recommended format: feat(scope): add feature [T000123]"
          fi
      - name: Validate individual commit messages [T001356 / G-GIT02]
        # amannn/action-semantic-pull-request (above) only validates the PR
        # *title*. GitHub's default squash-merge message can still surface a
        # non-conventional individual commit subject. This step catches that
        # regression by validating every non-merge commit in the PR range with
        # the same shared script used by the local pre-push hook
        # (.githooks/pre-push), so a bypassed hook is still caught in CI.
        # BASE_SHA/HEAD_SHA are commit SHAs (not free-text), but routed through
        # env vars per repo convention to avoid interpolating event payload
        # fields directly into the shell command.
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          bash scripts/validate-commit-msg.sh range "${BASE_SHA}..${HEAD_SHA}"

      # commit-vs-diff consistency guard (T001434-mishap). Catches any commit
      # whose subject claims an implementation change but whose diff contains
      # only test/spec/plan files. Mirrors the local .githooks/commit-msg hook
      # so a bypassed hook (SKIP_COMMIT_VS_DIFF=1) is still caught in CI.
      - name: commit-vs-diff consistency (T001434-mishap guard)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r sha; do
            [[ -z "$sha" ]] && continue
            subject=$(git log -1 --format='%s' "$sha")
            # Get the list of files changed by this commit (relative to its
            # first parent, falling back to the merge-base for merge commits).
            parent=$(git rev-parse "$sha^1" 2>/dev/null || echo "$BASE_SHA")
            files=$(git diff --name-only "$parent" "$sha" 2>/dev/null || true)
            # Build a temp commit-msg file and pass the commit SHA so
            # the guard script uses per-commit diff (not cumulative).
            tmp_msg=$(mktemp)
            trap 'rm -f "$tmp_msg"' EXIT
            printf '%s\n' "$subject" > "$tmp_msg"
            if ! bash scripts/check-commit-vs-diff.sh "$tmp_msg" "$sha"; then
              echo "✗ commit $sha fails commit-vs-diff guard: $subject" >&2
              fail=1
            fi
            rm -f "$tmp_msg"
          done < <(git rev-list "${BASE_SHA}..${HEAD_SHA}" --no-merges)
          if [[ "$fail" -ne 0 ]]; then
            echo "" >&2
            echo "✗ commit-vs-diff consistency guard failed" >&2
            echo "  One or more commits in this PR have an implementation-type" >&2
            echo "  subject (fix/feat/refactor/perf) but a diff that contains" >&2
            echo "  only test/spec/plan files. See T001434-mishap." >&2
            exit 1
          fi
