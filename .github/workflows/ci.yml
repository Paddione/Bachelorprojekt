name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '**/CLAUDE.md'
  push:
    branches:
      - main
      # release-please PRs are opened by github-actions[bot] with GITHUB_TOKEN,
      # which GitHub does not re-trigger pull_request workflows for (loop-prevention).
      # Triggering on push to the release-please branch gives branch-protection the
      # required check run so the PR can auto-merge.
      - 'release-please--branches--main'
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '**/CLAUDE.md'

concurrency:
  # Cancel superseded runs on the same PR (rapid iteration / stacked Factory pushes);
  # never cancel push-to-main runs, which gate the deployable history.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  offline-tests:
    name: Offline Tests (Manifests, Configs, Unit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: '22'
          cache: 'npm'

      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611  # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y jq curl python3-pip
          curl --fail -sSL "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl" \
            -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl

      - name: Install node dependencies (docs-gen generator + tests)
        run: npm ci

      - name: Create CI dummy secrets
        run: bash scripts/ci-dummy-secrets.sh

      - name: Run all offline tests
        run: task test:all

      - name: API auth regression gate
        run: |
          git fetch origin main --depth=1
          git show origin/main:docs/generated/api-map.json > /tmp/api-map-main.json 2>/dev/null || echo '{"generatedAt":"","endpoints":[]}' > /tmp/api-map-main.json
          node scripts/api-auth-check.mjs --regression --main-map /tmp/api-map-main.json

      - name: Ensure freshness artifacts are up to date
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          task freshness:regenerate
          if git diff --quiet; then
            echo "✅ Freshness artifacts are up to date"
            exit 0
          fi
          echo "⚠️ Freshness artifacts were stale — auto-regenerating and pushing to PR branch"
          # Use GH_PAT for git push so the push triggers a new CI run
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git stash
          git fetch origin "${{ github.head_ref }}"
          git checkout "${{ github.head_ref }}"
          if git stash pop; then
            git add -A
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: regenerate freshness artifacts"
            git push origin "HEAD:${{ github.head_ref }}" 2>/dev/null || true
            echo "✅ Freshness fix pushed — new CI run will validate"
          else
            echo "⚠️ Could not auto-fix (fork PR or no permission). Fix manually: task freshness:regenerate"
          fi
        # Fall through so freshness:check below still validates.
        # On successful push above, this CI run gets cancelled by concurrency;
        # the new run on the updated PR head will pass freshness:check.
      - name: Verify generated artifacts are fresh
        run: task freshness:check

      - name: Verify learning-assets build script (unit test)
        run: node --test scripts/build-learning-assets.test.mjs

      - name: Validate Systembrett template
        run: ./scripts/tests/systembrett-template.test.sh

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Check image pinning in k3d manifests
        run: |
          # Several dev images (MCP servers, whisper, locally-built services) intentionally
          # use :latest. This step is advisory only — it reports which images are unpinned.
          pinned=true
          for f in k3d/*.yaml; do
            if grep -q ':latest' "$f"; then
              echo "INFO: $f contains :latest tag(s)"
              pinned=false
            fi
          done
          $pinned && echo "All images are version-pinned" || echo "WARNING: some images use :latest (see above)"

      - name: Check for secrets in code
        run: |
          if grep -rn 'password.*=.*[^$]' k3d/*.yaml \
               | grep -iv 'secretKeyRef\|configMapKeyRef\|valueFrom\|KEYCLOAK_ADMIN_PASSWORD\|_PASSWORD}\|getenv(' \
               | grep -iv '^\s*#'; then
            echo "ERROR: Possible hardcoded secrets found (see above)"
            exit 1
          fi
          echo "No hardcoded secrets detected"

      - name: Verify secrets are git-crypt-encrypted
        run: |
          if ! bash scripts/git-crypt-guard.sh check-tracked; then
            echo "ERROR: a tracked secret is stored in plaintext (must be git-crypt-encrypted)"
            exit 1
          fi
          echo "All managed secret files are git-crypt-encrypted"

  brett-typescript:
    name: Brett TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: brett/package-lock.json
      - run: npm ci --prefix brett
      - name: Typecheck
        run: npm run typecheck --prefix brett
      - name: Unit tests
        run: npm test --prefix brett
        env:
          MOCK_DB: 'true'
      - run: npm run build --prefix brett

  vitest:
    name: Vitest (website + arena-server)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            website/package-lock.json
            arena-server/package-lock.json
      # Both suites self-skip env-dependent specs (describe.skipIf(!dbAvailable) /
      # !mustangAvailable), so they are green on a runner with no DB and no Java jar.
      - name: Website unit tests (vitest)
        run: |
          npm ci --prefix website
          npm --prefix website run test:unit
      - name: Arena-server unit tests (vitest)
        run: |
          npm ci --prefix arena-server
          npm --prefix arena-server test

  commit-lint:
    name: Conventional Commits
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: amannn/action-semantic-pull-request@e32d7e603df1aa1ba07e981f2a23455dee596825  # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Mirror repo conventions — these are the types used in practice
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            build
            ci
            perf
            revert
          # Ticket references like [T000436] can extend subject length
          subjectPattern: ^.{1,200}$
          subjectPatternError: |
            The subject must be between 1 and 200 characters.
            If your PR title includes ticket references like [T000436], that counts toward the limit.
      - name: Validate ticket tag [T000XXX] in PR title
        run: |
          echo "PR title: ${{ github.event.pull_request.title }}"
          if echo "${{ github.event.pull_request.title }}" | grep -qP '\[T\d+\]'; then
            echo "✅ Ticket tag found"
          else
            echo "❌ PR title must contain a ticket tag like [T000123]"
            echo "   Example: feat(scope): add feature X [T000123]"
            exit 1
          fi
