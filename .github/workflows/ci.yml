name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-manifests:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install kubectl + kubeconform
        run: |
          curl -sSL "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" \
            -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | sudo tar xz -C /usr/local/bin kubeconform

      - name: Create CI dummy secrets
        run: |
          for f in k3d/secrets.yaml k3d/backup-secrets.yaml; do
            if [ ! -f "$f" ]; then
              echo -e "apiVersion: v1\nkind: Secret\nmetadata:\n  name: $(basename $f .yaml)\ntype: Opaque\nstringData:\n  PLACEHOLDER: ci-dummy" > "$f"
            fi
          done

      - name: Validate kustomize output
        run: |
          kubectl kustomize k3d/ > /dev/null
          kubectl kustomize k3d/office-stack/ > /dev/null
          kubectl kustomize k3d/coturn-stack/ > /dev/null
          echo "Kustomize build succeeded"

      - name: Validate manifests with kubeconform
        run: |
          for tree in k3d/ k3d/office-stack/ k3d/coturn-stack/; do
            kubectl kustomize "$tree" | kubeconform -strict -summary \
              -kubernetes-version 1.31.0 \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
          done
          echo "Manifest validation passed"

  lint-yaml:
    name: Lint YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint k3d manifests
        run: |
          yamllint -d '{extends: relaxed, rules: {line-length: {max: 200}}}' \
            k3d/*.yaml

  lint-scripts:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Check scripts
        run: |
          shellcheck -x scripts/*.sh k3d/*.sh tests/lib/*.sh || true
          echo "Shellcheck completed"

  test-configs:
    name: Validate Configs
    runs-on: ubuntu-latest
    needs: [validate-manifests]
    steps:
      - uses: actions/checkout@v5

      - name: Validate realm JSON
        run: |
          python3 -c "import json; json.load(open('k3d/realm-workspace-dev.json'))"
          echo "realm-workspace-dev.json is valid JSON"

      - name: Validate PHP config
        run: |
          php -l k3d/nextcloud-oidc-dev.php
          echo "PHP config is syntactically valid"

  validate-environments:
    name: Validate Environment Configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate all environments against schema
        run: |
          for f in environments/*.yaml; do
            name="$(basename "$f" .yaml)"
            [ "$name" = "schema" ] && continue
            echo "--- Validating: $name ---"
            bash scripts/env-validate.sh --env "$name" --env-dir environments --schema-only
          done

      - name: Check for cross-environment drift
        run: bash scripts/env-validate.sh --drift --env-dir environments --strict

  validate-prod-secrets:
    name: Validate Prod Overlays Have No Dev Secrets
    runs-on: ubuntu-latest
    needs: [validate-manifests]
    steps:
      - uses: actions/checkout@v5

      - name: Install kubectl
        run: |
          curl -sSL "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" \
            -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl

      - name: Create CI dummy secrets
        run: |
          for f in k3d/secrets.yaml k3d/backup-secrets.yaml; do
            if [ ! -f "$f" ]; then
              printf 'apiVersion: v1\nkind: Secret\nmetadata:\n  name: %s\ntype: Opaque\nstringData:\n  PLACEHOLDER: ci-dummy\n' "$(basename "$f" .yaml)" > "$f"
            fi
          done

      - name: Check prod overlays exclude workspace-secrets Secret
        run: |
          python3 - <<'EOF'
          import subprocess, sys, yaml, glob, os

          overlays = sorted(glob.glob('prod*'))
          overlays = [o for o in overlays if os.path.isdir(o)]
          found = []
          for overlay in overlays:
              result = subprocess.run(
                  ['kubectl', 'kustomize', overlay],
                  capture_output=True, text=True
              )
              if result.returncode != 0:
                  print(f'ERROR: kustomize build failed for {overlay}:\n{result.stderr}', file=sys.stderr)
                  sys.exit(1)
              for doc in yaml.safe_load_all(result.stdout):
                  if not doc:
                      continue
                  if (doc.get('kind') == 'Secret' and
                          doc.get('metadata', {}).get('name') == 'workspace-secrets' and
                          (doc.get('stringData') or doc.get('data'))):
                      found.append(overlay)
          if found:
              print('FAIL: workspace-secrets Secret with data found in overlays: ' + ', '.join(found))
              print('The $patch: delete in prod/kustomization.yaml may have been removed.')
              sys.exit(1)
          print('OK: workspace-secrets Secret absent from all prod overlays (' + str(len(overlays)) + ' checked)')
          EOF

  unit-tests:
    name: BATS Unit Tests
    runs-on: ubuntu-latest
    needs: [validate-manifests]
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install dependencies
        run: sudo apt-get install -y jq

      - name: Create CI dummy secrets
        run: |
          for f in k3d/secrets.yaml k3d/backup-secrets.yaml; do
            if [ ! -f "$f" ]; then
              echo -e "apiVersion: v1\nkind: Secret\nmetadata:\n  name: $(basename $f .yaml)\ntype: Opaque\nstringData:\n  PLACEHOLDER: ci-dummy" > "$f"
            fi
          done

      - name: Run BATS unit tests
        run: ./tests/unit/lib/bats-core/bin/bats --formatter tap tests/unit/

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check image pinning in k3d manifests
        run: |
          if grep -r ':latest' k3d/*.yaml 2>/dev/null; then
            echo "WARNING: Some k3d manifests use :latest tags"
          else
            echo "All images are version-pinned"
          fi

      - name: Check for secrets in code
        run: |
          if grep -rn 'password.*=.*[^$]' k3d/*.yaml --include='*.yaml' \
               | grep -iv 'secretKeyRef\|configMapKeyRef\|valueFrom\|KEYCLOAK_ADMIN_PASSWORD\|_PASSWORD}' \
               | grep -iv '^\s*#'; then
            echo "WARNING: Possible hardcoded secrets found"
          else
            echo "No hardcoded secrets detected"
          fi
