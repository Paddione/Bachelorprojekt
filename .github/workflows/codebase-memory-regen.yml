name: Codebase-Memory Graph Regen

on:
  push:
    branches: [main]
    paths-ignore:
      - '.codebase-memory/**'  # don't trigger on own commits

concurrency:
  group: codebase-memory-regen-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reindex:
    name: Re-index codebase graph
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: '22'

      - name: Install codebase-memory-mcp
        run: npm install -g codebase-memory-mcp@0.8.1

      - name: Re-index repository (full, persistent)
        run: |
          codebase-memory-mcp cli index_repository \
            "{\"repo_path\": \"$GITHUB_WORKSPACE\", \"mode\": \"full\", \"persistence\": true}"

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet .codebase-memory/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated graph artifact
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .codebase-memory/graph.db.zst .codebase-memory/artifact.json
          git commit -m "chore: auto-regenerate codebase-memory graph [skip ci]"
          git push
