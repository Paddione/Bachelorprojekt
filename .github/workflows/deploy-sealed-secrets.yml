name: Deploy Sealed Secrets

on:
  push:
    branches: [main]
    paths:
      - 'environments/sealed-secrets/fleet-mentolder.yaml'
      - 'environments/sealed-secrets/fleet-korczewski.yaml'
      - '.github/workflows/deploy-sealed-secrets.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  OPENSPEC_TELEMETRY: '0'

jobs:
  validate:
    name: Validate Sealed Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Install kubectl and kubeseal
        run: |
          curl -sSL "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl" \
            -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl
          curl -sSL "https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.27.3/kubeseal-0.27.3-linux-amd64.tar.gz" \
            | tar -xzf - -C /usr/local/bin kubeseal && chmod +x /usr/local/bin/kubeseal

      - name: Verify Sealed Secrets
        env:
          KUBECONFIG_DATA: ${{ secrets.FLEET_KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          export KUBECONFIG=~/.kube/config
          kubeseal --validate -f environments/sealed-secrets/fleet-mentolder.yaml
          kubeseal --validate -f environments/sealed-secrets/fleet-korczewski.yaml

  deploy:
    name: Deploy Sealed Secrets
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Install kubectl
        run: |
          curl -sSL "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl" \
            -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl

      - name: Apply Sealed Secrets
        env:
          KUBECONFIG_DATA: ${{ secrets.FLEET_KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          export KUBECONFIG=~/.kube/config
          kubectl apply -f environments/sealed-secrets/fleet-mentolder.yaml
          kubectl apply -f environments/sealed-secrets/fleet-korczewski.yaml

      - name: Export Deploy SHA
        run: |
          echo "DEPLOY_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

  notify:
    name: Notify Ticket
    runs-on: ubuntu-latest
    needs: deploy
    continue-on-error: true
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          fetch-depth: 2

      - name: Install kubectl
        run: |
          curl -sSL "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl" \
            -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl

      - name: Post Deploy Comment
        env:
          KUBECONFIG_DATA: ${{ secrets.FLEET_KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          export KUBECONFIG=~/.kube/config

          DEPLOY_SHA=$(git rev-parse --short HEAD)
          TICKET_ID="$(git log -1 --pretty=%B | grep -oE 'T[0-9]{6}' | head -1 || true)"

          if [[ -z "$TICKET_ID" ]]; then
            pod=$(kubectl get pod -n workspace -l 'app in (shared-db, shared-db-dev)' -o name 2>/dev/null | head -1 || true)
            if [[ -n "$pod" ]]; then
              TICKET_ID=$(kubectl exec -i "$pod" -n workspace -c postgres -- psql -U website -d website -qtA -c "SELECT external_id FROM tickets.tickets WHERE status = 'awaiting_deploy' LIMIT 1" 2>/dev/null || true)
            fi
          fi

          if [[ -n "$TICKET_ID" ]]; then
            echo "Commenting on ticket $TICKET_ID..."
            export TICKET_CTX=fleet BRAND=mentolder
            bash scripts/ticket.sh add-comment --id "$TICKET_ID" --body "✅ SealedSecrets deployed ${DEPLOY_SHA} at $(date -u +%FT%TZ) (mentolder + korczewski)"
          else
            echo "WARNING: No awaiting_deploy ticket found to comment on."
          fi
