name: dev-auto-deploy
# Hardening notes:
# - No untrusted event payload (issue/PR title/body/etc.) is read; only
#   git-locally-computed paths and repo secrets feed the steps.
# - k3s-1 is behind NAT; the connection is proxied through gekko-hetzner-2
#   (DEV_PROXY_HOST) which is on the public internet and on the wg-mesh.
# - task is installed at ~/.local/bin/task on k3s-1 (no system-wide install).
on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "brett/**"
      - "k3d/dev-stack/**"
      - "prod-mentolder/dev-*"
      - "prod-mentolder/oauth2-proxy-dev*"
      - "prod-mentolder/cert-dev-wildcard.yaml"
      - "Taskfile.dev-stack.yml"
      - "scripts/dev-db-refresh.sh"

concurrency:
  group: dev-auto-deploy
  cancel-in-progress: false

jobs:
  redeploy:
    runs-on: ubuntu-latest
    # 45m backstop: a push touching both website/ and brett/ runs both 20m
    # command_timeout steps sequentially (20 + 20 + SSH/checkout overhead).
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Determine what changed
        id: changes
        run: |
          set -e
          CHANGED=$(git diff --name-only HEAD^ HEAD)
          echo "$CHANGED"
          echo "website=$(grep -qE '^website/' <<<"$CHANGED" && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "brett=$(grep -qE '^brett/' <<<"$CHANGED" && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "full=$(grep -qE '^(k3d/dev-stack|prod-mentolder/dev-|prod-mentolder/oauth2-proxy-dev|prod-mentolder/cert-dev-wildcard|Taskfile.dev-stack|scripts/dev-db-refresh)' <<<"$CHANGED" && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: SSH dev-node (full deploy)
        if: steps.changes.outputs.full == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_DEPLOY_HOST }}
          username: ${{ secrets.DEV_DEPLOY_USER }}
          key: ${{ secrets.DEV_DEPLOY_SSH_KEY }}
          proxy_host: ${{ secrets.DEV_PROXY_HOST }}
          proxy_username: ${{ secrets.DEV_PROXY_USER }}
          proxy_key: ${{ secrets.DEV_PROXY_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd ~/Bachelorprojekt
            git fetch --depth 1 origin main
            git reset --hard origin/main
            export PATH="$HOME/.local/bin:$PATH"
            task dev:deploy

      - name: SSH dev-node (website only)
        if: steps.changes.outputs.full == 'false' && steps.changes.outputs.website == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_DEPLOY_HOST }}
          username: ${{ secrets.DEV_DEPLOY_USER }}
          key: ${{ secrets.DEV_DEPLOY_SSH_KEY }}
          proxy_host: ${{ secrets.DEV_PROXY_HOST }}
          proxy_username: ${{ secrets.DEV_PROXY_USER }}
          proxy_key: ${{ secrets.DEV_PROXY_SSH_KEY }}
          # 20m matches the full-deploy step: website is the heaviest image to
          # build + docker save + k3d image import, and a recovering/slow dev
          # node can exceed 10m (see the 18:16 2026-05-29 spurious timeout).
          command_timeout: 20m
          script: |
            set -e
            cd ~/Bachelorprojekt
            git fetch --depth 1 origin main
            git reset --hard origin/main
            export PATH="$HOME/.local/bin:$PATH"
            task dev:redeploy:website

      - name: SSH dev-node (brett only)
        if: steps.changes.outputs.full == 'false' && steps.changes.outputs.brett == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_DEPLOY_HOST }}
          username: ${{ secrets.DEV_DEPLOY_USER }}
          key: ${{ secrets.DEV_DEPLOY_SSH_KEY }}
          proxy_host: ${{ secrets.DEV_PROXY_HOST }}
          proxy_username: ${{ secrets.DEV_PROXY_USER }}
          proxy_key: ${{ secrets.DEV_PROXY_SSH_KEY }}
          # 20m matches the full-deploy step: the brett image now carries a large
          # SFX/GLB asset bundle, so build + docker save + k3d image import can
          # exceed 10m on a slow/recovering dev node.
          command_timeout: 20m
          script: |
            set -e
            cd ~/Bachelorprojekt
            git fetch --depth 1 origin main
            git reset --hard origin/main
            export PATH="$HOME/.local/bin:$PATH"
            task dev:redeploy:brett
