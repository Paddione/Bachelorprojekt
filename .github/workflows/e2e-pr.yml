name: E2E (PR — gefiltert)

# Läuft bei jedem PR auf main. Prüft zuerst ob E2E-relevante Dateien
# (website/**, tests/e2e/**) geändert wurden. Falls nicht, wird der Job
# übersprungen — erfüllt aber den Required-Check "E2E PR".
#
# Ziel:  Regressionsschutz im eigenen Scope, schnell (<5 min).
# Nightly e2e.yml testet weiterhin die gesamte Suite gegen Fleet.
#
# Tag-Mapping (Branch-Name → Playwright --grep):
#   feature/content-hub-*  → @content-hub
#   feature/brainstorm-*   → @admin
#   feature/factory-*      → @factory
#   feature/planungsbuero* → @planungsbuero
#   feature/booking-*      → @booking
#   feature/meeting-*      → @meeting
#   feature/billing-*      → @billing
#   feature/messaging-*    → @messaging
#   feature/brett-*        → @brett
#   feature/fragebogen-*   → @fragebogen
#   feature/crm-*          → @crm
#   fix/content-hub-*      → @content-hub
#   (sonstige)             → nur @smoke
#
# Neue Tests MÜSSEN ein @-Tag im test.describe-Header haben:
#   test.describe('...', { tag: ['@feature-name'] }, () => { ... })

on:
  pull_request:
    branches: [main]

concurrency:
  group: e2e-pr-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  OPENSPEC_TELEMETRY: '0'
jobs:
  e2e-pr:
    # Static name — branch protection requires the context "E2E PR";
    # a dynamic name (with branch) never satisfies it and blocks every merge.
    name: E2E PR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      WEBSITE_URL: https://web.mentolder.de
      TEST_KC_URL: https://auth.mentolder.de
      PROD_DOMAIN: mentolder.de
      SKIP_DB_PURGE: "1"
      E2E_ADMIN_USER: paddione
      E2E_ADMIN_PASS: ${{ secrets.E2E_ADMIN_PASS }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      MM_TEST_USER: ${{ secrets.MM_TEST_USER }}
      MM_TEST_PASS: ${{ secrets.MM_TEST_PASS }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          fetch-tags: false

      - name: Fetch origin/main for diffing (shallow)
        run: git fetch --no-tags --prune --depth=1 origin main:refs/remotes/origin/main

      - name: Check if E2E-relevant files changed
        id: filter
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD 2>/dev/null || echo "")
          if echo "$CHANGED" | grep -qE '^(website/|tests/e2e/|\.github/workflows/e2e-pr\.yml)'; then
            echo "run_e2e=true" >> "$GITHUB_OUTPUT"
            echo "E2E-relevant files changed, running tests"
          else
            echo "run_e2e=false" >> "$GITHUB_OUTPUT"
            echo "No E2E-relevant files changed, skipping tests"
          fi

      - uses: actions/setup-node@v7
        if: steps.filter.outputs.run_e2e == 'true'
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install dependencies
        if: steps.filter.outputs.run_e2e == 'true'
        working-directory: tests/e2e
        run: npm ci

      - name: Cache Playwright browsers
        if: steps.filter.outputs.run_e2e == 'true'
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('tests/e2e/package-lock.json') }}

      - name: Install Playwright browsers (chromium only)
        if: steps.filter.outputs.run_e2e == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Leite Feature-Tag aus Branch-Name ab
        if: steps.filter.outputs.run_e2e == 'true'
        id: tag
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          echo "Branch: $BRANCH"

          # Normalisiere: feature/content-hub-xyz → content-hub
          SEGMENT=$(echo "$BRANCH" | sed 's|^feature/||;s|^fix/||;s|^chore/||' | cut -d'-' -f1-2)

          TAG=""
          case "$BRANCH" in
            *content-hub*)  TAG="content-hub" ;;
            *planungsbuero*|*planning-office*) TAG="planungsbuero" ;;
            *factory*|*dev-status*) TAG="factory" ;;
            *brainstorm*|*admin-hub*) TAG="admin" ;;
            *booking*)      TAG="booking" ;;
            *meeting*)      TAG="meeting" ;;
            *billing*|*invoice*|*rechnun*) TAG="billing" ;;
            *messaging*|*chat*|*inbox*) TAG="messaging" ;;
            *brett*)        TAG="brett" ;;
            *fragebogen*)   TAG="fragebogen" ;;
            *crm*)          TAG="crm" ;;
            *website*|*astro*|*landing*) TAG="website" ;;
            *)              TAG="" ;;
          esac

          if [ -n "$TAG" ]; then
            GREP_PATTERN="@${TAG}|@smoke"
            echo "Feature-Tag: @${TAG} → grep: $GREP_PATTERN"
          else
            GREP_PATTERN="@smoke"
            echo "Kein Feature-Tag erkannt → nur @smoke"
          fi

          echo "grep_pattern=$GREP_PATTERN" >> "$GITHUB_OUTPUT"
          echo "feature_tag=$TAG"          >> "$GITHUB_OUTPUT"

      - name: Detect changed E2E spec files
        # Mirrors the local `task test:changed` smart selection: if a
        # spec file under tests/e2e/specs/ was touched in this PR, add
        # it to the run as a positional arg (in addition to the
        # tag-grep filter above). Working dir is the repo root, so
        # strip the `tests/e2e/` prefix to match Playwright's --config
        # testDir (./specs). [T001651]
        if: steps.filter.outputs.run_e2e == 'true'
        id: specs
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD 2>/dev/null || echo "")
          CHANGED_SPECS=$(echo "$CHANGED" \
            | grep -E '^tests/e2e/specs/.*\.spec\.ts$' \
            | sed 's|^tests/e2e/||' \
            | paste -sd' ' - \
            || true)
          if [ -n "$CHANGED_SPECS" ]; then
            echo "Changed spec files (will be added to the run):"
            echo "$CHANGED_SPECS" | tr ' ' '\n' | sed 's/^/  /'
          else
            echo "No changed spec files"
          fi
          echo "changed_specs=$CHANGED_SPECS" >> "$GITHUB_OUTPUT"

      - name: E2E — ${{ steps.tag.outputs.feature_tag || 'smoke' }} + @smoke gegen web.mentolder.de
        if: steps.filter.outputs.run_e2e == 'true'
        id: playwright
        working-directory: tests/e2e
        env:
          CHANGED_SPECS: ${{ steps.specs.outputs.changed_specs }}
        run: |
          if [ -n "${CHANGED_SPECS:-}" ]; then
            echo "→ Running tag-grep + changed specs:"
            # Safe iteration over filenames (one per line) to prevent command injection.
            # The `|| true` after each spec's playwright call tolerates "No tests found"
            # for specs whose tests don't carry the grep pattern (e.g. a feature spec
            # touched in a fix/* PR whose only tests are regression-only).
            while IFS= read -r spec; do
              npx playwright test \
                --config playwright.pr.config.ts \
                --grep "${{ steps.tag.outputs.grep_pattern }}" \
                "./$spec" || true
            done <<< "$CHANGED_SPECS"
          else
            npx playwright test \
              --config playwright.pr.config.ts \
              --grep "${{ steps.tag.outputs.grep_pattern }}"
          fi

      - name: Upload Ergebnisse (Traces + JSON)
        if: always() && steps.filter.outputs.run_e2e == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: e2e-pr-results-${{ github.run_id }}
          path: tests/results
          retention-days: 7
          if-no-files-found: ignore

      - name: Kommentar bei Fehler
        if: failure() && steps.playwright.outcome == 'failure'
        uses: actions/github-script@v9
        with:
          script: |
            const tag = '${{ steps.tag.outputs.feature_tag }}' || 'smoke';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ❌ E2E-Tests fehlgeschlagen\n\nGetesteter Bereich: \`@${tag}\` + \`@smoke\`\n\n[Artifact herunterladen](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            });
