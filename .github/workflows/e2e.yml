name: E2E (Live Production)

# Runs the Playwright suite against both production clusters in parallel.
# Triggered manually or on a nightly cron — not on every PR, since each run
# hits live web.mentolder.de and web.korczewski.de.
#
# Auth-gated specs need MM_TEST_USER / MM_TEST_PASS repo secrets (Keycloak
# credentials of a workspace user). Without them, login flows fall back to
# defaults and the affected tests will fail or skip.

on:
  workflow_dispatch:
    inputs:
      cluster:
        description: "Cluster to test (default: both)"
        required: false
        default: both
        type: choice
        options: [both, mentolder, korczewski]
  schedule:
    - cron: "0 3 * * *"  # 03:00 UTC nightly

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  OPENSPEC_TELEMETRY: '0'
jobs:
  playwright:
    name: ${{ matrix.cluster }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - cluster: mentolder
            website_url: https://web.mentolder.de
            prod_domain: mentolder.de
            contact_email: info@mentolder.de
            contact_phone: "+49 151 508 32 601"
            service_pages: /coaching,/beratung
          - cluster: korczewski
            website_url: https://web.korczewski.de
            prod_domain: korczewski.de
            contact_email: info@korczewski.de
            contact_phone: ""
            service_pages: /ki-beratung,/software-dev,/deployment
    env:
      SELECTED_CLUSTER: ${{ inputs.cluster }}
      EVENT_NAME: ${{ github.event_name }}
      MATRIX_CLUSTER: ${{ matrix.cluster }}
    steps:
      - name: Skip if non-matching manual input
        id: gate
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$SELECTED_CLUSTER" != "both" ] && [ "$SELECTED_CLUSTER" != "$MATRIX_CLUSTER" ]; then
            echo "Skipping $MATRIX_CLUSTER (manual input selected '$SELECTED_CLUSTER')"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v7
        if: steps.gate.outputs.skip != 'true'
        with:
          fetch-tags: false

      - uses: actions/setup-node@v7
        if: steps.gate.outputs.skip != 'true'
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install dependencies
        if: steps.gate.outputs.skip != 'true'
        working-directory: tests/e2e
        run: npm ci

      - name: Cache Playwright browsers
        if: steps.gate.outputs.skip != 'true'
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('tests/e2e/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.gate.outputs.skip != 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium webkit

      - name: Run Playwright suite against ${{ matrix.website_url }}
        id: playwright
        if: steps.gate.outputs.skip != 'true'
        working-directory: tests/e2e
        env:
          # Primary URLs
          WEBSITE_URL: ${{ matrix.website_url }}
          PROD_DOMAIN: ${{ matrix.prod_domain }}
          # Per-service URL overrides — without these the specs fall back to
          # *.localhost defaults and ECONNREFUSED on the runner.
          TEST_KC_URL: https://auth.${{ matrix.prod_domain }}
          TEST_NC_URL: https://files.${{ matrix.prod_domain }}
          TEST_SIGNALING_URL: https://signaling.${{ matrix.prod_domain }}
          NC_DOMAIN: files.${{ matrix.prod_domain }}
          SIGNALING_DOMAIN: signaling.${{ matrix.prod_domain }}
          VAULT_URL: https://vault.${{ matrix.prod_domain }}
          MAIL_URL: https://mail.${{ matrix.prod_domain }}
          BOARD_URL: https://board.${{ matrix.prod_domain }}
          BRETT_URL: https://brett.${{ matrix.prod_domain }}
          TRACKING_URL: https://tracking.${{ matrix.prod_domain }}
          DASHBOARD_URL: https://dashboard.${{ matrix.prod_domain }}
          # Per-cluster brand assertions
          CONTACT_EMAIL: ${{ matrix.contact_email }}
          CONTACT_PHONE: ${{ matrix.contact_phone }}
          WEBSITE_SERVICE_PAGES: ${{ matrix.service_pages }}
          # Auth
          MM_TEST_USER: ${{ secrets.MM_TEST_USER }}
          MM_TEST_PASS: ${{ secrets.MM_TEST_PASS }}
          # Admin auth for E2E suite (T000480 — was missing, caused 35+ specs to silently skip)
          E2E_ADMIN_USER: paddione
          E2E_ADMIN_PASS: ${{ secrets.E2E_ADMIN_PASS }}
          # CRON_SECRET aktiviert den Purge-Bracket (globalSetup/-Teardown) und
          # die Marker-Injection der Specs. Ohne das Repo-Secret akkumulierten
          # unmarkierte E2E-Zeilen in der Prod-Inbox (T001453) — daher kein
          # SKIP_DB_PURGE mehr: fehlt das Secret, soll der Run laut scheitern.
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          PLAYWRIGHT_WORKERS: "4"
        run: npx playwright test

      # G-E2E02 / T002096: defense-in-depth post-run purge (covers timeout kill)
      - name: Post-run test-data purge (defense-in-depth)
        working-directory: tests/e2e
        if: always() && steps.gate.outputs.skip != 'true'
        run: |
          if [ -z "${CRON_SECRET:-}" ]; then echo "::warning::CRON_SECRET not set; skipping."; exit 0; fi
          curl -fsS -X POST "${{ matrix.website_url }}/api/admin/systemtest/purge-all-test-data" \
            -H "X-Cron-Secret: ${CRON_SECRET}" || true
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      # Ingest Playwright JSON into the website's test_runs/test_results +
      # auto-file bug tickets for failures (PR #599 wired the endpoint to
      # accept Bearer token auth + X-Github-Run-Id for ticket linkage).
      # Runs on both pass and fail so flake/trend matrices reflect every
      # nightly. Best-effort: never fail the workflow on ingest hiccups.
      - name: Ingest Playwright results into website
        if: always() && steps.playwright.outcome != 'skipped' && steps.gate.outputs.skip != 'true'
        env:
          INGEST_TOKEN: ${{ secrets.E2E_INGEST_TOKEN }}
          INGEST_URL: ${{ matrix.website_url }}/api/admin/tests/ingest-e2e
          REPORT: tests/results/.tmp-e2e-results.json
          GH_RUN_ID: ${{ github.run_id }}
          MATRIX_CLUSTER: ${{ matrix.cluster }}
        run: |
          if [ -z "${INGEST_TOKEN}" ]; then
            echo "::warning::E2E_INGEST_TOKEN not set; skipping ingest. Add the token in repo secrets to enable auto-ticketing."
            exit 0
          fi
          if [ ! -s "${REPORT}" ]; then
            echo "::warning::Playwright JSON report not found at ${REPORT}; skipping ingest."
            exit 0
          fi
          echo "POST ${INGEST_URL} (run=${GH_RUN_ID}, cluster=${MATRIX_CLUSTER})"
          # Wrap the report so the endpoint sees runId/cluster too. The
          # endpoint accepts a bare report or a wrapped envelope — we use
          # the envelope to pin runId and cluster explicitly.
          jq --arg cluster "${MATRIX_CLUSTER}" \
             --arg runId "gh-${GH_RUN_ID}-${MATRIX_CLUSTER}" \
             '. + {cluster: $cluster, runId: $runId}' \
             "${REPORT}" > /tmp/ingest-payload.json
          http_code=$(curl -s -o /tmp/ingest-response.json -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer ${INGEST_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "X-Github-Run-Id: ${GH_RUN_ID}" \
            --data-binary @/tmp/ingest-payload.json \
            "${INGEST_URL}" || echo "000")
          echo "ingest http_code=${http_code}"
          cat /tmp/ingest-response.json || true
          if [ "${http_code}" != "200" ]; then
            echo "::warning::Ingest returned HTTP ${http_code} (continuing — workflow status unaffected)."
          fi

      - name: Upload results (traces + JSON report)
        if: always() && steps.gate.outputs.skip != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results-${{ matrix.cluster }}
          path: tests/results
          retention-days: 14
          if-no-files-found: ignore
