name: Freshness Auto-Regenerate

on:
  push:
    branches: [main]

concurrency:
  group: freshness-regen-${{ github.ref }}
  cancel-in-progress: true

env:
  OPENSPEC_TELEMETRY: '0'

jobs:
  regenerate:
    name: Regenerate stale artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          fetch-depth: 0
          fetch-tags: false
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: '22'
          cache: 'npm'

      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611  # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Create CI dummy secrets
        run: bash scripts/ci-dummy-secrets.sh

      - name: Regenerate all artifacts
        run: task freshness:regenerate

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push if changed
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: auto-regenerate freshness artifacts [skip ci]"
          git push
