name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

env:
  OPENSPEC_TELEMETRY: '0'

jobs:
  opencode:
    # Public repo: nur Repo-Mitglieder duerfen opencode triggern (kein anonymer Trigger).
    if: |
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      ) && (
        startsWith(github.event.comment.body, '/oc') ||
        contains(github.event.comment.body, ' /oc') ||
        startsWith(github.event.comment.body, '/opencode') ||
        contains(github.event.comment.body, ' /opencode')
      ) && (
        github.event.issue.pull_request == null || github.event.issue.pull_request.head.repo.full_name == github.repository
      )
    runs-on: [self-hosted, fleet-gpu]
    permissions:
      id-token: write        # OIDC -> Installation-Token der opencode GitHub App
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run opencode
        # SHA-gepinnt (Supply-Chain: Action erhaelt OPENCODE_API_KEY). v1.17.18 (2026-07-09).
        # Bump via Review/Dependabot; nie @latest fuer secret-tragende Third-Party-Actions.
        uses: anomalyco/opencode/github@b1fc8113948b518835c2a39ece49553cffe9b30c
        with:
          model: llamacpp-mtp/gemma-4-12B-it-qat-UD-Q4_K_XL.gguf
