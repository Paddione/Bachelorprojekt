name: post-merge
on:
  push:
    branches: [main]

concurrency:
  group: post-merge-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  OPENSPEC_TELEMETRY: '0'

jobs:
  mark-awaiting:
    name: Mark ticket awaiting_deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2
          fetch-tags: false
      - name: Set ticket status to awaiting_deploy
        env:
          FLEET_KUBECONFIG: ${{ secrets.FLEET_KUBECONFIG }}
        run: |
          set -euo pipefail
          TICKET_ID="$(git log -1 --pretty=%B | grep -oE 'T[0-9]{6}' | head -1 || true)"
          if [[ -z "$TICKET_ID" ]]; then
            echo "No T###### id in merge commit — nothing to mark."
            exit 0
          fi
          echo "Setting ticket $TICKET_ID to awaiting_deploy."
          mkdir -p "$HOME/.kube"
          echo "$FLEET_KUBECONFIG" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          export KUBECONFIG="$HOME/.kube/config"
          export TICKET_CTX=fleet BRAND=mentolder
          # retry <cmd...> — bis zu 5 Versuche, Exponential-Backoff 2/4/8/16 s.
          # Non-fatal: gibt nach Erschöpfung 0 zurück (wie das bisherige || echo WARNING).
          retry() {
            local max=5 delay=2 attempt=1
            until "$@"; do
              if (( attempt >= max )); then
                echo "WARNING: '$*' failed after ${max} attempts (non-fatal)."
                return 0
              fi
              echo "attempt ${attempt}/${max} failed; retry in ${delay}s"
              sleep "${delay}"
              delay=$(( delay * 2 ))
              attempt=$(( attempt + 1 ))
            done
          }
          retry bash scripts/ticket.sh update-status --id "$TICKET_ID" --status awaiting_deploy

  detect:
    name: Detect manifest changes
    runs-on: ubuntu-latest
    needs: mark-awaiting
    outputs:
      manifests_changed: ${{ steps.detect.outputs.manifests_changed }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2
          fetch-tags: false
      - id: detect
        run: |
          if bash scripts/changed-manifests.sh HEAD~1 HEAD; then
            echo "manifests_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "manifests_changed=false" >> "$GITHUB_OUTPUT"
          fi

  render-artifact:
    name: Render fleet artifact (GitOps)
    needs: [mark-awaiting, detect]
    if: vars.FLUX_ENABLED == 'true' && needs.detect.outputs.manifests_changed == 'true'
    # render-fleet-artifact.yml verlangt packages: write (docker/login-action →
    # ghcr). Ein via `uses:` aufgerufener Workflow darf nie mehr Rechte
    # anfordern als der Aufrufer — sonst lehnt GitHub den GESAMTEN Workflow mit
    # startup_failure ab, bevor auch nur ein Job startet. Diese Validierung
    # laeuft VOR der if:-Auswertung, der Job muss dafuer also nicht einmal
    # ausgefuehrt werden. Genau das passierte 37 Merges lang (T002118).
    # Das Recht bleibt bewusst auf diesen Job begrenzt statt workflowweit.
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/render-fleet-artifact.yml
    secrets: inherit

  deploy-legacy:
    name: Deploy manifests (legacy push, pre-Flux)
    runs-on: ubuntu-latest
    needs: [mark-awaiting, detect]
    if: vars.FLUX_ENABLED != 'true' && needs.detect.outputs.manifests_changed == 'true'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2
          fetch-tags: false

      - name: Install kubectl and kustomize
        run: |
          curl -sSL "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl" \
            -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl
          rm -f /usr/local/bin/kustomize
          curl -sSL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" \
            | bash -s -- 5.4.3 /usr/local/bin

      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611  # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up kubeconfig
        env:
          FLEET_KUBECONFIG: ${{ secrets.FLEET_KUBECONFIG }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "$FLEET_KUBECONFIG" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"

      - name: Deploy workspace to mentolder
        run: task workspace:deploy ENV=mentolder

      - name: Deploy workspace to korczewski
        run: task workspace:deploy ENV=korczewski

  post-deploy-imperative:
    name: Imperative post-steps (TRANSITIONAL)
    runs-on: ubuntu-latest
    needs: [render-artifact, deploy-legacy]
    if: |
      always() &&
      needs.render-artifact.result != 'failure' &&
      needs.deploy-legacy.result != 'failure'
    steps:
      - uses: actions/checkout@v7
        with: { fetch-tags: false }
      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611  # v2.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      # `task website:migrate` ruft intern `pnpm --dir website db:migrate` auf.
      # Ohne diese drei Schritte stirbt der Job mit
      # '"pnpm": executable file not found in $PATH' (exit 127) — und riss
      # damit auch "Mark ticket done" mit, das im selben Job liegt. [T002121]
      - name: Set up pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda  # v4.1.0
        with:
          version: 10
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: website/pnpm-lock.yaml
      - name: Install website dependencies
        run: cd website && pnpm install --frozen-lockfile
      - name: Set up kubeconfig
        env:
          FLEET_KUBECONFIG: ${{ secrets.FLEET_KUBECONFIG }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "$FLEET_KUBECONFIG" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"
      - name: Run transitional imperative post-steps
        run: |
          task website:migrate ENV=mentolder
          task website:migrate ENV=korczewski

      - name: Mark ticket done
        id: close
        # always() statt success(): Closure trackt laut T001092 den MERGE, nicht
        # Prod-Live — der Deploy ist ausdruecklich entkoppelt. Eine
        # fehlgeschlagene Migration darf das Ticket also nicht offen halten.
        # Vorher riss jeder Fehler im Migrationsschritt die Closure mit. [T002121]
        if: always()
        env:
          FLEET_KUBECONFIG: ${{ secrets.FLEET_KUBECONFIG }}
        run: |
          set -euo pipefail
          TICKET_ID="$(git log -1 --pretty=%B | grep -oE 'T[0-9]{6}' | head -1 || true)"
          if [[ -z "$TICKET_ID" ]]; then
            echo "No T###### id in merge commit — nothing to close."
            echo "ticket_id=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Closing ticket $TICKET_ID (deployed to both brands)."
          echo "ticket_id=$TICKET_ID" >> "$GITHUB_OUTPUT"
          mkdir -p "$HOME/.kube"
          echo "$FLEET_KUBECONFIG" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          export KUBECONFIG="$HOME/.kube/config"
          export TICKET_CTX=fleet BRAND=mentolder
          # retry <cmd...> — bis zu 5 Versuche, Exponential-Backoff 2/4/8/16 s.
          # Non-fatal: gibt nach Erschöpfung 0 zurück (wie das bisherige || echo WARNING).
          retry() {
            local max=5 delay=2 attempt=1
            until "$@"; do
              if (( attempt >= max )); then
                echo "WARNING: '$*' failed after ${max} attempts (non-fatal)."
                return 0
              fi
              echo "attempt ${attempt}/${max} failed; retry in ${delay}s"
              sleep "${delay}"
              delay=$(( delay * 2 ))
              attempt=$(( attempt + 1 ))
            done
          }
          retry bash scripts/ticket.sh update-status --id "$TICKET_ID" --status done
      - name: Scout drift ratchet
        if: steps.close.outputs.ticket_id != ''
        env:
          FLEET_KUBECONFIG: ${{ secrets.FLEET_KUBECONFIG }}
        run: |
          set -euo pipefail
          TICKET_ID="${{ steps.close.outputs.ticket_id }}"
          # Only feature/fix merges produce meaningful drift — skip chore/docs/archive
          COMMIT_TITLE="$(git log -1 --pretty=%s)"
          case "$COMMIT_TITLE" in
            feat:*|fix:*) ;;
            *) echo "scout-drift: skipping — not a feature/fix merge ($COMMIT_TITLE)"; exit 0 ;;
          esac
          mkdir -p "$HOME/.kube"
          echo "$FLEET_KUBECONFIG" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          export KUBECONFIG="$HOME/.kube/config"
          export TICKET_CTX=fleet BRAND=mentolder
          BASE="$(git rev-parse HEAD~1)" || BASE=""
          HEAD="$(git rev-parse HEAD)"   || HEAD=""
          if [[ -n "$BASE" && -n "$HEAD" ]]; then
            bash scripts/factory/scout-drift.sh \
              --ticket "$TICKET_ID" \
              --base "$BASE" \
              --head "$HEAD" \
              --repo "$PWD" \
              || echo "WARNING: scout-drift failed (non-fatal)."
          else
            echo "WARNING: could not resolve base/head for drift ratchet (non-fatal)."
          fi
