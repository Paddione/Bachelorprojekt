name: post-merge
on:
  push:
    branches: [main]

concurrency:
  group: post-merge-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  OPENSPEC_TELEMETRY: '0'

jobs:
  mark-awaiting:
    name: Mark ticket awaiting_deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Set ticket status to awaiting_deploy
        env:
          FLEET_KUBECONFIG: ${{ secrets.FLEET_KUBECONFIG }}
        run: |
          set -euo pipefail
          TICKET_ID="$(git log -1 --pretty=%B | grep -oE 'T[0-9]{6}' | head -1 || true)"
          if [[ -z "$TICKET_ID" ]]; then
            echo "No T###### id in merge commit — nothing to mark."
            exit 0
          fi
          echo "Setting ticket $TICKET_ID to awaiting_deploy."
          mkdir -p "$HOME/.kube"
          echo "$FLEET_KUBECONFIG" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          export KUBECONFIG="$HOME/.kube/config"
          export TICKET_CTX=fleet BRAND=mentolder
          # retry <cmd...> — bis zu 5 Versuche, Exponential-Backoff 2/4/8/16 s.
          # Non-fatal: gibt nach Erschöpfung 0 zurück (wie das bisherige || echo WARNING).
          retry() {
            local max=5 delay=2 attempt=1
            until "$@"; do
              if (( attempt >= max )); then
                echo "WARNING: '$*' failed after ${max} attempts (non-fatal)."
                return 0
              fi
              echo "attempt ${attempt}/${max} failed; retry in ${delay}s"
              sleep "${delay}"
              delay=$(( delay * 2 ))
              attempt=$(( attempt + 1 ))
            done
          }
          retry bash scripts/ticket.sh update-status --id "$TICKET_ID" --status awaiting_deploy

  deploy-manifests:
    name: Deploy manifest changes to both brands
    runs-on: ubuntu-latest
    needs: mark-awaiting
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect manifest changes
        id: detect
        run: |
          if bash scripts/changed-manifests.sh HEAD~1 HEAD; then
            echo "manifests_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "manifests_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install kubectl and kustomize
        if: steps.detect.outputs.manifests_changed == 'true'
        run: |
          curl -sSL "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl" \
            -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl
          rm -f /usr/local/bin/kustomize
          curl -sSL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" \
            | bash -s -- 5.4.3 /usr/local/bin

      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611  # v2.0.0
        if: steps.detect.outputs.manifests_changed == 'true'
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up kubeconfig
        if: steps.detect.outputs.manifests_changed == 'true'
        env:
          FLEET_KUBECONFIG: ${{ secrets.FLEET_KUBECONFIG }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "$FLEET_KUBECONFIG" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"

      - name: Deploy workspace to mentolder
        if: steps.detect.outputs.manifests_changed == 'true'
        run: task workspace:deploy ENV=mentolder

      - name: Deploy workspace to korczewski
        if: steps.detect.outputs.manifests_changed == 'true'
        run: task workspace:deploy ENV=korczewski

      - name: Mark ticket done
        id: close
        if: success()
        env:
          FLEET_KUBECONFIG: ${{ secrets.FLEET_KUBECONFIG }}
        run: |
          set -euo pipefail
          TICKET_ID="$(git log -1 --pretty=%B | grep -oE 'T[0-9]{6}' | head -1 || true)"
          if [[ -z "$TICKET_ID" ]]; then
            echo "No T###### id in merge commit — nothing to close."
            echo "ticket_id=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Closing ticket $TICKET_ID (deployed to both brands)."
          echo "ticket_id=$TICKET_ID" >> "$GITHUB_OUTPUT"
          mkdir -p "$HOME/.kube"
          echo "$FLEET_KUBECONFIG" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          export KUBECONFIG="$HOME/.kube/config"
          export TICKET_CTX=fleet BRAND=mentolder
          # retry <cmd...> — bis zu 5 Versuche, Exponential-Backoff 2/4/8/16 s.
          # Non-fatal: gibt nach Erschöpfung 0 zurück (wie das bisherige || echo WARNING).
          retry() {
            local max=5 delay=2 attempt=1
            until "$@"; do
              if (( attempt >= max )); then
                echo "WARNING: '$*' failed after ${max} attempts (non-fatal)."
                return 0
              fi
              echo "attempt ${attempt}/${max} failed; retry in ${delay}s"
              sleep "${delay}"
              delay=$(( delay * 2 ))
              attempt=$(( attempt + 1 ))
            done
          }
          retry bash scripts/ticket.sh update-status --id "$TICKET_ID" --status done
      - name: Scout drift ratchet
        if: steps.close.outputs.ticket_id != ''
        env:
          FLEET_KUBECONFIG: ${{ secrets.FLEET_KUBECONFIG }}
        run: |
          set -euo pipefail
          TICKET_ID="${{ steps.close.outputs.ticket_id }}"
          mkdir -p "$HOME/.kube"
          echo "$FLEET_KUBECONFIG" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          export KUBECONFIG="$HOME/.kube/config"
          export TICKET_CTX=fleet BRAND=mentolder
          BASE="$(git rev-parse HEAD~1)" || BASE=""
          HEAD="$(git rev-parse HEAD)"   || HEAD=""
          if [[ -n "$BASE" && -n "$HEAD" ]]; then
            bash scripts/factory/scout-drift.sh \
              --ticket "$TICKET_ID" \
              --base "$BASE" \
              --head "$HEAD" \
              --repo "$PWD" \
              || echo "WARNING: scout-drift failed (non-fatal)."
          else
            echo "WARNING: could not resolve base/head for drift ratchet (non-fatal)."
          fi
