name: post-merge
on:
  push:
    branches: [main]

jobs:
  close-ticket:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Extract ticket id from merge commit and close it
        id: close
        env:
          FLEET_KUBECONFIG: ${{ secrets.FLEET_KUBECONFIG }}
        run: |
          set -euo pipefail
          TICKET_ID="$(git log -1 --pretty=%B | grep -oE 'T[0-9]{6}' | head -1 || true)"
          if [[ -z "$TICKET_ID" ]]; then
            echo "No T###### id in merge commit — nothing to close."
            echo "ticket_id=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Closing ticket $TICKET_ID (merged to main)."
          echo "ticket_id=$TICKET_ID" >> "$GITHUB_OUTPUT"
          mkdir -p "$HOME/.kube"
          # FLEET_KUBECONFIG is stored base64-encoded (matches build-brett.yml:63, build-website.yml:75)
          echo "$FLEET_KUBECONFIG" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          export KUBECONFIG="$HOME/.kube/config"
          export TICKET_CTX=fleet BRAND=mentolder
          # Idempotent: re-running update-status to 'done' on an already-done
          # ticket is a no-op. Never fail the workflow on a DB hiccup.
          bash scripts/ticket.sh update-status --id "$TICKET_ID" --status done \
            || echo "WARNING: update-status failed for $TICKET_ID (non-fatal)."
      - name: Scout drift ratchet
        if: steps.close.outputs.ticket_id != ''
        env:
          FLEET_KUBECONFIG: ${{ secrets.FLEET_KUBECONFIG }}
        run: |
          set -euo pipefail
          TICKET_ID="${{ steps.close.outputs.ticket_id }}"
          mkdir -p "$HOME/.kube"
          echo "$FLEET_KUBECONFIG" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          export KUBECONFIG="$HOME/.kube/config"
          export TICKET_CTX=fleet BRAND=mentolder
          BASE="$(git rev-parse HEAD~1)" || BASE=""
          HEAD="$(git rev-parse HEAD)"   || HEAD=""
          if [[ -n "$BASE" && -n "$HEAD" ]]; then
            bash scripts/factory/scout-drift.sh \
              --ticket "$TICKET_ID" \
              --base "$BASE" \
              --head "$HEAD" \
              --repo "$PWD" \
              || echo "WARNING: scout-drift failed (non-fatal)."
          else
            echo "WARNING: could not resolve base/head for drift ratchet (non-fatal)."
          fi
