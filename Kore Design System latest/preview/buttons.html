<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  .btn{ font-family:var(--sans); font-weight:500; font-size:14px; padding:11px 18px; border-radius:10px; border:1px solid transparent; cursor:pointer; display:inline-flex; align-items:center; gap:8px; transition:all var(--dur) var(--ease);}
  .btn-primary{ background:var(--lime); color:var(--lime-deep); box-shadow:var(--inner-line);}
  .btn-primary:hover{ background:var(--lime-2);}
  .btn-secondary{ background:transparent; color:var(--fg); border-color:var(--line-3);}
  .btn-secondary:hover{ border-color:var(--lime); color:var(--lime);}
  .btn-ghost{ background:transparent; color:var(--fg-soft);}
  .btn-ghost:hover{ color:var(--fg); background:var(--lime-tint);}
  .btn-danger{ background:transparent; color:var(--fail); border-color:rgba(226,107,107,.4);}
  .btn-pressed{ background:var(--lime); color:var(--lime-deep); box-shadow:var(--shadow-press); transform:translateY(1px);}
  .btn:disabled, .btn[aria-disabled="true"]{ opacity:.4; cursor:not-allowed;}
  kbd{ font-family:var(--mono); font-size:10px; background:rgba(255,255,255,.08); padding:2px 6px; border-radius:4px; border:1px solid var(--line-2);}
</style></head>
<body class="surface-dark" style="padding:28px;">
  <div class="eyebrow" style="margin-bottom:14px;">BUTTONS · STATES</div>
  <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;">
    <button class="btn btn-primary">Create lobby</button>
    <button class="btn btn-secondary">Join</button>
    <button class="btn btn-ghost">Settings</button>
    <button class="btn btn-danger">Leave match</button>
    <button class="btn btn-pressed">Pressed</button>
    <button class="btn btn-primary" aria-disabled="true">Disabled</button>
  </div>
  <div style="display:flex;gap:10px;align-items:center;margin-top:14px;">
    <button class="btn btn-secondary">Continue <kbd>↵</kbd></button>
    <button class="btn btn-ghost">Cancel <kbd>Esc</kbd></button>
  </div>
</body></html>
