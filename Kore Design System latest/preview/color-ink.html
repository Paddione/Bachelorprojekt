<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body class="surface-dark" style="padding:24px;">
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;">
    <div style="aspect-ratio:1;border-radius:14px;background:#120D1C;border:1px solid var(--line);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;">
      <div style="font-family:var(--mono);font-size:10px;color:var(--fg);">ink-900</div>
      <div style="font-family:var(--mono);font-size:9px;color:var(--mute);">#120D1C</div>
    </div>
    <div style="aspect-ratio:1;border-radius:14px;background:#1A1326;border:1px solid var(--line);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;">
      <div style="font-family:var(--mono);font-size:10px;color:var(--fg);">ink-850</div>
      <div style="font-family:var(--mono);font-size:9px;color:var(--mute);">#1A1326</div>
    </div>
    <div style="aspect-ratio:1;border-radius:14px;background:#221932;border:1px solid var(--line);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;">
      <div style="font-family:var(--mono);font-size:10px;color:var(--fg);">ink-800</div>
      <div style="font-family:var(--mono);font-size:9px;color:var(--mute);">#221932</div>
    </div>
    <div style="aspect-ratio:1;border-radius:14px;background:#2C2240;border:1px solid var(--line);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;">
      <div style="font-family:var(--mono);font-size:10px;color:var(--fg);">ink-750</div>
      <div style="font-family:var(--mono);font-size:9px;color:var(--mute);">#2C2240</div>
    </div>
    <div style="aspect-ratio:1;border-radius:14px;background:#3A2E52;border:1px solid var(--line);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;">
      <div style="font-family:var(--mono);font-size:10px;color:var(--fg);">ink-700</div>
      <div style="font-family:var(--mono);font-size:9px;color:var(--mute);">#3A2E52</div>
    </div>
  </div>
</body></html>
