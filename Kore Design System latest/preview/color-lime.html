<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body class="surface-dark" style="padding:24px;">
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;">
    <div style="aspect-ratio:1;border-radius:14px;background:#C8F76A;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#2A3A0C;">
      <div style="font-family:var(--mono);font-size:10px;font-weight:600;">lime</div>
      <div style="font-family:var(--mono);font-size:9px;opacity:.7;">#C8F76A</div>
    </div>
    <div style="aspect-ratio:1;border-radius:14px;background:#D8FF8A;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#2A3A0C;">
      <div style="font-family:var(--mono);font-size:10px;font-weight:600;">lime-2</div>
      <div style="font-family:var(--mono);font-size:9px;opacity:.7;">#D8FF8A</div>
    </div>
    <div style="aspect-ratio:1;border-radius:14px;background:#E6FFB0;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#2A3A0C;">
      <div style="font-family:var(--mono);font-size:10px;font-weight:600;">lime-soft</div>
      <div style="font-family:var(--mono);font-size:9px;opacity:.7;">#E6FFB0</div>
    </div>
    <div style="aspect-ratio:1;border-radius:14px;background:#6B8B1F;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#fff;">
      <div style="font-family:var(--mono);font-size:10px;font-weight:600;">lime-print</div>
      <div style="font-family:var(--mono);font-size:9px;opacity:.7;">#6B8B1F</div>
    </div>
    <div style="aspect-ratio:1;border-radius:14px;background:#2A3A0C;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#C8F76A;">
      <div style="font-family:var(--mono);font-size:10px;font-weight:600;">lime-deep</div>
      <div style="font-family:var(--mono);font-size:9px;opacity:.7;">#2A3A0C</div>
    </div>
  </div>
</body></html>
