<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body class="surface-dark" style="padding:28px;color:var(--fg);">
  <div class="eyebrow" style="margin-bottom:14px;">FAVICON · 5 PNG + 1 SVG</div>

      <div style="font-family:var(--serif);font-size:18px;">16<span style="font-family:var(--mono);font-size:11px;color:var(--mute);">px</span></div>
    </div>
    <div style="background:var(--ink-850);border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:10px;">

    </div>

      <div style="font-family:var(--serif);font-size:18px;">180<span style="font-family:var(--mono);font-size:11px;color:var(--mute);">px</span></div>
    </div>
    <div style="background:var(--ink-850);border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:10px;">

    </div>
    <div style="background:var(--ink-850);border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:10px;">
      <div style="background:#0a0613;border:1px solid var(--line);border-radius:8px;padding:14px;display:flex;align-items:center;justify-content:center;width:100%;min-height:64px;"><img src="../assets/icon-512.png" style="width:54px;height:54px;"></div>
      <div style="font-family:var(--serif);font-size:18px;">512<span style="font-family:var(--mono);font-size:11px;color:var(--mute);">px</span></div>
    </div>
  </div>
</body></html>
