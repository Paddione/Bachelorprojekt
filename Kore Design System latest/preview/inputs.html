<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  .field{ display:flex; flex-direction:column; gap:6px;}
  .field label{ font-family:var(--mono); font-size:11px; letter-spacing:.16em; color:var(--mute); text-transform:uppercase;}
  .input{ background:var(--ink-850); border:1px solid var(--line-2); border-radius:10px; padding:10px 14px; color:var(--fg); font-family:var(--sans); font-size:14px;}
  .input:focus{ outline:2px solid var(--lime); outline-offset:1px; border-color:var(--lime);}
  .input.code{ font-family:var(--mono); letter-spacing:.3em; text-align:center; text-transform:uppercase;}
</style></head>
<body class="surface-dark" style="padding:28px;color:var(--fg);">
  <div class="eyebrow" style="margin-bottom:14px;">INPUTS</div>
  <div style="display:grid;grid-template-columns:1fr 1fr 200px;gap:14px;">
    <div class="field"><label>Email</label><input class="input" value="alex@kore.dev"></div>
    <div class="field"><label>Display name</label><input class="input" value="alex.k"></div>
    <div class="field"><label>Lobby code</label><input class="input code" value="ZK4M9X" maxlength="6"></div>
  </div>
  <div style="display:flex;gap:8px;margin-top:18px;">
    <span style="background:var(--lime-tint);color:var(--lime);font-family:var(--mono);font-size:10px;letter-spacing:.16em;padding:4px 10px;border-radius:999px;text-transform:uppercase;border:1px solid var(--lime-tint-2);">● ready</span>
    <span style="background:var(--teal-tint);color:var(--teal);font-family:var(--mono);font-size:10px;letter-spacing:.16em;padding:4px 10px;border-radius:999px;text-transform:uppercase;">healthy</span>
    <span style="background:rgba(226,107,107,.1);color:var(--fail);font-family:var(--mono);font-size:10px;letter-spacing:.16em;padding:4px 10px;border-radius:999px;text-transform:uppercase;">! drift</span>
    <span style="background:transparent;color:var(--mute);border:1px solid var(--line-2);font-family:var(--mono);font-size:10px;letter-spacing:.16em;padding:4px 10px;border-radius:999px;text-transform:uppercase;">idle</span>
  </div>
</body></html>
