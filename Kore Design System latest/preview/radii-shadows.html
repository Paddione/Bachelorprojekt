<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body class="surface-dark" style="padding:28px;color:var(--fg);">
  <div class="eyebrow" style="margin-bottom:14px;">RADIUS · SHADOW</div>
  <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:12px;align-items:end;">
    <div style="text-align:center;"><div style="aspect-ratio:1;background:#221932;border:1px solid var(--line);border-radius:6px;"></div><div style="font-family:var(--mono);font-size:10px;color:var(--mute);margin-top:6px;">chip<br>6</div></div>
    <div style="text-align:center;"><div style="aspect-ratio:1;background:#221932;border:1px solid var(--line);border-radius:10px;"></div><div style="font-family:var(--mono);font-size:10px;color:var(--mute);margin-top:6px;">input<br>10</div></div>
    <div style="text-align:center;"><div style="aspect-ratio:1;background:#221932;border:1px solid var(--line);border-radius:16px;"></div><div style="font-family:var(--mono);font-size:10px;color:var(--mute);margin-top:6px;">card<br>16</div></div>
    <div style="text-align:center;"><div style="aspect-ratio:1;background:#221932;border:1px solid var(--line);border-radius:22px;"></div><div style="font-family:var(--mono);font-size:10px;color:var(--mute);margin-top:6px;">tile<br>22</div></div>
    <div style="text-align:center;"><div style="aspect-ratio:1;background:#221932;border:1px solid var(--line);border-radius:999px;"></div><div style="font-family:var(--mono);font-size:10px;color:var(--mute);margin-top:6px;">pill<br>999</div></div>
    <div style="text-align:center;"><div style="aspect-ratio:1;background:#EDE6D8;border-radius:4px;"></div><div style="font-family:var(--mono);font-size:10px;color:var(--mute);margin-top:6px;">paper<br>4</div></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:22px;">
    <div style="background:#1A1326;border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow-1);"><div style="font-family:var(--mono);font-size:10px;color:var(--lime);">--shadow-1</div><div style="font-family:var(--mono);font-size:9px;color:var(--mute);margin-top:4px;">subtle elev</div></div>
    <div style="background:#1A1326;border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow-2);"><div style="font-family:var(--mono);font-size:10px;color:var(--lime);">--shadow-2</div><div style="font-family:var(--mono);font-size:9px;color:var(--mute);margin-top:4px;">modal / hover</div></div>
    <div style="background:#1A1326;border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow-press);"><div style="font-family:var(--mono);font-size:10px;color:var(--lime);">--shadow-press</div><div style="font-family:var(--mono);font-size:9px;color:var(--mute);margin-top:4px;">pressed</div></div>
  </div>
</body></html>
