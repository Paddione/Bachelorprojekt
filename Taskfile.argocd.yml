# Taskfile.argocd.yml
# ─────────────────────────────────────────────────────────────────────────────
# ArgoCD — GitOps Multi-Cluster Federation
#
#   HUB-ONLY: Every task in this file targets --context mentolder exclusively.
#   The ENV= flag controls which cluster config is LOADED, but ArgoCD itself
#   always lives on the mentolder/hetzner hub. Passing ENV=korczewski does NOT
#   redirect kubectl to the korczewski context.
#
#   Hub cluster  : mentolder  (ArgoCD runs here, manages all spokes)
#   Spoke clusters: korczewski, k3d-dev
# ─────────────────────────────────────────────────────────────────────────────
version: "3"

tasks:

  # ── Internal guard — included by every hub-only task ─────────────────────
  _hub-guard:
    internal: true
    preconditions:
      - sh: kubectl --context mentolder cluster-info > /dev/null 2>&1
        msg: |
          ╔══════════════════════════════════════════════════════════════════╗
          ║  HUB-ONLY TASK — targets the mentolder/hetzner cluster only.    ║
          ║  The korczewski / k3d contexts are NEVER valid here.            ║
          ║  Fix: ensure your kubeconfig has a working 'mentolder' context. ║
          ╚══════════════════════════════════════════════════════════════════╝

  # ── install ───────────────────────────────────────────────────────────────
  install:
    desc: "[HUB-ONLY] Install ArgoCD on the mentolder hub cluster with CMP sidecar"
    vars:
      ENV: '{{.ENV | default "mentolder"}}'
    deps: [_hub-guard]
    preconditions:
      - sh: command -v kustomize > /dev/null 2>&1
        msg: "kustomize not found. Install it first."
    cmds:
      - |
        source scripts/env-resolve.sh "{{.ENV}}"
        kustomize build argocd/install/ | envsubst "\$PROD_DOMAIN" | kubectl --context mentolder apply -f -
      - |
        echo "Waiting for ArgoCD to be ready (this may take 2-3 minutes)..."
        kubectl --context mentolder wait --for=condition=Available deployment/argocd-server \
          -n argocd --timeout=300s
        kubectl --context mentolder wait --for=condition=Available deployment/argocd-repo-server \
          -n argocd --timeout=300s
      - |
        source scripts/env-resolve.sh "{{.ENV}}"
        echo ""
        echo "✓ ArgoCD installed on mentolder hub cluster"
        echo "  UI:    https://argocd.${PROD_DOMAIN}"
        echo "  Login: task argocd:password  →  task argocd:login"

  # ── password ──────────────────────────────────────────────────────────────
  password:
    desc: "[HUB-ONLY] Print the ArgoCD initial admin password from mentolder"
    deps: [_hub-guard]
    cmds:
      - |
        PW=$(kubectl --context mentolder get secret argocd-initial-admin-secret \
          -n argocd -o jsonpath='{.data.password}' 2>/dev/null | base64 -d)
        if [ -z "$PW" ]; then
          echo "Initial secret already deleted — password was changed after first login."
        else
          echo "ArgoCD admin password: $PW"
          echo ""
          echo "After logging in, change this password and delete the secret:"
          echo "  kubectl --context mentolder delete secret argocd-initial-admin-secret -n argocd"
        fi

  # ── ui ────────────────────────────────────────────────────────────────────
  ui:
    desc: "[HUB-ONLY] Port-forward the ArgoCD UI from mentolder to http://localhost:8090"
    deps: [_hub-guard]
    cmds:
      - |
        echo "ArgoCD UI available at http://localhost:8090"
        echo "Press Ctrl+C to stop."
        kubectl --context mentolder port-forward svc/argocd-server -n argocd 8090:80

  # ── login ─────────────────────────────────────────────────────────────────
  login:
    desc: "[HUB-ONLY] Log in to the ArgoCD CLI against mentolder (port-forward + argocd login)"
    deps: [_hub-guard]
    preconditions:
      - sh: command -v argocd > /dev/null 2>&1
        msg: "argocd CLI not found. Install: https://argo-cd.readthedocs.io/en/stable/cli_installation/"
    cmds:
      - |
        echo "Starting port-forward to argocd-server..."
        kubectl --context mentolder port-forward svc/argocd-server -n argocd 8090:80 &
        PF_PID=$!
        sleep 2
        PW=$(kubectl --context mentolder get secret argocd-initial-admin-secret \
          -n argocd -o jsonpath='{.data.password}' 2>/dev/null | base64 -d)
        if [ -z "$PW" ]; then
          echo "Initial secret gone — enter your password manually:"
          argocd login localhost:8090 --username admin --insecure
        else
          argocd login localhost:8090 --username admin --password "$PW" --insecure
          echo ""
          echo "Logged in. Consider changing the password:"
          echo "  argocd account update-password"
        fi
        kill $PF_PID 2>/dev/null || true

  # ── cluster:register ──────────────────────────────────────────────────────
  cluster:register:
    desc: "[HUB-ONLY] Register all production spoke clusters with ArgoCD on mentolder"
    deps: [_hub-guard]
    preconditions:
      - sh: command -v argocd > /dev/null 2>&1
        msg: "argocd CLI not found. Run 'task argocd:login' first."
    cmds:
      # ── Hetzner (in-cluster — ArgoCD manages its own cluster) ──
      - |
        source scripts/env-resolve.sh "mentolder"
        echo "Registering hetzner (in-cluster)..."
        argocd cluster add hetzner --in-cluster --yes \
          --name hetzner \
          --system-namespace argocd 2>/dev/null || \
          argocd cluster add hetzner --yes --name hetzner 2>/dev/null || true
        # Anchored match: a bare `cluster-` prefix also matches cluster-korczewski,
        # which sorts first alphabetically and causes the wrong Secret to be patched.
        HETZNER_SECRET=$(kubectl --context mentolder get secret -n argocd \
          -l argocd.argoproj.io/secret-type=cluster \
          --no-headers 2>/dev/null | awk '{print $1}' | grep -E "^(hetzner|cluster-mentolder|in-cluster)$" | head -1)
        if [ -n "$HETZNER_SECRET" ]; then
          kubectl --context mentolder patch secret "$HETZNER_SECRET" -n argocd --type=json -p="[
            {\"op\":\"add\",\"path\":\"/metadata/labels/workspace\",\"value\":\"true\"},
            {\"op\":\"add\",\"path\":\"/metadata/labels/workspace-office\",\"value\":\"true\"},
            {\"op\":\"add\",\"path\":\"/metadata/labels/workspace-coturn\",\"value\":\"true\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations\",\"value\":{}},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-overlay\",\"value\":\"prod-mentolder\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-namespace\",\"value\":\"workspace\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-domain\",\"value\":\"${PROD_DOMAIN}\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-brand\",\"value\":\"${BRAND_NAME}\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-email\",\"value\":\"${CONTACT_EMAIL}\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-infra-namespace\",\"value\":\"${INFRA_NAMESPACE}\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-tls-secret\",\"value\":\"${TLS_SECRET_NAME}\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-smtp-from\",\"value\":\"${SMTP_FROM}\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-smtp-host\",\"value\":\"${SMTP_HOST}\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-turn-ip\",\"value\":\"${TURN_PUBLIC_IP}\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-turn-node\",\"value\":\"${TURN_NODE}\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-website-image\",\"value\":\"${WEBSITE_IMAGE}\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-llm-host-ip\",\"value\":\"${LLM_HOST_IP}\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-dev-domain\",\"value\":\"${DEV_DOMAIN}\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-dev-node\",\"value\":\"${DEV_NODE}\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-kc-user1-username\",\"value\":\"${KC_USER1_USERNAME}\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-kc-user1-email\",\"value\":\"${KC_USER1_EMAIL}\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-kc-user2-username\",\"value\":\"${KC_USER2_USERNAME}\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-kc-user2-email\",\"value\":\"${KC_USER2_EMAIL}\"}
          ]" 2>/dev/null || echo "  (patch skipped — annotations may already exist)"
          echo "  ✓ hetzner registered and annotated (workspace-office + workspace-coturn labels set)"
        else
          echo "  ✗ Could not find hetzner cluster Secret — register manually"
        fi
      # ── Korczewski (standalone 3-node k3s HA cluster) ──
      # The 2026-05-05 cluster merge was reverted on 2026-05-09 (PRs #621/#622).
      # korczewski-ha is its own physical cluster on pk-hetzner-4/6/8 (API server
      # https://204.168.244.104:6443); web.korczewski.de routes through that
      # cluster's Traefik (NOT mentolder's). It has its own shared-db,
      # sealed-secrets controller, cert-manager, and Keycloak realm.
      # workspace-korczewski namespace lives on korczewski-ha; ArgoCD still hub-runs
      # on mentolder and reaches korczewski-ha via the registered cluster Secret
      # `cluster-korczewski-ha` (created by the bootstrap below).
      # No workspace-office / workspace-coturn labels — korczewski shares mentolder's Collabora + coturn.
      - |
        # Bootstrap the spoke RBAC + token Secret if missing. Idempotent.
        kubectl --context korczewski-ha apply -f argocd/spoke-rbac/korczewski-ha.yaml > /dev/null
        if ! kubectl --context mentolder get secret cluster-korczewski-ha -n argocd > /dev/null 2>&1; then
          echo "Creating cluster-korczewski-ha Secret on mentolder hub..."
          TOKEN=$(kubectl --context korczewski-ha -n argocd get secret argocd-manager-token -o jsonpath='{.data.token}' | base64 -d)
          CA_B64=$(kubectl --context korczewski-ha -n argocd get secret argocd-manager-token -o jsonpath='{.data.ca\.crt}')
          CONFIG=$(printf '{"bearerToken":"%s","tlsClientConfig":{"insecure":false,"caData":"%s"}}' "$TOKEN" "$CA_B64")
          kubectl --context mentolder apply -f - <<EOF
        apiVersion: v1
        kind: Secret
        metadata:
          name: cluster-korczewski-ha
          namespace: argocd
          labels:
            argocd.argoproj.io/secret-type: cluster
            workspace: "true"
        type: Opaque
        stringData:
          name: korczewski-ha
          server: https://204.168.244.104:6443
          config: '${CONFIG}'
        EOF
          echo "  ✓ cluster-korczewski-ha Secret created"
        fi
      - |
        source scripts/env-resolve.sh "korczewski"
        echo "Annotating korczewski cluster secret (targets korczewski-ha)..."
        KORCZ_SECRET=$(kubectl --context mentolder get secret -n argocd \
          -l argocd.argoproj.io/secret-type=cluster \
          --no-headers 2>/dev/null | grep "korczewski" | awk '{print $1}' | head -1)
        if [ -n "$KORCZ_SECRET" ]; then
          kubectl --context mentolder patch secret "$KORCZ_SECRET" -n argocd --type=json -p="[
            {\"op\":\"add\",\"path\":\"/metadata/labels/workspace\",\"value\":\"true\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations\",\"value\":{}},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-overlay\",\"value\":\"prod-korczewski\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-namespace\",\"value\":\"workspace-korczewski\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-domain\",\"value\":\"${PROD_DOMAIN}\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-brand\",\"value\":\"${BRAND_NAME}\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-email\",\"value\":\"${CONTACT_EMAIL}\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-infra-namespace\",\"value\":\"${INFRA_NAMESPACE}\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-tls-secret\",\"value\":\"${TLS_SECRET_NAME}\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-smtp-from\",\"value\":\"${SMTP_FROM}\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-smtp-host\",\"value\":\"${SMTP_HOST}\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-turn-ip\",\"value\":\"${TURN_PUBLIC_IP}\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-turn-node\",\"value\":\"${TURN_NODE}\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-website-image\",\"value\":\"${WEBSITE_IMAGE}\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-llm-host-ip\",\"value\":\"${LLM_HOST_IP}\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-dev-domain\",\"value\":\"\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-dev-node\",\"value\":\"\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-kc-user1-username\",\"value\":\"${KC_USER1_USERNAME}\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-kc-user1-email\",\"value\":\"${KC_USER1_EMAIL}\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-kc-user2-username\",\"value\":\"${KC_USER2_USERNAME}\"},
            {\"op\":\"add\",\"path\":\"/metadata/annotations/workspace-kc-user2-email\",\"value\":\"${KC_USER2_EMAIL}\"}
          ]" 2>/dev/null || echo "  (patch skipped — annotations may already exist)"
          echo "  ✓ korczewski annotated (namespace=workspace-korczewski, no office/coturn labels)"
        else
          echo "  ✗ Could not find korczewski cluster Secret — create it manually"
          echo "  Hint: korczewski-ha is a standalone cluster — register its API endpoint with"
          echo "        argocd cluster add korczewski-ha (kubeconfig context for pk-hetzner-4/6/8)"
        fi
      - |
        echo ""
        echo "Registered clusters:"
        argocd cluster list 2>/dev/null || kubectl --context mentolder get secrets -n argocd \
          -l argocd.argoproj.io/secret-type=cluster -o custom-columns='NAME:.metadata.name,LABELS:.metadata.labels'
      # Re-apply ApplicationSet manifests so template changes take effect
      - |
        echo ""
        echo "Re-applying ApplicationSet manifests..."
        kubectl --context mentolder apply -f argocd/applicationset.yaml
        kubectl --context mentolder apply -f argocd/applicationset-coturn.yaml
        kubectl --context mentolder apply -f argocd/applicationset-office.yaml

  # ── apps:apply ────────────────────────────────────────────────────────────
  apps:apply:
    desc: "[HUB-ONLY] Apply AppProject + ApplicationSets on mentolder (creates workspace-hetzner/korczewski apps)"
    deps: [_hub-guard]
    preconditions:
      - sh: kubectl --context mentolder get namespace argocd > /dev/null 2>&1
        msg: "ArgoCD namespace not found on mentolder. Run 'task argocd:install' first."
    cmds:
      - kubectl --context mentolder apply -f argocd/project.yaml
      - kubectl --context mentolder apply -f argocd/applicationset.yaml
      - kubectl --context mentolder apply -f argocd/applicationset-coturn.yaml
      - kubectl --context mentolder apply -f argocd/applicationset-office.yaml
      - echo ""
      - echo "✓ AppProject 'workspace' and ApplicationSets applied on mentolder hub"
      - |
        echo "Waiting for Applications to be created (up to 30s)..."
        sleep 10
        kubectl --context mentolder get applications -n argocd 2>/dev/null || true

  # ── status ────────────────────────────────────────────────────────────────
  status:
    desc: "[HUB-ONLY] Show sync/health of all workspace apps across all clusters (reads from mentolder)"
    deps: [_hub-guard]
    cmds:
      - |
        echo "═══ ArgoCD Applications ═══"
        kubectl --context mentolder get applications -n argocd \
          -o custom-columns='APP:.metadata.name,HEALTH:.status.health.status,SYNC:.status.sync.status,CLUSTER:.spec.destination.server' \
          2>/dev/null || echo "  No applications found (or ArgoCD not installed)"
      - echo ""
      - |
        echo "═══ Registered Clusters ═══"
        kubectl --context mentolder get secrets -n argocd \
          -l argocd.argoproj.io/secret-type=cluster \
          -o custom-columns='SECRET:.metadata.name,OVERLAY:.metadata.annotations.workspace-overlay,DOMAIN:.metadata.annotations.workspace-domain' \
          2>/dev/null || echo "  No clusters registered"

  # ── sync ──────────────────────────────────────────────────────────────────
  sync:
    desc: "[HUB-ONLY] Manually trigger ArgoCD sync (usage: task argocd:sync -- workspace-hetzner)"
    deps: [_hub-guard]
    preconditions:
      - sh: command -v argocd > /dev/null 2>&1
        msg: "argocd CLI not found."
    cmds:
      - |
        APP="{{.CLI_ARGS}}"
        if [ -z "$APP" ]; then
          echo "Syncing all workspace applications..."
          argocd app sync -l app.kubernetes.io/instance=workspace --async
        else
          echo "Syncing $APP..."
          argocd app sync "$APP"
        fi

  # ── diff ──────────────────────────────────────────────────────────────────
  diff:
    desc: "[HUB-ONLY] Show diff between git and live ArgoCD state (usage: task argocd:diff -- workspace-hetzner)"
    deps: [_hub-guard]
    preconditions:
      - sh: command -v argocd > /dev/null 2>&1
        msg: "argocd CLI not found."
    cmds:
      - argocd app diff "{{.CLI_ARGS}}"

  # ── setup ─────────────────────────────────────────────────────────────────
  setup:
    desc: "[HUB-ONLY] Full ArgoCD bootstrap: install → login → register clusters → apply apps (run once on fresh hub)"
    vars:
      ENV: '{{.ENV | default "mentolder"}}'
    deps: [_hub-guard]
    cmds:
      - task: install
        vars: { ENV: "{{.ENV}}" }
      - task: login
      - task: cluster:register
      - task: apps:apply
      - |
        source scripts/env-resolve.sh "{{.ENV}}"
        echo ""
        echo "✓ ArgoCD federation setup complete on mentolder hub!"
        echo "  UI:            https://argocd.${PROD_DOMAIN}"
        echo "  Apps:          task argocd:status"
        echo "  Manual sync:   task argocd:sync -- workspace-hetzner"
        echo "  Diff:          task argocd:diff -- workspace-hetzner"
