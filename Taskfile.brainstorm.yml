# Taskfile.brainstorm.yml
# ─────────────────────────────────────────────────────────────────────────────
# brainstorm.dev.mentolder.de — reverse-SSH-tunnel broker for the brainstorming
# visual-companion choice loop. Wraps `ssh -R` against the dev-stack sish
# Deployment (k3d/dev-stack/sish.yaml) so the operator can publish a local port
# at https://brainstorm.${DEV_DOMAIN} without poking holes in the home-network
# NAT.
#
# The broker lives in the k3d dev stack (context: k3d-mentolder-dev), reached via the k3d loadbalancer
# host port 0.0.0.0:2222 → dev.mentolder.de:2222. This is the SAME sish that
# `task dev:tunnel` uses; brainstorm just pins the requested subdomain to
# "brainstorm". There is no brainstorm broker on the prod clusters (T000364).
# ─────────────────────────────────────────────────────────────────────────────
version: "3"

vars:
  ENV: mentolder
  CTX_DEV: k3d-mentolder-dev
  NS_DEV: workspace-dev
  # The dev sish SSH endpoint is the k3d loadbalancer host port on $DEV_NODE.
  SSH_PORT: 2222

tasks:

  setup:
    desc: "[brainstorm] One-time setup: apply DEV_SSH_ALLOWLIST ufw rules on the dev node (keys come from DEV_SISH_AUTHORIZED_KEYS via dev:deploy)"
    cmds:
      - task: firewall:open

  publish:
    desc: "[brainstorm] Publish a local port at https://brainstorm.${DEV_DOMAIN}. Usage: task brainstorm:publish -- <localport>"
    cmds:
      - |
        set -euo pipefail
        source scripts/env-resolve.sh "{{.ENV}}"
        PORT=$(echo "{{.CLI_ARGS}}" | awk '{print $1}')
        if [[ -z "$PORT" ]]; then
          echo "Usage: task brainstorm:publish -- <localport>" >&2; exit 2
        fi
        # Proactively check dev-cluster reachability before attempting the tunnel [T000541]
        if ! kubectl --context {{.CTX_DEV}} cluster-info --request-timeout=3s >/dev/null 2>&1; then
          echo "⚠  Dev-Cluster ({{.CTX_DEV}}) nicht erreichbar — Tunnel nicht möglich." >&2
          echo "   Fallback: Companion läuft lokal auf http://localhost:$PORT" >&2
          echo "   Starte den Companion mit: node scripts/companion.js $PORT" >&2
          exit 1
        fi
        echo "Publishing localhost:$PORT as https://brainstorm.$DEV_DOMAIN — leave this terminal open."
        echo "  ssh -p {{.SSH_PORT}} -R brainstorm:80:localhost:$PORT tunnel@$DEV_DOMAIN"
        exec ssh -p {{.SSH_PORT}} -N \
          -o StrictHostKeyChecking=accept-new \
          -o ConnectTimeout=5 \
          -o ServerAliveInterval=30 \
          -o ServerAliveCountMax=3 \
          -o ExitOnForwardFailure=yes \
          -R "brainstorm:80:localhost:$PORT" \
          "tunnel@$DEV_DOMAIN"

  firewall:open:
    desc: "[brainstorm] Apply DEV_SSH_ALLOWLIST CIDRs as ufw allow rules for tcp/2222 on $DEV_NODE (delegates to dev:firewall:open)"
    cmds:
      - task: dev:firewall:open

  collab:
    desc: "[brainstorm] Apply the collab patch, then publish a local port + print the SSO link for gekko. Usage: task brainstorm:collab -- <localport>"
    cmds:
      - bash scripts/superpowers-collab-patch.sh || true
      - |
        set -euo pipefail
        source scripts/env-resolve.sh "{{.ENV}}"
        echo "Teile diesen Link mit gekko (Keycloak-Login, Gruppe /brainstorm-access):"
        echo "  https://brainstorm.${DEV_DOMAIN}"
      - task: publish
        vars: { CLI_ARGS: "{{.CLI_ARGS}}" }

  push:
    desc: "[brainstorm] Push a dev-flow status screen to the live board. Usage: task brainstorm:push TITLE='Schritt 1' STATUS='läuft…' (requires active session under $HOME/Bachelorprojekt/.superpowers/brainstorm/)"
    vars:
      TITLE: '{{.TITLE | default "Dev-Flow Update"}}'
      STATUS: '{{.STATUS | default ""}}'
    cmds:
      - |
        set -euo pipefail
        SESS=$(ls -dt "$HOME"/Bachelorprojekt/.superpowers/brainstorm/*/ 2>/dev/null | head -1)
        [[ -n "$SESS" ]] || { echo "no active brainstorm session dir found" >&2; exit 1; }
        TS=$(date +%s)
        cat > "${SESS}content/devflow-${TS}.html" <<HTML
        <h2>&#x1F527; {{.TITLE}}</h2>
        <p class="subtitle">Live aus dem Dev-Flow</p>
        <div class="mockup"><div class="mockup-body" style="text-align:left;white-space:pre-wrap">{{.STATUS}}</div></div>
        HTML
        echo "pushed devflow-${TS}.html → board reloads"

  status:
    desc: "[brainstorm] Show dev sish pod status and probe the public Ingress"
    cmds:
      - |
        set -euo pipefail
        source scripts/env-resolve.sh "{{.ENV}}"
        # Quick reachability check first to avoid a long kubectl timeout [T000541]
        if ! kubectl --context {{.CTX_DEV}} cluster-info --request-timeout=3s >/dev/null 2>&1; then
          echo "⚠  Dev-Cluster ({{.CTX_DEV}}) nicht erreichbar."
          echo "   Brainstorm-Tunnel ist nicht verfügbar. Fallback: lokaler Companion auf localhost:<port>"
          echo "   Sobald der Dev-Cluster wieder läuft: task brainstorm:publish -- <port>"
          exit 0
        fi
        kubectl --context {{.CTX_DEV}} -n {{.NS_DEV}} get pod -l app=sish -o wide
        echo "── HTTPS probe ────────────────────────────────────────────"
        curl -sSI --max-time 5 "https://brainstorm.${DEV_DOMAIN}/" || true
