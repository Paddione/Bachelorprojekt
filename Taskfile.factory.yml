version: '3'

tasks:
  run:
    desc: |
      Print how to invoke the Phase-1 Software Factory pipeline.
      The pipeline is a Claude Code Workflow script run by the harness Workflow
      tool — NOT `node scripts/factory/pipeline.js` (agent/parallel/pipeline are
      harness globals). This target only documents the invocation.
    silent: true
    cmds:
      - |
        echo "Software Factory — Phase 1 pipeline"
        echo "Invoke via the Claude Code Workflow tool with scripts/factory/pipeline.js and args:"
        echo '  { title, description, slug, ticket_id, brand: mentolder|korczewski, timestamp }'
        echo ""
        echo "Offline lint:     node --check scripts/factory/pipeline.js"
        echo "Contract tests:   ./tests/runner.sh local FA-SF-20"
        echo "Full offline gate: task test:all"

  dispatch:
    desc: |
      Print how to run the Phase-2 Software Factory dispatcher.
      Invoke scripts/factory/dispatcher.js via the Claude Code Workflow tool,
      driven on an interval by the /loop skill (self-paced ScheduleWakeup).
    silent: true
    cmds:
      - |
        echo "Software Factory — Phase 2 dispatcher"
        echo "Invoke via the Workflow tool: { scriptPath: 'scripts/factory/dispatcher.js' }, args: { timestamp }"
        echo "Safe trial: pass args { timestamp, dry_run: true } — pipelines report diffs, never merge/deploy."
        echo "Recurring: /loop \"run the software-factory-dispatcher workflow\""
        echo "Offline lint:   node --check scripts/factory/dispatcher.js"
        echo "Contract tests: ./tests/runner.sh local FA-SF-30"
        echo "Primitives:     slots.sh queue.sh schedule.sh watchdog.sh metrics.sh (BRAND=<brand>)"

  enqueue:
    desc: "Hand a planned ticket to the Software Factory queue. Usage: task factory:enqueue -- T000123 feature/<slug> docs/superpowers/plans/<file>.md"
    cmds:
      - bash scripts/ticket.sh enqueue --id {{index .MATCH 0}} --branch {{index .MATCH 1}} --plan {{index .MATCH 2}}
    vars:
      MATCH:
        sh: echo "{{.CLI_ARGS}}"

  eval:
    desc: "Run the SWE-bench-style evaluation harness against golden fixtures. Produces scorecard in docs/factory-eval/."
    cmds:
      - node scripts/factory/eval.mjs

  eval:gen:
    desc: "Generate a curatable fixture proposal from a merged ticket. Usage: task factory:eval:gen -- <TICKET_EXT_ID>"
    cmds:
      - node scripts/factory/eval-gen.mjs {{.CLI_ARGS}}

  eval:replay:
    desc: "Replay a fixture against the current agent setup. Usage: task factory:eval:replay -- --fixture <id> [--dry-run]"
    cmds:
      - node scripts/factory/eval.mjs --replay {{.CLI_ARGS}}

  autopilot:install:
    desc: |
      Install the persistent Software Factory dispatcher: symlink the systemd
      USER units (factory.timer + factory.service) into ~/.config/systemd/user/,
      reload the user manager, and enable+start the timer. Requires the headless
      Phase-0 spike to be Go. Set FACTORY_GITCRYPT_KEY + claude creds in
      ~/.config/factory/autopilot.env first (EnvironmentFile of factory.service).
    silent: true
    cmds:
      - |
        set -euo pipefail
        if ! systemctl --user show-environment >/dev/null 2>&1; then
          echo "No systemd --user manager on this host (WSL without lingering?)."
          echo "Enable it: 'loginctl enable-linger $USER' then re-run. Falling back: use /loop."
          exit 1
        fi
        UNIT_DIR="${HOME}/.config/systemd/user"
        SRC="$(pwd)/scripts/factory"
        mkdir -p "${UNIT_DIR}"
        ln -sf "${SRC}/factory.service" "${UNIT_DIR}/factory.service"
        ln -sf "${SRC}/factory.timer"   "${UNIT_DIR}/factory.timer"
        systemctl --user daemon-reload
        systemctl --user enable --now factory.timer
        echo "Software Factory autopilot installed. Next tick:"
        systemctl --user list-timers factory.timer --no-pager

  autopilot:uninstall:
    desc: "Stop + disable the autopilot timer and remove the symlinked user units."
    silent: true
    cmds:
      - |
        set -euo pipefail
        UNIT_DIR="${HOME}/.config/systemd/user"
        systemctl --user disable --now factory.timer 2>/dev/null || true
        rm -f "${UNIT_DIR}/factory.timer" "${UNIT_DIR}/factory.service"
        systemctl --user daemon-reload 2>/dev/null || true
        echo "Software Factory autopilot uninstalled."

  autopilot:status:
    desc: "Show the autopilot timer state, next elapse, and the last tick's journal tail."
    silent: true
    cmds:
      - |
        set -euo pipefail
        if ! systemctl --user show-environment >/dev/null 2>&1; then
          echo "No systemd --user manager on this host."
          exit 0
        fi
        systemctl --user list-timers factory.timer --no-pager || true
        echo "--- last factory.service tick ---"
        systemctl --user status factory.service --no-pager -n 20 || true

  budget:estimate:
    desc: "Calculate token and cost estimate for a ticket (usage: task factory:budget:estimate -- <ticket_id> [ENV=...])"
    vars:
      ENV: '{{.ENV | default "dev"}}'
    cmds:
      - |
        if [ -z "{{.CLI_ARGS}}" ]; then
          echo "ERROR: specify a ticket ID: task factory:budget:estimate -- <ticket_id>"
          exit 1
        fi
        bash scripts/factory/budget-estimate.sh "{{.CLI_ARGS}}" "{{.ENV}}"

  budget:guard:
    desc: "Check if daily budget limit has been reached (usage: task factory:budget:guard [ENV=...])"
    vars:
      ENV: '{{.ENV | default "dev"}}'
    cmds:
      - bash scripts/factory/budget-guard.sh "{{.ENV}}"

  usage:
    desc: "Cross-Tool-CLI Token/Kosten-Überblick (tokscale-Delta, read-only). Usage: task factory:usage -- [--json] [--otel]"
    cmds:
      - bash scripts/factory/usage-report.sh {{.CLI_ARGS}}

  disp:korczewski:
    desc: "Run Software Factory schedule for korczewski brand (convenience wrapper for disp-korczewski.sh)"
    cmds:
      - bash scripts/disp-korczewski.sh

  disp:mentolder:
    desc: "Run Software Factory schedule for mentolder brand (convenience wrapper for disp-mentolder.sh)"
    cmds:
      - bash scripts/disp-mentolder.sh
