# Taskfile.llm.yml
# ─────────────────────────────────────────────────────────────────────────────
# Local-first LLM pipeline operations.
# Included from Taskfile.yml under the "llm" namespace.
#
# Drei llama.cpp-Server auf dem Windows GPU-Host (via wg-gpu):
#   - Bonsai (Port 8093): Factory-Orchestrator, 4 Slots
#   - Embed (Port 8095): bge-m3, Text-Embeddings
#   - Rerank (Port 8096): bge-reranker-v2-m3, Text-Reranking
#
# `llm:deploy` applies `k3d/llm-gpu.yaml` (gateway Services+Endpoints).
# `llm:status` and `llm:test` query those Services via debug-pod curls.
# ─────────────────────────────────────────────────────────────────────────────
version: "3"

tasks:

  bootstrap-host:
    desc: "Bootstrap the GPU host (ufw, wg-mesh reachability). HOST=<wg-mesh-ip>"
    preconditions:
      - sh: '[ -n "{{.HOST}}" ]'
        msg: "HOST=<wg-mesh-ip> is required."
    cmds:
      - scripts/llm-host-setup.sh {{.HOST}}

  deploy:
    desc: "Apply llm-gateway Services + Endpoints (embed + rerank) to ENV={{.ENV}}"
    vars:
      ENV: '{{.ENV | default "mentolder"}}'
    cmds:
      - |
        source scripts/env-resolve.sh "{{.ENV}}"
        : "${LLM_HOST_IP:?LLM_HOST_IP unset — configure in environments/{{.ENV}}.yaml}"
        envsubst '$LLM_HOST_IP' < k3d/llm-gpu.yaml \
          | kubectl --context "$ENV_CONTEXT" -n "${WORKSPACE_NAMESPACE:-workspace}" apply -f -
        echo "✓ llm-gateway-embed + llm-gateway-rerank applied (ENV={{.ENV}})"

  status:
    desc: "Show LLM pipeline status (gateway endpoints, GPU host reachability). ENV=<env>"
    vars:
      ENV: '{{.ENV | default "mentolder"}}'
    cmds:
      - |
        set -e
        source scripts/env-resolve.sh "{{.ENV}}"
        ns="${WORKSPACE_NAMESPACE:-workspace}"
        echo "── llm-gateway endpoints ──"
        kubectl --context "$ENV_CONTEXT" -n "$ns" get endpoints llm-gateway-embed llm-gateway-rerank
        echo "── llm-gateway-embed health (llama.cpp bge-m3) ──"
        kubectl --context "$ENV_CONTEXT" -n "$ns" run llm-debug-$$ --rm -it --restart=Never \
          --image=curlimages/curl:8.7.1 --quiet -- \
          curl -fsS -X POST "http://llm-gateway-embed.${ns}.svc.cluster.local:8095/v1/embeddings" \
            -H "Content-Type: application/json" \
            -d '{"model":"bge-m3","input":"test"}' | jq '.data[0].embedding | length' || true
        echo "── llm-gateway-rerank health (llama.cpp bge-reranker) ──"
        kubectl --context "$ENV_CONTEXT" -n "$ns" run llm-debug-$$ --rm -it --restart=Never \
          --image=curlimages/curl:8.7.1 --quiet -- \
          curl -fsS -X POST "http://llm-gateway-rerank.${ns}.svc.cluster.local:8096/v1/rerank" \
            -H "Content-Type: application/json" \
            -d '{"model":"bge-reranker-v2-m3","query":"test","documents":["doc1","doc2"]}' \
            | jq '.results | length' || true

  test:
    desc: "Smoke-test the gateway Services directly (embed + rerank). ENV=<env>"
    vars:
      ENV: '{{.ENV | default "mentolder"}}'
    cmds:
      - |
        set -e
        source scripts/env-resolve.sh "{{.ENV}}"
        ns="${WORKSPACE_NAMESPACE:-workspace}"
        echo "── bge-m3 embed via llm-gateway-embed ──"
        kubectl --context "$ENV_CONTEXT" -n "$ns" run llm-debug-$$ --rm -it --restart=Never \
          --image=curlimages/curl:8.7.1 --quiet -- \
          curl -fsS -X POST "http://llm-gateway-embed.${ns}.svc.cluster.local:8095/v1/embeddings" \
            -H "Content-Type: application/json" \
            -d '{"model":"bge-m3","input":"hallo welt"}' | jq '.data[0].embedding | length'
        echo "── bge-reranker via llm-gateway-rerank ──"
        kubectl --context "$ENV_CONTEXT" -n "$ns" run llm-debug-$$ --rm -it --restart=Never \
          --image=curlimages/curl:8.7.1 --quiet -- \
          curl -fsS -X POST "http://llm-gateway-rerank.${ns}.svc.cluster.local:8096/v1/rerank" \
            -H "Content-Type: application/json" \
            -d '{"model":"bge-reranker-v2-m3","query":"capital of germany","documents":["paris","berlin","hamburg"]}' \
            | jq '.results | sort_by(-.relevance_score) | .[0].index'

  proxy:start:
    desc: "Start the local LLM proxy (scripts/llm-proxy, Port 18235) detached with PID/log file"
    cmds:
      # go-task's embedded shell (mvdan.cc/sh) doesn't populate $! with a real
      # OS PID for backgrounded processes (returns a synthetic job id like
      # "g1") - the idempotency check below silently never worked. Running
      # under a real `bash -c` fixes $! (verified: plain bash gives the actual PID).
      - |
        bash -c '
          set -e
          DIR="$HOME/.local/state/llm-proxy"; mkdir -p "$DIR"
          PIDF="$DIR/proxy.pid"; LOGF="$DIR/proxy.log"
          if [ -f "$PIDF" ] && kill -0 "$(cat "$PIDF")" 2>/dev/null; then
            echo "llm-proxy already running (pid $(cat "$PIDF"))"; exit 0
          fi
          nohup node scripts/llm-proxy/server.mjs >> "$LOGF" 2>&1 &
          echo $! > "$PIDF"
          echo "✓ llm-proxy started (pid $(cat "$PIDF"), log $LOGF)"
        '

  proxy:stop:
    desc: "Stop the local LLM proxy via PID file"
    cmds:
      - |
        PIDF="$HOME/.local/state/llm-proxy/proxy.pid"
        [ -f "$PIDF" ] && kill "$(cat "$PIDF")" 2>/dev/null && rm -f "$PIDF" && echo "✓ stopped" || echo "not running"

  proxy:status:
    desc: "Show LLM proxy health + discovered backends/models"
    cmds:
      - |
        PORT="${LLM_PROXY_PORT:-18235}"
        curl -fsS "http://127.0.0.1:$PORT/health" >/dev/null 2>&1 \
          && curl -fsS "http://127.0.0.1:$PORT/admin/state" | jq . \
          || echo "llm-proxy offline — Start: task llm:proxy:start"

  proxy:logs:
    desc: "Tail the local LLM proxy log"
    cmds:
      - tail -n 100 -f "$HOME/.local/state/llm-proxy/proxy.log"

  measure-equivalence:
    desc: "Measure embedding equivalence between TEI and new llama.cpp endpoint"
    cmds:
      - node scripts/llm/measure-embedding-equivalence.mjs

  register-scheduled-tasks:
    desc: "Register Windows Scheduled Tasks for llama.cpp servers (run on GPU host)"
    cmds:
      - echo "Run this on the Windows GPU host (e.g. via RDP):"
      - echo "  powershell -ExecutionPolicy Bypass -File ./scripts/llm/register-scheduled-tasks.ps1"

  start-embed:
    desc: "Start the bge-m3 embedding server interactively (Windows GPU host)"
    cmds:
      - echo "Run on Windows GPU host:"
      - echo "  powershell -ExecutionPolicy Bypass -File ./scripts/llm/start-embed-server.ps1"

  start-rerank:
    desc: "Start the bge-reranker-v2-m3 rerank server interactively (Windows GPU host)"
    cmds:
      - echo "Run on Windows GPU host:"
      - echo "  powershell -ExecutionPolicy Bypass -File ./scripts/llm/start-rerank-server.ps1"

  start-bonsai:
    desc: "Start the Ternary-Bonsai-8B server with 4 slots (Windows GPU host)"
    cmds:
      - echo "Run on Windows GPU host:"
      - echo "  powershell -ExecutionPolicy Bypass -File ./scripts/llm/start-bonsai-server.ps1"

  lmstudio-preload:
    desc: "DEPRECATED — replaced by llama.cpp Scheduled Tasks. Use scripts/llm/register-scheduled-tasks.ps1 instead."
    cmds:
      - echo "LM Studio (lmstudio-preload.sh) is deprecated since T002110. Use Windows Scheduled Tasks instead."
      - echo "  See powershell -ExecutionPolicy Bypass -File ./scripts/llm/register-scheduled-tasks.ps1"
