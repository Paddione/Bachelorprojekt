    cmds:
      - bash scripts/openspec-status-map.sh

  routes:manifest:
    desc: Regenerate website/src/data/route-manifest.json (page files + brand service slugs -> sweep route manifest)
    cmds:
      - node scripts/build-route-manifest.mjs

  assets:learning:
    desc: Regenerate website/src/lib/learning-assets.generated.json from the SSOT manifest
    cmds:
