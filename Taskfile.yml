        trap 'kill $PF 2>/dev/null' EXIT
        sleep 3

        COLLECTION_ID="{{.COLLECTION_ID}}" \
        PGURL="postgres://website:${WEBSITE_DB_PASSWORD}@localhost:5432/website" \
          node scripts/knowledge/ingest-web.mjs {{.CLI_ARGS}}

  knowledge:seed-context7:
    desc: "Create + ingest all 35 context7 library collections (ENV=mentolder|korczewski)"
    vars:
      ENV: '{{.ENV | default "mentolder"}}'
    cmds:
      - |
        source scripts/env-resolve.sh "{{.ENV}}"
        ctx_flag=""
        [ "{{.ENV}}" != "dev" ] && ctx_flag="--context $ENV_CONTEXT"
        NS="${WORKSPACE_NAMESPACE:-workspace}"

        WEBSITE_DB_PASSWORD=$(kubectl $ctx_flag get secret workspace-secrets -n "$NS" \
          -o jsonpath="{.data.WEBSITE_DB_PASSWORD}" 2>/dev/null | base64 -d)
        if [ -z "$WEBSITE_DB_PASSWORD" ]; then
          echo "ERROR: WEBSITE_DB_PASSWORD not found in workspace-secrets" >&2; exit 1
        fi
        VOYAGE_API_KEY=$(kubectl $ctx_flag get secret workspace-secrets -n "$NS" \
          -o jsonpath="{.data.VOYAGE_API_KEY}" 2>/dev/null | base64 -d)
        export VOYAGE_API_KEY

        # Apply SQL migration via kubectl exec as postgres (DDL requires table owner)
        echo "=== Applying context7_docs source migration ==="
        kubectl $ctx_flag exec -i -n "$NS" deploy/shared-db -- \
          psql -U postgres -d website < scripts/one-shot/archive/20260519-context7-source.sql

        # Helper: run SQL as website user via kubectl exec (avoids port-forward TCP RST crashes)
        # -q suppresses command completion tags (INSERT 0 1) that pollute $() captures
        kexec_psql() {
          kubectl $ctx_flag exec -i -n "$NS" deploy/shared-db -- \
            psql -U website -d website -q "$@"
        }

        # Library seed list: name → context7 ID
        declare -A LIBS=(
          ["Astro"]="/withastro/docs"
          ["Svelte"]="/sveltejs/svelte"
          ["Playwright"]="/microsoft/playwright"
          ["Keycloak"]="/keycloak/keycloak"
          ["LiveKit"]="/websites/livekit_io"
          ["Kubernetes"]="/kubernetes/website"
          ["SealedSecrets"]="/bitnami-labs/sealed-secrets"
          ["Anthropic SDK (TS)"]="/anthropics/anthropic-sdk-typescript"
          ["pgvector"]="/pgvector/pgvector"
          ["Taskfile (go-task)"]="/go-task/task"
          ["Tailwind CSS v4"]="/tailwindlabs/tailwindcss.com"
          ["Zod v4"]="/websites/zod_dev_v4"
          ["Drizzle ORM"]="/drizzle-team/drizzle-orm-docs"
          ["Vitest"]="/vitest-dev/vitest"
          ["Socket.IO"]="/websites/socket_io_v4"
          ["cert-manager"]="/cert-manager/website"
          ["React 19"]="/websites/react_dev"
          ["Traefik"]="/websites/doc_traefik_io_traefik"
          ["Kustomize"]="/kubernetes-sigs/kustomize"
          ["Express 5"]="/websites/expressjs_en_5"
          ["OpenAI SDK"]="/websites/developers_openai_api"
          ["Mistral AI SDK"]="/mistralai/client-ts"
          ["Stripe.js"]="/stripe/stripe-js"
          ["PDFKit"]="/foliojs/pdfkit"
          ["pdf-lib"]="/hopding/pdf-lib"
          ["pdf-parse"]="/mehmet-kozan/pdf-parse"
          ["D3"]="/d3/d3"
          ["Chart.js"]="/chartjs/chart.js"
          ["PixiJS"]="/pixijs/pixijs"
          ["rrweb"]="/rrweb-io/rrweb"
          ["Pino"]="/pinojs/pino"
          ["Nodemailer"]="/nodemailer/nodemailer"
          ["qrcode"]="/soldair/node-qrcode"
          ["signature_pad"]="/szimek/signature_pad"
          ["epub2"]="/julien-c/epub"
        )

        # Phase 1: create all collections via kubectl exec (no port-forward needed)
        echo "=== Phase 1: ensuring collections ==="
        declare -A COL_IDS
        for NAME in "${!LIBS[@]}"; do
          COL_ID=$(kexec_psql -At -c \
            "INSERT INTO knowledge.collections (name, source, description)
             VALUES ('context7: $NAME', 'context7_docs', 'context7 docs for $NAME')
             ON CONFLICT (name) DO UPDATE SET description = EXCLUDED.description
             RETURNING id;")
          COL_IDS["$NAME"]="$COL_ID"
          echo "  $NAME → $COL_ID"
        done

        # Phase 2: port-forward for Node.js ingestion
        # Use 15499 (not 5432) to avoid conflicts with other open port-forwards
        echo ""
        echo "=== Phase 2: ingesting via context7 API ==="
        fuser -k 15499/tcp 2>/dev/null || true
        kubectl $ctx_flag -n "$NS" port-forward svc/shared-db 15499:5432 \
          >/tmp/knowledge-context7-pf.log 2>&1 &
        PF=$!
        trap 'kill $PF 2>/dev/null' EXIT
        sleep 4
        if ! nc -z 127.0.0.1 15499 2>/dev/null; then
          echo "ERROR: port-forward not listening on 15499:" >&2
          cat /tmp/knowledge-context7-pf.log >&2
          exit 1
        fi

        PGURL="postgres://website:${WEBSITE_DB_PASSWORD}@localhost:15499/website"
        SUMMARY=""
        for NAME in "${!LIBS[@]}"; do
          LIB_ID="${LIBS[$NAME]}"
          COL_ID="${COL_IDS[$NAME]}"
          echo ""
          echo "=== $NAME ($LIB_ID) ==="
          echo "  Collection: $COL_ID"

          COLLECTION_ID="$COL_ID" \
          LIBRARY_ID="$LIB_ID" \
          PGURL="$PGURL" \
            node scripts/knowledge/ingest-context7.mjs || echo "  ⚠ Ingest failed for $NAME — continuing"
        done

        # Phase 3: collect counts via kubectl exec (kill port-forward first)
        kill $PF 2>/dev/null || true
        sleep 1
        echo ""
        echo "=== Phase 3: chunk counts ==="
        for NAME in "${!LIBS[@]}"; do
          COL_ID="${COL_IDS[$NAME]}"
          CHUNKS=$(kexec_psql -At -c \
            "SELECT COALESCE(chunk_count, 0) FROM knowledge.collections WHERE id = '$COL_ID';" \
            2>/dev/null || echo "?")
          SUMMARY="$SUMMARY\n  $NAME: $CHUNKS chunks"
        done

        echo ""
        echo "=== Summary ==="
        echo -e "$SUMMARY"

