        kubectl $ctx_flag -n "$NS" port-forward svc/shared-db 15499:5432 \
          >/tmp/coaching-ingest-json-pf.log 2>&1 &
        PF=$!
        trap 'kill $PF 2>/dev/null || true' EXIT
        sleep 4
        if ! nc -z 127.0.0.1 15499 2>/dev/null; then
          echo "ERROR: port-forward not listening on 15499:" >&2
          cat /tmp/coaching-ingest-json-pf.log >&2
          exit 1
        fi

        cd website && PGHOST=localhost PGPORT=15499 PGDATABASE=website PGUSER=website \
          PGPASSWORD="$WEBSITE_DB_PASSWORD" \
          LLM_ENABLED=false \
          npx tsx ../scripts/coaching/ingest-json.mts {{.CLI_ARGS}}

  coaching:batch-ingest:
    desc: "Batch-ingest a directory of coaching PDFs/DOCs — Usage: task coaching:batch-ingest -- <dir> <kurs-slug> [--dry-run] [--yes] [--classify]"
    cmds:
      - source scripts/env-resolve.sh "{{.ENV | default "mentolder"}}"
      - cd scripts/coaching && npx tsx batch-ingest-dir.mts {{.CLI_ARGS}}

  coaching:classify:
    desc: "Run AI classifier over UNCLASSIFIED chunks of a coaching book. Args: -- --slug=<slug> | --all"
    cmds:
      - source scripts/env-resolve.sh "${ENV:-dev}" && cd website && npx tsx ../scripts/coaching/classify-book.mts {{.CLI_ARGS}}

  scs:index:
    desc: "Build the semantic code search index (bge-m3 embeddings → pgvector). Requires cluster DB access."
    cmds:
      - |
        source scripts/env-resolve.sh "${ENV:-dev}"
        ctx_flag=""
        [ "${ENV:-dev}" != "dev" ] && ctx_flag="--context $ENV_CONTEXT"
        NS="${WORKSPACE_NAMESPACE:-workspace}"

        fuser -k 15434/tcp 2>/dev/null || true
        kubectl $ctx_flag -n "$NS" port-forward svc/shared-db 15434:5432 \
          >/tmp/scs-index-pf.log 2>&1 &
        PF=$!
        trap 'kill $PF 2>/dev/null || true' EXIT
        sleep 4
        if ! nc -z 127.0.0.1 15434 2>/dev/null; then
          echo "ERROR: port-forward not listening on 15434:" >&2
          cat /tmp/scs-index-pf.log >&2
          exit 1
        fi

        PGHOST=localhost PGPORT=15434 PGDATABASE=website PGUSER=website \
          npx tsx scripts/index-repo.ts

  scs:index-incremental:
    desc: "Incremental SCS reindex — pass changed file paths as args: task scs:index-incremental -- path/to/file.ts"
    cmds:
      - bash scripts/index-repo-incremental.sh {{.CLI_ARGS}}

  scs:search:
    desc: "Semantic code search — Usage: task scs:search -- 'query text' [--limit=5] [--augmented]"
    cmds:
      - |
        source scripts/env-resolve.sh "${ENV:-dev}"
        ctx_flag=""
        [ "${ENV:-dev}" != "dev" ] && ctx_flag="--context $ENV_CONTEXT"
        NS="${WORKSPACE_NAMESPACE:-workspace}"

        fuser -k 15434/tcp 2>/dev/null || true
        kubectl $ctx_flag -n "$NS" port-forward svc/shared-db 15434:5432 \
          >/tmp/scs-search-pf.log 2>&1 &
        PF=$!
        trap 'kill $PF 2>/dev/null || true' EXIT
        sleep 4

        PGHOST=localhost PGPORT=15434 PGDATABASE=website PGUSER=website \
          npx tsx -e "
            import { searchCode, searchCodeAugmented } from './website/src/lib/codesearch-db.ts';
            const args = process.argv.slice(1);
            const q = args[0];
            const augmented = args.includes('--augmented');
            const limitMatch = args.find(a => a.startsWith('--limit='));
            const limit = limitMatch ? parseInt(limitMatch.split('=')[1]) : 5;
            const fn = augmented ? searchCodeAugmented : searchCode;
            fn(q, limit).then(r => console.log(JSON.stringify(r, null, 2))).catch(e => { console.error(e.message); process.exit(1); });
          " {{.CLI_ARGS}}

  app:install:
    desc: "Install a curated catalog app (ENV=dev|mentolder|korczewski). Usage: task app:install -- <app-name> [--dry-run]"
    vars:
      ENV: '{{.ENV | default "dev"}}'
    cmds:
      - ENV={{.ENV}} bash scripts/app-install.sh {{.CLI_ARGS}}

  app:validate:
    desc: "Validate an app manifest against the schema. Usage: task app:validate -- <app-name>"
    cmds:
      - node scripts/validate-manifest.mjs apps/{{.CLI_ARGS}}/app.yaml

  # ─────────────────────────────────────────────
  # ticket-mcp Go Binary
  # ─────────────────────────────────────────────
  ticket-mcp:build:
    desc: "Build the ticket-mcp Go binary (scripts/ticket-mcp/ticket-mcp-go)"
    cmds:
      - make -C scripts/ticket-mcp/go build

  # ─────────────────────────────────────────────
  # Maintenance — periodic cleanups
  # ─────────────────────────────────────────────
  maintenance:ai-log-cleanup:
    desc: "Delete ai_call_log rows older than 90 days. Usage: task maintenance:ai-log-cleanup [-- ENV=dev|mentolder|korczewski]"
    vars:
      ENV: '{{.ENV | default "dev"}}'
    cmds:
      - |
        source scripts/env-resolve.sh "{{.ENV}}"
        CTX="${ENV_CONTEXT:+--context $ENV_CONTEXT}"
        NS="${WORKSPACE_NAMESPACE:-workspace}"
        kubectl $CTX exec -n "$NS" deploy/shared-db -- \
          psql -U website -d website -c "DELETE FROM ai_call_log WHERE ts < NOW() - INTERVAL '90 days';"

  maintenance:all:
    desc: "Run all maintenance tasks. Usage: task maintenance:all [-- ENV=dev|mentolder|korczewski]"
    vars:
      ENV: '{{.ENV | default "dev"}}'
    cmds:
      - task: maintenance:ai-log-cleanup
        vars: { ENV: '{{.ENV}}' }


  # ─────────────────────────────────────────────
  # Brain-Documentation Generator
  # ─────────────────────────────────────────────
  brain:ingest-worklist:
    desc: "Generiere TAB-separated Worklist für Brain-Doku-Kompilierung"
    cmds:
      - bash scripts/brain-ingest-worklist.sh

  brain:bootstrap:
    desc: "Seede (und optional erstelle/pushe) das brain-Wiki-Fundament. Usage: task brain:bootstrap -- <target-dir>|--create-remote --collaborator <handle>"
    cmds:
      - bash scripts/brain-bootstrap.sh {{.CLI_ARGS}}

  # ─────────────────────────────────────────────
  # FluxCD GitOps tasks (T002083)
  # ─────────────────────────────────────────────
  flux:render:
    desc: "Render fleet-Komponenten + Flux-CRs nach out/ (kein Apply)"
    cmds:
      - bash scripts/flux-render-artifact.sh --out "{{.OUT | default \"out\"}}"

  flux:bootstrap:
    desc: "Einmalig: flux-operator via Helm + FluxInstance + Receiver/IngressRoute/ghcr-auth (imperativ)"
    vars:
      ENV: '{{.ENV | default "fleet-mentolder"}}'
    cmds:
      - |
        source scripts/env-resolve.sh "{{.ENV}}"
        export FLUX_WEBHOOK_HOST="${FLUX_WEBHOOK_HOST:-flux-webhook.${PROD_DOMAIN}}"
        helm upgrade --install flux-operator \
          oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator \
          --namespace flux-system --create-namespace \
          --kube-context "$ENV_CONTEXT"
        kubectl --context "$ENV_CONTEXT" apply -f flux/clusters/fleet/bootstrap/ghcr-auth-sealedsecret.yaml
        kubectl --context "$ENV_CONTEXT" apply -f flux/clusters/fleet/bootstrap/flux-webhook-token-sealedsecret.yaml
        kubectl --context "$ENV_CONTEXT" apply -f flux/clusters/fleet/flux-instance.yaml
        kubectl --context "$ENV_CONTEXT" apply -f flux/clusters/fleet/bootstrap/receiver.yaml
        envsubst "\$FLUX_WEBHOOK_HOST \$TLS_SECRET_NAME" \
          < flux/clusters/fleet/bootstrap/ingressroute-flux-webhook.yaml \
          | kubectl --context "$ENV_CONTEXT" apply -f -
        flux check --context "$ENV_CONTEXT" || true

  flux:push:
    desc: "Render + flux push artifact (privates GHCR) + Receiver-Ping"
    cmds:
      - |
        task flux:render OUT=out
        flux push artifact \
          oci://ghcr.io/paddione/fleet-manifests:latest \
          --path=out \
          --source="$(git config --get remote.origin.url)" \
          --revision="main@sha1:$(git rev-parse HEAD)"

  # ─────────────────────────────────────────────
  # End of tasks
  # ─────────────────────────────────────────────
