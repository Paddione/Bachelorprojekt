# https://taskfile.dev
version: "3"

dotenv: ['.env']

env:
  PROD_DOMAIN: "{{.PROD_DOMAIN}}"
  BRAND_NAME: "{{.BRAND_NAME}}"
  CONTACT_EMAIL: "{{.CONTACT_EMAIL}}"

vars:
  CLUSTER_NAME: dev
  REGISTRY: localhost:5000
  APP_NAME: demo-app
  APP_IMAGE: "{{.REGISTRY}}/{{.APP_NAME}}"
  # ── Domains ───────────────────────────────────────────────────────────
  # The base domain (e.g. korczewski.de)
  # Loaded from .env or uses default if not set.
  PROD_DOMAIN:
    sh: echo "${PROD_DOMAIN:-korczewski.de}"
  # The brand name (e.g. Kore IT)
  BRAND_NAME:
    sh: echo "${BRAND_NAME:-Kore IT}"
  # The contact email (e.g. info@korczewski.de)
  CONTACT_EMAIL:
    sh: echo "${CONTACT_EMAIL:-info@korczewski.de}"
  DEV_DOMAIN: localhost

tasks:
  # ─────────────────────────────────────────────
  # Cluster Lifecycle
  # ─────────────────────────────────────────────
  cluster:create:
    desc: Create the k3d dev cluster with local registry
    preconditions:
      - sh: docker info > /dev/null 2>&1
        msg: "Docker is not running. Start Docker first."
      - sh: "k3d cluster list | grep -q {{.CLUSTER_NAME}} && exit 1 || exit 0"
        msg: "Cluster '{{.CLUSTER_NAME}}' already exists. Run 'task cluster:delete' first."
    cmds:
      - mkdir -p data
      - k3d cluster create --config k3d-config.yaml
      - kubectl wait --for=condition=Ready nodes --all --timeout=120s
      - task: namespaces:create
      - echo "✓ Cluster '{{.CLUSTER_NAME}}' is ready"
      - kubectl get nodes -o wide

  cluster:delete:
    desc: Delete the k3d dev cluster and clean up
    prompt: "This will destroy the '{{.CLUSTER_NAME}}' cluster. Continue?"
    cmds:
      - k3d cluster delete {{.CLUSTER_NAME}}
      - echo "✓ Cluster '{{.CLUSTER_NAME}}' deleted"

  cluster:stop:
    desc: Stop the cluster (preserves state, frees resources)
    cmds:
      - k3d cluster stop {{.CLUSTER_NAME}}

  cluster:start:
    desc: Start a previously stopped cluster
    cmds:
      - k3d cluster start {{.CLUSTER_NAME}}
      - kubectl wait --for=condition=Ready nodes --all --timeout=120s

  cluster:status:
    desc: Show cluster status, nodes, and resource usage
    cmds:
      - echo "=== Cluster ==="
      - k3d cluster list
      - echo ""
      - echo "=== Nodes ==="
      - kubectl get nodes -o wide
      - echo ""
      - echo "=== Pods (all namespaces) ==="
      - kubectl get pods -A
      - echo ""
      - echo "=== Resource Usage ==="
      - docker stats --no-stream --format "table {{`{{.Name}}`}}\t{{`{{.CPUPerc}}`}}\t{{`{{.MemUsage}}`}}" $(docker ps -q --filter "label=app=k3d") 2>/dev/null || true

  # ─────────────────────────────────────────────
  # Namespace Management
  # ─────────────────────────────────────────────
  namespaces:create:
    desc: Create standard dev namespaces with PSS labels
    cmds:
      - |
        for ns in dev staging monitoring; do
          kubectl create namespace $ns --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace $ns \
            pod-security.kubernetes.io/enforce=baseline \
            pod-security.kubernetes.io/warn=restricted \
            --overwrite
        done
      - echo "✓ Namespaces created with Pod Security Standards"

  # ─────────────────────────────────────────────
  # Build & Push
  # ─────────────────────────────────────────────
  build:
    desc: Build the demo app image and push to local registry
    cmds:
      - docker build -t {{.APP_IMAGE}}:latest ./app
      - docker push {{.APP_IMAGE}}:latest
      - echo "✓ Image pushed to {{.APP_IMAGE}}:latest"

  build:import:
    desc: Import a local Docker image directly into k3d (no registry push)
    cmds:
      - docker build -t {{.APP_NAME}}:latest ./app
      - k3d image import {{.APP_NAME}}:latest -c {{.CLUSTER_NAME}}
      - echo "✓ Image imported into cluster"

  # ─────────────────────────────────────────────
  # Deploy
  # ─────────────────────────────────────────────
  deploy:
    desc: Deploy the app using kustomize (local overlay)
    deps: [build]
    cmds:
      - kubectl apply -k deploy/overlays/local
      - kubectl rollout status deployment/{{.APP_NAME}} -n dev --timeout=60s
      - echo "✓ App deployed to dev namespace"

  deploy:status:
    desc: Show deployment status and endpoints
    cmds:
      - echo "=== Deployments ==="
      - kubectl get deployments -n dev
      - echo ""
      - echo "=== Pods ==="
      - kubectl get pods -n dev -o wide
      - echo ""
      - echo "=== Services ==="
      - kubectl get svc -n dev
      - echo ""
      - echo "=== Ingress ==="
      - kubectl get ingress -n dev 2>/dev/null || echo "(no ingress resources)"

  # ─────────────────────────────────────────────
  # Skaffold (continuous development)
  # ─────────────────────────────────────────────
  dev:
    desc: Start skaffold in dev mode (auto-rebuild + hot-reload)
    cmds:
      - skaffold dev --port-forward

  dev:run:
    desc: One-shot build and deploy via skaffold
    cmds:
      - skaffold run

  # ─────────────────────────────────────────────
  # Observability (required for NFA-02 compliance)
  # ─────────────────────────────────────────────
  observability:install:
    desc: Install Prometheus + Grafana stack (required for NFA-02, ~512MB RAM)
    cmds:
      - helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
      - helm repo update
      - |
        helm upgrade --install kube-prometheus prometheus-community/kube-prometheus-stack \
          --namespace monitoring --create-namespace \
          --set prometheus.prometheusSpec.resources.requests.memory=256Mi \
          --set prometheus.prometheusSpec.resources.limits.memory=512Mi \
          --set grafana.resources.requests.memory=128Mi \
          --set grafana.resources.limits.memory=256Mi \
          --set alertmanager.enabled=false \
          --set prometheus.prometheusSpec.retention=6h \
          --wait --timeout=300s
      - echo "✓ Observability stack installed"
      - 'echo "  Grafana: kubectl port-forward -n monitoring svc/kube-prometheus-grafana 3000:80"'
      - 'echo "  Password: kubectl get secret -n monitoring kube-prometheus-grafana -o jsonpath=''{.data.admin-password}'' | base64 -d"'

  workspace:monitoring:
    desc: Install observability and import DSGVO dashboard (required for NFA-02)
    cmds:
      - task: observability:install
      # Import DSGVO Compliance Dashboard as a ConfigMap (Grafana sidecar auto-detects it)
      - |
        kubectl create configmap grafana-dsgvo-dashboard \
          --from-file=dsgvo-compliance.json=grafana/dsgvo-compliance-dashboard.json \
          -n monitoring --dry-run=client -o yaml | \
          kubectl label -f - --dry-run=client -o yaml --local grafana_dashboard=1 | \
          kubectl apply -f -
      - echo ""
      - 'echo "✓ Monitoring ready (NFA-02 compliant)"'
      - 'echo "  Grafana:            kubectl port-forward -n monitoring svc/kube-prometheus-grafana 3000:80"'
      - 'echo "  Prometheus:         kubectl port-forward -n monitoring svc/kube-prometheus-prometheus 9090:9090"'
      - 'echo "  DSGVO Dashboard:    Grafana → Dashboards → DSGVO Compliance Dashboard"'

  workspace:dsgvo-check:
    desc: Run DSGVO compliance verification (NFA-01 data sovereignty proof)
    cmds:
      - bash scripts/dsgvo-compliance-check.sh

  observability:remove:
    desc: Remove observability stack to reclaim resources
    cmds:
      - helm uninstall kube-prometheus -n monitoring
      - kubectl delete namespace monitoring --ignore-not-found
      - echo "✓ Observability stack removed"

  # ─────────────────────────────────────────────
  # Ingress (k3s built-in Traefik)
  # ─────────────────────────────────────────────
  ingress:status:
    desc: Show Traefik ingress controller status (built into k3s)
    cmds:
      - kubectl get pods -n kube-system -l app.kubernetes.io/name=traefik
      - kubectl get svc -n kube-system traefik

  # ─────────────────────────────────────────────
  # Git Hooks & Workflow
  # ─────────────────────────────────────────────
  hooks:install:
    desc: Install git hooks (branch naming, kustomize validation, secret scanning)
    cmds:
      - git config core.hooksPath .githooks
      - echo '✓ Git hooks installed from .githooks/'
      - 'echo "  pre-commit:         blocks main commits, validates kustomize, scans secrets"'
      - 'echo "  prepare-commit-msg: auto-prefixes commit message from branch name"'

  # ─────────────────────────────────────────────
  # Configuration Management
  # ─────────────────────────────────────────────
  domain:set:
    desc: "Change the production domain in .env (usage: task domain:set -- new.tld)"
    cmds:
      - |
        NEW="{{.CLI_ARGS}}"
        if [ -z "$NEW" ]; then
          echo "Usage: task domain:set -- your.domain.tld"
          echo "Current PROD_DOMAIN: {{.PROD_DOMAIN}}"
          exit 1
        fi
        sed -i "s/^PROD_DOMAIN=.*/PROD_DOMAIN=$NEW/" .env
        echo "✓ PROD_DOMAIN updated to '$NEW' in .env"
        echo "  Update DNS: *.${NEW} → your server IP"
        echo "  Then run: task workspace:prod:deploy"

  brand:set:
    desc: "Change the branding name in .env (usage: task brand:set -- NewBrand.de)"
    cmds:
      - |
        NEW="{{.CLI_ARGS}}"
        if [ -z "$NEW" ]; then
          echo "Usage: task brand:set -- NewBrand.de"
          echo "Current BRAND_NAME: {{.BRAND_NAME}}"
          exit 1
        fi
        sed -i "s/^BRAND_NAME=.*/BRAND_NAME=$NEW/" .env
        echo "✓ BRAND_NAME updated to '$NEW' in .env"

  email:set:
    desc: "Change the contact email in .env (usage: task email:set -- info@newbrand.de)"
    cmds:
      - |
        NEW="{{.CLI_ARGS}}"
        if [ -z "$NEW" ]; then
          echo "Usage: task email:set -- info@yourbrand.tld"
          echo "Current CONTACT_EMAIL: {{.CONTACT_EMAIL}}"
          exit 1
        fi
        sed -i "s/^CONTACT_EMAIL=.*/CONTACT_EMAIL=$NEW/" .env
        echo "✓ CONTACT_EMAIL updated to '$NEW' in .env"

  config:show:
    desc: Show currently configured variables from .env
    cmds:
      - 'echo "  PROD_DOMAIN:   {{.PROD_DOMAIN}}"'
      - 'echo "  BRAND_NAME:    {{.BRAND_NAME}}"'
      - 'echo "  CONTACT_EMAIL: {{.CONTACT_EMAIL}}"'
      - 'echo "  DEV_DOMAIN:    {{.DEV_DOMAIN}}"'
      - echo ""
      - echo "Production subdomains:"
      - 'echo "  auth.{{.PROD_DOMAIN}}    (Keycloak)"'
      - 'echo "  chat.{{.PROD_DOMAIN}}    (Mattermost)"'
      - 'echo "  files.{{.PROD_DOMAIN}}   (Nextcloud)"'
      - 'echo "  office.{{.PROD_DOMAIN}}  (Collabora)"'
      - 'echo "  board.{{.PROD_DOMAIN}}   (Whiteboard)"'
      - 'echo "  vault.{{.PROD_DOMAIN}}   (Vaultwarden)"'
      - 'echo "  billing.{{.PROD_DOMAIN}} (Invoice Ninja)"'
      - 'echo "  web.{{.PROD_DOMAIN}}     (Website - Astro)"'

  # ─────────────────────────────────────────────
  # Utilities
  # ─────────────────────────────────────────────
  registry:list:
    desc: List images in the local registry
    cmds:
      - curl -s http://{{.REGISTRY}}/v2/_catalog | python3 -m json.tool 2>/dev/null || echo "Registry empty or unavailable"

  logs:
    desc: Tail logs for the demo app
    cmds:
      - kubectl logs -n dev -l app={{.APP_NAME}} -f --tail=50

  shell:
    desc: Open a debug shell in the cluster
    cmds:
      - kubectl run debug --rm -it --image=busybox --restart=Never -- sh

  clean:
    desc: Full cleanup — delete cluster, prune Docker images
    prompt: "This will delete everything. Continue?"
    cmds:
      - k3d cluster delete {{.CLUSTER_NAME}} 2>/dev/null || true
      - docker image prune -f
      - docker volume prune -f
      - echo "✓ Cleaned up"

  # ─────────────────────────────────────────────
  # Quick Start
  # ─────────────────────────────────────────────
  up:
    desc: "Full setup: create cluster → build → deploy"
    cmds:
      - task: cluster:create
      - task: deploy
      - echo ""
      - 'echo "Dev environment is ready!"'
      - 'echo "   App:     http://localhost:8080"'
      - 'echo "   Registry: http://registry.localhost:5000/v2/_catalog"'
      - 'echo "   kubectl:  already configured for cluster ''{{.CLUSTER_NAME}}''"'

  workspace:up:
    desc: "Full automated setup: Cluster -> MVP -> MCP -> Monitoring -> Billing"
    cmds:
      - task: cluster:create
      - task: workspace:deploy
      - task: mcp:deploy
      - task: workspace:monitoring
      - task: workspace:post-setup
      - task: workspace:billing-setup
      - task: workspace:stripe-setup
      - echo ""
      - 'echo "✓ Workspace MVP stack is fully deployed and configured!"'
      - 'echo "  OpenClaw (AI): http://ai.localhost"'
      - 'echo "  Monitoring:    http://localhost:3000 (Grafana)"'

  down:
    desc: "Tear down everything"
    cmds:
      - task: cluster:delete

  # ─────────────────────────────────────────────
  # Workspace MVP (Bachelorprojekt)
  # ─────────────────────────────────────────────
  workspace:deploy:
    desc: Deploy all Workspace MVP services into the workspace namespace
    preconditions:
      - sh: kubectl cluster-info > /dev/null 2>&1
        msg: "No cluster running. Run 'task cluster:create' first."
    cmds:
      - kubectl apply -f k3d/namespace.yaml
      # ConfigMaps from files outside the k3d/ Kustomize root
      - |
        kubectl create configmap keycloak-import-script \
          --from-file="import-entrypoint.sh=scripts/import-entrypoint.sh" \
          -n workspace --dry-run=client -o yaml | kubectl apply -f -
      - |
        kubectl create configmap mattermost-proxy-config \
          --from-file="default.conf=mattermost/userinfo-proxy.conf" \
          -n workspace --dry-run=client -o yaml | kubectl apply -f -
      - task: docs:configmap
      - |
        export PROD_DOMAIN="{{.PROD_DOMAIN}}"
        export BRAND_NAME="{{.BRAND_NAME}}"
        export CONTACT_EMAIL="{{.CONTACT_EMAIL}}"
        kustomize build k3d/ | envsubst "\$PROD_DOMAIN \$BRAND_NAME \$CONTACT_EMAIL" | kubectl apply -f -
      # Wait for shared database, then services
      - |
        echo "Waiting for shared-db..."
        kubectl rollout status deployment/shared-db -n workspace --timeout=120s
      - |
        for svc in keycloak mm-keycloak-proxy mattermost nextcloud spreed-signaling collabora whiteboard openclaw opensearch invoiceninja oauth2-proxy-invoiceninja billing-bot docs; do
          echo "Waiting for $svc..."
          kubectl rollout status deployment/$svc -n workspace --timeout=300s || \
            echo "WARNING: $svc not ready yet"
        done
      - echo ""
      - 'echo "✓ Workspace MVP deployed"'
      - task: workspace:openclaw:setup
      - 'echo "  Keycloak:    http://auth.localhost"'
      - 'echo "  Mattermost:  http://chat.localhost"'
      - 'echo "  Nextcloud:   http://files.localhost"'
      - 'echo "  Talk HPB:    http://signaling.localhost"'
      - 'echo "  Collabora:   http://office.localhost"'
      - 'echo "  Whiteboard:  http://board.localhost"'
      - 'echo "  Invoice Ninja: http://billing.localhost"'
      - 'echo "  Docs:        http://docs.localhost"'
      - 'echo "  Mailpit:     http://mail.localhost"'
      - 'echo "  Vaultwarden: http://vault.localhost"'
      - echo ""
      - 'echo "Run ''task workspace:post-setup'' to enable Nextcloud apps (calendar, contacts, oidc)."'
      - 'echo "Run ''task workspace:vaultwarden:seed'' to seed Vaultwarden with production secret templates (once)."'
      - 'echo "Run ''task workspace:billing-setup'' to build the billing-bot image (token/slash-command are auto-provisioned)."'
      - 'echo "Run ''task workspace:monitoring'' to install Prometheus + Grafana (NFA-02)."'
      - 'echo "Run ''task ddns:deploy -- <api-key>'' to enable automatic DNS updates (dynamic IP only)."'

  workspace:openclaw:setup:
    desc: Register all MCP servers in the OpenClaw database
    cmds:
      - |
        kubectl wait --for=condition=Ready pod -l app=openclaw -n workspace --timeout=120s
        OC_POD=$(kubectl get pod -n workspace -l app=openclaw -o jsonpath='{.items[0].metadata.name}')
        echo "Registering MCP servers in OpenClaw ($OC_POD)..."
        kubectl cp scripts/openclaw-mcp-register.py workspace/$OC_POD:/tmp/mcp-register.py
        kubectl exec -n workspace $OC_POD -- python3 /tmp/mcp-register.py
        kubectl exec -n workspace $OC_POD -- rm /tmp/mcp-register.py
        # Restart pod to pick up changes (especially if in config table)
        kubectl rollout restart deployment/openclaw -n workspace
        kubectl rollout status deployment/openclaw -n workspace --timeout=120s
      - echo "✓ MCP servers registered in OpenClaw"

  workspace:billing-build:
    desc: Build and push billing-bot image to local registry
    cmds:
      - docker build -t {{.REGISTRY}}/billing-bot:latest billing-bot/
      - docker push {{.REGISTRY}}/billing-bot:latest
      - 'echo "✓ billing-bot image pushed"'

  workspace:billing-setup:
    desc: Build and push billing-bot image (bot token + slash command provisioned automatically by billing-bot-init-job)
    deps: [workspace:billing-build]
    cmds:
      - 'echo "✓ billing-bot image built. Token and /billing slash command are provisioned automatically by billing-bot-init-job."'

  workspace:stripe-setup:
    desc: Register Stripe as payment gateway in Invoice Ninja
    cmds:
      - bash scripts/stripe-setup.sh

  workspace:post-setup:
    desc: Enable Nextcloud apps (calendar, contacts, OIDC) after initial deploy
    cmds:
      - echo "Enabling Nextcloud apps..."
      - kubectl exec -n workspace deploy/nextcloud -- su -s /bin/bash www-data -c "php occ app:install oidc_login" || true
      - kubectl exec -n workspace deploy/nextcloud -- su -s /bin/bash www-data -c "php occ app:install calendar" || true
      - kubectl exec -n workspace deploy/nextcloud -- su -s /bin/bash www-data -c "php occ app:install contacts" || true
      - kubectl exec -n workspace deploy/nextcloud -- su -s /bin/bash www-data -c "php occ app:install richdocuments" || true
      - kubectl exec -n workspace deploy/nextcloud -- su -s /bin/bash www-data -c "php occ app:enable spreed" || true
      - |
        kubectl exec -n workspace deploy/nextcloud -- su -s /bin/bash www-data -c \
          "php occ config:app:set richdocuments wopi_url --value=http://collabora:9980"
      - echo ""
      - 'echo "✓ Nextcloud apps enabled"'
      - 'echo "  Calendar:  http://files.localhost/apps/calendar"'
      - 'echo "  Contacts:  http://files.localhost/apps/contacts"'
      - 'echo "  Talk:      http://files.localhost/apps/spreed"'
      - 'echo "  Collabora: via richdocuments WOPI integration"'

  workspace:status:
    desc: Show Workspace MVP deployment status
    cmds:
      - echo "=== Pods ==="
      - kubectl get pods -n workspace -o wide
      - echo ""
      - echo "=== Services ==="
      - kubectl get svc -n workspace
      - echo ""
      - echo "=== Ingress ==="
      - kubectl get ingress -n workspace
      - echo ""
      - echo "=== PVCs ==="
      - kubectl get pvc -n workspace

  workspace:logs:
    desc: "Tail logs for a workspace service (usage: task workspace:logs -- <service>)"
    cmds:
      - kubectl logs -n workspace deploy/{{.CLI_ARGS}} -f --tail=50

  workspace:psql:
    desc: 'Open psql shell to shared-db (usage: task workspace:psql -- <dbname>, default: postgres)'
    cmds:
      - kubectl exec -it -n workspace deploy/shared-db -- psql -U postgres -d {{.CLI_ARGS | default "postgres"}}

  workspace:port-forward:
    desc: 'Forward shared-db to localhost:5432'
    cmds:
      - 'echo "Connect: psql -h localhost -p 5432 -U postgres"'
      - kubectl port-forward -n workspace svc/shared-db 5432:5432

  workspace:teardown:
    desc: Remove all Workspace MVP resources
    prompt: "This will delete the workspace namespace and all data. Continue?"
    cmds:
      - kubectl delete namespace workspace --ignore-not-found --timeout=120s
      - echo "✓ Workspace namespace deleted"

  workspace:restart:
    desc: "Restart a workspace service (usage: task workspace:restart -- <service>)"
    cmds:
      - kubectl rollout restart deployment/{{.CLI_ARGS}} -n workspace
      - kubectl rollout status deployment/{{.CLI_ARGS}} -n workspace --timeout=120s

  workspace:prod:deploy:
    desc: Deploy workspace stack to k3s-production cluster
    preconditions:
      - sh: kubectl --context k3s-production cluster-info > /dev/null 2>&1
        msg: "k3s-production context not reachable."
      - sh: "! grep -q 'CHANGE_ME' prod/secrets.yaml"
        msg: "prod/secrets.yaml still contains CHANGE_ME — fill in SMTP_PASSWORD first."
    cmds:
      - |
        export PROD_DOMAIN="{{.PROD_DOMAIN}}"
        export BRAND_NAME="{{.BRAND_NAME}}"
        export CONTACT_EMAIL="{{.CONTACT_EMAIL}}"
        kustomize build prod/ | envsubst "\$PROD_DOMAIN \$BRAND_NAME \$CONTACT_EMAIL" | kubectl --context k3s-production apply -f -
      - |
        echo "Waiting for vaultwarden rollout..."
        kubectl --context k3s-production rollout status deployment/vaultwarden -n workspace --timeout=120s
      - 'echo "✓ Production deploy complete"'
      - 'echo "  Vaultwarden: https://vault.{{.PROD_DOMAIN}}"'
      - 'echo "  Keycloak:    https://auth.{{.PROD_DOMAIN}}"'

  workspace:validate:
    desc: Validate k3d manifests with kustomize dry-run
    cmds:
      - kubectl kustomize k3d/ | kubectl apply --dry-run=client -f -
      - echo "✓ Manifests are valid"

  workspace:vaultwarden:seed:
    desc: "Seed Vaultwarden with production secret templates (run once after first login — see vaultwarden-seed-credentials.yaml)"
    preconditions:
      - sh: kubectl cluster-info > /dev/null 2>&1
        msg: "No cluster running. Run 'task cluster:create' first."
      - sh: kubectl get secret vaultwarden-seed-credentials -n workspace > /dev/null 2>&1
        msg: "vaultwarden-seed-credentials secret missing. Fill in and apply k3d/vaultwarden-seed-credentials.yaml first."
    cmds:
      - kubectl delete job vaultwarden-seed -n workspace --ignore-not-found
      - kubectl apply -f k3d/vaultwarden-seed-job.yaml
      - |
        echo "Waiting for seed job to complete..."
        kubectl wait --for=condition=complete job/vaultwarden-seed -n workspace --timeout=120s
      - kubectl logs -n workspace job/vaultwarden-seed

  workspace:vaultwarden:seed-logs:
    desc: Show logs from the last Vaultwarden seed job run
    cmds:
      - kubectl logs -n workspace job/vaultwarden-seed

  # ─────────────────────────────────────────────
  # Documentation
  # ─────────────────────────────────────────────
  docs:configmap:
    desc: Build docs-content ConfigMap from local docs/ directory
    cmds:
      - |
        kubectl create configmap docs-content \
          --from-file="index.html=docs-site/index.html" \
          --from-file="README.md=docs/README.md" \
          --from-file="_sidebar.md=docs/_sidebar.md" \
          --from-file="architecture.md=docs/architecture.md" \
          --from-file="services.md=docs/services.md" \
          --from-file="keycloak.md=docs/keycloak.md" \
          --from-file="migration.md=docs/migration.md" \
          --from-file="scripts.md=docs/scripts.md" \
          --from-file="tests.md=docs/tests.md" \
          --from-file="security.md=docs/security.md" \
          --from-file="troubleshooting.md=docs/troubleshooting.md" \
          --from-file="requirements.md=docs/requirements.md" \
          -n workspace --dry-run=client -o yaml | kubectl apply -f -

  docs:deploy:
    desc: Deploy Docsify docs site into the workspace namespace
    preconditions:
      - sh: kubectl cluster-info > /dev/null 2>&1
        msg: 'No cluster running. Run "task cluster:create" first.'
    cmds:
      - task: docs:configmap
      - kubectl apply -f k3d/docs.yaml -n workspace
      - kubectl rollout status deployment/docs -n workspace --timeout=120s
      - echo ''
      - 'echo "✓ Docs deployed"'
      - 'echo "  URL: http://docs.localhost"'

  docs:restart:
    desc: Rebuild docs ConfigMap from local files and restart the docs pod
    cmds:
      - task: docs:configmap
      - kubectl rollout restart deployment/docs -n workspace
      - kubectl rollout status deployment/docs -n workspace --timeout=120s
      - echo '✓ Docs updated from local docs/ directory'

  docs:integrate-mattermost:
    desc: Integrate docs into Mattermost (channel bookmark + slash command)
    cmds:
      - bash scripts/mattermost-docs-integration.sh

  # ─────────────────────────────────────────────
  # OpenClaw MCP Servers
  # ─────────────────────────────────────────────
  mcp:select:
    desc: Interactive MCP server selector (pick env + servers → .mcp.json)
    cmds:
      - scripts/mcp-select.sh

  mcp:deploy:
    desc: Deploy all OpenClaw MCP pods (core + apps + auth)
    preconditions:
      - sh: kubectl cluster-info > /dev/null 2>&1
        msg: "No cluster running. Run 'task cluster:create' first."
    cmds:
      - 'echo "Deploying OpenClaw MCP pods..."'
      - kubectl apply -k deploy/mcp/
      - 'echo "Waiting for pods to roll out..."'
      - kubectl rollout status deployment/openclaw-mcp-core --timeout=120s
      - kubectl rollout status deployment/openclaw-mcp-apps --timeout=90s
      - kubectl rollout status deployment/openclaw-mcp-auth --timeout=120s
      - 'echo "✓ All MCP pods deployed (3 pods, 7 containers)"'
      - task: mcp:status

  mcp:status:
    desc: Show status of all OpenClaw MCP pods and containers
    cmds:
      - 'echo "=== MCP Pods ==="'
      - kubectl get pods -l 'app in (openclaw-mcp-core,openclaw-mcp-apps,openclaw-mcp-auth,mcp-github)' -o wide
      - 'echo ""'
      - 'echo "=== Container Status (per pod) ==="'
      - |
        for pod in $(kubectl get pods -l 'app in (openclaw-mcp-core,openclaw-mcp-apps,openclaw-mcp-auth)' -o name 2>/dev/null); do
          echo "  $pod:"
          kubectl get $pod -o jsonpath='{range .status.containerStatuses[*]}    {.name}: ready={.ready} restarts={.restartCount}{"\n"}{end}'
        done
      - 'echo ""'
      - 'echo "=== MCP Endpoints ==="'
      - kubectl get configmap openclaw-config -o yaml 2>/dev/null | grep "MCP_.*_URL"

  mcp:logs:
    desc: "Tail logs for a container (usage: task mcp:logs -- core/mattermost or apps/nextcloud)"
    cmds:
      - |
        POD_PART=$(echo "{{.CLI_ARGS}}" | cut -d/ -f1)
        CONTAINER=$(echo "{{.CLI_ARGS}}" | cut -d/ -f2)
        if [ -z "$CONTAINER" ]; then
          kubectl logs deployment/openclaw-mcp-$POD_PART -f --tail=50 --all-containers
        else
          kubectl logs deployment/openclaw-mcp-$POD_PART -c $CONTAINER -f --tail=50
        fi

  mcp:restart:
    desc: "Restart an MCP pod (usage: task mcp:restart -- core|apps|auth)"
    cmds:
      - kubectl rollout restart deployment/openclaw-mcp-{{.CLI_ARGS}}
      - kubectl rollout status deployment/openclaw-mcp-{{.CLI_ARGS}} --timeout=120s

  mcp:mattermost-setup:
    desc: Create admin-only OpenClaw channels in all Mattermost teams
    preconditions:
      - sh: kubectl cluster-info > /dev/null 2>&1
        msg: "No cluster running."
    cmds:
      - |
        echo "Generating Mattermost API token..."
        TOKEN=$(kubectl exec -n workspace deploy/mattermost -- \
          mmctl --local token generate axzgi6xawjrm7rucg39h97dfjw "openclaw-setup-$(date +%s)" 2>/dev/null | cut -d: -f1)
        echo "Running OpenClaw Mattermost setup..."
        kubectl run openclaw-mm-setup --rm -i --restart=Never \
          --image=python:3.12-alpine \
          --env="MM_URL=http://mattermost.workspace.svc.cluster.local:8065" \
          --env="MM_TOKEN=$TOKEN" \
          -- python3 /dev/stdin < scripts/openclaw-mattermost-setup.py
      - 'echo "✓ OpenClaw channels created in all teams"'

  mcp:set-github-pat:
    desc: Update the GitHub PAT in openclaw-secrets
    cmds:
      - |
        if [ -z "{{.CLI_ARGS}}" ]; then
          echo "Usage: task mcp:set-github-pat -- ghp_yourtoken"
          exit 1
        fi
      - kubectl patch secret openclaw-secrets -n default --type='json' -p='[{"op":"replace","path":"/data/GITHUB_PAT","value":"'$(echo -n "{{.CLI_ARGS}}" | base64 -w0)'"}]'
      - kubectl rollout restart deployment/mcp-github
      - 'echo "✓ GitHub PAT updated and mcp-github restarted"'

  # ─────────────────────────────────────────────
  # Website (Astro + Svelte)
  # ─────────────────────────────────────────────
  website:build:
    desc: Build the Astro website Docker image
    cmds:
      - |
        docker build -t mentolder-website:latest \
          --build-arg PROD_DOMAIN="{{.PROD_DOMAIN}}" \
          --build-arg BRAND_NAME="{{.BRAND_NAME}}" \
          --build-arg CONTACT_EMAIL="{{.CONTACT_EMAIL}}" \
          website/
        echo "✓ Docker image built: mentolder-website:latest"

  website:build:import:
    desc: Build and import website image into k3d cluster
    cmds:
      - task: website:build
      - k3d image import mentolder-website:latest -c {{.CLUSTER_NAME}}
      - echo "✓ Image imported into k3d cluster"

  website:deploy:
    desc: Deploy the Astro website to the website namespace
    preconditions:
      - sh: kubectl cluster-info > /dev/null 2>&1
        msg: "No cluster running. Run 'task cluster:create' first."
    cmds:
      - task: website:build:import
      - |
        export PROD_DOMAIN="{{.PROD_DOMAIN}}"
        export BRAND_NAME="{{.BRAND_NAME}}"
        export CONTACT_EMAIL="{{.CONTACT_EMAIL}}"
        envsubst "\$PROD_DOMAIN \$BRAND_NAME \$CONTACT_EMAIL" < k3d/website.yaml | kubectl apply -f -
      - |
        echo "Waiting for website..."
        kubectl rollout status deployment/website -n website --timeout=120s
      - echo ""
      - 'echo "✓ Website deployed"'
      - 'echo "  URL: http://web.{{.DEV_DOMAIN}}"'

  website:dev:
    desc: Run Astro dev server locally (hot-reload)
    dir: website
    cmds:
      - npm run dev

  website:status:
    desc: Show website deployment status
    cmds:
      - echo "=== Pods ==="
      - kubectl get pods -n website -o wide
      - echo ""
      - echo "=== Services ==="
      - kubectl get svc -n website
      - echo ""
      - echo "=== IngressRoute ==="
      - kubectl get ingressroute -n website 2>/dev/null || echo "(no IngressRoute found)"

  website:logs:
    desc: Tail website logs
    cmds:
      - kubectl logs -n website deploy/website -f --tail=50

  website:restart:
    desc: Restart the website pod
    cmds:
      - kubectl rollout restart deployment/website -n website
      - kubectl rollout status deployment/website -n website --timeout=60s

  website:redeploy:
    desc: Rebuild image, import, and restart the website
    cmds:
      - task: website:build:import
      - kubectl rollout restart deployment/website -n website
      - kubectl rollout status deployment/website -n website --timeout=60s
      - 'echo "✓ Website redeployed"'

  website:teardown:
    desc: Remove website namespace and all resources
    prompt: "This will delete the website namespace. Continue?"
    cmds:
      - kubectl delete namespace website --ignore-not-found --timeout=60s
      - echo "✓ Website namespace deleted"

  # ─────────────────────────────────────────────
  # Whisper (Transcription Service)
  # ─────────────────────────────────────────────
  whisper:deploy:
    desc: Deploy faster-whisper transcription service (medium model, CPU-only)
    preconditions:
      - sh: kubectl cluster-info > /dev/null 2>&1
        msg: "No cluster running. Run 'task cluster:create' first."
    cmds:
      - kubectl apply -f k3d/whisper.yaml
      - |
        echo "Waiting for whisper (model download may take several minutes on first start)..."
        kubectl rollout status deployment/whisper -n workspace --timeout=600s
      - echo "✓ Whisper deployed"
      - 'echo "  Endpoint: http://whisper.workspace.svc.cluster.local:8000"'

  whisper:status:
    desc: Show whisper deployment status
    cmds:
      - kubectl get pods -l app=whisper -o wide
      - kubectl logs deploy/whisper --tail=5 2>/dev/null || true

  whisper:logs:
    desc: Tail whisper logs
    cmds:
      - kubectl logs deploy/whisper -f --tail=50

  # ─────────────────────────────────────────────
  # Outline (Knowledge Base)
  # ─────────────────────────────────────────────
  outline:deploy:
    desc: Deploy Outline knowledge base
    preconditions:
      - sh: kubectl cluster-info > /dev/null 2>&1
        msg: "No cluster running. Run 'task cluster:create' first."
    cmds:
      - kubectl apply -f k3d/outline.yaml
      - |
        echo "Waiting for Outline..."
        kubectl rollout status deployment/outline -n workspace --timeout=180s
      - echo ""
      - echo "✓ Outline deployed"
      - 'echo "  URL: http://wiki.{{.DEV_DOMAIN}}"'

  outline:status:
    desc: Show Outline deployment status
    cmds:
      - kubectl get pods -l app=outline -o wide
      - kubectl get pvc outline-data

  outline:logs:
    desc: Tail Outline logs
    cmds:
      - kubectl logs deploy/outline -f --tail=50

  outline:teardown:
    desc: Remove Outline and its data
    prompt: "This will delete Outline and all wiki data. Continue?"
    cmds:
      - kubectl delete -f k3d/outline.yaml --ignore-not-found
      - echo "✓ Outline removed"

  website:webhook:setup:
    desc: Create Mattermost "anfragen" channel and configure webhook for the website
    preconditions:
      - sh: kubectl cluster-info > /dev/null 2>&1
        msg: "No cluster running. Run 'task cluster:create' first."
      - sh: kubectl get deployment mattermost -n workspace > /dev/null 2>&1
        msg: "Mattermost not deployed."
    cmds:
      - |
        NAMESPACE="workspace"
        MM_URL=$(kubectl exec -n "${NAMESPACE}" deploy/mattermost -- \
          printenv MM_SERVICESETTINGS_SITEURL 2>/dev/null || echo "http://chat.localhost")

        echo "=== Website Webhook Setup ==="
        echo "  Mattermost: ${MM_URL}"

        # Get first team
        TEAM=$(kubectl exec -n "${NAMESPACE}" deploy/mattermost -- \
          mmctl --local team list --json 2>/dev/null | \
          python3 -c "import sys,json; print(json.load(sys.stdin)[0]['name'])")
        echo "  Team: ${TEAM}"

        # Create anfragen channel if not exists
        CHANNEL_EXISTS=$(kubectl exec -n "${NAMESPACE}" deploy/mattermost -- \
          mmctl --local channel list "${TEAM}" --json 2>/dev/null | \
          python3 -c "
        import sys,json
        channels = json.load(sys.stdin)
        found = [c for c in channels if c.get('name') == 'anfragen']
        print('yes' if found else 'no')
        " 2>/dev/null || echo "no")

        if [ "${CHANNEL_EXISTS}" = "no" ]; then
          kubectl exec -n "${NAMESPACE}" deploy/mattermost -- \
            mmctl --local channel create \
              --team "${TEAM}" \
              --name "anfragen" \
              --display-name "Anfragen" \
              --purpose "Eingehende Kundenanfragen vom Website-Kontaktformular" \
              2>/dev/null
          echo "  Channel 'anfragen' created."
        else
          echo "  Channel 'anfragen' already exists."
        fi

        # Get channel ID
        CHANNEL_ID=$(kubectl exec -n "${NAMESPACE}" deploy/mattermost -- \
          mmctl --local channel list "${TEAM}" --json 2>/dev/null | \
          python3 -c "
        import sys,json
        channels = json.load(sys.stdin)
        ch = next(c for c in channels if c['name'] == 'anfragen')
        print(ch['id'])
        " 2>/dev/null)

        # Get admin user ID for webhook
        ADMIN_ID=$(kubectl exec -n "${NAMESPACE}" deploy/mattermost -- \
          mmctl --local user list --json 2>/dev/null | \
          python3 -c "
        import sys,json
        users = json.load(sys.stdin)
        admin = next((u['id'] for u in users if 'system_admin' in u.get('roles','')), users[0]['id'])
        print(admin)
        " 2>/dev/null)

        # Create incoming webhook
        WEBHOOK_ID=$(kubectl exec -n "${NAMESPACE}" deploy/mattermost -- \
          mmctl --local webhook create-incoming \
            --channel "${CHANNEL_ID}" \
            --user "${ADMIN_ID}" \
            --display-name "Website-Bot" \
            --description "Kontaktformular-Eingaenge von ${BRAND_NAME}" \
            --json 2>/dev/null | \
          python3 -c "import sys,json; d=json.load(sys.stdin); print(d['id'] if isinstance(d,dict) else d[0]['id'])" 2>/dev/null) || true

        if [ -n "${WEBHOOK_ID}" ]; then
          WEBHOOK_URL="${MM_URL}/hooks/${WEBHOOK_ID}"
          echo "  Webhook created: ${WEBHOOK_URL}"

          # Patch the website ConfigMap with the real webhook URL
          kubectl patch configmap website-config -n website \
            --type merge -p "{\"data\":{\"MATTERMOST_WEBHOOK_URL\":\"http://mattermost.workspace.svc.cluster.local:8065/hooks/${WEBHOOK_ID}\"}}" \
            2>/dev/null && echo "  ConfigMap patched with webhook URL" || echo "  (website not deployed yet — deploy first, then re-run)"

          # Restart website to pick up new config
          kubectl rollout restart deployment/website -n website 2>/dev/null || true
        else
          echo "  WARNING: Could not create webhook — may already exist."
          echo "  Check: kubectl exec -n workspace deploy/mattermost -- mmctl --local webhook list incoming"
        fi
      - echo ""
      - echo "✓ Webhook setup complete"

  # ─────────────────────────────────────────────
  # Cert-Manager — wildcard TLS via DNS-01/lego
  # ─────────────────────────────────────────────
  # ─────────────────────────────────────────────
  # DDNS Updater (optional — skip if static IP)
  # ─────────────────────────────────────────────
  ddns:deploy:
    desc: "Deploy DDNS updater CronJob (dynamic IP only). Usage: task ddns:deploy -- <ipv64-api-key>"
    preconditions:
      - sh: kubectl cluster-info > /dev/null 2>&1
        msg: "No cluster running."
      - sh: '[ -n "{{.CLI_ARGS}}" ]'
        msg: "Usage: task ddns:deploy -- <your-ipv64-api-key>"
    cmds:
      - |
        kubectl create secret generic ddns-ipv64-key \
          --namespace workspace \
          --from-literal=IPV64_API_KEY={{.CLI_ARGS}} \
          --dry-run=client -o yaml | kubectl apply -f -
      - kubectl apply -f prod/ddns-updater.yaml
      - echo "✓ DDNS updater deployed (runs every 5 min, only calls API on IP change)"

  ddns:trigger:
    desc: Manually trigger the DDNS updater once (force an immediate IP check)
    preconditions:
      - sh: kubectl cluster-info > /dev/null 2>&1
        msg: "No cluster running."
    cmds:
      - |
        kubectl create job ddns-manual-$(date +%s) \
          --from=cronjob/ddns-updater \
          -n workspace
      - echo "✓ Manual job created — run 'task ddns:status' to see result"

  ddns:status:
    desc: Show DDNS updater status and last known IP
    cmds:
      - kubectl get cronjob ddns-updater -n workspace 2>/dev/null || echo "(ddns-updater not deployed)"
      - 'kubectl get configmap ddns-last-ip -n workspace -o jsonpath=''Last known IP: {.data.ip}{"\n"}'' 2>/dev/null || true'
      - kubectl get jobs -n workspace -l job-name --sort-by=.metadata.creationTimestamp 2>/dev/null | tail -5

  ddns:teardown:
    desc: Remove the DDNS updater (keeps cert-manager and TLS certs intact)
    prompt: "Remove the DDNS updater CronJob and its secret?"
    cmds:
      - kubectl delete -f prod/ddns-updater.yaml --ignore-not-found
      - kubectl delete secret ddns-ipv64-key -n workspace --ignore-not-found
      - echo "✓ DDNS updater removed"

  cert:install:
    desc: Install cert-manager + lego DNS-01 webhook for wildcard certs
    preconditions:
      - sh: kubectl cluster-info > /dev/null 2>&1
        msg: "No cluster running. Run 'task cluster:create' first."
    cmds:
      # Install cert-manager
      - helm repo add jetstack https://charts.jetstack.io --force-update
      - helm repo update
      - |
        helm upgrade --install cert-manager jetstack/cert-manager \
          --namespace cert-manager --create-namespace \
          --set crds.enabled=true \
          --wait --timeout=180s
      # Install cert-manager-lego-webhook
      - helm repo add cert-manager-lego-webhook https://yxwuxuanl.github.io/cert-manager-lego-webhook/ --force-update
      - helm repo update
      - |
        helm upgrade --install cert-manager-lego-webhook cert-manager-lego-webhook/cert-manager-lego-webhook \
          --namespace cert-manager \
          --set certManager.namespace=cert-manager \
          --set certManager.serviceAccountName=cert-manager \
          --wait --timeout=120s
      - echo "✓ cert-manager + lego webhook installed"
      - 'echo "Next: run ''task cert:secret -- <your-ipv64-api-key>'' to store credentials"'

  cert:secret:
    desc: "Store the ipv64 API key as a Secret (usage: task cert:secret -- <API_KEY>)"
    preconditions:
      - sh: kubectl cluster-info > /dev/null 2>&1
        msg: "No cluster running."
      - sh: '[ -n "{{.CLI_ARGS}}" ]'
        msg: "Usage: task cert:secret -- <your-ipv64-api-key>"
    cmds:
      - |
        kubectl create secret generic ipv64-api-key \
          --namespace cert-manager \
          --from-literal=IPV64_API_KEY={{.CLI_ARGS}} \
          --dry-run=client -o yaml | kubectl apply -f -
      - |
        kubectl create secret generic ipv64-api-key \
          --namespace workspace \
          --from-literal=IPV64_API_KEY={{.CLI_ARGS}} \
          --dry-run=client -o yaml | kubectl apply -f -
      - |
        kubectl set env deployment/cert-manager-lego-webhook \
          -n cert-manager --from=secret/ipv64-api-key
      - echo "✓ Secret 'ipv64-api-key' created/updated in cert-manager + workspace namespaces"

  cert:status:
    desc: Show wildcard certificate and ClusterIssuer status
    cmds:
      - kubectl get clusterissuer letsencrypt-prod -o wide
      - kubectl get certificate workspace-wildcard -n workspace -o wide
      - kubectl get certificaterequest -n workspace
      - kubectl get order -n workspace 2>/dev/null || true

  docs:publish-api:
    desc: Publish OpenAPI spec to GitBook
    preconditions:
      - sh: command -v gitbook
        msg: 'GitBook CLI not installed. Run: npm install -g @gitbook/cli'
      - sh: '[ -n "$GITBOOK_TOKEN" ]'
        msg: 'GITBOOK_TOKEN not set. Export it first.'
    cmds:
      - >-
        gitbook openapi publish
        --spec kore-api
        --organization mjo8q7Mosz36nIJUksYd
        docs/api/kore-api.yaml
      - echo '✓ API spec published to GitBook'
