# https://taskfile.dev
version: "3"

includes:
  assets:
    taskfile: ./Taskfile.assets.yml
    dir: .
  llm:
    taskfile: ./Taskfile.llm.yml
    dir: .
  # dev.mentolder.de — persistent staging stack via k3d on WSL host (context: k3d-mentolder-dev).
  # See Taskfile.dev-stack.yml + docs/dev-stack/README.md.
  dev:
    taskfile: ./Taskfile.dev-stack.yml
    dir: .
  # dev.korczewski.de — persistent staging stack on PK-L-1 (local WSL2).
  dev-korczewski:
    taskfile: ./Taskfile.dev-stack.yml
    dir: .
    vars:
      ENV: korczewski
      CTX_DEV: k3d-korczewski-dev
      CTX_PROD: fleet
      NS_DEV: workspace-korczewski-dev
      NS_PROD: workspace-korczewski
      CLUSTER_NAME: korczewski-dev
  # Staging on-demand — per-branch isolated k3d namespaces.
  # See Taskfile.staging.yml + docs/superpowers/specs/2026-06-11-staging-on-demand-design.md.
  staging:
    taskfile: ./Taskfile.staging.yml
    dir: .
  # dev.mentolder.de — DECOMMISSIONED devc HA k3s taskfile kept for reference (dead context).
  # The 3-node devc k3s cluster was shelved 2026-05-30. Dev runs via local k3d.
  devcluster:
    taskfile: ./Taskfile.devcluster.yml
    dir: .
  # brainstorm.mentolder.de — reverse-SSH-tunnel broker (sish) for the
  # brainstorming visual companion. See Taskfile.brainstorm.yml.
  brainstorm:
    taskfile: ./Taskfile.brainstorm.yml
    dir: .

  # Active Sessions Hub — register/list local dev sessions for the Mediaviewer.
  # See Taskfile.session.yml + scripts/session-hub.sh.
  session:
    taskfile: ./Taskfile.session.yml
    dir: .

  # OpenClaw — personal AI assistant gateway on the WSL host.
  # See Taskfile.openclaw.yml + openclaw/README.md.
  openclaw:
    taskfile: ./Taskfile.openclaw.yml
    dir: .
  # Cross-harness agent infrastructure (MCP servers, etc.) shared by every
  # agent harness in this repo — Claude Code, opencode, Hermes. See Taskfile.agents.yml.
  agents:
    taskfile: ./Taskfile.agents.yml
    dir: .
  # Software Factory — Phase 1 pipeline documentation wrapper.
  # See scripts/factory/pipeline.js + docs/superpowers/references/factory-usage.md.
  factory:
    taskfile: ./Taskfile.factory.yml
    dir: .

  # Task Master AI — task management CLI integration
  taskmaster:
    taskfile: ./Taskfile.taskmaster.yml
    dir: .

  # Brain-Quartz Wiki — initial ingest worklist (T001570).
  # See Taskfile.brain.yaml + scripts/brain-ingest-worklist.sh.
  brain:
    taskfile: ./Taskfile.brain.yaml
    dir: .

vars:
  CLUSTER_NAME: korczewski
  REGISTRY: localhost:5000
  DEV_DOMAIN: localhost

tasks:
  # ════════════════════════════════════════════════════════════════════
  # Common workflows — start here
  # ════════════════════════════════════════════════════════════════════
  # These fan out across BOTH prod clusters (mentolder + korczewski) so
  # every-day work is one command. Pass ENV=mentolder or ENV=korczewski to
  # target a single environment with the underlying `workspace:*` /
  # `website:*` / `brett:*` tasks.

  feature:deploy:
    desc: "Roll a code change to BOTH prod clusters (workspace:deploy + post-setup + verify on mentolder + korczewski)"
    cmds:
      - task: workspace:deploy:all-prods
      - task: workspace:post-setup:all-prods
      - task: workspace:verify:all-prods

  feature:website:
    desc: "Rebuild + redeploy the Astro website on BOTH prod clusters"
    cmds:
      - task: website:redeploy:all-prods

  feature:brett:
    desc: "Rebuild + redeploy brett on BOTH prod clusters"
    cmds:
      - task: brett:deploy:all-prods
  feature:promote:
    desc: "Promote a service dev → prod with Playwright smoke gate (SERVICE=website|brett|docs TARGET=mentolder|korczewski|both; prompts if unset)"
    interactive: true
    cmds:
      - bash scripts/feature-promote.sh

  health:
    desc: "Cross-cluster health check (status + connectivity + deployment verification)"
    cmds:
      - task: clusters:status
      - 'echo ""'
      - 'echo "─── HTTPS reachability ───"'
      - task: workspace:check-connectivity
        vars: { ENV: "mentolder" }
      - task: workspace:check-connectivity
        vars: { ENV: "korczewski" }
      - 'echo ""'
      - 'echo "─── Pod-to-pod & credential verification ───"'
      - task: workspace:verify:all-prods
      - 'echo ""'
      - 'echo "  Run `task workspace:check-updates ENV=mentolder` to inspect available image updates"'

  # ─────────────────────────────────────────────
  # Cluster Lifecycle
  # ─────────────────────────────────────────────
  cluster:create:
    desc: Create the k3d dev cluster with local registry
    preconditions:
      - sh: docker info > /dev/null 2>&1
        msg: "Docker is not running. Start Docker first."
      - sh: "k3d cluster list | grep -q {{.CLUSTER_NAME}} && exit 1 || exit 0"
        msg: "Cluster '{{.CLUSTER_NAME}}' already exists. Run 'task cluster:delete' first."
    cmds:
      - mkdir -p data
      - k3d cluster create --config k3d-config.yaml
      - kubectl wait --for=condition=Ready nodes --all --timeout=120s
      - echo "✓ Cluster '{{.CLUSTER_NAME}}' is ready"
      - kubectl get nodes -o wide

  cluster:delete:
    desc: Delete the k3d dev cluster and clean up
    prompt: "This will destroy the '{{.CLUSTER_NAME}}' cluster. Continue?"
    cmds:
      - k3d cluster delete {{.CLUSTER_NAME}}
      - echo "✓ Cluster '{{.CLUSTER_NAME}}' deleted"

  cluster:stop:
    desc: Stop the cluster (preserves state, frees resources)
    cmds:
      - k3d cluster stop {{.CLUSTER_NAME}}

  cluster:start:
    desc: Start a previously stopped cluster
    cmds:
      - k3d cluster start {{.CLUSTER_NAME}}
      - kubectl wait --for=condition=Ready nodes --all --timeout=120s

  cluster:status:
    desc: Show cluster status, nodes, and resource usage
    cmds:
      - echo "=== Cluster ==="
      - k3d cluster list
      - echo ""
      - echo "=== Nodes ==="
      - kubectl get nodes -o wide
      - echo ""
      - echo "=== Pods (all namespaces) ==="
      - kubectl get pods -A
      - echo ""
      - echo "=== Resource Usage ==="
      - docker stats --no-stream --format "table {{`{{.Name}}`}}\t{{`{{.CPUPerc}}`}}\t{{`{{.MemUsage}}`}}" $(docker ps -q --filter "label=app=k3d") 2>/dev/null || true

  dev:reset:
    desc: "One-Click-Reset des dev-k3d-Clusters (REBUILD=1 baut Images neu, CONFIRM=yes überspringt Prompt)"
    vars:
      REBUILD: '{{.REBUILD | default ""}}'
      CONFIRM: '{{.CONFIRM | default ""}}'
    cmds:
      - REBUILD={{.REBUILD}} CONFIRM={{.CONFIRM}} CLUSTER_NAME={{.CLUSTER_NAME}} bash scripts/dev-reset.sh

  dev:setup-signing:
    desc: "Configure local commit/tag signing (SSH key, G-SEC05 gate) — one-time per developer checkout"
    cmds:
      - bash scripts/setup-dev-env.sh {{.CLI_ARGS}}

  workspace:dsgvo-check:
    desc: Run DSGVO compliance verification (NFA-01 data sovereignty proof)
    vars:
      ENV: '{{.ENV | default "dev"}}'
    cmds:
      - |
        source scripts/env-resolve.sh "{{.ENV}}"
        CTX="${ENV_CONTEXT:-}"
        [ -n "$CTX" ] && export KUBECONFIG_CONTEXT="$CTX"
        KUBE_CONTEXT="${CTX}" bash scripts/dsgvo-compliance-check.sh

  # ─────────────────────────────────────────────
  # Ingress (k3s built-in Traefik)
  # ─────────────────────────────────────────────
  ingress:status:
    desc: Show Traefik ingress controller status (built into k3s)
    cmds:
      - kubectl get pods -n kube-system -l app.kubernetes.io/name=traefik
      - kubectl get svc -n kube-system traefik

  # ─────────────────────────────────────────────
  # Git Hooks & Workflow
  # ─────────────────────────────────────────────
  hooks:install:
    desc: Install git hooks (branch naming, kustomize validation, secret scanning)
    cmds:
      - git config core.hooksPath .githooks
      - echo '✓ Git hooks installed from .githooks/'
      - 'echo "  pre-commit:         blocks main commits, validates kustomize, scans secrets"'
      - 'echo "  prepare-commit-msg: auto-prefixes commit message from branch name"'

  opencode:sync-agents:
    desc: "Merge .opencode/agent-models.jsonc config into ~/.config/opencode/opencode.jsonc"
    cmds:
      - bash scripts/opencode-sync-agents.sh

  opencode:model-select:
    desc: "Interactive fzf picker to change agent models and sync them"
    cmds:
      - bash scripts/agent-model-select.sh

  # ─────────────────────────────────────────────
  # Configuration Management
  # ─────────────────────────────────────────────
  config:show:
    desc: "Show resolved config for an environment (usage: task config:show ENV=mentolder)"
    vars:
      ENV: '{{.ENV | default "dev"}}'
    cmds:
      - |
        source scripts/env-resolve.sh "{{.ENV}}"
        echo "  Environment:   {{.ENV}}"
        echo "  PROD_DOMAIN:   ${PROD_DOMAIN:-<not set>}"
        echo "  BRAND_NAME:    ${BRAND_NAME:-<not set>}"
        echo "  CONTACT_EMAIL: ${CONTACT_EMAIL:-<not set>}"
        echo "  DEV_DOMAIN:    {{.DEV_DOMAIN}}"
        echo ""
        echo "Production subdomains:"
        echo "  auth.${PROD_DOMAIN}    (Keycloak)"
        echo "  files.${PROD_DOMAIN}   (Nextcloud)"
        echo "  office.${PROD_DOMAIN}  (Collabora)"
        echo "  board.${PROD_DOMAIN}   (Whiteboard)"
        echo "  vault.${PROD_DOMAIN}   (Vaultwarden)"
        echo "  web.${PROD_DOMAIN}     (Website — Astro)"

  # ─────────────────────────────────────────────
  # Utilities
  # ─────────────────────────────────────────────
  registry:list:
    desc: List images in the local registry
    cmds:
      - curl -s http://{{.REGISTRY}}/v2/_catalog | python3 -m json.tool 2>/dev/null || echo "Registry empty or unavailable"

  shell:
    desc: Open a debug shell in the cluster
    cmds:
      - kubectl run debug --rm -it --image=busybox --restart=Never -- sh

  clean:
    desc: Full cleanup — delete cluster, prune Docker images
    prompt: "This will delete everything. Continue?"
    cmds:
      - k3d cluster delete {{.CLUSTER_NAME}} 2>/dev/null || true
      - docker image prune -f
      - docker volume prune -f
      - echo "✓ Cleaned up"

  # ─────────────────────────────────────────────
  # Testing (no cluster required)
  # ─────────────────────────────────────────────
  test:unit:
    desc: Run BATS unit tests (assertion lib, scripts, configs) in parallel
    cmds:
      - '[ -f ./tests/unit/lib/bats-core/bin/bats ] || git submodule update --init --recursive'
      - |
        JOBS=$(nproc 2>/dev/null || echo 2)
        ALL_FILES=$(find tests/unit -maxdepth 1 -name "*.bats" | sort)
        TEST_FILES=""
        for f in $ALL_FILES; do
          base=$(basename "$f" .bats)
          if ! grep -q "^$base$" tests/unit/.coverage-allowlist; then
            TEST_FILES="$TEST_FILES $f"
          fi
        done
        TEST_FILES="$TEST_FILES tests/unit/scripts/dev-reset.test.sh tests/spec/mcp-tooling.bats"
        ./tests/unit/lib/bats-core/bin/bats -j $JOBS --no-parallelize-within-files $TEST_FILES
      - bash tests/figure-pack-assets.test.sh
      - task: test:unit:coverage-guard


  test:unit:agent-push:
    internal: true
    cmds:
      - ./tests/unit/lib/bats-core/bin/bats tests/unit/agent-push.bats

  test:unit:sessions-purge:
