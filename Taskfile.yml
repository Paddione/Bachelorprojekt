      - ./tests/unit/lib/bats-core/bin/bats tests/unit/manifests.bats

  test:menu-gate:
    desc: Enforce admin-menu rules (R1, R2, R4, R5, R7)
    cmds:
      - bash scripts/admin-menu-gate.sh

  test:dry-run:
    desc: Dry-run key tasks to catch Taskfile syntax errors
    cmds:
      - |
        TASKS="workspace:deploy workspace:status workspace:teardown workspace:validate \
               workspace:post-setup config:show"
        FAIL=0
        for t in $TASKS; do
          (
            if task --dry "$t" > /dev/null 2>&1; then
              echo "  ✓ $t"
            else
              echo "  ✗ $t (dry-run failed)"
              touch .dry-run-fail
            fi
          ) &
        done
        wait
        if [[ -f .dry-run-fail ]]; then
          rm .dry-run-fail
          exit 1
        fi
        echo "Dry-run: All tasks parsed successfully"

  test:docs-gen:
    desc: "Run the docs-site generator unit tests + full-build smoke test (node:test)"
    cmds:
      # Fresh worktrees (scripts/worktree-create.sh) ship no root node_modules;
      # install lazily before any node script. No-op in CI / installed trees. [T000427]
      - '[ -d node_modules ] || npm ci'
      - node --test scripts/docs-gen/*.test.mjs

  test:agent-guide:
    desc: "Validate the AI-agent guide registry (unit tests + real registry + generated JSON freshness)"
    cmds:
      # The scripts below `import ... from 'yaml'` (root node_modules). A fresh
      # worktree has none, so install lazily first. No-op in CI / installed. [T000427]
      - '[ -d node_modules ] || npm ci'
      - node --test scripts/agent-guide/*.test.mjs
      - node scripts/agent-guide/validate.mjs
      - node scripts/gen-platform-descriptions.mjs
      - |
        git diff --exit-code website/src/lib/platform-descriptions.generated.json \
          || (echo "ERROR: platform-descriptions.generated.json is stale — run node scripts/gen-platform-descriptions.mjs and commit"; exit 1)
      - node scripts/agent-guide/emit-webapp.mjs
      - |
        git diff --exit-code website/src/lib/agent-guide.generated.json \
          || (echo "ERROR: agent-guide.generated.json is stale — run 'task agent-guide:emit' and commit"; exit 1)

  test:code-quality:
    desc: "Run the code-quality gate + registry unit tests (node:test)"
    cmds:
      # These tests import the bare `yaml` specifier (via load.mjs) and invoke
      # node_modules/.bin/madge. A fresh worktree (scripts/worktree-create.sh)
      # ships no root node_modules, and go-task runs test:all deps concurrently,
      # so install lazily first. No-op in CI / installed trees. [T000427]
      - '[ -d node_modules ] || npm ci'
      - node --test scripts/code-quality/*.test.mjs scripts/code-quality/gates/*.test.mjs


  test:factory:
    desc: "Run the offline-safe Software Factory regression bats (tests/local/FA-SF-* + FA-AR-*). Live-DB cases skip without a reachable cluster, so this is CI-safe."
    cmds:
      - '[ -f ./tests/unit/lib/bats-core/bin/bats ] || git submodule update --init --recursive'
      - ./tests/unit/lib/bats-core/bin/bats tests/local/FA-SF-*.bats tests/local/FA-AR-*.bats

  test:spec:build-mcp-runner:
    cmds:
      - |
        # tests/spec/mcp-task-runner.bats invokes the compiled binary at
        # /usr/local/bin/mcp-task-runner directly — nothing else in the repo
        # builds/installs it, so rebuild it fresh here (best-effort: on hosts
        # where /usr/local/bin isn't writable, e.g. a locked-down dev box, fall
        # back to whatever is already installed there). [T001533]
        if command -v go >/dev/null 2>&1; then
          TMP_BIN="$(mktemp -d)/mcp-task-runner"
          if (cd mcp-task-runner && go build -o "$TMP_BIN" .); then
            if install -m 0755 "$TMP_BIN" /usr/local/bin/mcp-task-runner 2>/dev/null; then
              echo "mcp-task-runner: installed fresh build to /usr/local/bin"
            elif sudo -n install -m 0755 "$TMP_BIN" /usr/local/bin/mcp-task-runner 2>/dev/null; then
              echo "mcp-task-runner: installed fresh build to /usr/local/bin (sudo)"
            else
              echo "mcp-task-runner: /usr/local/bin not writable — using pre-installed binary if present"
            fi
          else
            echo "mcp-task-runner: go build failed — using pre-installed binary if present"
          fi
        else
          echo "mcp-task-runner: go not found — using pre-installed binary if present"
        fi

  test:spec:
    desc: "Run the offline-safe spec bats (tests/spec/*). Builds mcp-task-runner fresh if go is available (best-effort). Live-DB cases skip without a reachable cluster, so this is CI-safe."
    cmds:
      - '[ -f ./tests/unit/lib/bats-core/bin/bats ] || git submodule update --init --recursive'
      - task: test:spec:build-mcp-runner
      - ./tests/unit/lib/bats-core/bin/bats -j $(nproc 2>/dev/null || echo 2) --no-parallelize-within-files tests/spec/*.bats

  test:mcp-tooling:
    desc: "Guardrail: ticket-mcp tools <-> mcp-tool-guide.md <-> skill-critical verbs (hard)"
    cmds:
      - ./tests/unit/lib/bats-core/bin/bats tests/spec/mcp-tooling.bats

  test:agent-library:
    desc: "Guardrail: .claude/agents/*.md <-> AGENTS.md routing-table library assertions"
    cmds:
      - ./tests/unit/lib/bats-core/bin/bats tests/spec/agent-library.bats

  test:openspec:
    desc: "Validate the openspec/ change tree is OpenSpec-format-conformant (fail-closed CI gate, TypeScript/Vitest)."
    cmds:
      - '[ -d node_modules ] || npm ci'
      - npm run test:openspec

  test:unit:openspec:
    internal: true
    cmds:
      - ./tests/unit/lib/bats-core/bin/bats tests/unit/openspec.bats

  openspec:propose:
    desc: "Create an openspec change skeleton. Usage: task openspec:propose -- <slug> --ticket <ext-id>"
    cmds:
      - bash scripts/openspec.sh propose {{.CLI_ARGS}}
  openspec:apply:
    desc: "Mark an openspec change implementable. Usage: task openspec:apply -- <slug>"
    cmds:
      - bash scripts/openspec.sh apply {{.CLI_ARGS}}
  openspec:archive:
    desc: "Archive a done change + merge its delta into the SSOT. Usage: task openspec:archive -- <slug>"
    cmds:
      - bash scripts/openspec.sh archive {{.CLI_ARGS}}
  openspec:embed:backfill:
    desc: "Re-index all active openspec changes (status planning|plan_staged) into pgvector. Usage: task openspec:embed:backfill [-- --dry-run]"
    cmds:
      - |
        set -e
        for d in openspec/changes/*/; do
          slug="$(basename "$d")"
          [ "$slug" = "archive" ] && continue
          [ -f "$d/tasks.md" ] || continue
          st="$(sed -n 's/^status:[[:space:]]*//p' "$d/tasks.md" | head -1)"
          case "$st" in planning|plan_staged) ;; *) continue ;; esac
          echo "backfill: $slug (status=$st)"
          node scripts/openspec-embed.mjs --slug "$slug" {{.CLI_ARGS}}
        done
  openspec:validate:
    desc: "Validate the openspec/ tree (same as test:openspec)."
    cmds:
      - task: test:openspec
  openspec:header-inject:
    desc: "Bulk-add ## Purpose + ## Requirements H2 headers to SSOT specs under openspec/specs/. Usage: task openspec:header-inject [-- --dry-run]"
    cmds:
      - bash scripts/openspec-header-inject.sh {{.CLI_ARGS}} openspec/specs/
  openspec:ci-telemetry-optout:
    desc: "Add OPENSPEC_TELEMETRY: '0' to every .github/workflows/*.yml that lacks it. Usage: task openspec:ci-telemetry-optout [-- --dry-run]"
    cmds:
      - python3 scripts/openspec-telemetry-optout.py {{.CLI_ARGS}} .github/workflows/*.yml .github/workflows/*.yaml

  test:agent-lock:
    desc: "Run the offline agent-lock session-coordination bats (tests/local/AGENT-LOCK-*)."
    cmds:
      - '[ -f ./tests/unit/lib/bats-core/bin/bats ] || git submodule update --init --recursive'
      - ./tests/unit/lib/bats-core/bin/bats tests/local/AGENT-LOCK-*.bats

  test:all:
    desc: "Run tests for changed files only (smart selection) — delegates to test:changed"
    cmds:
      - task: test:changed

  test:changed:
    desc: "Run only tests relevant to changed files (smart selection: vitest --changed + domain BATS + quality)"
    cmds:
      - |
        set -e
        CHANGED=$(git diff --name-only HEAD origin/main 2>/dev/null || git diff --name-only HEAD 2>/dev/null || true)
        RUN_WEBSITE=false; RUN_MENTOLDER_WEB=false; RUN_K8S=false; RUN_SCRIPTS=false; RUN_FACTORY=false; RUN_SPEC=false; RUN_UNIT=false; RUN_MCP=false; RUN_OPENSPEC=false; RUN_AGENTS=false
        echo "$CHANGED" | grep -qE "^website/" && RUN_WEBSITE=true || true
        echo "$CHANGED" | grep -qE "^mentolder-web/" && RUN_MENTOLDER_WEB=true || true
        echo "$CHANGED" | grep -qE "^(k3d/|prod|prod-fleet|prod-mentolder|prod-korczewski|environments/)" && RUN_K8S=true || true
        echo "$CHANGED" | grep -qE "^scripts/" && RUN_SCRIPTS=true || true
        echo "$CHANGED" | grep -qE "^(scripts/factory/|tests/local/FA-)" && RUN_FACTORY=true || true
        echo "$CHANGED" | grep -qE "^tests/spec/" && RUN_SPEC=true || true
        echo "$CHANGED" | grep -qE "^(tests/unit/|\.bats)" && RUN_UNIT=true || true
        echo "$CHANGED" | grep -qE "^(\.claude/skills/|\.mcp\.json|\.opencode/|tests/spec/mcp-tooling\.bats|scripts/ticket-mcp/)" && RUN_MCP=true || true
        echo "$CHANGED" | grep -qE "^(\.claude/agents/|AGENTS\.md)" && RUN_AGENTS=true || true
        echo "$CHANGED" | grep -qE "^openspec/" && RUN_OPENSPEC=true || true
        echo "$CHANGED" | grep -qE "^website/(src|pages|components|layouts|lib)/" && RUN_E2E_WEBSITE=true || true
        echo "$CHANGED" | grep -qE "^brett/(src|app|components|lib)/" && RUN_E2E_BRETT=true || true
        echo "$CHANGED" | grep -qE "^(k3d/|environments/|VideoVault/)" && RUN_E2E_SERVICES=true || true
        echo "$CHANGED" | grep -qE "(korczewski)" && RUN_E2E_KORCZEWSKI=true || true
        if [ "$RUN_WEBSITE" = "true" ] && command -v pnpm >/dev/null 2>&1; then echo "→ website changes: pnpm vitest run --changed"; (cd website && pnpm vitest run --changed --reporter verbose); fi
        if [ "$RUN_MENTOLDER_WEB" = "true" ] && command -v pnpm >/dev/null 2>&1; then echo "→ mentolder-web changes: pnpm --filter mentolder-web test"; pnpm --filter mentolder-web test; fi
        if [ "$RUN_K8S" = "true" ]; then echo "→ k8s changes: task test:manifests"; task test:manifests; fi
        
        JOBS=$(nproc 2>/dev/null || echo 2)
        if [ "$RUN_SCRIPTS" = "true" ] || [ "$RUN_UNIT" = "true" ]; then
          echo "→ running changed unit tests in parallel"
          CHANGED_FILES=$(bash scripts/find-changed-tests.sh unit)
          if [ -n "$CHANGED_FILES" ]; then
            ./tests/unit/lib/bats-core/bin/bats -j $JOBS --no-parallelize-within-files $CHANGED_FILES
          else
            echo "No matching unit tests found for changes."
          fi
          if echo "$CHANGED" | grep -qE "^(tests/figure-pack-assets|assets/)"; then
            bash tests/figure-pack-assets.test.sh
          fi
          bash scripts/tests/unit-coverage-guard.sh
        fi
        
        if [ "$RUN_SPEC" = "true" ]; then
          echo "→ spec changes: running changed spec tests in parallel"
          task test:spec:build-mcp-runner
          CHANGED_FILES=$(bash scripts/find-changed-tests.sh spec)
          if [ -n "$CHANGED_FILES" ]; then
            ./tests/unit/lib/bats-core/bin/bats -j $JOBS --no-parallelize-within-files $CHANGED_FILES
          else
            echo "No matching spec tests found for changes."
          fi
        fi

        if [ "$RUN_FACTORY" = "true" ]; then echo "→ factory changes: task test:factory"; task test:factory; fi
        if [ "$RUN_MCP" = "true" ] && [ "$RUN_SCRIPTS" = "false" ] && [ "$RUN_UNIT" = "false" ]; then echo "→ MCP tooling guardrail"; task test:mcp-tooling; fi
        if [ "$RUN_AGENTS" = "true" ]; then echo "→ agent library changes: task test:agent-library"; task test:agent-library; fi
        if [ "$RUN_OPENSPEC" = "true" ]; then echo "→ openspec changes: task test:openspec"; task test:openspec; fi

        if [ "$RUN_E2E_WEBSITE" = "true" ] && command -v npx >/dev/null 2>&1; then echo "→ e2e website changes: task test:e2e:website"; task test:e2e:website; fi
        if [ "$RUN_E2E_SERVICES" = "true" ] && command -v npx >/dev/null 2>&1; then echo "→ e2e services changes: task test:e2e:services"; task test:e2e:services; fi
        if [ "$RUN_E2E_BRETT" = "true" ] && command -v npx >/dev/null 2>&1; then echo "→ e2e brett changes: task test:e2e:brett"; task test:e2e:brett; fi
        if [ "$RUN_E2E_KORCZEWSKI" = "true" ] && command -v npx >/dev/null 2>&1; then echo "→ e2e korczewski changes: task test:e2e:korczewski"; task test:e2e:korczewski; fi

        if [ "$RUN_WEBSITE" = "false" ] && [ "$RUN_MENTOLDER_WEB" = "false" ] && [ "$RUN_K8S" = "false" ] && [ "$RUN_SCRIPTS" = "false" ] && [ "$RUN_FACTORY" = "false" ] && [ "$RUN_SPEC" = "false" ] && [ "$RUN_UNIT" = "false" ] && [ "$RUN_MCP" = "false" ] && [ "$RUN_AGENTS" = "false" ] && [ "$RUN_OPENSPEC" = "false" ] && [ "$RUN_E2E_WEBSITE" = "false" ] && [ "$RUN_E2E_SERVICES" = "false" ] && [ "$RUN_E2E_BRETT" = "false" ] && [ "$RUN_E2E_KORCZEWSKI" = "false" ]; then
          if command -v pnpm >/dev/null 2>&1; then echo "→ no domain-specific changes: vitest --changed"; (cd website && pnpm vitest run --changed --reporter verbose); fi
        fi
        echo "→ quality gate (always)"; task test:code-quality

  test:api-auth:
    desc: "API auth coverage gate — every endpoint must be classified; public endpoints need an allowlist entry"
    cmds:
