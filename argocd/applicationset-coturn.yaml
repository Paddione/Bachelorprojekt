# Separate ApplicationSet for the coturn-stack (TURN + Janus SFU).
#
# Lives in its own ArgoCD Application because the coturn-stack manifests
# install into the privileged `coturn` namespace, which is incompatible
# with the workspace AppSet's `namespace: workspace` kustomize directive
# (the namespace transformer would rename the cluster-scoped Namespace
# resource and produce a name conflict).
#
# Cluster targeting and per-cluster substitutions reuse the same
# annotations as the main `workspace` ApplicationSet.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: workspace-coturn
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            workspace: "true"
            workspace-coturn: "true"

  template:
    metadata:
      name: "workspace-coturn-{{name}}"
      annotations:
        argocd.argoproj.io/sync-wave: "0"
    spec:
      project: workspace

      source:
        repoURL: https://github.com/Paddione/Bachelorprojekt
        targetRevision: main
        path: k3d/coturn-stack

        plugin:
          name: kustomize-envsubst
          env:
            - name: PROD_DOMAIN
              value: "{{metadata.annotations.workspace-domain}}"
            - name: TURN_PUBLIC_IP
              value: "{{metadata.annotations.workspace-turn-ip}}"
            - name: TURN_NODE
              value: "{{metadata.annotations.workspace-turn-node}}"

      destination:
        server: "{{server}}"
        namespace: coturn

      # The coturn-secrets Secret carries placeholders in git and is
      # populated on the live cluster by the SealedSecret controller
      # (prod) or `task workspace:coturn:sync-secret` (bootstrap).
      # ArgoCD skips the Secret entirely via `Skip=true` on the resource
      # itself (see k3d/coturn-stack/secret.yaml); these ignoreDifferences
      # entries remain as belt-and-braces for any drift-detection UI.
      ignoreDifferences:
        - group: ""
          kind: Secret
          name: coturn-secrets
          namespace: coturn
          jsonPointers:
            - /data/TURN_SECRET
            - /data/SIGNALING_SECRET

      syncPolicy:
        automated:
          prune: false
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
