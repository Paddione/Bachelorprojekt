# ═══════════════════════════════════════════════════════════════════
# workspace-office ApplicationSet — Collabora Online
# ═══════════════════════════════════════════════════════════════════
# Lives in its own ArgoCD Application because Collabora runs in the
# privileged `workspace-office` namespace (needed for CAP_SYS_ADMIN +
# MKNOD so coolwsd can bind-mount its document jails). Keeping it in
# a separate AppSet matches the coturn-stack pattern and scopes the
# privilege escalation to a single workload.
#
# Cluster targeting and per-cluster substitutions reuse the same
# annotations as the main `workspace` ApplicationSet. Values are
# derived from `workspace-domain` and `workspace-tls-secret` via
# envsubst at sync time.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: workspace-office
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            workspace: "true"

  template:
    metadata:
      name: "workspace-office-{{name}}"
      annotations:
        argocd.argoproj.io/sync-wave: "1"
    spec:
      project: workspace

      source:
        repoURL: https://github.com/Paddione/Bachelorprojekt
        targetRevision: main
        path: k3d/office-stack

        plugin:
          name: kustomize-envsubst
          env:
            - name: PROD_DOMAIN
              value: "{{metadata.annotations.workspace-domain}}"
            - name: COLLABORA_HOST
              value: "office.{{metadata.annotations.workspace-domain}}"
            - name: COLLABORA_ALIASGROUP1
              value: "https://files.{{metadata.annotations.workspace-domain}}"
            - name: COLLABORA_SERVER_NAME
              value: "office.{{metadata.annotations.workspace-domain}}"
            - name: COLLABORA_SSL_TERMINATION
              value: "true"
            - name: COLLABORA_TLS_SECRET
              value: "{{metadata.annotations.workspace-tls-secret}}"

      destination:
        server: "{{server}}"
        namespace: workspace-office

      syncPolicy:
        automated:
          prune: false
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true

      # The collabora-secrets Secret carries a placeholder in git and is
      # managed on the live cluster by the SealedSecrets controller via the
      # environments/sealed-secrets/<env>.yaml block (applied by workspace:deploy).
      # Never sync its /data from git.
      ignoreDifferences:
        - group: ""
          kind: Secret
          name: collabora-secrets
          jsonPointers:
            - /data
            - /stringData
