# Config Management Plugin: kustomize-envsubst
# Wraps `kustomize build | envsubst` so ArgoCD can process overlays
# that use ${VARIABLE} placeholders. Env vars are passed per-Application
# via spec.source.plugin.env in the ApplicationSet template.
apiVersion: v1
kind: ConfigMap
metadata:
  name: cmp-kustomize-envsubst
data:
  plugin.yaml: |
    apiVersion: argoproj.io/v1alpha1
    kind: ConfigManagementPlugin
    metadata:
      name: kustomize-envsubst
    spec:
      allowConcurrency: true
      discover:
        find:
          glob: "**/kustomization.yaml"
      generate:
        command: [sh, -c]
        args:
          - |
            # Export all ARGOCD_ENV_* vars without the prefix and build a
            # whitelist for envsubst. The whitelist is essential: bare
            # `envsubst` would also replace shell variables that legitimately
            # appear in manifests (e.g. `${ARCH}` inside an inline pod
            # script), substituting them with empty string and breaking
            # the affected workloads.
            WHITELIST=""
            for var in $(env | grep ^ARGOCD_ENV_ | cut -d= -f1); do
              name="${var#ARGOCD_ENV_}"
              export "$name=$(printenv "$var")"
              WHITELIST="$WHITELIST \${$name}"
            done
            # --load-restrictor=LoadRestrictionsNone is required because the
            # k3d/ base reads the `art-library` ConfigMap files from
            # ../art-library/sets/<brand>/, which lives outside the kustomize
            # root. Without this flag kustomize aborts with a security error
            # and the plugin returns zero output, leaving every Application
            # OutOfSync with all 150+ resources flagged requiresPruning.
            kustomize build --load-restrictor=LoadRestrictionsNone . | envsubst "$WHITELIST"
      lockRepo: false
