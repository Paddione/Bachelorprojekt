# Exposes ArgoCD web UI at argocd.${PROD_DOMAIN}.
# TLS secret is reflected from workspace/workspace-wildcard-tls by reflector.
# ArgoCD server runs in --insecure mode; Traefik terminates TLS.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress
  namespace: argocd
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: "workspace-redirect-https@kubernetescrd,workspace-hsts-headers@kubernetescrd"
spec:
  tls:
    - hosts:
        - argocd.${PROD_DOMAIN}
      secretName: workspace-wildcard-tls
  rules:
    - host: argocd.${PROD_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
