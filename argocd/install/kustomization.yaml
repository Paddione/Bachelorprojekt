apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd

resources:
  # Namespace first
  - namespace.yaml
  # Official ArgoCD install (non-HA). Pin to a specific release.
  # To upgrade: change the version tag and run: task argocd:install
  - https://raw.githubusercontent.com/argoproj/argo-cd/v2.13.3/manifests/install.yaml
  # CMP plugin ConfigMap (plugin.yaml content for kustomize-envsubst sidecar)
  - cmp-plugin.yaml
  # Ingress (cert-manager Certificate + Traefik Ingress)
  - ingress.yaml

patches:
  # Add kustomize-envsubst CMP sidecar to repo-server
  - path: patch-repo-server.yaml
  # Run argocd-server in HTTP (insecure) mode — Traefik handles TLS
  - path: patch-argocd-server.yaml
