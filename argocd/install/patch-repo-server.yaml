# Strategic merge patch: adds CMP sidecar + init container to argocd-repo-server.
# Uses the ArgoCD image (Ubuntu/glibc) for the init container so that kustomize
# and envsubst binaries are ABI-compatible with the sidecar image.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-repo-server
spec:
  template:
    spec:
      # Pin to Hetzner nodes. Home workers (k3s-1/2/3, k3w-1/2/3) sit behind
      # the WireGuard CNI partition and cannot reach CoreDNS, so apt-get in
      # the install-cmp-tools init container hangs forever on DNS.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - gekko-hetzner-2
                      - gekko-hetzner-3
                      - gekko-hetzner-4
                      - pk-hetzner
                      - pk-hetzner-2
                      - pk-hetzner-3
      volumes:
        - name: custom-tools
          emptyDir: {}
        - name: cmp-plugin-config
          configMap:
            name: cmp-kustomize-envsubst
        - name: cmp-tmp
          emptyDir: {}
      initContainers:
        - name: install-cmp-tools
          # Must use the same glibc-based image as the sidecar to avoid
          # musl/glibc binary incompatibility with envsubst.
          image: quay.io/argoproj/argocd:v2.13.3
          # Run as root to install apt packages, then drop to 999 in the sidecar.
          securityContext:
            runAsUser: 0
          command: [sh, -c]
          args:
            - |
              set -e
              apt-get update -qq 2>/dev/null
              apt-get install -y -qq gettext-base 2>/dev/null
              cp /usr/bin/envsubst /custom-tools/envsubst
              cp /usr/local/bin/kustomize /custom-tools/kustomize
              echo "Installed tools:"
              /custom-tools/envsubst --version 2>&1 || true
              /custom-tools/kustomize version 2>&1 | head -1 || true
          volumeMounts:
            - name: custom-tools
              mountPath: /custom-tools
      containers:
        - name: cmp-kustomize-envsubst
          # argocd-cmp-server binary is bind-mounted from the main container
          # via the var-files volume (populated by argocd-repo-server entrypoint).
          command: [/var/run/argocd/argocd-cmp-server]
          image: quay.io/argoproj/argocd:v2.13.3
          env:
            - name: PATH
              value: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/custom-tools
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - mountPath: /var/run/argocd
              name: var-files
            - mountPath: /home/argocd/cmp-server/plugins
              name: plugins
            - mountPath: /home/argocd/cmp-server/config/plugin.yaml
              subPath: plugin.yaml
              name: cmp-plugin-config
            - mountPath: /tmp
              name: cmp-tmp
            - mountPath: /custom-tools
              name: custom-tools
