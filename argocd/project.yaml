apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: workspace
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "Workspace MVP — self-hosted collaboration platform (Bachelorprojekt)"

  # Only deploy from this repository
  sourceRepos:
    - https://github.com/Paddione/Bachelorprojekt

  # Allow deployment to any registered cluster in these namespaces
  destinations:
    - namespace: workspace
      server: "*"
    - namespace: workspace-office
      server: "*"
    - namespace: coturn
      server: "*"
    - namespace: website
      server: "*"
    - namespace: monitoring
      server: "*"
    - namespace: kube-system
      server: "*"
    - namespace: cert-manager
      server: "*"

  # Allow cluster-scoped resources (ClusterIssuer, CRDs, etc.)
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"

  # Allow all namespace-scoped resources
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  # Warn in the UI when resources exist in the cluster but not in git
  orphanedResources:
    warn: true

  roles:
    - name: admin
      description: Full access to workspace project
      policies:
        - p, proj:workspace:admin, applications, *, workspace/*, allow
      groups:
        - workspace-admins
