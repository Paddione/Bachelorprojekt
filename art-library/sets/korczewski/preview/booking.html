<!doctype html>
<html><head><meta charset="utf-8"><title>Booking Slots</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../styles/website.css">
<style>
  body{background:var(--ink-900); padding:18px 24px;}
  body::before{display:none;}
  .booker{padding:24px; border:1px solid var(--line); border-radius:16px;
    background: linear-gradient(180deg, var(--ink-850), var(--ink-800));
    position:relative; overflow:hidden;}
  .booker::after{content:""; position:absolute; inset:0; pointer-events:none;
    background: radial-gradient(75% 60% at 100% 0%, rgba(200,247,106,.10), transparent 60%);}
  .booker > *{position:relative;}
  .lab{font-family:var(--mono); font-size:10.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--copper);}
  .slots{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:14px;}
  .slot{display:flex; flex-direction:column; gap:3px; padding:10px 14px; border:1px solid var(--line-2); border-radius:12px; background: rgba(255,255,255,.02);}
  .slot.taken{opacity:.4;}
  .slot.sel{border-color:var(--copper); background:var(--copper-tint);}
  .day{font-family:var(--mono); font-size:9.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--mute);}
  .time{font-family:var(--serif); font-size:16px; color:var(--fg);}
</style></head>
<body>
  <div class="booker">
    <span class="lab">Next available</span>
    <div class="slots">
      <div class="slot"><span class="day">Tue 30</span><span class="time">10:00</span></div>
      <div class="slot taken"><span class="day">Tue 30</span><span class="time">14:00</span></div>
      <div class="slot sel"><span class="day">Wed 01</span><span class="time">09:30</span></div>
      <div class="slot"><span class="day">Thu 02</span><span class="time">15:00</span></div>
    </div>
  </div>
</body></html>
