<!doctype html>
<html><head><meta charset="utf-8"><title>Ink Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{background:var(--ink-900); padding:20px 24px; color:var(--fg); display:grid; grid-template-columns:repeat(5,1fr); gap:10px;}
  .sw{height:88px; border-radius:12px; padding:10px 12px; display:flex; flex-direction:column; justify-content:flex-end; border:1px solid var(--line);}
  .sw .n{font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--fg-soft);}
  .sw .h{font-family:var(--mono); font-size:9px; color:var(--mute); margin-top:2px;}
</style></head>
<body>
  <div class="sw" style="background:#120D1C;"><span class="n">ink-900</span><span class="h">#120D1C</span></div>
  <div class="sw" style="background:#1A1326;"><span class="n">ink-850</span><span class="h">#1A1326</span></div>
  <div class="sw" style="background:#221932;"><span class="n">ink-800</span><span class="h">#221932</span></div>
  <div class="sw" style="background:#2C2240;"><span class="n">ink-750</span><span class="h">#2C2240</span></div>
  <div class="sw" style="background:#3A2E52;"><span class="n">ink-700</span><span class="h">#3A2E52</span></div>
</body></html>
