<!doctype html>
<html><head><meta charset="utf-8"><title>Cyan + Paper</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{background:var(--ink-900); padding:20px 24px; color:var(--fg); display:grid; grid-template-columns:repeat(5,1fr); gap:10px;}
  .sw{height:96px; border-radius:12px; padding:12px; display:flex; flex-direction:column; justify-content:flex-end; border:1px solid var(--line);}
  .sw .n{font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase;}
  .sw .h{font-family:var(--mono); font-size:9px; opacity:.6; margin-top:2px;}
</style></head>
<body>
  <div class="sw" style="background:#5BD4D0; color:#0F2A2A;"><span class="n">teal / cyan</span><span class="h">#5BD4D0 · live</span></div>
  <div class="sw" style="background:#82E2DF; color:#0F2A2A;"><span class="n">teal-2</span><span class="h">#82E2DF</span></div>
  <div class="sw" style="background:#EDE6D8; color:#16101E;"><span class="n">paper</span><span class="h">#EDE6D8 · docs</span></div>
  <div class="sw" style="background:#E2DACA; color:#16101E;"><span class="n">paper-2</span><span class="h">#E2DACA</span></div>
  <div class="sw" style="background:#E26B6B; color:#3a0e0e;"><span class="n">fail</span><span class="h">#E26B6B</span></div>
</body></html>
