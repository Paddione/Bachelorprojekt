<!doctype html>
<html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{background:var(--ink-900); padding:18px 22px; color:var(--fg); display:grid; grid-template-columns:repeat(8,1fr); gap:8px; align-items:start;}
  .col{display:flex; flex-direction:column; align-items:center; gap:6px;}
  .b{
    width:100%; aspect-ratio:1/1; border-radius:14px;
    display:flex; align-items:center; justify-content:center;
    color:var(--copper);
    background:
      radial-gradient(60% 60% at 30% 20%, rgba(200,247,106,.18), transparent 60%),
      linear-gradient(180deg, var(--ink-800), var(--ink-850));
    border:1px solid var(--line-2);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    position:relative; overflow:hidden;
  }
  .b::after{
    content:""; position:absolute; inset:0; pointer-events:none;
    background: radial-gradient(40% 40% at 80% 90%, rgba(91,212,208,.10), transparent 60%);
  }
  .b svg{position:relative; z-index:1;}
  .b.solid{ background: var(--copper); color: var(--copper-deep); border-color: transparent; box-shadow: var(--inner-copper); }
  .b.cyan{ color: var(--teal); }
  .b.cyan::before{ content:""; position:absolute; inset:0; background: radial-gradient(60% 60% at 30% 20%, rgba(91,212,208,.18), transparent 60%); }
  .b.fail{ color:#E26B6B; }
  .lab{font-family:var(--mono); font-size:8.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--mute);}
  .b svg{stroke:currentColor; fill:none; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round;}
  .b.solid svg{stroke-width:1.7;}
</style></head>
<body>
  <div class="col"><div class="b"><img src="../assets/k8s-wheel.svg" width="30" height="30" style="filter:invert(85%) sepia(60%) saturate(500%) hue-rotate(20deg);"/></div><div class="lab">cluster</div></div>

  <div class="col"><div class="b"><svg width="30" height="30" viewBox="0 0 24 24"><path d="M12 2v6M12 16v6M2 12h6M16 12h6M5 5l4 4M15 15l4 4M5 19l4-4M15 9l4-4"/><circle cx="12" cy="12" r="3" fill="currentColor" stroke="none"/></svg></div><div class="lab">node</div></div>

  <div class="col"><div class="b"><svg width="30" height="30" viewBox="0 0 24 24"><path d="M21 21l-5-5M11 18a7 7 0 1 1 0-14 7 7 0 0 1 0 14z"/></svg></div><div class="lab">search</div></div>

  <div class="col"><div class="b solid"><svg width="30" height="30" viewBox="0 0 24 24"><path d="M5 12h14M13 5l7 7-7 7"/></svg></div><div class="lab">go</div></div>

</body></html>
