<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{background:var(--ink-900); color:var(--fg); padding:18px 24px; display:grid; grid-template-columns:repeat(6,1fr); gap:10px;}
  .b{aspect-ratio:1/1; background:var(--ink-800); border:1px solid var(--line-2); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:6px; gap:4px;}
  .lab{font-family:var(--mono); font-size:9.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--copper);}
  .v{font-family:var(--mono); font-size:9px; color:var(--mute);}
</style></head>
<body>
  <div class="b" style="border-radius:999px;"><span class="lab">pill</span><span class="v">999</span></div>
  <div class="b" style="border-radius:22px;"><span class="lab">tile</span><span class="v">22</span></div>
  <div class="b" style="border-radius:16px;"><span class="lab">card</span><span class="v">16</span></div>
  <div class="b" style="border-radius:10px;"><span class="lab">input</span><span class="v">10</span></div>
  <div class="b" style="border-radius:6px;"><span class="lab">chip</span><span class="v">6</span></div>
  <div class="b" style="border-radius:4px;"><span class="lab">paper</span><span class="v">4</span></div>
</body></html>
