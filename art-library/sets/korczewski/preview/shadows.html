<!doctype html>
<html><head><meta charset="utf-8"><title>Shadow / Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{background:var(--ink-900); color:var(--fg); padding:24px; display:grid; grid-template-columns:repeat(4,1fr); gap:18px;}
  .b{aspect-ratio:3/2; background:var(--ink-800); border:1px solid var(--line); border-radius:14px; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:8px; gap:6px;}
  .lab{font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--copper);}
  .v{font-family:var(--mono); font-size:9px; color:var(--mute); text-align:center;}
  .b1{box-shadow:var(--shadow-1);}
  .b2{box-shadow:var(--shadow-2);}
  .b3{box-shadow:inset 0 1px 0 var(--copper);}
  .b4{background:var(--copper); box-shadow:var(--inner-copper), 0 8px 16px -8px rgba(200,247,106,.45);}
  .b4 .lab{color:var(--copper-deep);}
  .b4 .v{color:var(--copper-deep); opacity:.6;}
</style></head>
<body>
  <div class="b b1"><span class="lab">shadow-1</span><span class="v">12px / -12 / .5</span></div>
  <div class="b b2"><span class="lab">shadow-2</span><span class="v">30px / -30 / .6</span></div>
  <div class="b b3"><span class="lab">inset lime</span><span class="v">stat-card top edge</span></div>
  <div class="b b4"><span class="lab">cta lift</span><span class="v">primary button</span></div>
</body></html>
