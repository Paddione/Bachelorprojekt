<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{background:var(--ink-900); color:var(--fg); padding:18px 24px; display:flex; flex-direction:column; gap:6px;}
  .row{display:grid; grid-template-columns:60px 1fr 60px; align-items:center; gap:12px; font-family:var(--mono); font-size:10.5px; color:var(--mute);}
  .bar{height:10px; background:var(--copper); border-radius:2px;}
  .v{text-align:right; color:var(--fg-soft);}
</style></head>
<body>
  <div class="row"><span>s-1</span><div class="bar" style="width:4px;"></div><span class="v">4px</span></div>
  <div class="row"><span>s-2</span><div class="bar" style="width:8px;"></div><span class="v">8px</span></div>
  <div class="row"><span>s-3</span><div class="bar" style="width:12px;"></div><span class="v">12px</span></div>
  <div class="row"><span>s-4</span><div class="bar" style="width:16px;"></div><span class="v">16px</span></div>
  <div class="row"><span>s-6</span><div class="bar" style="width:24px;"></div><span class="v">24px</span></div>
  <div class="row"><span>s-8</span><div class="bar" style="width:32px;"></div><span class="v">32px</span></div>
  <div class="row"><span>s-12</span><div class="bar" style="width:48px;"></div><span class="v">48px</span></div>
  <div class="row"><span>s-20</span><div class="bar" style="width:80px;"></div><span class="v">80px</span></div>
</body></html>
