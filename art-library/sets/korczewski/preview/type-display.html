<!doctype html>
<html><head><meta charset="utf-8"><title>Display Type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{background:var(--ink-900); color:var(--fg); padding:18px 28px;}
  .display{font-family:var(--serif); font-weight:400; font-size:64px; line-height:1.02; letter-spacing:-0.02em;}
  .display em{font-style:italic; color:var(--copper-2);}
  .meta{font-family:var(--mono); font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--mute); margin-top:6px;}
</style></head>
<body>
  <div class="display">Quietly run, <em>at scale.</em></div>
  <div class="meta">Instrument Serif · 64 / 1.02 · −0.02em</div>
</body></html>
