<!doctype html>
<html><head><meta charset="utf-8"><title>Mono / Eyebrow</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{background:var(--ink-900); color:var(--fg); padding:18px 28px; display:flex; flex-direction:column; gap:18px;}
  .lab{font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--mute);}
  .row{display:flex; flex-direction:column; gap:8px;}
  .mono{font-family:var(--mono); font-size:12.5px; line-height:1.6; color:var(--fg-soft);}
  .mono b{color:var(--copper); font-weight:500;}
</style></head>
<body>
  <div class="row">
    <span class="lab">eyebrow</span>
    <span class="eyebrow">01 — Services</span>
  </div>
  <div class="row">
    <span class="lab">mono · 12.5</span>
    <span class="mono">$ kubectl get nodes -o wide  <b>// 3 ready</b></span>
  </div>
</body></html>
