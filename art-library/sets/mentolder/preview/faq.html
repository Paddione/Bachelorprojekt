<!doctype html>
<html lang="de"><head>
<meta charset="utf-8"><title>Mentolder · FAQ</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../styles/website.css">
<style>body{background:var(--ink-900);color:var(--fg);padding:40px;font-family:var(--sans);}</style>
</head><body>
<div style="max-width:720px;">
  <div class="faq-item" style="background:var(--ink-800);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:8px;">
    <button class="faq-btn" style="width:100%;text-align:left;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;background:none;border:none;cursor:pointer;">
      <span class="faq-q">Wie läuft ein erstes Gespräch ab?</span>
      <svg style="width:20px;height:20px;color:var(--brass);flex-shrink:0;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 9l-7 7-7-7"/></svg>
    </button>
    <div class="faq-answer" style="padding:16px 24px 20px;font-size:15px;line-height:1.6;color:var(--mute);border-top:1px solid var(--line);">
      Wir sprechen 30 Minuten über Ihre Situation — kostenlos und ohne Druck.
    </div>
  </div>
  <div class="faq-item" style="background:var(--ink-800);border:1px solid var(--line);border-radius:12px;overflow:hidden;">
    <button class="faq-btn" style="width:100%;text-align:left;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;background:none;border:none;cursor:pointer;">
      <span class="faq-q">Arbeiten Sie auch remote?</span>
      <svg style="width:20px;height:20px;color:var(--brass);flex-shrink:0;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 9l-7 7-7-7"/></svg>
    </button>
  </div>
</div>
</body></html>
