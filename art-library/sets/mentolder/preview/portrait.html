<!doctype html>
<html lang="de"><head>
<meta charset="utf-8"><title>Mentolder · Portrait</title>

<style>body{background:var(--ink-900);color:var(--fg);padding:40px;font-family:var(--sans);}</style>

<div class="portrait-wrap" style="max-width:340px;">

      <div class="initials-circle">
