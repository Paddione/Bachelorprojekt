  <text x="96" y="496" font-family="Instrument Serif, Iowan Old Style, Georgia, serif" font-size="132" font-weight="400" fill="#ECEFF3" letter-spacing="-2.6">Kubernetes,</text>
  <text x="96" y="636" font-family="Instrument Serif, Iowan Old Style, Georgia, serif" font-style="italic" font-size="132" font-weight="400" fill="#D8FF8A" letter-spacing="-2.6">quietly run</text>
  <text x="96" y="776" font-family="Instrument Serif, Iowan Old Style, Georgia, serif" font-style="italic" font-size="132" font-weight="400" fill="#D8FF8A" letter-spacing="-2.6">for you.</text>

  
  <text x="96" y="842" font-family="Geist, ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="300" fill="#C6CCD4">A boutique studio for clusters that should not need attention.</text>

  
