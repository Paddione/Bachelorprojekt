<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body class="surface-dark" style="padding:24px;">
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;">
    <div style="aspect-ratio:1;border-radius:14px;background:#5BD4D0;padding:10px;display:flex;flex-direction:column;justify-content:flex-end;color:#003a39;">
      <div style="font-family:var(--mono);font-size:10px;font-weight:600;">teal</div>
      <div style="font-family:var(--mono);font-size:9px;opacity:.7;">#5BD4D0</div>
    </div>
    <div style="aspect-ratio:1;border-radius:14px;background:#82E2DF;padding:10px;display:flex;flex-direction:column;justify-content:flex-end;color:#003a39;">
      <div style="font-family:var(--mono);font-size:10px;font-weight:600;">teal-2</div>
      <div style="font-family:var(--mono);font-size:9px;opacity:.7;">#82E2DF</div>
    </div>
    <div style="aspect-ratio:1;border-radius:14px;background:#EDE6D8;padding:10px;display:flex;flex-direction:column;justify-content:flex-end;color:#16101E;">
      <div style="font-family:var(--mono);font-size:10px;font-weight:600;">paper</div>
      <div style="font-family:var(--mono);font-size:9px;opacity:.6;">#EDE6D8</div>
    </div>
    <div style="aspect-ratio:1;border-radius:14px;background:#E2DACA;padding:10px;display:flex;flex-direction:column;justify-content:flex-end;color:#16101E;">
      <div style="font-family:var(--mono);font-size:10px;font-weight:600;">paper-2</div>
      <div style="font-family:var(--mono);font-size:9px;opacity:.6;">#E2DACA</div>
    </div>
    <div style="aspect-ratio:1;border-radius:14px;background:#D2C9B6;padding:10px;display:flex;flex-direction:column;justify-content:flex-end;color:#16101E;">
      <div style="font-family:var(--mono);font-size:10px;font-weight:600;">paper-3</div>
      <div style="font-family:var(--mono);font-size:9px;opacity:.6;">#D2C9B6</div>
    </div>
  </div>
</body></html>
