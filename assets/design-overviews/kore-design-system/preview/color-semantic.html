<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body class="surface-dark" style="padding:24px;">
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;">
    <div style="aspect-ratio:2.4;border-radius:10px;background:#5BD4D0;padding:8px 12px;display:flex;flex-direction:column;justify-content:center;color:#003a39;">
      <div style="font-family:var(--mono);font-size:10px;font-weight:600;">--ok</div>
      <div style="font-family:var(--mono);font-size:9px;opacity:.7;">#5BD4D0</div>
    </div>
    <div style="aspect-ratio:2.4;border-radius:10px;background:#C8F76A;padding:8px 12px;display:flex;flex-direction:column;justify-content:center;color:#2A3A0C;">
      <div style="font-family:var(--mono);font-size:10px;font-weight:600;">--warn</div>
      <div style="font-family:var(--mono);font-size:9px;opacity:.7;">#C8F76A</div>
    </div>
    <div style="aspect-ratio:2.4;border-radius:10px;background:#E26B6B;padding:8px 12px;display:flex;flex-direction:column;justify-content:center;color:#fff;">
      <div style="font-family:var(--mono);font-size:10px;font-weight:600;">--fail</div>
      <div style="font-family:var(--mono);font-size:9px;opacity:.85;">#E26B6B</div>
    </div>
    <div style="aspect-ratio:2.4;border-radius:10px;background:#6FA8D8;padding:8px 12px;display:flex;flex-direction:column;justify-content:center;color:#fff;">
      <div style="font-family:var(--mono);font-size:10px;font-weight:600;">--info</div>
      <div style="font-family:var(--mono);font-size:9px;opacity:.85;">#6FA8D8</div>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;">
    <div style="aspect-ratio:2.4;border-radius:10px;background:transparent;border:1px solid var(--line-3);padding:8px 12px;display:flex;flex-direction:column;justify-content:center;">
      <div style="font-family:var(--mono);font-size:10px;font-weight:600;color:#ECEFF3;">--fg</div>
      <div style="font-family:var(--mono);font-size:9px;color:var(--mute);">#ECEFF3</div>
    </div>
    <div style="aspect-ratio:2.4;border-radius:10px;background:transparent;border:1px solid var(--line-3);padding:8px 12px;display:flex;flex-direction:column;justify-content:center;">
      <div style="font-family:var(--mono);font-size:10px;font-weight:600;color:#C6CCD4;">--fg-soft</div>
      <div style="font-family:var(--mono);font-size:9px;color:var(--mute);">#C6CCD4</div>
    </div>
    <div style="aspect-ratio:2.4;border-radius:10px;background:transparent;border:1px solid var(--line-3);padding:8px 12px;display:flex;flex-direction:column;justify-content:center;">
      <div style="font-family:var(--mono);font-size:10px;font-weight:600;color:#8A93A0;">--mute</div>
      <div style="font-family:var(--mono);font-size:9px;color:var(--mute);">#8A93A0</div>
    </div>
    <div style="aspect-ratio:2.4;border-radius:10px;background:transparent;border:1px solid var(--line-3);padding:8px 12px;display:flex;flex-direction:column;justify-content:center;">
      <div style="font-family:var(--mono);font-size:10px;font-weight:600;color:#69707B;">--mute-2</div>
      <div style="font-family:var(--mono);font-size:9px;color:var(--mute);">#69707B</div>
    </div>
  </div>
</body></html>
