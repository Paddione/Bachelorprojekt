<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body class="surface-dark grain-bg" style="padding:0;color:var(--fg);min-height:100%;">
  <div style="padding:28px;position:relative;z-index:1;">
    <div class="eyebrow" style="margin-bottom:14px;">SURFACE · GRAIN OVERLAY</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
      <div style="background:var(--ink-900);border:1px solid var(--line);border-radius:16px;padding:24px;height:160px;">
        <div style="font-family:var(--mono);font-size:10px;color:var(--lime);letter-spacing:.18em;">INK-900</div>
        <div style="font-family:var(--serif);font-size:24px;margin-top:8px;line-height:1.2;">Default surface, with grain overlay sitting at 55% opacity, blend-mode: overlay.</div>
      </div>
      <div style="background:var(--paper);color:var(--ink-text);border-radius:16px;padding:24px;height:160px;">
        <div style="font-family:var(--mono);font-size:10px;color:var(--lime-print);letter-spacing:.18em;">PAPER</div>
        <div style="font-family:var(--serif);font-size:24px;margin-top:8px;line-height:1.2;">Bone paper for printed surfaces, business cards, the rare paper UI.</div>
      </div>
    </div>
  </div>
</body></html>
