<!doctype html>
<html lang="de"><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
  body { background: #0b111c; }
  .hud-bar {
    background: linear-gradient(to bottom, rgba(11,17,28,0.95), rgba(16,24,38,0.95));
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 8px;
    padding: 14px 18px;
    display: flex; align-items: center; gap: 18px;
  }
  .slot {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border-radius: 4px;
    border: 1px solid transparent;
  }
  .slot.active { border-color: #d7b06a; background: rgba(215,176,106,0.10); }
  .slot img { width: 28px; height: 28px; display: block; }
  .key { font-family: var(--font-mono); font-size: 10px; letter-spacing:.14em; color: #8c96a3;}
  .name { font-family: var(--font-sans); font-size: 13px; color: #eef1f3;}
  .name b { color: #d7b06a; font-weight: 500;}
  .ammo { margin-left: auto; font-family: var(--font-mono); font-size: 13px; letter-spacing:.1em; color: #d7b06a;}
</style>
</head>
<body>
<div class="card-root">
  <div class="hud-bar">
    <div class="slot active"><img src="../assets/icons/icon-rifle.png" alt=""><div><div class="key">2</div><div class="name"><b>Rifle</b></div></div></div>
    <div class="slot"><img src="../assets/icons/icon-handgun.png" alt=""><div><div class="key">1</div><div class="name">Handgun</div></div></div>
    <div class="slot"><img src="../assets/icons/icon-fireball.png" alt=""><div><div class="key">3</div><div class="name">Fireball</div></div></div>
    <div class="slot"><img src="../assets/icons/icon-club.png" alt=""><div><div class="key">4</div><div class="name">Club</div></div></div>
    <div class="slot"><img src="../assets/icons/icon-katana.png" alt=""><div><div class="key">5</div><div class="name">Katana</div></div></div>
    <div class="ammo">24 / 90</div>
  </div>
  <div style="font-family: var(--font-mono); font-size: 10px; letter-spacing:.16em; text-transform:uppercase; color: #8c96a3;">HUD-Bar · ink-gradient panel · active slot = brass border + brass-tint fill</div>
</div>
</body></html>
