<!doctype html>
<html lang="de"><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
  body { padding: 14px 18px;}
  .grid { display:grid; grid-template-columns: repeat(6, 1fr); gap: 10px;}
  .gl {
    background: var(--slate-1); border: 1px solid var(--line); border-radius: 8px;
    display:flex; flex-direction: column; align-items: center; padding: 12px 4px 8px;
  }
  .gl .ch {
    font-size: 26px; line-height: 1; color: var(--parchment);
    font-family: var(--font-sans); margin-bottom: 6px;
  }
  .gl .ch.brass { color: #c8a96e;}
  .gl .name { font-family: var(--font-mono); font-size: 9px; letter-spacing:.1em; color: var(--parchment-3); text-align:center; text-transform: uppercase;}
  .legend { font-family: var(--font-mono); font-size: 10px; letter-spacing:.16em; text-transform: uppercase; color: var(--parchment-3); margin-top: 8px;}
</style>
</head>
<body>
<div class="card-root">
  <div class="grid">
    <div class="gl"><span class="ch brass">＋</span><span class="name">add figure</span></div>
    <div class="gl"><span class="ch brass">▾</span><span class="name">dropdown</span></div>
    <div class="gl"><span class="ch">✕</span><span class="name">close</span></div>
    <div class="gl"><span class="ch brass">✦</span><span class="name">appearance</span></div>
    <div class="gl"><span class="ch brass">●</span><span class="name">online · live</span></div>
    <div class="gl"><span class="ch">↔</span><span class="name">switch</span></div>
    <div class="gl"><span class="ch">↑</span><span class="name">summon dir.</span></div>
    <div class="gl"><span class="ch">⚙</span><span class="name">settings</span></div>
    <div class="gl"><span class="ch" style="color:#f44;">⚠</span><span class="name">boss warn</span></div>
    <div class="gl"><span class="ch">🤸</span><span class="name">mayhem · only</span></div>
    <div class="gl"><span class="ch">🌡</span><span class="name">phys</span></div>
    <div class="gl"><span class="ch">🎯</span><span class="name">ik</span></div>
  </div>
  <div class="legend">Unicode-first · two emoji are intentional brand exceptions · no other emoji</div>
</div>
</body></html>
