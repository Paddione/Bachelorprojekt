<!doctype html>
<html lang="de"><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
  .row-r { display:flex; gap: 14px; align-items: flex-end; }
  .tile {
    flex:1; min-width: 0;
    height: 110px;
    background: var(--slate-1);
    border: 1px solid var(--line);
    display:flex; flex-direction: column; align-items: center; justify-content: flex-end;
    padding-bottom: 12px;
  }
  .tile .name { font-family: var(--font-mono); font-size: 11px; letter-spacing:.14em; text-transform:uppercase; color: var(--parchment); font-weight:500;}
  .tile .px { font-family: var(--font-mono); font-size: 10px; color: var(--parchment-3); letter-spacing:.1em; margin-top:4px;}
  .pill {
    height: 36px; padding: 0 18px; display:inline-flex; align-items:center;
    border-radius: 999px;
    background: rgba(14,16,20,0.85);
    border: 1px solid var(--brass-mute);
    color: var(--parchment-2);
    font-family: var(--font-sans); font-size: 13px;
  }
</style>
</head>
<body>
<div class="card-root">
  <div class="row-r">
    <div class="tile" style="border-radius: 4px;"><span class="name">chip</span><span class="px">--r-chip · 4px</span></div>
    <div class="tile" style="border-radius: 6px;"><span class="name">input</span><span class="px">--r-input · 6px</span></div>
    <div class="tile" style="border-radius: 8px;"><span class="name">tile</span><span class="px">--r-tile · 8px</span></div>
    <div class="tile" style="border-radius: 14px;"><span class="name">card</span><span class="px">--r-card · 14px</span></div>
  </div>
  <div style="display:flex; gap: 14px; align-items: center; padding-top: 4px;">
    <span class="pill">● 1 online</span>
    <span class="pill">Klick = Figur wählen</span>
    <span style="font-family: var(--font-mono); font-size: 10px; letter-spacing:.16em; text-transform:uppercase; color: var(--parchment-3);">pill · 999px · status</span>
  </div>
</div>
</body></html>
