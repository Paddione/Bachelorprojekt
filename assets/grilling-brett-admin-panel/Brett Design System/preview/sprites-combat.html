<!doctype html>
<html lang="de"><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
  body { background: #0b111c; padding: 14px 18px;}
  .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap: 10px;}
  .card {
    background: #101826; border: 1px solid rgba(215,176,106,0.18); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
  }
  .canvas {
    aspect-ratio: 1/1;
    background:
      linear-gradient(#17202e 1px, transparent 1px) 0 0 / 18px 18px,
      linear-gradient(90deg, #17202e 1px, transparent 1px) 0 0 / 18px 18px,
      #0b111c;
    display:grid; place-items: center;
  }
  .canvas img { max-width: 84%; max-height: 84%;}
  .lbl {
    font-family: var(--font-mono); font-size: 9px; letter-spacing:.14em; text-transform:uppercase;
    color: #d7b06a; padding: 8px 10px 4px;
  }
  .dim {
    font-family: var(--font-mono); font-size: 8px; color: #8c96a3; padding: 0 10px 8px; letter-spacing:.1em;
  }
</style>
</head>
<body>
<div class="card-root">
  <div class="grid">
    <div class="card"><div class="canvas"><img src="../assets/sprites/blood-splat-01.png"></div><div class="lbl">blood · 01</div><div class="dim">512×512 · normal</div></div>
    <div class="card"><div class="canvas"><img src="../assets/sprites/muzzle-flash.png"></div><div class="lbl">muzzle-flash</div><div class="dim">256×256 · additive</div></div>
    <div class="card"><div class="canvas"><img src="../assets/sprites/slash-arc.png"></div><div class="lbl">slash-arc</div><div class="dim">512×256 · additive</div></div>
    <div class="card"><div class="canvas"><img src="../assets/sprites/smoke-puff.png"></div><div class="lbl">smoke-puff</div><div class="dim">256×256 · normal</div></div>
  </div>
</div>
</body></html>
