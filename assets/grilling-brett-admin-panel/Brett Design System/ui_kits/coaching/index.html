<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Brett · Coaching — UI Kit</title>
<link rel="stylesheet" href="coaching.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Topbar.jsx"></script>
<script type="text/babel" src="FigureEditor.jsx"></script>
<script type="text/babel" src="AppearanceDrawer.jsx"></script>
<script type="text/babel" src="SceneCanvas.jsx"></script>
<script type="text/babel" src="StatusPill.jsx"></script>

<script type="text/babel">
const { useState, useMemo, useCallback } = React;

const STATUS_DEFAULT = 'Klick = Figur wählen · Doppelklick Boden = Figur teleportieren / neue Figur';
const STATUS_PLACING = 'Klick auf den Boden zum Platzieren — Esc zum Abbrechen';

const initialFigures = [
  { id: 'f1', x: -120, z: -10, scale: 1.0, color: '#b8c0a8', label: 'Vater',  face: 'protective',
    appearance: { face: 'protective', body: 'adult-tall',   acc: { head: 'hair-short', upper: 'coat',  feet: 'shoes-dress' } } },
  { id: 'f2', x:   30, z:  20, scale: 0.95, color: '#e0c06b', label: 'Mutter', face: 'present',
    appearance: { face: 'present',    body: 'adult-average', acc: { head: 'hair-bun',   upper: 'robe',  feet: 'sandals' } } },
  { id: 'f3', x:  150, z: -30, scale: 0.7,  color: '#6ba8e0', label: 'Kind',   face: 'curious',
    appearance: { face: 'curious',    body: 'child',         acc: { head: 'hair-curls', upper: 'tunic', feet: 'barefoot' } } },
];

function App() {
  const [figures, setFigures]     = useState(initialFigures);
  const [selectedId, setSelected] = useState('f1');
  const [activePreset, setPreset] = useState('Stand');
  const [stiffness, setStiffness] = useState(0.65);
  const [figEditorOpen, setFigEditorOpen] = useState(false);
  const [drawerOpen, setDrawerOpen]       = useState(false);
  const [placingMode, setPlacingMode]     = useState(false);

  // editor draft (color / scale / name for the figure being created or edited)
  const [draft, setDraft] = useState({ color: '#b8c0a8', scale: 1.0, name: '' });

  // appearance drawer draft
  const selectedFig = figures.find(f => f.id === selectedId);
  const [appDraft, setAppDraft] = useState(() => selectedFig?.appearance ?? { face: null, body: 'adult-average', acc: { head: null, upper: null, feet: null } });

  // Sync editor draft when selection changes
  React.useEffect(() => {
    const f = figures.find(f => f.id === selectedId);
    if (f) setDraft({ color: f.color, scale: f.scale, name: f.label });
  }, [selectedId]);

  // Sync appearance draft when selection or drawer opens
  React.useEffect(() => {
    const f = figures.find(f => f.id === selectedId);
    if (f) setAppDraft(f.appearance);
  }, [selectedId, drawerOpen]);

  // Live-recolor selected on color change
  const setColor = useCallback((hex) => {
    setDraft(d => ({ ...d, color: hex }));
    if (selectedId) setFigures(fs => fs.map(f => f.id === selectedId ? { ...f, color: hex } : f));
  }, [selectedId]);

  const setScale = useCallback((s) => {
    setDraft(d => ({ ...d, scale: s }));
    if (selectedId) setFigures(fs => fs.map(f => f.id === selectedId ? { ...f, scale: s } : f));
  }, [selectedId]);

  const setName = useCallback((n) => {
    setDraft(d => ({ ...d, name: n }));
    if (selectedId) setFigures(fs => fs.map(f => f.id === selectedId ? { ...f, label: n } : f));
  }, [selectedId]);

  const onPlaceCta = () => {
    setPlacingMode(true);
    setFigEditorOpen(false);
  };

  const placeFigureAt = (x, z) => {
    const id = 'f' + (figures.length + 1) + '-' + Math.random().toString(36).slice(2, 6);
    const newFig = {
      id, x, z, scale: draft.scale, color: draft.color,
      label: draft.name || 'Figur',
      face: null,
      appearance: { face: null, body: 'adult-average', acc: { head: null, upper: null, feet: null } },
    };
    setFigures(fs => [...fs, newFig]);
    setSelected(id);
    setPlacingMode(false);
  };

  // Esc cancels placing
  React.useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') setPlacingMode(false); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const statusText = placingMode ? STATUS_PLACING : STATUS_DEFAULT;

  return (
    <>
      <Topbar
        activePreset={activePreset}
        onPreset={setPreset}
        stiffness={stiffness}
        onStiffness={setStiffness}
        figEditorOpen={figEditorOpen}
        onToggleFigEditor={() => setFigEditorOpen(o => !o)}
        drawerOpen={drawerOpen}
        onToggleDrawer={() => { if (selectedId) setDrawerOpen(o => !o); }}
        onlineCount={3}
        hasSelection={!!selectedId}
      />

      <SceneCanvas
        figures={figures}
        selectedId={selectedId}
        onSelectFigure={setSelected}
        onCanvasDoubleClick={placeFigureAt}
        placingMode={placingMode}
      />

      <FigureEditor
        open={figEditorOpen}
        onClose={() => setFigEditorOpen(false)}
        mode={selectedId ? 'edit' : 'new'}
        color={draft.color}
        onColor={setColor}
        scale={draft.scale}
        onScale={setScale}
        name={draft.name}
        onName={setName}
        onPlace={onPlaceCta}
      />

      <AppearanceDrawer
        open={drawerOpen}
        draft={appDraft}
        onChange={(patch) => setAppDraft(d => ({ ...d, ...patch }))}
        onCancel={() => setDrawerOpen(false)}
        onApply={() => {
          setFigures(fs => fs.map(f => f.id === selectedId
            ? { ...f, appearance: appDraft, face: appDraft.face }
            : f));
          setDrawerOpen(false);
        }}
      />

      <StatusPill text={statusText} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
