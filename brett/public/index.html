<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Brett · Mannequin</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230e1014'/%3E%3Ccircle cx='16' cy='11' r='4' fill='%23c8a96e'/%3E%3Cpath d='M9 27c0-3.9 3.1-7 7-7s7 3.1 7 7' stroke='%23c8a96e' stroke-width='2.5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E" />
  <style>
    *,*::before,*::after { box-sizing: border-box; }
    html, body { margin:0; height:100%; background:#0e1014; color:#e7ead0; font-family: ui-sans-serif, system-ui, sans-serif; overflow:hidden; }
    /* ── Topbar chrome (Phase E) ──────────────────────────────────── */
    #topbar {
      position:fixed; top:0; left:0; right:0; height:36px; display:flex; align-items:center; gap:8px;
      padding:0 10px; background:rgba(14,16,20,0.85); backdrop-filter:blur(6px);
      border-bottom:var(--hairline-soft, 1px solid rgba(231,234,208,0.08)); z-index:10; font-size:13px;
    }
    #topbar .group { display:flex; align-items:center; gap:6px; }
    #topbar .sep { width:1px; height:20px; background:var(--parchment-3, rgba(231,234,208,0.12)); margin:0 6px; }
    .preset-btn { background:transparent; color:var(--parchment, inherit); border:var(--hairline-soft, 1px solid rgba(231,234,208,0.18));
      border-radius:var(--radius-sm, 4px); padding:4px 10px; font:inherit; cursor:pointer; }
    .preset-btn:hover { background:var(--slate-2, rgba(231,234,208,0.08)); }
    .icon-btn { background:transparent; color:var(--parchment, inherit); border:var(--hairline-soft, 1px solid rgba(231,234,208,0.18));
      border-radius:var(--radius-sm, 4px); padding:4px 10px; font:inherit; cursor:pointer; }
    #stiffness { width:160px; accent-color:var(--brass, #c8a96e); }
    #online-indicator { font-size:var(--fs-small, 13px); color:var(--parchment-2, #b9bda3); }
    /* ── Topbar chrome end ─────────────────────────────────────────── */

    #status-pill {
      position:fixed; left:50%; bottom:24px; transform:translateX(-50%);
      padding:8px 14px; background:var(--brett-surface, #101826); border:1px solid var(--brett-line-2, rgba(255,255,255,0.12));
      border-radius:20px; font-size:13px; color:var(--brett-fg, #eef1f3); pointer-events:none; z-index:10;
    }
    canvas { display:block; }

    /* ── Character-Editor Panel ─────────────────────────────────── */
    #fig-panel-wrap { position: relative; display: inline-flex; align-items: center; }

    #fig-panel-btn {
      background: transparent; color: inherit;
      border: 1px solid rgba(231,234,208,0.18);
      border-radius: 4px; padding: 4px 10px;
      font: inherit; cursor: pointer; white-space: nowrap;
    }
    #fig-panel-btn:hover, #fig-panel-btn.open { background: rgba(231,234,208,0.12); }

    #fig-panel {
      position: absolute; top: calc(100% + 8px); right: 0;
      z-index: 200;
      background: var(--brett-surface, #101826); border: 1px solid var(--brett-line-2, rgba(255,255,255,0.12));
      border-radius: 10px; padding: 12px 14px;
      width: 240px; display: flex; flex-direction: column; gap: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }

    #fig-panel-header {
      display: flex; justify-content: space-between; align-items: center;
    }
    #fig-panel-title {
      font-size: 10px; font-weight: 600; color: var(--brett-brass, oklch(0.80 0.09 75));
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    #fig-panel-close {
      background: none; border: none; color: rgba(231,234,208,0.4);
      cursor: pointer; font-size: 14px; padding: 0 2px; line-height: 1;
    }
    #fig-panel-close:hover { color: #e7ead0; }

    .fig-panel-label {
      font-size: 10px; color: rgba(231,234,208,0.5);
      text-transform: uppercase; letter-spacing: 0.08em;
    }

    #fig-panel-colors { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

    .fig-color-swatch {
      width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: border-color 0.15s, transform 0.1s;
    }
    .fig-color-swatch:hover { transform: scale(1.15); }
    .fig-color-swatch.active { border-color: var(--brett-brass, oklch(0.80 0.09 75)); }

    #fig-label-input {
      background: var(--brett-ink-850, #101826); border: 1px solid var(--brett-line-2, rgba(255,255,255,0.12));
      border-radius: 5px; color: var(--brett-fg, #eef1f3); font: inherit; font-size: 12px;
      padding: 5px 8px; width: 100%;
    }
    #fig-label-input:focus { outline: none; border-color: var(--brett-brass, oklch(0.80 0.09 75)); }
    #fig-label-input::placeholder { color: rgba(231,234,208,0.3); }

    #fig-note-textarea {
      background: var(--brett-ink-850, #101826);
      border: 1px solid var(--brett-line-2, rgba(255,255,255,0.12));
      border-radius: 5px;
      color: var(--brett-fg, #eef1f3);
      font: inherit;
      font-size: 12px;
      padding: 5px 8px;
      width: 100%;
      resize: vertical;
      min-height: 72px;
      line-height: 1.4;
    }
    #fig-note-textarea:focus {
      outline: none;
      border-color: var(--brett-brass, oklch(0.80 0.09 75));
    }
    #fig-note-textarea::placeholder {
      color: rgba(231,234,208,0.3);
    }

    #fig-panel-add {
      background: var(--brett-brass, oklch(0.80 0.09 75)); color: var(--brett-ink-900, #0b111c);
      border: none; border-radius: 6px;
      padding: 7px 10px; font-size: 12px; font-weight: 600;
      cursor: pointer; width: 100%;
    }
    #fig-panel-add:hover { filter: brightness(1.1); }

    #fig-scale-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    #fig-scale-slider { flex: 1; min-width: 80px; accent-color: #c8a96e; }
    #fig-scale-val { font-size: 11px; color: rgba(231,234,208,0.6); min-width: 28px; }
    .fig-size-btn {
      background: rgba(231,234,208,0.07); border: 1px solid rgba(231,234,208,0.18);
      color: inherit; border-radius: 4px; padding: 2px 7px; font-size: 11px; cursor: pointer;
    }
    .fig-size-btn:hover, .fig-size-btn.active { background: rgba(200,169,110,0.22); border-color: #c8a96e; }

    body.placing-figure { cursor: crosshair !important; }

    /* ── Mobile: topbar scrolls horizontally ─────────────────────── */
    @media (max-width: 600px) {
      #topbar {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        min-height: 36px;
        height: auto;
        flex-wrap: nowrap;
      }
      #topbar::-webkit-scrollbar { display: none; }
      #stiffness { width: 90px; }
      #status-pill { font-size: 11px; padding: 6px 10px; }
    }

    /* ── Appearance Drawer ─────────────────────────────── */
    #appearance-btn {
      background: transparent; color: inherit;
      border: var(--hairline-soft, 1px solid rgba(231,234,208,0.18));
      border-radius: var(--radius-sm, 4px); padding: 4px 10px;
      font: inherit; cursor: pointer; white-space: nowrap;
    }
    #appearance-btn:hover, #appearance-btn.open { background: var(--slate-2, rgba(231,234,208,0.12)); }
    #appearance-btn:disabled { opacity: 0.35; cursor: default; }

    #appearance-drawer {
      position: fixed; top: 36px; right: 0; bottom: 0;
      width: 280px; z-index: 100;
      background: var(--slate-1, #161922); border-left: 1px solid rgba(var(--brass-rgb, 200,169,110),0.25);
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform 200ms ease;
      overflow-y: auto;
    }
    #appearance-drawer.open { transform: translateX(0); }

    .drawer-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 14px; border-bottom: var(--hairline-soft, 1px solid rgba(231,234,208,0.08));
      font-size: 11px; font-weight: 600; color: var(--brass, #c8a96e);
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    .drawer-close { background: none; border: none; color: var(--parchment-3, rgba(231,234,208,0.4)); cursor: pointer; font-size: 16px; padding: 0; line-height: 1; }
    .drawer-close:hover { color: var(--parchment, #e7ead0); }

    .drawer-section { padding: 10px 14px; border-bottom: var(--hairline-soft, 1px solid rgba(231,234,208,0.06)); }
    .drawer-section-title {
      font-size: 10px; color: var(--parchment-3, #7c8071);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px;
    }

    .thumb-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .thumb-grid.two-col { grid-template-columns: repeat(2, 1fr); }
    .thumb-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      cursor: pointer; padding: 4px; border-radius: var(--radius-md, 6px);
      border: 2px solid transparent; transition: border-color 0.12s;
    }
    .thumb-item:hover { border-color: var(--brass-soft, rgba(200,169,110,0.4)); }
    .thumb-item.active { border-color: var(--brass, #c8a96e); }
    .thumb-item img { width: 56px; height: 56px; object-fit: cover; border-radius: var(--radius-sm, 4px); }
    .thumb-item span { font-size: 9px; color: var(--parchment-3, #7c8071); text-align: center; line-height: 1.2; }
    .thumb-item.null-item img { opacity: 0.35; }
    .thumb-item.null-item.active img { opacity: 0.7; }

    .acc-group { margin-bottom: 8px; }
    .acc-group-label { font-size: 9px; color: var(--parchment-3, #7c8071); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }

    .drawer-footer {
      padding: 12px 14px; display: flex; gap: 8px; margin-top: auto;
      border-top: var(--hairline-soft, 1px solid rgba(231,234,208,0.08));
      position: sticky; bottom: 0; background: var(--slate-1, #161922);
    }
    .drawer-cancel {
      flex: 1; background: transparent; color: var(--parchment-2, rgba(231,234,208,0.7));
      border: 1px solid var(--parchment-3, rgba(231,234,208,0.2)); border-radius: var(--radius-md, 6px);
      padding: 8px; font: inherit; font-size: 12px; cursor: pointer;
    }
    .drawer-cancel:hover { background: var(--slate-2, rgba(231,234,208,0.06)); }
    .drawer-apply {
      flex: 1; background: var(--brass, #c8a96e); color: var(--slate-0, #0e1014);
      border: none; border-radius: var(--radius-md, 6px);
      padding: 8px; font: inherit; font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .drawer-apply:hover { filter: brightness(1.1); }

    @media (max-width: 480px) {
      #appearance-drawer { width: 100%; }
    }

    /* ── Remaining panels (Phase E) ──────────────────────────────── */
    /* Co-op Wave HUD */
    .coop-hud {
      display: none; position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      background: var(--slate-0, rgba(10,10,20,.82)); border: 1px solid var(--sage, #4a7);
      border-radius: var(--radius-md, 8px); padding: 8px 20px;
      font-family: var(--font-mono, monospace); color: var(--parchment-2, #b9bda3); font-size: 13px;
      flex-direction: column; gap: 4px; min-width: 220px; z-index: 200;
    }
    .coop-hud-header { display: flex; justify-content: space-between; align-items: center; }
    .coop-hud-label { color: var(--brass, #c8a96e); font-weight: bold; letter-spacing: .1em; }
    .coop-wave-label { font-size: 15px; font-weight: bold; color: var(--parchment, #e7ead0); }
    .coop-enemy-count { color: var(--parchment-3, #e87); }
    .coop-progress {
      background: var(--slate-2, #1e1e1e); border-radius: var(--radius-sm, 4px); overflow: hidden; height: 4px;
    }
    .coop-progress-bar {
      height: 100%; background: linear-gradient(90deg, var(--sage, #4a7), var(--brass, #c9aa71)); transition: width .5s;
    }
    .boss-hp-wrap { display: none; margin-top: 4px; }
    .boss-hp-label { color: var(--danger, #f44); font-size: 11px; margin-bottom: 2px; }
    .boss-hp-track {
      background: var(--slate-2, #1e1e1e); border-radius: var(--radius-sm, 4px); overflow: hidden; height: 6px;
    }
    .boss-hp-bar { width: 100%; height: 100%; background: var(--danger, #f44); transition: width .3s; }

    /* Session-created toast */
    .session-toast {
      position: fixed; bottom: 12px; left: 12px; z-index: 100;
      background: var(--slate-1, rgba(22,27,34,0.93)); border: 1px solid var(--slate-3, #2a3340);
      border-radius: var(--radius-lg, 10px); padding: 12px 16px;
      color: var(--parchment, #e6edf3); font: 13px var(--font-sans, system-ui);
      min-width: 200px; box-shadow: var(--shadow-2, 0 4px 12px rgba(0,0,0,0.5));
    }
    .session-toast-title { font-weight: bold; margin-bottom: 4px; color: var(--sage, #3fb950); }
    .session-toast-code { font-family: var(--font-mono, monospace); font-size: 14px; color: var(--brass, #ffaa44); }
    .session-toast-link {
      color: var(--parchment-2, #58a6ff); text-decoration: none; display: inline-block; margin-top: 6px;
    }

    /* Person button (persons.ts — static parts → class, data-driven border stays inline) */
    .person-btn {
      text-align: left; padding: 4px 7px; font-size: 11px;
      display: flex; align-items: center; gap: 6px;
    }
    .person-btn img { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }

    /* ── Remaining panels end ──────────────────────────────────────── */

    /* ── Hauptmenü overlay (Phase A) ───────────────────────────── */
    #brett-menu {
      position: fixed; inset: 0; z-index: 300;
      background: var(--brett-ink-900, #0b111c);
      overflow-y: auto;
    }
    #brett-menu[hidden] { display: none; }

    /* ── Lobby overlay (Phase B) ───────────────────────────────── */
    #brett-lobby {
      position: fixed; inset: 0; z-index: 300;
      background: var(--brett-ink-900, #0b111c);
      overflow-y: auto;
    }
    #brett-lobby[hidden] { display: none; }

    /* While a non-board overlay (menu/lobby) is the active view, hide the board chrome. */
    body.brett-menu-active #topbar,
    body.brett-menu-active #status-pill,
    body.brett-menu-active #appearance-drawer,
    body.brett-menu-active #coop-hud { display: none !important; }

    /* ── T000606: Mobile-Touch-Steuerung ───────────────────────────── */
    canvas { touch-action: none; }

    @media (pointer: coarse) {
      .preset-btn {
        min-height: 44px;
        padding: 8px 12px;
        touch-action: manipulation;
      }
      #fig-panel-btn,
      #appearance-btn,
      #btn-export-png,
      #btn-export-json,
      #btn-export-pdf,
      #btn-release-possession {
        min-height: 44px;
        min-width: 44px;
        touch-action: manipulation;
      }
      #stiffness {
        height: 44px;
      }
    }
  </style>
</head>
<body class="brett-menu-active">
  <!-- Hauptmenü overlay root (Phase A): mounted by src/client/main.ts -->
  <div id="brett-menu" hidden></div>
  <!-- Lobby overlay root (Phase B): mounted by src/client/main.ts -->
  <div id="brett-lobby" hidden></div>
  <div id="topbar">
    <div class="group" id="presets">
      <button class="preset-btn" data-preset="stand">Stand</button>
      <button class="preset-btn" data-preset="kneel">Kneel</button>
      <button class="preset-btn" data-preset="prone">Prone</button>
      <button class="preset-btn" data-preset="crawl">Crawl</button>
      <button class="preset-btn" data-preset="slump">Slump</button>
      <button class="preset-btn" data-preset="tpose">T-Pose</button>
    </div>
    <div class="sep"></div>
    <div class="group">
      <span title="Physik (schlaff)">🌡 PHYS</span>
      <input id="stiffness" type="range" min="0" max="1" step="0.01" value="0.65" />
      <span title="IK (steif)">IK 🎯</span>
    </div>
    <div class="sep"></div>
    <div class="group" style="margin-left:auto;">
      <div id="fig-panel-wrap">
        <button id="fig-panel-btn" aria-expanded="false" aria-controls="fig-panel">＋ Figur ▾</button>
        <div id="fig-panel" hidden role="dialog" aria-label="Figur-Editor">
          <div id="fig-panel-header">
            <span id="fig-panel-title">NEUE FIGUR</span>
            <button id="fig-panel-close" aria-label="Panel schließen">✕</button>
          </div>
          <span class="fig-panel-label">Farbe</span>
          <div id="fig-panel-colors">
            <div class="fig-color-swatch active" data-color="#b8c0a8" style="background:#b8c0a8;" title="Standard"></div>
            <div class="fig-color-swatch" data-color="#e06b6b" style="background:#e06b6b;" title="Rot"></div>
            <div class="fig-color-swatch" data-color="#6ba8e0" style="background:#6ba8e0;" title="Blau"></div>
            <div class="fig-color-swatch" data-color="#6be0a0" style="background:#6be0a0;" title="Grün"></div>
            <div class="fig-color-swatch" data-color="#e0c06b" style="background:#e0c06b;" title="Gelb"></div>
            <div class="fig-color-swatch" data-color="#c06be0" style="background:#c06be0;" title="Lila"></div>
            <div class="fig-color-swatch" data-color="#e0906b" style="background:#e0906b;" title="Orange"></div>
          </div>
          <span class="fig-panel-label">Größe</span>
          <div id="fig-scale-row">
            <button class="fig-size-btn" data-scale="0.6">S</button>
            <button class="fig-size-btn active" data-scale="1.0">M</button>
            <button class="fig-size-btn" data-scale="1.5">L</button>
            <input type="range" id="fig-scale-slider" min="0.3" max="2.5" step="0.05" value="1.0" />
            <span id="fig-scale-val">1.0×</span>
          </div>
          <span class="fig-panel-label">Personen</span>
          <div id="fig-panel-persons" style="display:grid;grid-template-columns:1fr 1fr;gap:4px;"></div>
          <span class="fig-panel-label">Name</span>
          <input id="fig-label-input" type="text" placeholder="Figur benennen …" maxlength="40" />
          <span class="fig-panel-label">Notiz / Statement</span>
          <textarea id="fig-note-textarea"
            placeholder="Was spricht diese Figur? Was sieht sie?"
            maxlength="1000"
            rows="4"></textarea>
          <button id="fig-panel-add">＋ Klick auf Brett zum Platzieren</button>
        </div>
      </div>
      <button id="appearance-btn" disabled title="Aussehen bearbeiten">✦ Aussehen</button>
      <div id="topbar-filter-slot"></div>
      <div id="topbar-participants-slot"></div>
      <div id="topbar-invite-slot"></div>
      <div id="topbar-share-slot"></div>
      <span id="online-indicator">● <span id="online-count">1</span> online</span>
    </div>
    <!-- Export-Gruppe (T000466) — initial versteckt, von export.ts per Feature-Flag eingeblendet -->
    <div class="group" id="export-group" style="display:none">
      <span class="sep"></span>
      <button id="btn-export-png" class="icon-btn" title="Aktuellen Board-Stand als PNG exportieren">📷 PNG</button>
      <button id="btn-export-json" class="icon-btn" title="Board-Zustand als JSON exportieren">{ } JSON</button>
      <button id="btn-export-pdf" class="icon-btn" title="Aufstellung als PDF exportieren">📄 PDF</button>
      <button id="btn-import-json" class="icon-btn" title="Board-Zustand aus JSON-Datei wiederherstellen">📥 Import</button>
      <input type="file" id="import-file-input" accept=".json,application/json" style="display:none">
    </div>
  </div>
  <div id="appearance-drawer" role="dialog" aria-label="Aussehen bearbeiten" aria-modal="true">
    <div class="drawer-header">
      <span>Aussehen</span>
      <button class="drawer-close" id="appearance-drawer-close" aria-label="Schließen">✕</button>
    </div>
    <div class="drawer-section" id="drawer-face-section">
      <div class="drawer-section-title">Gesicht</div>
      <div class="thumb-grid" id="drawer-face-grid"><!-- populated by JS --></div>
    </div>
    <div class="drawer-section" id="drawer-body-section">
      <div class="drawer-section-title">Körpertyp</div>
      <div class="thumb-grid two-col" id="drawer-body-grid"><!-- populated by JS --></div>
    </div>
    <div class="drawer-section">
      <div class="drawer-section-title">Accessoires</div>
      <div class="acc-group">
        <div class="acc-group-label">Kopf</div>
        <div class="thumb-grid" id="drawer-acc-head-grid"><!-- populated by JS --></div>
      </div>
      <div class="acc-group">
        <div class="acc-group-label">Oberkörper</div>
        <div class="thumb-grid" id="drawer-acc-upper-grid"><!-- populated by JS --></div>
      </div>
      <div class="acc-group">
        <div class="acc-group-label">Füße</div>
        <div class="thumb-grid" id="drawer-acc-feet-grid"><!-- populated by JS --></div>
      </div>
    </div>
    <div class="drawer-footer">
      <button class="drawer-cancel" id="appearance-cancel">Abbrechen</button>
      <button class="drawer-apply" id="appearance-apply">Übernehmen</button>
    </div>
  </div>
  <div id="status-pill">Klick = Figur wählen · Doppelklick Boden = Figur teleportieren / neue Figur</div>

  <!-- Co-op Wave HUD -->
  <div id="coop-hud" class="coop-hud">
    <div class="coop-hud-header">
      <span class="coop-hud-label">CO-OP</span>
      <span id="coop-wave-label" class="coop-wave-label">WELLE 1 / 10</span>
      <span id="coop-enemy-count" class="coop-enemy-count">Feinde: <strong>0</strong></span>
    </div>
    <div class="coop-progress">
      <div id="coop-progress-bar" class="coop-progress-bar" style="width:10%;"></div>
    </div>
    <div id="boss-hp-wrap" class="boss-hp-wrap">
      <div class="boss-hp-label">&#9888; BOSS HP</div>
      <div class="boss-hp-track">
        <div id="boss-hp-bar" class="boss-hp-bar"></div>
      </div>
    </div>
  </div>

<script type="module">
  import { createWire } from '/assets/coaching/wire.mjs';
  import { mountCoachingHud } from '/assets/coaching/hud.mjs';
  // Coaching runs unconditionally — mode concept removed.
  const me = await fetch('/auth/me').then((r) => r.json()).catch(() => ({}));
  const wire = createWire(() => window.__brettWS);
  const tryAttach = () => { if (!wire.attach()) setTimeout(tryAttach, 150); };
  tryAttach();

  const hasRoom = new URLSearchParams(location.search).has('room');
  if (hasRoom) {
    // Deep-link path: keep the existing coaching HUD.
    mountCoachingHud({ wire, isAdmin: !!me.isAdmin });
  }
  // No-?room entry is now owned by the Phase-A Hauptmenü (src/client/main.ts);
  // the legacy mountJoinOverlay({}) is intentionally NOT auto-mounted here.

  wire.on('session_created', (m) => {
    const toast = document.createElement('div');
    toast.className = 'session-toast';
    toast.innerHTML = `<div class="session-toast-title">Session erstellt!</div>` +
      `Code: <strong class="session-toast-code">${m.code}</strong><br/>` +
      `<a href="/api/join?code=${m.code}" class="session-toast-link" onclick="navigator.clipboard.writeText(this.href); this.textContent='Kopiert!'; return false;">Link kopieren</a>`;
    document.body.appendChild(toast);
  });
</script>
    <!-- E1 (T001931): Kern-Dark-Launch-Flags default-aktivieren. Bereits gesetzte
         Werte (brett-features ConfigMap / URL-Override) gewinnen via Object.assign,
         sodass die Flags weiterhin als Kill-Switch überschreibbar bleiben. -->
    <script>
      window.__brettFeatures = Object.assign(
        { 't000468-ground-anchors': true, 'sf-t000465': true, 'sf-t000467': true, 'sf-t000469': true },
        window.__brettFeatures || {}
      );
    </script>
    <script type="module" src="../src/client/main.ts"></script>
</body>
</html>
