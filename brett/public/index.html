<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Systemisches Brett</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

  #toolbar {
    background: #16213e;
    border-bottom: 1px solid #0f3460;
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    z-index: 10;
    flex-shrink: 0;
    min-height: 52px;
  }

  .tlabel {
    font-size: 11px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }

  .figure-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 1px solid #0f3460;
    background: #0f3460;
    color: #e0e0e0;
    border-radius: 7px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .figure-btn:hover { background: #1a4a8a; border-color: #4a90d9; }

  .color-swatch {
    width: 20px; height: 20px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: transform 0.15s, border-color 0.15s; flex-shrink: 0;
  }
  .color-swatch:hover { transform: scale(1.2); }
  .color-swatch.active { border-color: #fff; transform: scale(1.15); }

  .sep { width: 1px; height: 26px; background: #0f3460; flex-shrink: 0; }

  /* Scale controls */
  #scale-section {
    display: flex; align-items: center; gap: 8px;
  }
  #scale-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 90px; height: 4px;
    background: #0f3460;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  #scale-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #4a90d9;
    cursor: pointer;
    border: 2px solid #1a1a2e;
  }
  #scale-val {
    font-size: 12px; color: #aaa; min-width: 28px; text-align: right;
  }

  /* Zoom controls */
  #zoom-section { display: flex; align-items: center; gap: 8px; }
  #zoom-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 80px; height: 4px;
    background: #0f3460;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  #zoom-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #6be0a0;
    cursor: pointer;
    border: 2px solid #1a1a2e;
  }
  #zoom-val {
    font-size: 12px; color: #aaa; min-width: 32px; text-align: right;
  }
  .size-btn {
    padding: 4px 8px; font-size: 11px; border-radius: 5px;
    border: 1px solid #0f3460; background: #0f2040; color: #aaa;
    cursor: pointer; transition: all 0.12s;
  }
  .size-btn:hover { background: #1a3060; color: #e0e0e0; }

  /* Rotation controls */
  #rot-section { display: flex; align-items: center; gap: 6px; }
  .rot-btn {
    padding: 5px 9px; font-size: 14px; border-radius: 6px;
    border: 1px solid #0f3460; background: #0f2040; color: #ccc;
    cursor: pointer; transition: all 0.12s; line-height: 1;
  }
  .rot-btn:hover { background: #1a4a8a; color: #fff; }

  #btn-delete {
    padding: 6px 12px;
    border: 1px solid #5a1a1a; background: #3a1010; color: #ff6b6b;
    border-radius: 7px; cursor: pointer; font-size: 13px; transition: all 0.15s;
  }
  #btn-delete:hover { background: #5a2020; border-color: #ff4444; }

  #btn-reset {
    padding: 6px 12px;
    border: 1px solid #0f3460; background: #0f2040; color: #888;
    border-radius: 7px; cursor: pointer; font-size: 13px; transition: all 0.15s;
  }
  #btn-reset:hover { background: #1a3060; color: #e0e0e0; }

  .io-btn {
    padding: 6px 12px;
    border: 1px solid #0f3460; background: #0f2040; color: #aaa;
    border-radius: 7px; cursor: pointer; font-size: 13px; transition: all 0.15s;
    white-space: nowrap;
  }
  .io-btn:hover { background: #1a3060; color: #e0e0e0; }
  .io-btn.save { border-color: #1a4a1a; background: #0f2a0f; color: #6be0a0; }
  .io-btn.save:hover { background: #1a3a1a; }

  #confirm-modal {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.65); z-index: 200; align-items: center; justify-content: center;
  }
  #confirm-modal.visible { display: flex; }
  #confirm-box {
    background: #16213e; border: 1px solid #0f3460; border-radius: 12px;
    padding: 22px 26px; width: 290px; text-align: center;
  }
  #confirm-box p { font-size: 14px; color: #ccc; margin-bottom: 18px; line-height: 1.5; }
  #confirm-box .modal-btns { display: flex; gap: 10px; justify-content: center; }

  canvas { display: block; width: 100%; height: 100%; }

  #label-modal {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center;
  }
  #label-modal.visible { display: flex; }
  #label-box {
    background: #16213e; border: 1px solid #0f3460; border-radius: 12px;
    padding: 22px 26px; width: 310px;
  }
  #label-box h3 { font-size: 13px; font-weight: 500; margin-bottom: 14px; color: #aaa; }
  #label-input {
    width: 100%; background: #0f1e3a; border: 1px solid #0f3460; color: #e0e0e0;
    font-size: 15px; padding: 9px 11px; border-radius: 8px; outline: none;
  }
  #label-input:focus { border-color: #4a90d9; }
  #label-modal-btns { display: flex; gap: 10px; margin-top: 14px; justify-content: flex-end; }
  .modal-btn {
    padding: 7px 18px; border-radius: 8px; font-size: 13px; cursor: pointer;
    border: 1px solid #0f3460; background: #0f3460; color: #e0e0e0; transition: all 0.15s;
  }
  .modal-btn:hover { background: #1a4a8a; }
  .modal-btn.primary { background: #4a90d9; border-color: #4a90d9; }
  .modal-btn.primary:hover { background: #5aa0e9; }

  #hint {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: #444; pointer-events: none; text-align: center; line-height: 1.7; white-space: nowrap;
  }
  #selected-info {
    position: absolute; bottom: 12px; left: 14px;
    font-size: 12px; color: #777; pointer-events: none;
  }

  #canvas-container { position: relative; flex: 1; overflow: hidden; min-height: 0; }

  /* ── Globe widget ───────────────────────────────────────────────────── */
  #globe-widget {
    position: fixed; bottom: 20px; right: 20px; z-index: 50;
    background: rgba(7, 14, 38, 0.95);
    border: 1px solid #1a3060;
    border-radius: 14px;
    padding: 10px 11px 11px;
    width: 176px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.65), inset 0 1px 0 rgba(255,255,255,0.03);
    user-select: none;
  }
  #globe-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  #globe-title {
    font-size: 10px; color: #3a6090;
    text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600;
  }
  #globe-modes { display: flex; gap: 3px; }
  .globe-mode-btn {
    padding: 2px 6px; font-size: 13px; line-height: 1.4;
    border: 1px solid #162a50; background: #0b1830; color: #2a4870;
    border-radius: 4px; cursor: pointer; transition: all 0.12s; font-family: inherit;
  }
  .globe-mode-btn:hover { color: #5a80b8; border-color: #2a4070; }
  .globe-mode-btn.active { background: #0f2d5e; color: #4a90d9; border-color: #2a5898; }
  #globe-canvas-wrap {
    width: 150px; height: 150px; border-radius: 50%; overflow: hidden;
    margin: 0 auto 9px; cursor: grab;
    border: 1px solid #1a3060;
    box-shadow: inset 0 0 28px rgba(0,0,0,0.75), 0 0 18px rgba(20,60,160,0.22), 0 3px 10px rgba(0,0,0,0.6);
  }
  #globe-canvas-wrap:active { cursor: grabbing; }
  .globe-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
  .globe-lbl {
    font-size: 9.5px; color: #3a5878;
    text-transform: uppercase; letter-spacing: 0.07em;
    min-width: 46px; font-weight: 600;
  }
  #globe-scale-slider, #globe-speed-slider {
    -webkit-appearance: none; appearance: none;
    flex: 1; height: 3px; background: #0e2a50; border-radius: 2px; outline: none; cursor: pointer;
  }
  #globe-scale-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 11px; height: 11px; border-radius: 50%;
    background: #4a90d9; cursor: pointer; border: 2px solid #08122a;
    box-shadow: 0 0 6px rgba(74,144,217,0.6);
  }
  #globe-speed-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 11px; height: 11px; border-radius: 50%;
    background: #6be0a0; cursor: pointer; border: 2px solid #08122a;
    box-shadow: 0 0 6px rgba(107,224,160,0.5);
  }
  #globe-scale-val, #globe-speed-val {
    font-size: 10.5px; color: #6a8caa; min-width: 30px; text-align: right;
    font-variant-numeric: tabular-nums;
  }
  #globe-reset {
    width: 100%; margin-top: 4px; padding: 5px;
    background: #0b1830; border: 1px solid #162a50; color: #3a5878;
    border-radius: 6px; cursor: pointer; font-size: 11px;
    transition: all 0.14s; font-family: inherit;
  }
  #globe-reset:hover { background: #142840; color: #7aaac8; border-color: #2a4a70; }
</style>

<script>
(function(){

let globeSyncFn = null;

// ─── Cluster integration config ──────────────────────────────────
const params   = new URLSearchParams(window.location.search);
const ROOM     = params.get('room') || 'standalone';
const API      = '/api';
const SYNC_URL = (location.protocol === 'https:' ? 'wss://' : 'ws://')
               + location.host + '/sync';

function findFigById(id) {
  return figures.find(f => f.id === id) || null;
}
function figToJSON(fig) {
  return {
    id:    fig.id,
    type:  fig.type,
    color: fig.color,
    label: fig.label || '',
    scale: fig.scale,
    rotY:  fig.rotY,
    x:     fig.mesh.position.x,
    z:     fig.mesh.position.z,
  };
}

// ─── WebSocket sync ──────────────────────────────────────────────
let ws = null;
let syncOpen = false;
let applyingRemote = false;
let participantCount = 1;

function setStatus(text) {
  const el = document.getElementById('sync-status');
  if (el) el.textContent = text;
}

function send(msg) {
  if (syncOpen && ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(msg));
  }
}

function applySnapshot(figList) {
  applyingRemote = true;
  try {
    figures.slice().forEach(f => { scene.remove(f.mesh); });
    figures.length = 0;
    for (const f of figList) {
      addFigure(f.type, f.color, f.x, f.z, f.label || '', f.scale || 1.0, f.rotY || 0, f.id);
    }
    selectFigure(null);
  } finally { applyingRemote = false; }
}

function applyRemote(msg) {
  applyingRemote = true;
  try {
    if (msg.type === 'add' && msg.fig && !findFigById(msg.fig.id)) {
      addFigure(msg.fig.type, msg.fig.color, msg.fig.x, msg.fig.z,
                msg.fig.label, msg.fig.scale, msg.fig.rotY, msg.fig.id);
    } else if (msg.type === 'move') {
      const f = findFigById(msg.id);
      if (f) { f.mesh.position.x = msg.x; f.mesh.position.z = msg.z; }
    } else if (msg.type === 'update') {
      const f = findFigById(msg.id);
      if (f && msg.changes) {
        if (msg.changes.label !== undefined) setLabel(f, msg.changes.label);
        if (msg.changes.scale !== undefined) setScale(f, msg.changes.scale);
        if (msg.changes.rotY  !== undefined) setRotY (f, msg.changes.rotY);
        if (msg.changes.color !== undefined) recolorFigure(f, msg.changes.color);
      }
    } else if (msg.type === 'delete') {
      const f = findFigById(msg.id);
      if (f) {
        scene.remove(f.mesh);
        const i = figures.indexOf(f);
        if (i >= 0) figures.splice(i, 1);
        if (selectedFigure === f) selectFigure(null);
      }
    } else if (msg.type === 'clear') {
      clearBoard();
    }
  } finally { applyingRemote = false; }
}

function connect() {
  if (ROOM === 'standalone') {
    setStatus('Standalone (kein Sync)');
    return;
  }
  setStatus('Verbinde …');
  ws = new WebSocket(SYNC_URL);
  ws.onopen = () => {
    syncOpen = true;
    ws.send(JSON.stringify({ type: 'join', room: ROOM }));
    setStatus('Verbunden ✓');
  };
  ws.onmessage = (event) => {
    let msg;
    try { msg = JSON.parse(event.data); } catch { return; }
    if (msg.type === 'snapshot') applySnapshot(msg.figures || []);
    else if (msg.type === 'info') {
      participantCount = msg.count;
      setStatus(`Verbunden ✓ — ${participantCount} Teilnehmer`);
    } else applyRemote(msg);
  };
  ws.onclose = () => {
    syncOpen = false;
    setStatus('Verbindung getrennt — versuche neu …');
    setTimeout(connect, 3000);
  };
  ws.onerror = () => setStatus('Verbindungsfehler');
}

// Procedural wood texture — seeded LCG so grain is deterministic across sessions
function makeWoodTexture() {
  const W = 512, H = 512;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');

  // Base: dark warm brown
  ctx.fillStyle = '#2d1a0b';
  ctx.fillRect(0, 0, W, H);

  // Lengthwise warmth gradient
  const lg = ctx.createLinearGradient(0, 0, W, 0);
  lg.addColorStop(0,   'rgba(25,12,2,0.25)');
  lg.addColorStop(0.35,'rgba(55,28,6,0.12)');
  lg.addColorStop(0.65,'rgba(45,22,5,0.18)');
  lg.addColorStop(1,   'rgba(20,10,1,0.22)');
  ctx.fillStyle = lg;
  ctx.fillRect(0, 0, W, H);

  // Seeded pseudo-random (avoids Math.random so texture is stable on reload)
  let seed = 0x4d2a7c1b;
  function rand() {
    seed = (seed * 1664525 + 1013904223) & 0xffffffff;
    return (seed >>> 0) / 0xffffffff;
  }

  // Horizontal grain lines (= along board's long axis in world space)
  for (let i = 0; i < 90; i++) {
    const y0  = (i / 90) * H + (rand() - 0.5) * (H / 90 * 0.5);
    const gw  = 0.4 + rand() * 2.2;
    const a   = 0.04 + rand() * 0.13;
    const dark = rand() > 0.42;
    ctx.lineWidth   = gw;
    ctx.strokeStyle = dark
      ? `rgba(5,1,0,${(a * 1.6).toFixed(3)})`
      : `rgba(150,75,22,${a.toFixed(3)})`;
    ctx.beginPath();
    ctx.moveTo(0, y0 + (rand() - 0.5) * 3);
    for (let x = 0; x <= W; x += 6 + rand() * 10) {
      ctx.lineTo(x, y0 + Math.sin(x * 0.007 + i * 0.9) * 3.5 + (rand() - 0.5) * 1.2);
    }
    ctx.stroke();
  }

  // 1–2 subtle knot shadows
  const knots = 1 + Math.floor(rand() * 2);
  for (let k = 0; k < knots; k++) {
    const kx = W * (0.15 + rand() * 0.7);
    const ky = H * (0.1  + rand() * 0.8);
    const rx = 12 + rand() * 18;
    const ry =  8 + rand() * 10;
    const gr = ctx.createRadialGradient(kx, ky, 0, kx, ky, Math.max(rx, ry) * 1.4);
    gr.addColorStop(0,   'rgba(4,1,0,0.55)');
    gr.addColorStop(0.35,'rgba(4,1,0,0.25)');
    gr.addColorStop(1,   'rgba(4,1,0,0)');
    ctx.fillStyle = gr;
    ctx.save();
    ctx.translate(kx, ky);
    ctx.scale(1, ry / rx);
    ctx.beginPath();
    ctx.arc(0, 0, rx * 1.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
  return tex;
}

// ── Geometry helpers ──────────────────────────────────────────────────────────
function hex2col(h){ return new THREE.Color(h); }

// Create a face-marking sprite (dot on front face)
function makeFaceMarker(col) {
  const c = document.createElement('canvas');
  c.width = 64; c.height = 64;
  const ctx = c.getContext('2d');
  // bright face dot
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(32,32,20,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.arc(32,32,13,0,Math.PI*2); ctx.fill();
  const tex = new THREE.CanvasTexture(c);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(0.55, 0.55, 1);
  return sprite;
}

// Arrow chevron on base indicating forward direction
function makeDirectionArrow(col) {
  const shape = new THREE.Shape();
  shape.moveTo(0, 0.38);
  shape.lineTo(0.22, 0);
  shape.lineTo(0.10, 0.08);
  shape.lineTo(0.10, -0.30);
  shape.lineTo(-0.10, -0.30);
  shape.lineTo(-0.10, 0.08);
  shape.lineTo(-0.22, 0);
  shape.closePath();
  const geo = new THREE.ShapeGeometry(shape);
  const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.85, side: THREE.DoubleSide, depthTest: false });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = -Math.PI / 2;
  mesh.position.set(0, 0.21, -0.7);
  return mesh;
}

// ── Figure construction ───────────────────────────────────────────────────────
function buildFigure(type, color) {
  const col  = hex2col(color);
  const dark = col.clone().multiplyScalar(0.45);
  const mat  = new THREE.MeshStandardMaterial({ color: col,  roughness: 0.38, metalness: 0.12 });
  const back = new THREE.MeshStandardMaterial({ color: dark, roughness: 0.55, metalness: 0.08 });

  const group = new THREE.Group();

  if (type === 'pawn') {
    // Body: front bright, back dark using two half-cylinders
    const bodyF = new THREE.Mesh(new THREE.CylinderGeometry(0.52, 0.62, 1.75, 24, 1, false, 0, Math.PI), mat);
    const bodyB = new THREE.Mesh(new THREE.CylinderGeometry(0.52, 0.62, 1.75, 24, 1, false, Math.PI, Math.PI), back);
    bodyF.position.y = 0.875; bodyB.position.y = 0.875;
    bodyF.castShadow = true; bodyB.castShadow = true;

    // Head: front bright hemisphere, back dark
    const headF = new THREE.Mesh(new THREE.SphereGeometry(0.52, 24, 16, 0, Math.PI, 0, Math.PI), mat);
    const headB = new THREE.Mesh(new THREE.SphereGeometry(0.52, 24, 16, Math.PI, Math.PI, 0, Math.PI), back);
    headF.position.y = 2.0; headB.position.y = 2.0;
    headF.castShadow = true; headB.castShadow = true;

    group.add(bodyF, bodyB, headF, headB);

    // Face marker
    const dot = makeFaceMarker(color);
    dot.position.set(0, 2.0, 0.53);
    group.add(dot);

  } else if (type === 'triangle') {
    // Cone: 3-sided, front half bright
    const coneF = new THREE.Mesh(new THREE.ConeGeometry(0.88, 2.15, 16, 1, false, 0, Math.PI), mat);
    const coneB = new THREE.Mesh(new THREE.ConeGeometry(0.88, 2.15, 16, 1, false, Math.PI, Math.PI), back);
    coneF.position.y = 1.075; coneB.position.y = 1.075;
    coneF.castShadow = true; coneB.castShadow = true;

    // Front face stripe
    const stripeGeo = new THREE.PlaneGeometry(0.25, 1.3);
    const stripeMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5, depthTest: false });
    const stripe = new THREE.Mesh(stripeGeo, stripeMat);
    stripe.position.set(0, 1.1, 0.86);
    stripe.rotation.y = 0;

    group.add(coneF, coneB, stripe);

  } else if (type === 'square') {
    // Box: front face bright, sides/back darker
    const frontMat = mat.clone();
    const sideMat  = new THREE.MeshStandardMaterial({ color: col.clone().multiplyScalar(0.7), roughness: 0.45 });
    const backMat2 = back.clone();
    const topMat   = new THREE.MeshStandardMaterial({ color: col.clone().multiplyScalar(0.85), roughness: 0.4 });

    // Box with per-face materials [+x, -x, +y, -y, +z(front), -z(back)]
    const boxGeo = new THREE.BoxGeometry(1.18, 2.0, 1.18);
    const boxMats = [ sideMat, sideMat, topMat, back, frontMat, backMat2 ];
    const box = new THREE.Mesh(boxGeo, boxMats);
    box.position.y = 1.0; box.castShadow = true;

    // Front face vertical stripe
    const strGeo = new THREE.PlaneGeometry(0.22, 1.4);
    const strMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.45, depthTest: false });
    const stripe = new THREE.Mesh(strGeo, strMat);
    stripe.position.set(0, 1.0, 0.6);
    group.add(box, stripe);

  } else if (type === 'diamond') {
    // Octahedron: front vertices bright, back dark via two halves
    const octF = new THREE.Mesh(new THREE.OctahedronGeometry(1.05, 0), mat);
    octF.position.y = 1.05; octF.castShadow = true;
    group.add(octF);

    // Front face indicator
    const dot = makeFaceMarker(color);
    dot.position.set(0, 1.05, 1.0);
    dot.scale.set(0.45, 0.45, 1);
    group.add(dot);
  }

  // Base disc
  const baseMat = new THREE.MeshStandardMaterial({ color: dark, roughness: 0.7 });
  const base = new THREE.Mesh(new THREE.CylinderGeometry(0.78, 0.78, 0.18, 32), baseMat);
  base.position.y = 0.09; base.castShadow = true;
  group.add(base);

  // Direction arrow on base
  const arrow = makeDirectionArrow(color);
  group.add(arrow);

  return group;
}

// ── Text label sprite ─────────────────────────────────────────────────────────
function makeTextSprite(text) {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 64;
  const ctx = c.getContext('2d');
  ctx.clearRect(0,0,256,64);
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  if (ctx.roundRect) ctx.roundRect(4,10,248,46,10); else ctx.rect(4,10,248,46);
  ctx.fill();
  ctx.font = 'bold 24px Segoe UI, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.fillText(text.length > 18 ? text.slice(0,17)+'…' : text, 128, 36);
  const tex = new THREE.CanvasTexture(c);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sp = new THREE.Sprite(mat);
  sp.scale.set(4, 1, 1);
  return sp;
}

// ── Add / update figure ───────────────────────────────────────────────────────
function addFigure(type, color, x, z, label, scale, rotY, id) {
  const mesh = buildFigure(type, color);
  mesh.position.set(x, 0, z);
  mesh.scale.setScalar(scale || 1.0);
  mesh.rotation.y = rotY || 0;
  scene.add(mesh);

  const fig = { type, color, mesh, label: label||'', sprite: null, scale: scale||1.0, rotY: rotY||0 };
  fig.id = id || `fig_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
  if (fig.label) { attachLabel(fig); }
  figures.push(fig);
  return fig;
}

function attachLabel(fig) {
  if (fig.sprite) { fig.mesh.remove(fig.sprite); fig.sprite.material.map.dispose(); fig.sprite.material.dispose(); fig.sprite = null; }
  if (!fig.label) return;
  const sp = makeTextSprite(fig.label);
  // Position above figure, independent of scale (divide by scale so world-height stays constant)
  const h = 4.2 / (fig.scale || 1.0);
  sp.position.set(0, h, 0);
  fig.mesh.add(sp);
  fig.sprite = sp;
}

function setLabel(fig, text) {
  fig.label = text;
  attachLabel(fig);
}

function setScale(fig, s) {
  fig.scale = s;
  fig.mesh.scale.setScalar(s);
  attachLabel(fig); // reposition label
}

function setRotY(fig, rad) {
  fig.rotY = rad;
  fig.mesh.rotation.y = rad;
}

// ── Selection ring ────────────────────────────────────────────────────────────
let selRing = null;
function showSelRing(fig) {
  clearSelRing();
  const geo = new THREE.TorusGeometry(1.05, 0.07, 8, 48);
  const mat = new THREE.MeshBasicMaterial({ color: 0xffd700 });
  selRing = new THREE.Mesh(geo, mat);
  selRing.rotation.x = Math.PI/2;
  selRing.position.y = 0.22;
  fig.mesh.add(selRing);
}
function clearSelRing() {
  if (selRing && selRing.parent) selRing.parent.remove(selRing);
  selRing = null;
}

function selectFigure(fig) {
  selectedFigure = fig;
  clearSelRing();
  const slider = document.getElementById('scale-slider');
  const scaleVal = document.getElementById('scale-val');
  if (fig) {
    showSelRing(fig);
    slider.value = fig.scale;
    scaleVal.textContent = fig.scale.toFixed(1)+'×';
    document.getElementById('selected-info').textContent = fig.label ? `Ausgewählt: ${fig.label}` : 'Figur ausgewählt';
  } else {
    slider.value = 1.0;
    scaleVal.textContent = '1.0×';
    document.getElementById('selected-info').textContent = '';
  }
}

function recolorFigure(fig, color) {
  fig.color = color;
  const newMesh = buildFigure(fig.type, color);
  newMesh.position.copy(fig.mesh.position);
  newMesh.rotation.y = fig.rotY;
  newMesh.scale.setScalar(fig.scale);
  scene.remove(fig.mesh);
  scene.add(newMesh);
  fig.mesh = newMesh;
  if (fig.label) attachLabel(fig);
  if (!applyingRemote) {
    selectFigure(fig);
  } else if (selectedFigure === fig) {
    // Locally-selected figure was recolored remotely: keep selection but reattach
    // the ring to the new mesh (the old mesh was removed from the scene above).
    clearSelRing();
    showSelRing(fig);
  }
  if (!applyingRemote) send({ type: 'update', id: fig.id, changes: { color } });
}

const saveModal     = document.getElementById('save-modal');
const saveCustomer  = document.getElementById('save-customer');
const saveName      = document.getElementById('save-name');

let customersCache = null;
async function loadCustomers() {
  if (customersCache) return customersCache;
  const res = await fetch(`${API}/customers`);
  customersCache = res.ok ? await res.json() : [];
  return customersCache;
}

async function fillCustomerDropdown(selectEl) {
  const list = await loadCustomers();
  // Keep first option ("— kein Klient —" or similar), drop dynamic ones.
  while (selectEl.options.length > 1) selectEl.remove(1);
  for (const c of list) {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.name;
    selectEl.appendChild(opt);
  }
}

async function preselectCustomerForRoom(selectEl) {
  if (ROOM === 'standalone') return;
  // Pick the most-recent snapshot's customer for this room, if any.
  try {
    const res = await fetch(`${API}/snapshots?room=${encodeURIComponent(ROOM)}`);
    if (!res.ok) return;
    const list = await res.json();
    const last = list.find(s => s.customer_id);
    if (last) selectEl.value = last.customer_id;
  } catch {}
}

document.getElementById('btn-save').addEventListener('click', async () => {
  await fillCustomerDropdown(saveCustomer);
  saveCustomer.value = '';
  await preselectCustomerForRoom(saveCustomer);
  saveName.value = '';
  saveModal.style.display = 'flex';
  setTimeout(() => saveName.focus(), 40);
});

document.getElementById('save-cancel').addEventListener('click', () => {
  saveModal.style.display = 'none';
});

document.getElementById('save-ok').addEventListener('click', async () => {
  const name = saveName.value.trim();
  if (!name) { saveName.focus(); return; }
  const body = {
    room_token:  ROOM === 'standalone' ? null : ROOM,
    customer_id: saveCustomer.value || null,
    name,
    state: { figures: figures.map(figToJSON) },
  };
  const res = await fetch(`${API}/snapshots`, {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (res.ok) {
    saveModal.style.display = 'none';
    setStatus(`Gespeichert ✓`);
    setTimeout(() => {
      if (syncOpen) setStatus(`Verbunden ✓ — ${participantCount} Teilnehmer`);
    }, 2000);
  } else {
    alert(`Speichern fehlgeschlagen: ${res.status}`);
  }
});

const loadModal  = document.getElementById('load-modal');
const loadFilter = document.getElementById('load-filter');
const loadList   = document.getElementById('load-list');

function clearChildren(el) {
  while (el.firstChild) el.removeChild(el.firstChild);
}

function placeholderRow(text, color) {
  const div = document.createElement('div');
  div.style.cssText = `color:${color};font-size:12px;`;
  div.textContent = text;
  return div;
}

async function fillLoadFilter() {
  const list = await loadCustomers();
  // Keep first ("Raum") option, drop dynamic ones.
  while (loadFilter.options.length > 1) loadFilter.remove(1);
  for (const c of list) {
    const opt = document.createElement('option');
    opt.value = `customer:${c.id}`;
    opt.textContent = c.name;
    loadFilter.appendChild(opt);
  }
}

async function refreshLoadList() {
  clearChildren(loadList);
  loadList.appendChild(placeholderRow('— wird geladen —', '#666'));

  const v = loadFilter.value;
  let url;
  if (v === 'room') {
    if (ROOM === 'standalone') {
      clearChildren(loadList);
      loadList.appendChild(placeholderRow('Standalone — kein Raum.', '#888'));
      return;
    }
    url = `${API}/snapshots?room=${encodeURIComponent(ROOM)}`;
  } else {
    const customerId = v.replace(/^customer:/, '');
    url = `${API}/snapshots?customer_id=${encodeURIComponent(customerId)}`;
  }
  const res = await fetch(url);
  const list = res.ok ? await res.json() : [];

  clearChildren(loadList);
  if (!list.length) {
    loadList.appendChild(placeholderRow('Keine Snapshots.', '#888'));
    return;
  }

  for (const s of list) {
    const row = document.createElement('button');
    row.style.cssText = 'display:flex;justify-content:space-between;width:100%;background:#0f2040;border:1px solid #0f3460;color:#e0e0e0;padding:8px 10px;border-radius:6px;margin-bottom:6px;cursor:pointer;font-size:13px;text-align:left;';

    const nameEl = document.createElement('span');
    nameEl.textContent = s.name;       // textContent escapes automatically

    const dateEl = document.createElement('span');
    dateEl.style.color = '#888';
    dateEl.textContent = new Date(s.created_at).toLocaleString('de-DE', {
      dateStyle: 'short', timeStyle: 'short',
    });

    row.appendChild(nameEl);
    row.appendChild(dateEl);
    row.addEventListener('click', () => loadSnapshot(s.id));
    loadList.appendChild(row);
  }
}

async function loadSnapshot(id) {
  const res = await fetch(`${API}/snapshots/${encodeURIComponent(id)}`);
  if (!res.ok) { alert('Snapshot konnte nicht geladen werden.'); return; }
  const snap = await res.json();
  const figs = (snap.state && snap.state.figures) || [];

  // Broadcast: clear, then add each figure, so peers see the load.
  send({ type: 'clear' });
  applySnapshot(figs);
  for (const f of figs) {
    send({ type: 'add', fig: f });
  }
  loadModal.style.display = 'none';
}

document.getElementById('btn-load').addEventListener('click', async () => {
  await fillLoadFilter();
  loadFilter.value = 'room';
  await refreshLoadList();
  loadModal.style.display = 'flex';
});
loadFilter.addEventListener('change', refreshLoadList);
document.getElementById('load-cancel').addEventListener('click', () => {
  loadModal.style.display = 'none';
});

// ── Label modal ───────────────────────────────────────────────────────────────
const modal      = document.getElementById('label-modal');
const labelInput = document.getElementById('label-input');

function openLabelModal(fig) {
  pendingLabelFig = fig;
  labelInput.value = fig.label || '';
  modal.classList.add('visible');
  setTimeout(() => labelInput.focus(), 40);
}
document.getElementById('label-confirm').addEventListener('click', () => {
  if (pendingLabelFig) {
    setLabel(pendingLabelFig, labelInput.value.trim());
    if (!applyingRemote) send({ type: 'update', id: pendingLabelFig.id, changes: { label: pendingLabelFig.label } });
  }
  modal.classList.remove('visible'); pendingLabelFig = null;
});
document.getElementById('label-cancel').addEventListener('click', () => {
  modal.classList.remove('visible'); pendingLabelFig = null;
});
labelInput.addEventListener('keydown', e => {
  if (e.key === 'Enter')  document.getElementById('label-confirm').click();
  if (e.key === 'Escape') document.getElementById('label-cancel').click();
});

// ── Raycasting helpers ────────────────────────────────────────────────────────
const raycaster   = new THREE.Raycaster();
const boardPlane  = new THREE.Plane(new THREE.Vector3(0,1,0), 0);

function getNDC(e) {
  const r = canvas.getBoundingClientRect();
  return new THREE.Vector2(
    ((e.clientX-r.left)/r.width)*2-1,
    -((e.clientY-r.top)/r.height)*2+1
  );
}
function pickFigure(ndc) {
  raycaster.setFromCamera(ndc, camera);
  const hits = raycaster.intersectObjects(figures.map(f=>f.mesh), true);
  if (!hits.length) return null;
  const obj = hits[0].object;
  return figures.find(f => {
    if (f.mesh === obj) return true;
    let p = obj.parent;
    while (p) { if (p === f.mesh) return true; p = p.parent; }
    return false;
  }) || null;
}
function pickBoard(ndc) {
  raycaster.setFromCamera(ndc, camera);
  const t = new THREE.Vector3();
  raycaster.ray.intersectPlane(boardPlane, t);
  return t;
}

// ── Mouse / touch ─────────────────────────────────────────────────────────────
let drag   = { on: false, fig: null };
let rmbOn  = false;
let lastClick = { fig: null, time: 0 };

canvas.addEventListener('contextmenu', e => e.preventDefault());

let panOn = false;
canvas.addEventListener('contextmenu', e => e.preventDefault());
canvas.addEventListener('mousedown', e => {
  if (modal.classList.contains('visible')) return;
  if (e.button === 2) {
    rmbOn = true;
    orbit.startX = e.clientX; orbit.startY = e.clientY;
    return;
  }
  if (e.button === 1) {
    panOn = true;
    orbit.startX = e.clientX; orbit.startY = e.clientY;
    e.preventDefault();
    return;
  }
  if (e.button === 0) {
    const ndc = getNDC(e);
    const fig = pickFigure(ndc);
    if (fig) {
      const now = Date.now();
      if (lastClick.fig === fig && now-lastClick.time < 380) { openLabelModal(fig); lastClick.fig = null; return; }
      lastClick = { fig, time: now };
      selectFigure(fig);
      drag = { on: true, fig };
    } else {
      selectFigure(null); lastClick.fig = null;
    }
  }
});

let lastMoveSentAt = 0;
function sendMoveThrottled(fig) {
  const now = performance.now();
  if (now - lastMoveSentAt < 30) return;
  lastMoveSentAt = now;
  send({ type: 'move', id: fig.id, x: fig.mesh.position.x, z: fig.mesh.position.z });
}

canvas.addEventListener('mousemove', e => {
  if (rmbOn) {
    const dx = e.clientX - orbit.startX;
    const dy = e.clientY - orbit.startY;
    orbit.theta -= dx * 0.008;
    orbit.phi = Math.max(0.12, Math.min(Math.PI/2.05, orbit.phi + dy*0.008));
    orbit.startX = e.clientX; orbit.startY = e.clientY;
    updateCamera(); return;
  }
  if (panOn) {
    const dx = e.clientX - orbit.startX;
    const dy = e.clientY - orbit.startY;
    const f = orbit.radius * 0.01;
    orbit.panX -= dx * f * Math.cos(orbit.theta) - dy * f * Math.sin(orbit.theta);
    orbit.panZ -= dx * f * (-Math.sin(orbit.theta)) + dy * f * (-Math.cos(orbit.theta));
    orbit.startX = e.clientX; orbit.startY = e.clientY;
    updateCamera(); return;
  }
  if (drag.on && drag.fig) {
    const pos = pickBoard(getNDC(e));
    if (pos) {
      drag.fig.mesh.position.x = Math.max(-BW/2+1, Math.min(BW/2-1, pos.x));
      drag.fig.mesh.position.z = Math.max(-BD/2+1, Math.min(BD/2-1, pos.z));
      if (!applyingRemote) sendMoveThrottled(drag.fig);
    }
  }
});

canvas.addEventListener('mouseup', e => {
  if (e.button === 2) rmbOn = false;
  if (e.button === 1) panOn = false;
  if (e.button === 0) {
    if (drag.on && drag.fig && !applyingRemote) {
      send({ type: 'move', id: drag.fig.id, x: drag.fig.mesh.position.x, z: drag.fig.mesh.position.z });
    }
    drag = { on:false, fig:null };
  }
});

const zoomSlider = document.getElementById('zoom-slider');
const zoomVal    = document.getElementById('zoom-val');

function setZoom(r) {
  orbit.radius = Math.max(12, Math.min(75, r));
  zoomSlider.value = orbit.radius;
  zoomVal.textContent = Math.round(orbit.radius);
  updateCamera();
  if (globeSyncFn) globeSyncFn(orbit.radius);
}

zoomSlider.addEventListener('input', () => setZoom(parseFloat(zoomSlider.value)));
document.getElementById('zoom-in').addEventListener('click',  () => setZoom(orbit.radius - 4));
document.getElementById('zoom-out').addEventListener('click', () => setZoom(orbit.radius + 4));

canvas.addEventListener('wheel', e => {
  setZoom(orbit.radius + e.deltaY * 0.05);
  e.preventDefault();
}, { passive: false });

// Touch
let tPrev = null;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    const t = e.touches[0];
    const fig = pickFigure(getNDC({clientX:t.clientX,clientY:t.clientY}));
    if (fig) { selectFigure(fig); drag={on:true,fig}; }
    else selectFigure(null);
  }
  if (e.touches.length === 2) {
    tPrev = { x:(e.touches[0].clientX+e.touches[1].clientX)/2, y:(e.touches[0].clientY+e.touches[1].clientY)/2 };
  }
  e.preventDefault();
},{passive:false});

canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && drag.on && drag.fig) {
    const t = e.touches[0];
    const pos = pickBoard(getNDC({clientX:t.clientX,clientY:t.clientY}));
    if (pos) {
      drag.fig.mesh.position.x = Math.max(-BW/2+1, Math.min(BW/2-1, pos.x));
      drag.fig.mesh.position.z = Math.max(-BD/2+1, Math.min(BD/2-1, pos.z));
      if (!applyingRemote) sendMoveThrottled(drag.fig);
    }
  }
  if (e.touches.length === 2 && tPrev) {
    const cx=(e.touches[0].clientX+e.touches[1].clientX)/2;
    const cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
    orbit.theta -= (cx-tPrev.x)*0.01;
    orbit.phi = Math.max(0.12, Math.min(Math.PI/2.05, orbit.phi+(cy-tPrev.y)*0.01));
    tPrev={x:cx,y:cy}; updateCamera();
  }
  e.preventDefault();
},{passive:false});

canvas.addEventListener('touchend', () => {
  if (drag.on && drag.fig && !applyingRemote) {
    send({ type: 'move', id: drag.fig.id, x: drag.fig.mesh.position.x, z: drag.fig.mesh.position.z });
  }
  drag={on:false,fig:null}; tPrev=null;
});

// ── Resize ────────────────────────────────────────────────────────────────────
function onResize() {
  const w=container.clientWidth, h=container.clientHeight;
  renderer.setSize(w,h,false);
  camera.aspect=w/h; camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize); onResize();

// ── Render loop ───────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  const t = performance.now()*0.001;
  figures.forEach((fig,i) => {
    if (fig === selectedFigure) fig.mesh.position.y = Math.sin(t*2+i)*0.07;
    else fig.mesh.position.y = 0;
  });
  renderer.render(scene, camera);
}
animate();

// ── Globe Widget ──────────────────────────────────────────────────────────────
{
  const DEFAULT_ZOOM = 44;

  const gCvs = document.getElementById('globe-canvas');
  const gR = new THREE.WebGLRenderer({ canvas: gCvs, antialias: true, alpha: true });
  gR.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  gR.setSize(150, 150);

  const gSc = new THREE.Scene();
  const gCam = new THREE.PerspectiveCamera(42, 1, 0.1, 50);
  gCam.position.z = 3.2;

  // Atmosphere halo (BackSide sphere slightly larger)
  gSc.add(new THREE.Mesh(
    new THREE.SphereGeometry(1.16, 32, 24),
    new THREE.MeshBasicMaterial({ color: 0x1848a0, transparent: true, opacity: 0.15, side: THREE.BackSide })
  ));

  gSc.add(new THREE.AmbientLight(0x334477, 0.85));
  const gSun = new THREE.DirectionalLight(0xaabbff, 1.9);
  gSun.position.set(4, 2, 4);
  gSc.add(gSun);
  const gFill = new THREE.DirectionalLight(0x112244, 0.55);
  gFill.position.set(-3, -1, -3);
  gSc.add(gFill);

  const gGeo = new THREE.SphereGeometry(1, 48, 32);

  function makeGlobeTex() {
    const W = 512, H = 256;
    const cv = document.createElement('canvas');
    cv.width = W; cv.height = H;
    const c = cv.getContext('2d');
    // Ocean
    c.fillStyle = '#091c42'; c.fillRect(0, 0, W, H);
    const grd = c.createRadialGradient(W*.3, H*.3, 0, W*.5, H*.5, W*.7);
    grd.addColorStop(0, 'rgba(30,70,140,0.28)');
    grd.addColorStop(1, 'rgba(4,10,28,0.28)');
    c.fillStyle = grd; c.fillRect(0, 0, W, H);
    // Land blobs (approximate equirectangular positions)
    c.fillStyle = '#2b5c19';
    const el = (cx, cy, rx, ry, rot) => {
      c.save(); c.translate(cx, cy); if (rot) c.rotate(rot);
      c.beginPath(); c.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2); c.fill(); c.restore();
    };
    el(80, 80, 38, 30, -0.3); el(65, 55, 20, 18, -0.1);   // North America
    el(100, 165, 18, 32, 0.2);                              // South America
    el(238, 68, 18, 20, 0); el(245, 145, 26, 48, 0);        // Europe + Africa
    el(268, 90, 12, 14, 0.3);                               // Middle East
    el(330, 55, 65, 42, -0.1); el(310, 38, 24, 14, 0);      // Asia
    el(385, 55, 18, 16, 0);                                 // East Asia
    el(295, 112, 14, 20, 0);                                // India
    el(388, 172, 30, 22, 0.1);                              // Australia
    el(155, 28, 18, 14, 0);                                 // Greenland
    // Ice caps
    c.fillStyle = 'rgba(200,225,248,0.82)'; c.fillRect(0, 0, W, 16);
    c.fillStyle = 'rgba(210,235,252,0.88)'; c.fillRect(0, H - 18, W, 18);
    // Polar atmosphere tint
    const atm = c.createLinearGradient(0, 0, 0, H);
    atm.addColorStop(0, 'rgba(60,120,220,0.12)');
    atm.addColorStop(0.5, 'rgba(60,120,220,0)');
    atm.addColorStop(1, 'rgba(60,120,220,0.12)');
    c.fillStyle = atm; c.fillRect(0, 0, W, H);
    const tex = new THREE.CanvasTexture(cv);
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.ClampToEdgeWrapping;
    return tex;
  }

  const gSolMat = new THREE.MeshStandardMaterial({ map: makeGlobeTex(), roughness: 0.52, metalness: 0.06 });
  const gSolMesh = new THREE.Mesh(gGeo, gSolMat);

  const gWireGeo = new THREE.WireframeGeometry(new THREE.SphereGeometry(1.004, 20, 14));
  const gWireMesh = new THREE.LineSegments(gWireGeo,
    new THREE.LineBasicMaterial({ color: 0x4a90d9, transparent: true, opacity: 0.38 }));

  const gGrp = new THREE.Group();
  gSc.add(gGrp);

  let gSF = 1.0, gRS = 0.3, gMode = 'solid';
  let gDrag = false, gDS = {x: 0, y: 0};
  let gMR = {x: 0, y: 0}, gAR = 0, gLT = 0;

  function applyGlobeMode(m) {
    gMode = m;
    gGrp.remove(gSolMesh, gWireMesh);
    gSolMat.transparent = m === 'both';
    gSolMat.opacity = m === 'both' ? 0.76 : 1.0;
    gSolMat.needsUpdate = true;
    if (m !== 'wireframe') gGrp.add(gSolMesh);
    if (m !== 'solid')     gGrp.add(gWireMesh);
    document.querySelectorAll('.globe-mode-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.mode === m));
  }

  function applyGlobeScale(f, fromExternal) {
    gSF = Math.max(0.1, Math.min(3.0, f));
    gGrp.scale.setScalar(gSF);
    document.getElementById('globe-scale-slider').value = gSF;
    document.getElementById('globe-scale-val').textContent = gSF.toFixed(2) + '×';
    if (!fromExternal) setZoom(DEFAULT_ZOOM / gSF);
  }

  // Called by setZoom when zoom changes via other controls
  globeSyncFn = function(radius) {
    applyGlobeScale(Math.max(0.1, Math.min(3.0, DEFAULT_ZOOM / radius)), true);
  };

  document.getElementById('globe-scale-slider').addEventListener('input', e =>
    applyGlobeScale(parseFloat(e.target.value)));

  document.getElementById('globe-speed-slider').addEventListener('input', e => {
    gRS = parseFloat(e.target.value);
    document.getElementById('globe-speed-val').textContent = gRS.toFixed(1) + '×';
  });

  document.querySelectorAll('.globe-mode-btn').forEach(btn =>
    btn.addEventListener('click', () => applyGlobeMode(btn.dataset.mode)));

  document.getElementById('globe-reset').addEventListener('click', () => {
    applyGlobeScale(1.0);
    gRS = 0.3;
    document.getElementById('globe-speed-slider').value = 0.3;
    document.getElementById('globe-speed-val').textContent = '0.3×';
    applyGlobeMode('solid');
    gMR = {x: 0, y: 0}; gAR = 0;
  });

  const gWrap = document.getElementById('globe-canvas-wrap');
  gWrap.addEventListener('mousedown', e => {
    gDrag = true; gDS = {x: e.clientX, y: e.clientY};
    e.preventDefault(); e.stopPropagation();
  });
  window.addEventListener('mousemove', e => {
    if (!gDrag) return;
    gMR.y += (e.clientX - gDS.x) * 0.018;
    gMR.x = Math.max(-1.5, Math.min(1.5, gMR.x + (e.clientY - gDS.y) * 0.018));
    gDS = {x: e.clientX, y: e.clientY};
  });
  window.addEventListener('mouseup', () => { gDrag = false; });

  gWrap.addEventListener('wheel', e => {
    applyGlobeScale(gSF - e.deltaY * 0.003);
    e.preventDefault(); e.stopPropagation();
  }, { passive: false });

  function animGlobe(t) {
    requestAnimationFrame(animGlobe);
    const dt = Math.min((t - gLT) * 0.001, 0.05); gLT = t;
    if (!gDrag) gAR += gRS * dt;
    gGrp.rotation.y = gAR + gMR.y;
    gGrp.rotation.x = gMR.x;
    gR.render(gSc, gCam);
  }
  requestAnimationFrame(animGlobe);

  applyGlobeMode('solid');
  globeSyncFn(orbit.radius);
}

connect();

})();
</script>
