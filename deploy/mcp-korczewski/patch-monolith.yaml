# Retarget the monolith's external service references from `workspace`
# to `workspace-korczewski` so this copy reads korczewski's data.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-code-mcp-monolith
spec:
  template:
    spec:
      containers:
        - name: postgres
          env:
            - name: SHARED_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: claude-code-secrets
                  key: SHARED_DB_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://postgres:$(SHARED_DB_PASSWORD)@shared-db.workspace-korczewski.svc.cluster.local:5432/website"

