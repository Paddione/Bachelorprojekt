apiVersion: v1
kind: ConfigMap
metadata:
  name: claude-code-config
data:
  # ════════════════════════════════════════════════════════════════════
  # MCP ENDPOINT URLS
  # All endpoints use Streamable-HTTP unless noted.
  # Credentials are in the claude-code-secrets Secret (default namespace).
  # ════════════════════════════════════════════════════════════════════

  OPENID_PROVIDER_URL: "http://keycloak.workspace.svc.cluster.local:8080/realms/workspace/.well-known/openid-configuration"

  MCP_KUBERNETES_URL:   "http://claude-code-mcp-monolith:8080/mcp"
  MCP_POSTGRES_URL:     "http://claude-code-mcp-monolith:3001/mcp"
  MCP_KEYCLOAK_URL:     "http://claude-code-mcp-monolith:8081/mcp/sse"
  MCP_BROWSER_URL:      "http://claude-code-mcp-monolith:3000/mcp"
  MCP_GITHUB_URL:       "http://claude-code-mcp-monolith:3002/mcp"

  # ════════════════════════════════════════════════════════════════════
  # INTERNAL SERVICE URLS (for direct API calls bypassing MCP)
  # ════════════════════════════════════════════════════════════════════

  KEYCLOAK_INTERNAL_URL:     "http://keycloak.workspace.svc.cluster.local:8080"
  WEBSITE_INTERNAL_URL:      "http://website.website.svc.cluster.local:80"
  WHISPER_URL:               "http://whisper.workspace.svc.cluster.local:8000"
  TRAEFIK_API_URL:           "http://traefik.kube-system.svc.cluster.local:9000/api"
  UPTIME_KUMA_URL:           "http://uptime-kuma.workspace.svc.cluster.local:3001"

  # ════════════════════════════════════════════════════════════════════
  # GUIDE: mcp-kubernetes  (port 3000, streamable-http)
  # ════════════════════════════════════════════════════════════════════
  GUIDE_KUBERNETES: |
    Image: quay.io/containers/kubernetes_mcp_server
    Transport: streamable-http → http://claude-code-mcp-monolith:8080/mcp
    Auth: none (uses claude-code-agent ServiceAccount, ClusterRole bound)

    Capabilities:
      - List/get pods, deployments, services, namespaces, nodes
      - Read pod logs
      - Patch deployments (restart/scale — allowed by RBAC)
      - Does NOT have: exec into pods, access secrets, delete resources

    Key namespaces to query:
      - workspace            (Keycloak, Collabora, Talk HPB, Vaultwarden, Whisper)
      - workspace-korczewski (korczewski.de workloads on the same cluster)
      - website              (mentolder.de Astro website)
      - website-korczewski   (korczewski.de Astro website)
      - default              (Claude Code MCP servers)
      - kube-system          (Traefik, CoreDNS)

    Traefik note: no dedicated Traefik MCP exists. Use this MCP to:
      kubectl get ingressroutes --all-namespaces
      kubectl get middleware --all-namespaces
      Then call TRAEFIK_API_URL directly for router/service detail.

  # ════════════════════════════════════════════════════════════════════
  # GUIDE: mcp-postgres  (port 3001, streamable-http)
  # ════════════════════════════════════════════════════════════════════
  GUIDE_POSTGRES: |
    Image: node:20-alpine + @modelcontextprotocol/server-postgres (read-only)
    Transport: streamable-http → http://claude-code-mcp-monolith:3001/mcp
    Auth: SHARED_DB_PASSWORD from claude-code-secrets
    Host: shared-db.workspace.svc.cluster.local:5432

    Available databases (all read-only):
      - keycloak   → users, realms, sessions, clients
      - vaultwarden → cipher items, collections, organizations
      - website    → chat rooms, messages, meeting transcripts, inbox items

    Usage tips:
      - Prefer mcp-keycloak MCP for structured Keycloak access.
      - Use this MCP for raw SQL queries, debugging, or cross-DB aggregations.
      - All connections enforce read-only via transaction_read_only=on.

  # ════════════════════════════════════════════════════════════════════
  # GUIDE: mcp-github  (port 3002, streamable-http)
  # ════════════════════════════════════════════════════════════════════
  GUIDE_GITHUB: |
    Image: ghcr.io/github/github-mcp-server
    Transport: streamable-http → http://claude-code-mcp-monolith:3002/mcp
    Auth: GITHUB_PAT from claude-code-secrets (set before deploying)

    Required PAT scopes: repo (read), pull_requests (read), issues (read/write)

    Capabilities: list/read repos, PRs, issues, commits, branches,
    create/update issues and PR comments, search code.

    Setup: Replace GITHUB_PAT placeholder in claude-code-secrets with a real token,
    then: task mcp:set-github-pat -- ghp_yourtoken

  # ════════════════════════════════════════════════════════════════════
  # GUIDE: mcp-keycloak  (port 8080, SSE transport)
  # ════════════════════════════════════════════════════════════════════
  GUIDE_KEYCLOAK: |
    Image: quay.io/sshaaf/keycloak-mcp-server
    Transport: SSE → http://claude-code-mcp-monolith:8081/mcp/sse  ← NOTE: SSE, not streamable-http
    Health: http://claude-code-mcp-monolith:8081/q/health
    Auth: JWT Bearer token (see below)

    ⚠️  This MCP uses JWT passthrough auth. You MUST obtain a Keycloak token
    and pass it as "Authorization: Bearer <token>" on every SSE request.

    Get admin token (valid ~60s, re-fetch as needed):
      curl -s -X POST \
        http://keycloak.workspace.svc.cluster.local:8080/realms/master/protocol/openid-connect/token \
        -d "grant_type=password&client_id=admin-cli&username=admin&password=devadmin" \
        | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])"

    Capabilities (50+ tools):
      Users:    GET_USERS, CREATE_USER, UPDATE_USER, DELETE_USER, RESET_PASSWORD
                GET_USER_GROUPS, ADD_USER_TO_GROUP, ADD_ROLE_TO_USER
      Clients:  GET_CLIENTS, CREATE_CLIENT, DELETE_CLIENT, GENERATE_CLIENT_SECRET
      Roles:    GET_REALM_ROLES, CREATE_CLIENT_ROLE
      Groups:   GET_GROUPS, CREATE_GROUP, GET_GROUP_MEMBERS
      Realms:   GET_REALMS, GET_REALM, CREATE_REALM
      Auth:     GET_AUTHENTICATION_FLOWS, GET_FLOW_EXECUTIONS
      IdP:      GET_IDENTITY_PROVIDERS, GET_IDENTITY_PROVIDER_MAPPERS

    Realm in use: workspace (Keycloak, Collabora, Vaultwarden SSO)
    Admin realm:  master (admin-cli client lives here)

  # ════════════════════════════════════════════════════════════════════
  # GUIDE: mcp-browser  (port 3000, streamable-http)
  # ════════════════════════════════════════════════════════════════════
  GUIDE_BROWSER: |
    Image: mcr.microsoft.com/playwright (Chromium/Firefox/Webkit)
    Transport: streamable-http → http://claude-code-mcp-monolith:3000/mcp

    Capabilities:
      - navigate (URL)
      - click (selector)
      - fill (selector, text)
      - screenshot (path/name)
      - evaluate (JS script)
      - hover, scroll, drag-and-drop

    Usage for platform verification:
      - Navigate to http://auth.localhost to check Keycloak
      - Verify SSO redirects between services
      - Capture visual state of UI components (e.g., Whiteboard)

    Note: The browser runs inside the cluster and has internal access to
    all .localhost domains via the cluster's internal network.

  # ════════════════════════════════════════════════════════════════════
  # GUIDE: Traefik (no dedicated MCP — use kubernetes MCP + direct API)
  # ════════════════════════════════════════════════════════════════════
  GUIDE_TRAEFIK: |
    No K8s-deployable Traefik MCP exists. Use these alternatives:

    1. Via mcp-kubernetes: inspect IngressRoutes, Middlewares, TLS config
         kubectl get ingressroutes --all-namespaces -o yaml
         kubectl get middleware --all-namespaces
         kubectl get tlsstores --all-namespaces

    2. Via Traefik REST API (if dashboard is enabled):
         curl http://traefik.kube-system.svc.cluster.local:9000/api/http/routers
         curl http://traefik.kube-system.svc.cluster.local:9000/api/http/services
         curl http://traefik.kube-system.svc.cluster.local:9000/api/http/middlewares
         curl http://traefik.kube-system.svc.cluster.local:9000/api/overview

    Enable Traefik dashboard (if not already):
      kubectl edit helmchartconfig traefik -n kube-system
      Add under valuesContent: api: { dashboard: true, insecure: true }
