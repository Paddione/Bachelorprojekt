# ════════════════════════════════════════════════════════════════════════════
# claude-code-mcp-apps — Application layer: files/calendar/contacts
#
# Ports: 8000 (nextcloud)
# ════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-code-mcp-apps
  labels:
    app: claude-code-mcp-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claude-code-mcp-apps
  template:
    metadata:
      labels:
        app: claude-code-mcp-apps
    spec:
      containers:
        # ── Nextcloud MCP (port 8000) ──────────────────────────────
        - name: nextcloud
          image: ghcr.io/cbcoutinho/nextcloud-mcp-server:latest
          imagePullPolicy: Always
          env:
            - name: NEXTCLOUD_HOST
              value: "http://nextcloud.workspace.svc.cluster.local"
            - name: NEXTCLOUD_USERNAME
              valueFrom:
                secretKeyRef:
                  name: claude-code-secrets
                  key: NEXTCLOUD_USERNAME
            - name: NEXTCLOUD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: claude-code-secrets
                  key: NEXTCLOUD_PASSWORD
          ports:
            - containerPort: 8000
              name: nextcloud
          readinessProbe:
            httpGet: { path: /health/ready, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 10
          livenessProbe:
            httpGet: { path: /health/ready, port: 8000 }
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 5
          resources:
            requests: { memory: 128Mi, cpu: 50m }
            limits:   { memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: claude-code-mcp-apps
spec:
  selector:
    app: claude-code-mcp-apps
  ports:
    - name: nextcloud
      port: 8000
      targetPort: 8000
