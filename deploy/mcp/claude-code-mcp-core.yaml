# ════════════════════════════════════════════════════════════════════════════
# claude-code-mcp-core — Operational backbone: cluster, database
#
# Containers share one network namespace → no DNS between them, all localhost.
# Ports: 8080 (kubernetes), 3001 (postgres)
# ════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-code-mcp-core
  labels:
    app: claude-code-mcp-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claude-code-mcp-core
  template:
    metadata:
      labels:
        app: claude-code-mcp-core
    spec:
      serviceAccountName: claude-code-agent
      containers:
        # ── Kubernetes MCP (port 8080) ──────────────────────────────
        - name: kubernetes
          image: quay.io/containers/kubernetes_mcp_server:latest
          imagePullPolicy: Always
          args: ["--port", "8080", "--stateless", "--cluster-provider", "in-cluster"]
          ports:
            - containerPort: 8080
              name: kubernetes
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests: { memory: 64Mi, cpu: 50m }
            limits:   { memory: 256Mi }

        # ── PostgreSQL MCP (port 3001) ──────────────────────────────
        # Bridges the stdio-only @modelcontextprotocol/server-postgres
        # to streamable-http via supergateway. First boot ~30s (npm install).
        - name: postgres
          image: node:20-alpine
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Installing MCP postgres bridge..."
              npm install -g supergateway @modelcontextprotocol/server-postgres 2>&1 | tail -3
              echo "Starting supergateway on :3001/mcp..."
              exec supergateway \
                --stdio "npx @modelcontextprotocol/server-postgres \"$DATABASE_URL\"" \
                --outputTransport streamableHttp \
                --port 3001 \
                --streamableHttpPath /mcp \
                --healthEndpoint /health
          env:
            - name: SHARED_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: claude-code-secrets
                  key: SHARED_DB_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://postgres:$(SHARED_DB_PASSWORD)@shared-db.workspace.svc.cluster.local:5432/postgres"
          ports:
            - containerPort: 3001
              name: postgres
          readinessProbe:
            httpGet: { path: /health, port: 3001 }
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 3001 }
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests: { memory: 128Mi, cpu: 50m }
            limits:   { memory: 512Mi }

---
apiVersion: v1
kind: Service
metadata:
  name: claude-code-mcp-core
spec:
  selector:
    app: claude-code-mcp-core
  ports:
    - name: kubernetes
      port: 8080
      targetPort: 8080
    - name: postgres
      port: 3001
      targetPort: 3001
