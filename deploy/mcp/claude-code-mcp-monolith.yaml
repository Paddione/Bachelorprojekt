# ════════════════════════════════════════════════════════════════════════════
# MCP Monolith — All production MCP servers in one Pod
#
# This consolidation reduces baseline resource overhead (shared Pod infra)
# and allows scaling the entire AI capability to 0 with a single command.
#
# Containers share the same network namespace (localhost).
# ════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-code-mcp-monolith
  labels:
    app: claude-code-mcp-monolith
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claude-code-mcp-monolith
  template:
    metadata:
      labels:
        app: claude-code-mcp-monolith
    spec:
      serviceAccountName: claude-code-agent
      initContainers:
        # Download github-mcp-server binary so the node github container can
        # run it in stdio mode (HTTP mode requires OAuth which supergateway
        # clients can't satisfy). Distroless image has no cp, so wget instead.
        - name: github-binary
          image: alpine:3.21
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              wget -qO /tmp/github-mcp-server.tar.gz \
                https://github.com/github/github-mcp-server/releases/download/v1.0.3/github-mcp-server_Linux_x86_64.tar.gz && \
              tar -xzf /tmp/github-mcp-server.tar.gz -C /github-bin github-mcp-server && \
              chmod +x /github-bin/github-mcp-server && \
              echo "github-mcp-server ready"
          volumeMounts:
            - name: github-bin
              mountPath: /github-bin
      volumes:
        - name: github-bin
          emptyDir: {}
      containers:
        # ── Kubernetes MCP (port 8080) ──────────────────────────────
        - name: kubernetes
          image: quay.io/containers/kubernetes_mcp_server@sha256:ef1ede0fd73ce975de1850b7f19090d0850c4ce3e7d21d795f21de3ee8d1452c
          imagePullPolicy: IfNotPresent
          args: ["--port", "8080", "--stateless", "--cluster-provider", "in-cluster"]
          ports:
            - containerPort: 8080
              name: kubernetes
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { memory: 64Mi, cpu: 50m }
            limits:   { memory: 256Mi }

        # ── PostgreSQL MCP (port 3001) ──────────────────────────────
        - name: postgres
          image: node:20-alpine
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Installing MCP postgres bridge..."
              npm install -g supergateway @modelcontextprotocol/server-postgres 2>&1 | tail -3
              echo "Starting supergateway on :3001/mcp..."
              exec supergateway \
                --stdio "npx @modelcontextprotocol/server-postgres \"$DATABASE_URL\"" \
                --outputTransport streamableHttp \
                --port 3001 \
                --streamableHttpPath /mcp \
                --healthEndpoint /health
          env:
            - name: SHARED_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: claude-code-secrets
                  key: SHARED_DB_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://postgres:$(SHARED_DB_PASSWORD)@shared-db.workspace.svc.cluster.local:5432/postgres"
          ports:
            - containerPort: 3001
              name: postgres
          readinessProbe:
            httpGet: { path: /health, port: 3001 }
            initialDelaySeconds: 60
            periodSeconds: 10
          resources:
            requests: { memory: 128Mi, cpu: 50m }
            limits:   { memory: 512Mi }

        # ── Keycloak MCP (port 8081 - overridden to avoid conflict with kubernetes on 8080) ─────────
        - name: keycloak
          image: quay.io/sshaaf/keycloak-mcp-server@sha256:12dd5199862055eb38b5f8162cabcc27c1324471b53416389098be263ea14a46
          imagePullPolicy: IfNotPresent
          env:
            - name: KC_URL
              value: "http://keycloak.workspace.svc.cluster.local:8080"
            - name: KC_REALM
              value: "master"
            - name: OIDC_CLIENT_ID
              value: "admin-cli"
            - name: QUARKUS_HTTP_PORT
              value: "8081"
            # Allow any authenticated MCP client (auth is enforced by the Traefik ForwardAuth proxy).
            # The mcp-strip-auth-header Traefik middleware strips the Bearer token before the request
            # reaches this container, so Quarkus OIDC never sees a token to introspect.
            - name: QUARKUS_HTTP_AUTH_PERMISSION_MCP_POLICY
              value: "permit"
            # Use admin service account for Keycloak Admin API (ROPC via admin-cli)
            - name: QUARKUS_KEYCLOAK_ADMIN_CLIENT_USERNAME
              value: "admin"
            - name: QUARKUS_KEYCLOAK_ADMIN_CLIENT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: claude-code-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: QUARKUS_KEYCLOAK_ADMIN_CLIENT_GRANT_TYPE
              value: "PASSWORD"
          ports:
            - containerPort: 8081
              name: keycloak
          readinessProbe:
            httpGet: { path: /q/health, port: 8081 }
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests: { memory: 256Mi, cpu: 100m }
            limits:   { memory: 512Mi }

        # ── Browser MCP (port 3000) ──────────────────────────────────
        - name: playwright
          image: mcr.microsoft.com/playwright:v1.50.1-jammy
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Installing MCP playwright bridge..."
              npm install -g supergateway @playwright/mcp 2>&1 | tail -3
              echo "Starting supergateway on :3000/mcp..."
              exec supergateway \
                --stdio "npx @playwright/mcp" \
                --outputTransport streamableHttp \
                --port 3000 \
                --streamableHttpPath /mcp \
                --healthEndpoint /health
          ports:
            - containerPort: 3000
              name: browser
          readinessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 120
            periodSeconds: 10
          resources:
            requests: { memory: 512Mi, cpu: 100m }
            limits:   { memory: 1Gi, cpu: 500m }

        # ── GitHub MCP (port 3002) ──────────────────────────────────
        # Uses stdio mode via supergateway to bypass the HTTP-mode OAuth
        # requirement. Binary copied from the github-mcp-server image by
        # the github-binary init container.
        - name: github
          image: node:20-alpine
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              npm install -g supergateway 2>&1 | tail -3
              exec supergateway \
                --stdio "/github-bin/github-mcp-server stdio" \
                --outputTransport streamableHttp \
                --port 3002 \
                --streamableHttpPath /mcp \
                --healthEndpoint /health
          env:
            - name: GITHUB_PERSONAL_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claude-code-secrets
                  key: GITHUB_PAT
          ports:
            - containerPort: 3002
              name: github
          readinessProbe:
            httpGet: { path: /health, port: 3002 }
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests: { memory: 128Mi, cpu: 50m }
            limits:   { memory: 256Mi }
          volumeMounts:
            - name: github-bin
              mountPath: /github-bin

        # ── Stripe MCP (port 3003) ──────────────────────────────────
        - name: stripe
          image: node:20-alpine
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              npm install -g supergateway @stripe/agent-toolkit 2>&1
              exec npx supergateway \
                --stdio "stripe-agent-toolkit mcp" \
                --outputTransport streamableHttp \
                --port 3003 \
                --streamableHttpPath /mcp \
                --healthEndpoint /health
          env:
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: claude-code-secrets
                  key: STRIPE_SECRET_KEY
          ports:
            - containerPort: 3003
              name: stripe
          readinessProbe:
            httpGet: { path: /health, port: 3003 }
            initialDelaySeconds: 120
            periodSeconds: 10
          resources:
            requests: { memory: 128Mi, cpu: 50m }
            limits:   { memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: claude-code-mcp-monolith
spec:
  selector:
    app: claude-code-mcp-monolith
  ports:
    - name: kubernetes
      port: 8080
      targetPort: 8080
    - name: postgres
      port: 3001
      targetPort: 3001
    - name: keycloak
      port: 8081
      targetPort: 8081
    - name: browser
      port: 3000
      targetPort: 3000
    - name: github
      port: 3002
      targetPort: 3002
    - name: stripe
      port: 3003
      targetPort: 3003
