# MCP Gateway — Traefik IngressRoute for the mentolder MCP monolith.
# Access: https://mcp.mentolder.de/{service}/mcp
# Security: Token-based auth via mcp-auth-proxy (ForwardAuth)
#
# The korczewski MCP monolith runs in `workspace-korczewski` ns
# (deploy/mcp-korczewski/) and serves https://mcp.korczewski.de.
#
# Requires DNS: mcp.mentolder.de → cluster ingress IP

# ── ForwardAuth — validate MCP tokens via mcp-auth-proxy ────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: mcp-forwardauth
spec:
  forwardAuth:
    address: http://mcp-auth-proxy.default.svc.cluster.local:80/auth
    authResponseHeaders:
      - X-MCP-Role
---
# ── Strip first path segment: /kubernetes/mcp → /mcp ─────────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: mcp-strip-service-prefix
spec:
  stripPrefixRegex:
    regex:
      - "^/[^/]+"
---
# ── Fix request headers before forwarding to MCP backends ────────
# Strip Authorization: GitHub MCP treats it as OAuth and rejects it.
# Force Accept: Gemini CLI 0.39.1 omits this on follow-up requests, causing 406.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: mcp-strip-auth-header
spec:
  headers:
    customRequestHeaders:
      Authorization: ""
      Accept: "application/json, text/event-stream"
---
# ── Middleware chain: auth → strip auth header → strip path prefix ─
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: mcp-chain
spec:
  chain:
    middlewares:
      - name: mcp-forwardauth
      - name: mcp-strip-auth-header
      - name: mcp-strip-service-prefix
---
# ── IngressRoute: path-based routing to all MCP servers ──────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mcp-gateway
spec:
  entryPoints:
    - web
    - websecure
  routes:
    # ── Kubernetes MCP ────────────────────────────────────────────
    - kind: Rule
      match: Host(`mcp.mentolder.de`) && PathPrefix(`/kubernetes`)
      middlewares:
        - name: mcp-chain
      services:
        - name: claude-code-mcp-monolith
          port: 8080

    # ── PostgreSQL MCP ────────────────────────────────────────────
    - kind: Rule
      match: Host(`mcp.mentolder.de`) && PathPrefix(`/postgres`)
      middlewares:
        - name: mcp-chain
      services:
        - name: claude-code-mcp-monolith
          port: 3001

    # ── Keycloak MCP (SSE transport) ──────────────────────────────
    - kind: Rule
      match: Host(`mcp.mentolder.de`) && PathPrefix(`/keycloak`)
      middlewares:
        - name: mcp-chain
      services:
        - name: claude-code-mcp-monolith
          port: 8081

    # ── Browser MCP (Playwright) ──────────────────────────────────
    - kind: Rule
      match: Host(`mcp.mentolder.de`) && PathPrefix(`/browser`)
      middlewares:
        - name: mcp-chain
      services:
        - name: claude-code-mcp-monolith
          port: 3000

    # ── GitHub MCP ────────────────────────────────────────────────
    - kind: Rule
      match: Host(`mcp.mentolder.de`) && PathPrefix(`/github`)
      middlewares:
        - name: mcp-chain
      services:
        - name: claude-code-mcp-monolith
          port: 3002

