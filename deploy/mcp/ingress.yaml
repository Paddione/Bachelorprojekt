# MCP Gateway — single-domain Traefik IngressRoute for all MCP servers
# Access: https://mcp-${PROD_DOMAIN}/{service}/mcp
# Security: Token-based auth via mcp-auth-proxy (ForwardAuth)
#
# Requires DNS: mcp-${PROD_DOMAIN} → 217.195.149.75

# ── ForwardAuth — validate MCP tokens via mcp-auth-proxy ────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: mcp-forwardauth
spec:
  forwardAuth:
    address: http://mcp-auth-proxy.default.svc.cluster.local:80/auth
    authResponseHeaders:
      - X-MCP-Role
---
# ── Strip first path segment: /kubernetes/mcp → /mcp ─────────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: mcp-strip-service-prefix
spec:
  stripPrefixRegex:
    regex:
      - "^/[^/]+"
---
# ── Middleware chain: auth + strip + security headers ────────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: mcp-chain
spec:
  chain:
    middlewares:
      - name: mcp-forwardauth
      - name: mcp-strip-service-prefix
      - name: security-headers
        namespace: ${INFRA_NAMESPACE}
      - name: compression
        namespace: ${INFRA_NAMESPACE}
---
# ── IngressRoute: path-based routing to all MCP servers ──────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mcp-gateway
spec:
  entryPoints:
    - websecure
  routes:
    # ── Kubernetes MCP ────────────────────────────────────────────
    - kind: Rule
      match: Host(`mcp-${PROD_DOMAIN}`) && PathPrefix(`/kubernetes`)
      middlewares:
        - name: mcp-chain
      services:
        - name: openclaw-mcp-core
          port: 8080

    # ── PostgreSQL MCP ────────────────────────────────────────────
    - kind: Rule
      match: Host(`mcp-${PROD_DOMAIN}`) && PathPrefix(`/postgres`)
      middlewares:
        - name: mcp-chain
      services:
        - name: openclaw-mcp-core
          port: 3001

    # ── Mattermost MCP ────────────────────────────────────────────
    - kind: Rule
      match: Host(`mcp-${PROD_DOMAIN}`) && PathPrefix(`/mattermost`)
      middlewares:
        - name: mcp-chain
      services:
        - name: openclaw-mcp-core
          port: 8000

    # ── Nextcloud MCP ─────────────────────────────────────────────
    - kind: Rule
      match: Host(`mcp-${PROD_DOMAIN}`) && PathPrefix(`/nextcloud`)
      middlewares:
        - name: mcp-chain
      services:
        - name: openclaw-mcp-apps
          port: 8000

    # ── Invoice Ninja MCP ─────────────────────────────────────────
    - kind: Rule
      match: Host(`mcp-${PROD_DOMAIN}`) && PathPrefix(`/invoiceninja`)
      middlewares:
        - name: mcp-chain
      services:
        - name: openclaw-mcp-apps
          port: 8080

    # ── Keycloak MCP (SSE transport) ──────────────────────────────
    - kind: Rule
      match: Host(`mcp-${PROD_DOMAIN}`) && PathPrefix(`/keycloak`)
      middlewares:
        - name: mcp-chain
      services:
        - name: openclaw-mcp-auth
          port: 8080

    # ── Browser MCP (Playwright) ──────────────────────────────────
    - kind: Rule
      match: Host(`mcp-${PROD_DOMAIN}`) && PathPrefix(`/browser`)
      middlewares:
        - name: mcp-chain
      services:
        - name: openclaw-mcp-browser
          port: 3000

    # ── GitHub MCP ────────────────────────────────────────────────
    - kind: Rule
      match: Host(`mcp-${PROD_DOMAIN}`) && PathPrefix(`/github`)
      middlewares:
        - name: mcp-chain
      services:
        - name: mcp-github
          port: 3002

    # ── Stripe MCP ────────────────────────────────────────────────
    - kind: Rule
      match: Host(`mcp-${PROD_DOMAIN}`) && PathPrefix(`/stripe`)
      middlewares:
        - name: mcp-chain
      services:
        - name: mcp-stripe
          port: 3003

  tls:
    certResolver: letsencrypt
