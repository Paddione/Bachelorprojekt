# MCP Gateway — single-domain Traefik IngressRoute for all MCP servers
# Access: https://mcp.${PROD_DOMAIN}/{service}/mcp
# Security: Token-based auth via mcp-auth-proxy (ForwardAuth)
#
# Requires DNS: mcp.${PROD_DOMAIN} → 217.195.149.75

# ── ForwardAuth — validate MCP tokens via mcp-auth-proxy ────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: mcp-forwardauth
spec:
  forwardAuth:
    address: http://mcp-auth-proxy.default.svc.cluster.local:80/auth
    authResponseHeaders:
      - X-MCP-Role
---
# ── Strip first path segment: /kubernetes/mcp → /mcp ─────────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: mcp-strip-service-prefix
spec:
  stripPrefixRegex:
    regex:
      - "^/[^/]+"
---
# ── Middleware chain: auth + strip + security headers ────────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: mcp-chain
spec:
  chain:
    middlewares:
      - name: mcp-forwardauth
      - name: mcp-strip-service-prefix
---
# ── IngressRoute: path-based routing to all MCP servers ──────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mcp-gateway
spec:
  entryPoints:
    - web
    - websecure
  routes:
    # ── Kubernetes MCP ────────────────────────────────────────────
    - kind: Rule
      match: Host(`mcp.${PROD_DOMAIN}`) && PathPrefix(`/kubernetes`)
      middlewares:
        - name: mcp-chain
      services:
        - name: claude-code-mcp-monolith
          port: 8080

    # ── PostgreSQL MCP ────────────────────────────────────────────
    - kind: Rule
      match: Host(`mcp.${PROD_DOMAIN}`) && PathPrefix(`/postgres`)
      middlewares:
        - name: mcp-chain
      services:
        - name: claude-code-mcp-monolith
          port: 3001

    # ── Keycloak MCP (SSE transport) ──────────────────────────────
    - kind: Rule
      match: Host(`mcp.${PROD_DOMAIN}`) && PathPrefix(`/keycloak`)
      middlewares:
        - name: mcp-chain
      services:
        - name: claude-code-mcp-monolith
          port: 8081

    # ── Browser MCP (Playwright) ──────────────────────────────────
    - kind: Rule
      match: Host(`mcp.${PROD_DOMAIN}`) && PathPrefix(`/browser`)
      middlewares:
        - name: mcp-chain
      services:
        - name: claude-code-mcp-monolith
          port: 3000

    # ── GitHub MCP ────────────────────────────────────────────────
    - kind: Rule
      match: Host(`mcp.${PROD_DOMAIN}`) && PathPrefix(`/github`)
      middlewares:
        - name: mcp-chain
      services:
        - name: claude-code-mcp-monolith
          port: 3002

    # ── Stripe MCP ────────────────────────────────────────────────
    - kind: Rule
      match: Host(`mcp.${PROD_DOMAIN}`) && PathPrefix(`/stripe`)
      middlewares:
        - name: mcp-chain
      services:
        - name: claude-code-mcp-monolith
          port: 3003
