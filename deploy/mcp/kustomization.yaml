# ═══════════════════════════════════════════════════════════════════
# Skaffold dev overlay for MCP servers (hot-reload iteration).
# The authoritative base manifests live in k3d/ — this overlay adds
# Ingress, auth proxy, and status page for external access.
# ═══════════════════════════════════════════════════════════════════
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - claude-code-rbac.yaml
  - claude-code-secrets.yaml
  - claude-code-config.yaml
  # Consolidated MCP pods (7 containers → 3 pods)
  - claude-code-mcp-core.yaml        # kubernetes + postgres
  - claude-code-mcp-auth.yaml        # keycloak (SSE, Java — separate for resource isolation)
  - claude-code-mcp-browser.yaml     # playwright (Browser interaction)
  # Standalone
  - claude-code-mcp-github.yaml      # replicas=0 — task mcp:set-github-pat to enable
  - claude-code-mcp-stripe.yaml      # Stripe payment MCP — replace STRIPE_SECRET_KEY to activate
  # Auth + Status
  - mcp-tokens.yaml             # Bearer tokens for Claude Code access
  - mcp-auth-proxy.yaml         # ForwardAuth proxy (token validation + role enforcement)
  - mcp-status.yaml             # Health status page (replaces Claude Code WebUI)
  # Ingress — exposes MCP servers via mcp-*.localhost for external clients
  - ingress.yaml
