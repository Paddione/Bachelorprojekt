# MCP PostgreSQL Server — read-only access to all workspace databases
# Connects to shared-db in the workspace namespace
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-postgres
  namespace: workspace
  labels:
    app: mcp-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-postgres
  template:
    metadata:
      labels:
        app: mcp-postgres
    spec:
      containers:
        - name: mcp-postgres
          image: mcp/postgres:latest
          imagePullPolicy: Always
          env:
            - name: MCP_TRANSPORT
              value: "streamable-http"
            - name: MCP_PORT
              value: "3001"
            - name: SHARED_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: SHARED_DB_PASSWORD
            - name: DATABASE_URLS
              value: "postgresql://postgres:$(SHARED_DB_PASSWORD)@shared-db:5432/keycloak?options=-c%20default_transaction_read_only%3Don,postgresql://postgres:$(SHARED_DB_PASSWORD)@shared-db:5432/nextcloud?options=-c%20default_transaction_read_only%3Don,postgresql://postgres:$(SHARED_DB_PASSWORD)@shared-db:5432/website?options=-c%20default_transaction_read_only%3Don"
          ports:
            - containerPort: 3001
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-postgres
  namespace: workspace
spec:
  selector:
    app: mcp-postgres
  ports:
    - port: 3001
      targetPort: 3001
