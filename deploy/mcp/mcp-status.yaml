apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-status-html
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>MCP Server Status</title>
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
          background: #0f1623;
          color: #e8e8f0;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
          padding: 2rem;
        }
        h1 { text-align: center; margin-bottom: 2rem; font-size: 1.8rem; color: #e8c870; }
        h2 { margin: 1.5rem 0 1rem; font-size: 1.3rem; color: #e8c870; }
        .grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
          gap: 1rem;
        }
        .card {
          background: #1a2235;
          border-radius: 0.5rem;
          padding: 1.25rem;
          display: flex;
          align-items: center;
          gap: 0.75rem;
        }
        .dot {
          width: 12px;
          height: 12px;
          border-radius: 50%;
          flex-shrink: 0;
        }
        .dot.up { background: #4caf50; }
        .dot.down { background: #ef4444; }
        .dot.unknown { background: #6b7a8d; }
        .info { display: flex; flex-direction: column; }
        .name { font-weight: 600; font-size: 1rem; }
        .time { font-size: 0.75rem; color: #6b7a8d; margin-top: 0.25rem; }
        footer {
          text-align: center;
          margin-top: 2rem;
          color: #6b7a8d;
          font-size: 0.85rem;
        }
      </style>
    </head>
    <body>
      <h1 id="title"></h1>
      <h2 id="cluster-heading"></h2>
      <div class="grid" id="cluster-grid"></div>
      <h2 id="business-heading"></h2>
      <div class="grid" id="business-grid"></div>
      <footer id="footer"></footer>
      <script>
        var clusterServers = ['kubernetes', 'postgres', 'keycloak', 'browser', 'github'];
        var businessServers = ['mattermost', 'nextcloud', 'invoiceninja', 'stripe'];

        document.getElementById('title').textContent = 'MCP Server Status';
        document.getElementById('cluster-heading').textContent = 'Cluster Management';
        document.getElementById('business-heading').textContent = 'Business';
        document.getElementById('footer').textContent = 'Auto-refreshes every 10s';

        function createCard(name, status, checked) {
          var card = document.createElement('div');
          card.className = 'card';

          var dot = document.createElement('span');
          dot.className = 'dot ' + status;
          card.appendChild(dot);

          var info = document.createElement('div');
          info.className = 'info';

          var nameEl = document.createElement('span');
          nameEl.className = 'name';
          nameEl.textContent = name;
          info.appendChild(nameEl);

          var timeEl = document.createElement('span');
          timeEl.className = 'time';
          timeEl.textContent = checked ? new Date(checked).toLocaleTimeString() : 'Not checked';
          info.appendChild(timeEl);

          card.appendChild(info);
          return card;
        }

        function renderGrid(gridId, servers, data) {
          var grid = document.getElementById(gridId);
          while (grid.firstChild) { grid.removeChild(grid.firstChild); }
          servers.forEach(function(name) {
            var entry = data[name];
            var status = entry ? entry.status : 'unknown';
            var checked = entry ? entry.checked : null;
            grid.appendChild(createCard(name, status, checked));
          });
        }

        function refresh() {
          fetch('/health.json')
            .then(function(r) { return r.json(); })
            .then(function(data) {
              renderGrid('cluster-grid', clusterServers, data);
              renderGrid('business-grid', businessServers, data);
            })
            .catch(function() {
              renderGrid('cluster-grid', clusterServers, {});
              renderGrid('business-grid', businessServers, {});
            });
        }

        refresh();
        setInterval(refresh, 10000);
      </script>
    </body>
    </html>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-status-healthcheck
data:
  healthcheck.sh: |
    #!/bin/sh
    while true; do
      NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
      check() {
        if curl -sf -m 3 "$2" >/dev/null 2>&1; then
          echo "\"$1\":{\"status\":\"up\",\"checked\":\"$NOW\"}"
        else
          echo "\"$1\":{\"status\":\"down\",\"checked\":\"$NOW\"}"
        fi
      }
      RESULTS=""
      RESULTS="${RESULTS}$(check kubernetes http://claude-code-mcp-core:8080/mcp),"
      RESULTS="${RESULTS}$(check postgres http://claude-code-mcp-core:3001/health),"
      RESULTS="${RESULTS}$(check mattermost http://claude-code-mcp-core:8000/health),"
      RESULTS="${RESULTS}$(check nextcloud http://claude-code-mcp-apps:8000/health/ready),"
      RESULTS="${RESULTS}$(check invoiceninja http://claude-code-mcp-apps:8080/mcp),"
      RESULTS="${RESULTS}$(check keycloak http://claude-code-mcp-auth:8080/q/health),"
      RESULTS="${RESULTS}$(check browser http://claude-code-mcp-browser:3000/health),"
      RESULTS="${RESULTS}$(check github http://mcp-github:3002/mcp),"
      RESULTS="${RESULTS}$(check stripe http://mcp-stripe:3003/mcp)"
      echo "{${RESULTS}}" > /usr/share/nginx/html/health.json
      sleep 30
    done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-status
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-status
  template:
    metadata:
      labels:
        app: mcp-status
    spec:
      initContainers:
        - name: copy-html
          image: alpine:3.19
          imagePullPolicy: Always
          command: ["cp", "/src/index.html", "/html/index.html"]
          volumeMounts:
            - name: html-src
              mountPath: /src
            - name: html
              mountPath: /html
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
          resources:
            requests:
              memory: "16Mi"
              cpu: "5m"
            limits:
              memory: "64Mi"
        - name: healthcheck
          image: alpine/curl:latest
          imagePullPolicy: Always
          command: ["/bin/sh", "/scripts/healthcheck.sh"]
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
            - name: healthcheck-script
              mountPath: /scripts
          resources:
            requests:
              memory: "16Mi"
              cpu: "5m"
            limits:
              memory: "64Mi"
      volumes:
        - name: html
          emptyDir: {}
        - name: html-src
          configMap:
            name: mcp-status-html
        - name: healthcheck-script
          configMap:
            name: mcp-status-healthcheck
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-status
spec:
  selector:
    app: mcp-status
  ports:
    - port: 80
      targetPort: 80
