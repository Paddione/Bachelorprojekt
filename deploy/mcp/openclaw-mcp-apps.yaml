# ════════════════════════════════════════════════════════════════════════════
# openclaw-mcp-apps — Application layer: files/calendar/contacts + billing
#
# Ports: 8000 (nextcloud), 8080 (invoiceninja)
# ════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-mcp-apps
  labels:
    app: openclaw-mcp-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw-mcp-apps
  template:
    metadata:
      labels:
        app: openclaw-mcp-apps
    spec:
      containers:
        # ── Nextcloud MCP (port 8000) ──────────────────────────────
        - name: nextcloud
          image: ghcr.io/cbcoutinho/nextcloud-mcp-server:latest
          env:
            - name: NEXTCLOUD_HOST
              value: "http://nextcloud.homeoffice.svc.cluster.local"
            - name: NEXTCLOUD_USERNAME
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: NEXTCLOUD_USERNAME
            - name: NEXTCLOUD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: NEXTCLOUD_PASSWORD
          ports:
            - containerPort: 8000
              name: nextcloud
          readinessProbe:
            httpGet: { path: /health/ready, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet: { path: /health/ready, port: 8000 }
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests: { memory: 128Mi, cpu: 50m }
            limits:   { memory: 512Mi }

        # ── Invoice Ninja MCP (port 8080) ──────────────────────────
        - name: invoiceninja
          image: ckanthony/openapi-mcp:latest
          args: ["--spec", "/specs/spec.json", "--port", "8080", "--base-url", "http://invoiceninja.homeoffice.svc.cluster.local"]
          env:
            - name: REQUEST_HEADERS
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: INVOICENINJA_REQUEST_HEADERS
          ports:
            - containerPort: 8080
              name: invoiceninja
          volumeMounts:
            - name: openapi-spec
              mountPath: /specs
              readOnly: true
          resources:
            requests: { memory: 64Mi, cpu: 50m }
            limits:   { memory: 512Mi }
      volumes:
        - name: openapi-spec
          configMap:
            name: invoiceninja-openapi
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw-mcp-apps
spec:
  selector:
    app: openclaw-mcp-apps
  ports:
    - name: nextcloud
      port: 8000
      targetPort: 8000
    - name: invoiceninja
      port: 8080
      targetPort: 8080
