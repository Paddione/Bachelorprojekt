apiVersion: v1
kind: Secret
metadata:
  name: openclaw-secrets
  # All MCP pods live in default namespace and reference this secret.
  # Values here are dev-only placeholders — override at deploy time for production.
type: Opaque
stringData:
  # ── Shared PostgreSQL (workspace namespace) ─────────────────────────────────
  # Mirrors workspace-secrets SHARED_DB_PASSWORD — keep in sync.
  SHARED_DB_PASSWORD: "devshareddb"

  # ── GitHub ──────────────────────────────────────────────────────────────────
  # Create at: https://github.com/settings/tokens/new
  # Needs: repo (read), pull_requests (read), issues (read/write)
  GITHUB_PAT: "REPLACE_WITH_GITHUB_PAT"

  # ── Mattermost ───────────────────────────────────────────────────────────────
  # For production: create a dedicated "openclaw" bot in Mattermost Admin >
  # Integrations > Bot Accounts, then paste the generated token here.
  # For dev: using billing-bot token as a placeholder.
  MATTERMOST_TOKEN: "r6pe9fuoztb4fr1sinjtypwhyy"

  # ── Nextcloud ────────────────────────────────────────────────────────────────
  # For production: generate an App Password in Nextcloud (Settings > Security).
  # For dev: using admin credentials directly.
  NEXTCLOUD_USERNAME: "admin"
  NEXTCLOUD_PASSWORD: "devnextcloudadmin"

  # ── Invoice Ninja ────────────────────────────────────────────────────────────
  # Generate in Invoice Ninja: Settings > API Tokens > Add Token
  INVOICENINJA_API_TOKEN: "testrunnertoken2026"
  # Full JSON headers string consumed by ckanthony/openapi-mcp's REQUEST_HEADERS env var.
  # Update the token value here when rotating the API token above.
  INVOICENINJA_REQUEST_HEADERS: '{"X-Api-Token":"testrunnertoken2026","X-Requested-With":"XMLHttpRequest"}'

  # ── Stripe ───────────────────────────────────────────────────────────────────
  # Get keys at: https://dashboard.stripe.com/test/apikeys
  # Use sk_test_ keys for development, sk_live_ for production.
  STRIPE_SECRET_KEY: "REPLACE_WITH_STRIPE_SECRET_KEY"
