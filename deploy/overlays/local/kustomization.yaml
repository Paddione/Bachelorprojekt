apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev

resources:
  - ../../base

# Point images to local k3d registry
images:
  - name: demo-app
    newName: registry.localhost:5000/demo-app
    newTag: latest

# Local-specific patches
patches:
  - target:
      kind: Deployment
      name: demo-app
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: APP_ENV
            value: "local"
          - name: LOG_LEVEL
            value: "debug"
      # Dev image runs as root (golang:alpine + Air), relax security for local
      - op: remove
        path: /spec/template/spec/securityContext
      - op: remove
        path: /spec/template/spec/containers/0/securityContext
