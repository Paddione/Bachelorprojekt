apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracking-db
  labels:
    app: tracking-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tracking-db
  template:
    metadata:
      labels:
        app: tracking-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom:
            - secretRef:
                name: tracking-db-credentials
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "tracking"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "tracking"]
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: tracking-db-data
        - name: init
          configMap:
            name: tracking-init-sql
