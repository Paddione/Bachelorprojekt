apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: tracking

resources:
  - namespace.yaml
  - secrets.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - tracking-ui-deployment.yaml
  - tracking-ui-service.yaml
  - ingress.yaml

configMapGenerator:
  - name: tracking-init-sql
    files:
      - init.sql

generatorOptions:
  disableNameSuffixHash: true
