apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracking-ui
  labels:
    app: tracking-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tracking-ui
  template:
    metadata:
      labels:
        app: tracking-ui
    spec:
      containers:
        - name: tracking-ui
          image: registry.localhost:5000/tracking-ui:latest
          ports:
            - containerPort: 3000
          env:
            - name: PGHOST
              value: tracking-db.tracking.svc.cluster.local
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: tracking
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: tracking-db-credentials
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: tracking-db-credentials
                  key: POSTGRES_PASSWORD
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
