# ── GPU-accelerated Whisper Transcription (NVIDIA CUDA) ──────────────────────
# Runs on the workstation outside of Kubernetes.
# Both clusters reach this via Kubernetes Service overrides:
#   k3d:  Container IP on k3d-dev network :8000  (task gpu-worker:switch-dev)
#   k3s:  10.13.13.2:8000 via WireGuard          (task gpu-worker:switch-prod)
#
# Single uvicorn worker = implicit FIFO queue (one inference at a time).
# ─────────────────────────────────────────────────────────────────────────────
services:
  whisper-gpu:
    image: fedirz/faster-whisper-server:latest-cuda
    container_name: whisper-gpu
    restart: unless-stopped
    ports:
      - "127.0.0.1:8800:8000"
    environment:
      - WHISPER__MODEL=Systran/faster-whisper-medium
      - WHISPER__COMPUTE_TYPE=float16
      - WHISPER__DEVICE=cuda
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    networks:
      - default
      - k3d
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  huggingface-cache:

networks:
  k3d:
    external: true
    name: k3d-dev
