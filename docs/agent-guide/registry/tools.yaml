- id: superpowers
  name_de: "Superpowers (/superpowers)"
  kind: skill
  harness: claude
  summary_de: "Aktiviert die Skill-Bibliothek: zeigt, wie Claude Skills findet und nutzt."
  what_for_de: "Der Einstieg in alle Skills. Erklärt Claude, welche Fertigkeiten es hat und wann es sie einsetzen muss."
  how_to_start_de: "Tippe '/superpowers' in Claude Code – der Skill lädt sich selbst."
  what_could_go_wrong_de: "Kaum etwas: er lädt nur Wissen, ändert nichts am Code."
  danger: safe
  theme: entwickeln
  stages: [brainstorm]
  aliases_de: [superpowers, skills, fertigkeiten]
  guardrails: []
  related: [dev-flow-plan]
  links: []
  init_prompt_de: "/superpowers"
- id: brainstorming
  name_de: "Brainstorming (/brainstorming)"
  kind: skill
  harness: claude
  summary_de: "Denkt ein Vorhaben mit dir durch, bevor Code entsteht – Intention, Anforderungen, Design."
  what_for_de: "Vor jeder kreativen Arbeit: klärt, was du wirklich willst, und hält Entscheidungen fest."
  how_to_start_de: "Sage '/brainstorming' oder beschreibe das Vorhaben – der Skill startet von selbst."
  what_could_go_wrong_de: "Wenig: er stoppt bewusst vor der Umsetzung. Du bestätigst das Design."
  danger: safe
  theme: entwickeln
  stages: [idee, brainstorm]
  aliases_de: [brainstorm, brainstorming, idee, design, konzept]
  guardrails: []
  related: [dev-flow-plan, superpowers]
  links: []
  init_prompt_de: "/brainstorming – ich möchte etwas Neues bauen und will es erst durchdenken."
- id: dev-flow-plan
  name_de: "Planungs-Skill (dev-flow-plan)"
  kind: skill
  harness: claude
  summary_de: "Der Startpunkt für jede Änderung: wählt den Pfad und schreibt einen Plan."
  what_for_de: "Hilft dir zu entscheiden, ob etwas ein Feature, ein Fix oder eine Wartung (Chore) ist, denkt das Vorhaben mit dir durch und schreibt einen Plan. Setzt nichts um."
  how_to_start_de: "Beschreibe einfach in eigenen Worten, was du ändern willst – der Skill startet von selbst."
  what_could_go_wrong_de: "Wenig: er stoppt bewusst, bevor Code geschrieben wird. Du bestätigst Design und Plan."
  danger: caution
  theme: entwickeln
  stages: [plan]
  aliases_de: [plan, planen, brainstorm, spec]
  guardrails: [G-PULL-FIRST]
  related: [dev-flow-execute, dev-flow-chore]
  links: []
  init_prompt_de: "Ich will etwas ändern – starte die Planung (dev-flow-plan)."
- id: dev-flow-chore
  name_de: "Wartungs-Skill (dev-flow-chore)"
  kind: skill
  harness: claude
  summary_de: "Erledigt Wartung ohne Verhaltensänderung in einem Rutsch und mergt sie."
  what_for_de: "Für Doku, Dependency-Bumps, Config/Umbenennungen, CI-Tweaks und Aufräumen — direkt ausgeführt und gemergt, ohne Plan und ohne dev-flow-execute. Für Features/Fixes stattdessen dev-flow-plan."
  how_to_start_de: "Sage z.B. 'bump die Abhängigkeiten' oder 'räum die Doku auf' – der Skill startet von selbst, oder dev-flow-plan leitet Chores hierher."
  what_could_go_wrong_de: "Wenig: keine Verhaltensänderung. CI könnte den Merge blockieren; der falsche Branch könnte aktiv sein (🟡)."
  danger: caution
  theme: entwickeln
  stages: [code, pr-ci]
  aliases_de: [chore, wartung, aufraeumen, "dependency-bump", doku]
  guardrails: [G-PULL-FIRST, G-PR-NOT-MAIN]
  related: [dev-flow-plan]
  links: []
  init_prompt_de: "/dev-flow-chore – erledige diese Wartung und merge sie."
- id: dev-flow-execute
  name_de: "Umsetzungs-Skill (dev-flow-execute)"
  kind: skill
  harness: claude
  summary_de: "Setzt einen fertigen Plan um und öffnet einen Pull Request."
  what_for_de: "Implementiert den Plan task-by-task, läuft Tests, pusht und erstellt den PR. Wird nach dev-flow-plan aufgerufen."
  how_to_start_de: "Sage '/dev-flow-execute' oder 'Setze den Plan um' – ein staged Plan muss bereits existieren."
  what_could_go_wrong_de: "Der falsche Branch könnte aktiv sein (🟡); CI könnte fehlschlagen und den Merge blockieren."
  danger: caution
  theme: entwickeln
  stages: [code, pr-ci]
  aliases_de: [umsetzen, implementieren, ausfuehren, pr]
  guardrails: [G-PULL-FIRST, G-PR-NOT-MAIN]
  related: [dev-flow-plan, dev-flow-iterate]
  links: []
  init_prompt_de: "/dev-flow-execute – setze den fertigen Plan um und öffne einen PR."
- id: dev-flow-iterate
  name_de: "Dev-Iterations-Skill (dev-flow-iterate)"
  kind: skill
  harness: claude
  summary_de: "Deployt Änderungen ins Dev-Cluster und zeigt Logs – zum schnellen Ausprobieren."
  what_for_de: "Shortcut für 'deploy + Logs ansehen + debuggen' im lokalen Dev-Cluster (dev.mentolder.de)."
  how_to_start_de: "Nutze ihn nach dev-flow-execute, wenn du etwas im Dev-Cluster live sehen willst."
  what_could_go_wrong_de: "Deployment schlägt fehl; Logs zeigen den Fehler. ENV= muss auf dev zeigen."
  danger: caution
  theme: entwickeln
  stages: [code, deploy]
  aliases_de: [dev, iterieren, ausprobieren, "dev-cluster"]
  guardrails: [G-ENV-EXPLICIT, G-CONTEXT-CHECK]
  related: [dev-flow-execute, dev-flow-e2e]
  links: []
  init_prompt_de: "/dev-flow-iterate – deploye ins Dev-Cluster und zeig mir die Logs."
- id: dev-flow-e2e
  name_de: "E2E-Test-Skill (dev-flow-e2e)"
  kind: skill
  harness: claude
  summary_de: "Schreibt und führt End-to-End-Tests gegen die Live-Umgebung nach einem Merge aus."
  what_for_de: "Playwright-Tests gegen die echte, laufende Umgebung – prüft, ob das Feature wirklich funktioniert."
  how_to_start_de: "Nur nach einem Merge und Deploy aufrufen; Umgebungs-URL muss erreichbar sein."
  what_could_go_wrong_de: "Test schlägt fehl, wenn die Umgebung noch startet oder fehlerhaft deployt wurde."
  danger: caution
  theme: testen
  stages: [live]
  aliases_de: [e2e, playwright, "end-to-end", walkthrough]
  guardrails: [G-ENV-EXPLICIT]
  related: [dev-flow-iterate]
  links: []
  init_prompt_de: "/dev-flow-e2e – schreibe und führe E2E-Tests gegen die Live-Umgebung aus."
- id: task-oracle
  name_de: "Task-Orakel (task-oracle)"
  kind: task
  harness: both
  summary_de: "Findet den richtigen Task-Befehl für ein Ziel in einfachem Deutsch."
  what_for_de: "Übersetzt 'Ich will X tun' in den passenden task-Befehl, ohne dass du die Taskfile kennen musst."
  how_to_start_de: "Rufe auf: bash scripts/vda.sh oracle 'Dein Ziel auf Deutsch'."
  what_could_go_wrong_de: "Das Orakel könnte den falschen Task vorschlagen; prüfe immer die Ausgabe kurz."
  danger: safe
  theme: entwickeln
  common: true
  order: 5
  aliases_de: [task, orakel, befehl, taskfile, kommando]
  guardrails: []
  related: []
  links: []
- id: agent-website
  name_de: "Website-Agent"
  kind: agent
  harness: both
  summary_de: "Bearbeitet die Webseite: Texte, Design, Komponenten und Svelte-Code."
  what_for_de: "Für alles rund um website/src/ – Astro-Seiten, Svelte-Komponenten, CSS, Inhalte."
  how_to_start_de: "Beschreibe einfach, was auf der Website geändert werden soll."
  what_could_go_wrong_de: "Visuelle Änderungen wirken erst nach einem Deploy; er kann Typo-Fehler einbauen."
  danger: caution
  theme: website
  aliases_de: [website, astro, svelte, css, frontend]
  guardrails: [G-PULL-FIRST, G-PR-NOT-MAIN]
  related: [agent-infra]
  links:
    - { label_de: "Claude-Code-Doku", url: "https://docs.mentolder.de/claude-code.html" }
  init_prompt_de: "Übergib das an den Website-Agenten: <was auf der Website geändert werden soll>."
- id: agent-ops
  name_de: "Betriebs-Agent (ops)"
  kind: agent
  harness: both
  summary_de: "Schaut nach, warum etwas nicht läuft – liest Logs und Status, ohne etwas zu verändern."
  what_for_de: "Für Fragen wie 'Warum ist Dienst X rot?' oder 'Läuft alles?'. Liest Pod-Status und Protokolle (Logs)."
  how_to_start_de: "Frag z. B.: 'Warum startet Nextcloud nicht?' oder 'Zeig mir den Status aller Dienste.'"
  what_could_go_wrong_de: "Beim reinen Nachschauen kaum etwas. Vorsicht erst, wenn er etwas neu startet (das ist 🟡)."
  danger: safe
  theme: betrieb
  stages: [live]
  common: true
  order: 4
  aliases_de: ["warum rot", crash, logs, "laeuft nicht", status, betrieb]
  guardrails: [G-CONTEXT-CHECK]
  related: [agent-infra]
  links: []
  init_prompt_de: "Frag den Betriebs-Agenten: warum läuft <Dienst> nicht / ist alles grün?"
- id: agent-infra
  name_de: "Infrastruktur-Agent (infra)"
  kind: agent
  harness: both
  summary_de: "Deployt Kubernetes-Manifeste und verwaltet Cluster-Konfiguration."
  what_for_de: "Für k8s-Manifeste, Kustomize-Overlays, Taskfile-Tasks und ENV-spezifische Deployments."
  how_to_start_de: "Beschreibe, was deployt oder konfiguriert werden soll – immer mit dem Ziel-ENV."
  what_could_go_wrong_de: "Falsches ENV= deployt in die falsche Umgebung (🟠). Manifestfehler können Dienste lahmlegen."
  danger: assisted
  theme: ausrollen
  stages: [deploy]
  aliases_de: [infra, kubernetes, kustomize, manifest, deploy]
  guardrails: [G-ENV-EXPLICIT, G-VALIDATE-FIRST, G-ASK-EXPERT]
  related: [agent-ops, agent-security]
  links: []
  init_prompt_de: "Übergib das an den Infrastruktur-Agenten: <Manifest-/Overlay-/Deploy-Aufgabe>."
- id: agent-test
  name_de: "Test-Agent"
  kind: agent
  harness: both
  summary_de: "Schreibt und führt Tests aus (BATS, Playwright, vitest)."
  what_for_de: "Für FA-*, SA-*, NFA-*-Testfälle, BATS-Skripte und Playwright-E2E-Tests."
  how_to_start_de: "Sage z. B. 'Schreib einen Test für Feature X' oder 'FA-05 schlägt fehl, bitte fixen'."
  what_could_go_wrong_de: "Test kann die falsche Umgebung treffen; Playwright braucht laufende Dienste."
  danger: caution
  theme: testen
  aliases_de: [test, bats, playwright, vitest]
  guardrails: [G-ENV-EXPLICIT]
  related: [dev-flow-e2e]
  links: []
  init_prompt_de: "Übergib das an den Test-Agenten: <Test schreiben/reparieren/ausführen>."
- id: agent-db
  name_de: "Datenbank-Agent (db)"
  kind: agent
  harness: both
  summary_de: "Verwaltet PostgreSQL-Schema, Migrationen und Backups."
  what_for_de: "Für Datenbankfragen: Schema-Änderungen, SQL-Abfragen, Backup/Restore."
  how_to_start_de: "Beschreibe die Datenbankaufgabe – Schema-Migration, Query oder Datenfix."
  what_could_go_wrong_de: "Schema-Änderungen betreffen beide Marken (workspace + workspace-korczewski). Falsche DB-Operation kann Daten unwiederbringlich löschen (🟠)."
  danger: assisted
  theme: datenbank
  aliases_de: [datenbank, postgres, schema, backup, query]
  guardrails: [G-ENV-EXPLICIT, G-ASK-EXPERT]
  related: [agent-infra]
  links: []
  init_prompt_de: "Frag den Datenbank-Agenten: <Schema, Query, Backup/Restore>."
- id: agent-security
  name_de: "Sicherheits-Agent (security)"
  kind: agent
  harness: both
  summary_de: "Rotiert Secrets, verwaltet Keycloak-Realms und SealedSecrets."
  what_for_de: "Für Geheimnis-Rotation, Keycloak-Konfiguration, OIDC-Clients und Zertifikate."
  how_to_start_de: "Nur mit Vorsicht aufrufen; erkläre genau, welches Secret oder welche Konfiguration geändert werden soll."
  what_could_go_wrong_de: "Falsche Reihenfolge bei Sealed-Secrets überschreibt Produktiv-Zugangsdaten (🔴). Nur mit Patrick abstimmen."
  danger: assisted
  theme: sicherheit
  aliases_de: [secret, keycloak, oidc, sealedsecret, zertifikat, rotieren]
  guardrails: [G-SECRET-ORDER, G-ASK-EXPERT, G-ENV-EXPLICIT]
  related: [agent-infra]
  links:
    - { label_de: "Begriffe & Glossar", url: "https://docs.mentolder.de/glossary.html" }
  init_prompt_de: "Übergib das an den Security-Agenten: <Secret rotieren, Keycloak/OIDC, DSGVO>."
- id: factory
  name_de: "Software Factory (Auto-Bau)"
  kind: task
  harness: both
  summary_de: "Baut ein Feature (halb-)autonom: Scout → Design → Plan → Implement → Verify → Deploy."
  what_for_de: "Wenn ein gut umrissenes Feature von einem Multi-Agent-Lauf gebaut werden soll — entweder selbst geplant oder aus einem übergebenen Menschen-Plan (Plan-Reuse)."
  how_to_start_de: "Über das Claude-Code-Workflow-Tool mit scripts/factory/pipeline.js starten ('task factory:run' zeigt die genaue Invocation). Für einen gefahrlosen Probelauf args { dry_run: true } übergeben — kein Merge, kein Deploy."
  what_could_go_wrong_de: "Sie implementiert und deployt selbstständig (🟠). Ohne Dry-Run kann ein fehlerhafter Stand live gehen — darum erst den Probelauf, dann bewusst scharf schalten."
  danger: assisted
  theme: fabrik
  stages: [code, pr-ci, deploy]
  aliases_de: [factory, "software factory", pipeline, "auto-bau", autonom, scout]
  guardrails: [G-FACTORY-DRYRUN, G-PR-NOT-MAIN, G-VALIDATE-FIRST]
  related: [dev-flow-plan, factory-dispatch]
  links: []
  init_prompt_de: "Übergib das an die Software Factory: <gut umrissenes Feature> — und mach zuerst einen Dry-Run."
- id: factory-dispatch
  name_de: "Factory-Dispatcher (Warteschlange)"
  kind: task
  harness: both
  summary_de: "Holt wartende Tickets aus der Warteschlange, prüft Konflikte und startet die Factory-Pipeline."
  what_for_de: "Damit übergebene Tickets (type=feature/status=backlog) automatisch abgearbeitet werden — mit Slots pro Marke, Konflikt-Gate und Watchdog."
  how_to_start_de: "Über das Workflow-Tool mit scripts/factory/dispatcher.js starten ('task factory:dispatch' zeigt die Invocation), wiederkehrend selbst-getaktet via /loop. Probelauf mit args { dry_run: true }."
  what_could_go_wrong_de: "Er startet Bauläufe selbstständig (🟠). Bei überlappenden Dateien greift das Konflikt-Gate; ein hängender Lauf wird nach 30 min vom Watchdog eskaliert."
  danger: assisted
  theme: fabrik
  stages: [code, pr-ci, deploy]
  aliases_de: [dispatcher, warteschlange, queue, slots, watchdog, scheduler]
  guardrails: [G-FACTORY-DRYRUN, G-PR-NOT-MAIN]
  related: [factory]
  links: []
  init_prompt_de: "Starte den Factory-Dispatcher: arbeite wartende Tickets aus der Warteschlange ab (zuerst Dry-Run)."
- id: opencode-git-workflow
  name_de: "OpenCode-Git-Workflow"
  kind: skill
  harness: opencode
  summary_de: "Git-Lebenszyklus für OpenCode: Pull-First, Branch-Regeln, Worktree-Setup, Commit-Format, PR-Erstellung."
  what_for_de: "Standardisiert alle Git-Operationen in OpenCode-Sessions – vom Branch-Wechsel bis zum Merge."
  how_to_start_de: "Wird von opencode-flow-plan/execute/chore automatisch geladen. Manuell: lade die Skill opencode-git-workflow."
  what_could_go_wrong_de: "Git-crypt-verschlüsselte Dateien können in Worktrees fehlen – darum nutzen die Skills scripts/worktree-create.sh."
  danger: safe
  theme: entwickeln
  stages: [code, pr-ci]
  aliases_de: [git, commit, pr, branch, worktree]
  guardrails: [G-PULL-FIRST, G-PR-NOT-MAIN]
  related: [opencode-flow-plan, opencode-flow-execute, opencode-flow-chore]
  links: []
  init_prompt_de: "Lade opencode-git-workflow – ich brauche Git-Operationen in einer OpenCode-Session."
- id: opencode-flow-plan
  name_de: "OpenCode-Planungs-Skill (opencode-flow-plan)"
  kind: skill
  harness: opencode
  summary_de: "OpenCode-native Planung: Brainstorming, Feature/Fix/Chore-Entscheidung, OpenSpec-Plan-Erstellung."
  what_for_de: "Ersetzt dev-flow-plan in OpenCode. Nutzt delegate() für Read-Only-Recherche und scripts/worktree-create.sh für Git-crypt-sichere Worktrees."
  how_to_start_de: "Beschreibe die Änderung – der Skill entscheidet über den Pfad (Feature/Fix/Chore)."
  what_could_go_wrong_de: "Kein Task-Tool für Write-fähige Sub-Agenten – Planung und Umsetzung laufen im gleichen Session-Kontext."
  danger: caution
  theme: entwickeln
  stages: [plan]
  aliases_de: [plan, planen, brainstorm, spec, "opencode-plan"]
  guardrails: [G-PULL-FIRST]
  related: [opencode-git-workflow, opencode-flow-execute, opencode-flow-chore]
  links: []
  init_prompt_de: "Lade opencode-flow-plan – ich möchte eine Änderung in OpenCode planen."
- id: opencode-flow-execute
  name_de: "OpenCode-Umsetzungs-Skill (opencode-flow-execute)"
  kind: skill
  harness: opencode
  summary_de: "OpenCode-native Umsetzung: Task-für-Task-Implementierung, Tests, PR-Erstellung."
  what_for_de: "Ersetzt dev-flow-execute in OpenCode. Arbeitet inline statt per Sub-Agent-Delegation."
  how_to_start_de: "Sage 'Setze den Plan um' – ein staged Plan muss existieren."
  what_could_go_wrong_de: "Ohne Task-Tool für Write-fähige Delegation läuft alles im Hauptsession-Kontext – keine Isolation zwischen Tasks."
  danger: caution
  theme: entwickeln
  stages: [code, pr-ci]
  aliases_de: [umsetzen, implementieren, pr, "opcode-execute"]
  guardrails: [G-PULL-FIRST, G-PR-NOT-MAIN]
  related: [opencode-git-workflow, opencode-flow-plan, opencode-flow-chore]
  links: []
  init_prompt_de: "Lade opencode-flow-execute – setze den Plan in OpenCode um und öffne einen PR."
- id: opencode-flow-chore
  name_de: "OpenCode-Wartungs-Skill (opencode-flow-chore)"
  kind: skill
  harness: opencode
  summary_de: "OpenCode-native Wartung: Docs, Bumps, Config, Cleanup – direkt ausführen und mergen."
  what_for_de: "Ersetzt dev-flow-chore in OpenCode. Kein Plan nötig, kein dev-flow-execute – direkt loslegen."
  how_to_start_de: "Sage z.B. 'Bump die Abhängigkeiten in OpenCode'."
  what_could_go_wrong_de: "Wie dev-flow-chore: wenig Risiko, da keine Verhaltensänderung. CI könnte blocken."
  danger: caution
  theme: entwickeln
  stages: [code, pr-ci]
  aliases_de: [chore, wartung, "opencode-chore", aufraeumen]
  guardrails: [G-PULL-FIRST, G-PR-NOT-MAIN]
  related: [opencode-git-workflow, opencode-flow-plan, opencode-flow-execute]
  links: []
  init_prompt_de: "Lade opencode-flow-chore – erledige diese Wartung in OpenCode und merge sie."
