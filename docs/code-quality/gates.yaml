# docs/code-quality/gates.yaml
# Gate configuration. scan.* defines the universe for emit + every gate.
scan:
  code_roots:
    - website
    - tests
    - scripts
    - brett
    - arena-server
    - assets
    - art-library
    - k3d
    - prod
    - prod-fleet
    - prod-mentolder
    - prod-korczewski
    - environments
    - k3s
    - deploy
    - wireguard
    - docker
    - mcp-browser
    - claude-code
    - openclaw
    - pentest-dashboard
  ignore_globs:
    - "k3d/docs-content-built/**"
    - "website/src/lib/system-test-seed-data.ts"
    # Synthetic gate-test fixtures live under scripts/** (scripts-infra) but must
    # never enter the scan-universe — otherwise they perturb repo-index.json and
    # could be mistaken for orphans/over-limit files. Ignoring them keeps the
    # index and every gate baseline stable as fixtures are added (Finding-3 fix).
    - "scripts/code-quality/fixtures/**"

s1:
  limits:
    .astro: 400
    .ts: 600
    .svelte: 500
    .sh: 500
    .mjs: 500
    .mts: 500
    .py: 600
    .js: 600
    .jsx: 600
    .tsx: 400
    .cjs: 200
    .bash: 300
    .java: 400
    .php: 400
  ignore:
    - "website/src/lib/system-test-seed-data.ts"
    # pipeline.js is a single monolithic Claude Code Workflow script: the harness
    # forbids top-level imports-before-`meta` and dynamic import(), so it cannot be
    # safely split into modules (see T000460). It is a sanctioned exception to the
    # per-file line limit; the FA-SF-20 contract test guards its structural invariants.
    - "scripts/factory/pipeline.js"
    # website-db.ts is the central DB access layer for the website — it accumulates all
    # queries across all features. Splitting it would require carefully managing the
    # single PostgreSQL pool. Accepted as a long-term refactoring target.
    - "website/src/lib/website-db.ts"

s2:
  graphs:
    - id: website
      tsconfig: website/tsconfig.json
    - id: arena-server
      tsconfig: arena-server/tsconfig.json
    - id: e2e
      tsconfig: tests/e2e/tsconfig.json

s3:
  scope_dirs:
    - k3d/
    - prod/
    - prod-fleet/
    - prod-mentolder/
    - prod-korczewski/
    - website/src/
  # configmap-domains.yaml is the *.localhost dev SSOT — never a violation.
  # sitemap.xml.ts derives domain from BRAND env var (legitimate conditional) — not a hardcoded host.
  allowlist_files:
    - k3d/configmap-domains.yaml
    - website/src/pages/sitemap.xml.ts
    - prod-fleet/mentolder/sessions-server.yaml

s4:
  manifest_globs:
    - "k3d/*.yaml"
  script_globs:
    - "scripts/*.sh"
    - "scripts/*.mjs"
  reference_sources:
    - "Taskfile*.yml"
    - "**/kustomization.yaml"
    - "**/kustomization.yml"
    - "docs/**/*.md"
    - ".github/workflows/*.yml"
    - "scripts/**/*.sh"
    - "scripts/**/*.mjs"
    # Skills under .claude/skills/ often reference scripts via `bash scripts/<name>.sh`
    # (e.g. dev-flow-execute → scripts/devflow-ci-watch.sh). Without this entry,
    # those scripts are flagged as S4-orphans. Added in T001007.
    - ".claude/skills/**/*.md"
    # AGENTS.md is the canonical reference for agent coordination scripts (agent-lock.sh,
    # agent-msg.sh, agent-escalate.sh). Added in T001049.
    - "AGENTS.md"
  allowlist_globs:
    - "k3d/office-stack/**"
    - "k3d/coturn-stack/**"
    - "k3d/sealed-secrets-controller.yaml"
    - "k3d/backup-secrets.yaml"
