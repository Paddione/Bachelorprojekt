# docs/code-quality/gates.yaml
# Gate configuration. scan.* defines the universe for emit + every gate.
scan:
  code_roots:
    - website
    - tests
    - scripts
    - brett
    - assets
    - art-library
    - k3d
    - prod
    - prod-fleet
    - prod-mentolder
    - prod-korczewski
    - environments
    - k3s
    - deploy
    - wireguard
    - docker
    - mcp-browser
    - claude-code
    - openclaw
    - .opencode
  ignore_globs:
    - "k3d/docs-content-built/**"
    - "website/src/lib/system-test-seed-data.ts"
    # Synthetic gate-test fixtures live under scripts/** (scripts-infra) but must
    # never enter the scan-universe — otherwise they perturb repo-index.json and
    # could be mistaken for orphans/over-limit files. Ignoring them keeps the
    # index and every gate baseline stable as fixtures are added (Finding-3 fix).
    - "scripts/code-quality/fixtures/**"
    # environments/.secrets/** are git-crypt encrypted files. Counting them from disk
    # produces different line counts depending on whether git-crypt is unlocked (local)
    # or locked (CI), causing the LOC baseline to drift without tracked-file changes.
    # These are deployment secrets, not source code — exclude from the LOC budget.
    - "environments/.secrets/**"

s1:
  limits:
    .astro: 400
    .ts: 600
    .svelte: 500
    .sh: 500
    .mjs: 500
    .mts: 500
    .py: 600
    .js: 600
    .jsx: 600
    .tsx: 400
    .cjs: 200
    .bash: 300
    .java: 400
    .php: 400
  ignore:
    - "website/src/lib/system-test-seed-data.ts"
    # pipeline.js is a single monolithic Claude Code Workflow script: the harness
    # forbids top-level imports-before-`meta` and dynamic import(), so it cannot be
    # safely split into modules (see T000460). It is a sanctioned exception to the
    # per-file line limit; the FA-SF-20 contract test guards its structural invariants.
    - "scripts/factory/pipeline.js"
    # website-db.ts was split as part of G-SIZE03 (T001293): 4436→2890 lines.
    # The G-SIZE03 target (≤3000) is achieved; further domain splits are tracked
    # in future goals. Remains in s1.ignore until it reaches ≤600 lines.
    - "website/src/lib/website-db.ts"
    # billing-db.ts extracted from website-db.ts (G-SIZE03 / T001293): collects all
    # billing schema-init DDL. At 618 lines it slightly exceeds the 600-line limit;
    # future goal can reduce further if needed.
    - "website/src/lib/billing-db.ts"
    # tickets-schema.ts akkumuliert das gesamte DDL + Helper für das
    # `tickets`-PostgreSQL-Schema. Splitting-Grenze ist die Tabelle
    # (Tabelle = Datei-Abschnitt), nicht die Datei — analog zu
    # website-db.ts. Entstanden mit G-CQ07 (S2-Import-Zyklus #1).
    - "website/src/lib/tickets-schema.ts"
    # GLTFLoader.js is a vendored Three.js loader (MIT) shipped as a single
    # monolithic browser bundle. Cannot be reasonably split; vendor file.
    - "brett/public/lib/GLTFLoader.js"
    # scripts/ticket.sh is a sanctioned single-file CLI (735 lines) — the plan
    # explicitly lists it as "low priority, do not split" (G-RH01 Batch 1).
    - "scripts/ticket.sh"
    # .opencode/skills/dev-flow/background-agents.ts is a monolithic OpenCode plugin unit
    # (based on oh-my-opencode, MIT). Plugin loading requires a single default export;
    # splitting across files would break the @opencode-ai/plugin registration contract.
    # Accepted as a sanctioned exception pending upstream plugin-composition support.
    - ".opencode/skills/dev-flow/background-agents.ts"
    # .opencode/skills/dev-flow/worktree.ts is the primary entry for the OCX Worktree plugin.
    # All tool registrations share a single Plugin object; splitting would fracture
    # the tool-registration closure. Terminal logic is already extracted to worktree/terminal.ts.
    - ".opencode/skills/dev-flow/worktree.ts"
    # .opencode/skills/dev-flow/plugins/worktree/terminal.ts is the extracted terminal-operations
    # module for the OCX Worktree plugin. It exceeds the limit due to the full
    # mutex-protected tmux surface; further splitting yields circular imports.
    - ".opencode/skills/dev-flow/plugins/worktree/terminal.ts"
    # .opencode/plugins/background-agents.ts and worktree.ts are symlinks to the two
    # sanctioned exceptions above (opencode's plugin loader resolves plugins from
    # .opencode/plugins/, so the symlink is required). The scanner checks the symlink
    # path itself, not its target, so it needs its own ignore entry (T001686).
    - ".opencode/plugins/background-agents.ts"
    - ".opencode/plugins/worktree.ts"

s2:
  graphs:
    - id: website
      tsconfig: website/tsconfig.json
    - id: e2e
      tsconfig: tests/e2e/tsconfig.json

s3:
  scope_dirs:
    - k3d/
    - prod/
    - prod-fleet/
    - prod-mentolder/
    - prod-korczewski/
    - website/src/
  # configmap-domains.yaml is the *.localhost dev SSOT — never a violation.
  # sitemap.xml.ts derives domain from BRAND env var (legitimate conditional) — not a hardcoded host.
  # Brand-specific overlays (prod-<brand>/kustomization.yaml + prod-<brand>/ddns-updater.yaml)
  # pin the brand's own domain by design — the file is the brand-scoped overlay, not a
  # cross-brand hardcode. prod/coredns-signaling-override.yaml + prod/cloud-init-dev-vm.yaml
  # are special-purpose configs (CoreDNS rewrite / Proxmox cloud-init) where the host is
  # the resource's own identity. website/src/lib/*.generated.json are emitted from the
  # agent-guide/components registry — the host strings live in doc text, not config.
  # goals-data.generated.json (T001884) is generated from .claude/lib/goals.md — some
  # goal `measurement` fields are literal reproduction commands (e.g. G-FE05's Lighthouse
  # check against https://web.mentolder.de) copied verbatim from the SSOT doc, not a
  # hardcoded app config value.
  allowlist_files:
    - k3d/configmap-domains.yaml
    - website/src/pages/sitemap.xml.ts
    - prod-fleet/mentolder/sessions-server.yaml
    - prod-mentolder/kustomization.yaml
    - prod-korczewski/kustomization.yaml
    - prod-korczewski/ddns-updater.yaml
    - prod/coredns-signaling-override.yaml
    - prod/cloud-init-dev-vm.yaml
    - website/src/lib/agent-guide.generated.json
    - website/src/lib/platform-descriptions.generated.json
    - website/src/lib/goals-data.generated.json

s4:
  manifest_globs:
    - "k3d/*.yaml"
  script_globs:
    - "scripts/*.sh"
    - "scripts/*.mjs"
  command_globs:
    - ".claude/commands/**/*.md"
    - ".opencode/commands/**/*.md"
  reference_sources:
    - "Taskfile*.yml"
    - "**/kustomization.yaml"
    - "**/kustomization.yml"
    - "docs/**/*.md"
    - ".github/workflows/*.yml"
    - "scripts/**/*.sh"
    - "scripts/**/*.mjs"
    # Skills under .claude/skills/ often reference scripts via `bash scripts/<name>.sh`
    # (e.g. dev-flow-execute → scripts/devflow-ci-watch.sh). Without this entry,
    # those scripts are flagged as S4-orphans. Added in T001007.
    - ".claude/skills/**/*.md"
    # AGENTS.md is the canonical reference for agent coordination scripts (agent-lock.sh,
    # agent-msg.sh, agent-escalate.sh). Added in T001049.
    - "AGENTS.md"
    - "CLAUDE.md"
    # OpenSpec SSOT specs (.openspec/specs/<capability>/spec.md) are the source of truth
    # for behavioural contracts and frequently name migration / one-shot scripts that the
    # old spec did not list under docs/ (T001170, chore/repo-hygiene).
    - "openspec/specs/**/*.md"
    # BATS unit tests under tests/unit/ document and exercise helper scripts
    # (e.g. tests/unit/skill-orchestrator.bats, tickets-sunset.bats). Without this
    # entry, those scripts are flagged as orphans. Added in T001170.
    - "tests/**/*.bats"
  allowlist_globs:
    - "k3d/office-stack/**"
    - "k3d/coturn-stack/**"
    - "k3d/sealed-secrets-controller.yaml"
    - "k3d/backup-secrets.yaml"
    - "scripts/weekly-dep-schema-audit.sh"
    # Standalone cron script — registered via crontab, not referenced by project files.
    # One-shot / manual scripts — used ad-hoc, not referenced by Taskfile or docs (T001874).
    - "scripts/migrate-docs-style.mjs"
    - "scripts/provision-dev-vm.sh"
    - "scripts/seed-lmstudio-ki-config.mjs"
    - "scripts/setup-comfyui.sh"
    - "scripts/api-auth-check.test.mjs"

s5:
  rules:
    - path: "."
      allowed: ["package-lock.json"]
      forbidden: ["pnpm-lock.yaml"]
    - path: "website"
      allowed: ["pnpm-lock.yaml"]
      forbidden: ["package-lock.json"]
    # brett behält BEIDE Lockfiles absichtlich: package-lock.json ist die
    # Install-/CI-Quelle (npm), pnpm-lock.yaml existiert NUR damit Renovate
    # Dependency-Updates für brett prüfen kann. pnpm-lock.yaml hier nicht
    # als "verwaist" löschen — das bricht die Renovate-Checks. [T001224]
    - path: "brett"
      allowed: ["package-lock.json", "pnpm-lock.yaml"]
      forbidden: []
    - path: "mentolder-web"
      allowed: ["pnpm-lock.yaml"]
      forbidden: ["package-lock.json"]

