# environments/dev.yaml
environment: dev
context: gekko-hetzner-2-dev
domain: localhost

env_vars:
  EINVOICE_SIDECAR_ENABLED: "true"
  # Dev uses default_dev from schema.yaml for most values.
  # Override only where the dev default differs from schema:
  BRAND_ID: korczewski
  BRAND_NAME: "KORE"
  WEBSITE_IMAGE: website
  DOCS_IMAGE: korczewski-docs
  WEBSITE_NAMESPACE: workspace-korczewski-dev
  LLM_ENABLED: "true"
  LLM_RERANK_ENABLED: "true"
  LLM_RERANKER_URL: "http://llm-gateway-tei-rerank.workspace.svc.cluster.local:8083"
  LLM_ROUTER_URL: "http://llm-gateway-lmstudio.workspace.svc.cluster.local:1234"
  LLM_EMBED_URL: "http://llm-gateway-lmstudio.workspace.svc.cluster.local:1234"
  LLM_CHAT_MODEL: "hermes-3-llama-3.1-8b"
  LLM_CODING_MODEL: "qwen/qwen3.5-9b"
  LLM_EMBED_MODEL: "text-embedding-bge-m3"
  LLM_EMBED_MODEL_NOMIC: "text-embedding-nomic-embed-text-v1.5"
  # wg-gpu-Adresse des WSL-Hosts — derselbe GPU-Peer, den die Prod-Envs adressieren.
  # Docker-Bridge-Adressen funktionieren hier nicht: Docker Desktop fährt den Daemon in
  # einer eigenen Distro, k3d vergibt pro Cluster ein zufälliges Subnetz. [T002109]
  LLM_HOST_IP: "192.168.100.10"
  TURN_OVERLAY_IP: "172.17.0.1"
  TERMINAL_OVERLAY_IP: "172.17.0.1"

  MEDIAVIEWER_HOST: mediaviewer.localhost
  VIDEOVAULT_DOMAIN: videovault.localhost
  POCKET_ID_FRONTEND_URL: "http://auth.localhost"
  # FQDN statt Kurzname: brett/src/server/auth.ts akzeptiert http nur für
  # localhost/*.svc.cluster.local (T001933) — Kurzname 'pocket-id' wirft beim
  # OIDC-Client-Init.
  POCKET_ID_URL: "http://pocket-id.workspace.svc.cluster.local:1411"
  NEXTCLOUD_DB_HOST: nextcloud-db.workspace.svc.cluster.local
  # CORS allowlist origin for the React SPA (dev)
  REACT_APP_ORIGIN: "http://react.localhost"

# Dev secrets: generated from schema defaults at deploy time.
secrets_mode: plaintext

setup_vars:
  KC_USER1_USERNAME: admin
  KC_USER1_EMAIL: admin@localhost
  KC_USER1_PASSWORD: DevAdmin123!
