  CLUSTER_ENV: fleet-korczewski
  BRAND_NAME: "KORE"
  BRAND_ID: korczewski
  CONTACT_EMAIL: info@korczewski.de
  CONTACT_PHONE: ""
  CONTACT_CITY: "Lüneburg"
  CONTACT_NAME: "Patrick Korczewski"
  LEGAL_STREET: "In der Twiet 4"
  LEGAL_ZIP: "21360"
  LEGAL_JOBTITLE: "Software Engineer, IT-Security-Berater"
  LEGAL_UST_ID: "Kleinunternehmer gem. § 19 Abs. 1 UStG"
  LEGAL_WEBSITE: korczewski.de
  WEBSITE_IMAGE: website
  DOCS_IMAGE: korczewski-docs
  WEBSITE_NAMESPACE: website-korczewski
  WORKSPACE_NAMESPACE: workspace-korczewski
  WEBSITE_NODE_AFFINITY: '["pk-hetzner-4","pk-hetzner-6","pk-hetzner-8"]'
  INFRA_NAMESPACE: korczewski-infra
  TLS_SECRET_NAME: korczewski-tls
  SMTP_FROM: korczewski@mailbox.org
  SMTP_USER: korczewski@mailbox.org
  SMTP_HOST: smtp.mailbox.org
  SMTP_PORT: "587"
  SMTP_SECURE: "false"
  PRIMARY_FRONTEND: astro
  # TURN_OVERLAY_IP: pk-hetzner-4 overlay IP (wg-fleet, same fleet mesh as gekko-4)
  TURN_OVERLAY_IP: "10.20.0.1"
  # Talk HPB (coturn + Janus SFU) is the SHARED fleet:shared-services stack on
  # pk-hetzner-4 — NOT co-located with this brand's LiveKit edge (pk-hetzner-6).
  # turn.korczewski.de must therefore pin to pk-4, while LIVEKIT_PIN_IP stays pk-6.
  TURN_PUBLIC_IP: "204.168.244.104"
  TURN_NODE: "pk-hetzner-4"
  NEXTCLOUD_EXTERNAL_URL: "https://files.korczewski.de"
  DOCS_URL: "https://docs.korczewski.de"
  AUTH_EXTERNAL_URL: "https://auth.korczewski.de"
  VAULT_EXTERNAL_URL: "https://vault.korczewski.de"
  WHITEBOARD_EXTERNAL_URL: "https://files.korczewski.de/apps/files"
  TRAEFIK_EXTERNAL_URL: "https://traefik.korczewski.de"
  MAIL_EXTERNAL_URL: "https://mail.korczewski.de"
  BRETT_DOMAIN: brett.korczewski.de
  MEDIAVIEWER_HOST: mediaviewer.korczewski.de
  VIDEOVAULT_DOMAIN: videovault.korczewski.de
  RECOVER_DOMAIN: recover.korczewski.de
  LIVEKIT_DOMAIN: livekit.korczewski.de
  OTEL_DOMAIN: otel.korczewski.de
  LIVEKIT_PIN_IP: "37.27.251.38"
  STREAM_DOMAIN: stream.korczewski.de
  NEXTCLOUD_DB_HOST: nextcloud-db.workspace-korczewski.svc.cluster.local
  WEBSITE_HOST: web.korczewski.de
  WEBSITE_SITE_URL: "https://web.korczewski.de"
  KEYCLOAK_FRONTEND_URL: "https://auth.korczewski.de"
  POCKET_ID_FRONTEND_URL: "https://auth.korczewski.de"
  POCKET_ID_DOMAIN: "auth.korczewski.de"
  POCKET_ID_URL: "http://pocket-id:1411"
  # System-test failure loop master kill-switch.
  SYSTEMTEST_LOOP_ENABLED: "true"
  LLM_HOST_IP: "192.168.100.10"
  COMFY_HOST_IP: "10.13.14.10"
  COMFY_PORT: "8189"
  LLM_ENABLED: "true"
  LLM_RERANK_ENABLED: "false"
  LLM_ROUTER_URL: "http://llm-gateway-lmstudio.workspace-korczewski.svc.cluster.local:1234"
  LLM_EMBED_URL: "http://llm-gateway-lmstudio.workspace-korczewski.svc.cluster.local:1234"

  STUDIO_DOMAIN: studio.korczewski.de
  STUDIO_IMAGE: ghcr.io/paddione/studio-server
  STUDIO_IMAGE_DIGEST: sha256:3fb082d01ee1679ccbe75831e7badc66f51fae8995afa5283da03eb4d349e7f3
  # Dev stack intentionally omitted — dev migration is Phase 2c.
  DEV_SSH_ALLOWLIST: ""
  PUSHOVER_TOKEN: ""
  PUSHOVER_USER: ""

# overlay points at the fleet wrapper (reuses prod-korczewski + deletes the
# platform-owned cluster singletons via the fleet-common component). workspace:deploy
# reads this as ENV_OVERLAY and builds it, so the full prod deploy path is reused.
overlay: prod-fleet/korczewski
workspace_namespace: workspace-korczewski
website_namespace: website-korczewski
secrets_ref: sealed-secrets/fleet-korczewski.yaml

