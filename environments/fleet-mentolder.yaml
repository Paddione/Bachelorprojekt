# environments/fleet-mentolder.yaml
# mentolder brand on the fleet cluster. Derived from mentolder.yaml:
# PROD_DOMAIN = mentolder.de (real production domain; DNS cutover via fleet:dns:cutover).
# Namespaces: workspace/website; node-affinity repointed to fleet pk nodes.
environment: fleet-mentolder
context: fleet
domain: mentolder.de

env_vars:
  PROD_DOMAIN: mentolder.de
  CLUSTER_ENV: fleet-mentolder
  BRAND_NAME: "Mentolder"
  BRAND_ID: mentolder
  CONTACT_EMAIL: info@mentolder.de
  CONTACT_PHONE: "+49 151 508 32 601"
  CONTACT_CITY: "Hamburg"
  CONTACT_NAME: "Gerald Korczewski"
  LEGAL_STREET: "Ludwig-Erhard-Str. 18"
  LEGAL_ZIP: "20459"
  LEGAL_JOBTITLE: "Coach und digitaler Begleiter"
  LEGAL_UST_ID: "33/023/05100"
  LEGAL_WEBSITE: mentolder.de
  WEBSITE_IMAGE: website
  DOCS_IMAGE: mentolder-docs
  WEBSITE_NAMESPACE: website
  WORKSPACE_NAMESPACE: workspace
  WEBSITE_NODE_AFFINITY: '["pk-hetzner-4","pk-hetzner-6","pk-hetzner-8"]'
  INFRA_NAMESPACE: mentolder-infra
  TLS_SECRET_NAME: workspace-wildcard-tls
  SMTP_FROM: mentolder@mailbox.org
  SMTP_USER: mentolder@mailbox.org
  SMTP_HOST: smtp.mailbox.org
  SMTP_PORT: "587"
  SMTP_SECURE: "false"
  PRIMARY_FRONTEND: astro
  # TURN_OVERLAY_IP: pk-hetzner-4 overlay IP (wg-fleet, same fleet mesh as gekko-4)
  TURN_OVERLAY_IP: "10.20.0.1"
  # TURN_NODE repointed to a fleet node (gekko-hetzner-2 does not exist on fleet).
  # TURN_PUBLIC_IP pinned to pk-hetzner-4's public IP — the fleet node TURN_NODE
  # resolves to. Must stay in sync with the fleet-dns-cutover allowlist.
  TURN_PUBLIC_IP: "204.168.244.104"
  TURN_NODE: "pk-hetzner-4"
  NEXTCLOUD_EXTERNAL_URL: "https://files.mentolder.de"
  DOCS_URL: "https://docs.mentolder.de"
  AUTH_EXTERNAL_URL: "https://auth.mentolder.de"
  VAULT_EXTERNAL_URL: "https://vault.mentolder.de"
  BRAIN_EXTERNAL_URL: "https://brain.mentolder.de"
  WHITEBOARD_EXTERNAL_URL: "https://files.mentolder.de/apps/files"
  TRAEFIK_EXTERNAL_URL: "https://traefik.mentolder.de"
  MAIL_EXTERNAL_URL: "https://mail.mentolder.de"
  BRETT_DOMAIN: brett.mentolder.de
  MEDIAVIEWER_HOST: mediaviewer.mentolder.de
  VIDEOVAULT_DOMAIN: videovault.mentolder.de
  OTEL_DOMAIN: otel.mentolder.de
  RECOVER_DOMAIN: recover.mentolder.de
  STREAM_DOMAIN: stream.mentolder.de
  NEXTCLOUD_DB_HOST: nextcloud-db.workspace.svc.cluster.local
  WEBSITE_HOST: web.mentolder.de
  WEBSITE_SITE_URL: "https://web.mentolder.de"
  POCKET_ID_FRONTEND_URL: "https://auth.mentolder.de"
  POCKET_ID_FRONTEND_URL: "https://auth.mentolder.de"
  POCKET_ID_DOMAIN: "auth.mentolder.de"
  POCKET_ID_URL: "http://pocket-id:1411"
  # System-test failure loop master kill-switch.
  SYSTEMTEST_LOOP_ENABLED: "true"
  LLM_HOST_IP: "192.168.100.10"
  COMFY_HOST_IP: "192.168.100.10"
  COMFY_PORT: "8189"
  TERMINAL_OVERLAY_IP: "10.20.0.10"
  LLM_ENABLED: "true"
  LLM_RERANK_ENABLED: "false"
  LLM_ROUTER_URL: "http://llm-gateway-lmstudio.workspace.svc.cluster.local:1234"
  LLM_EMBED_URL: "http://llm-gateway-lmstudio.workspace.svc.cluster.local:1234"

  STUDIO_DOMAIN: studio.mentolder.de
  STUDIO_IMAGE: ghcr.io/paddione/studio-server
  STUDIO_IMAGE_DIGEST: sha256:3fb082d01ee1679ccbe75831e7badc66f51fae8995afa5283da03eb4d349e7f3
  # Dev stack intentionally omitted — dev migration is Phase 2c.
  DEV_SSH_ALLOWLIST: ""
  PUSHOVER_TOKEN: ""
  PUSHOVER_USER: ""

# overlay points at the fleet wrapper (reuses prod-mentolder + deletes the
# platform-owned cluster singletons via the fleet-common component). workspace:deploy
# reads this as ENV_OVERLAY and builds it, so the full prod deploy path is reused.
overlay: prod-fleet/mentolder
workspace_namespace: workspace
website_namespace: website
secrets_ref: sealed-secrets/fleet-mentolder.yaml

