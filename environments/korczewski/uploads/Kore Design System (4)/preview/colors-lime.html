<!doctype html>
<html><head><meta charset="utf-8"><title>Plasma Lime</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{background:var(--ink-900); padding:20px 24px; color:var(--fg); display:grid; grid-template-columns:repeat(4,1fr); gap:10px;}
  .sw{height:96px; border-radius:12px; padding:12px; display:flex; flex-direction:column; justify-content:flex-end; border:1px solid var(--line);}
  .sw .n{font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase;}
  .sw .h{font-family:var(--mono); font-size:9px; opacity:.6; margin-top:2px;}
</style></head>
<body>
  <div class="sw" style="background:#C8F76A; color:#2A3A0C;"><span class="n">lime / copper</span><span class="h">#C8F76A · primary CTA</span></div>
  <div class="sw" style="background:#D8FF8A; color:#2A3A0C;"><span class="n">lime-2</span><span class="h">#D8FF8A · hover</span></div>
  <div class="sw" style="background:#E6FFB0; color:#2A3A0C;"><span class="n">lime-soft</span><span class="h">#E6FFB0 · tint</span></div>
  <div class="sw" style="background:rgba(200,247,106,.14); color:#C8F76A; border-color:var(--line-2);"><span class="n">lime-tint-2</span><span class="h">rgba(.14) · chip fill</span></div>
</body></html>
