<!doctype html>
<html><head><meta charset="utf-8"><title>Logo Mark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{background:var(--ink-900); display:flex; align-items:center; gap:36px; padding:24px 32px; min-height:150px;}
  .b{display:flex; align-items:center; gap:14px;}
  .b img{display:block;}
  .lab{font-family:var(--mono); font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--mute);}
  .b1{padding:18px; background:var(--ink-900); border-radius:14px;}
  .b2{padding:18px; background:var(--ink-850); border:1px solid var(--line); border-radius:14px;}
  .b3{padding:18px; background:var(--paper); border-radius:14px;}
  .col{display:flex; flex-direction:column; align-items:center; gap:10px;}
</style></head>
<body>
  <div class="col"><img src="../assets/logo-mark.svg" width="92" height="92"><span class="lab">mark — 92px</span></div>
  <div class="col"><img src="../assets/logo-lockup-dark.svg" width="220" height="66"><span class="lab">lockup — dark</span></div>
  <div class="col"><img src="../assets/logo-lockup-light.svg" width="220" height="66" style="background:var(--paper); border-radius:8px; padding:6px 8px;"><span class="lab">lockup — paper</span></div>
</body></html>
