<!doctype html>
<html><head><meta charset="utf-8"><title>Heading Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{background:var(--ink-900); color:var(--fg); padding:18px 28px; display:flex; flex-direction:column; gap:8px;}
  .row{display:grid; grid-template-columns:90px 1fr; gap:18px; align-items:baseline;}
  .lab{font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--mute);}
  em{font-style:italic; color:var(--copper-2);}
</style></head>
<body>
  <div class="row"><span class="lab">H1 · 48</span><h1 style="margin:0;">Cluster <em>adoption</em></h1></div>
  <div class="row"><span class="lab">H2 · 34</span><h2 style="margin:0;">Reliability work, <em>boring</em></h2></div>
  <div class="row"><span class="lab">H3 · 24</span><h3 style="margin:0;">Helm, but readable</h3></div>
  <div class="row"><span class="lab">H4 · 18</span><h4 style="margin:0;">Six-month engagement</h4></div>
</body></html>
