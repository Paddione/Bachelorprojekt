<!doctype html>
<html lang="de"><head><meta charset="utf-8" />
<title>Brand mark</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
body{margin:0;padding:32px 40px;background:var(--ink-900);}
.row{display:flex;align-items:center;gap:48px;flex-wrap:wrap;}
.brand{display:flex; align-items:center; gap:14px; color:var(--fg);}
.mark{display:block;}
.name{font-family:var(--serif); font-size:28px; letter-spacing:-0.01em;}
.dot{color:var(--brass);}
.small .mark{width:28px;height:28px;}
.small .name{font-size:20px;}
.tiny .mark{width:20px;height:20px;}
.tiny .name{font-size:15px;}
.note{margin-top:18px;color:var(--mute);font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;}
</style></head>
<body>
<div class="row">
  <div class="brand"><img class="mark" src="../assets/logo-mark.png" width="44" height="44" alt="" /><span class="name">mentolder<span class="dot">.</span></span></div>
  <div class="brand small"><img class="mark" src="../assets/logo-mark.png" width="28" height="28" alt="" /><span class="name">mentolder<span class="dot">.</span></span></div>
  <div class="brand tiny"><img class="mark" src="../assets/logo-mark.png" width="20" height="20" alt="" /><span class="name">mentolder<span class="dot">.</span></span></div>
</div>
<div class="note">Ink-rounded square · brass lowercase “m” · brass period accent</div>
</body></html>
