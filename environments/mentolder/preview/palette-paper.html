<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
body{margin:0;padding:24px;background:var(--ink-900);}
.wrap{padding:18px;border-radius:12px;background:#f6f3ee;color:#1a2030;}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.sw{border:1px solid #d4cfc6;border-radius:8px;overflow:hidden;background:#fff;}
.chip{height:54px;}
.meta{padding:8px 10px;}
.name{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#1a2030;}
.hex{font-family:var(--mono);font-size:10px;color:#6a717e;margin-top:2px;}
.note{margin-top:12px;font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#A8823A;}
</style></head><body>
<div class="wrap">
<div class="row">
  <div class="sw"><div class="chip" style="background:#f6f3ee"></div><div class="meta"><div class="name">paper</div><div class="hex">#f6f3ee</div></div></div>
  <div class="sw"><div class="chip" style="background:#efeae1"></div><div class="meta"><div class="name">paper-2</div><div class="hex">#efeae1</div></div></div>
  <div class="sw"><div class="chip" style="background:#1a2030"></div><div class="meta"><div class="name" style="color:#1a2030">paper-ink</div><div class="hex">#1a2030</div></div></div>
  <div class="sw"><div class="chip" style="background:#A8823A"></div><div class="meta"><div class="name">brass · print</div><div class="hex">#A8823A</div></div></div>
</div>
<div class="note">Invoices · Contracts · Print</div>
</div>
</body></html>
