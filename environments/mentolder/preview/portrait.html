<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
body{margin:0;padding:24px;background:var(--ink-900);font-family:var(--sans);display:flex;justify-content:center;}
.wrap{position:relative;width:200px;isolation:isolate;}
.halo{position:absolute;right:-8%;top:6%;width:90%;height:90%;border-radius:50%;background:radial-gradient(closest-side, oklch(0.80 0.09 75 / .45), transparent 70%);filter:blur(8px);z-index:-1;}
.halo-2{position:absolute;left:-6%;bottom:12%;width:55%;height:55%;border-radius:50%;background:radial-gradient(closest-side, oklch(0.60 0.05 250 / .45), transparent 70%);filter:blur(18px);z-index:-1;}
.frame{position:relative;width:100%;aspect-ratio:4/5;border-radius:4px;overflow:hidden;background:var(--ink-800);box-shadow:0 40px 80px -30px rgba(0,0,0,.75), 0 2px 0 0 rgba(255,255,255,.04), inset 0 0 0 1px var(--line-2);}
.frame img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 18%;filter:contrast(1.04) brightness(1.02) sepia(.18) saturate(1.05);}
.frame::before{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg, oklch(0.80 0.09 75 / .10) 0%, transparent 40%, oklch(0.18 0.02 250 / .35) 100%);mix-blend-mode:soft-light;}
.frame::after{content:"";position:absolute;left:0;right:0;top:0;height:1px;background:linear-gradient(to right, transparent, oklch(0.80 0.09 75 / .7) 30%, oklch(0.80 0.09 75 / .7) 70%, transparent);z-index:2;}
.tag{position:absolute;left:10px;top:10px;z-index:3;display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--fg);background:rgba(11,17,28,.55);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.12);padding:5px 8px;border-radius:999px;}
.tag::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--sage);box-shadow:0 0 0 3px oklch(0.80 0.06 160 / .18);}
.cap{margin-top:14px;display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:10px 2px 0;border-top:1px solid var(--line);}
.pc-num{font-family:var(--mono);font-size:9px;letter-spacing:.18em;color:var(--brass);text-transform:uppercase;}
.pc-name{font-family:var(--serif);font-size:14px;color:var(--fg);}
.pc-role{display:block;font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:var(--mute);text-transform:uppercase;margin-top:2px;}
.pc-loc{font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:var(--mute);text-transform:uppercase;}
</style></head><body>
<div class="wrap">
  <div class="halo"></div><div class="halo-2"></div>
  <div class="frame"><img src="../assets/gerald.jpg" alt="" /><span class="tag">Anno 2026 · Lüneburg</span></div>
  <div class="cap"><span class="pc-num">GK · 01</span><span><span class="pc-name">Gerald Korczewski</span><span class="pc-role">Coach &amp; digitaler Begleiter</span></span><span class="pc-loc">65 J. · DE</span></div>
</div>
</body></html>
