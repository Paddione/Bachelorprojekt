<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
body{margin:0;padding:30px;background:var(--ink-900);font-family:var(--sans);}
.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;position:relative;}
.steps::before{content:"";position:absolute;left:0;right:0;top:14px;height:1px;background:linear-gradient(to right, var(--line), var(--brass) 20%, var(--brass) 80%, var(--line));opacity:.4;}
.step{position:relative;padding-top:40px;}
.dot{position:absolute;top:8px;left:0;width:14px;height:14px;border-radius:50%;background:var(--ink-900);border:1px solid var(--brass);}
.dot::after{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--brass);}
.num{font-family:var(--mono);font-size:10px;letter-spacing:.16em;color:var(--brass);text-transform:uppercase;}
h4{font-family:var(--sans);font-size:14px;font-weight:600;margin:4px 0 0;color:var(--fg);}
p{font-size:12px;color:var(--mute);margin:4px 0 0;line-height:1.55;}
</style></head><body>
<div class="steps">
  <div class="step"><span class="dot"></span><div class="num">01 — Erstgespräch</div><h4>Kennenlernen</h4><p>30 Min., kostenlos.</p></div>
  <div class="step"><span class="dot"></span><div class="num">02 — Klarheit</div><h4>Zieldefinition</h4><p>Format und Rahmen.</p></div>
  <div class="step"><span class="dot"></span><div class="num">03 — Begleitung</div><h4>Arbeitsphase</h4><p>In Ihrem Tempo.</p></div>
  <div class="step"><span class="dot"></span><div class="num">04 — Transfer</div><h4>Nachhaltigkeit</h4><p>Nicht nur Wissen.</p></div>
</div>
</body></html>
