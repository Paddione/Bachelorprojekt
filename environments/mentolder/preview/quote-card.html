<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
body{margin:0;padding:24px;background:var(--ink-900);font-family:var(--sans);}
.q{position:relative;padding:36px 38px 30px;background:radial-gradient(circle at 0% 0%, oklch(0.80 0.09 75 / .12), transparent 50%), var(--ink-800);border:1px solid var(--line-2);border-radius:22px;}
.mark-q{font-family:var(--serif);font-size:90px;line-height:.5;color:var(--brass);opacity:.4;position:absolute;top:24px;left:24px;font-style:italic;}
blockquote{font-family:var(--serif);font-style:italic;font-size:20px;line-height:1.35;color:var(--fg);margin:24px 0 22px;font-weight:350;letter-spacing:-.01em;position:relative;}
.byline{display:flex;align-items:center;gap:12px;padding-top:16px;border-top:1px solid var(--line);}
.avatar{width:40px;height:40px;border-radius:50%;background:radial-gradient(circle at 30% 30%, var(--brass-2), var(--brass) 45%, #6e5420 100%);display:flex;align-items:center;justify-content:center;font-family:var(--serif);color:var(--ink-900);font-weight:500;font-size:15px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.2);}
.name{font-weight:600;color:var(--fg);font-size:14px;}
.role{color:var(--mute);font-size:12px;}
</style></head><body>
<div class="q">
  <span class="mark-q">&ldquo;</span>
  <blockquote>Ich stelle unbequeme Fragen — weil echte Lösungen manchmal unbequeme Wahrheiten brauchen.</blockquote>
  <div class="byline"><span class="avatar">GK</span><div><div class="name">Gerald Korczewski</div><div class="role">Coach &amp; digitaler Begleiter · Lüneburg</div></div></div>
</div>
</body></html>
