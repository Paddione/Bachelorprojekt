<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
body{margin:0;padding:24px;background:var(--ink-900);}
.row{display:flex;gap:18px;align-items:flex-end;}
.box{background:var(--ink-800);border:1px solid var(--line-2);width:80px;height:80px;display:flex;align-items:center;justify-content:center;}
.lbl{margin-top:8px;font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);text-align:center;}
.col{display:flex;flex-direction:column;align-items:center;}
</style></head><body>
<div class="row">
  <div class="col"><div class="box" style="border-radius:4px"></div><div class="lbl">4 · portrait</div></div>
  <div class="col"><div class="box" style="border-radius:8px"></div><div class="lbl">8 · brand mark</div></div>
  <div class="col"><div class="box" style="border-radius:12px"></div><div class="lbl">12 · field</div></div>
  <div class="col"><div class="box" style="border-radius:22px"></div><div class="lbl">22 · card</div></div>
  <div class="col"><div class="box" style="border-radius:999px;width:120px"></div><div class="lbl">pill · button</div></div>
</div>
</body></html>
