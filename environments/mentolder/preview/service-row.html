<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
body{margin:0;padding:0;background:var(--ink-900);font-family:var(--sans);}
.offer{display:grid;grid-template-columns:60px 1fr 1.6fr 160px 60px;gap:24px;align-items:start;padding:28px 32px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);}
.no{font-family:var(--mono);font-size:12px;letter-spacing:.1em;color:var(--mute);}
h3{font-family:var(--serif);font-size:24px;font-weight:400;letter-spacing:-.015em;color:var(--fg);margin:0;}
.sage{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--sage);margin-top:6px;display:block;}
.desc{color:var(--fg-soft);font-size:14px;line-height:1.55;}
.price{border-left:1px solid var(--line);padding-left:18px;display:flex;flex-direction:column;gap:4px;}
.p{font-family:var(--serif);font-size:24px;color:var(--fg);letter-spacing:-.015em;}
.u{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--mute);text-transform:uppercase;}
.go{justify-self:end;}
.go span{width:34px;height:34px;border:1px solid var(--line-2);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:var(--brass);}
.go svg{width:14px;height:14px;}
</style></head><body>
<article class="offer">
  <div class="no">02</div>
  <div><h3>Führungskräfte-Coaching</h3><span class="sage">Sparring auf Augenhöhe</span></div>
  <div><div class="desc">Profil-Schärfung, Positionierung, Gesprächsvorbereitung — direkt und ehrlich, ohne Coaching-Sprech.</div></div>
  <div class="price"><span class="p">150 €</span><span class="u">pro Session · 90 Min.</span></div>
  <div class="go"><span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg></span></div>
</article>
</body></html>
