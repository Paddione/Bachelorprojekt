<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
body{margin:0;padding:24px;background:var(--ink-900);font-family:var(--mono);color:var(--mute);}
.row{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap;}
.b{background:var(--brass-d);border:1px solid var(--brass);border-radius:4px;}
.lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg);text-align:center;margin-top:6px;}
.col{display:flex;flex-direction:column;align-items:center;}
</style></head><body>
<div class="row">
  <div class="col"><div class="b" style="width:4px;height:36px"></div><div class="lbl">4</div></div>
  <div class="col"><div class="b" style="width:8px;height:36px"></div><div class="lbl">8</div></div>
  <div class="col"><div class="b" style="width:14px;height:36px"></div><div class="lbl">14</div></div>
  <div class="col"><div class="b" style="width:22px;height:36px"></div><div class="lbl">22</div></div>
  <div class="col"><div class="b" style="width:36px;height:36px"></div><div class="lbl">36</div></div>
  <div class="col"><div class="b" style="width:56px;height:36px"></div><div class="lbl">56</div></div>
  <div class="col"><div class="b" style="width:80px;height:36px"></div><div class="lbl">80</div></div>
  <div class="col"><div class="b" style="width:120px;height:36px"></div><div class="lbl">120 · section</div></div>
</div>
</body></html>
