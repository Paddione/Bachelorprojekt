<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
body{margin:0;padding:0;background:var(--ink-900);font-family:var(--sans);}
.stats{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--line);}
.stat{padding:30px 22px;border-right:1px solid var(--line);display:flex;flex-direction:column;gap:8px;}
.stat:last-child{border-right:none;}
.num{font-family:var(--serif);font-size:44px;line-height:1;color:var(--fg);letter-spacing:-.02em;}
.num em{color:var(--brass);font-style:normal;}
.lab{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);}
</style></head><body>
<div class="stats">
  <div class="stat"><div class="num">30<em>+</em></div><div class="lab">Jahre Führung</div></div>
  <div class="stat"><div class="num">50<em>+</em></div><div class="lab">Teilnehmer begleitet</div></div>
  <div class="stat"><div class="num">40</div><div class="lab">Jahre IT &amp; Sicherheit</div></div>
  <div class="stat"><div class="num"><em>KI</em></div><div class="lab">Pionier der ersten Stunde</div></div>
</div>
</body></html>
