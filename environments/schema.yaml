# environments/schema.yaml
# Single source of truth for all environment variables and secrets.
# Every deployment target must satisfy this schema.
version: 1

env_vars:
  - name: PROD_DOMAIN
    required: true
    default_dev: "localhost"
    validate: "^[a-z0-9.-]+$"

  - name: BRAND_NAME
    required: true
    default_dev: "Workspace"

  - name: BRAND_ID
    required: true
    default_dev: "mentolder"

  - name: CONTACT_EMAIL
    required: true
    default_dev: "dev@localhost"
    validate: "^.+@.+$"

  - name: CONTACT_PHONE
    required: true
    default_dev: "+49 000 000 00 000"

  - name: CONTACT_CITY
    required: true
    default_dev: "DevCity"

  - name: CONTACT_NAME
    required: true
    default_dev: "Dev User"

  - name: LEGAL_STREET
    required: true
    default_dev: "Musterstrasse 1"

  - name: LEGAL_ZIP
    required: true
    default_dev: "00000"

  - name: LEGAL_JOBTITLE
    required: true
    default_dev: "Coach, Berater, Trainer"

  - name: LEGAL_CHAMBER
    required: true
    default_dev: "Entfaellt"

  - name: LEGAL_UST_ID
    required: true
    default_dev: "Nicht vorhanden"

  - name: LEGAL_WEBSITE
    required: true
    default_dev: "localhost"

  - name: WEBSITE_IMAGE
    required: true
    default_dev: "workspace-website"

  - name: INFRA_NAMESPACE
    required: true
    default_dev: "workspace-infra"

  - name: TLS_SECRET_NAME
    required: true
    default_dev: "workspace-wildcard-tls"

  - name: SMTP_FROM
    required: true
    default_dev: "noreply@localhost"

  - name: SMTP_HOST
    required: true
    default_dev: "mailpit.workspace.svc.cluster.local"

  - name: SMTP_PORT
    required: true
    default_dev: "1025"

  - name: TURN_PUBLIC_IP
    required: true
    default_dev: "127.0.0.1"

  - name: TURN_NODE
    required: true
    default_dev: "k3d-dev-server-0"

  - name: NEXTCLOUD_EXTERNAL_URL
    required: false
    default_dev: "http://files.localhost"

  - name: DOCS_URL
    required: false
    default_dev: "http://docs.localhost"

  - name: AUTH_EXTERNAL_URL
    required: false
    default_dev: "http://auth.localhost"

  - name: VAULT_EXTERNAL_URL
    required: false
    default_dev: "http://vault.localhost"

  - name: WHITEBOARD_EXTERNAL_URL
    required: false
    default_dev: "http://board.localhost"

  - name: WIKI_EXTERNAL_URL
    required: false
    default_dev: "http://wiki.localhost"

secrets:
  - name: SHARED_DB_PASSWORD
    required: true
    generate: true
    length: 32

  - name: KEYCLOAK_DB_PASSWORD
    required: true
    generate: true
    length: 32

  - name: KEYCLOAK_ADMIN_PASSWORD
    required: true
    generate: false

  - name: GITLAB_APP_ID
    required: true
    generate: false
    description: "GitLab OAuth2 App ID for Keycloak OIDC identity provider"

  - name: GITLAB_APP_SECRET
    required: true
    generate: false
    description: "GitLab OAuth2 App Secret for Keycloak OIDC identity provider"

  - name: NEXTCLOUD_DB_PASSWORD
    required: true
    generate: true
    length: 32

  - name: NEXTCLOUD_ADMIN_PASSWORD
    required: true
    generate: false

  - name: NEXTCLOUD_OIDC_SECRET
    required: true
    generate: true
    length: 40

  - name: SIGNALING_SECRET
    required: true
    generate: true
    length: 32

  - name: TURN_SECRET
    required: true
    generate: true
    length: 32

  - name: CRON_SECRET
    required: true
    generate: true
    length: 48

  - name: OAUTH2_PROXY_COOKIE_SECRET
    required: true
    generate: true
    length: 32

  - name: COLLABORA_ADMIN_PASSWORD
    required: true
    generate: true
    length: 24

  - name: WHITEBOARD_JWT_SECRET
    required: true
    generate: true
    length: 32

  - name: VAULTWARDEN_DB_PASSWORD
    required: true
    generate: true
    length: 32

  - name: VAULTWARDEN_ADMIN_TOKEN
    required: true
    generate: true
    length: 48

  - name: VAULTWARDEN_OIDC_SECRET
    required: true
    generate: true
    length: 40

  # NOTE: WEBSITE_DB_PASSWORD is managed via website-secrets SealedSecret
  # (separate from workspace-secrets). Re-seal via: task env:seal ENV=<name>
  # after adding to environments/.secrets/<name>.yaml

  - name: RECORDING_SECRET
    required: true
    generate: true
    length: 32

  - name: TRANSCRIBER_BOT_PASSWORD
    required: true
    generate: true
    length: 24

  - name: TRANSCRIBER_SECRET
    required: true
    generate: true
    length: 32

  - name: SMTP_PASSWORD
    required: true
    generate: false

  - name: CLAUDE_CODE_ADMIN_EMAIL
    required: true
    generate: false

  - name: CLAUDE_CODE_ADMIN_PASSWORD
    required: true
    generate: false

  - name: DOCS_OIDC_SECRET
    required: true
    generate: true
    length: 40

  # Claude Code
  - name: CLAUDE_CODE_OIDC_SECRET
    required: true
    generate: true
    length: 40

  - name: CLAUDE_CODE_WEBUI_SECRET_KEY
    required: true
    generate: true
    length: 48

  # External service keys (user-provided)
  - name: GITHUB_PAT
    required: false
    generate: false

  - name: STRIPE_SECRET_KEY
    required: false
    generate: false

setup_vars:
  - name: KC_USER1_USERNAME
    required: true

  - name: KC_USER1_EMAIL
    required: true
    validate: "^.+@.+$"

  - name: KC_USER1_PASSWORD
    required: true

  - name: KC_USER2_USERNAME
    required: false

  - name: KC_USER2_EMAIL
    required: false

  - name: KC_USER2_PASSWORD
    required: false
