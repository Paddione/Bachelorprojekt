# environments/schema.yaml
# Single source of truth for all environment variables and secrets.
# Every deployment target must satisfy this schema.
version: 1

env_vars:
  - name: PROD_DOMAIN
    required: true
    default_dev: "localhost"
    validate: "^[a-z0-9.-]+$"

  - name: CLUSTER_ENV
    required: true
    default_dev: "dev"
    validate: "^[a-z0-9-]+$"

  - name: BRAND_NAME
    required: true
    default_dev: "Workspace"

  - name: BRAND_ID
    required: true
    default_dev: "mentolder"

  - name: CONTACT_EMAIL
    required: true
    default_dev: "dev@localhost"
    validate: "^.+@.+$"

  - name: CONTACT_PHONE
    required: false
    default_dev: "+49 000 000 00 000"

  - name: CONTACT_CITY
    required: true
    default_dev: "DevCity"

  - name: CONTACT_NAME
    required: true
    default_dev: "Dev User"

  - name: LEGAL_STREET
    required: true
    default_dev: "Musterstrasse 1"

  - name: LEGAL_ZIP
    required: true
    default_dev: "00000"

  - name: LEGAL_JOBTITLE
    required: true
    default_dev: "Coach, Berater, Trainer"

  - name: LEGAL_UST_ID
    required: true
    default_dev: "Nicht vorhanden"

  - name: LEGAL_WEBSITE
    required: true
    default_dev: "localhost"

  - name: WEBSITE_IMAGE
    required: true
    default_dev: "workspace-website"

  - name: WEBSITE_NAMESPACE
    required: false
    default_dev: "website"
    description: "Kubernetes namespace for the Astro website (separate per env on unified cluster)"

  - name: WEBSITE_NODE_AFFINITY
    required: false
    default_dev: ""
    description: "JSON array of node hostnames for website Deployment nodeAffinity (overrides base manifest gekko-hetzner-2/3). Set for envs on non-standard node layouts."

  - name: WORKSPACE_NAMESPACE
    required: false
    default_dev: "workspace"
    description: "Kubernetes namespace for core workspace services (Keycloak, Nextcloud, etc.)"

  - name: EINVOICE_SIDECAR_ENABLED
    required: false
    default_dev: "false"
    description: "Enable Mustangproject sidecar for PDF/A-3 + factur-x.xml embedding"

  - name: EINVOICE_SIDECAR_URL
    required: false
    default_dev: "http://einvoice-sidecar.workspace.svc.cluster.local"
    description: "Cluster URL for the einvoice-sidecar"

  - name: SYSTEMTEST_LOOP_ENABLED
    required: false
    default_dev: "false"
    description: "Master kill-switch for the system-test failure loop — gates the seed button on /admin/fragebogen, the rrweb recorder, and /admin/systemtest/board. Schema bootstrap and cleanup CronJobs run regardless."

  - name: INFRA_NAMESPACE
    required: true
    default_dev: "workspace-infra"

  - name: TLS_SECRET_NAME
    required: true
    default_dev: "workspace-wildcard-tls"

  - name: SMTP_FROM
    required: true
    default_dev: "noreply@localhost"

  - name: SMTP_USER
    required: true
    default_dev: "noreply@localhost"

  - name: SMTP_HOST
    required: true
    default_dev: "mailpit.workspace.svc.cluster.local"

  - name: SMTP_PORT
    required: true
    default_dev: "1025"

  - name: SMTP_SECURE
    required: false
    default_dev: "false"

  - name: TURN_PUBLIC_IP
    required: true
    default_dev: "127.0.0.1"

  - name: TURN_NODE
    required: true
    default_dev: "k3d-dev-server-0"

  - name: NEXTCLOUD_EXTERNAL_URL
    required: false
    default_dev: "http://files.localhost"

  - name: DOCS_URL
    required: false
    default_dev: "http://docs.localhost"

  - name: AUTH_EXTERNAL_URL
    required: false
    default_dev: "http://auth.localhost"

  - name: VAULT_EXTERNAL_URL
    required: false
    default_dev: "http://vault.localhost"

  - name: WHITEBOARD_EXTERNAL_URL
    required: false
    default_dev: "http://board.localhost"

  - name: TRAEFIK_EXTERNAL_URL
    required: false
    default_dev: "http://traefik.localhost"

  - name: MAIL_EXTERNAL_URL
    required: false
    default_dev: "http://mail.localhost"

  - name: BRETT_DOMAIN
    required: true
    default_dev: "brett.localhost"

  - name: LIVEKIT_DOMAIN
    required: true
    default_dev: "livekit.localhost"

  - name: LIVEKIT_PIN_IP
    required: false
    default_dev: "127.0.0.1"

  - name: STREAM_DOMAIN
    required: true
    default_dev: "stream.localhost"

  - name: WEBSITE_HOST
    required: true
    default_dev: "web.localhost"
    validate: "^[a-z0-9.-]+(:[0-9]+)?$"

  - name: WEBSITE_SITE_URL
    required: true
    default_dev: "http://web.localhost"

  # Used as OIDC issuer URL in the website ConfigMap — missing breaks SSO
  - name: KEYCLOAK_FRONTEND_URL
    required: true
    default_dev: "http://auth.localhost"

  - name: LLM_HOST_IP
    required: false
    default_dev: ""
    description: "Mesh IP of the GPU host running TEI + Ollama. Required when LLM_ENABLED=true. Empty in dev."

  - name: LLM_ENABLED
    required: true
    default_dev: "false"
    description: "If true, the website uses the in-cluster LiteLLM router for embeddings/rerank/chat. If false, embeddings.ts calls Voyage directly (legacy path)."
    validate: "^(true|false)$"

  - name: LLM_RERANK_ENABLED
    required: true
    default_dev: "false"
    description: "If true, knowledge query path runs results through the bge-reranker-v2-m3 service. Requires LLM_ENABLED=true."
    validate: "^(true|false)$"

  - name: LLM_ROUTER_URL
    required: true
    default_dev: "http://llm-router.workspace.svc.cluster.local:4000"
    description: "Cluster-internal URL of the LiteLLM router. Constant per namespace; only varies if WORKSPACE_NAMESPACE differs."

secrets:
  - name: SHARED_DB_PASSWORD
    required: true
    generate: true
    length: 32

  - name: KEYCLOAK_DB_PASSWORD
    required: true
    generate: true
    length: 32

  - name: KEYCLOAK_ADMIN_PASSWORD
    required: true
    generate: false
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: NEXTCLOUD_DB_PASSWORD
    required: true
    generate: true
    length: 32
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: NEXTCLOUD_ADMIN_PASSWORD
    required: true
    generate: false
    extra_namespaces:
      - namespace: website
        secret: website-secrets
        dest_key: NEXTCLOUD_ADMIN_PASS
      - namespace: website
        secret: website-secrets
        dest_key: NEXTCLOUD_CALDAV_PASSWORD

  - name: NEXTCLOUD_OIDC_SECRET
    required: true
    generate: true
    length: 40

  # The following signaling keys are NOT managed by this schema:
  #   SESSION_HASHKEY, SESSION_BLOCKKEY, CLIENTS_INTERNALSECRET, TURN_APIKEY
  # They are hardcoded directly in the spreed-signaling Deployment env
  # (k3d/talk-hpb.yaml, prod/patch-signaling-backend.yaml). Rationale:
  # they only need to be stable within a pod's lifetime, and TURN_APIKEY
  # is unused because the REST API auth uses TURN_SECRET. If these ever
  # become rotated secrets, promote them into this section.
  - name: SIGNALING_SECRET
    required: true
    generate: true
    length: 32
    extra_namespaces:
      - namespace: coturn
        secret: coturn-secrets

  - name: TURN_SECRET
    required: true
    generate: true
    length: 32
    extra_namespaces:
      - namespace: coturn
        secret: coturn-secrets

  - name: CRON_SECRET
    required: true
    generate: true
    length: 48
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: OAUTH2_PROXY_COOKIE_SECRET
    required: true
    generate: true
    length: 32

  - name: COLLABORA_ADMIN_PASSWORD
    required: true
    generate: true
    length: 24
    extra_namespaces:
      - namespace: workspace-office
        secret: collabora-secrets

  - name: WHITEBOARD_JWT_SECRET
    required: true
    generate: true
    length: 32

  - name: VAULTWARDEN_DB_PASSWORD
    required: true
    generate: true
    length: 32

  - name: VAULTWARDEN_ADMIN_TOKEN
    required: true
    generate: true
    length: 48

  - name: VAULTWARDEN_OIDC_SECRET
    required: true
    generate: true
    length: 40

  - name: WEBSITE_DB_PASSWORD
    required: true
    generate: true
    length: 32
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: WEBSITE_OIDC_SECRET
    required: true
    generate: true
    length: 40
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: RECORDING_SECRET
    required: true
    generate: true
    length: 32

  - name: TRANSCRIBER_BOT_PASSWORD
    required: true
    generate: true
    length: 24

  - name: TRANSCRIBER_SECRET
    required: true
    generate: true
    length: 32

  - name: SMTP_PASSWORD
    required: true
    generate: false
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: SMTP_FROM
    required: true
    generate: false

  - name: SMTP_USER
    required: true
    generate: false

  - name: DOCS_OIDC_SECRET
    required: true
    generate: true
    length: 40

  - name: TRAEFIK_OIDC_SECRET
    required: true
    generate: true
    length: 40

  - name: MAIL_OIDC_SECRET
    required: true
    generate: true
    length: 40

  - name: BRETT_OIDC_SECRET
    required: true
    generate: true
    length: 40

  # Claude Code
  - name: CLAUDE_CODE_OIDC_SECRET
    required: true
    generate: true
    length: 40

  - name: CLAUDE_CODE_WEBUI_SECRET_KEY
    required: true
    generate: true
    length: 48

  # External service keys (user-provided)
  - name: GITHUB_PAT
    required: false
    generate: false

  - name: GHCR_PAT
    required: false
    generate: false

  - name: DOCUSEAL_SECRET_KEY_BASE
    required: true
    generate: true
    length: 64

  - name: DOCUSEAL_API_TOKEN
    required: false
    generate: false
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: DOCUSEAL_DB_PASSWORD
    required: true
    generate: true
    length: 32

  - name: MEETINGS_DB_PASSWORD
    required: true
    generate: true
    length: 32

  - name: SEPA_CREDITOR_IBAN
    required: false
    generate: false
    description: "IBAN of the creditor account for SEPA direct debit (Lastschrift)"
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: SEPA_CREDITOR_BIC
    required: false
    generate: false
    description: "BIC of the creditor bank for SEPA direct debit"
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: SEPA_CREDITOR_ID
    required: false
    generate: false
    description: "Gläubiger-Identifikationsnummer (e.g. DE98ZZZ09999999999)"
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: BACKUP_PASSPHRASE
    required: true
    generate: true
    length: 32

  - name: FILEN_EMAIL
    required: false
    generate: false

  - name: FILEN_PASSWORD
    required: false
    generate: false

  - name: IPV64_API_KEY
    required: false
    generate: false
    extra_namespaces:
      - namespace: cert-manager
        secret: ipv64-api-key
      - namespace: website
        secret: website-secrets

  - name: IPV64_UPDATE_HASH
    required: false
    generate: false


  - name: BRETT_BOT_SECRET
    required: true
    generate: true
    length: 48
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: MONITORING_WEBHOOK_TOKEN
    required: true
    generate: false
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: LIVEKIT_API_KEY
    required: true
    generate: true
    length: 16
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: LIVEKIT_API_SECRET
    required: true
    generate: true
    length: 32
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: LIVEKIT_RTMP_KEY
    required: true
    generate: true
    length: 16
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: TRACKING_DB_URL
    required: true
    generate: false
    description: "PostgreSQL connection URL for the tracking-import CronJob"

  - name: INTERNAL_API_TOKEN
    required: true
    generate: true
    length: 48
    description: "Shared secret for cron-driven internal API calls (e.g. notify-close). Set in environments/.secrets/<env>.yaml then run `task env:seal ENV=<env>`."
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: VOYAGE_API_KEY
    required: false
    generate: false
    description: "Voyage AI API key for document embeddings (Coaching-Knowledge-Pipeline + knowledge-ingest CronJob). Get from https://dashboard.voyageai.com/api-keys."
    extra_namespaces:
      - namespace: workspace
        secret: knowledge-secrets

  - name: ANTHROPIC_API_KEY
    required: false
    generate: false
    description: "Anthropic API key. Used by (a) the website for meeting insights (claude.ts), (b) the llm-router for chat-class fallback when the local Ollama is unreachable. Required in prod when LLM_ENABLED=true."
    extra_namespaces:
      - namespace: workspace
        secret: knowledge-secrets
      - namespace: website
        secret: website-secrets

setup_vars:
  - name: KC_USER1_USERNAME
    required: true

  - name: KC_USER1_EMAIL
    required: true
    validate: "^.+@.+$"

  - name: KC_USER1_PASSWORD
    required: true
    sealed: true

  - name: KC_USER2_USERNAME
    required: false

  - name: KC_USER2_EMAIL
    required: false

  - name: KC_USER2_PASSWORD
    required: false
    sealed: true
