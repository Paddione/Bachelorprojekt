  # nodes as the correct OS user without embedding keys in images.
  - name: PATRICK_SSH_PRIVATE_KEY
    required: false
    sealed: true
    description: "SSH private key (OpenSSH ed25519) for user patrick"
  - name: PATRICK_SSH_PUBLIC_KEY
    required: false
    description: "SSH public key (OpenSSH ed25519) for user patrick"
  - name: GEKKO_SSH_PRIVATE_KEY
    required: false
    sealed: true
    description: "SSH private key (OpenSSH ed25519) for user gekko"
  - name: GEKKO_SSH_PUBLIC_KEY
    required: false
    description: "SSH public key (OpenSSH ed25519) for user gekko"

  # ── HA dev cluster (devc) ────────────────────────────────────────────────────
  - name: DEVC_VIP
    required: false
    description: "Floating VIP for the 3-node HA dev k3s cluster (kube-vip ARP)"
