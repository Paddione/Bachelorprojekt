# environments/schema.yaml
# Single source of truth for all environment variables and secrets.
# Every deployment target must satisfy this schema.
version: 1

env_vars:
  - name: PROD_DOMAIN
    required: true
    default_dev: "localhost"
    validate: "^[a-z0-9.-]+$"

  - name: BRAND_NAME
    required: true
    default_dev: "Workspace"

  - name: BRAND_ID
    required: true
    default_dev: "mentolder"

  - name: CONTACT_EMAIL
    required: true
    default_dev: "dev@localhost"
    validate: "^.+@.+$"

  - name: CONTACT_PHONE
    required: true
    default_dev: "+49 000 000 00 000"

  - name: CONTACT_CITY
    required: true
    default_dev: "DevCity"

  - name: CONTACT_NAME
    required: true
    default_dev: "Dev User"

  - name: LEGAL_STREET
    required: true
    default_dev: "Musterstrasse 1"

  - name: LEGAL_ZIP
    required: true
    default_dev: "00000"

  - name: LEGAL_JOBTITLE
    required: true
    default_dev: "Coach, Berater, Trainer"

  - name: LEGAL_CHAMBER
    required: true
    default_dev: "Entfaellt"

  - name: LEGAL_UST_ID
    required: true
    default_dev: "Nicht vorhanden"

  - name: LEGAL_WEBSITE
    required: true
    default_dev: "localhost"

  - name: WEBSITE_IMAGE
    required: true
    default_dev: "workspace-website"

  - name: INFRA_NAMESPACE
    required: true
    default_dev: "workspace-infra"

  - name: TLS_SECRET_NAME
    required: true
    default_dev: "workspace-wildcard-tls"

  - name: SMTP_FROM
    required: true
    default_dev: "noreply@localhost"

  - name: TURN_PUBLIC_IP
    required: true
    default_dev: "127.0.0.1"

  - name: TURN_NODE
    required: true
    default_dev: "k3d-dev-server-0"

secrets:
  - name: SHARED_DB_PASSWORD
    required: true
    generate: true
    length: 32

  - name: KEYCLOAK_DB_PASSWORD
    required: true
    generate: true
    length: 32

  - name: KEYCLOAK_ADMIN_PASSWORD
    required: true
    generate: false

  - name: MATTERMOST_DB_PASSWORD
    required: true
    generate: true
    length: 32

  - name: MATTERMOST_OIDC_SECRET
    required: true
    generate: true
    length: 40

  - name: NEXTCLOUD_DB_PASSWORD
    required: true
    generate: true
    length: 32

  - name: NEXTCLOUD_ADMIN_PASSWORD
    required: true
    generate: false

  - name: NEXTCLOUD_OIDC_SECRET
    required: true
    generate: true
    length: 40

  - name: SIGNALING_SECRET
    required: true
    generate: true
    length: 32

  - name: TURN_SECRET
    required: true
    generate: true
    length: 32

  - name: INVOICENINJA_DB_PASSWORD
    required: true
    generate: true
    length: 32

  - name: INVOICENINJA_OIDC_SECRET
    required: true
    generate: true
    length: 40

  - name: INVOICENINJA_API_TOKEN
    required: true
    generate: true
    length: 32

  - name: INVOICENINJA_APP_KEY
    required: true
    generate: true
    length: 32
    encoding: base64

  - name: INVOICENINJA_ADMIN_PASSWORD
    required: true
    generate: false

  - name: OAUTH2_PROXY_COOKIE_SECRET
    required: true
    generate: true
    length: 32

  - name: BILLING_BOT_MM_TOKEN
    required: true
    generate: true
    length: 32

  - name: WEBSITE_MM_TOKEN
    required: true
    description: "Mattermost bot token for the website (bug reports, contact form interactive messages). Must be provisioned in Mattermost and stored in a website-secrets Secret in the website namespace."

  - name: COLLABORA_ADMIN_PASSWORD
    required: true
    generate: true
    length: 24

  - name: WHITEBOARD_JWT_SECRET
    required: true
    generate: true
    length: 32

  - name: VAULTWARDEN_DB_PASSWORD
    required: true
    generate: true
    length: 32

  - name: VAULTWARDEN_ADMIN_TOKEN
    required: true
    generate: true
    length: 48

  - name: VAULTWARDEN_OIDC_SECRET
    required: true
    generate: true
    length: 40

  - name: MEETINGS_DB_PASSWORD
    required: true
    generate: true
    length: 32

  - name: RECORDING_SECRET
    required: true
    generate: true
    length: 32

  - name: SMTP_PASSWORD
    required: true
    generate: false

  - name: CLAUDE_CODE_ADMIN_EMAIL
    required: true
    generate: false

  - name: CLAUDE_CODE_ADMIN_PASSWORD
    required: true
    generate: false

  - name: WORDPRESS_OIDC_SECRET
    required: true
    generate: true
    length: 40

  - name: WORDPRESS_DB_PASSWORD
    required: true
    generate: true
    length: 32

  # Outline
  - name: OUTLINE_DB_PASSWORD
    required: true
    generate: true
    length: 32

  - name: OUTLINE_OIDC_SECRET
    required: true
    generate: true
    length: 40

  - name: OUTLINE_SECRET_KEY
    required: true
    generate: true
    length: 64

  - name: OUTLINE_UTILS_SECRET
    required: true
    generate: true
    length: 32

  # Claude Code
  - name: CLAUDE_CODE_OIDC_SECRET
    required: true
    generate: true
    length: 40

  - name: CLAUDE_CODE_WEBUI_SECRET_KEY
    required: true
    generate: true
    length: 48

  # External service keys (user-provided)
  - name: GITHUB_PAT
    required: false
    generate: false

  - name: STRIPE_SECRET_KEY
    required: false
    generate: false

  - name: GRAFANA_API_KEY
    required: false
    generate: false

setup_vars:
  - name: KC_USER1_USERNAME
    required: true

  - name: KC_USER1_EMAIL
    required: true
    validate: "^.+@.+$"

  - name: KC_USER1_PASSWORD
    required: true

  - name: KC_USER2_USERNAME
    required: false

  - name: KC_USER2_EMAIL
    required: false

  - name: KC_USER2_PASSWORD
    required: false
