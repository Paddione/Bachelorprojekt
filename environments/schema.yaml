# environments/schema.yaml
# Single source of truth for all environment variables and secrets.
# Every deployment target must satisfy this schema.
version: 1

env_vars:
  - name: ARENA_WS_URL
    description: Public URL of the arena WebSocket endpoint
    required: false
  - name: PROD_DOMAIN
    required: true
    default_dev: "localhost"
    validate: "^[a-z0-9.-]+$"

  - name: CLUSTER_ENV
    required: true
    default_dev: "dev"
    validate: "^[a-z0-9-]+$"

  - name: BRAND_NAME
    required: true
    default_dev: "KORE"

  - name: BRAND_ID
    required: true
    default_dev: "korczewski"

  - name: CONTACT_EMAIL
    required: true
    default_dev: "dev@localhost"
    validate: "^.+@.+$"

  - name: CONTACT_PHONE
    required: false
    default_dev: "+49 000 000 00 000"

  - name: CONTACT_CITY
    required: true
    default_dev: "DevCity"

  - name: CONTACT_NAME
    required: true
    default_dev: "Dev User"

  - name: LEGAL_STREET
    required: true
    default_dev: "Musterstrasse 1"

  - name: LEGAL_ZIP
    required: true
    default_dev: "00000"

  - name: LEGAL_JOBTITLE
    required: true
    default_dev: "Coach, Berater, Trainer"

  - name: LEGAL_UST_ID
    required: true
    default_dev: "Nicht vorhanden"

  - name: LEGAL_WEBSITE
    required: true
    default_dev: "localhost"

  - name: WEBSITE_IMAGE
  - name: DOCS_IMAGE
    required: true
    default_dev: "workspace-website"

  - name: WEBSITE_NAMESPACE
    required: false
    default_dev: "website"
    description: "Kubernetes namespace for the Astro website (separate per env on unified cluster)"

  - name: WEBSITE_NODE_AFFINITY
    required: false
    default_dev: ""
    description: "JSON array of node hostnames for website Deployment nodeAffinity (overrides base manifest gekko-hetzner-2/3). Set for envs on non-standard node layouts."

  - name: WORKSPACE_NAMESPACE
    required: false
    default_dev: "workspace"
    description: "Kubernetes namespace for core workspace services (Keycloak, Nextcloud, etc.)"

  - name: EINVOICE_SIDECAR_ENABLED
    required: false
    default_dev: "false"
    description: "Enable Mustangproject sidecar for PDF/A-3 + factur-x.xml embedding"

  - name: EINVOICE_SIDECAR_URL
    required: false
    default_dev: "http://einvoice-sidecar.workspace.svc.cluster.local"
    description: "Cluster URL for the einvoice-sidecar"

  - name: SYSTEMTEST_LOOP_ENABLED
    required: false
    default_dev: "false"
    description: "Master kill-switch for the system-test failure loop — gates the seed button on /admin/fragebogen, the rrweb recorder, and /admin/systemtest/board. Schema bootstrap and cleanup CronJobs run regardless."

  - name: INFRA_NAMESPACE
    required: true
    default_dev: "workspace-infra"

  - name: TLS_SECRET_NAME
    required: true
    default_dev: "workspace-wildcard-tls"

  - name: SMTP_FROM
    required: true
    default_dev: "noreply@localhost"

  # MAIL_FROM_LOCAL and MAIL_FROM_DOMAIN are auto-derived from SMTP_FROM at
  # deploy time (see workspace:deploy in Taskfile.yml — local part before @ and
  # domain part after). Declared here so audits flagging "${VAR} used in
  # manifests but missing from schema" can see them as known-derived.
  - name: MAIL_FROM_LOCAL
    required: false
    default_dev: "noreply"
    description: "Local-part of SMTP_FROM. Auto-derived at deploy time — do not set manually."

  - name: MAIL_FROM_DOMAIN
    required: false
    default_dev: "localhost"
    description: "Domain-part of SMTP_FROM. Auto-derived at deploy time — do not set manually."

  - name: SMTP_USER
    required: true
    default_dev: "noreply@localhost"

  - name: SMTP_HOST
    required: true
    default_dev: "mailpit.workspace.svc.cluster.local"

  - name: SMTP_PORT
    required: true
    default_dev: "1025"

  - name: SMTP_SECURE
    required: false
    default_dev: "false"

  - name: TURN_PUBLIC_IP
    required: true
    default_dev: "127.0.0.1"

  - name: TURN_NODE
    required: true
    default_dev: "k3d-dev-server-0"

  - name: NEXTCLOUD_EXTERNAL_URL
    required: false
    default_dev: "http://files.localhost"

  - name: DOCS_URL
    required: false
    default_dev: "http://docs.localhost"

  - name: AUTH_EXTERNAL_URL
    required: false
    default_dev: "http://auth.localhost"

  - name: VAULT_EXTERNAL_URL
    required: false
    default_dev: "http://vault.localhost"

  - name: WHITEBOARD_EXTERNAL_URL
    required: false
    default_dev: "http://board.localhost"

  - name: TRAEFIK_EXTERNAL_URL
    required: false
    default_dev: "http://traefik.localhost"

  - name: MAIL_EXTERNAL_URL
    required: false
    default_dev: "http://mail.localhost"

  - name: BRETT_DOMAIN
    required: true
    default_dev: "brett.localhost"

  - name: RECOVER_DOMAIN
    required: true
    default_dev: "recover.localhost"

  - name: LIVEKIT_DOMAIN
    required: true
    default_dev: "livekit.localhost"

  - name: LIVEKIT_PIN_IP
    required: false
    default_dev: "127.0.0.1"

  - name: STREAM_DOMAIN
    required: true
    default_dev: "stream.localhost"

  - name: WEBSITE_HOST
    required: true
    default_dev: "web.localhost"
    validate: "^[a-z0-9.-]+(:[0-9]+)?$"

  - name: WEBSITE_SITE_URL
    required: true
    default_dev: "http://web.localhost"

  # Used as OIDC issuer URL in the website ConfigMap — missing breaks SSO
  - name: KEYCLOAK_FRONTEND_URL
    required: true
    default_dev: "http://auth.localhost"

  - name: KC_DOMAIN
    required: false
    default_dev: "auth.localhost"
    description: "Keycloak public hostname used by recovery-browser oauth2-proxy. Auto-derived as auth.${PROD_DOMAIN} at deploy time."

  - name: LLM_HOST_IP
    required: false
    default_dev: ""
    description: "Mesh IP of the GPU host running TEI embed + LM Studio. Required when LLM_ENABLED=true. Empty in dev."

  - name: LLM_ENABLED
    required: true
    default_dev: "false"
    description: "If true, bge-m3 embeddings go to llm-gateway-embed (TEI) and chat goes to llm-gateway-lmstudio (Windows). If false, embeddings.ts calls Voyage directly."
    validate: "^(true|false)$"

  - name: LLM_RERANK_ENABLED
    required: true
    default_dev: "false"
    description: "If true, knowledge query path reranks results via LLM_RERANKER_URL. Reranker service is not deployed; keep false."
    validate: "^(true|false)$"

  - name: COMFY_HOST_IP
    required: false
    default_dev: ""
    description: "Mesh IP of the GPU host running ComfyUI. Empty disables 3D generation (returns 503)."

  - name: COMFY_PORT
    required: false
    default_dev: ""
    description: "Port ComfyUI listens on. Must NOT be 8188 (conflicts with Janus WebSocket)."

  - name: RIGGER_HOST_IP
    required: false
    default_dev: ""
    description: "Mesh IP of the GPU host running the Blender Rigger service. Defaults to COMFY_HOST_IP when empty."

  - name: RIGGER_PORT
    required: false
    default_dev: "8190"
    description: "Port the Rigger FastAPI service listens on. Default 8190."

  - name: LLM_ROUTER_URL
    required: true
    default_dev: "http://llm-gateway-lmstudio.workspace.svc.cluster.local:1234"
    description: "Cluster-internal URL of the Windows LM Studio chat backend. Namespace-aware (workspace vs workspace-korczewski)."

  - name: LLM_EMBED_URL
    required: true
    default_dev: "http://llm-gateway-embed.workspace.svc.cluster.local:8081"
    description: "Cluster-internal URL of the TEI bge-m3 embed service. Namespace-aware (workspace vs workspace-korczewski)."

  # ─────────────────────────────────────────────────────────────────
  # Collabora (office-stack) — all five derived from PROD_DOMAIN inside
  # `workspace:office:deploy` (Taskfile.yml ~line 779). Declared here so
  # the schema audit doesn't keep re-flagging them; the envsubst call in
  # the office task is the single source of truth for their values.
  # ─────────────────────────────────────────────────────────────────
  - name: COLLABORA_HOST
    required: false
    default_dev: "office.localhost"
    description: "Public Collabora hostname. Auto-derived as office.${PROD_DOMAIN}."

  - name: COLLABORA_ALIASGROUP1
    required: false
    default_dev: "http://nextcloud.workspace.svc.cluster.local:80"
    description: "WOPI upstream host Collabora trusts. Auto-derived from PROD_DOMAIN; localhost gets the cluster-internal Nextcloud Service URL."

  - name: COLLABORA_SERVER_NAME
    required: false
    default_dev: "office.localhost"
    description: "coolwsd server_name. Auto-derived as office.${PROD_DOMAIN}."

  - name: COLLABORA_SSL_TERMINATION
    required: false
    default_dev: "false"
    description: "Whether Traefik terminates TLS upstream. Auto-set to 'true' in prod, 'false' for *.localhost."

  - name: COLLABORA_TLS_SECRET
    required: false
    default_dev: "collabora-tls-dev"
    description: "Name of the TLS Secret the Collabora Ingress references. Auto-set to ${TLS_SECRET_NAME} in prod, dev-only literal otherwise."

  - name: COLLABORA_HOST_2
    required: false
    default_dev: ""
    description: "Second brand Collabora hostname (multi-brand office-stack only). Auto-derived in fleet-deploy; empty in single-brand deploys."

  - name: COLLABORA_ALIASGROUP2
    required: false
    default_dev: ""
    description: "Second brand WOPI upstream alias (multi-brand office-stack only). Auto-derived in fleet-deploy; empty in single-brand deploys."

  # ─────────────────────────────────────────────────────────────────
  # Dev stack (dev.mentolder.de) — only meaningful when ENV=mentolder.
  # All five have `default_dev: ""` so the dev k3d cluster (which
  # treats schema "dev" defaults as its own) ignores them.
  # ─────────────────────────────────────────────────────────────────
  - name: DEV_DOMAIN
    required: false
    default_dev: ""
    description: "Public base domain for the dev stack (e.g. dev.mentolder.de). Empty disables the dev stack."

  - name: DEV_NODE
    required: false
    default_dev: ""
    description: "Hostname of the k3s node that runs the dev k3d cluster (e.g. gekko-hetzner-2). Used as nodeSelector for the dev-db-refresh CronJob."

  - name: DEV_WEBSITE_HOST
    required: false
    default_dev: ""
    description: "Public hostname of the dev website (auto-derived as web.${DEV_DOMAIN} when DEV_DOMAIN is set)."

  - name: DEV_BRETT_HOST
    required: false
    default_dev: ""
    description: "Public hostname of the dev Brett (auto-derived as brett.${DEV_DOMAIN})."

  - name: DEV_SSH_USER
    required: false
    default_dev: "root"
    description: "SSH user for connecting to DEV_NODE (e.g. gekko). Defaults to root for backwards compatibility."

  - name: DEV_SSH_ALLOWLIST
    required: false
    default_dev: ""
    description: "Comma-separated CIDR list allowed to reach :2222 on the dev node. Empty means deny-all from public Internet."

secrets:
  - name: arena_db_password
    description: Password for the arena_app PostgreSQL role
    required: false
  - name: arena_db_url
    description: Connection URL for arena-server (korczewski shared-db)
    required: false
  - name: SHARED_DB_PASSWORD
    required: true
    generate: true
    length: 32

  - name: KEYCLOAK_DB_PASSWORD
    required: true
    generate: true
    length: 32

  - name: KEYCLOAK_ADMIN_PASSWORD
    required: true
    generate: true
    length: 24
    description: "Random by default — retrieve via `kubectl get secret workspace-secrets -n <ns> -o jsonpath='{.data.KEYCLOAK_ADMIN_PASSWORD}' | base64 -d`. Override by setting KEYCLOAK_ADMIN_PASSWORD in env_vars: of the env file before running env:generate."
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: NEXTCLOUD_DB_PASSWORD
    required: true
    generate: true
    length: 32
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: NEXTCLOUD_ADMIN_PASSWORD
    required: true
    generate: true
    length: 24
    description: "Random by default — retrieve via `kubectl get secret workspace-secrets -n <ns> -o jsonpath='{.data.NEXTCLOUD_ADMIN_PASSWORD}' | base64 -d`. Override via env_vars: in the env file."
    extra_namespaces:
      - namespace: website
        secret: website-secrets
        dest_key: NEXTCLOUD_ADMIN_PASS
      - namespace: website
        secret: website-secrets
        dest_key: NEXTCLOUD_CALDAV_PASSWORD

  - name: NEXTCLOUD_OIDC_SECRET
    required: true
    generate: true
    length: 40

  # ─────────────────────────────────────────────────────────────────
  # Variables intentionally NOT in this schema (audit allowlist)
  #
  # The weekly schema audit flags every `${VAR}` reference in k3d/ and
  # prod/ that isn't declared here. The following are known false
  # positives — they look like envsubst targets but never reach envsubst.
  # Do not "fix" the audit by adding them; update this comment instead.
  #
  # 1. Signaling keys (hardcoded in pod env, stable within pod lifetime):
  #      SESSION_HASHKEY, SESSION_BLOCKKEY, CLIENTS_INTERNALSECRET, TURN_APIKEY
  #      — substituted by `sed` at container startup in k3d/talk-hpb.yaml
  #      (line ~186) from values living in the Deployment's env: block. If
  #      these ever become rotated secrets, promote them into this section.
  #
  # 2. Shell-local script vars (defined and used in the same container
  #    script, never touched by envsubst):
  #      ARCH                (k3d/nextcloud.yaml — set via `uname -m`)
  #      BACKUP_DIR, STAMP, PASS, UPLOAD_PATH, FILEN_PATH, DUMP, SIZE
  #                          (k3d/backup-cronjob.yaml — script-local)
  #      DOMAIN, IP, IP_4, IP_6, IP_8, STATUS, FAILED
  #                          (prod-korczewski/ddns-updater.yaml — script-local
  #                           shell vars inside the ipv64 DDNS CronJob)
  #
  # 3. Pod env vars sourced from a ConfigMap/Secret reference (not
  #    envsubst — the `${VAR}` in the script reads the container env):
  #      BRAND, FILEN_DEFAULT_UPLOAD_PATH
  #                          (k3d/backup-cronjob.yaml — `backup-config` CM)
  #      BRAND               (k3d/knowledge-ingest-cronjob.yaml — hardcoded
  #                           value: "mentolder" in the env: block)
  #      ARENA_DB_PASSWORD   (prod-korczewski/migrations-arena.yaml — injected
  #                           via secretKeyRef from workspace-secrets; the
  #                           shell script reads the container env, not envsubst)
  #
  # 4. Vaultwarden seed-job aliases (set inside the script from *_DOMAIN
  #    pod env vars; the manifest is NOT envsubst-substituted, only
  #    namespace-sed-rewritten in workspace:vaultwarden:seed):
  #      KC, NC, WEB, DOCS, OFFICE
  #                          (k3d/vaultwarden-seed-job.yaml lines 60-64)
  #
  # 5. Taskfile-derived deploy-time variables (computed or pinned in the
  #    task body, passed directly to envsubst — not stored in environments/):
  #      ARENA_IMAGE         (prod-korczewski/arena.yaml — set to either
  #                           :latest or a pinned digest in arena:deploy)
  #      COLLABORA_INGRESS_MIDDLEWARES
  #                          (k3d/office-stack/ingress.yaml — computed from
  #                           WORKSPACE_NAMESPACE in workspace:office:deploy)
  #      COLLABORA_INGRESS_MIDDLEWARES_2
  #                          (k3d/office-stack/ingress-korczewski.yaml — computed
  #                           for the korczewski brand in workspace:office:deploy)
  #      COLLABORA_TLS_SECRET_2
  #                          (k3d/office-stack/ingress-korczewski.yaml — hardcoded
  #                           to "korczewski-tls" in workspace:office:deploy)
  #
  # 6. Comment text matched by the audit regex (not real envsubst targets):
  #      VAR                 (k3d/coturn-stack/coturn.yaml line ~43 — used
  #                           in a YAML comment explaining $(VAR) vs ${VAR})
  #
  # 7. Runtime shell vars in pvc-backup-cronjob.yaml's embedded Job-generation
  #    heredoc (MJOB). The $${VAR} notation double-escapes the $ so envsubst
  #    never touches them; the container shell evaluates them at runtime:
  #      DS_AFFINITY, DS_CLAIM, VW_AFFINITY, VW_CLAIM
  #                          (affinity and volume claim names in generated Job spec)
  #      LABEL, MOUNTER, OUT, SRC
  #                          (script-local loop vars in the backup Job shell script)
  # ─────────────────────────────────────────────────────────────────
  - name: SIGNALING_SECRET
    required: true
    generate: true
    length: 32
    extra_namespaces:
      - namespace: coturn
        secret: coturn-secrets

  - name: TURN_SECRET
    required: true
    generate: true
    length: 32
    extra_namespaces:
      - namespace: coturn
        secret: coturn-secrets

  - name: CRON_SECRET
    required: true
    generate: true
    length: 48
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: OAUTH2_PROXY_COOKIE_SECRET
    required: true
    generate: true
    length: 32

  - name: COLLABORA_ADMIN_PASSWORD
    required: true
    generate: true
    length: 24
    extra_namespaces:
      - namespace: workspace-office
        secret: collabora-secrets

  - name: WHITEBOARD_JWT_SECRET
    required: true
    generate: true
    length: 32

  - name: VAULTWARDEN_DB_PASSWORD
    required: true
    generate: true
    length: 32

  - name: VAULTWARDEN_ADMIN_TOKEN
    required: true
    generate: true
    length: 48

  - name: VAULTWARDEN_OIDC_SECRET
    required: true
    generate: true
    length: 40

  - name: WEBSITE_DB_PASSWORD
    required: true
    generate: true
    length: 32
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: WEBSITE_OIDC_SECRET
    required: true
    generate: true
    length: 40
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: RECORDING_SECRET
    required: true
    generate: true
    length: 32

  - name: TRANSCRIBER_BOT_PASSWORD
    required: true
    generate: true
    length: 24

  - name: TRANSCRIBER_SECRET
    required: true
    generate: true
    length: 32

  - name: SMTP_PASSWORD
    required: true
    generate: false
    default_dev: "dev"
    description: "Mailpit (dev) accepts any password. For prod set in env_vars: of the env file before env:generate, or paste at the prompt."
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: SMTP_FROM
    required: true
    generate: false

  - name: SMTP_USER
    required: true
    generate: false

  - name: DOCS_OIDC_SECRET
    required: true
    generate: true
    length: 40

  - name: RECOVERY_OIDC_SECRET
    required: true
    generate: true
    length: 40

  # BRAINSTORM_OIDC_SECRET is dev-only (brainstorm.dev.mentolder.de; no prod broker).
  # required:false so prod env:validate doesn't demand it; generate:true keeps dev auto-gen.
  - name: BRAINSTORM_OIDC_SECRET
    required: false
    generate: true
    length: 40

  - name: TRAEFIK_OIDC_SECRET
    required: true
    generate: true
    length: 40

  - name: MAIL_OIDC_SECRET
    required: true
    generate: true
    length: 40

  - name: BRETT_OIDC_SECRET
    required: true
    generate: true
    length: 40
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: COMFY_OIDC_SECRET
    required: true
    generate: true
    length: 40

  # Claude Code
  - name: CLAUDE_CODE_OIDC_SECRET
    required: true
    generate: true
    length: 40

  - name: CLAUDE_CODE_WEBUI_SECRET_KEY
    required: true
    generate: true
    length: 48

  # External service keys (user-provided)
  - name: GITHUB_PAT
    required: false
    generate: false

  - name: GHCR_PAT
    required: false
    generate: false

  - name: MEETINGS_DB_PASSWORD
    required: true
    generate: true
    length: 32

  - name: SEPA_CREDITOR_IBAN
    required: false
    generate: false
    description: "IBAN of the creditor account for SEPA direct debit (Lastschrift)"
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: SEPA_CREDITOR_BIC
    required: false
    generate: false
    description: "BIC of the creditor bank for SEPA direct debit"
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: SEPA_CREDITOR_ID
    required: false
    generate: false
    description: "Gläubiger-Identifikationsnummer (e.g. DE98ZZZ09999999999)"
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: BACKUP_PASSPHRASE
    required: true
    generate: true
    length: 32

  - name: FILEN_EMAIL
    required: false
    generate: false

  - name: FILEN_PASSWORD
    required: false
    generate: false

  - name: IPV64_API_KEY
    required: false
    generate: false
    extra_namespaces:
      - namespace: cert-manager
        secret: ipv64-api-key
      - namespace: website
        secret: website-secrets

  - name: IPV64_UPDATE_HASH
    required: false
    generate: false


  - name: BRETT_BOT_SECRET
    required: true
    generate: true
    length: 48
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: MONITORING_WEBHOOK_TOKEN
    required: true
    generate: true
    length: 32
    description: "Internal token for the monitoring webhook — random by default."
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: LIVEKIT_API_KEY
    required: true
    generate: true
    length: 16
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: LIVEKIT_API_SECRET
    required: true
    generate: true
    length: 32
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: LIVEKIT_RTMP_KEY
    required: true
    generate: true
    length: 16
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: TRACKING_DB_URL
    required: false
    generate: false
    description: "Legacy — tracking-import CronJob was removed in PR #788 (2026-05-15). Retained only so existing sealed-secrets that still carry the key continue to deserialize cleanly. Safe to drop from new envs."

  - name: INTERNAL_API_TOKEN
    required: true
    generate: true
    length: 48
    description: "Shared secret for cron-driven internal API calls (e.g. notify-close). Set in environments/.secrets/<env>.yaml then run `task env:seal ENV=<env>`."
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: VOYAGE_API_KEY
    required: false
    generate: false
    description: "Voyage AI API key for document embeddings (Coaching-Knowledge-Pipeline + knowledge-ingest CronJob + web-crawl API). Get from https://dashboard.voyageai.com/api-keys."
    extra_namespaces:
      - namespace: workspace
        secret: knowledge-secrets
      - namespace: website
        secret: website-secrets

  - name: ANTHROPIC_API_KEY
    required: false
    generate: false
    description: "Anthropic API key. Used by the website for meeting insights (claude.ts) and coaching classification. Optional — the LLM router is local-only and does not fall back to Anthropic."
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: LLM_ROUTER_API_KEY
    required: false
    generate: false
    description: "API key for the Windows LM Studio / LM router (OpenAI-compatible, port 1234). Injected into the website pod via website-secrets."
    extra_namespaces:
      - namespace: website
        secret: website-secrets

  - name: HUGGINGFACE_TOKEN
    required: false
    generate: false
    description: "HuggingFace API token for authenticated model downloads (ComfyUI, bge-m3 via TEI, Hunyuan3D). Get from https://huggingface.co/settings/tokens."
    extra_namespaces:
      - namespace: workspace
        secret: knowledge-secrets

  - name: HETZNER_API_KEY
    required: false
    generate: false
    description: "Hetzner Cloud API token for the cluster's project. Used for node provisioning and automation via the Hetzner Cloud API."

  - name: PUSHOVER_TOKEN
    required: true
    generate: false
    description: "Pushover API token for Alertmanager + deploy notifications."
    extra_namespaces:
      - namespace: monitoring
        secret: alertmanager-pushover

  - name: PUSHOVER_USER
    required: true
    generate: false
    description: "Pushover user key for Alertmanager + deploy notifications."
    extra_namespaces:
      - namespace: monitoring
        secret: alertmanager-pushover

  - name: GRAFANA_OIDC_SECRET
    required: true
    generate: true
    length: 40
    description: "Confidential client secret for the `grafana` Keycloak OIDC client."
    extra_namespaces:
      - namespace: monitoring
        secret: grafana-oidc

  - name: GRAFANA_ADMIN_PASSWORD
    required: true
    generate: true
    length: 24
    description: "Grafana local admin password (fallback when OIDC is unavailable)."
    extra_namespaces:
      - namespace: monitoring
        secret: grafana-oidc

  # ─────────────────────────────────────────────────────────────────
  # Dev stack — sealed against mentolder cluster cert.
  # The shared-db-dev passwords are DISTINCT from prod's shared-db
  # passwords so a leaked dev cred cannot unlock prod.
  # ─────────────────────────────────────────────────────────────────
  - name: DEV_SHARED_DB_PASSWORD
    required: false
    generate: true
    length: 32
    description: "Postgres superuser password for shared-db-dev (inside the dev k3d cluster)."

  - name: DEV_WEBSITE_DB_PASSWORD
    required: false
    generate: true
    length: 32
    description: "Postgres role password for the `website` DB inside shared-db-dev."

  - name: DEV_OAUTH2_PROXY_COOKIE_SECRET
    required: false
    generate: true
    length: 32
    description: "Cookie secret for oauth2-proxy-dev (separate from prod's OAUTH2_PROXY_COOKIE_SECRET)."

  - name: DEV_WORKSPACE_OIDC_SECRET
    required: false
    generate: true
    length: 40
    description: "Confidential client secret for the workspace-dev Keycloak client."

  - name: DEV_SISH_AUTHORIZED_KEYS
    required: false
    generate: false
    description: "SSH authorized_keys list (newline-separated) for sish — anyone who can publish a dev tunnel."

setup_vars:
  - name: KC_USER1_USERNAME
    required: true
    default_dev: "admin"

  - name: KC_USER1_EMAIL
    required: true
    validate: "^.+@.+$"
    default_dev: "admin@localhost"

  - name: KC_USER1_PASSWORD
    required: true
    sealed: true
    default_dev: "DevAdmin123!"

  - name: KC_USER2_USERNAME
    required: false

  - name: KC_USER2_EMAIL
    required: false

  - name: KC_USER2_PASSWORD
    required: false
    sealed: true

  # ── WireGuard mesh node keys ────────────────────────────────────────────────
  # One entry per permanent Hetzner cluster node. Private keys are sealed;
  # public keys are plain (WG public keys are not sensitive). Stored here so
  # the same private key survives every node reset — existing peers never need
  # updating on recovery because the public key remains constant.
  # Populated by: `wg genkey | tee /tmp/pk | wg pubkey` on first provisioning.
  # See .claude/skills/hetzner-node/SKILL.md Phase 0 for the full workflow.
  #
  # mentolder cluster
  - name: WG_MESH_GEKKO2_PRIVATE_KEY
    required: false
    sealed: true
    description: "wg-mesh private key for gekko-hetzner-2"
  - name: WG_MESH_GEKKO2_PUBLIC_KEY
    required: false
    description: "wg-mesh public key for gekko-hetzner-2 (non-sensitive, committed in wireguard/wg-mesh-nodes.yaml)"
  - name: WG_MESH_GEKKO3_PRIVATE_KEY
    required: false
    sealed: true
    description: "wg-mesh private key for gekko-hetzner-3"
  - name: WG_MESH_GEKKO3_PUBLIC_KEY
    required: false
    description: "wg-mesh public key for gekko-hetzner-3"
  - name: WG_MESH_GEKKO4_PRIVATE_KEY
    required: false
    sealed: true
    description: "wg-mesh private key for gekko-hetzner-4"
  - name: WG_MESH_GEKKO4_PUBLIC_KEY
    required: false
    description: "wg-mesh public key for gekko-hetzner-4"
  # DECOMMISSIONED: mentolder-standalone Proxmox home-LAN workers (wg-mesh 192.168.100.20-22, port 51821)
  # k3s-1/2/3 VMs decommissioned 2026-05-31 — keys retained for potential reuse of Proxmox hosts.
  - name: WG_MESH_K3S1_PRIVATE_KEY
    required: false
    sealed: true
    description: "DECOMMISSIONED — wg-mesh private key for k3s-1 (Proxmox vmid=100, wg_ip 192.168.100.20)"
  - name: WG_MESH_K3S1_PUBLIC_KEY
    required: false
    description: "DECOMMISSIONED — wg-mesh public key for k3s-1"
  - name: WG_MESH_K3S2_PRIVATE_KEY
    required: false
    sealed: true
    description: "wg-mesh private key for k3s-2 (Proxmox vmid=200, wg_ip 192.168.100.21)"
  - name: WG_MESH_K3S2_PUBLIC_KEY
    required: false
    description: "wg-mesh public key for k3s-2"
  - name: WG_MESH_K3S3_PRIVATE_KEY
    required: false
    sealed: true
    description: "wg-mesh private key for k3s-3 (Proxmox vmid=300, wg_ip 192.168.100.22)"
  - name: WG_MESH_K3S3_PUBLIC_KEY
    required: false
    description: "wg-mesh public key for k3s-3"
  # korczewski cluster
  - name: WG_MESH_PK4_PRIVATE_KEY
    required: false
    sealed: true
    description: "wg-mesh private key for pk-hetzner-4"
  - name: WG_MESH_PK4_PUBLIC_KEY
    required: false
    description: "wg-mesh public key for pk-hetzner-4"
  - name: WG_MESH_PK6_PRIVATE_KEY
    required: false
    sealed: true
    description: "wg-mesh private key for pk-hetzner-6"
  - name: WG_MESH_PK6_PUBLIC_KEY
    required: false
    description: "wg-mesh public key for pk-hetzner-6"
  - name: WG_MESH_PK8_PRIVATE_KEY
    required: false
    sealed: true
    description: "wg-mesh private key for pk-hetzner-8"
  - name: WG_MESH_PK8_PUBLIC_KEY
    required: false
    description: "wg-mesh public key for pk-hetzner-8"
  - name: WG_MESH_PK_L1_WORKER_PRIVATE_KEY
    required: false
    sealed: true
    description: "wg-mesh private key for korczewski l1 worker node"
  - name: WG_MESH_PK_L1_WORKER_PUBLIC_KEY
    required: false
    description: "wg-mesh public key for korczewski l1 worker node"

  # ── Proxmox hypervisor SSH keys ─────────────────────────────────────────────
  # Root SSH keys for the three Proxmox host nodes. Private keys are sealed;
  # public keys are plain. Used for VM management and console access.
  - name: PVE_SSH_PRIVATE_KEY
    required: false
    sealed: true
    description: "SSH private key for root@pvemain (10.0.0.7) — Proxmox node 1 (previously hosted k3s-1, DECOMMISSIONED 2026-05-31)"
  - name: PVE_SSH_PUBLIC_KEY
    required: false
    description: "SSH public key for root@pvemain"
  - name: PVE2_SSH_PRIVATE_KEY
    required: false
    sealed: true
    description: "SSH private key for root@pve2 — Proxmox node 2 (dev2, 10.0.0.9, dev Proxmox cluster)"
