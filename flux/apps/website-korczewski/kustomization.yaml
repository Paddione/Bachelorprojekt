apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: website-korczewski
resources:
  - ../../../k3d/website.yaml
  - ../../../k3d/website-seller-config.yaml
patches:
  - path: image-tag.yaml
    target:
      kind: Deployment
      name: website
  - path: website-config-patch.yaml
    target:
      kind: ConfigMap
      name: website-config
  # Replace mentolder node affinity with korczewski nodes
  - target:
      kind: Deployment
      name: website
    patch: |-
      - op: replace
        path: /spec/template/spec/affinity/nodeAffinity/requiredDuringSchedulingIgnoredDuringExecution/nodeSelectorTerms/0/matchExpressions/0/values
        value:
          - pk-hetzner-4
          - pk-hetzner-6
          - pk-hetzner-8
