apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: website
resources:
  - ../../../k3d/website.yaml
  - ../../../k3d/website-seller-config.yaml
  # mentolder HTTPS Ingress (tracked here to survive cluster rebuilds — T000146)
  - website-ingress-web.yaml
patches:
  - path: image-tag.yaml
    target:
      kind: Deployment
      name: website
  - path: website-config-patch.yaml
    target:
      kind: ConfigMap
      name: website-config