apiVersion: fluxcd.controlplane.io/v1
kind: FluxInstance
metadata:
  name: flux
  namespace: flux-system
spec:
  distribution:
    version: "2.x"
    registry: "ghcr.io/fluxcd"
  components:
    - source-controller
    - kustomize-controller
    - notification-controller
  cluster:
    type: kubernetes
    networkPolicy: true
  sync:
    kind: OCIRepository
    url: "oci://ghcr.io/paddione/fleet-manifests"
    ref: latest
    path: clusters/fleet
    pullSecret: ghcr-auth
    interval: 10m
