apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-korczewski
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  timeout: 5m
  dependsOn:
    - name: flux-infra-configs
  sourceRef:
    kind: ExternalArtifact
    name: apps
  path: ./korczewski
  prune: true
  wait: true
