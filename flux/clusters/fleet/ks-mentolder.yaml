apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-mentolder
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  timeout: 5m
  dependsOn:
    - name: flux-infra-controllers
  sourceRef:
    kind: OCIRepository
    name: fleet-manifests
  path: ./mentolder
  prune: true
  wait: true
