apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: website
  namespace: flux-system
spec:
  interval: 5m0s
  path: ./flux/apps/website-korczewski
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
      - kind: ConfigMap
        name: website-vars
      - kind: Secret
        name: website-vars-secret
        optional: true
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: website
      namespace: website-korczewski