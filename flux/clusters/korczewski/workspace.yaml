apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: workspace
  namespace: flux-system
spec:
  interval: 5m0s
  path: ./prod-korczewski
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
      - kind: Secret
        name: workspace-flux-vars
        optional: true
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: keycloak
      namespace: workspace-korczewski
    - apiVersion: apps/v1
      kind: Deployment
      name: shared-db
      namespace: workspace-korczewski