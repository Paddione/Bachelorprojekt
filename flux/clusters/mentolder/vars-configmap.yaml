  WORKSPACE_NAMESPACE: workspace
  WEBSITE_NAMESPACE: website
  DEV_DOMAIN: dev.mentolder.de
  BRAND_NAME: Mentolder
  BRAND_ID: mentolder
  WEBSITE_IMAGE: mentolder-website
