---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: korczewski-website
  namespace: flux-system
spec:
  image: ghcr.io/paddione/korczewski-website
  interval: 5m0s
  secretRef:
    name: ghcr-pull-secret
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: korczewski-website
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: korczewski-website
  filterTags:
    pattern: '^sha-[0-9]{8}-[0-9]{6}-[a-f0-9]+'
  policy:
    alphabetical:
      order: asc