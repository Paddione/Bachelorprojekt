              env:
                - name: PGPASSWORD
                  valueFrom: { secretKeyRef: { name: workspace-secrets, key: WEBSITE_DB_PASSWORD } }
                - name: PGHOST
                  value: shared-db
                - name: PGUSER
                  value: website
                - name: PGDATABASE
