apiVersion: batch/v1
kind: CronJob
metadata:
  name: admin-actions-cleanup
  namespace: workspace
  labels:
    app: cronjobs
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: psql
              image: postgres:16-alpine
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "200m"
                  memory: "128Mi"
              env:
                - name: PGPASSWORD
                  valueFrom: { secretKeyRef: { name: workspace-secrets, key: WEBSITE_DB_PASSWORD } }
                - name: PGHOST
                  value: shared-db
                - name: PGUSER
                  value: website
                - name: PGDATABASE
                  value: website
              command:
                - sh
                - -c
                - |
                  until pg_isready -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE" -q; do sleep 1; done
                  psql -v ON_ERROR_STOP=1 -c "
                    UPDATE public.admin_actions
                    SET status = 'failed',
                        error = 'Timeout — Aktion wurde nicht abgeschlossen',
                        completed_at = now()
                    WHERE status = 'in_progress'
                      AND created_at < now() - interval '30 minutes';
                  "
---
