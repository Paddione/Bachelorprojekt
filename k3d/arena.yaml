# ════════════════════════════════════════════════════════════════════
# arena — authoritative game server. Single replica (in-memory lobby).
# Deployed on the korczewski cluster (arena-ws.korczewski.de).
# Mentolder website connects cross-cluster to arena-ws.korczewski.de.
# ════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arena-server
  namespace: ${WORKSPACE_NAMESPACE}
  labels:
    app: arena-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: arena-server
  template:
    metadata:
      labels:
        app: arena-server
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ghcr-pull-secret
      nodeSelector:
        kubernetes.io/arch: amd64
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-location
                    operator: In
                    values: [hetzner]
      containers:
        - name: arena-server
          # Pinned by digest. To roll forward: build/push a new arena-server image,
          # then resolve the digest with `gh api /users/paddione/packages/container/arena-server/versions`
          # and update this line. Closes #656.
          image: ghcr.io/paddione/arena-server@sha256:dd06fee5f30c585441ac83843e1c68c44fbbbfdd63c0755c9e8346f45e5ab336
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities: { drop: [ALL] }
          ports:
            - containerPort: 8090
          env:
            - name: NODE_OPTIONS
              value: "--dns-result-order=ipv4first"
            - name: PORT
              value: "8090"
            - name: LOG_LEVEL
              value: "info"
            - name: KEYCLOAK_ISSUER_MENTOLDER
              value: "https://auth.mentolder.de/realms/workspace"
            - name: KEYCLOAK_ISSUER_KORCZEWSKI
              value: "https://auth.korczewski.de/realms/workspace"
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: arena_db_url
          readinessProbe:
            httpGet: { path: /healthz, port: 8090 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8090 }
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests: { memory: 256Mi, cpu: "200m" }
            limits:   { memory: 512Mi, cpu: "1000m" }
---
apiVersion: v1
kind: Service
metadata:
  name: arena-server
  namespace: ${WORKSPACE_NAMESPACE}
spec:
  selector: { app: arena-server }
  ports:
    - port: 80
      targetPort: 8090
      name: http
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: arena-cors
  namespace: ${WORKSPACE_NAMESPACE}
spec:
  headers:
    accessControlAllowOriginList:
      - "https://web.mentolder.de"
      - "https://web.korczewski.de"
    accessControlAllowMethods: ["GET", "POST", "OPTIONS"]
    accessControlAllowHeaders: ["authorization", "content-type"]
    accessControlMaxAge: 600
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: arena-server
  namespace: ${WORKSPACE_NAMESPACE}
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`arena-ws.${PROD_DOMAIN}`)
      kind: Rule
      services:
        - name: arena-server
          port: 80
      middlewares:
        - name: arena-cors
  tls:
    secretName: wildcard-cert