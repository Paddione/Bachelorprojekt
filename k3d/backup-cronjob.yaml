# ═══════════════════════════════════════════════════════════════════
# Automated DB Backup — daily PostgreSQL dumps with AES-256 encryption
# SA-07: Daily at 02:00 UTC, 30-day retention
# ═══════════════════════════════════════════════════════════════════
apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-backup
  namespace: workspace
  labels:
    app: backup
  annotations:
    graph.bachelorprojekt.de/depends-on: shared-db
spec:
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: db-backup
        spec:
          restartPolicy: OnFailure
          # Prefer to co-locate with shared-db (same-node pg_dump is faster and avoids
          # cross-node routing) but don't block scheduling if that node is full.
          # The backup connects via the shared-db Service, so any reachable node works.
          affinity:
            podAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app: shared-db
                    topologyKey: kubernetes.io/hostname
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              # Debian-based image: has openssl pre-installed (unlike postgres-alpine).
              # IfNotPresent avoids pulling on every run in case DNS is unreliable.
              image: pgvector/pgvector:0.8.5-pg16@sha256:1d533553fefe4f12e5d80c7b80622ba0c382abb5758856f52983d8789179f0fb
              imagePullPolicy: IfNotPresent
              env:
                - name: NEXTCLOUD_DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: workspace-secrets
                      key: NEXTCLOUD_DB_PASSWORD
                - name: VAULTWARDEN_DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: workspace-secrets
                      key: VAULTWARDEN_DB_PASSWORD
                - name: WEBSITE_DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: workspace-secrets
                      key: WEBSITE_DB_PASSWORD
                - name: BACKUP_PASSPHRASE
                  valueFrom:
                    secretKeyRef:
                      name: workspace-secrets
                      key: BACKUP_PASSPHRASE
                - name: BRAND
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: BRAND
                - name: FILEN_DEFAULT_UPLOAD_PATH
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: FILEN_DEFAULT_UPLOAD_PATH
                - name: FILEN_EMAIL
                  valueFrom:
                    secretKeyRef:
                      name: workspace-secrets
                      key: FILEN_EMAIL
                      optional: true
                - name: FILEN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: workspace-secrets
                      key: FILEN_PASSWORD
                      optional: true
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 65534
                capabilities:
                  drop: ["ALL"]
              command: ["/bin/bash", "-c"]
              # Shell vars below (STAMP, BACKUP_DIR, PASS, FILEN_PATH) are evaluated
              # by the container shell at runtime — NOT Taskfile envsubst targets.
              args:
                - |
                  # fail-loud: -e exits on any error, -u catches missing env vars,
                  # -o pipefail propagates pg_dump failures through redirects/pipes.
                  set -euo pipefail
                  # Wait for pod network to settle; ClusterIP routes via kube-proxy
                  # take a few seconds to become active for newly started pods.
                  sleep 15

                  # Pre-flight: refuse to start if shared-db isn't reachable.
                  # Without this, pg_dump's `> file` redirect creates an empty file
                  # before pg_dump can fail, leaving a 0-byte "backup" on disk.
                  echo "Pre-flight: pg_isready against shared-db..."
                  if ! pg_isready -h shared-db -t 30 -q; then
                    echo "FATAL: shared-db is not reachable — refusing to write empty dumps." >&2
                    exit 1
                  fi

                  STAMP=$(date +%Y%m%d-%H%M%S)
                  BACKUP_DIR=/backups/$${STAMP}
                  mkdir -p "$${BACKUP_DIR}"

                  # Dump all databases (all on shared-db instance)
                  for db in nextcloud vaultwarden website; do
                    case "$${db}" in
                      nextcloud)   PASS="$${NEXTCLOUD_DB_PASSWORD}" ;;
                      vaultwarden) PASS="$${VAULTWARDEN_DB_PASSWORD}" ;;
                      website)     PASS="$${WEBSITE_DB_PASSWORD}" ;;
                    esac
                    DUMP="$${BACKUP_DIR}/$${db}.dump"
                    echo "Backing up $${db}..."
                    PGPASSWORD="$${PASS}" pg_dump -Fc \
                      -h shared-db -U "$${db}" -d "$${db}" \
                      > "$${DUMP}"
                    # Post-flight: every pg_dump -Fc starts with the literal "PGDMP" magic.
                    # An empty file or any other content here means the dump is unusable —
                    # fail the Job rather than encrypt and publish garbage.
                    SIZE=$(wc -c < "$${DUMP}")
                    if [ "$${SIZE}" -lt 200 ] || ! head -c 5 "$${DUMP}" | grep -q '^PGDMP'; then
                      echo "FATAL: $${db}.dump is $${SIZE} bytes and not a valid pg_dump archive." >&2
                      exit 1
                    fi
                    echo "  $${db}.dump OK ($${SIZE} bytes)"
                  done

                  # Encrypt with AES-256 using BACKUP_PASSPHRASE from workspace-secrets
                  for f in "$${BACKUP_DIR}"/*.dump; do
                    openssl enc -aes-256-cbc -salt -pbkdf2 \
                      -in "$${f}" -out "$${f}.enc" \
                      -pass env:BACKUP_PASSPHRASE
                    rm "$${f}"
                  done

                  # Retention: remove backups older than 30 days
                  find /backups -maxdepth 1 -type d -mtime +30 -exec rm -rf {} +

                  # Resolve runtime upload path: DB value wins, ConfigMap default is fallback
                  FILEN_PATH=$(PGPASSWORD="$${WEBSITE_DB_PASSWORD}" \
                    psql -h shared-db -U website -d website -t -q \
                    -c "SELECT value FROM site_settings WHERE brand='$${BRAND}' AND key='filen_upload_path'" \
                    2>/dev/null) || FILEN_PATH=""
                  FILEN_PATH=$(printf '%s' "$${FILEN_PATH}" | tr -d ' \n')
                  [ -n "$${FILEN_PATH}" ] || FILEN_PATH="$${FILEN_DEFAULT_UPLOAD_PATH}"

                  # Signal filen-upload container: path + stamp
                  printf '%s' "$${FILEN_PATH}" > /staging/.filen_path
                  printf '%s' "$${STAMP}"      > /staging/.done

                  echo "Backup complete: $${BACKUP_DIR}"
                  ls -lh "$${BACKUP_DIR}/"
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
                - name: staging
                  mountPath: /staging
              resources:
                requests:
                  memory: 256Mi
                  cpu: "200m"
                limits:
                  memory: 512Mi
                  cpu: "1"
            - name: filen-upload
              # Uses @filen/cli (Node.js) — rclone has no native Filen backend and
              # webdav.filen.io resolves to 127.0.0.1 (local desktop-app only).
              image: node:22-alpine@sha256:16e22a550f3863206a3f701448c45f7912c6896a62de43add43bb9c86130c3e2
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              command: ["/bin/sh", "-c"]
              # STAMP and UPLOAD_PATH below are read from /staging at runtime — NOT envsubst targets.
              args:
                - |
                  if [ -z "$${FILEN_EMAIL}" ] || [ -z "$${FILEN_PASSWORD}" ]; then
                    echo "Filen not configured — skipping remote backup"
                    until [ -f /staging/.done ]; do sleep 2; done
                    exit 0
                  fi

                  echo "Waiting for local backup to complete..."
                  until [ -f /staging/.done ]; do sleep 2; done

                  STAMP=$(cat /staging/.done)
                  UPLOAD_PATH=$(cat /staging/.filen_path)

                  echo "Installing Filen CLI..."
                  export HOME=/tmp
                  npm install -g @filen/cli --prefix /tmp/npm-global --silent 2>&1 | tail -3
                  export PATH="/tmp/npm-global/bin:$$PATH"

                  echo "Uploading $${STAMP} to Filen: $${UPLOAD_PATH}/$${STAMP}/"
                  # @filen/cli authenticates with raw email+password; it derives the
                  # PBKDF2 key / master keys / API token internally (Filen auth v2).
                  # This invocation passes NO 2FA code, so it assumes 2FA is OFF on the
                  # Filen account — an invariant that holds for both mentolder and
                  # korczewski. If 2FA is ever enabled, login fails permanently here.
                  if ! filen --email "$${FILEN_EMAIL}" --password "$${FILEN_PASSWORD}" \
                       upload "/backups/$${STAMP}/" "$${UPLOAD_PATH}/$${STAMP}/"; then
                    echo "ERROR: Filen remote upload failed for $${STAMP} — the LOCAL encrypted backup on backup-pvc is intact."
                    echo "       Likely cause: invalid FILEN_EMAIL/FILEN_PASSWORD, or 2FA was enabled on the Filen account (this job requires 2FA OFF)."
                    echo "       Exiting non-zero so the broken remote backup surfaces as a Failed Job instead of being silently swallowed."
                    # restartPolicy: OnFailure retries transients in-pod; a permanent
                    # failure escalates to a Failed Job (failedJobsHistoryLimit keeps it visible).
                    exit 1
                  fi

                  echo "Filen upload done"
              env:
                - name: FILEN_EMAIL
                  valueFrom:
                    secretKeyRef:
                      name: workspace-secrets
                      key: FILEN_EMAIL
                      optional: true
                - name: FILEN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: workspace-secrets
                      key: FILEN_PASSWORD
                      optional: true
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
                  readOnly: true
                - name: staging
                  mountPath: /staging
                  readOnly: true
              resources:
                requests:
                  memory: 256Mi
                  cpu: "100m"
                limits:
                  memory: 512Mi
                  cpu: "500m"
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: backup-pvc
            - name: staging
              emptyDir: {}
