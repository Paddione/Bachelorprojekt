# ═══════════════════════════════════════════════════════════════════
# Automated DB Backup — daily PostgreSQL dumps with AES-256 encryption
# SA-07: Daily at 02:00 UTC, 30-day retention
# ═══════════════════════════════════════════════════════════════════
apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-backup
  namespace: workspace
  labels:
    app: db-backup
spec:
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: db-backup
        spec:
          restartPolicy: OnFailure
          # Co-locate with shared-db to avoid cross-node CNI routing issues.
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: shared-db
                  topologyKey: kubernetes.io/hostname
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              # Debian-based image: has openssl pre-installed (unlike postgres-alpine).
              # IfNotPresent avoids pulling on every run in case DNS is unreliable.
              image: pgvector/pgvector:0.8.0-pg16
              imagePullPolicy: IfNotPresent
              env:
                - name: KEYCLOAK_DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: workspace-secrets
                      key: KEYCLOAK_DB_PASSWORD
                - name: NEXTCLOUD_DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: workspace-secrets
                      key: NEXTCLOUD_DB_PASSWORD
                - name: VAULTWARDEN_DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: workspace-secrets
                      key: VAULTWARDEN_DB_PASSWORD
                - name: WEBSITE_DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: workspace-secrets
                      key: WEBSITE_DB_PASSWORD
                - name: DOCUSEAL_DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: workspace-secrets
                      key: DOCUSEAL_DB_PASSWORD
                - name: BACKUP_PASSPHRASE
                  valueFrom:
                    secretKeyRef:
                      name: workspace-secrets
                      key: BACKUP_PASSPHRASE
                - name: BRAND
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: BRAND
                - name: FILEN_DEFAULT_UPLOAD_PATH
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: FILEN_DEFAULT_UPLOAD_PATH
                - name: FILEN_EMAIL
                  valueFrom:
                    secretKeyRef:
                      name: workspace-secrets
                      key: FILEN_EMAIL
                      optional: true
                - name: FILEN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: workspace-secrets
                      key: FILEN_PASSWORD
                      optional: true
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 65534
                capabilities:
                  drop: ["ALL"]
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  # Wait for pod network to settle; ClusterIP routes via kube-proxy
                  # take a few seconds to become active for newly started pods.
                  sleep 15
                  STAMP=$(date +%Y%m%d-%H%M%S)
                  BACKUP_DIR=/backups/${STAMP}
                  mkdir -p "${BACKUP_DIR}"

                  # Dump all databases (all on shared-db instance)
                  for db in keycloak nextcloud vaultwarden website docuseal; do
                    case "${db}" in
                      keycloak)    PASS="${KEYCLOAK_DB_PASSWORD}" ;;
                      nextcloud)   PASS="${NEXTCLOUD_DB_PASSWORD}" ;;
                      vaultwarden) PASS="${VAULTWARDEN_DB_PASSWORD}" ;;
                      website)     PASS="${WEBSITE_DB_PASSWORD}" ;;
                      docuseal)    PASS="${DOCUSEAL_DB_PASSWORD}" ;;
                    esac
                    echo "Backing up ${db}..."
                    PGPASSWORD="${PASS}" pg_dump -Fc \
                      -h shared-db -U "${db}" -d "${db}" \
                      > "${BACKUP_DIR}/${db}.dump"
                  done

                  # Encrypt with AES-256 using BACKUP_PASSPHRASE from workspace-secrets
                  for f in "${BACKUP_DIR}"/*.dump; do
                    openssl enc -aes-256-cbc -salt -pbkdf2 \
                      -in "${f}" -out "${f}.enc" \
                      -pass env:BACKUP_PASSPHRASE
                    rm "${f}"
                  done

                  # Retention: remove backups older than 30 days
                  find /backups -maxdepth 1 -type d -mtime +30 -exec rm -rf {} +

                  # Resolve runtime upload path: DB value wins, ConfigMap default is fallback
                  FILEN_PATH=$(PGPASSWORD="${WEBSITE_DB_PASSWORD}" \
                    psql -h shared-db -U website -d website -t -q \
                    -c "SELECT value FROM site_settings WHERE brand='${BRAND}' AND key='filen_upload_path'" \
                    2>/dev/null) || FILEN_PATH=""
                  FILEN_PATH=$(printf '%s' "${FILEN_PATH}" | tr -d ' \n')
                  FILEN_PATH="${FILEN_PATH:-${FILEN_DEFAULT_UPLOAD_PATH}}"

                  # Signal filen-upload container: path + stamp
                  printf '%s' "${FILEN_PATH}" > /staging/.filen_path
                  printf '%s' "${STAMP}"      > /staging/.done

                  echo "Backup complete: ${BACKUP_DIR}"
                  ls -lh "${BACKUP_DIR}/"
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
                - name: staging
                  mountPath: /staging
              resources:
                requests:
                  memory: 256Mi
                  cpu: "200m"
                limits:
                  memory: 512Mi
                  cpu: "1"
            - name: filen-upload
              # rclone handles WebDAV uploads; waits for backup container signal via staging emptyDir.
              image: rclone/rclone:1.68
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              command: ["/bin/sh", "-c"]
              args:
                - |
                  if [ -z "${FILEN_EMAIL}" ] || [ -z "${FILEN_PASSWORD}" ]; then
                    echo "Filen not configured — skipping remote backup"
                    until [ -f /staging/.done ]; do sleep 2; done
                    exit 0
                  fi

                  echo "Waiting for local backup to complete..."
                  until [ -f /staging/.done ]; do sleep 2; done

                  STAMP=$(cat /staging/.done)
                  UPLOAD_PATH=$(cat /staging/.filen_path)

                  echo "Uploading ${STAMP} to Filen: ${UPLOAD_PATH}/${STAMP}/"

                  OBSCURED=$(rclone obscure "${FILEN_PASSWORD}")
                  mkdir -p /tmp/rclone
                  printf '[filen]\ntype = filen\nemail = %s\npassword = %s\n' \
                    "${FILEN_EMAIL}" "${OBSCURED}" > /tmp/rclone/rclone.conf

                  rclone copy "/backups/${STAMP}/" "filen:${UPLOAD_PATH}/${STAMP}/" \
                    --config /tmp/rclone/rclone.conf \
                    --stats-one-line \
                    || echo "WARNING: Filen upload failed — local backup intact"

                  echo "Filen upload done"
              env:
                - name: FILEN_EMAIL
                  valueFrom:
                    secretKeyRef:
                      name: workspace-secrets
                      key: FILEN_EMAIL
                      optional: true
                - name: FILEN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: workspace-secrets
                      key: FILEN_PASSWORD
                      optional: true
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
                  readOnly: true
                - name: staging
                  mountPath: /staging
                  readOnly: true
              resources:
                requests:
                  memory: 64Mi
                  cpu: "50m"
                limits:
                  memory: 128Mi
                  cpu: "200m"
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: backup-pvc
            - name: staging
              emptyDir: {}
