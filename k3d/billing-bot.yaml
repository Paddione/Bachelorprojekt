# ═══════════════════════════════════════════════════════════════════
# Billing Bot — Mattermost ↔ Invoice Ninja integration
# Handles /billing slash command and interactive button actions
# ═══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-bot
  labels:
    app: billing-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: billing-bot
  template:
    metadata:
      labels:
        app: billing-bot
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: billing-bot
          image: registry.localhost:5000/billing-bot:v1
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: INVOICENINJA_URL
              value: "http://invoiceninja:80"
            - name: INVOICENINJA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: INVOICENINJA_API_TOKEN
            - name: MATTERMOST_URL
              value: "http://mattermost:8065"
            - name: MATTERMOST_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: BILLING_BOT_MM_TOKEN
            - name: BILLING_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: domain-config
                  key: BILLING_DOMAIN
            - name: NEXTCLOUD_URL
              value: "http://nextcloud.workspace.svc.cluster.local:80"
            - name: NEXTCLOUD_ADMIN_USER
              value: "admin"
            - name: NEXTCLOUD_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: NEXTCLOUD_ADMIN_PASSWORD
            - name: NC_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: domain-config
                  key: NC_DOMAIN
            - name: SCHEME
              value: "http"
          ports:
            - containerPort: 8090
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: 32Mi
              cpu: 50m
            limits:
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: billing-bot
spec:
  selector:
    app: billing-bot
  ports:
    - port: 8090
      targetPort: 8090
