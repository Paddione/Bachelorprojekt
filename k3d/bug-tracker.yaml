apiVersion: v1
kind: Service
metadata:
  name: bug-tracker
  namespace: workspace
spec:
  ports:
    - name: http
      port: 80
      targetPort: 5001
---
apiVersion: v1
kind: Endpoints
metadata:
  name: bug-tracker
  namespace: workspace
subsets:
  - addresses:
      - ip: 172.19.0.1 # Placeholder: dev host (assuming default bridge)
    ports:
      - port: 5001
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: bug-tracker-dev
  namespace: workspace
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`bug.localhost`)
      services:
        - name: bug-tracker
          port: 80
