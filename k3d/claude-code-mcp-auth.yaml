# ═══════════════════════════════════════════════════════════════════
# Claude Code MCP Auth — Keycloak SSO management (SSE transport)
# Auth enforced externally (portforward / Traefik ForwardAuth in prod).
# ═══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-code-mcp-auth
  labels:
    app: claude-code
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claude-code-mcp-auth
  template:
    metadata:
      labels:
        app: claude-code-mcp-auth
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: keycloak
          image: quay.io/sshaaf/keycloak-mcp-server@sha256:12dd5199862055eb38b5f8162cabcc27c1324471b53416389098be263ea14a46
          imagePullPolicy: IfNotPresent
          env:
            - name: KC_URL
              value: "http://keycloak:8080"
            - name: KC_REALM
              value: "master"
            - name: OIDC_CLIENT_ID
              value: "admin-cli"
            # Auth is enforced externally (portforward / Traefik ForwardAuth in prod).
            # Container-level OIDC check bypassed so MCP clients don't need a KC token.
            - name: QUARKUS_HTTP_AUTH_PERMISSION_MCP_POLICY
              value: "permit"
            - name: QUARKUS_KEYCLOAK_ADMIN_CLIENT_USERNAME
              value: admin
            - name: QUARKUS_KEYCLOAK_ADMIN_CLIENT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: QUARKUS_KEYCLOAK_ADMIN_CLIENT_GRANT_TYPE
              value: password
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet: { path: /q/health, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /q/health, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: { memory: 128Mi, cpu: "100m" }
            limits:   { memory: 512Mi, cpu: "500m" }
---
apiVersion: v1
kind: Service
metadata:
  name: claude-code-mcp-auth
  labels:
    app: claude-code
spec:
  selector:
    app: claude-code-mcp-auth
  ports:
    - port: 8080
      targetPort: 8080
