apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-browser
  labels:
    app: mcp-browser
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-browser
  template:
    metadata:
      labels:
        app: mcp-browser
    spec:
      containers:
        - name: mcp-browser
          image: mcr.microsoft.com/playwright:v1.50.1-jammy
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          env:
            - name: NODE_OPTIONS
              value: "--dns-result-order=ipv4first"
          args:
            - |
              npm install -g supergateway @playwright/mcp 2>&1 | tail -3
              # Find Chromium binary installed by the Playwright Docker image
              CHROMIUM=$(find /ms-playwright -name chrome -path '*/chrome-linux/*' 2>/dev/null | head -1)
              echo "Using Chromium: $CHROMIUM"
              exec npx supergateway \
                --stdio "npx @playwright/mcp --headless --executable-path $CHROMIUM" \
                --outputTransport streamableHttp \
                --port 3000 \
                --streamableHttpPath /mcp \
                --healthEndpoint /health
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 45
            periodSeconds: 10
          resources:
            requests:
              memory: 1Gi
              cpu: "500m"
            limits:
              memory: 4Gi
              cpu: "2"
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-browser
spec:
  selector:
    app: mcp-browser
  ports:
    - port: 3000
      targetPort: 3000
