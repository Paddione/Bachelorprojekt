# NOTE: Requires Grafana to be deployed in the monitoring namespace first.
# Deploy this manifest after the monitoring stack is operational.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-grafana
  labels:
    app: mcp-grafana
spec:
  replicas: 0  # Set to 1 when Grafana is deployed
  selector:
    matchLabels:
      app: mcp-grafana
  template:
    metadata:
      labels:
        app: mcp-grafana
    spec:
      containers:
        - name: mcp-grafana
          image: grafana/mcp-grafana:latest
          imagePullPolicy: Always
          env:
            - name: MCP_TRANSPORT
              value: "streamable-http"
            - name: MCP_PORT
              value: "3004"
            - name: GRAFANA_URL
              value: "http://grafana.monitoring.svc.cluster.local:3000"
            - name: GRAFANA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: GRAFANA_API_KEY
          ports:
            - containerPort: 3004
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 128Mi
              cpu: "100m"
            limits:
              memory: 512Mi
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-grafana
spec:
  selector:
    app: mcp-grafana
  ports:
    - port: 3004
      targetPort: 3004
