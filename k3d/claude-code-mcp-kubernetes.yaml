apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-kubernetes
  labels:
    app: mcp-kubernetes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-kubernetes
  template:
    metadata:
      labels:
        app: mcp-kubernetes
    spec:
      serviceAccountName: claude-code-agent
      containers:
        - name: mcp-kubernetes
          image: node:22-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              apk add --no-cache curl
              ARCH=$(uname -m | sed 's/aarch64/arm64/;s/x86_64/x86_64/')
              curl -fsSL "https://github.com/strowk/mcp-k8s-go/releases/latest/download/mcp-k8s-go_Linux_${ARCH}.tar.gz" | tar xz -C /usr/local/bin mcp-k8s-go
              chmod +x /usr/local/bin/mcp-k8s-go
              npm install -g supergateway
              exec npx supergateway \
                --stdio "mcp-k8s-go --readonly" \
                --outputTransport streamableHttp \
                --port 3000 \
                --streamableHttpPath /mcp \
                --healthEndpoint /health
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-kubernetes
spec:
  selector:
    app: mcp-kubernetes
  ports:
    - port: 3000
      targetPort: 3000
