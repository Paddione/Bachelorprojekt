# ═══════════════════════════════════════════════════════════════════
# Claude Code MCP Mattermost — Chat integration via bot token
# ═══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-code-mcp-mattermost
  labels:
    app: claude-code-mcp-mattermost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claude-code-mcp-mattermost
  template:
    metadata:
      labels:
        app: claude-code-mcp-mattermost
    spec:
      containers:
        - name: mattermost
          image: legard/mcp-server-mattermost:latest
          env:
            - name: MCP_TRANSPORT
              value: "http"
            - name: MCP_HOST
              value: "0.0.0.0"
            - name: MCP_PORT
              value: "8000"
            - name: MATTERMOST_URL
              value: "http://mattermost.workspace.svc.cluster.local:8065"
            - name: MATTERMOST_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claude-code-secrets
                  key: MATTERMOST_TOKEN
            - name: MATTERMOST_VERIFY_SSL
              value: "false"
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests: { memory: 64Mi, cpu: 50m }
            limits:   { memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: claude-code-mcp-mattermost
spec:
  selector:
    app: claude-code-mcp-mattermost
  ports:
    - port: 8000
      targetPort: 8000
