# ═══════════════════════════════════════════════════════════════════
# Claude Code MCP Ops Pod — Kubernetes + PostgreSQL MCP servers
# Two containers share one pod to minimize overhead.
# Uses claude-code-agent ServiceAccount (defined in claude-code-rbac.yaml).
# postgres MCP connects to shared-db:5432 — no separate DB.
# ═══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-code-mcp-ops
  labels:
    app: claude-code-mcp-ops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claude-code-mcp-ops
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: claude-code-mcp-ops
    spec:
      serviceAccountName: claude-code-agent
      containers:
        # ─── Kubernetes MCP (port 3000) ──────────────────────────
        - name: mcp-kubernetes
          image: node:22-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              apk add --no-cache curl
              ARCH=$(uname -m | sed 's/aarch64/arm64/;s/x86_64/x86_64/')
              curl -fsSL "https://github.com/strowk/mcp-k8s-go/releases/latest/download/mcp-k8s-go_Linux_${ARCH}.tar.gz" | tar xz -C /usr/local/bin mcp-k8s-go
              chmod +x /usr/local/bin/mcp-k8s-go
              npm install -g supergateway
              exec npx supergateway \
                --stdio "mcp-k8s-go --readonly" \
                --outputTransport streamableHttp \
                --port 3000 \
                --streamableHttpPath /mcp \
                --healthEndpoint /health
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 512Mi
              cpu: 200m
        # ─── PostgreSQL MCP (port 3001) ──────────────────────────
        # Connects to the shared PostgreSQL superuser DB so it can
        # inspect all service databases. Read queries only by convention
        # (enforce via system prompt — no DB-level restriction in dev).
        - name: mcp-postgres
          image: node:22-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              npm install -g supergateway @modelcontextprotocol/server-postgres
              exec supergateway \
                --stdio "npx @modelcontextprotocol/server-postgres postgresql://postgres:$(SHARED_DB_PASSWORD)@shared-db:5432/postgres" \
                --outputTransport streamableHttp \
                --port 3001 \
                --streamableHttpPath /mcp \
                --healthEndpoint /health
          env:
            - name: SHARED_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: SHARED_DB_PASSWORD
          ports:
            - containerPort: 3001
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 60
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 512Mi
              cpu: 200m
        # ─── Meetings PostgreSQL MCP (port 3002) ─────────���──────
        # Dedicated connection to the meetings database.
        # Read-write access for Claude Code to query meeting data,
        # transcripts, insights, and vector embeddings.
        - name: mcp-meetings
          image: node:22-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              npm install -g supergateway @modelcontextprotocol/server-postgres
              exec supergateway \
                --stdio "npx @modelcontextprotocol/server-postgres postgresql://meetings:$(MEETINGS_DB_PASSWORD)@shared-db:5432/meetings" \
                --outputTransport streamableHttp \
                --port 3002 \
                --streamableHttpPath /mcp \
                --healthEndpoint /health
          env:
            - name: MEETINGS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: MEETINGS_DB_PASSWORD
          ports:
            - containerPort: 3002
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 60
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 512Mi
              cpu: 200m
---
apiVersion: v1
kind: Service
metadata:
  name: claude-code-mcp-ops
spec:
  selector:
    app: claude-code-mcp-ops
  ports:
    - name: mcp-kubernetes
      port: 3000
      targetPort: 3000
    - name: mcp-postgres
      port: 3001
      targetPort: 3001
    - name: mcp-meetings
      port: 3002
      targetPort: 3002
