# ═══════════════════════════════════════════════════════════════════
# Claude Code MCP Ops Pod — Kubernetes + PostgreSQL MCP servers
# Two containers share one pod to minimize overhead.
# Uses claude-code-agent ServiceAccount (defined in claude-code-rbac.yaml).
# postgres MCP connects to shared-db:5432 — no separate DB.
# ═══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-code-mcp-ops
  labels:
    app: claude-code-mcp-ops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claude-code-mcp-ops
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: claude-code-mcp-ops
    spec:
      serviceAccountName: claude-code-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        # ─── Kubernetes MCP (port 8080) ──────────────────────────
        # Pre-built image — no runtime GitHub download needed.
        - name: mcp-kubernetes
          image: quay.io/containers/kubernetes_mcp_server@sha256:fae7dae4972a7af5708dc29767ee890adfba6a73a6356ef2933c578ee954882a
          imagePullPolicy: IfNotPresent
          args: ["--port", "8080", "--stateless", "--cluster-provider", "in-cluster"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              memory: 64Mi
              cpu: "50m"
            limits:
              memory: 256Mi
              cpu: "500m"
        # ─── PostgreSQL MCP (port 3001) ──────────────────────────
        # Connects to the shared PostgreSQL superuser DB so it can
        # inspect all service databases. Read queries only by convention
        # (enforce via system prompt — no DB-level restriction in dev).
        - name: mcp-postgres
          image: node:22-alpine
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              npm install -g supergateway @modelcontextprotocol/server-postgres
              exec /tmp/npm-global/bin/supergateway \
                --stdio "/tmp/npm-global/bin/mcp-server-postgres postgresql://postgres:$(SHARED_DB_PASSWORD)@shared-db:5432/postgres" \
                --outputTransport streamableHttp \
                --port 3001 \
                --streamableHttpPath /mcp \
                --healthEndpoint /health
          env:
            - name: SHARED_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: SHARED_DB_PASSWORD
            - name: HOME
              value: /tmp
            - name: NPM_CONFIG_PREFIX
              value: /tmp/npm-global
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 3001
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 60
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            requests:
              memory: 128Mi
              cpu: "100m"
            limits:
              memory: 512Mi
              cpu: "500m"
        # ─── Website PostgreSQL MCP (port 3002) ──────────────────
        # Dedicated connection to the website database.
        # Read-write access for Claude Code to query meeting data,
        # transcripts, and insights.
        - name: mcp-meetings
          image: node:22-alpine
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              npm install -g supergateway @modelcontextprotocol/server-postgres
              exec /tmp/npm-global/bin/supergateway \
                --stdio "/tmp/npm-global/bin/mcp-server-postgres postgresql://website:$(WEBSITE_DB_PASSWORD)@shared-db:5432/website" \
                --outputTransport streamableHttp \
                --port 3002 \
                --streamableHttpPath /mcp \
                --healthEndpoint /health
          env:
            - name: WEBSITE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: WEBSITE_DB_PASSWORD
            - name: HOME
              value: /tmp
            - name: NPM_CONFIG_PREFIX
              value: /tmp/npm-global
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 3002
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 60
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            requests:
              memory: 128Mi
              cpu: "100m"
            limits:
              memory: 512Mi
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: claude-code-mcp-ops
spec:
  selector:
    app: claude-code-mcp-ops
  ports:
    - name: mcp-kubernetes
      port: 8080
      targetPort: 8080
    - name: mcp-postgres
      port: 3001
      targetPort: 3001
    - name: mcp-meetings
      port: 3002
      targetPort: 3002
