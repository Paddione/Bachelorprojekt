# NOTE: Requires Prometheus to be deployed in the monitoring namespace first.
# Deploy this manifest after the monitoring stack is operational.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-prometheus
  labels:
    app: mcp-prometheus
spec:
  replicas: 0  # Set to 1 when Prometheus is deployed
  selector:
    matchLabels:
      app: mcp-prometheus
  template:
    metadata:
      labels:
        app: mcp-prometheus
    spec:
      containers:
        - name: mcp-prometheus
          image: prom/prometheus-mcp-server:latest
          env:
            - name: MCP_TRANSPORT
              value: "streamable-http"
            - name: MCP_PORT
              value: "3003"
            - name: PROMETHEUS_URL
              value: "http://prometheus.monitoring.svc.cluster.local:9090"
          ports:
            - containerPort: 3003
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 128Mi
              cpu: "100m"
            limits:
              memory: 512Mi
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-prometheus
spec:
  selector:
    app: mcp-prometheus
  ports:
    - port: 3003
      targetPort: 3003
