# ═══════════════════════════════════════════════════════════════════
# Claude Code MCP Stripe — Payment management via @stripe/agent-toolkit
# ═══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-code-mcp-stripe
  labels:
    app: claude-code-mcp-stripe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claude-code-mcp-stripe
  template:
    metadata:
      labels:
        app: claude-code-mcp-stripe
    spec:
      containers:
        - name: mcp-stripe
          image: node:20-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              npm install -g supergateway @stripe/agent-toolkit 2>&1 | tail -3
              exec npx supergateway \
                --stdio "npx -y @stripe/agent-toolkit mcp" \
                --outputTransport streamableHttp \
                --port 3003 \
                --streamableHttpPath /mcp \
                --healthEndpoint /health
          env:
            # Optional: deployments without a Stripe account (e.g. mentolder)
            # leave this unset and the MCP server logs but stays up.
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: STRIPE_SECRET_KEY
                  optional: true
          ports:
            - containerPort: 3003
          readinessProbe:
            httpGet: { path: /health, port: 3003 }
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 3003 }
            initialDelaySeconds: 45
            periodSeconds: 30
          resources:
            requests: { memory: 128Mi, cpu: 50m }
            limits:   { memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: claude-code-mcp-stripe
spec:
  selector:
    app: claude-code-mcp-stripe
  ports:
    - port: 3003
      targetPort: 3003
