# ═══════════════════════════════════════════════════════════════════
# Collabora Online — Document editing (WOPI integration with Nextcloud)
# ═══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: collabora
  labels:
    app: collabora
spec:
  replicas: 1
  selector:
    matchLabels:
      app: collabora
  template:
    metadata:
      labels:
        app: collabora
    spec:
      containers:
        - name: collabora
          image: collabora/code:25.04.9.4.1
          env:
            - name: aliasgroup1
              value: "http://nextcloud:80"
            - name: extra_params
              value: "--o:ssl.enable=false --o:ssl.termination=false"
            - name: username
              value: admin
            - name: password
              value: devcollaboraadmin
            - name: dictionaries
              value: "de_DE en_US"
            - name: server_name
              value: "office.localhost"
          ports:
            - containerPort: 9980
          readinessProbe:
            httpGet:
              path: /
              port: 9980
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: 256Mi
              cpu: 200m
            limits:
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: collabora
spec:
  selector:
    app: collabora
  ports:
    - port: 9980
      targetPort: 9980
