# ═══════════════════════════════════════════════════════════════════
# coturn-secrets — SIGNALING_SECRET + TURN_SECRET for the coturn ns
# ═══════════════════════════════════════════════════════════════════
# coturn lives in its own namespace (hostNetwork + privileged PSA)
# and so can't read `workspace/workspace-secrets` directly. Real
# values are synced from there by `task workspace:coturn:sync-secret`
# after the stack is first deployed. Dev deploys start with these dev
# literals so the stack comes up without an extra step.
#
# `argocd.argoproj.io/sync-options: Skip=true` tells ArgoCD to create
# this Secret on first apply but skip it on subsequent syncs. Without
# Skip=true, every reconcile re-applies the stringData literals below
# and Kubernetes server-converts them to `data:`, silently overwriting
# whatever real values the SealedSecret controller (or sync task) had
# written. `ignoreDifferences` cannot prevent this on its own because
# `stringData` is a write-only convenience field — RespectIgnoreDifferences
# can't strip a path that doesn't exist on the live object.
#
# The `sealedsecrets.bitnami.com/managed: "true"` annotation lets the
# SealedSecret controller adopt this ArgoCD-created Secret so the
# prod-env sealed file (environments/sealed-secrets/<env>.yaml) can
# write the real values. Without it the controller refuses updates
# with "already exists and is not managed by SealedSecret" and the
# sealed coturn-secrets block is silently ignored.
apiVersion: v1
kind: Secret
metadata:
  name: coturn-secrets
  namespace: coturn
  annotations:
    argocd.argoproj.io/sync-options: Skip=true
    sealedsecrets.bitnami.com/managed: "true"
type: Opaque
stringData:
  SIGNALING_SECRET: "devsignalingsecret1234567890abcdef"
  TURN_SECRET: "devturnpassword1234"
