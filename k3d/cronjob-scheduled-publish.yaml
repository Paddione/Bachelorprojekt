apiVersion: batch/v1
kind: CronJob
metadata:
  name: scheduled-publish
  namespace: workspace
  labels:
    app: cronjobs
spec:
  schedule: "*/5 * * * *"
  timeZone: "Europe/Berlin"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: publish
              image: curlimages/curl:8.7.1
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 65534
                capabilities:
                  drop: ["ALL"]
              command:
                - sh
                - -c
                - |
                  curl -sf -X GET \
                    -H "Authorization: Bearer $CRON_SECRET" \
                    http://website.website.svc.cluster.local/api/cron/scheduled-publish
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 64Mi
              env:
                - name: CRON_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: workspace-secrets
                      key: CRON_SECRET
