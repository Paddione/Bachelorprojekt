---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: systemtest-outbox
  namespace: ${WEBSITE_NAMESPACE}
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
