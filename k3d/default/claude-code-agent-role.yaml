apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: claude-code-agent-deployments
  namespace: default
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch", "update"]
