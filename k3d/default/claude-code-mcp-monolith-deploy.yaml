    "labels": {
      "app": "claude-code-mcp-monolith"
    },
    "name": "claude-code-mcp-monolith",
    "namespace": "default"
  },
  "spec": {
    "progressDeadlineSeconds": 600,
    "replicas": 1,
    "revisionHistoryLimit": 10,
    "selector": {
      "matchLabels": {
        "app": "claude-code-mcp-monolith"
      }
    },
    "strategy": {
      "rollingUpdate": {
        "maxSurge": "25%",
        "maxUnavailable": "25%"
      },
      "type": "RollingUpdate"
    },
    "template": {
      "metadata": {
        "annotations": {
          "kubectl.kubernetes.io/restartedAt": "2026-07-02T15:38:37+02:00"
        },
        "labels": {
          "app": "claude-code-mcp-monolith"
        }
      },
      "spec": {
        "affinity": {
          "nodeAffinity": {
            "requiredDuringSchedulingIgnoredDuringExecution": {
              "nodeSelectorTerms": [
                {
                  "matchExpressions": [
                    {
                      "key": "node-location",
                      "operator": "In",
                      "values": [
                        "hetzner"
                      ]
                    }
                  ]
                }
              ]
            }
          }
        },
        "containers": [
          {
            "args": [
              "--port",
              "8080",
              "--stateless",
              "--cluster-provider",
              "in-cluster"
            ],
            "image": "quay.io/containers/kubernetes_mcp_server@sha256:ef1ede0fd73ce975de1850b7f19090d0850c4ce3e7d21d795f21de3ee8d1452c",
            "imagePullPolicy": "IfNotPresent",
            "name": "kubernetes",
            "ports": [
              {
                "containerPort": 8080,
                "name": "kubernetes",
                "protocol": "TCP"
              }
            ],
            "readinessProbe": {
              "failureThreshold": 3,
              "initialDelaySeconds": 5,
              "periodSeconds": 10,
              "successThreshold": 1,
              "tcpSocket": {
                "port": 8080
              },
              "timeoutSeconds": 1
            },
            "resources": {
              "limits": {
                "memory": "256Mi"
              },
              "requests": {
                "cpu": "50m",
                "memory": "64Mi"
              }
            },
            "terminationMessagePath": "/dev/termination-log",
            "terminationMessagePolicy": "File"
          },
          {
            "args": [
              "echo \"Installing MCP postgres bridge...\"\nnpm install -g supergateway @modelcontextprotocol/server-postgres 2>&1 | tail -3\necho \"Starting supergateway on :3001/mcp...\"\nexec supergateway \\\n  --stdio \"mcp-server-postgres \\\"$DATABASE_URL\\\"\" \\\n  --outputTransport streamableHttp \\\n  --stateless \\\n  --port 3001 \\\n  --streamableHttpPath /mcp \\\n  --healthEndpoint /health\n"
            ],
            "command": [
              "/bin/sh",
              "-c"
            ],
            "env": [
              {
                "name": "SHARED_DB_PASSWORD",
                "valueFrom": {
                  "secretKeyRef": {
                    "key": "SHARED_DB_PASSWORD",
                    "name": "claude-code-secrets"
                  }
                }
              },
              {
                "name": "DATABASE_URL",
                "value": "postgresql://postgres:$(SHARED_DB_PASSWORD)@shared-db.workspace.svc.cluster.local:5432/website"
              }
            ],
            "image": "node:20-alpine",
            "imagePullPolicy": "Always",
            "name": "postgres",
            "ports": [
              {
                "containerPort": 3001,
                "name": "postgres",
                "protocol": "TCP"
              }
            ],
            "readinessProbe": {
              "failureThreshold": 3,
              "httpGet": {
                "path": "/health",
                "port": 3001,
                "scheme": "HTTP"
              },
              "initialDelaySeconds": 60,
              "periodSeconds": 10,
              "successThreshold": 1,
              "timeoutSeconds": 1
            },
            "resources": {
              "limits": {
                "memory": "2Gi"
              },
              "requests": {
                "cpu": "50m",
                "memory": "256Mi"
              }
            },
            "terminationMessagePath": "/dev/termination-log",
            "terminationMessagePolicy": "File"
          },
          {
            "env": [
              {
                "name": "KC_URL",
                "value": "http://keycloak.workspace.svc.cluster.local:8080"
              },
              {
                "name": "KC_REALM",
                "value": "master"
              },
              {
                "name": "OIDC_CLIENT_ID",
                "value": "admin-cli"
              },
              {
                "name": "QUARKUS_HTTP_PORT",
                "value": "8081"
              },
              {
                "name": "QUARKUS_HTTP_AUTH_PERMISSION_MCP_POLICY",
                "value": "permit"
              },
              {
                "name": "QUARKUS_KEYCLOAK_ADMIN_CLIENT_USERNAME",
                "value": "admin"
              },
              {
                "name": "QUARKUS_KEYCLOAK_ADMIN_CLIENT_PASSWORD",
                "valueFrom": {
                  "secretKeyRef": {
                    "key": "KEYCLOAK_ADMIN_PASSWORD",
                    "name": "claude-code-secrets"
                  }
                }
              },
              {
                "name": "QUARKUS_KEYCLOAK_ADMIN_CLIENT_GRANT_TYPE",
                "value": "PASSWORD"
              }
            ],
            "image": "quay.io/sshaaf/keycloak-mcp-server@sha256:12dd5199862055eb38b5f8162cabcc27c1324471b53416389098be263ea14a46",
            "imagePullPolicy": "IfNotPresent",
            "name": "keycloak",
            "ports": [
              {
                "containerPort": 8081,
                "name": "keycloak",
                "protocol": "TCP"
              }
            ],
            "readinessProbe": {
              "failureThreshold": 3,
              "httpGet": {
                "path": "/q/health",
                "port": 8081,
                "scheme": "HTTP"
              },
              "initialDelaySeconds": 15,
              "periodSeconds": 10,
              "successThreshold": 1,
              "timeoutSeconds": 1
            },
            "resources": {
              "limits": {
                "memory": "512Mi"
              },
              "requests": {
                "cpu": "100m",
                "memory": "256Mi"
              }
            },
            "terminationMessagePath": "/dev/termination-log",
            "terminationMessagePolicy": "File"
          },
          {
            "args": [
              "echo \"Installing MCP playwright bridge...\"\nnpm install -g supergateway @playwright/mcp 2>&1 | tail -3\nCHROME=$(find /ms-playwright -name \"chrome\" -path \"*/chrome-linux/chrome\" ! -path \"*/headless*\" | head -1)\necho \"Starting supergateway on :3000/mcp (chrome: $CHROME)...\"\nexec supergateway \\\n  --stdio \"playwright-mcp --browser chrome --executable-path $CHROME --headless --no-sandbox\" \\\n  --outputTransport streamableHttp \\\n  --stateless \\\n  --port 3000 \\\n  --streamableHttpPath /mcp \\\n  --healthEndpoint /health\n"
            ],
            "command": [
              "/bin/sh",
              "-c"
            ],
            "image": "mcr.microsoft.com/playwright:v1.50.1-jammy",
            "imagePullPolicy": "Always",
            "name": "playwright",
            "ports": [
              {
                "containerPort": 3000,
                "name": "browser",
                "protocol": "TCP"
              }
            ],
            "readinessProbe": {
              "failureThreshold": 3,
              "httpGet": {
                "path": "/health",
                "port": 3000,
                "scheme": "HTTP"
              },
              "initialDelaySeconds": 120,
              "periodSeconds": 10,
              "successThreshold": 1,
              "timeoutSeconds": 1
            },
            "resources": {
              "limits": {
                "cpu": "500m",
                "memory": "4Gi"
              },
              "requests": {
                "cpu": "100m",
                "memory": "512Mi"
              }
            },
            "terminationMessagePath": "/dev/termination-log",
            "terminationMessagePolicy": "File"
          },
          {
            "args": [
              "npm install -g supergateway 2>&1 | tail -3\nexec supergateway \\\n  --stdio \"/github-bin/github-mcp-server stdio\" \\\n  --outputTransport streamableHttp \\\n  --stateless \\\n  --port 3002 \\\n  --streamableHttpPath /mcp \\\n  --healthEndpoint /health\n"
            ],
            "command": [
              "/bin/sh",
              "-c"
            ],
            "env": [
              {
                "name": "GITHUB_PERSONAL_ACCESS_TOKEN",
                "valueFrom": {
                  "secretKeyRef": {
                    "key": "GITHUB_PAT",
                    "name": "claude-code-secrets"
                  }
                }
              }
            ],
            "image": "node:20-alpine",
            "imagePullPolicy": "Always",
            "name": "github",
            "ports": [
              {
                "containerPort": 3002,
                "name": "github",
                "protocol": "TCP"
              }
            ],
            "readinessProbe": {
              "failureThreshold": 3,
              "httpGet": {
                "path": "/health",
                "port": 3002,
                "scheme": "HTTP"
              },
              "initialDelaySeconds": 30,
              "periodSeconds": 10,
              "successThreshold": 1,
              "timeoutSeconds": 1
            },
            "resources": {
              "limits": {
                "memory": "512Mi"
              },
              "requests": {
                "cpu": "50m",
                "memory": "128Mi"
              }
            },
            "terminationMessagePath": "/dev/termination-log",
            "terminationMessagePolicy": "File",
            "volumeMounts": [
              {
                "mountPath": "/github-bin",
                "name": "github-bin"
              }
            ]
          }
        ],
        "dnsPolicy": "ClusterFirst",
        "initContainers": [
          {
            "args": [
              "wget -qO /tmp/github-mcp-server.tar.gz \\\n  https://github.com/github/github-mcp-server/releases/download/v1.0.3/github-mcp-server_Linux_x86_64.tar.gz && \\\ntar -xzf /tmp/github-mcp-server.tar.gz -C /github-bin github-mcp-server && \\\nchmod +x /github-bin/github-mcp-server && \\\necho \"github-mcp-server ready\"\n"
            ],
            "command": [
              "/bin/sh",
              "-c"
            ],
            "image": "alpine:3.21",
            "imagePullPolicy": "IfNotPresent",
            "name": "github-binary",
            "resources": {},
            "terminationMessagePath": "/dev/termination-log",
            "terminationMessagePolicy": "File",
            "volumeMounts": [
              {
                "mountPath": "/github-bin",
                "name": "github-bin"
              }
            ]
          }
        ],
        "restartPolicy": "Always",
        "schedulerName": "default-scheduler",
        "securityContext": {},
        "serviceAccount": "claude-code-agent",
        "serviceAccountName": "claude-code-agent",
        "terminationGracePeriodSeconds": 30,
        "volumes": [
          {
            "emptyDir": {},
            "name": "github-bin"
          }
        ]
      }
    }
  }
}
