# ════════════════════════════════════════════════════════════════════════════
# cert-manager wiring for the self-contained k3d dev edge [T000363].
# Applied OUTSIDE the kustomize bundle (cert-manager CRDs must exist first) by
# the dev:apply cert-manager bootstrap step, with `envsubst '$DEV_DOMAIN'`.
#
# The Certificate is issued into `kube-system` so its secret is co-located with
# the default Traefik TLSStore (traefik-tls.yaml), which makes the websecure
# entrypoint serve this wildcard for every *.dev.mentolder.de host.
# ════════════════════════════════════════════════════════════════════════════
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: noreply-bachelorprojekt@mailbox.org
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - dns01:
          webhook:
            # cert-manager-lego-webhook — installed by the dev:apply bootstrap.
            groupName: lego.dns-solver
            solverName: lego-solver
            config:
              provider: ipv64
              env:
                IPV64_API_KEY:
                  secretKeyRef:
                    name: ipv64-api-key
                    key: IPV64_API_KEY
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: workspace-dev-wildcard-tls
  namespace: kube-system
spec:
  secretName: workspace-dev-wildcard-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "${DEV_DOMAIN}"
    - "*.${DEV_DOMAIN}"
