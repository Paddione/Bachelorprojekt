# ═══════════════════════════════════════════════════════════════════
# OAuth2 Proxy — Pocket ID SSO gate for brainstorm.${DEV_DOMAIN}
#
# Architecture (ForwardAuth mode, NOT full-proxy):
#   browser → Traefik (brainstorm-auth-route, priority 2)
#           → ForwardAuth middleware → oauth2-proxy-brainstorm /oauth2/auth
#           → [202 pass] → sish (routes to the publisher's local companion)
#
# The oauth2-proxy is in ForwardAuth/reverse-proxy mode (--upstream=static://202)
# so actual traffic still flows through the existing sish-catchall; the proxy
# only gates the initial HTTP/WS upgrade request. Traefik passes the WS upgrade
# once auth succeeds — no WebSocket payload is intercepted.
#
# Brainstorm access: Pocket ID has no groups, so the previous
# --allowed-group=/brainstorm-access gate is replaced by
# --authenticated-emails-file (ConfigMap `oauth2-proxy-brainstorm-allowed-emails`).
# Add the brainstorm publishers' emails there.
# ═══════════════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth2-proxy-brainstorm-allowed-emails
  labels:
    app: oauth2-proxy-brainstorm
data:
  # Brainstorm allow-list. Must match users' Pocket ID email addresses.
  # (Was: /brainstorm-access Keycloak group — Pocket ID has no groups.)
  allowed-emails: |
    patrick@korczewski.de
    quamain@web.de
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy-brainstorm
  labels:
    app: oauth2-proxy-brainstorm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy-brainstorm
  template:
    metadata:
      labels:
        app: oauth2-proxy-brainstorm
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: write-cookie-secret
          image: busybox:1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - printf 'cookie_secret = "%s"\n' "$(printf '%s' "$OAUTH2_PROXY_COOKIE_SECRET" | cut -c1-32)" > /run/config/oauth2-extra.cfg
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          env:
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: OAUTH2_PROXY_COOKIE_SECRET
          volumeMounts:
            - name: oauth2-config
              mountPath: /run/config
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.9.0@sha256:37c1570c0427e02fc7c947ef2c04e8995b8347b7abc9fcf1dbb4e376a4b221a7
          imagePullPolicy: Always
          args:
            - --config=/run/config/oauth2-extra.cfg
            - --provider=oidc
            - --client-id=brainstorm
            - --client-secret=$(POCKET_ID_BRAINSTORM_SECRET)
            - --redirect-url=http://brainstorm.localhost/oauth2/callback
            - --oidc-issuer-url=http://pocket-id:1411
            - --ssl-insecure-skip-verify=true
            - --skip-oidc-discovery=true
            - --login-url=http://auth.localhost/authorize
            - --redeem-url=http://pocket-id:1411/api/oidc/token
            - --oidc-jwks-url=http://pocket-id:1411/.well-known/jwks.json
            - --profile-url=http://pocket-id:1411/api/oidc/userinfo
            # ForwardAuth mode: return 202 on success; Traefik passes the real request to sish.
            - --upstream=static://202
            - --reverse-proxy=true
            - --http-address=0.0.0.0:4180
            - --cookie-secure=false
            - --cookie-name=_oauth2_proxy_brainstorm
            - --authenticated-emails-file=/etc/oauth2/allowed-emails
            - --pass-access-token=true
            - --pass-authorization-header=true
            - --set-xauthrequest=true
            - --skip-provider-button=true
            - --code-challenge-method=S256
            - --insecure-oidc-allow-unverified-email=true
            - --oidc-extra-audience=brainstorm
            - --scope=openid email profile
            - --whitelist-domain=brainstorm.localhost
          env:
            - name: POCKET_ID_BRAINSTORM_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: POCKET_ID_BRAINSTORM_SECRET
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 4180
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: 64Mi
              cpu: "50m"
            limits:
              memory: 128Mi
              cpu: "200m"
          volumeMounts:
            - name: oauth2-config
              mountPath: /run/config
              readOnly: true
            - name: allowed-emails
              mountPath: /etc/oauth2
              readOnly: true
      volumes:
        - name: oauth2-config
          emptyDir: {}
        - name: allowed-emails
          configMap:
            name: oauth2-proxy-brainstorm-allowed-emails
            items:
              - key: allowed-emails
                path: allowed-emails
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy-brainstorm
spec:
  selector:
    app: oauth2-proxy-brainstorm
  ports:
    - port: 4180
      targetPort: 4180
---
# ForwardAuth middleware — intercepts every request to brainstorm.${DEV_DOMAIN}
# and checks it against Keycloak; 202 passes, 401 triggers the errors middleware.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: brainstorm-auth
spec:
  forwardAuth:
    address: http://oauth2-proxy-brainstorm.workspace-dev.svc.cluster.local:4180/oauth2/auth
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - X-Auth-Request-Access-Token
---
# Errors middleware — on 401, redirect to oauth2-proxy sign_in (Keycloak login).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: brainstorm-errors
spec:
  errors:
    status:
      - "401"
    service:
      name: oauth2-proxy-brainstorm
      port: 4180
    query: "/oauth2/sign_in?rd={url}"
---
# Brainstorm IngressRoute — higher priority (10) than the sish-catchall (1).
# Splits /oauth2 endpoints (no auth needed) from everything else (ForwardAuth).
# After auth passes, Traefik forwards both HTTP and WS upgrades to sish normally.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: brainstorm-auth-route
spec:
  entryPoints:
    - web
  routes:
    # oauth2-proxy callback / sign_in endpoints — no auth middleware, direct to proxy
    - match: Host(`brainstorm.localhost`) && PathPrefix(`/oauth2`)
      kind: Rule
      priority: 20
      services:
        - name: oauth2-proxy-brainstorm
          port: 4180
    # All other brainstorm traffic — ForwardAuth gated, then sish handles routing
    - match: Host(`brainstorm.localhost`)
      kind: Rule
      priority: 10
      middlewares:
        - name: brainstorm-errors
        - name: brainstorm-auth
      services:
        - name: sish
          port: 80
