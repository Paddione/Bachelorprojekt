# ════════════════════════════════════════════════════════════════════════════
# oauth2-proxy-dev — SSO gate for *.dev.${PROD_DOMAIN}, self-contained k3d edge.
# [T000363] Adapted from prod-mentolder/oauth2-proxy-dev.yaml:
#   - runs as an ordinary in-cluster pod (NO hostNetwork / nodeSelector / hostPort)
#   - upstream loops back to the cluster Traefik `web` entrypoint with Host
#     preserved, so host-based routing reaches website-dev / brett-dev
#     (replaces the old 127.0.0.1:18080 host-port and the dead 10.0.0.20 VIP)
# The /api/(kubernetes|postgres|github|browser) paths are skip-auth'd so local
# CLI MCP clients bypass the browser OIDC dance.
# ════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy-dev
  namespace: workspace-dev
  labels:
    app: oauth2-proxy-dev
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: oauth2-proxy-dev
  template:
    metadata:
      labels:
        app: oauth2-proxy-dev
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: write-oauth2-config
          image: busybox:1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
          command: ["/bin/sh", "-c"]
          # Write both the cookie secret and the OIDC client secret into the
          # config file from mounted Secret env vars, so neither lands as a
          # plaintext literal in the applied manifest. [T000363]
          args:
            - |
              {
                printf 'cookie_secret = "%s"\n' "$(printf '%s' "$DEV_OAUTH2_PROXY_COOKIE_SECRET" | cut -c1-32)"
                printf 'client_secret = "%s"\n' "$DEV_WORKSPACE_OIDC_SECRET"
              } > /run/config/oauth2-extra.cfg
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          env:
            - name: DEV_OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: DEV_OAUTH2_PROXY_COOKIE_SECRET
            - name: DEV_WORKSPACE_OIDC_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: DEV_WORKSPACE_OIDC_SECRET
          volumeMounts:
            - name: oauth2-config
              mountPath: /run/config
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.9.0@sha256:37c1570c0427e02fc7c947ef2c04e8995b8347b7abc9fcf1dbb4e376a4b221a7
          args:
            - --config=/run/config/oauth2-extra.cfg
            - --provider=keycloak-oidc
            - --client-id=workspace-dev
            # client_secret is supplied via the config file written by the
            # write-oauth2-config initContainer (not a plaintext arg). [T000363]
            - --oidc-issuer-url=https://auth.${PROD_DOMAIN}/realms/workspace
            - --redirect-url=https://${DEV_DOMAIN}/oauth2/callback
            # Loop back to the in-cluster Traefik web entrypoint; Host preserved
            # so Traefik routes by host to website-dev / brett-dev.
            - --upstream=http://traefik.kube-system.svc.cluster.local:80
            - --http-address=0.0.0.0:4181
            - --reverse-proxy=true
            - --whitelist-domain=.${DEV_DOMAIN}
            - --whitelist-domain=brainstorm.${PROD_DOMAIN}
            - --cookie-domain=.${DEV_DOMAIN}
            - --cookie-name=_oauth2_dev
            - --cookie-secure=true
            - --email-domain=*
            - --pass-access-token=true
            - --pass-authorization-header=true
            - --set-xauthrequest=true
            - --skip-provider-button=true
            - --code-challenge-method=S256
            - --insecure-oidc-allow-unverified-email=true
            - --scope=openid email profile
            - --keycloak-group=/dev-access
            # Bypass the OIDC gate for local CLI MCP server paths so token-auth
            # MCP clients reach the k3d cluster. The real control is ForwardAuth.
            - --skip-auth-route=^/(kubernetes|postgres|github|browser)(/|$)
          ports:
            - containerPort: 4181
              name: http
          readinessProbe:
            httpGet:
              path: /ping
              port: 4181
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 4181
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: 64Mi
              cpu: "50m"
            limits:
              memory: 128Mi
              cpu: "200m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: oauth2-config
              mountPath: /run/config
              readOnly: true
      volumes:
        - name: oauth2-config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy-dev
  namespace: workspace-dev
spec:
  selector:
    app: oauth2-proxy-dev
  ports:
    - name: http
      port: 4181
      targetPort: 4181
