# ════════════════════════════════════════════════════════════════════
# sish — reverse-SSH tunnel broker for ad-hoc <name>.dev.${PROD_DOMAIN}
# tunnels. Listens on :2222 (SSH) and :80 (HTTP routing).
# authorized_keys is materialised at deploy time from
# environments/.secrets/mentolder.yaml → DEV_SISH_AUTHORIZED_KEYS
# (see task dev:_materialise-secrets in Taskfile.dev-stack.yml).
# ════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: sish-authorized-keys
data:
  authorized_keys: |
    # placeholder — overwritten by `task dev:deploy` from the unsealed
    # value of DEV_SISH_AUTHORIZED_KEYS at apply time.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sish
  labels:
    app: sish
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sish
  template:
    metadata:
      labels:
        app: sish
    spec:
      containers:
        - name: sish
          image: antoniomika/sish:latest
          args:
            - --domain=${DEV_DOMAIN}
            - --ssh-address=:2222
            - --http-address=:80
            - --authentication=true
            - --authentication-keys-directory=/keys
            - --bind-random-subdomains=false
            - --bind-random-ports=false
            - --force-requested-subdomains=true
            - --idle-connection-timeout=24h
            - --service-console=false
            - --tcp-aliases=false
            - --bind-hosts=*.${DEV_DOMAIN}
          ports:
            - containerPort: 2222
              name: ssh
            - containerPort: 80
              name: http
          volumeMounts:
            - name: keys
              mountPath: /keys
              readOnly: true
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 500m
      volumes:
        - name: keys
          configMap:
            name: sish-authorized-keys
            items:
              - key: authorized_keys
                path: authorized_keys
---
apiVersion: v1
kind: Service
metadata:
  name: sish
spec:
  type: NodePort
  selector:
    app: sish
  ports:
    - name: ssh
      port: 2222
      targetPort: 2222
      nodePort: 32222
    - name: http
      port: 80
      targetPort: 80
