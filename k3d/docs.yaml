apiVersion: apps/v1
kind: Deployment
metadata:
  name: docs
  labels:
    app: docs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docs
  template:
    metadata:
      labels:
        app: docs
    spec:
      initContainers:
        # Clone docs from GitHub and merge with docsify index.html
        - name: git-sync
          image: alpine/git:v2.43.0
          command:
            - sh
            - -c
            - |
              git clone --depth 1 --single-branch --branch main \
                https://github.com/Paddione/Bachelorprojekt.git /tmp/repo && \
              cp -r /tmp/repo/docs/* /site/ && \
              cp /docsify/index.html /site/index.html
          volumeMounts:
            - name: docs-content
              mountPath: /site
            - name: docsify-index
              mountPath: /docsify
              readOnly: true
      containers:
        - name: docs
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: 16Mi
              cpu: 10m
            limits:
              memory: 64Mi
              cpu: 100m
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 10
          volumeMounts:
            - name: docs-content
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: docs-content
          emptyDir: {}
        - name: docsify-index
          configMap:
            name: docsify-index
---
apiVersion: v1
kind: Service
metadata:
  name: docs
spec:
  selector:
    app: docs
  ports:
    - port: 80
      targetPort: 80
