apiVersion: apps/v1
kind: Deployment
metadata:
  name: docs
  labels:
    app: docs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docs
  template:
    metadata:
      labels:
        app: docs
    spec:
      containers:
        - name: docs
          image: joseluisq/static-web-server:2.36-alpine
          imagePullPolicy: Always
          ports:
            - containerPort: 8787
          env:
            - name: SERVER_ROOT
              value: /public
            - name: SERVER_PORT
              value: "8787"
            - name: SERVER_CACHE_CONTROL_HEADERS
              value: "false"
          resources:
            requests:
              memory: 32Mi
              cpu: "50m"
            limits:
              memory: 128Mi
              cpu: "200m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          readinessProbe:
            httpGet:
              path: /
              port: 8787
            initialDelaySeconds: 2
            periodSeconds: 10
          volumeMounts:
            - name: docs-content
              mountPath: /public
              readOnly: true
      volumes:
        - name: docs-content
          configMap:
            name: docs-content
---
apiVersion: v1
kind: Service
metadata:
  name: docs
spec:
  selector:
    app: docs
  ports:
    - port: 80
      targetPort: 8787
