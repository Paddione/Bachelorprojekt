# ═══════════════════════════════════════════════════════════════════
# DocuSeal — self-hosted e-signature platform
# Web UI + API at sign.localhost; database on shared PostgreSQL
# ═══════════════════════════════════════════════════════════════════
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: docuseal-data-pvc
spec:
  storageClassName: local-path
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docuseal
  labels:
    app: docuseal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docuseal
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: docuseal
    spec:
      securityContext:
        runAsNonRoot: false
        fsGroup: 1000
      containers:
        - name: docuseal
          image: docuseal/docuseal:1.9.6
          imagePullPolicy: IfNotPresent
          env:
            - name: DOCUSEAL_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: DOCUSEAL_DB_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://docuseal:$(DOCUSEAL_DB_PASSWORD)@shared-db:5432/docuseal"
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: DOCUSEAL_SECRET_KEY_BASE
            - name: DOCUSEAL_URL
              value: "http://sign.localhost"
            - name: SIGN_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: domain-config
                  key: SIGN_DOMAIN
            - name: SMTP_ADDRESS
              value: "mailpit"
            - name: SMTP_PORT
              value: "1025"
            - name: SMTP_DOMAIN
              value: "sign.localhost"
            - name: SMTP_USERNAME
              value: ""
            - name: SMTP_PASSWORD
              value: ""
            - name: SMTP_AUTH_METHOD
              value: "none"
            - name: SMTP_ENABLE_STARTTLS_AUTO
              value: "false"
            - name: MAILER_FROM_EMAIL
              value: "sign@workspace.local"
            - name: MAILER_FROM_NAME
              value: "Unterschriften"
            - name: RAILS_SERVE_STATIC_FILES
              value: "true"
            - name: FORCE_SSL
              value: "false"
            - name: TZ
              value: Europe/Berlin
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: 256Mi
              cpu: "100m"
            limits:
              memory: 1Gi
              cpu: "500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: docuseal-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: docuseal
spec:
  selector:
    app: docuseal
  ports:
    - port: 3000
      targetPort: 3000
