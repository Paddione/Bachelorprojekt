apiVersion: apps/v1
kind: Deployment
metadata:
  name: einvoice-sidecar
  namespace: workspace
  labels:
    app: einvoice-sidecar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: einvoice-sidecar
  template:
    metadata:
      labels:
        app: einvoice-sidecar
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: sidecar
          image: einvoice-sidecar:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: einvoice-sidecar
  namespace: workspace
spec:
  type: ClusterIP
  selector:
    app: einvoice-sidecar
  ports:
    - name: http
      port: 80
      targetPort: 8080
