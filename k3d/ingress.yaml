apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homeoffice-ingress
spec:
  ingressClassName: nginx
  rules:
    # ── Keycloak (SSO) ──────────────────────────────────────────────
    - host: auth.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080

    # ── Mattermost (Chat) ───────────────────────────────────────────
    - host: chat.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mattermost
                port:
                  number: 8065

    # ── Nextcloud (Dateien) ──────────────────────────────────────────
    - host: files.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nextcloud
                port:
                  number: 80

    # ── Collabora Online (Dokumentenbearbeitung) ───────────────────
    - host: office.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: collabora
                port:
                  number: 9980

    # ── Spacedeck (Whiteboard) ──────────────────────────────────────
    - host: board.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spacedeck
                port:
                  number: 9666


    # ── Talk HPB Signaling ───────────────────────────────────────────
    - host: signaling.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spreed-signaling
                port:
                  number: 8080

    # ── Mailpit (Dev SMTP Web-UI) ──────────────────────────────────
    - host: mail.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mailpit
                port:
                  number: 8025

    # ── Docs (GitBook / Docsify) ──────────────────────────────────
    - host: docs.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: docs
                port:
                  number: 80

    # ── Invoice Ninja (Buchhaltung, via OAuth2-Proxy SSO) ─────────
    - host: billing.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: oauth2-proxy-invoiceninja
                port:
                  number: 4180
