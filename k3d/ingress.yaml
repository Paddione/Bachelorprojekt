# ─── Workspace Dev-Ingress ──────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: workspace-ingress
spec:
  rules:
    - host: auth.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080

    # Mattermost (chat.*) lives in its own Ingress (mattermost-force-sso.yaml)
    # so the force-SSO redirect middleware can be scoped to just that host.

    # ── Nextcloud (Dateien) ──────────────────────────────────────────
    - host: files.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nextcloud
                port:
                  number: 80
    - host: board.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: whiteboard
                port:
                  number: 3002
    - host: meet.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spreed-signaling
                port:
                  number: 8080
    - host: signaling.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spreed-signaling
                port:
                  number: 8080
    - host: billing.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: oauth2-proxy-invoiceninja
                port:
                  number: 4180
    - host: vault.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vaultwarden
                port:
                  number: 80
---
# ─── Interne Tools — BasicAuth (Mailpit, Docs, MCP-Status) ───────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: workspace-ingress-internal
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: "workspace-basic-auth-internal@kubernetescrd"
spec:
  rules:
    - host: mail.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mailpit
                port:
                  number: 8025
    - host: docs.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: docs
                port:
                  number: 80
    - host: ai.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mcp-status
                port:
                  number: 80
