apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: workspace-ingress
spec:
  rules:
    # ── Keycloak (SSO) ──────────────────────────────────────────────
    - host: auth.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080

    # ── Mattermost (Chat) ───────────────────────────────────────────
    - host: chat.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mattermost
                port:
                  number: 8065

    # ── Nextcloud (Dateien) ──────────────────────────────────────────
    - host: files.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nextcloud
                port:
                  number: 80

    # NB: office.localhost lives in the k3d/office-stack Ingress
    # (namespace workspace-office) because Collabora runs in its own
    # privileged namespace — Ingress backends must be same-namespace.

    # ── Nextcloud Whiteboard (collaboration server) ─────────────────
    - host: board.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: whiteboard
                port:
                  number: 3002


    # ── Nextcloud Talk HPB Signaling ────────────────────────────────
    - host: meet.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spreed-signaling
                port:
                  number: 8080

    - host: signaling.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spreed-signaling
                port:
                  number: 8080

    # ── Mailpit (Dev SMTP Web-UI) ──────────────────────────────────
    - host: mail.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mailpit
                port:
                  number: 8025

    # ── Docs (GitBook / Docsify) ──────────────────────────────────
    - host: docs.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: docs
                port:
                  number: 80

    # ── Invoice Ninja (Buchhaltung, via OAuth2-Proxy SSO) ─────────
    - host: billing.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: oauth2-proxy-invoiceninja
                port:
                  number: 4180

    # ── Vaultwarden (Passwortmanager) ────────────────────────────
    - host: vault.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vaultwarden
                port:
                  number: 80

    # ── MCP Status (replaces Claude Code WebUI) ────────────────────
    - host: ai.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mcp-status
                port:
                  number: 80
