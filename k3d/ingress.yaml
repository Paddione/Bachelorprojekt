apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: workspace-ingress
spec:
  rules:
    # ── Keycloak (SSO) ──────────────────────────────────────────────
    - host: auth.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080

    # Mattermost (chat.*) lives in its own Ingress (mattermost-force-sso.yaml)
    # so the force-SSO redirect middleware can be scoped to just that host.

    # ── Nextcloud (Dateien) ──────────────────────────────────────────
    - host: files.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nextcloud
                port:
                  number: 80

    # ── Collabora Online (Dokumentenbearbeitung) ───────────────────
    - host: office.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: collabora
                port:
                  number: 9980

    # ── Nextcloud Whiteboard (collaboration server) ─────────────────
    - host: board.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: whiteboard
                port:
                  number: 3002


    # ── Nextcloud Talk HPB Signaling ────────────────────────────────
    - host: meet.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spreed-signaling
                port:
                  number: 8080

    - host: signaling.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spreed-signaling
                port:
                  number: 8080

    # ── Mailpit (Dev SMTP Web-UI) ──────────────────────────────────
    - host: mail.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mailpit
                port:
                  number: 8025

    # ── Docs (GitBook / Docsify) ──────────────────────────────────
    - host: docs.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: docs
                port:
                  number: 80

    # ── Invoice Ninja (Buchhaltung, via OAuth2-Proxy SSO) ─────────
    - host: billing.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: oauth2-proxy-invoiceninja
                port:
                  number: 4180

    # ── Vaultwarden (Passwortmanager) ────────────────────────────
    - host: vault.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vaultwarden
                port:
                  number: 80

    # ── MCP Status (replaces Claude Code WebUI) ────────────────────
    - host: ai.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mcp-status
                port:
                  number: 80
