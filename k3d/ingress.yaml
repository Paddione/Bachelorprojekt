apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homeoffice-ingress
spec:
  ingressClassName: traefik
  rules:
    # ── Keycloak (SSO) ──────────────────────────────────────────────
    - host: auth.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080

    # ── Mattermost (Chat) ───────────────────────────────────────────
    - host: chat.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mattermost
                port:
                  number: 8065

    # ── Nextcloud (Dateien) ──────────────────────────────────────────
    - host: files.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nextcloud
                port:
                  number: 80

    # ── Collabora Online (Dokumentenbearbeitung) ───────────────────
    - host: office.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: collabora
                port:
                  number: 9980

    # ── Talk HPB Signaling ───────────────────────────────────────────
    - host: signaling.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spreed-signaling
                port:
                  number: 8080
