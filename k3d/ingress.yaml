# ─── Workspace Dev-Ingress ──────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: workspace-ingress
spec:
  rules:
    - host: auth.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080

    # ── Nextcloud (Dateien) ──────────────────────────────────────────
    - host: files.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nextcloud
                port:
                  number: 80
    - host: board.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: whiteboard
                port:
                  number: 3002
    - host: meet.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spreed-signaling
                port:
                  number: 8080
    - host: signaling.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spreed-signaling
                port:
                  number: 8080
    - host: vault.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vaultwarden
                port:
                  number: 80
    - host: sign.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: docuseal
                port:
                  number: 3000
---
# ─── Interne Tools (Docs, Brett — oauth2-proxy-protected) ────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: workspace-ingress-internal
spec:
  rules:
    - host: docs.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: oauth2-proxy-docs
                port:
                  number: 4180
    - host: brett.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: oauth2-proxy-brett
                port:
                  number: 4180
