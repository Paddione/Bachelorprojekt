# ═══════════════════════════════════════════════════════════════════
# Invoice Ninja — self-hosted invoicing & accounting
# Uses own MariaDB instance (Invoice Ninja requires MySQL/MariaDB)
# ═══════════════════════════════════════════════════════════════════
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: invoiceninja-data-pvc
spec:
  storageClassName: local-path
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: invoiceninja-mariadb-pvc
spec:
  storageClassName: local-path
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
# ── MariaDB for Invoice Ninja ──────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: invoiceninja-mariadb
  labels:
    app: invoiceninja-mariadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: invoiceninja-mariadb
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: invoiceninja-mariadb
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: mariadb
          image: mariadb:11.4-noble
          imagePullPolicy: Always
          env:
            - name: MARIADB_DATABASE
              value: invoiceninja
            - name: MARIADB_USER
              value: invoiceninja
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: INVOICENINJA_DB_PASSWORD
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: INVOICENINJA_DB_PASSWORD
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command: ["healthcheck.sh", "--connect", "--innodb_initialized"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["healthcheck.sh", "--connect", "--innodb_initialized"]
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: 256Mi
              cpu: "200m"
            limits:
              memory: 1Gi
              cpu: "1"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: invoiceninja-mariadb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: invoiceninja-mariadb
spec:
  selector:
    app: invoiceninja-mariadb
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: invoiceninja
  labels:
    app: invoiceninja
spec:
  replicas: 1
  selector:
    matchLabels:
      app: invoiceninja
  template:
    metadata:
      labels:
        app: invoiceninja
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      initContainers:
        # Copy public assets from backup into the shared emptyDir volume.
        # The image bakes files into /var/www/app/public at build time, but
        # the emptyDir mount overlays that path with an empty directory.
        - name: copy-public-assets
          image: invoiceninja/invoiceninja:5
          imagePullPolicy: Always
          command: ["sh", "-c", "cp -a /var/www/app/docker-backup-public/* /var/www/app/public/"]
          volumeMounts:
            - name: public
              mountPath: /var/www/app/public
      containers:
        - name: invoiceninja
          image: invoiceninja/invoiceninja:5
          imagePullPolicy: Always
          env:
            # ── App Settings ──────────────────────────────────
            - name: APP_URL
              value: "http://billing.localhost"
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: INVOICENINJA_APP_KEY
            - name: APP_ENV
              value: "production"
            - name: APP_DEBUG
              value: "false"
            - name: REQUIRE_HTTPS
              value: "false"
            # ── Database (MariaDB, Invoice Ninja requires MySQL) ─
            - name: DB_TYPE
              value: "mysql"
            - name: DB_HOST
              value: "invoiceninja-mariadb"
            - name: DB_PORT
              value: "3306"
            - name: DB_DATABASE
              value: "invoiceninja"
            - name: DB_USERNAME
              value: "invoiceninja"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: INVOICENINJA_DB_PASSWORD
            # ── Mail (Mailpit for dev) ────────────────────────
            - name: MAIL_MAILER
              value: "smtp"
            - name: MAIL_HOST
              value: "mailpit"
            - name: MAIL_PORT
              value: "1025"
            - name: MAIL_FROM_ADDRESS
              value: "billing@workspace.local"
            - name: MAIL_FROM_NAME
              value: "Workspace Billing"
            - name: MAIL_ENCRYPTION
              value: ""
            # ── Misc ──────────────────────────────────────────
            - name: IN_USER_EMAIL
              value: "admin@workspace.local"
            - name: IN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: INVOICENINJA_ADMIN_PASSWORD
            - name: TZ
              value: Europe/Berlin
          ports:
            - containerPort: 9000
          volumeMounts:
            - name: public
              mountPath: /var/www/app/public
            - name: data
              mountPath: /var/www/app/storage
          resources:
            requests:
              memory: 512Mi
              cpu: "500m"
            limits:
              memory: 1Gi
              cpu: "2"
        # Nginx sidecar — serves static files and proxies PHP to FPM
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          volumeMounts:
            - name: public
              mountPath: /var/www/app/public
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: 64Mi
              cpu: "100m"
            limits:
              memory: 256Mi
              cpu: "500m"
      volumes:
        - name: public
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: invoiceninja-nginx-config
        - name: data
          persistentVolumeClaim:
            claimName: invoiceninja-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: invoiceninja
spec:
  selector:
    app: invoiceninja
  ports:
    - port: 80
      targetPort: 80
