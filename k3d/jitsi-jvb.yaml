apiVersion: apps/v1
kind: Deployment
metadata:
  name: jvb
  labels:
    app: jvb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jvb
  template:
    metadata:
      labels:
        app: jvb
    spec:
      containers:
        - name: jvb
          image: jitsi/jvb:stable-9111
          env:
            - name: XMPP_SERVER
              value: prosody
            - name: XMPP_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: domain-config
                  key: JITSI_DOMAIN
            - name: XMPP_AUTH_DOMAIN
              value: "auth.meet.meet.localhost"
            - name: XMPP_INTERNAL_MUC_DOMAIN
              value: "internal-muc.meet.meet.localhost"
            - name: JVB_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homeoffice-secrets
                  key: JVB_AUTH_PASSWORD
            # Dev: JVB_ADVERTISE_IPS wird nicht gesetzt — JVB funktioniert
            # über TCP-Fallback im k3d Cluster. Für echte UDP-Mediendaten
            # müsste der Port 10000/UDP durch k3d gemappt werden.
            - name: JVB_PORT
              value: "10000"
            - name: TZ
              value: Europe/Berlin
          ports:
            - containerPort: 10000
              protocol: UDP
            - containerPort: 8080
              name: http
          resources:
            requests:
              memory: 256Mi
              cpu: 200m
            limits:
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: jvb
spec:
  selector:
    app: jvb
  ports:
    - name: media
      port: 10000
      targetPort: 10000
      protocol: UDP
    - name: http
      port: 8080
      targetPort: 8080
