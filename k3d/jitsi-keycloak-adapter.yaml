apiVersion: apps/v1
kind: Deployment
metadata:
  name: jitsi-keycloak-adapter
  labels:
    app: jitsi-keycloak-adapter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jitsi-keycloak-adapter
  template:
    metadata:
      labels:
        app: jitsi-keycloak-adapter
    spec:
      containers:
        - name: adapter
          image: ghcr.io/nordeck/jitsi-keycloak-adapter-v2:v20260328
          env:
            - name: KC_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: domain-config
                  key: KC_DOMAIN
            # Browser-seitige Keycloak-URL (extern)
            - name: KEYCLOAK_ORIGIN
              value: "http://$(KC_DOMAIN)"
            # Server-seitige Keycloak-URL (intern)
            - name: KEYCLOAK_ORIGIN_INTERNAL
              value: "http://keycloak:8080"
            - name: KEYCLOAK_REALM
              value: homeoffice
            - name: KEYCLOAK_CLIENT_ID
              value: jitsi
            - name: JWT_APP_ID
              value: jitsi
            - name: JWT_APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: homeoffice-secrets
                  key: JITSI_JWT_SECRET
            # DEV ONLY — must be "false" in production (enables TLS cert validation)
            - name: ALLOW_UNSECURE_CERT
              value: "true"
          ports:
            - containerPort: 9000
          volumeMounts:
            - name: adapter-code
              mountPath: /app/adapter.ts
              subPath: adapter.ts
              readOnly: true
          readinessProbe:
            httpGet:
              path: /oidc/health
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
      volumes:
        - name: adapter-code
          configMap:
            name: jitsi-adapter-code
---
apiVersion: v1
kind: Service
metadata:
  name: jitsi-keycloak-adapter
spec:
  selector:
    app: jitsi-keycloak-adapter
  ports:
    - port: 9000
      targetPort: 9000
