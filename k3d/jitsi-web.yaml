apiVersion: apps/v1
kind: Deployment
metadata:
  name: jitsi-web
  labels:
    app: jitsi-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jitsi-web
  template:
    metadata:
      labels:
        app: jitsi-web
    spec:
      containers:
        - name: web
          image: jitsi/web:stable-9111
          env:
            - name: JITSI_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: domain-config
                  key: JITSI_DOMAIN
            - name: JITSI_XMPP_SUFFIX
              valueFrom:
                configMapKeyRef:
                  name: domain-config
                  key: JITSI_XMPP_SUFFIX
            - name: PUBLIC_URL
              value: "http://$(JITSI_DOMAIN)"
            - name: XMPP_DOMAIN
              value: "$(JITSI_DOMAIN)"
            - name: XMPP_AUTH_DOMAIN
              value: "auth.meet.$(JITSI_XMPP_SUFFIX)"
            - name: XMPP_BOSH_URL_BASE
              value: "http://prosody:5280"
            - name: XMPP_MUC_DOMAIN
              value: "muc.meet.$(JITSI_XMPP_SUFFIX)"
            - name: ENABLE_AUTH
              value: "1"
            - name: AUTH_TYPE
              value: jwt
            - name: JWT_APP_ID
              value: jitsi
            - name: JWT_APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: homeoffice-secrets
                  key: JITSI_JWT_SECRET
            - name: JWT_ACCEPTED_ISSUERS
              value: jitsi
            - name: JWT_ACCEPTED_AUDIENCES
              value: jitsi
            # TOKEN_AUTH_URL: Leitet nicht-authentifizierte Nutzer zum OIDC-Adapter
            - name: TOKEN_AUTH_URL
              value: "http://$(JITSI_DOMAIN)/oidc/auth?state={state}"
            - name: ENABLE_GUESTS
              value: "1"
            - name: ENABLE_AUTO_LOGIN
              value: "0"
            - name: TZ
              value: Europe/Berlin
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: jitsi-web
spec:
  selector:
    app: jitsi-web
  ports:
    - port: 80
      targetPort: 80
