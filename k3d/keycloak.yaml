apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  labels:
    app: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.6
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          command: ["/opt/keycloak/realm-template/import-entrypoint.sh"]
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: "jdbc:postgresql://keycloak-db:5432/keycloak?sslmode=prefer"
            - name: KC_DB_USERNAME
              value: keycloak
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: KEYCLOAK_DB_PASSWORD
            - name: KC_HOSTNAME
              value: "http://auth.localhost"
            - name: KC_HOSTNAME_BACKCHANNEL_DYNAMIC
              value: "true"
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_PROXY_HEADERS
              value: xforwarded
            - name: KEYCLOAK_ADMIN
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
            # Realm-Import: Variablen werden von import-entrypoint.sh substituiert
            - name: NEXTCLOUD_OIDC_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: NEXTCLOUD_OIDC_SECRET
            - name: NC_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: domain-config
                  key: NC_DOMAIN
            - name: WEBSITE_OIDC_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: WEBSITE_OIDC_SECRET
            - name: WEB_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: domain-config
                  key: WEB_DOMAIN
            - name: VAULTWARDEN_OIDC_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: VAULTWARDEN_OIDC_SECRET
            - name: VAULT_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: domain-config
                  key: VAULT_DOMAIN
            - name: CLAUDE_CODE_OIDC_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: CLAUDE_CODE_OIDC_SECRET
            - name: DOCS_OIDC_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: DOCS_OIDC_SECRET
            - name: DOCS_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: domain-config
                  key: DOCS_DOMAIN
            - name: TRAEFIK_OIDC_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: TRAEFIK_OIDC_SECRET
            - name: TRAEFIK_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: domain-config
                  key: TRAEFIK_DOMAIN
            - name: TZ
              value: Europe/Berlin
          ports:
            - name: http
              containerPort: 8080
            - name: management
              containerPort: 9000
          volumeMounts:
            - name: import-script
              mountPath: /opt/keycloak/realm-template/import-entrypoint.sh
              subPath: import-entrypoint.sh
              readOnly: true
            - name: realm-template
              mountPath: /opt/keycloak/realm-template/realm-workspace.json
              subPath: realm-workspace.json
              readOnly: true
          readinessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: 1Gi
              cpu: "500m"
            limits:
              memory: 2Gi
              cpu: "2"
      volumes:
        - name: import-script
          configMap:
            name: keycloak-import-script
            defaultMode: 0755
        - name: realm-template
          configMap:
            name: realm-template
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
spec:
  selector:
    app: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: 8080
