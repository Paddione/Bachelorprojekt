# ── CronJob: full reindex — all sources (weekly Sunday 04:00 UTC) ─
apiVersion: batch/v1
kind: CronJob
metadata:
  name: knowledge-reindex-all
  namespace: workspace
  labels:
    app: knowledge-reindex-all
spec:
  schedule: "0 4 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: In
                        values: [gekko-hetzner-2, gekko-hetzner-3, gekko-hetzner-4, pk-hetzner, pk-hetzner-2, pk-hetzner-3]
          initContainers:
            - name: npm-install
              image: node:22-alpine
              imagePullPolicy: IfNotPresent
              command: [sh, -c, "cd /scripts && npm install pg --no-package-lock --silent"]
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                - name: node-modules
                  mountPath: /scripts/node_modules
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  memory: 256Mi
          containers:
            - name: ingest
              image: node:22-alpine
              imagePullPolicy: IfNotPresent
              command:
                - sh
                - -c
                - |
                  node /scripts/ingest-prs.mjs && node /scripts/ingest-markdown.mjs || true && node /scripts/ingest-bug-tickets.mjs
              env:
                - name: PGHOST
                  value: "shared-db"
                - name: PGDATABASE
                  value: "website"
                - name: PGUSER
                  value: "website"
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: workspace-secrets
                      key: WEBSITE_DB_PASSWORD
                - name: VOYAGE_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: knowledge-secrets
                      key: VOYAGE_API_KEY
                - name: BRAND
                  value: "mentolder"
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
                - name: node-modules
                  mountPath: /scripts/node_modules
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 1Gi
          volumes:
            - name: scripts
              configMap:
                name: knowledge-scripts
            - name: node-modules
              emptyDir: {}
