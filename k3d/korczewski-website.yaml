# ── Namespace ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: korczewski-website
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
---
# ── ConfigMap ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: korczewski-website-config
  namespace: korczewski-website
data:
  BRAND: "korczewski"
  SITE_URL: "https://web.korczewski.de"
  MATTERMOST_URL: "http://mattermost.workspace.svc.cluster.local:8065"
  MATTERMOST_WEBHOOK_URL: ""
  MATTERMOST_BOT_TOKEN: ""
  BUG_REPORT_CHANNEL: "bugs"
  SMTP_HOST: "mailpit.workspace.svc.cluster.local"
  SMTP_PORT: "1025"
  SMTP_SECURE: "false"
  SMTP_USER: ""
  SMTP_PASS: ""
  FROM_EMAIL: "info@korczewski.de"
  FROM_NAME: "Patrick Korczewski"
  KEYCLOAK_URL: "https://auth.korczewski.de"
  KEYCLOAK_REALM: "workspace"
  KEYCLOAK_CLIENT_ID: "website"
  KEYCLOAK_CLIENT_SECRET: ""
  CALDAV_URL: ""
  CALDAV_USER: ""
  CALDAV_PASS: ""
  INVOICENINJA_URL: "http://invoiceninja.workspace.svc.cluster.local"
  INVOICENINJA_TOKEN: ""
  OUTLINE_URL: "https://wiki.korczewski.de"
  WHISPER_URL: "http://faster-whisper.workspace.svc.cluster.local:8000"
---
# ── Deployment ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: korczewski-website
  namespace: korczewski-website
spec:
  replicas: 1
  selector:
    matchLabels:
      app: korczewski-website
  template:
    metadata:
      labels:
        app: korczewski-website
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: korczewski-website
          image: ghcr.io/paddione/workspace-website:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: korczewski-website-config
          ports:
            - containerPort: 4321
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /
              port: 4321
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 4321
            initialDelaySeconds: 3
            periodSeconds: 10
---
# ── Service ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: korczewski-website
  namespace: korczewski-website
spec:
  selector:
    app: korczewski-website
  ports:
    - port: 80
      targetPort: 4321
---
# ── IngressRoute (dev - HTTP) ───────────────────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: korczewski-website
  namespace: korczewski-website
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`pk.localhost`)
      services:
        - name: korczewski-website
          port: 80
