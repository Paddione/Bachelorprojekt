# ── Namespace ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: korczewski-website
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
---
# ── ConfigMap ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: korczewski-website-config
  namespace: korczewski-website
data:
  MATTERMOST_WEBHOOK_URL: ""
  BRAND_NAME: "${BRAND_NAME}"
  CONTACT_NAME: "${CONTACT_NAME}"
  CONTACT_EMAIL: "${CONTACT_EMAIL}"
  CONTACT_PHONE: "${CONTACT_PHONE}"
  CONTACT_CITY: "${CONTACT_CITY}"
  LEGAL_STREET: "${LEGAL_STREET}"
  LEGAL_ZIP: "${LEGAL_ZIP}"
  LEGAL_JOBTITLE: "${LEGAL_JOBTITLE}"
  LEGAL_CHAMBER: "${LEGAL_CHAMBER}"
  LEGAL_UST_ID: "${LEGAL_UST_ID}"
  LEGAL_WEBSITE: "${LEGAL_WEBSITE}"
  SITE_URL: "http://pk.localhost"
---
# ── Deployment ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: korczewski-website
  namespace: korczewski-website
spec:
  replicas: 1
  selector:
    matchLabels:
      app: korczewski-website
  template:
    metadata:
      labels:
        app: korczewski-website
    spec:
      containers:
        - name: korczewski-website
          image: korczewski-website:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: korczewski-website-config
          ports:
            - containerPort: 4321
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 4321
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 4321
            initialDelaySeconds: 3
            periodSeconds: 10
---
# ── Service ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: korczewski-website
  namespace: korczewski-website
spec:
  selector:
    app: korczewski-website
  ports:
    - port: 80
      targetPort: 4321
---
# ── IngressRoute (dev - HTTP) ───────────────────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: korczewski-website
  namespace: korczewski-website
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`pk.localhost`)
      services:
        - name: korczewski-website
          port: 80
