apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: workspace

resources:
  - namespace.yaml
  - configmap-domains.yaml
  - secrets.yaml
  # Shared database (one PostgreSQL, one DB per service)
  - shared-db.yaml
  - website-schema.yaml
  # Kerndienste
  - keycloak.yaml
  - nextcloud.yaml
  - nextcloud-redis.yaml
  # Nextcloud Talk HPB + Whiteboard
  # NB: coturn + janus (k3d/coturn-stack) and Collabora
  # (k3d/office-stack) each live in their own ArgoCD Application
  # because they need dedicated privileged namespaces and can't be
  # transformed by this kustomization's `namespace: workspace`
  # directive.
  - talk-hpb.yaml
  - whiteboard.yaml
  - talk-recording.yaml
  - vaultwarden.yaml
  # E-Signatur
  - docuseal.yaml
  # Buchhaltung
  - oauth2-proxy-docs.yaml
  # Backup (SA-07)
  - backup-pvc.yaml
  - backup-secrets.yaml
  - backup-cronjob.yaml
  - notify-unread-cronjob.yaml
  # Abrechnung
  - cronjob-monthly-billing.yaml
  # Dev-Werkzeuge
  - mailpit.yaml
  # Dokumentation
  - docs.yaml
  # Anforderungs-Tracking
  - tracking.yaml
  # Transkription
  - whisper.yaml
  # Live-Transkription Bot
  - talk-transcriber.yaml
  # KI-Assistent
  - claude-code-rbac.yaml
  - claude-code-config.yaml
  - claude-code-mcp-ops.yaml
  - claude-code-mcp-browser.yaml
  - claude-code-mcp-auth.yaml
  - claude-code-mcp-stripe.yaml
  - claude-code-mcp-github.yaml
  # Pentest Flags (CTF)
  - pentest-flags.yaml
  # Traefik Dev-Middlewares
  - traefik-middlewares-dev.yaml
  # Netzwerksicherheit (L3)
  - network-policies.yaml
  # Ingress
  - ingress.yaml

# ConfigMaps aus lokalen Dateien (dev-spezifisch)
configMapGenerator:
  - name: realm-template
    files:
      - realm-workspace.json=realm-workspace-dev.json
  - name: keycloak-import-script
    files:
      - import-entrypoint.sh=realm-import-entrypoint.sh
  - name: nextcloud-oidc-config
    files:
      - oidc.config.php=nextcloud-oidc-dev.php
  - name: nextcloud-extra-config
    files:
      - zz-extra.config.php=nextcloud-extra-config.php
  - name: docs-content
    options:
      annotations:
        argocd.argoproj.io/sync-options: ServerSideApply=true
    files:
      - docs-content/index.html
      - docs-content/README.md
      - docs-content/_sidebar.md
      - docs-content/architecture.md
      - docs-content/database.md
      - docs-content/benutzerhandbuch.md
      - docs-content/adminhandbuch.md
      - docs-content/keycloak.md
      - docs-content/migration.md
      - docs-content/requirements.md
      - docs-content/scripts.md
      - docs-content/security-report.md
      - docs-content/security.md
      - docs-content/test-anleitung-korczewski.md
      - docs-content/tests.md
      - docs-content/troubleshooting.md
      - docs-content/verarbeitungsverzeichnis.md
      - docs-content/admin-projekte.md
      - docs-content/nextcloud.md
      - docs-content/collabora.md
      - docs-content/talk-hpb.md
      - docs-content/claude-code.md
      - docs-content/vaultwarden.md
      - docs-content/website.md
      - docs-content/whiteboard.md
      - docs-content/mailpit.md
      - docs-content/whisper.md
      - docs-content/monitoring.md
      - docs-content/shared-db.md
      - docs-content/operations.md
      - docs-content/environments.md
      - docs-content/argocd.md
      - docs-content/backup.md
      - docs-content/dsgvo.md
      - docs-content/contributing.md

generatorOptions:
  disableNameSuffixHash: true

# Hinweis: ConfigMaps aus dem Eltern-Verzeichnis (import-entrypoint.sh,
# userinfo-proxy.conf, adapter.ts) werden in deploy.sh per kubectl erstellt,
# da Kustomize keine Dateien außerhalb des Basis-Verzeichnisses referenzieren darf.
