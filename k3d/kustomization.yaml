apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: homeoffice

resources:
  - namespace.yaml
  - configmap-domains.yaml
  - secrets.yaml
  # Shared database (one PostgreSQL, one DB per service)
  - shared-db.yaml
  # Kerndienste
  - keycloak.yaml
  - mm-keycloak-proxy.yaml
  - mattermost.yaml
  - nextcloud.yaml
  # Nextcloud Talk HPB + Collabora
  - talk-hpb.yaml
  - coturn.yaml
  - collabora.yaml
  # Buchhaltung
  - invoiceninja.yaml
  # Suche (FA-07)
  - opensearch.yaml
  # Dev-Werkzeuge
  - mailpit.yaml
  # Dokumentation
  - docs.yaml
  # Ingress
  - ingress.yaml

# ConfigMaps aus lokalen Dateien (dev-spezifisch)
configMapGenerator:
  - name: realm-template
    files:
      - realm-homeoffice.json=realm-homeoffice-dev.json
  - name: nextcloud-oidc-config
    files:
      - oidc.config.php=nextcloud-oidc-dev.php

generatorOptions:
  disableNameSuffixHash: true

# Hinweis: ConfigMaps aus dem Eltern-Verzeichnis (import-entrypoint.sh,
# userinfo-proxy.conf, adapter.ts) werden in deploy.sh per kubectl erstellt,
# da Kustomize keine Dateien außerhalb des Basis-Verzeichnisses referenzieren darf.
