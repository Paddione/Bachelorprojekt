apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: workspace

resources:
  - namespace.yaml
  - configmap-domains.yaml
  - secrets.yaml
  # Shared database (one PostgreSQL, one DB per service)
  - shared-db.yaml
  - website-schema.yaml
  # Kerndienste
  - keycloak.yaml
  - nextcloud.yaml
  - nextcloud-redis.yaml
  # Nextcloud Talk HPB + Whiteboard
  # NB: coturn + janus (k3d/coturn-stack) and Collabora
  # (k3d/office-stack) each live in their own ArgoCD Application
  # because they need dedicated privileged namespaces and can't be
  # transformed by this kustomization's `namespace: workspace`
  # directive.
  - talk-hpb.yaml
  - whiteboard.yaml
  - talk-recording.yaml
  - vaultwarden.yaml
  # E-Signatur
  - docuseal.yaml
  # Buchhaltung
  - oauth2-proxy-docs.yaml
  # Traefik dashboard SSO gateway
  - oauth2-proxy-traefik.yaml
  - traefik-dashboard-dev.yaml
  # Mailpit SSO gateway
  - oauth2-proxy-mailpit.yaml
  - mail-ingressroute-dev.yaml
  # Brett SSO gateway
  - oauth2-proxy-brett.yaml
  # Backup (SA-07)
  - backup-pvc.yaml
  - backup-cronjob.yaml
  - backup-config.yaml
  - notify-unread-cronjob.yaml
  # Abrechnung
  - cronjob-monthly-billing.yaml
  - cronjob-dunning-detection.yaml
  - einvoice-sidecar.yaml
  # LiveKit — self-hosted WebRTC livestreaming
  - livekit.yaml
  # Systemisches Brett
  - brett.yaml
  # Dev-Werkzeuge
  - mailpit.yaml
  # Dokumentation
  - docs.yaml
  # Anforderungs-Tracking
  - tracking.yaml
  - tracking-import-cronjob.yaml
  # Tests retention (prune tests/results/ nightly).
  # Applied separately via envsubst by `workspace:deploy` so its Role+RoleBinding
  # can land in ${WEBSITE_NAMESPACE} (cross-NS exec into the website pod) — the
  # top-level `namespace: workspace` in this kustomization would otherwise force
  # all retention resources into the workspace ns, where the website does NOT live.
  # See k3d/tests-retention-cronjob.yaml.
  # System-test cleanup CronJobs (Task 8) — same story: target ${WEBSITE_NAMESPACE}
  # so they reach the website service via cluster DNS without an extra hop.
  # Applied separately via envsubst by `workspace:deploy`.
  # See k3d/cronjob-systemtest-cleanup.yaml.
  # Transkription
  - whisper.yaml
  # Live-Transkription Bot
  - talk-transcriber.yaml
  # KI-Assistent
  - claude-code-rbac.yaml
  - claude-code-config.yaml
  - claude-code-mcp-ops.yaml
  - claude-code-mcp-browser.yaml
  - claude-code-mcp-auth.yaml
  - claude-code-mcp-github.yaml
  # Pentest Flags (CTF)
  - pentest-flags.yaml
  # Netzwerksicherheit (L3)
  - network-policies.yaml
  # Ingress
  - ingress.yaml

# ConfigMaps aus lokalen Dateien (dev-spezifisch)
configMapGenerator:
  - name: realm-template
    files:
      - realm-workspace.json=realm-workspace-dev.json
  - name: keycloak-import-script
    files:
      - import-entrypoint.sh=realm-import-entrypoint.sh
  - name: nextcloud-oidc-config
    files:
      - oidc.config.php=nextcloud-oidc-dev.php
  - name: nextcloud-extra-config
    files:
      - zz-extra.config.php=nextcloud-extra-config.php
  - name: docs-content
    options:
      annotations:
        argocd.argoproj.io/sync-options: ServerSideApply=true
    files:
      - docs-content/index.html
      - docs-content/README.md
      - docs-content/_sidebar.md
      - docs-content/architecture.md
      - docs-content/database.md
      - docs-content/benutzerhandbuch.md
      - docs-content/adminhandbuch.md
      - docs-content/keycloak.md
      - docs-content/migration.md
      - docs-content/requirements.md
      - docs-content/scripts.md
      - docs-content/security-report.md
      - docs-content/security.md
      - docs-content/tests.md
      - docs-content/troubleshooting.md
      - docs-content/verarbeitungsverzeichnis.md
      - docs-content/admin-projekte.md
      - docs-content/nextcloud.md
      - docs-content/collabora.md
      - docs-content/talk-hpb.md
      - docs-content/claude-code.md
      - docs-content/vaultwarden.md
      - docs-content/website.md
      - docs-content/whiteboard.md
      - docs-content/mailpit.md
      - docs-content/whisper.md
      - docs-content/monitoring.md
      - docs-content/shared-db.md
      - docs-content/operations.md
      - docs-content/environments.md
      - docs-content/argocd.md
      - docs-content/backup.md
      - docs-content/dsgvo.md
      - docs-content/contributing.md
  - name: art-library
    options:
      annotations:
        argocd.argoproj.io/sync-options: ServerSideApply=true
    files:
      - manifest.json=../art-library/sets/korczewski/manifest.json
      - tokens.css=../art-library/sets/korczewski/portfolio/tokens.css

      - characters_figure-01.portrait.svg=../art-library/sets/korczewski/portfolio/characters/figure-01.portrait.svg
      - characters_figure-01.figurine.svg=../art-library/sets/korczewski/portfolio/characters/figure-01.figurine.svg
      - characters_figure-02.portrait.svg=../art-library/sets/korczewski/portfolio/characters/figure-02.portrait.svg
      - characters_figure-02.figurine.svg=../art-library/sets/korczewski/portfolio/characters/figure-02.figurine.svg
      - characters_figure-03.portrait.svg=../art-library/sets/korczewski/portfolio/characters/figure-03.portrait.svg
      - characters_figure-03.figurine.svg=../art-library/sets/korczewski/portfolio/characters/figure-03.figurine.svg
      - characters_figure-04.portrait.svg=../art-library/sets/korczewski/portfolio/characters/figure-04.portrait.svg
      - characters_figure-04.figurine.svg=../art-library/sets/korczewski/portfolio/characters/figure-04.figurine.svg

      - props_chest.svg=../art-library/sets/korczewski/portfolio/props/chest.svg
      - props_torch.svg=../art-library/sets/korczewski/portfolio/props/torch.svg
      - props_potion.svg=../art-library/sets/korczewski/portfolio/props/potion.svg
      - props_key.svg=../art-library/sets/korczewski/portfolio/props/key.svg
      - props_scroll.svg=../art-library/sets/korczewski/portfolio/props/scroll.svg
      - props_coin.svg=../art-library/sets/korczewski/portfolio/props/coin.svg

      - terrain_ter-01.svg=../art-library/sets/korczewski/portfolio/terrain/ter-01.svg
      - terrain_ter-02.svg=../art-library/sets/korczewski/portfolio/terrain/ter-02.svg
      - terrain_ter-03.svg=../art-library/sets/korczewski/portfolio/terrain/ter-03.svg
      - terrain_ter-04.svg=../art-library/sets/korczewski/portfolio/terrain/ter-04.svg
      - terrain_ter-05.svg=../art-library/sets/korczewski/portfolio/terrain/ter-05.svg
      - terrain_ter-06.svg=../art-library/sets/korczewski/portfolio/terrain/ter-06.svg

      - logos_mark.svg=../art-library/sets/korczewski/portfolio/logos/mark.svg
      - logos_lockup-dark.svg=../art-library/sets/korczewski/portfolio/logos/lockup-dark.svg
      - logos_lockup-light.svg=../art-library/sets/korczewski/portfolio/logos/lockup-light.svg
      - logos_app-icon.svg=../art-library/sets/korczewski/portfolio/logos/app-icon.svg
      - logos_radar-pulse.svg=../art-library/sets/korczewski/portfolio/logos/radar-pulse.svg

generatorOptions:
  disableNameSuffixHash: true

# Hinweis: ConfigMaps aus dem Eltern-Verzeichnis (import-entrypoint.sh,
# userinfo-proxy.conf, adapter.ts) werden in deploy.sh per kubectl erstellt,
# da Kustomize keine Dateien außerhalb des Basis-Verzeichnisses referenzieren darf.
