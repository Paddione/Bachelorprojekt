apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: homeoffice

resources:
  - namespace.yaml
  - configmap-domains.yaml
  - secrets.yaml
  # Shared PostgreSQL (keycloak, mattermost, nextcloud, spacedeck)
  - shared-db.yaml
  # Kerndienste
  - keycloak.yaml
  - mm-keycloak-proxy.yaml
  - mattermost.yaml
  - nextcloud.yaml
  # Jitsi Stack
  - jitsi-prosody.yaml
  - jitsi-jicofo.yaml
  - jitsi-jvb.yaml
  - jitsi-web.yaml
  - jitsi-keycloak-adapter.yaml
  # Collaboration (FA-09)
  - collabora.yaml
  - spacedeck.yaml
  # OpenClaw KI-Assistent (FA-10)
  - openclaw-config.yaml
  - openclaw-rbac.yaml
  - openclaw-webui.yaml
  # OpenClaw MCP Server (FA-11..FA-14)
  - openclaw-mcp-kubernetes.yaml
  - openclaw-mcp-postgres.yaml
  - openclaw-mcp-github.yaml
  - openclaw-mcp-prometheus.yaml
  - openclaw-mcp-grafana.yaml
  # Ingress
  - ingress.yaml

# ConfigMaps aus lokalen Dateien (dev-spezifisch)
configMapGenerator:
  - name: realm-template
    files:
      - realm-homeoffice.json=realm-homeoffice-dev.json
  - name: nextcloud-oidc-config
    files:
      - oidc.config.php=nextcloud-oidc-dev.php

generatorOptions:
  disableNameSuffixHash: true

# Hinweis: ConfigMaps aus dem Eltern-Verzeichnis (import-entrypoint.sh,
# userinfo-proxy.conf, adapter.ts) werden in deploy.sh per kubectl erstellt,
# da Kustomize keine Dateien außerhalb des Basis-Verzeichnisses referenzieren darf.
