# ═══════════════════════════════════════════════════════════════════
# LiveKit — WebRTC SFU for livestreaming
# Components: Redis, Server, Ingress (RTMP), Egress (recording)
# ═══════════════════════════════════════════════════════════════════

# ── Redis (LiveKit room state) ───────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit-redis
  labels:
    app: livekit-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: livekit-redis
  template:
    metadata:
      labels:
        app: livekit-redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7.4-alpine
          command: ["redis-server", "--save", "", "--appendonly", "no"]
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 200m
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 999
            capabilities:
              drop: [ALL]
---
apiVersion: v1
kind: Service
metadata:
  name: livekit-redis
spec:
  selector:
    app: livekit-redis
  ports:
    - port: 6379
      targetPort: 6379
---

# ── LiveKit Server config ─────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: livekit-server-config
data:
  config.yaml: |
    port: 7880
    bind_addresses:
      - ""
    rtc:
      tcp_port: 7881
      port_range_start: 50000
      port_range_end: 60000
      use_external_ip: false
    redis:
      address: livekit-redis:6379
    turn:
      enabled: true
      domain: ""
      tls_port: 0
      udp_port: 3478
      external_tls: false
    keys: {}
---

# ── LiveKit Server ────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit-server
  labels:
    app: livekit-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: livekit-server
  template:
    metadata:
      labels:
        app: livekit-server
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: livekit
          image: livekit/livekit-server:v1.8.3
          args:
            - --config=/etc/livekit/config.yaml
          ports:
            - name: http
              containerPort: 7880
            - name: rtc-tcp
              containerPort: 7881
          env:
            - name: LIVEKIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: LIVEKIT_API_KEY
            - name: LIVEKIT_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: LIVEKIT_API_SECRET
            - name: LIVEKIT_KEYS
              value: "$(LIVEKIT_API_KEY): $(LIVEKIT_API_SECRET)"
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 1000m
          volumeMounts:
            - name: config
              mountPath: /etc/livekit
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: [ALL]
      volumes:
        - name: config
          configMap:
            name: livekit-server-config
---
apiVersion: v1
kind: Service
metadata:
  name: livekit-server
spec:
  selector:
    app: livekit-server
  ports:
    - name: http
      port: 7880
      targetPort: 7880
    - name: rtc-tcp
      port: 7881
      targetPort: 7881
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: livekit-server-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: "${LIVEKIT_DOMAIN}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: livekit-server
                port:
                  number: 7880
---

# ── LiveKit Ingress (RTMP → WebRTC) ──────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit-ingress
  labels:
    app: livekit-ingress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: livekit-ingress
  template:
    metadata:
      labels:
        app: livekit-ingress
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ingress
          image: livekit/ingress:v1.4.3
          ports:
            - name: rtmp
              containerPort: 1935
            - name: http
              containerPort: 8080
          env:
            - name: LIVEKIT_URL
              value: "ws://livekit-server:7880"
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: LIVEKIT_API_KEY
            - name: API_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: LIVEKIT_API_SECRET
            - name: REDIS_URL
              value: "redis://livekit-redis:6379"
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: [ALL]
---
apiVersion: v1
kind: Service
metadata:
  name: livekit-ingress-rtmp
spec:
  type: LoadBalancer
  selector:
    app: livekit-ingress
  ports:
    - name: rtmp
      port: 1935
      targetPort: 1935
      protocol: TCP
---

# ── LiveKit Egress (recording) ────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: livekit-recordings-pvc
spec:
  storageClassName: local-path
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit-egress
  labels:
    app: livekit-egress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: livekit-egress
  template:
    metadata:
      labels:
        app: livekit-egress
    spec:
      containers:
        - name: egress
          image: livekit/egress:v1.8.4
          env:
            - name: EGRESS_CONFIG_BODY
              value: |
                api_key: $(API_KEY)
                api_secret: $(API_SECRET)
                ws_url: ws://livekit-server:7880
                redis:
                  address: livekit-redis:6379
                health_port: 9090
                log_level: info
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: LIVEKIT_API_KEY
            - name: API_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: LIVEKIT_API_SECRET
          resources:
            requests:
              memory: 0
              cpu: 0
            limits:
              memory: 2Gi
              cpu: 2000m
          volumeMounts:
            - name: recordings
              mountPath: /recordings
      volumes:
        - name: recordings
          persistentVolumeClaim:
            claimName: livekit-recordings-pvc
