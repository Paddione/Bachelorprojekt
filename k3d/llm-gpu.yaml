# ─────────────────────────────────────────────────────────────────────────────
# llm-gpu: external GPU peer — LM Studio + TEI
#
# LM Studio (Windows) läuft auf port 1234. K8s-Pods erreichen den Host
# direkt via wg-mesh IP (192.168.100.0/24). Docker-Bridge funktioniert im Dev
# Kein socat nötig — Service-Port ist 1234 (kein Proxy-Port mehr).
#
# Modelle im LM Studio:
#   text-embedding-bge-m3          → /v1/embeddings
#   text-embedding-bge-reranker-v2-m3  → /v1/rerank  (via llm-gateway-rerank)
#   text-embedding-nomic-embed-text-v1.5 → /v1/embeddings
#   qwen/qwen3.5-9b                → /v1/chat/completions  (coding)
#   google/gemma-4-12b-qat         → /v1/chat/completions  (chat)
#
# TEI (Docker — läuft als Fallback für rerank falls LM Studio das nicht hat):
#   llm-gateway-tei-embed  :8081  (bge-m3 via TEI, optional)
#   llm-gateway-tei-rerank :8083  (bge-reranker-v2-m3 via TEI)
#
# ${LLM_HOST_IP}: 192.168.100.10 (wg-mesh — dev + prod fleet)
# ─────────────────────────────────────────────────────────────────────────────

# ── LM Studio — alle Modelle auf port 1234 (Windows, kein socat) ─────────────
apiVersion: v1
kind: Service
metadata:
  name: llm-gateway-lmstudio
  labels:
    app: llm-gateway
spec:
  ports:
    - name: http
      port: 1234
      targetPort: 1234
---
apiVersion: v1
kind: Endpoints
metadata:
  name: llm-gateway-lmstudio
  labels:
    app: llm-gateway
subsets:
  - addresses:
      - ip: ${LLM_HOST_IP}
    ports:
      - name: http
        port: 1234
---
# ── TEI Embeddings (Fallback — bge-m3 via Docker TEI) ───────────────────────
apiVersion: v1
kind: Service
metadata:
  name: llm-gateway-tei-embed
  labels:
    app: llm-gateway
spec:
  ports:
    - name: http
      port: 8081
      targetPort: 8081
---
apiVersion: v1
kind: Endpoints
metadata:
  name: llm-gateway-tei-embed
  labels:
    app: llm-gateway
subsets:
  - addresses:
      - ip: ${LLM_HOST_IP}
    ports:
      - name: http
        port: 8081
---
# ── TEI Reranking (bge-reranker-v2-m3, port 8083) ───────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: llm-gateway-tei-rerank
  labels:
    app: llm-gateway
spec:
  ports:
    - name: http
      port: 8083
      targetPort: 8083
---
apiVersion: v1
kind: Endpoints
metadata:
  name: llm-gateway-tei-rerank
  labels:
    app: llm-gateway
subsets:
  - addresses:
      - ip: ${LLM_HOST_IP}
    ports:
      - name: http
        port: 8083
