# ─────────────────────────────────────────────────────────────────────────────
# llm-gpu: external GPU peer (TEI embed, LM Studio chat)
#
# The GPU box runs on the wg-mesh overlay (prod) or via Docker bridge (dev/k3d).
# ${LLM_HOST_IP} is filled by envsubst at deploy time from environments/<env>.yaml.
# Dev default: 172.17.0.1 (Docker bridge gateway → WSL2 host).
# ─────────────────────────────────────────────────────────────────────────────

# ── Embeddings (TEI bge-m3) ──────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: llm-gateway-embed
  labels:
    app: llm-gateway
spec:
  ports:
    - name: http
      port: 8081
      targetPort: 8081
---
apiVersion: v1
kind: Endpoints
metadata:
  name: llm-gateway-embed
  labels:
    app: llm-gateway
subsets:
  - addresses:
      - ip: ${LLM_HOST_IP}
    ports:
      - name: http
        port: 8081
---
# ── Chat (LM Studio — Windows, OpenAI-compatible) ─────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: llm-gateway-lmstudio
  labels:
    app: llm-gateway
spec:
  ports:
    - name: http
      port: 1234
      targetPort: 1234
---
apiVersion: v1
kind: Endpoints
metadata:
  name: llm-gateway-lmstudio
  labels:
    app: llm-gateway
subsets:
  - addresses:
      - ip: ${LLM_HOST_IP}
    ports:
      - name: http
        port: 1234
