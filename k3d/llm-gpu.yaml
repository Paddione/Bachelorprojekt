# ─────────────────────────────────────────────────────────────────────────────
# llm-gpu: external GPU peer — zwei persistente llama.cpp-Server (Windows)
#
# Zwei llama.cpp-Server auf dem Windows-GPU-Host, direkt via wg-gpu erreichbar:
#   - bge-m3 Embedding (Port 8095): /v1/embeddings, pooling CLS, 1024-dim
#   - bge-reranker-v2-m3 Rerank (Port 8096): /v1/rerank
#
# Kein socat, kein Proxy, kein LM Studio, kein TEI mehr. Die Server laufen
# als Windows Scheduled Tasks und starten automatisch beim Systemstart.
#
# ${LLM_HOST_IP}: 192.168.100.10 (wg-mesh — dev + prod fleet)
# ─────────────────────────────────────────────────────────────────────────────

# ── bge-m3 Embedding (llama.cpp, Port 8095) ──────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: llm-gateway-embed
  labels:
    app: llm-gateway
spec:
  ports:
    - name: http
      port: 8095
      targetPort: 8095
---
apiVersion: v1
kind: Endpoints
metadata:
  name: llm-gateway-embed
  labels:
    app: llm-gateway
subsets:
  - addresses:
      - ip: ${LLM_HOST_IP}
    ports:
      - name: http
        port: 8095
---
# ── bge-reranker-v2-m3 Rerank (llama.cpp, Port 8096) ─────────────────────
apiVersion: v1
kind: Service
metadata:
  name: llm-gateway-rerank
  labels:
    app: llm-gateway
spec:
  ports:
    - name: http
      port: 8096
      targetPort: 8096
---
apiVersion: v1
kind: Endpoints
metadata:
  name: llm-gateway-rerank
  labels:
    app: llm-gateway
subsets:
  - addresses:
      - ip: ${LLM_HOST_IP}
    ports:
      - name: http
        port: 8096
