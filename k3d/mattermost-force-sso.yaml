---
# Traefik middleware: redirect /login* → /oauth/gitlab/login so users skip
# the native Mattermost sign-in form and land on the Keycloak SSO flow
# (the "GitLab" provider slot in Mattermost is actually Keycloak).
#
# Break-glass: delete this Middleware resource (or the annotation on the
# Ingress below) to restore the native login form. Admins can always bypass
# the web flow via `mmctl auth login` which hits the API directly.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: mattermost-force-sso
spec:
  redirectRegex:
    regex: "^(https?://[^/]+)/login(\\?.*)?$"
    replacement: "${1}/oauth/gitlab/login"
    permanent: false
---
# Dedicated Ingress for chat.* so the force-sso middleware annotation
# applies only to Mattermost and not to every other host.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mattermost-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: "workspace-mattermost-force-sso@kubernetescrd"
spec:
  rules:
    - host: chat.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mattermost
                port:
                  number: 8065
