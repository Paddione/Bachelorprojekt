apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mattermost-data-pvc
spec:
  storageClassName: local-path
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mattermost
  labels:
    app: mattermost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mattermost
  template:
    metadata:
      labels:
        app: mattermost
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: mattermost
          image: mattermost/mattermost-enterprise-edition:9.7
          env:
            - name: MM_SQLSETTINGS_DRIVERNAME
              value: postgres
            - name: MATTERMOST_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: MATTERMOST_DB_PASSWORD
            - name: MM_SQLSETTINGS_DATASOURCE
              value: "host=mattermost-db port=5432 user=mattermost password=$(MATTERMOST_DB_PASSWORD) dbname=mattermost sslmode=disable connect_timeout=10"
            - name: MM_SERVICESETTINGS_SITEURL
              value: "http://chat.localhost"
            # ── Internal connections (billing-bot, etc.) ─────
            - name: MM_SERVICESETTINGS_ALLOWEDUNTRUSTEDINTERNALCONNECTIONS
              value: "billing-bot"
            # ── Plugins & Integrations ──────────────────────────
            - name: MM_PLUGINSETTINGS_ENABLE
              value: "true"
            - name: MM_PLUGINSETTINGS_ENABLEUPLOADS
              value: "true"
            - name: MM_PLUGINSETTINGS_PLUGINSTATES
              value: '{}'
            # ── Webhooks & Bots (Gap 1.1) ─────────────────────
            - name: MM_SERVICESETTINGS_ENABLEINCOMINGWEBHOOKS
              value: "true"
            - name: MM_SERVICESETTINGS_ENABLEOUTGOINGWEBHOOKS
              value: "true"
            - name: MM_SERVICESETTINGS_ENABLEBOTACCOUNTCREATION
              value: "true"
            - name: MM_SERVICESETTINGS_ENABLEPERSONALACCESSTOKENS
              value: "true"
            - name: MM_SERVICESETTINGS_ENABLECUSTOMEMOJI
              value: "true"
            # ── Privacy (NFA-01) — disable telemetry ──────
            - name: MM_LOGSETTINGS_ENABLEDIAGNOSTICS
              value: "false"
            - name: MM_SERVICESETTINGS_ENABLESECURITYFIXALERT
              value: "false"
            # ── Usability (NFA-05) — German locale ──────
            - name: MM_LOCALIZATIONSETTINGS_DEFAULTCLIENTLOCALE
              value: "de"
            - name: MM_LOCALIZATIONSETTINGS_DEFAULTSERVERLOCALE
              value: "de"
            - name: MM_SERVICESETTINGS_ENABLEUSERACCESSTOKENS
              value: "true"
            - name: MM_SERVICESETTINGS_ENABLELOCALMODE
              value: "true"
            # ── Link Previews (Gap 1.3) ───────────────────────
            - name: MM_SERVICESETTINGS_ENABLELINKPREVIEWS
              value: "true"
            - name: MM_SERVICESETTINGS_ENABLEPOSTIMAGEPROXY
              value: "true"
            # ── Guest Access (Gap 1.6) ────────────────────────
            - name: MM_GUESTACCOUNTSSETTINGS_ENABLE
              value: "true"
            # ── Email / SMTP via Mailpit (Gap 1.5) ────────────
            - name: MM_EMAILSETTINGS_SMTPSERVER
              value: "mailpit"
            - name: MM_EMAILSETTINGS_SMTPPORT
              value: "1025"
            - name: MM_EMAILSETTINGS_SENDEMAILNOTIFICATIONS
              value: "true"
            - name: MM_EMAILSETTINGS_FEEDBACKEMAIL
              value: "noreply@workspace.local"
            - name: MM_EMAILSETTINGS_FEEDBACKNAME
              value: "${BRAND_NAME}"
            - name: MM_EMAILSETTINGS_REQUIREEMAILVERIFICATION
              value: "false"
            - name: MM_EMAILSETTINGS_ENABLESIGNINWITHEMAIL
              value: "true"
            - name: MM_EMAILSETTINGS_ENABLESIGNINWITHUSERNAME
              value: "true"
            - name: MM_EMAILSETTINGS_CONNECTIONSECURITY
              value: ""
            # ── OpenSearch / Elasticsearch (FA-07) ────────────
            - name: MM_ELASTICSEARCHSETTINGS_ENABLEINDEXING
              value: "true"
            - name: MM_ELASTICSEARCHSETTINGS_ENABLESEARCHING
              value: "true"
            - name: MM_ELASTICSEARCHSETTINGS_ENABLEAUTOCOMPLETE
              value: "true"
            - name: MM_ELASTICSEARCHSETTINGS_CONNECTIONURL
              value: "http://opensearch:9200"
            - name: MM_ELASTICSEARCHSETTINGS_SNIFF
              value: "false"
            - name: MM_ELASTICSEARCHSETTINGS_USERNAME
              value: ""
            - name: MM_ELASTICSEARCHSETTINGS_PASSWORD
              value: ""
            # GitLab-OAuth via Keycloak
            - name: MM_GITLABSETTINGS_ENABLE
              value: "true"
            - name: MM_GITLABSETTINGS_ID
              value: "mattermost"
            - name: MM_GITLABSETTINGS_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: MATTERMOST_OIDC_SECRET
            - name: MM_GITLABSETTINGS_SCOPE
              value: "openid profile email"
            - name: MM_SERVICESETTINGS_EXPERIMENTALENABLEAUTHENTICATIONTRANSFER
              value: "true"
            # Auth-Endpoint: Browser-seitig (extern)
            - name: MM_GITLABSETTINGS_AUTHENDPOINT
              value: "http://auth.localhost/realms/workspace/protocol/openid-connect/auth"
            # Token + Userinfo: Server-seitig (intern via Proxy)
            - name: MM_GITLABSETTINGS_TOKENENDPOINT
              value: "http://mm-keycloak-proxy:8081/token"
            - name: MM_GITLABSETTINGS_USERAPIENDPOINT
              value: "http://mm-keycloak-proxy:8081/userinfo"
            - name: MM_SQLSETTINGS_MAXOPENCONNS
              value: "25"
            - name: MM_SQLSETTINGS_MAXIDLECONNS
              value: "10"
            - name: TZ
              value: Europe/Berlin
          ports:
            - containerPort: 8065
          volumeMounts:
            - name: data
              mountPath: /mattermost/data
          readinessProbe:
            httpGet:
              path: /api/v4/system/ping
              port: 8065
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v4/system/ping
              port: 8065
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mattermost-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mattermost
spec:
  selector:
    app: mattermost
  ports:
    - port: 8065
      targetPort: 8065
