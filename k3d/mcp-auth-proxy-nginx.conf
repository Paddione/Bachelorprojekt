load_module modules/ngx_http_perl_module.so;

env CLUSTER_TOKEN;
env BUSINESS_TOKEN;

events {
  worker_connections 128;
}

http {
  perl_set $cluster_token 'sub { return $ENV{"CLUSTER_TOKEN"} // "" }';
  perl_set $business_token 'sub { return $ENV{"BUSINESS_TOKEN"} // "" }';
  # Fallback: extract ?token= from original request URI forwarded by Traefik ForwardAuth
  perl_set $bearer_from_uri 'sub {
    my $r = shift;
    my $uri = $r->header_in("X-Forwarded-Uri") // "";
    if ($uri =~ /[?&]token=([^&]+)/) { return $1; }
    return "";
  }';

  server {
    listen 80;

    location = /healthz {
      access_log off;
      return 200 "OK\n";
    }

    location = /auth {
      set $bearer "";
      if ($http_authorization ~* "^Bearer\s+(.+)$") {
        set $bearer $1;
      }

      # Fallback: token query param (for clients like claude.ai web that cannot set headers)
      if ($bearer = "") {
        set $bearer $bearer_from_uri;
      }

      # No token provided
      if ($bearer = "") {
        return 401 '{"error":"missing or invalid Authorization header"}\n';
      }

      # Determine role
      set $role "";
      if ($bearer = $cluster_token) {
        set $role "cluster";
      }
      if ($bearer = $business_token) {
        set $role "business";
      }

      # Unknown token
      if ($role = "") {
        return 401 '{"error":"invalid token"}\n';
      }

      # Cluster role: allow everything
      if ($role = "cluster") {
        add_header X-MCP-Role "cluster" always;
        return 200 '{"status":"ok","role":"cluster"}\n';
      }

      # Business role: full access to all gateway-routed MCP servers.
      add_header X-MCP-Role "business" always;
      return 200 '{"status":"ok","role":"business"}\n';
    }

    location /oauth2/ {
      proxy_pass http://127.0.0.1:4180;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Scheme $scheme;
    }

    location = /api/mcp/user/healthz {
      if ($http_x_auth_request_user != "") {
        return 200 "OK\n";
      }
      proxy_pass http://127.0.0.1:4180;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Scheme $scheme;
    }

    location ~ ^/api/mcp/user/(kubernetes|postgres|browser|github)(/.*)$ {
      set $mcp_service $1;
      set $mcp_path $2;

      if ($http_x_auth_request_user != "") {
        set $backend_port 8080;
        if ($mcp_service = "postgres") { set $backend_port 3001; }
        if ($mcp_service = "browser")  { set $backend_port 3000; }
        if ($mcp_service = "github")   { set $backend_port 3002; }

        proxy_pass http://claude-code-mcp-monolith:$backend_port$mcp_path;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        break;
      }

      proxy_pass http://127.0.0.1:4180;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Scheme $scheme;
    }
  }
}
