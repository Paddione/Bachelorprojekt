apiVersion: apps/v1
kind: Deployment
metadata:
  name: mentolder-web
  labels:
    app: mentolder-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mentolder-web
  template:
    metadata:
      labels:
        app: mentolder-web
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ghcr-pull-secret
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        # NOTE: mentolder-web is a static Vite/React SPA served by nginx. Its
        # VITE_WEBSITE_ORIGIN (the Astro website origin reused for auth +
        # homepage persistence) is BAKED AT BUILD TIME via the
        # `VITE_WEBSITE_ORIGIN` build-arg in .github/workflows/build-mentolder-web.yml
        # (https://web.mentolder.de). A runtime env here would have no effect on
        # the pre-built bundle, so none is set.
        # :latest is intentional — rebuilt on every release (build-mentolder-web.yml, see gotchas-footguns.md)
        - name: mentolder-web
          image: ghcr.io/paddione/mentolder-web:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
              add: [NET_BIND_SERVICE, CHOWN, SETUID, SETGID]
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { cpu: 100m, memory: 64Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: mentolder-web
  labels:
    app: mentolder-web
spec:
  selector:
    app: mentolder-web
  ports:
    - name: http
      port: 80
      targetPort: 80
