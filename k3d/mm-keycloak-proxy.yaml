apiVersion: apps/v1
kind: Deployment
metadata:
  name: mm-keycloak-proxy
  labels:
    app: mm-keycloak-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mm-keycloak-proxy
  template:
    metadata:
      labels:
        app: mm-keycloak-proxy
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            capabilities:
              drop: [ALL]
              add: [NET_BIND_SERVICE]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 8081
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-tmp
              mountPath: /tmp
          resources:
            requests:
              memory: 64Mi
              cpu: "50m"
            limits:
              memory: 128Mi
              cpu: "200m"
      volumes:
        - name: config
          configMap:
            name: mattermost-proxy-config
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mm-keycloak-proxy
spec:
  selector:
    app: mm-keycloak-proxy
  ports:
    - port: 8081
      targetPort: 8081
