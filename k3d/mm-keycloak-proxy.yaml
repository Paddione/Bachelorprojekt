apiVersion: apps/v1
kind: Deployment
metadata:
  name: mm-keycloak-proxy
  labels:
    app: mm-keycloak-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mm-keycloak-proxy
  template:
    metadata:
      labels:
        app: mm-keycloak-proxy
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8081
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          resources:
            requests:
              memory: 64Mi
              cpu: "50m"
            limits:
              memory: 128Mi
              cpu: "200m"
      volumes:
        - name: config
          configMap:
            name: mattermost-proxy-config
---
apiVersion: v1
kind: Service
metadata:
  name: mm-keycloak-proxy
spec:
  selector:
    app: mm-keycloak-proxy
  ports:
    - port: 8081
      targetPort: 8081
