apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: workspace-alerts
  namespace: monitoring
  labels:
    release: monitoring
spec:
  route:
    groupBy: [alertname, namespace]
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 4h
    receiver: email
    routes:
      - matchers:
          - name: severity
            value: critical
        receiver: pushover
        continue: true
  receivers:
    - name: email
      emailConfigs:
        - sendResolved: true
          to: ${CONTACT_EMAIL}
          from: ${SMTP_FROM}
          smarthost: ${SMTP_HOST}:${SMTP_PORT}
          authUsername: ${SMTP_USER}
          authPassword:
            name: alertmanager-smtp
            key: SMTP_PASSWORD
          requireTLS: true
    - name: pushover
      pushoverConfigs:
        - sendResolved: true
          token:
            name: alertmanager-pushover
            key: PUSHOVER_TOKEN
          userKey:
            name: alertmanager-pushover
            key: PUSHOVER_USER
          title: '{{ template "pushover.default.title" . }}'
          message: '{{ template "pushover.default.message" . }}'
          priority: '{{ if eq .CommonLabels.severity "critical" }}1{{ else }}0{{ end }}'
          retry: 30s
          expire: 1h
