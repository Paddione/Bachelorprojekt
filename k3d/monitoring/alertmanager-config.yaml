apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: pushover
  namespace: monitoring
  labels:
    release: monitoring
spec:
  route:
    groupBy: [alertname, namespace]
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 4h
    receiver: pushover
    routes:
      - matchers:
          - name: severity
            value: critical
        receiver: pushover
  receivers:
    - name: pushover
      pushoverConfigs:
        - sendResolved: true
          token:
            name: alertmanager-pushover
            key: PUSHOVER_TOKEN
          userKey:
            name: alertmanager-pushover
            key: PUSHOVER_USER
          title: '{{ template "pushover.default.title" . }}'
          message: '{{ template "pushover.default.message" . }}'
          priority: '{{ if eq .CommonLabels.severity "critical" }}1{{ else }}0{{ end }}'
          retry: 30s
          expire: 1h
