# Dev placeholder Pushover credentials. In dev, Alertmanager loads these but
# they are non-functional tokens → notifications are effectively dry-run.
# In prod this Secret is provided by SealedSecrets and this dev placeholder is
# stripped by prod/monitoring/kustomization.yaml ($patch: delete).
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-pushover
  namespace: monitoring
type: Opaque
stringData:
  PUSHOVER_TOKEN: "dev-placeholder-token"
  PUSHOVER_USER: "dev-placeholder-user"
