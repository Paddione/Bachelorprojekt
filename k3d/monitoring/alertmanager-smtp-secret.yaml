# Dev placeholder SMTP password. In dev, Alertmanager loads this but it is
# non-functional → email notifications are effectively dry-run.
# In prod this Secret is provided by SealedSecrets and this dev placeholder is
# stripped by prod/monitoring/kustomization.yaml ($patch: delete).
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-smtp
  namespace: monitoring
type: Opaque
stringData:
  SMTP_PASSWORD: "dev-placeholder-password"
