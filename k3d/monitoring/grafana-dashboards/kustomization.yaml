apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

configMapGenerator:
  - name: grafana-dashboard-kubernetes-overview
    files:
      - kubernetes-overview.json
    options:
      labels:
        grafana_dashboard: "1"
  - name: grafana-dashboard-traefik
    files:
      - traefik-dashboard.json
    options:
      labels:
        grafana_dashboard: "1"
  - name: grafana-dashboard-factory-otel
    files:
      - factory-otel.json
    options:
      labels:
        grafana_dashboard: "1"

generatorOptions:
  disableNameSuffixHash: true
