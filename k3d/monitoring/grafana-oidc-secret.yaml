# Dev placeholder for Grafana OIDC + admin password. Prod provides these via
# SealedSecrets; prod/monitoring strips this placeholder ($patch: delete).
apiVersion: v1
kind: Secret
metadata:
  name: grafana-oidc
  namespace: monitoring
type: Opaque
stringData:
  POCKET_ID_GRAFANA_SECRET: "dev-grafana-secret"
  GRAFANA_ADMIN_PASSWORD: "admin"
