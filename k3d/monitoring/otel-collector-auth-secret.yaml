# Dev placeholder bearer token for the OTel collector OTLP receiver. In dev the
# collector loads this but the autopilot only emits when its endpoint is set, so it
# is effectively a no-op. In prod this Secret is provided by a SealedSecret
# (environments/sealed-secrets/<env>.yaml materializes FACTORY_OTLP_TOKEN in the
# monitoring ns via otel-collector-auth) and this dev placeholder is stripped by
# prod/monitoring/kustomization.yaml ($patch: delete).
apiVersion: v1
kind: Secret
metadata:
  name: otel-collector-auth
  namespace: monitoring
type: Opaque
stringData:
  FACTORY_OTLP_TOKEN: "dev-placeholder-token"
