# Single-binary Loki for unified log aggregation across both brands.
# Dev baseline: local-path storage, 5Gi PVC. Prod: longhorn via overlay patch.
# No MinIO/S3 — plain filesystem TSDB, 14d retention.

deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: local-path
    size: 5Gi
    accessModes:
      - ReadWriteOnce
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi

loki:
  auth_enabled: false
  commonConfig:
    path_prefix: /var/loki
    replication_factor: 1
  storage:
    type: filesystem
    filesystem:
      chunks_directory: /var/loki/chunks
      rules_directory: /var/loki/rules
  schemaConfig:
    configs:
      - from: "2026-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  limits_config:
    retention_period: 336h
  compactor:
    retention_enabled: true
    delete_request_store: filesystem
    compaction_interval: 10m

chunksCache:
  enabled: false
resultsCache:
  enabled: false
gateway:
  enabled: false
minio:
  enabled: false
test:
  enabled: false
lokiCanary:
  enabled: false

backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
