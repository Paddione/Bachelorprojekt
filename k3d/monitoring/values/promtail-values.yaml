# promtail DaemonSet — collects container logs across all fleet nodes (both brands).
# Ships logs to the single Loki instance in the monitoring namespace.

config:
  clients:
    - url: http://loki.monitoring.svc:3100/loki/api/v1/push
  snippets:
    extraRelabelConfigs:
      - source_labels:
          - namespace
        regex: ".*-korczewski"
        target_label: brand
        replacement: "korczewski"
      - source_labels:
          - namespace
        regex: ".*"
        target_label: brand
        replacement: "mentolder"

tolerations:
  - operator: Exists

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
