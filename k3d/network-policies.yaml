# ═══════════════════════════════════════════════════════════════════
# Kubernetes NetworkPolicies — Default-Deny + selektive Freigaben
# Namespace: workspace (über kustomize namespace-Direktive gesetzt)
# ═══════════════════════════════════════════════════════════════════

# Default: alle eingehenden Verbindungen blockieren
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
spec:
  podSelector: {}
  policyTypes:
  - Ingress
---
# Default: alle ausgehenden Verbindungen blockieren
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
spec:
  podSelector: {}
  policyTypes:
  - Egress
---
# DNS-Auflösung erlauben (kube-dns, Port 53 UDP + TCP)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
---
# Pod-zu-Pod-Kommunikation innerhalb des workspace-Namespace erlauben
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace-egress
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector: {}
---
# Traefik-Ingress aus kube-system erlauben
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-ingress
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          app.kubernetes.io/name: traefik
---
# Prometheus-Scraping aus monitoring-Namespace erlauben
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-ingress
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
---
# MCP GitHub + Stripe: externe HTTPS-Verbindungen
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mcp-external-egress
spec:
  podSelector:
    matchExpressions:
    - key: app
      operator: In
      values: [mcp-github, mcp-stripe]
  policyTypes:
  - Egress
  egress:
  - ports:
    - port: 443
      protocol: TCP
