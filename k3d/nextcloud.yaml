apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nextcloud-app
spec:
  storageClassName: local-path
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nextcloud-data-pvc
spec:
  storageClassName: local-path
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud
  labels:
    app: nextcloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nextcloud
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: nextcloud
    spec:
      initContainers:
        - name: fix-config-perms
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /var/www/html/config && chown 33:33 /var/www/html/config"]
          volumeMounts:
            - name: app
              mountPath: /var/www/html
      containers:
        - name: nextcloud
          image: nextcloud:30-apache
          env:
            - name: POSTGRES_HOST
              value: nextcloud-db
            - name: POSTGRES_DB
              value: nextcloud
            - name: POSTGRES_USER
              value: nextcloud
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: NEXTCLOUD_DB_PASSWORD
            - name: NEXTCLOUD_ADMIN_USER
              value: admin
            - name: NEXTCLOUD_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: NEXTCLOUD_ADMIN_PASSWORD
            - name: NEXTCLOUD_TRUSTED_DOMAINS
              value: "files.localhost"
            - name: NEXTCLOUD_DEFAULT_LANGUAGE
              value: "de"
            - name: NEXTCLOUD_DEFAULT_LOCALE
              value: "de_DE"
            - name: OVERWRITEPROTOCOL
              value: http
            - name: OVERWRITECLIURL
              value: "http://files.localhost"
            # OIDC-Variablen für oidc.config.php
            - name: KC_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: domain-config
                  key: KC_DOMAIN
            - name: NC_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: domain-config
                  key: NC_DOMAIN
            - name: NEXTCLOUD_OIDC_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: NEXTCLOUD_OIDC_SECRET
            - name: SIGNALING_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: domain-config
                  key: SIGNALING_DOMAIN
            - name: COLLABORA_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: domain-config
                  key: COLLABORA_DOMAIN
            # ── SMTP via Mailpit (dev) ─────────────────────
            - name: SMTP_HOST
              value: "mailpit"
            - name: SMTP_PORT
              value: "1025"
            - name: SMTP_SECURE
              value: ""
            - name: SMTP_AUTHTYPE
              value: "PLAIN"
            - name: MAIL_FROM_ADDRESS
              value: "nextcloud"
            - name: MAIL_DOMAIN
              value: "workspace.local"
            - name: TZ
              value: Europe/Berlin
          ports:
            - containerPort: 80
          volumeMounts:
            - name: app
              mountPath: /var/www/html
            - name: data
              mountPath: /var/www/html/data
            - name: oidc-config
              mountPath: /var/www/html/config/oidc.config.php
              subPath: oidc.config.php
              readOnly: true
          readinessProbe:
            httpGet:
              path: /status.php
              port: 80
              httpHeaders:
                - name: Host
                  value: files.localhost
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /status.php
              port: 80
              httpHeaders:
                - name: Host
                  value: files.localhost
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 10
          resources:
            requests:
              memory: 256Mi
              cpu: 200m
            limits:
              memory: 1Gi
      volumes:
        - name: app
          persistentVolumeClaim:
            claimName: nextcloud-app
        - name: data
          persistentVolumeClaim:
            claimName: nextcloud-data-pvc
        - name: oidc-config
          configMap:
            name: nextcloud-oidc-config
---
apiVersion: v1
kind: Service
metadata:
  name: nextcloud
spec:
  selector:
    app: nextcloud
  ports:
    - port: 80
      targetPort: 80
