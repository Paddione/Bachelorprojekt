# k3d/notify-unread-cronjob.yaml
# Calls /api/cron/notify-unread every 6 hours to send 72h unread notification emails.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: notify-unread
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: notify
              image: curlimages/curl:8.7.1
              command:
                - curl
                - -s
                - -o
                - /dev/null
                - -w
                - "%{http_code}"
                - -X
                - POST
                - -H
                - "Authorization: Bearer $(CRON_SECRET)"
                - -H
                - "Content-Type: application/json"
                - "http://website.website.svc.cluster.local:4321/api/cron/notify-unread"
              env:
                - name: CRON_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: workspace-secrets
                      key: CRON_SECRET
