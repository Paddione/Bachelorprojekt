# ═══════════════════════════════════════════════════════════════════
# OAuth2 Proxy — Pocket ID SSO gateway for Systemisches Brett
# Authenticates users via OIDC, then forwards to brett:3000
# ═══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy-brett
  labels:
    app: brett
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy-brett
  template:
    metadata:
      labels:
        app: oauth2-proxy-brett
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: write-cookie-secret
          image: busybox:1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - printf 'cookie_secret = "%s"\n' "$(printf '%s' "$OAUTH2_PROXY_COOKIE_SECRET" | cut -c1-32)" > /run/config/oauth2-extra.cfg
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          env:
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: OAUTH2_PROXY_COOKIE_SECRET
          volumeMounts:
            - name: oauth2-config
              mountPath: /run/config
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.9.0@sha256:37c1570c0427e02fc7c947ef2c04e8995b8347b7abc9fcf1dbb4e376a4b221a7
          imagePullPolicy: Always
          args:
            - --config=/run/config/oauth2-extra.cfg
            - --provider=oidc
            - --client-id=brett
            - --client-secret=$(POCKET_ID_BRETT_SECRET)
            - --redirect-url=http://brett.localhost/oauth2/callback
            - --oidc-issuer-url=http://pocket-id:1411
            - --ssl-insecure-skip-verify=true
            - --skip-oidc-discovery=true
            - --login-url=http://auth.localhost/authorize
            - --redeem-url=http://pocket-id:1411/api/oidc/token
            - --oidc-jwks-url=http://pocket-id:1411/.well-known/jwks.json
            - --profile-url=http://pocket-id:1411/api/oidc/userinfo
            - --upstream=http://brett:3000
            - --http-address=0.0.0.0:4180
            - --cookie-secure=false
            - --cookie-name=_oauth2_proxy_brett
            - --email-domain=*
            - --pass-access-token=true
            - --pass-authorization-header=true
            - --set-xauthrequest=true
            - --skip-provider-button=true
            - --code-challenge-method=S256
            - --insecure-oidc-allow-unverified-email=true
            - --oidc-extra-audience=brett
            - --scope=openid email profile
            # T002068: allow unauthenticated access to data-free routes
            # (healthz for probes, three.min.js for canvas). Data APIs
            # (/api/state, /api/snapshots, /api/customers, /presets) stay
            # behind auth.
            - --skip-auth-route=GET=^/healthz$|GET=^/three\.min\.js$
          env:
            - name: POCKET_ID_BRETT_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: POCKET_ID_BRETT_SECRET
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 4180
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: 64Mi
              cpu: "50m"
            limits:
              memory: 128Mi
              cpu: "200m"
          volumeMounts:
            - name: oauth2-config
              mountPath: /run/config
              readOnly: true
      volumes:
        - name: oauth2-config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy-brett
  labels:
    app: brett
spec:
  selector:
    app: oauth2-proxy-brett
  ports:
    - port: 4180
      targetPort: 4180
