# ═══════════════════════════════════════════════════════════════════
# OAuth2 Proxy — Keycloak SSO gateway for Invoice Ninja
# Authenticates users via OIDC, then forwards to invoiceninja:8080
# ═══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy-invoiceninja
  labels:
    app: oauth2-proxy-invoiceninja
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy-invoiceninja
  template:
    metadata:
      labels:
        app: oauth2-proxy-invoiceninja
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.9.0
          args:
            - --provider=keycloak-oidc
            - --client-id=invoiceninja
            - --client-secret=$(INVOICENINJA_OIDC_SECRET)
            - --redirect-url=http://billing.localhost/oauth2/callback
            - --oidc-issuer-url=http://keycloak:8080/realms/workspace
            - --ssl-insecure-skip-verify=true
            - --skip-oidc-discovery=true
            - --login-url=http://auth.localhost/realms/workspace/protocol/openid-connect/auth
            - --redeem-url=http://keycloak:8080/realms/workspace/protocol/openid-connect/token
            - --oidc-jwks-url=http://keycloak:8080/realms/workspace/protocol/openid-connect/certs
            - --profile-url=http://keycloak:8080/realms/workspace/protocol/openid-connect/userinfo
            - --upstream=http://invoiceninja:80
            - --http-address=0.0.0.0:4180
            - --cookie-secret=$(OAUTH2_PROXY_COOKIE_SECRET)
            - --cookie-secure=false
            - --cookie-name=_oauth2_proxy_billing
            - --email-domain=*
            - --pass-access-token=true
            - --pass-authorization-header=true
            - --set-xauthrequest=true
            - --skip-provider-button=true
            - --code-challenge-method=S256
            - --insecure-oidc-allow-unverified-email=true
            - --oidc-extra-audience=invoiceninja
            - --scope=openid email profile
          env:
            - name: INVOICENINJA_OIDC_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: INVOICENINJA_OIDC_SECRET
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: OAUTH2_PROXY_COOKIE_SECRET
          ports:
            - containerPort: 4180
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: 64Mi
              cpu: "50m"
            limits:
              memory: 128Mi
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy-invoiceninja
spec:
  selector:
    app: oauth2-proxy-invoiceninja
  ports:
    - port: 4180
      targetPort: 4180
