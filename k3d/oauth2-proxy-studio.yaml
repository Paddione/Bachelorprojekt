# ═══════════════════════════════════════════════════════════════════
# OAuth2 Proxy — Pocket ID SSO gateway for Coaching Studio
# Authenticates via OIDC, then forwards to studio-server:80.
# Mirrors oauth2-proxy-brett.yaml. (T001002)
# Coach allow-list: Pocket ID has no groups, so the previous
# --allowed-group=/coach-access gate is replaced by --authenticated-emails-file
# (ConfigMap `oauth2-proxy-studio-allowed-emails`). Add coach emails there.
# ═══════════════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth2-proxy-studio-allowed-emails
  labels:
    app: studio-server
data:
  # Coach allow-list. Must match users' Pocket ID email addresses.
  # (Was: /coach-access Keycloak group — Pocket ID has no groups.)
  allowed-emails: |
    patrick@korczewski.de
    quamain@web.de
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy-studio
  labels:
    app: studio-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy-studio
  template:
    metadata:
      labels:
        app: oauth2-proxy-studio
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: write-cookie-secret
          image: busybox:1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - printf 'cookie_secret = "%s"\n' "$(printf '%s' "$OAUTH2_PROXY_COOKIE_SECRET" | cut -c1-32)" > /run/config/oauth2-extra.cfg
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          env:
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: OAUTH2_PROXY_COOKIE_SECRET
          volumeMounts:
            - name: oauth2-config
              mountPath: /run/config
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.9.0@sha256:37c1570c0427e02fc7c947ef2c04e8995b8347b7abc9fcf1dbb4e376a4b221a7
          imagePullPolicy: Always
          args:
            - --config=/run/config/oauth2-extra.cfg
            - --provider=oidc
            - --client-id=studio
            - --client-secret=$(POCKET_ID_STUDIO_SECRET)
            - --redirect-url=http://studio.localhost/oauth2/callback
            - --oidc-issuer-url=http://pocket-id:1411
            - --ssl-insecure-skip-verify=true
            - --skip-oidc-discovery=true
            - --login-url=http://auth.localhost/authorize
            - --redeem-url=http://pocket-id:1411/api/oidc/token
            - --oidc-jwks-url=http://pocket-id:1411/.well-known/jwks.json
            - --profile-url=http://pocket-id:1411/api/oidc/userinfo
            - --upstream=http://studio-server:80
            - --http-address=0.0.0.0:4180
            - --cookie-secure=false
            - --cookie-name=_oauth2_proxy_studio
            - --authenticated-emails-file=/etc/oauth2/allowed-emails
            - --pass-access-token=true
            - --pass-authorization-header=true
            - --set-xauthrequest=true
            - --skip-provider-button=true
            - --code-challenge-method=S256
            - --insecure-oidc-allow-unverified-email=true
            - --oidc-extra-audience=studio
            - --scope=openid email profile
          env:
            - name: POCKET_ID_STUDIO_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: POCKET_ID_STUDIO_SECRET
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 4180
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: 64Mi
              cpu: "50m"
            limits:
              memory: 128Mi
              cpu: "200m"
          volumeMounts:
            - name: oauth2-config
              mountPath: /run/config
              readOnly: true
            - name: allowed-emails
              mountPath: /etc/oauth2
              readOnly: true
      volumes:
        - name: oauth2-config
          emptyDir: {}
        - name: allowed-emails
          configMap:
            name: oauth2-proxy-studio-allowed-emails
            items:
              - key: allowed-emails
                path: allowed-emails
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy-studio
  labels:
    app: studio-server
spec:
  selector:
    app: oauth2-proxy-studio
  ports:
    - port: 4180
      targetPort: 4180
---
# Public ingress at studio.localhost → oauth2-proxy → studio-server:80
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: studio-localhost
  labels:
    app: studio-server
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`studio.localhost`)
      kind: Rule
      services:
        - name: oauth2-proxy-studio
          port: 4180
