# ═══════════════════════════════════════════════════════════════════
# Collabora Online — Document editing (WOPI integration with Nextcloud)
# ═══════════════════════════════════════════════════════════════════
# Lives in the dedicated `workspace-office` namespace so it can run
# with CAP_SYS_ADMIN + MKNOD (needed for bind-mounting the systemplate
# into each document jail). See namespace.yaml for why.
#
# Required environment substitutions (kustomize-envsubst CMP in prod;
# inlined by envsubst in k3d/deploy.sh for local dev):
#   ${PROD_DOMAIN}   — production base domain (e.g. mentolder.de)
#   ${COLLABORA_ALIASGROUP1} — upstream WOPI host (auto-derived below)
#   ${COLLABORA_SERVER_NAME} — coolwsd server_name (auto-derived below)
#   ${COLLABORA_SSL_TERMINATION} — "true" behind TLS, "false" in dev
#
# The three COLLABORA_* vars are set by envsubst in the deploy path so
# one file covers both dev (http://nextcloud.workspace:80) and prod
# (https://files.${PROD_DOMAIN}) without a prod patch file.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: collabora
  namespace: workspace-office
  labels:
    app: collabora
spec:
  replicas: 1
  selector:
    matchLabels:
      app: collabora
  template:
    metadata:
      labels:
        app: collabora
    spec:
      containers:
        - name: collabora
          image: collabora/code:25.04.9.4.1
          # Run as root so coolwsd's forkit can exercise its bounding-set
          # caps effectively. The image's default user (`cool`, uid 1001)
          # has CapEff=0 even when SYS_ADMIN is in CapBnd — k8s only adds
          # non-root caps to the bounding set, not the effective set.
          # forkit drops to `cool` internally after creating the mount
          # namespaces and bind-mounting /opt/cool/systemplate into the
          # per-document jails.
          securityContext:
            runAsUser: 0
            capabilities:
              add: ["SYS_ADMIN", "MKNOD"]
          env:
            - name: aliasgroup1
              value: "${COLLABORA_ALIASGROUP1}"
            - name: server_name
              value: "${COLLABORA_SERVER_NAME}"
            - name: extra_params
              value: "--o:ssl.enable=false --o:ssl.termination=${COLLABORA_SSL_TERMINATION}"
            - name: username
              value: admin
            - name: password
              valueFrom:
                secretKeyRef:
                  name: collabora-secrets
                  key: COLLABORA_ADMIN_PASSWORD
            - name: dictionaries
              value: "de_DE en_US"
          ports:
            - containerPort: 9980
          readinessProbe:
            httpGet:
              path: /
              port: 9980
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 9980
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: 256Mi
              cpu: 200m
            limits:
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: collabora
  namespace: workspace-office
spec:
  selector:
    app: collabora
  ports:
    - port: 9980
      targetPort: 9980
