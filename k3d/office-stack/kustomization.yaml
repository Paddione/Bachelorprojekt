# ═══════════════════════════════════════════════════════════════════
# office-stack — Collabora Online in a dedicated privileged namespace
# ═══════════════════════════════════════════════════════════════════
# Flat base deployed via task workspace:office:deploy. Does not set a
# namespace transformer — every resource already names its own namespace
# (workspace-office) explicitly, so the base is overlay-agnostic.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - secret.yaml
  - collabora.yaml
  - ingress.yaml
