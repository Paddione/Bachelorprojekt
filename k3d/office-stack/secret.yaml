# ═══════════════════════════════════════════════════════════════════
# collabora-secrets — COLLABORA_ADMIN_PASSWORD for workspace-office
# ═══════════════════════════════════════════════════════════════════
# Real values are synced from the main `workspace/workspace-secrets`
# Secret by `task workspace:office:sync-secret` after the stack is
# first deployed. ArgoCD is instructed to skip syncing this resource
# so it doesn't overwrite the real value with the placeholder below.
# Dev deploys via k3d/deploy.sh start with the placeholder and are
# expected to run the sync task before opening the admin console.
apiVersion: v1
kind: Secret
metadata:
  name: collabora-secrets
  namespace: workspace-office
  annotations:
    argocd.argoproj.io/sync-options: Skip=true
type: Opaque
stringData:
  COLLABORA_ADMIN_PASSWORD: "devcollaboraadmin"
