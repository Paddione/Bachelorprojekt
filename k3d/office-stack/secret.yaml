# ═══════════════════════════════════════════════════════════════════
# collabora-secrets — COLLABORA_ADMIN_PASSWORD for workspace-office
# ═══════════════════════════════════════════════════════════════════
# Real values are synced from the main `workspace/workspace-secrets`
# Secret by `task workspace:office:sync-secret` after the stack is
# first deployed. Dev deploys start with the placeholder below and
# are expected to run the sync task before opening the admin console.
#
# `sealedsecrets.bitnami.com/managed: "true"` lets the SealedSecret
# controller adopt this Secret so the prod-env sealed file can
# overwrite the placeholder. Without it the controller errors with
# "already exists and is not managed by SealedSecret".
apiVersion: v1
kind: Secret
metadata:
  name: collabora-secrets
  namespace: workspace-office
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
type: Opaque
stringData:
  COLLABORA_ADMIN_PASSWORD: "devcollaboraadmin"
