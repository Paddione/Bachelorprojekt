# ═══════════════════════════════════════════════════════════════════
# OpenClaw Init Job
# Runs once after deploy. Seeds:
#   - Local admin account
#   - API key (stored as Secret openclaw-api-key)
#   - Model preset openclaw-assistant with system prompt
#   - 12 admin-only prompt shortcuts
# Idempotent: exits 0 immediately if openclaw-api-key Secret exists.
# ═══════════════════════════════════════════════════════════════════
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-init
  namespace: workspace
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openclaw-init
  namespace: workspace
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openclaw-init
subjects:
  - kind: ServiceAccount
    name: openclaw-init
    namespace: workspace
roleRef:
  kind: Role
  name: openclaw-init
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: openclaw-init
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      serviceAccountName: openclaw-init
      restartPolicy: OnFailure
      containers:
        - name: init
          image: alpine:3.19
          env:
            - name: OPENCLAW_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: OPENCLAW_ADMIN_EMAIL
            - name: OPENCLAW_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: OPENCLAW_ADMIN_PASSWORD
            # System prompt stored as env var (avoids heredoc-in-YAML-block-scalar issues)
            - name: SYSTEM_PROMPT
              value: |
                You are OpenClaw, the AI workspace assistant for this self-hosted collaboration platform.
                You have access to MCP tools for Kubernetes cluster management, PostgreSQL database inspection, and browser automation.

                ## Tool Usage Rules

                Use MCP tools ONLY when the request requires real-time data or a live action. For explanations, general questions, or anything answerable from training, respond directly.

                - Call ONE tool at a time. Evaluate the result before deciding if another call is needed.
                - Never call tools speculatively. Only invoke a tool when the request clearly requires it.
                - When tool results are large (log dumps, query results), summarize key information. Do not repeat raw output verbatim.
                - Always confirm before destructive actions (pod deletion, restarts, data changes).

                ## Tool Selection

                Pod status, deployments, namespaces, events, logs -> mcp-kubernetes
                Database queries, schema, table sizes, locks -> mcp-postgres
                Web browsing, screenshots, UI checks -> mcp-browser

                ## Scope

                You manage the workspace Kubernetes namespace. When asked about the cluster or the platform, scope queries to workspace unless told otherwise.
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              apk add --no-cache curl jq > /dev/null 2>&1

              KUBE_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              KUBE_NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
              KUBE_CA="--cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
              KUBE_API="https://kubernetes.default.svc"
              OPENCLAW="http://openclaw:8080"

              # --- Idempotency: skip if already initialized ---
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" $KUBE_CA -H "Authorization: Bearer $KUBE_TOKEN" "${KUBE_API}/api/v1/namespaces/${KUBE_NS}/secrets/openclaw-api-key")
              if [ "$STATUS" = "200" ]; then
                echo "openclaw-api-key already exists — init already done, exiting."
                exit 0
              fi

              # --- Wait for OpenClaw to become ready ---
              echo "Waiting for OpenClaw..."
              RETRIES=0
              until curl -sf "${OPENCLAW}/health" > /dev/null 2>&1; do
                RETRIES=$((RETRIES + 1))
                if [ "$RETRIES" -ge 20 ]; then
                  echo "ERROR: OpenClaw not ready after 10 minutes"
                  exit 1
                fi
                echo "  attempt ${RETRIES}/20, retrying in 30s..."
                sleep 30
              done
              echo "OpenClaw is ready."

              # --- Create admin account (tolerate 4xx if user already exists) ---
              SIGNUP_BODY=$(jq -n --arg name "Admin" --arg email "$OPENCLAW_ADMIN_EMAIL" --arg pw "$OPENCLAW_ADMIN_PASSWORD" \
                '{"name":$name,"email":$email,"password":$pw}')
              curl -s -X POST "${OPENCLAW}/api/v1/auths/signup" -H "Content-Type: application/json" -d "$SIGNUP_BODY" > /dev/null 2>&1 \
                && echo "Admin account created." \
                || echo "Signup returned error (user may already exist), continuing."

              # --- Sign in ---
              SIGNIN=$(curl -s -X POST "${OPENCLAW}/api/v1/auths/signin" -H "Content-Type: application/json" -d "{\"email\":\"${OPENCLAW_ADMIN_EMAIL}\",\"password\":\"${OPENCLAW_ADMIN_PASSWORD}\"}")
              SESSION_TOKEN=$(echo "$SIGNIN" | jq -r '.token')
              if [ -z "$SESSION_TOKEN" ] || [ "$SESSION_TOKEN" = "null" ]; then
                echo "ERROR: Sign-in failed. Response: $SIGNIN"
                exit 1
              fi
              echo "Signed in."

              # --- Ensure admin role (OIDC user may have claimed first-user slot) ---
              ROLE=$(echo "$SIGNIN" | jq -r '.role')
              if [ "$ROLE" != "admin" ]; then
                echo "Account has role='${ROLE}' — promoting to admin via kubectl exec..."
                ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
                curl -sfLo /tmp/kubectl \
                  "https://dl.k8s.io/release/v1.31.4/bin/linux/${ARCH}/kubectl" \
                  && chmod +x /tmp/kubectl \
                  || { echo "ERROR: kubectl download failed"; exit 1; }
                E="$OPENCLAW_ADMIN_EMAIL"
                OC_POD=$(curl -sf $KUBE_CA -H "Authorization: Bearer $KUBE_TOKEN" \
                  "${KUBE_API}/api/v1/namespaces/${KUBE_NS}/pods?labelSelector=app%3Dopenclaw" \
                  | jq -r '.items[0].metadata.name')
                /tmp/kubectl --server="$KUBE_API" --token="$KUBE_TOKEN" \
                  --certificate-authority="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt" \
                  exec -n "$KUBE_NS" "$OC_POD" -- \
                  python3 -c "import sqlite3;db=sqlite3.connect('/app/backend/data/webui.db');db.execute(\"UPDATE user SET role='admin' WHERE email='$E'\");db.commit();db.close()"
                echo "Promoted. Re-signing in..."
                SIGNIN=$(curl -s -X POST "${OPENCLAW}/api/v1/auths/signin" \
                  -H "Content-Type: application/json" \
                  -d "{\"email\":\"${OPENCLAW_ADMIN_EMAIL}\",\"password\":\"${OPENCLAW_ADMIN_PASSWORD}\"}")
                SESSION_TOKEN=$(echo "$SIGNIN" | jq -r '.token')
              fi

              # --- Generate API key ---
              APIKEY_RESP=$(curl -s -X POST "${OPENCLAW}/api/v1/auths/api_key" -H "Authorization: Bearer $SESSION_TOKEN")
              API_KEY=$(echo "$APIKEY_RESP" | jq -r '.api_key')
              if [ -z "$API_KEY" ] || [ "$API_KEY" = "null" ]; then
                echo "ERROR: API key generation failed. Response: $APIKEY_RESP"
                exit 1
              fi
              echo "API key generated."

              # --- Store API key as Kubernetes Secret ---
              SECRET_BODY=$(jq -n --arg key "$API_KEY" --arg ns "$KUBE_NS" \
                '{"apiVersion":"v1","kind":"Secret","metadata":{"name":"openclaw-api-key","namespace":$ns},"stringData":{"key":$key}}')
              curl -sf -X POST $KUBE_CA \
                -H "Authorization: Bearer $KUBE_TOKEN" \
                -H "Content-Type: application/json" \
                "${KUBE_API}/api/v1/namespaces/${KUBE_NS}/secrets" \
                -d "$SECRET_BODY" > /dev/null
              echo "API key stored as Secret openclaw-api-key."

              # --- Create model preset with system prompt (SYSTEM_PROMPT from env) ---
              MODEL_BODY=$(jq -n --arg sys "$SYSTEM_PROMPT" \
                '{"id":"openclaw-assistant","name":"OpenClaw Assistant","base_model_id":"claude-sonnet-4-20250514",
                  "params":{"system":$sys},"meta":{"description":"Workspace assistant with MCP tool guidance"},
                  "access_control":null,"is_active":true}')
              curl -s -X POST "${OPENCLAW}/api/v1/models/create" \
                -H "Authorization: Bearer $API_KEY" \
                -H "Content-Type: application/json" \
                -d "$MODEL_BODY" > /dev/null
              echo "Model preset openclaw-assistant created."

              # --- Helper: create one prompt shortcut if not already present ---
              seed_prompt() {
                CMD="$1"; TITLE="$2"; CONTENT="$3"
                EXISTING=$(curl -s "${OPENCLAW}/api/v1/prompts/" -H "Authorization: Bearer $API_KEY" \
                  | jq -r --arg cmd "$CMD" '.[] | select(.command == $cmd) | .command')
                if [ -n "$EXISTING" ]; then
                  echo "  $CMD already exists, skipping."
                  return 0
                fi
                PROMPT_BODY=$(jq -n --arg cmd "$CMD" --arg title "$TITLE" --arg content "$CONTENT" \
                  '{"command":$cmd,"title":$title,"content":$content,"access_control":{"read":{"group_ids":[],"user_ids":[]},"write":{"group_ids":[],"user_ids":[]}}}')
                curl -s -X POST "${OPENCLAW}/api/v1/prompts/create" \
                  -H "Authorization: Bearer $API_KEY" \
                  -H "Content-Type: application/json" \
                  -d "$PROMPT_BODY" > /dev/null
                echo "  Created $CMD"
              }

              echo "Seeding admin prompt shortcuts..."
              seed_prompt "/k8s-status"    "K8s: Pod Status"      "List all pods in the workspace namespace with their status, restart count, and age."
              seed_prompt "/k8s-events"    "K8s: Warning Events"  "List all Warning events in the workspace namespace from the last hour."
              seed_prompt "/k8s-logs"      "K8s: Pod Logs"        "Show the last 100 log lines for the [SERVICE] pod in the workspace namespace."
              seed_prompt "/k8s-restart"   "K8s: Restart Service" "Restart the [SERVICE] deployment in the workspace namespace. Ask me to confirm before proceeding."
              seed_prompt "/k8s-resources" "K8s: Resource Usage"  "Show CPU and memory usage for all pods in the workspace namespace."
              seed_prompt "/k8s-describe"  "K8s: Describe Pod"    "Describe the [SERVICE] pod in the workspace namespace including its events and conditions."
              seed_prompt "/db-stats"      "DB: Database Stats"   "Show the size, connection count, and last activity timestamp for each database on the shared PostgreSQL instance."
              seed_prompt "/db-tables"     "DB: Table Sizes"      "List all tables in the [DATABASE] database with their row counts and disk sizes, ordered by size descending."
              seed_prompt "/db-query"      "DB: Run Query"        "Run the following read-only SQL query against the [DATABASE] database: [SQL]"
              seed_prompt "/db-locks"      "DB: Active Locks"     "Show any active locks or long-running queries (>5 seconds) on the shared PostgreSQL instance."
              seed_prompt "/screenshot"    "Browser: Screenshot"  "Navigate to [URL] and take a screenshot."
              seed_prompt "/check-service" "Browser: Check Service" "Navigate to [URL], take a screenshot, and report whether the service appears to be working correctly."

              echo "Init complete."
          resources:
            requests:
              memory: 32Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 100m
