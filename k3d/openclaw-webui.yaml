apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-data
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  labels:
    app: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          env:
            # ─── LLM Backend (Claude only) ────────────────────
            - name: OPENAI_API_BASE_URLS
              value: "https://api.anthropic.com/v1"
            - name: OPENAI_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: homeoffice-secrets
                  key: ANTHROPIC_API_KEY
            # ─── Defaults ─────────────────────────────────────
            - name: DEFAULT_MODELS
              value: "claude-sonnet-4-20250514"
            - name: DEFAULT_USER_ROLE
              value: "user"
            # ─── Disable external connections ──────────────────
            - name: ENABLE_RAG_WEB_SEARCH
              value: "false"
            - name: ENABLE_IMAGE_GENERATION
              value: "false"
            # ─── Keycloak OIDC SSO ────────────────────────────
            - name: ENABLE_OAUTH_SIGNUP
              value: "true"
            - name: OAUTH_PROVIDER_NAME
              value: "Keycloak"
            - name: OPENID_PROVIDER_URL
              valueFrom:
                configMapKeyRef:
                  name: openclaw-config
                  key: OPENID_PROVIDER_URL
            - name: OAUTH_CLIENT_ID
              value: "openclaw"
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: homeoffice-secrets
                  key: OPENCLAW_OIDC_SECRET
            - name: OAUTH_SCOPES
              value: "openid email profile"
            # ─── Admin & Webhooks ─────────────────────────────
            - name: ENABLE_ADMIN_CHAT_ACCESS
              value: "true"
            - name: WEBHOOK_URL
              valueFrom:
                configMapKeyRef:
                  name: openclaw-config
                  key: MATTERMOST_WEBHOOK_URL
            # ─── Branding ─────────────────────────────────────
            - name: WEBUI_NAME
              value: "OpenClaw"
            - name: WEBUI_SECRET_KEY
              value: "dev-secret-key-12345"
            # ─── MCP Endpoints ─────────────────────────────────
            - name: MCP_KUBERNETES_URL
              valueFrom: { configMapKeyRef: { name: openclaw-config, key: MCP_KUBERNETES_URL } }
            - name: MCP_POSTGRES_URL
              valueFrom: { configMapKeyRef: { name: openclaw-config, key: MCP_POSTGRES_URL } }
            - name: MCP_MATTERMOST_URL
              valueFrom: { configMapKeyRef: { name: openclaw-config, key: MCP_MATTERMOST_URL } }
            - name: MCP_NEXTCLOUD_URL
              valueFrom: { configMapKeyRef: { name: openclaw-config, key: MCP_NEXTCLOUD_URL } }
            - name: MCP_INVOICENINJA_URL
              valueFrom: { configMapKeyRef: { name: openclaw-config, key: MCP_INVOICENINJA_URL } }
            - name: MCP_KEYCLOAK_URL
              valueFrom: { configMapKeyRef: { name: openclaw-config, key: MCP_KEYCLOAK_URL } }
            - name: MCP_GITHUB_URL
              valueFrom: { configMapKeyRef: { name: openclaw-config, key: MCP_GITHUB_URL } }
            - name: MCP_STRIPE_URL
              valueFrom: { configMapKeyRef: { name: openclaw-config, key: MCP_STRIPE_URL } }
            - name: MCP_WORDPRESS_URL
              valueFrom: { configMapKeyRef: { name: openclaw-config, key: MCP_WORDPRESS_URL } }
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: 256Mi
              cpu: 200m
            limits:
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-data
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
spec:
  selector:
    app: openclaw
  ports:
    - port: 8080
      targetPort: 8080
