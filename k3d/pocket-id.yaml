# ═══════════════════════════════════════════════════════════════════
# Pocket ID — passkey-first OIDC identity provider
# Keycloak fully replaced — Pocket ID now owns the auth.* domain.
# Container port 1411. Cluster-internal Service: http://pocket-id:1411.
# Public hostname: ${POCKET_ID_DOMAIN} (auth.localhost in dev, auth.${PROD_DOMAIN} in prod).
# POCKET_ID_FRONTEND_URL is set to https://auth.${PROD_DOMAIN} in prod env files.
# ═══════════════════════════════════════════════════════════════════
---
# DB-init Job — idempotently creates the `pocket_id` database + role on
# shared-db. Both brands share the shared-db Deployment (one logical DB per
# brand, namespace-isolated by the deploy target). Pocket ID stores the
# initial admin + OIDC client config in this DB; subsequent restarts no-op.
apiVersion: batch/v1
kind: Job
metadata:
  name: pocket-id-db-init
  labels:
    app: pocket-id
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: pocket-id
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-db
          # pg_isready checks actual PostgreSQL readiness (not just TCP open).
          # nc -z only verifies TCP — shared-db accepts connections before it
          # can serve queries, so pocket-id would crash on its 3-retry startup.
          image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
          command: ['sh', '-c', 'until pg_isready -h shared-db -p 5432 -U pocket_id -d pocket_id -q; do echo "waiting for shared-db..."; sleep 2; done']
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
      containers:
        - name: psql
          image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: SHARED_DB_PASSWORD
            - name: POCKET_ID_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: POCKET_ID_DB_PASSWORD
            - name: POCKET_ID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: POCKET_ID_API_KEY
          command:
            - /bin/sh
            - -ec
            - |
              psql -v ON_ERROR_STOP=0 --username postgres --host shared-db <<'EOSQL'
              SELECT 'CREATE DATABASE pocket_id'
                WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'pocket_id')
                \gexec
              DO $$ BEGIN
                CREATE ROLE pocket_id LOGIN PASSWORD :'pocket_id_pw';
              EXCEPTION WHEN duplicate_object THEN NULL; END $$;
              GRANT ALL PRIVILEGES ON DATABASE pocket_id TO pocket_id;
              EOSQL
              psql -v ON_ERROR_STOP=0 --username postgres --host shared-db --dbname pocket_id <<'EOSQL'
              GRANT ALL ON SCHEMA public TO pocket_id;
              EOSQL

              # T001853: idempotent Pocket-ID admin bootstrap (admin user +
              # seed-deploy api_keys row). Closes a chicken-and-egg: the
              # pocket-id-client-seed Job authenticates with
              # workspace-secrets.POCKET_ID_API_KEY, but that key was
              # previously never registered in api_keys — only ever created
              # manually via the Pocket-ID UI. This Job runs BEFORE the
              # Pocket-ID app (which owns users/api_keys via its own
              # migrations), so wait for the api_keys table to exist, capped
              # at ~120s. Best-effort / non-fatal: on prod ON CONFLICT DO
              # NOTHING makes both inserts a no-op (rows already exist); on a
              # fresh cluster that misses the window, the bootstrap is simply
              # skipped and the deploy proceeds (rerun the Job or redeploy to
              # retry).
              echo "Waiting for pocket_id.api_keys table (Pocket-ID app migrations)..."
              ready=0
              for i in $(seq 1 60); do
                exists=$(psql -X -A -t --username postgres --host shared-db --dbname pocket_id \
                  -c "SELECT to_regclass('public.api_keys')" 2>/dev/null || true)
                if [ -n "$exists" ]; then
                  ready=1
                  break
                fi
                sleep 2
              done
              if [ "$ready" != "1" ]; then
                echo "SKIP: pocket_id.api_keys table not present after ~120s — Pocket-ID app hasn't migrated yet. Bootstrap skipped (non-fatal)."
                exit 0
              fi
              psql -v ON_ERROR_STOP=0 --username postgres --host shared-db --dbname pocket_id <<EOSQL
              INSERT INTO users (id, created_at, username, email, first_name, last_name, is_admin, display_name, email_verified)
              VALUES ('a0000000-0000-4000-8000-000000000001', now(), 'paddione', 'admin@bootstrap.invalid', 'Admin', 'Bootstrap', true, 'Admin (Bootstrap)', true)
              ON CONFLICT (username) DO NOTHING;

              INSERT INTO api_keys (id, name, key, description, expires_at, created_at, user_id)
              VALUES (gen_random_uuid(), 'seed-deploy',
                      encode(sha256(convert_to('$POCKET_ID_API_KEY', 'UTF8')), 'hex'),
                      'bootstrap key for pocket-id-client-seed (sha256 of workspace-secrets.POCKET_ID_API_KEY)',
                      '4051-01-01T00:00:00Z', now(), 'a0000000-0000-4000-8000-000000000001')
              ON CONFLICT (key) DO NOTHING;
              EOSQL
              echo "✓ Pocket-ID admin bootstrap complete"
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
# Pocket ID Deployment — runs the stonith404/pocket-id server on port 1411.
# Env is built from:
#   - domain-config (POCKET_ID_DOMAIN via configMapKeyRef)
#   - workspace-secrets (DB password, SMTP, API key)
#   - literal envsubst (POCKET_ID_FRONTEND_URL, POCKET_ID_URL — envsubst'd at
#     deploy time by Taskfile workspace:deploy; POCKET_ID_URL stays
#     http://pocket-id:1411 in both dev and prod because both namespaces
#     resolve the Service via cluster DNS).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pocket-id
  labels:
    app: pocket-id
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pocket-id
  template:
    metadata:
      labels:
        app: pocket-id
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-db
          # pg_isready checks actual PostgreSQL readiness (not just TCP open).
          # nc -z only verifies TCP — shared-db accepts connections before it
          # can serve queries, so pocket-id would crash on its 3-retry startup.
          image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
          command: ['sh', '-c', 'until pg_isready -h shared-db -p 5432 -U pocket_id -d pocket_id -q; do echo "waiting for shared-db..."; sleep 2; done']
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
      containers:
        - name: pocket-id
          image: ghcr.io/pocket-id/pocket-id:v2.9.0@sha256:a2a38a96699d7483d65b5849b015d954f294938306a03a9c0699bc5b79554e86
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: APP_URL
              value: "${POCKET_ID_FRONTEND_URL}"
            - name: TRUST_PROXY
              value: "true"
            - name: POCKET_ID_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: domain-config
                  key: POCKET_ID_DOMAIN
            - name: POCKET_ID_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: POCKET_ID_DB_PASSWORD
            - name: DB_CONNECTION_STRING
              value: "postgresql://pocket_id:$(POCKET_ID_DB_PASSWORD)@shared-db:5432/pocket_id?sslmode=disable"
            # Magic-link email delivery (Pocket ID's only auth fallback)
            - name: SMTP_HOST
              value: "${SMTP_HOST}"
            - name: SMTP_PORT
              value: "${SMTP_PORT}"
            - name: SMTP_TLS
              value: "${POCKET_ID_SMTP_TLS}"
            - name: SMTP_USER
              value: "${SMTP_USER}"
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: SMTP_PASSWORD
            - name: SMTP_FROM
              value: "${SMTP_FROM}"
            # API key for the website's identity.ts caller — generated at
            # env:seal time and stored under workspace-secrets.POCKET_ID_API_KEY.
            - name: POCKET_ID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: POCKET_ID_API_KEY
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: POCKET_ID_ENCRYPTION_KEY
          ports:
            - containerPort: 1411
          startupProbe:
            httpGet:
              path: /.well-known/openid-configuration
              port: 1411
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /.well-known/openid-configuration
              port: 1411
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /.well-known/openid-configuration
              port: 1411
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 3
          resources:
            requests:
              memory: 64Mi
              cpu: "50m"
            limits:
              memory: 128Mi
              cpu: "200m"
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pocket-id-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pocket-id-data
  labels:
    app: pocket-id
spec:
  storageClassName: local-path
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: pocket-id
  labels:
    app: pocket-id
spec:
  selector:
    app: pocket-id
  ports:
    - name: http
      port: 1411
      targetPort: 1411
---
# Dev IngressRoute — web entrypoint (no TLS). Prod overlay (prod/patch-pocket-id.yaml)
# patches this to websecure + tls: secretName: ${TLS_SECRET_NAME} + Host(`id.${PROD_DOMAIN}`).
#
# NOTE (T001397): this IngressRoute intentionally does NOT set a
# `spec`-level trusted-proxy-IPs block (the "forward headers" trustedIPs
# setting) — that field has never been valid on any Traefik IngressRoute CRD
# version (it only exists as Traefik's static/entry-point config); the live
# `fleet` cluster's installed CRD only declares entryPoints/parentRefs/
# routes/tls. `kubectl apply --server-side` rejects unknown fields and
# previously aborted the whole deploy chain here. The real-client-IP
# problem T001328 introduced this field for is already fixed by T001341
# (Traefik hostPort DaemonSet, no SNAT hop), so no equivalent replacement is
# needed. See tests/spec/pocket-id-proxy-ip.bats.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pocket-id
  labels:
    app: pocket-id
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`${POCKET_ID_DOMAIN}`)
      services:
        - name: pocket-id
          port: 1411
