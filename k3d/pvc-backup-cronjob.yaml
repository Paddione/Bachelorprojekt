# ═══════════════════════════════════════════════════════════════════
# PVC Data Backup — daily encrypted tar archives of file-backed PVCs
# SA-07: Daily at 03:00 UTC (one hour after db-backup at 02:00)
#
# Design (T000317): the orchestrator pod clones the two Longhorn data
# PVCs (vaultwarden) via CSI dataSource so the backup mounts
# placement-independent copies — never the live RWO volumes, which
# deadlock on Multi-Attach when the app pod runs on another node.
# nextcloud-data stays on local-path (no clone support) and is mounted
# directly by the mounter, which is co-located with the nextcloud pod
# via podAffinity (same node → local-path is shareable). After the
# mounter Job completes, the orchestrator deletes the clones.
# ═══════════════════════════════════════════════════════════════════
apiVersion: batch/v1
kind: CronJob
metadata:
  name: pvc-backup
  namespace: workspace
  labels:
    app: backup
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app: pvc-backup
        spec:
          serviceAccountName: pvc-backup
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: orchestrator
              image: alpine/k8s:1.36.2@sha256:44ef4942e171939b9c665a4a84beb80e2dcdb9a24330d4651cfdfd2e9deecc47
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 65534
                capabilities:
                  drop: ["ALL"]
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  # Derive the namespace at runtime from the pod's serviceaccount.
                  # kustomize namespace-remapping does NOT rewrite string literals
                  # in container args, so a hardcoded NS=workspace operated in the
                  # wrong namespace on the korczewski brand (workspace-korczewski)
                  # and hit RBAC Forbidden. [T000368]
                  NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
                  STAMP=$(date +%Y%m%d-%H%M%S)
                  MOUNTER="pvc-backup-mounter-$${STAMP}"

                  # Longhorn supports CSI clone (placement-independent copy);
                  # local-path does NOT. Detect each data PVC's storageclass so
                  # we ONLY clone the longhorn-backed sources. local-path sources
                  # are mounted LIVE (readOnly) by the mounter, which is then
                  # co-located on the owning pod's node via podAffinity so the
                  # RWO local-path volume is shareable — the same model already
                  # used for nextcloud-data. mentolder keeps both data PVCs on
                  # longhorn (cloned); korczewski has no Longhorn install, so its
                   # vaultwarden PVC stays on local-path and is tarred
                   # live. [T000403]
                   VW_SC=$(kubectl -n "$NS" get pvc vaultwarden-data-pvc -o jsonpath='{.spec.storageClassName}')

                   CLONES=""
                   [ "$VW_SC" = "longhorn" ] && CLONES="$CLONES vaultwarden-data-backup-clone"

                  # Each data volume points at its clone (longhorn) or its live
                  # PVC (local-path). The mounter co-locates with every live
                  # local-path source's owning pod via these podAffinity terms.
                  if [ "$VW_SC" = "longhorn" ]; then
                    VW_CLAIM="vaultwarden-data-backup-clone"; VW_AFFINITY=""
                  else
                    VW_CLAIM="vaultwarden-data-pvc"
                    VW_AFFINITY="
                              - labelSelector: { matchLabels: { app: vaultwarden } }
                                topologyKey: kubernetes.io/hostname"
                  fi


                  cleanup() {
                    echo "Cleanup: deleting mounter Job and clone PVCs..."
                    kubectl -n "$NS" delete job "$MOUNTER" --ignore-not-found --wait=true || true
                    for c in $CLONES; do
                      kubectl -n "$NS" delete pvc "$c" --ignore-not-found || true
                    done
                  }
                  trap cleanup EXIT

                  # Stale clones from a crashed prior run would block creation.
                  for c in $CLONES; do
                    kubectl -n "$NS" delete pvc "$c" --ignore-not-found || true
                  done

                  if [ -n "$CLONES" ]; then
                    echo "Creating clone PVCs from live Longhorn volumes..."
                     VW_SIZE=$(kubectl -n "$NS" get pvc vaultwarden-data-pvc -o jsonpath='{.spec.resources.requests.storage}')
                    for c in $CLONES; do
                      case "$c" in
                       vaultwarden-data-backup-clone) SRC=vaultwarden-data-pvc; SIZE=$VW_SIZE ;;
                      esac
                      kubectl -n "$NS" apply -f - <<CLONE
                  apiVersion: v1
                  kind: PersistentVolumeClaim
                  metadata:
                    name: $${c}
                    labels: { app: pvc-backup }
                  spec:
                    storageClassName: longhorn
                    accessModes: ["ReadWriteOnce"]
                    resources: { requests: { storage: $${SIZE} } }
                    dataSource: { kind: PersistentVolumeClaim, name: $${SRC} }
                  CLONE
                    done

                    echo "Waiting for clone PVCs to bind..."
                    for c in $CLONES; do
                      for i in $(seq 1 60); do
                        PHASE=$(kubectl -n "$NS" get pvc "$c" -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
                        [ "$PHASE" = "Bound" ] && break
                        sleep 5
                      done
                      [ "$PHASE" = "Bound" ] || { echo "Clone $c did not bind (phase=$PHASE)"; exit 1; }
                      echo "  ✓ $c Bound"
                    done
                  else
                    echo "No longhorn-backed data PVCs — all sources mounted live (local-path)."
                  fi

                  echo "Launching mounter Job $MOUNTER..."
                  kubectl -n "$NS" apply -f - <<MJOB
                  apiVersion: batch/v1
                  kind: Job
                  metadata:
                    name: $${MOUNTER}
                    labels: { app: pvc-backup, role: mounter }
                  spec:
                    backoffLimit: 0
                    activeDeadlineSeconds: 3000
                    template:
                      metadata:
                        labels: { app: pvc-backup, role: mounter }
                      spec:
                        restartPolicy: Never
                        affinity:
                          # Co-locate with the nextcloud pod so its local-path
                          # volume is shareable (same node). This podAffinity is
                          # sufficient for placement; the former nodeAffinity NotIn
                          # list referenced decommissioned nodes (k3s-1/2/3,
                          # k3w-1/2/3) that no longer exist on fleet — dead drift,
                          # removed. [T000368]
                          # When a data PVC is local-path (korczewski), the per-source
                          # affinity snippets below add a podAffinity term for that
                          # source's owning pod so the LIVE RWO volume is shareable on
                          # the same node; they are empty for longhorn-cloned sources
                          # (mentolder), leaving only the nextcloud term. [T000403]
                          podAffinity:
                            requiredDuringSchedulingIgnoredDuringExecution:
                              - labelSelector: { matchLabels: { app: nextcloud } }
                                topologyKey: kubernetes.io/hostname$${VW_AFFINITY}
                        securityContext:
                          runAsNonRoot: true
                          runAsUser: 65534
                          fsGroup: 65534
                          supplementalGroups: [33]
                          seccompProfile: { type: RuntimeDefault }
                        containers:
                          - name: backup
                            image: pgvector/pgvector:0.8.5-pg16@sha256:1d533553fefe4f12e5d80c7b80622ba0c382abb5758856f52983d8789179f0fb
                            imagePullPolicy: IfNotPresent
                            securityContext:
                              allowPrivilegeEscalation: false
                              runAsNonRoot: true
                              runAsUser: 65534
                              capabilities: { drop: ["ALL"] }
                            env:
                              - name: BACKUP_PASSPHRASE
                                valueFrom: { secretKeyRef: { name: workspace-secrets, key: BACKUP_PASSPHRASE } }
                              - name: BRAND
                                valueFrom: { configMapKeyRef: { name: backup-config, key: BRAND } }
                              - name: FILEN_DEFAULT_UPLOAD_PATH
                                valueFrom: { configMapKeyRef: { name: backup-config, key: FILEN_DEFAULT_UPLOAD_PATH } }
                              - name: FILEN_EMAIL
                                valueFrom: { secretKeyRef: { name: workspace-secrets, key: FILEN_EMAIL, optional: true } }
                              - name: FILEN_PASSWORD
                                valueFrom: { secretKeyRef: { name: workspace-secrets, key: FILEN_PASSWORD, optional: true } }
                            command: ["/bin/bash", "-c"]
                            args:
                              - |
                                set -euo pipefail
                                sleep 5
                                STAMP=\$(date +%Y%m%d-%H%M%S)
                                BACKUP_DIR=/backups/pvc-\${STAMP}
                                mkdir -p "\${BACKUP_DIR}"
                                FAILED=0
                                backup_dir() {
                                  SRC="\$1"; OUT="\$2"; LABEL="\$3"
                                  echo "Backing up \${LABEL} (\${SRC})..."
                                  if [ "\$(ls -A "\${SRC}" 2>/dev/null)" ]; then
                                    tar czf - -C "\${SRC}" . \
                                      | openssl enc -aes-256-cbc -salt -pbkdf2 \
                                          -out "\${BACKUP_DIR}/\${OUT}" -pass env:BACKUP_PASSPHRASE \
                                      && echo "  ✓ \${LABEL} OK (\$(ls -lh "\${BACKUP_DIR}/\${OUT}" | awk '{print \$5}'))" \
                                      || { echo "  ✗ \${LABEL} FAILED"; FAILED=\$((FAILED+1)); }
                                  else
                                    echo "  ⚠ \${SRC} empty — skipping"
                                  fi
                                }
                                backup_dir /nextcloud-data   nextcloud-files.tar.gz.enc  nextcloud-data
                                backup_dir /vaultwarden-data vaultwarden-data.tar.gz.enc vaultwarden-data

                                find /backups -maxdepth 1 -type d -name 'pvc-*' -mtime +30 -exec rm -rf {} +
                                printf '%s' "\${FILEN_DEFAULT_UPLOAD_PATH}" > /staging/.filen_path
                                printf '%s' "pvc-\${STAMP}" > /staging/.done
                                echo "PVC backup complete: \${BACKUP_DIR}"
                                ls -lh "\${BACKUP_DIR}/"
                                [ "\${FAILED}" -eq 0 ] || { echo "WARN: \${FAILED} backup(s) failed"; exit 1; }
                            volumeMounts:
                              - { name: backup-storage,   mountPath: /backups }
                              - { name: nextcloud-data,   mountPath: /nextcloud-data,   readOnly: true }
                              - { name: vaultwarden-data, mountPath: /vaultwarden-data, readOnly: true }

                              - { name: staging,          mountPath: /staging }
                            resources:
                              requests: { memory: 256Mi, cpu: "200m" }
                              limits:   { memory: 1Gi,   cpu: "1" }
                          - name: filen-upload
                            image: node:22-alpine@sha256:16e22a550f3863206a3f701448c45f7912c6896a62de43add43bb9c86130c3e2
                            imagePullPolicy: IfNotPresent
                            securityContext:
                              allowPrivilegeEscalation: false
                              capabilities: { drop: ["ALL"] }
                            command: ["/bin/sh", "-c"]
                            args:
                              - |
                                if [ -z "\${FILEN_EMAIL}" ] || [ -z "\${FILEN_PASSWORD}" ]; then
                                  echo "Filen not configured — skipping remote backup"
                                  until [ -f /staging/.done ]; do sleep 2; done
                                  exit 0
                                fi
                                echo "Waiting for backup to complete..."
                                until [ -f /staging/.done ]; do sleep 2; done
                                STAMP=\$(cat /staging/.done)
                                UPLOAD_PATH=\$(cat /staging/.filen_path)
                                echo "Installing Filen CLI..."
                                export HOME=/tmp
                                npm install -g @filen/cli --prefix /tmp/npm-global 2>&1 \
                                  || { echo "ERROR: filen-cli install failed"; exit 1; }
                                export PATH="/tmp/npm-global/bin:\$PATH"
                                echo "Uploading \${STAMP} to Filen: \${UPLOAD_PATH}/\${STAMP}/"
                                if ! filen --email "\${FILEN_EMAIL}" --password "\${FILEN_PASSWORD}" \
                                     upload "/backups/\${STAMP}/" "\${UPLOAD_PATH}/\${STAMP}/"; then
                                  echo "ERROR: Filen remote upload failed for \${STAMP} — local backup on backup-pvc is intact."
                                  echo "       Likely cause: invalid credentials, or 2FA enabled (this job requires 2FA OFF)."
                                  exit 1
                                fi
                                echo "Filen upload done"
                            env:
                              - name: FILEN_EMAIL
                                valueFrom: { secretKeyRef: { name: workspace-secrets, key: FILEN_EMAIL, optional: true } }
                              - name: FILEN_PASSWORD
                                valueFrom: { secretKeyRef: { name: workspace-secrets, key: FILEN_PASSWORD, optional: true } }
                            volumeMounts:
                              - { name: backup-storage, mountPath: /backups, readOnly: true }
                              - { name: staging,        mountPath: /staging, readOnly: true }
                            resources:
                              requests: { memory: 256Mi, cpu: "100m" }
                              limits:   { memory: 512Mi, cpu: "500m" }
                        volumes:
                          - name: backup-storage
                            persistentVolumeClaim: { claimName: backup-pvc }
                          - name: nextcloud-data
                            persistentVolumeClaim: { claimName: nextcloud-data-pvc }
                          - name: vaultwarden-data
                            persistentVolumeClaim: { claimName: $${VW_CLAIM} }

                          - name: staging
                            emptyDir: {}
                  MJOB

                  echo "Waiting for mounter Job to finish..."
                  kubectl -n "$NS" wait --for=condition=complete --timeout=3000s job/"$MOUNTER" &
                  CW=$!
                  kubectl -n "$NS" wait --for=condition=failed --timeout=3000s job/"$MOUNTER" &
                  FW=$!
                  wait -n || true
                  kill "$CW" "$FW" 2>/dev/null || true
                  STATUS=$(kubectl -n "$NS" get job "$MOUNTER" -o jsonpath='{.status.conditions[?(@.type=="Complete")].status}')
                  echo "Mounter logs:"
                  kubectl -n "$NS" logs job/"$MOUNTER" --all-containers --tail=80 || true
                  echo "Mounter terminal status: Complete=${STATUS:-Unknown}"
                  [ "$STATUS" = "True" ] || { echo "Backup mounter did not complete"; exit 1; }
                  echo "pvc-backup orchestration succeeded."
              resources:
                requests: { memory: 64Mi, cpu: "50m" }
                limits:   { memory: 256Mi, cpu: "500m" }
