# RBAC for the pvc-backup orchestrator: manage ephemeral clone PVCs and the
# mounter Job within the workspace namespace. [T000317]
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pvc-backup
  namespace: workspace
  labels:
    app: backup
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pvc-backup
  namespace: workspace
  labels:
    app: backup
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pvc-backup
  namespace: workspace
  labels:
    app: backup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pvc-backup
subjects:
  - kind: ServiceAccount
    name: pvc-backup
    namespace: workspace
