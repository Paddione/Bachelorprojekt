# ═══════════════════════════════════════════════════════════════════
# hbbr — RustDesk relay server
# ═══════════════════════════════════════════════════════════════════
# Same host-network/node-pin as hbbs. Carries the actual session bytes
# only when direct P2P fails (e.g. symmetric NAT). No signing key.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hbbr
  namespace: rustdesk
  labels:
    app: hbbr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hbbr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: hbbr
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: ${TURN_NODE}
      containers:
        - name: hbbr
          image: rustdesk/rustdesk-server:1.1.15@sha256:10818ec05b179039c6660f4d8e74b303f0db2858bbad2b18e24992ea22d54cd6
          imagePullPolicy: IfNotPresent
          command: ["hbbr"]
          workingDir: /root
          ports:
            - containerPort: 21117
              hostPort: 21117
              protocol: TCP
            - containerPort: 21119
              hostPort: 21119
              protocol: TCP
          resources:
            requests:
              memory: 32Mi
              cpu: "50m"
            limits:
              memory: 128Mi
              cpu: "200m"
