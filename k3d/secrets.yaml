apiVersion: v1
kind: Secret
metadata:
  name: workspace-secrets
  labels:
    environment: dev
type: Opaque
stringData:
  NEXTCLOUD_OIDC_SECRET: "devnextcloudoidcsecret12345"
  NEXTCLOUD_DB_PASSWORD: "devnextclouddb"
  NEXTCLOUD_ADMIN_PASSWORD: "devnextcloudadmin"
  SIGNALING_SECRET: "devsignalingsecret1234567890abcdef"
  TURN_SECRET: "devturnpassword1234"
  DOCS_OIDC_SECRET: "devdocsoidcsecret12345"
  TRAEFIK_OIDC_SECRET: "devtraefikoidcsecret12345"
  OAUTH2_PROXY_COOKIE_SECRET: "jWD3E-mb5zfYc97pX3ZQ8UOXDKextu17"
  SHARED_DB_PASSWORD: "devshareddb"
  WEBSITE_OIDC_SECRET: "devwebsiteoidcsecret12345"
  COLLABORA_ADMIN_PASSWORD: "devcollaboraadmin"
  WHITEBOARD_JWT_SECRET: "devwhiteboardjwtsecret1234567890"
  VAULTWARDEN_DB_PASSWORD: "devvaultwardendb"
  VAULTWARDEN_ADMIN_TOKEN: "devvaultwardenadmin"
  VAULTWARDEN_OIDC_SECRET: "devvaultwardenoidcsecret12345"
  # Meeting Pipeline
  WEBSITE_DB_PASSWORD: "devwebsitedb"
  # studio-server DB connection (shared-db `website` DB, schema-prefixed `studio.*`).
  # Password must match WEBSITE_DB_PASSWORD above — secretKeyRef values are opaque
  # bytes, not subject to Kubernetes $(VAR) env interpolation. (T001853)
  STUDIO_DB_URL: "postgresql://website:devwebsitedb@shared-db:5432/website?sslmode=disable"
  VIDEOVAULT_DB_PASSWORD: "devvideovaultdb"
  RECORDING_SECRET: "devrecordingsecret1234567890abcde"
  TRANSCRIBER_BOT_PASSWORD: "devtranscriberbotpassword123"
  TRANSCRIBER_SECRET: "devtranscribersecret1234567890"
  # Claude Code
  CLAUDE_CODE_OIDC_SECRET: "devclaudecodeoidcsecret12345"
  CLAUDE_CODE_WEBUI_SECRET_KEY: "devclaudewebui000000000000000000000000000000000000"
  CRON_SECRET: "devcronsecret12345"
  # External service keys (user-provided placeholders)
  GITHUB_PAT: "ghp_dev_placeholder"
  GHCR_PAT: "ghcr_dev_placeholder"
  # SEPA direct debit creditor credentials (dev placeholders — fictional test values)
  SEPA_CREDITOR_IBAN: "DE89370400440532013000"
  SEPA_CREDITOR_BIC: "COBADEFFXXX"
  SEPA_CREDITOR_ID: "DE98ZZZ09999999999"
  SMTP_PASSWORD: "devsmtppassword"
  # SMTP sender + auth user — sourced from workspace-secrets so prod envs can override
  # per-environment without needing kustomize overlays to replace env entries. Prod values
  # are sealed in environments/sealed-secrets/<env>.yaml.
  SMTP_FROM: "vaultwarden@workspace.local"
  SMTP_USER: "dev"
  # Meetings pipeline DB
  MEETINGS_DB_PASSWORD: "devmeetingsdb"
  # Operational secrets
  BACKUP_PASSPHRASE: "devbackuppassphrase1234567890abcd"
  MAIL_OIDC_SECRET: "dev-mailpit-oidc-secret-change-me-40chars1"
  IPV64_API_KEY: "dev_ipv64_placeholder"
  IPV64_UPDATE_HASH: "dev_ipv64_update_hash_placeholder"
  BRETT_BOT_SECRET: "devbrettbotsecret_change_me_a1b2c3d4e5f6"
  BRETT_OIDC_SECRET: "devbrettoidcsecret12345678901234"
  COMFY_OIDC_SECRET: "devcomfyoidcsecret12345678901234"
  BRAINSTORM_OIDC_SECRET: "devbrainstormoidcsecret12345678"
  # Filen.io backup storage (optional, user-provided)
  FILEN_EMAIL: "dev_filen_email@placeholder.local"
  FILEN_PASSWORD: "dev_filen_password_placeholder"
  # Webhook tokens for monitoring
  MONITORING_WEBHOOK_TOKEN: "devmonitoring_webhook_token_1234"
  # LiveKit
  LIVEKIT_API_KEY: "devlivekit"
  LIVEKIT_API_SECRET: "devlivekitsecret1234567890abcdef"
  LIVEKIT_RTMP_KEY: "devrtmpkey123456"
  # Internal API token — used by tracking-import CronJob to call /api/internal/tickets/notify-close
  # TODO: set a strong random value in environments/.secrets/<env>.yaml then `task env:seal ENV=<env>`
  INTERNAL_API_TOKEN: "dev-placeholder-not-for-prod"
  # Shared secret for the sessions-purge cronjob (X-Cron-Token header). [T000994]
  SESSIONS_CRON_TOKEN: "devsessionscrontoken1234567890"
  # Recovery OIDC secrets
  RECOVERY_OIDC_SECRET: "devrecoveryoidcsecret12345678901234"
  # ── Pocket ID (T001068 migration / T001087 wiring) ──
  # Dev placeholders only. Prod values are sealed in environments/.secrets/<env>.yaml.
  # POCKET_ID_GRAFANA_SECRET intentionally absent here — it lives in the monitoring-ns
  # grafana-oidc Secret; the seed Job sources it optionally and skips if empty.
  POCKET_ID_DB_PASSWORD: "devpocketiddb"
  POCKET_ID_API_KEY: "devpocketidapikey12345678901234"
  # Mirror of website-secrets.POCKET_ID_WEBSITE_SECRET so the in-workspace seed Job
  # can register the `website` client without a cross-namespace secretKeyRef.
  POCKET_ID_WEBSITE_SECRET: "devwebsitepocketidsecret123456"
  POCKET_ID_DOCS_SECRET: "devdocspocketidsecret12345"
  POCKET_ID_MAIL_SECRET: "devmailpocketidsecret12345"
  POCKET_ID_BRETT_SECRET: "devbrettpocketidsecret12345678"
  POCKET_ID_COMFY_SECRET: "devcomfypocketidsecret12345678"
  POCKET_ID_MEDIAVIEWER_SECRET: "devmediaviewerpocketidsecret12"
  POCKET_ID_VIDEOVAULT_SECRET: "devvideovaultpocketidsecret123"
  POCKET_ID_STUDIO_SECRET: "devstudiopocketidsecret1234567"
  POCKET_ID_RUSTDESK_WEB_SECRET: "devrustdeskwebpocketidsecret12"
  POCKET_ID_TRAEFIK_SECRET: "devtraefikpocketidsecret123456"
  POCKET_ID_RECOVERY_SECRET: "devrecoverypocketidsecret12345"
  POCKET_ID_BRAIN_SECRET: "devbrainpocketidsecret12345678"
  POCKET_ID_VAULTWARDEN_SECRET: "devvaultwardenpocketidsecret12"
  POCKET_ID_CLAUDE_CODE_SECRET: "devclaudecodepocketidsecret123"
  POCKET_ID_SESSION_HUB_SECRET: "devsessionhubpocketidsecret123"
  POCKET_ID_BRAINSTORM_SECRET: "devbrainstormpocketidsecret123"
  POCKET_ID_NEXTCLOUD_SECRET: "devnextcloudpocketidsecret1234"
  POCKET_ID_TERMINAL_SECRET: "devterminalpocketidsecret12"

  # Tracking DB URL (legacy, tracking pipeline fully removed)
  TRACKING_DB_URL: ""
  # Voyage AI API key (also projected into knowledge-secrets for CronJob)
  VOYAGE_API_KEY: "dev_voyage_api_key_placeholder"
  # Dev-environment overrides (shared-db aliases for korczewski dev)
  DEV_SHARED_DB_PASSWORD: ""
  DEV_WEBSITE_DB_PASSWORD: ""
  DEV_OAUTH2_PROXY_COOKIE_SECRET: ""
  DEV_WORKSPACE_OIDC_SECRET: ""
  DEV_SISH_AUTHORIZED_KEYS: ""
  # Windows LM router API key — set in .secrets/<env>.yaml for prod
  LLM_ROUTER_API_KEY: ""
  # Anthropic API key for LLM fallback (optional, user-provided)
  ANTHROPIC_API_KEY: ""
  # DeepSeek API key for website AI endpoints (coaching, meeting insights, triage, assistant)
  DEEPSEEK_API_KEY: ""
  # DeepSeek API key for Software Factory autopilot (pk-deepseek)
  DEEPSEEK_API_KEY_PK: ""
  # Hetzner API key for DNS/provisioning (optional, user-provided)
  HETZNER_API_KEY: ""
  # HuggingFace token for authenticated model downloads (ComfyUI, TEI, Hunyuan3D)
  HUGGINGFACE_TOKEN: ""
---
# knowledge-secrets — Voyage AI API key for knowledge ingestion CronJobs.
