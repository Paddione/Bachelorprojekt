apiVersion: v1
kind: Secret
metadata:
  name: knowledge-secrets
  labels:
    environment: dev
type: Opaque
stringData:
  VOYAGE_API_KEY: "dev_voyage_api_key_placeholder"
  HUGGINGFACE_TOKEN: ""
