# ═══════════════════════════════════════════════════════════════════
# Shared PostgreSQL — single instance, one database per service
# Replaces keycloak-db, mattermost-db, nextcloud-db deployments
# ═══════════════════════════════════════════════════════════════════
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shared-db-pvc
spec:
  storageClassName: local-path
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 25Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: shared-db-init
data:
  init-databases.sh: |
    #!/bin/bash
    set -e
    # Create databases and users for each service (idempotent).
    # Uses DO blocks so re-runs don't fail if users/DBs already exist.
    # Always syncs passwords to match current secrets.
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-'EOSQL'
      -- Helper: create user if not exists
      DO $$ BEGIN
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'keycloak') THEN CREATE USER keycloak; END IF;
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'mattermost') THEN CREATE USER mattermost; END IF;
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'nextcloud') THEN CREATE USER nextcloud; END IF;
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'vaultwarden') THEN CREATE USER vaultwarden; END IF;
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'outline') THEN CREATE USER outline; END IF;
      END $$;
    EOSQL

    # Sync passwords to match current secrets (works on first run and re-runs)
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" \
      -c "ALTER USER keycloak WITH PASSWORD '${KEYCLOAK_DB_PASSWORD}';" \
      -c "ALTER USER mattermost WITH PASSWORD '${MATTERMOST_DB_PASSWORD}';" \
      -c "ALTER USER nextcloud WITH PASSWORD '${NEXTCLOUD_DB_PASSWORD}';" \
      -c "ALTER USER vaultwarden WITH PASSWORD '${VAULTWARDEN_DB_PASSWORD}';" \
      -c "ALTER USER outline WITH PASSWORD '${OUTLINE_DB_PASSWORD}';"

    # Create databases if not exists
    for db_user in keycloak mattermost nextcloud vaultwarden outline; do
      psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
        SELECT 'CREATE DATABASE ${db_user} OWNER ${db_user}'
        WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = '${db_user}')\gexec
        GRANT ALL PRIVILEGES ON DATABASE ${db_user} TO ${db_user};
    EOSQL
    done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shared-db
  labels:
    app: shared-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shared-db
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: shared-db
    spec:
      securityContext:
        fsGroup: 999
        runAsUser: 999
        runAsGroup: 999
      containers:
        - name: postgres
          image: postgres:16.13-alpine
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_DB
              value: postgres
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: SHARED_DB_PASSWORD
            - name: KEYCLOAK_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: KEYCLOAK_DB_PASSWORD
            - name: MATTERMOST_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: MATTERMOST_DB_PASSWORD
            - name: NEXTCLOUD_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: NEXTCLOUD_DB_PASSWORD
            - name: VAULTWARDEN_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: VAULTWARDEN_DB_PASSWORD
            - name: OUTLINE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: OUTLINE_DB_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: 256Mi
              cpu: 150m
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: shared-db-pvc
        - name: init
          configMap:
            name: shared-db-init
---
# Primary service name — used by MCP and direct access
apiVersion: v1
kind: Service
metadata:
  name: shared-db
spec:
  selector:
    app: shared-db
  ports:
    - port: 5432
      targetPort: 5432
---
# Backward-compatible aliases so existing service connection strings work unchanged
apiVersion: v1
kind: Service
metadata:
  name: keycloak-db
spec:
  selector:
    app: shared-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: mattermost-db
spec:
  selector:
    app: shared-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: nextcloud-db
spec:
  selector:
    app: shared-db
  ports:
    - port: 5432
      targetPort: 5432
