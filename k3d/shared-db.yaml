# ═══════════════════════════════════════════════════════════════════
# Shared PostgreSQL — single instance hosting all service databases
# Apps connect via their original service names (keycloak-db, etc.)
# which are aliased to this deployment via selector-based Services.
# ═══════════════════════════════════════════════════════════════════
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shared-db-data
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 4Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: shared-db-init
data:
  init-databases.sh: |
    #!/bin/bash
    set -e
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
      -- Keycloak
      CREATE USER keycloak WITH PASSWORD '${KEYCLOAK_DB_PASSWORD}';
      CREATE DATABASE keycloak OWNER keycloak;

      -- Mattermost
      CREATE USER mattermost WITH PASSWORD '${MATTERMOST_DB_PASSWORD}';
      CREATE DATABASE mattermost OWNER mattermost;

      -- Nextcloud
      CREATE USER nextcloud WITH PASSWORD '${NEXTCLOUD_DB_PASSWORD}';
      CREATE DATABASE nextcloud OWNER nextcloud;

      -- Spacedeck
      CREATE USER spacedeck WITH PASSWORD '${SPACEDECK_DB_PASSWORD}';
      CREATE DATABASE spacedeck OWNER spacedeck;
    EOSQL
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shared-db
  labels:
    app: shared-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shared-db
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: shared-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: postgres
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homeoffice-secrets
                  key: SHARED_DB_PASSWORD
            - name: KEYCLOAK_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homeoffice-secrets
                  key: KEYCLOAK_DB_PASSWORD
            - name: MATTERMOST_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homeoffice-secrets
                  key: MATTERMOST_DB_PASSWORD
            - name: NEXTCLOUD_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homeoffice-secrets
                  key: NEXTCLOUD_DB_PASSWORD
            - name: SPACEDECK_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homeoffice-secrets
                  key: SPACEDECK_DB_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: 256Mi
              cpu: 200m
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: shared-db-data
        - name: init
          configMap:
            name: shared-db-init
---
# ─── Service aliases ──────────────────────────────────────────────
# Each old service name selects app: shared-db, so existing apps
# (keycloak, mattermost, nextcloud, spacedeck) need zero changes.
# ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: shared-db
spec:
  selector:
    app: shared-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-db
spec:
  selector:
    app: shared-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: mattermost-db
spec:
  selector:
    app: shared-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: nextcloud-db
spec:
  selector:
    app: shared-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: spacedeck-db
spec:
  selector:
    app: shared-db
  ports:
    - port: 5432
      targetPort: 5432
