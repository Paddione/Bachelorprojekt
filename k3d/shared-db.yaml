# ═══════════════════════════════════════════════════════════════════
# Shared PostgreSQL — single instance, one database per service
# Replaces keycloak-db, nextcloud-db deployments
# ═══════════════════════════════════════════════════════════════════
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shared-db-pvc
spec:
  storageClassName: local-path
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 25Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: shared-db-init
data:
  init-databases.sh: |
    #!/bin/bash
    set -e
    # Create databases and users for each service (idempotent).
    # Uses DO blocks so re-runs don't fail if users/DBs already exist.
    # Always syncs passwords to match current secrets.
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-'EOSQL'
      -- Helper: create user if not exists
      DO $$ BEGIN
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'keycloak') THEN CREATE USER keycloak; END IF;
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'nextcloud') THEN CREATE USER nextcloud; END IF;
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'vaultwarden') THEN CREATE USER vaultwarden; END IF;
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'website') THEN CREATE USER website; END IF;
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'docuseal') THEN CREATE USER docuseal; END IF;
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'pentest') THEN CREATE USER pentest; END IF;
      END $$;
    EOSQL

    # Sync passwords to match current secrets (works on first run and re-runs)
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" \
      -c "ALTER USER keycloak WITH PASSWORD '${KEYCLOAK_DB_PASSWORD}';" \
      -c "ALTER USER nextcloud WITH PASSWORD '${NEXTCLOUD_DB_PASSWORD}';" \
      -c "ALTER USER vaultwarden WITH PASSWORD '${VAULTWARDEN_DB_PASSWORD}';" \
      -c "ALTER USER website WITH PASSWORD '${WEBSITE_DB_PASSWORD}';" \
      -c "ALTER USER docuseal WITH PASSWORD '${DOCUSEAL_DB_PASSWORD}';" \
      -c "ALTER USER pentest WITH PASSWORD 'pentest_access_2026';"

    # Create databases if not exists
    for db_user in keycloak nextcloud vaultwarden website docuseal pentest; do
      psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
        SELECT 'CREATE DATABASE ${db_user} OWNER ${db_user}'
        WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = '${db_user}')\gexec
        GRANT ALL PRIVILEGES ON DATABASE ${db_user} TO ${db_user};
    EOSQL
    done

    # Initialize Pentest Flag Data
    psql -v ON_ERROR_STOP=1 --username "pentest" --dbname "pentest" <<-'EOSQL'
      CREATE TABLE IF NOT EXISTS confidential_projects (
        id SERIAL PRIMARY KEY,
        project_name TEXT NOT NULL,
        secret_key TEXT NOT NULL
      );
      INSERT INTO confidential_projects (project_name, secret_key)
      SELECT 'PROJECT_NEBULA', 'FLAG{SHARED_DB_DATA_EXFILTRATION_SUCCESS}'
      WHERE NOT EXISTS (SELECT 1 FROM confidential_projects WHERE project_name = 'PROJECT_NEBULA');
    EOSQL
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shared-db
  labels:
    app: shared-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shared-db
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: shared-db
    spec:
      securityContext:
        fsGroup: 999
        runAsUser: 999
        runAsGroup: 999
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # Selbstsigniertes TLS-Zertifikat für interne PostgreSQL-Verbindungen
        # erzeugen. Zertifikat lebt im emptyDir → bei jedem Pod-Restart neu
        # generiert. sslmode=prefer auf Client-Seite (libpq-Default) handelt
        # TLS opportunistisch aus. NetworkPolicies (Default-Deny-Ingress)
        # bilden die primäre Vertrauensgrenze.
        - name: generate-tls-cert
          image: pgvector/pgvector:0.8.0-pg16
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 999
            capabilities:
              drop: ["ALL"]
          command: [bash, -c]
          args:
            - |
              set -e
              openssl req -new -x509 -days 825 -nodes \
                -out /etc/postgresql/certs/server.crt \
                -keyout /etc/postgresql/certs/server.key \
                -subj "/CN=shared-db.workspace.svc.cluster.local"
              chmod 600 /etc/postgresql/certs/server.key
              chmod 644 /etc/postgresql/certs/server.crt
              echo "PostgreSQL TLS-Zertifikat generiert"
          volumeMounts:
            - name: tls-certs
              mountPath: /etc/postgresql/certs
      containers:
        - name: postgres
          image: pgvector/pgvector:0.8.0-pg16
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 999
            capabilities:
              drop: ["ALL"]
          args:
            - "postgres"
            - "-c"
            - "ssl=on"
            - "-c"
            - "ssl_cert_file=/etc/postgresql/certs/server.crt"
            - "-c"
            - "ssl_key_file=/etc/postgresql/certs/server.key"
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_DB
              value: postgres
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: SHARED_DB_PASSWORD
            - name: KEYCLOAK_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: KEYCLOAK_DB_PASSWORD
            - name: NEXTCLOUD_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: NEXTCLOUD_DB_PASSWORD
            - name: VAULTWARDEN_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: VAULTWARDEN_DB_PASSWORD
            - name: WEBSITE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: WEBSITE_DB_PASSWORD
            - name: DOCUSEAL_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: DOCUSEAL_DB_PASSWORD
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/bash
                  - -c
                  - |
                    until pg_isready -U postgres; do sleep 2; done
                    psql -U postgres \
                      -c "ALTER USER keycloak WITH PASSWORD '${KEYCLOAK_DB_PASSWORD}';" \
                      -c "ALTER USER nextcloud WITH PASSWORD '${NEXTCLOUD_DB_PASSWORD}';" \
                      -c "ALTER USER vaultwarden WITH PASSWORD '${VAULTWARDEN_DB_PASSWORD}';" \
                      -c "ALTER USER website WITH PASSWORD '${WEBSITE_DB_PASSWORD}';"
                    psql -U postgres -c "DO \$\$ BEGIN IF EXISTS (SELECT FROM pg_roles WHERE rolname = 'docuseal') THEN EXECUTE 'ALTER USER docuseal WITH PASSWORD ''${DOCUSEAL_DB_PASSWORD}'''; END IF; END \$\$;"
                    bash /scripts/ensure-meetings-schema.sh || true
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
            - name: init
              mountPath: /docker-entrypoint-initdb.d/01-init-databases.sh
              subPath: init-databases.sh
            - name: website-schema
              mountPath: /docker-entrypoint-initdb.d/02-meetings-schema.sh
              subPath: init-meetings-schema.sh
            - name: website-schema
              mountPath: /scripts/ensure-meetings-schema.sh
              subPath: ensure-meetings-schema.sh
            - name: tls-certs
              mountPath: /etc/postgresql/certs
              readOnly: true
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: 1Gi
              cpu: "500m"
            limits:
              memory: 4Gi
              cpu: "2"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: shared-db-pvc
        - name: init
          configMap:
            name: shared-db-init
        - name: website-schema
          configMap:
            name: website-schema
        - name: tls-certs
          emptyDir: {}
---
# Primary service name — used by MCP and direct access
apiVersion: v1
kind: Service
metadata:
  name: shared-db
spec:
  selector:
    app: shared-db
  ports:
    - port: 5432
      targetPort: 5432
---
# Backward-compatible aliases so existing service connection strings work unchanged
apiVersion: v1
kind: Service
metadata:
  name: keycloak-db
spec:
  selector:
    app: shared-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: nextcloud-db
spec:
  selector:
    app: shared-db
  ports:
    - port: 5432
      targetPort: 5432
