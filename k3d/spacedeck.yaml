apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: spacedeck-storage
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spacedeck
  labels:
    app: spacedeck
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spacedeck
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: spacedeck
    spec:
      containers:
        - name: spacedeck
          image: spacedeck/spacedeck-open:latest
          env:
            - name: SD_HOST
              value: "0.0.0.0"
            - name: SD_PORT
              value: "9666"
          ports:
            - containerPort: 9666
          volumeMounts:
            - name: storage
              mountPath: /app/storage
          readinessProbe:
            httpGet:
              path: /
              port: 9666
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 9666
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: spacedeck-storage
---
apiVersion: v1
kind: Service
metadata:
  name: spacedeck
spec:
  selector:
    app: spacedeck
  ports:
    - port: 9666
      targetPort: 9666
