# ═══════════════════════════════════════════════════════════════════
# SSO Bridge — transparent reverse proxy between oauth2-proxy and
# Invoice Ninja. Injects a Laravel session on first authenticated
# request so users do not need a second login after Keycloak.
# ═══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sso-bridge
  labels:
    app: sso-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sso-bridge
  template:
    metadata:
      labels:
        app: sso-bridge
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sso-bridge
          image: ghcr.io/paddione/sso-bridge:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: LISTEN_ADDR
              value: ":8180"
            - name: INVOICENINJA_URL
              value: "http://invoiceninja:80"
            - name: SESSION_COOKIE
              value: "laravel_session"
            - name: SSO_PATH
              value: "/sso-auth.php"
          ports:
            - containerPort: 8180
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8180
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8180
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: 32Mi
              cpu: "50m"
            limits:
              memory: 64Mi
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: sso-bridge
spec:
  selector:
    app: sso-bridge
  ports:
    - port: 8180
      targetPort: 8180
