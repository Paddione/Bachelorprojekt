# ═══════════════════════════════════════════════════════════════════
# Nextcloud Talk — High Performance Backend (HPB)
# ═══════════════════════════════════════════════════════════════════
# Components: NATS (message bus), spreed-signaling (coordination)
# Janus (the SFU) lives in k3d/janus.yaml inside the privileged
# `coturn` namespace because it requires hostNetwork.
# ═══════════════════════════════════════════════════════════════════

# ── NATS (internal message bus) ─────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  labels:
    app: nats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nats
          image: nats:2.10-alpine
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 4222
          resources:
            requests:
              memory: 64Mi
              cpu: "100m"
            limits:
              memory: 256Mi
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: nats
spec:
  selector:
    app: nats
  ports:
    - port: 4222
      targetPort: 4222

---
# ── spreed-signaling (HPB coordination) ─────────────────────────
# server.conf is rendered at pod startup from server.conf.template by
# an init container. The init container reads SIGNALING_SECRET and
# TURN_SECRET from workspace-secrets and substitutes the @@VAR@@ markers
# below via `sed`. This keeps the manifest in git free of real secrets
# and lets the same file work in dev (literal dev secrets) and in prod
# (rotated sealed secrets) without regenerating the ConfigMap.
#
# Required environment substitutions (kustomize-envsubst, build-time):
#   ${PROD_DOMAIN} — backend URL + TURN hostname (turn.${PROD_DOMAIN})
apiVersion: v1
kind: ConfigMap
metadata:
  name: signaling-config
data:
  server.conf.template: |
    [http]
    listen = 0.0.0.0:8080

    [app]
    debug = false

    [sessions]
    hashkey = @@SESSION_HASHKEY@@
    blockkey = @@SESSION_BLOCKKEY@@

    [clients]
    internalsecret = @@CLIENTS_INTERNALSECRET@@

    [backend]
    # allowall = true: skip URL-matching for dev (HMAC still enforces auth).
    # The backend URL sent by Nextcloud (overwrite.cli.url = http://localhost)
    # doesn't match files.localhost; allowall avoids the mismatch.
    # secret is required in [backend] when allowall = true.
    allowall = true
    secret = @@SIGNALING_SECRET@@
    backends = backend-1
    timeout = 10
    connectionsperhost = 8

    [backend-1]
    url = http://files.localhost
    secret = @@SIGNALING_SECRET@@
    maxstreambitrate = 0
    maxscreenbitrate = 0

    [nats]
    url = nats://nats:4222

    [mcu]
    type = janus
    url = ws://janus.coturn:8188

    [turn]
    apikey = @@TURN_APIKEY@@
    secret = @@TURN_SECRET@@
    servers = turn:turn.localhost:3478?transport=udp,turn:turn.localhost:3478?transport=tcp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spreed-signaling
  labels:
    app: spreed-signaling
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spreed-signaling
  template:
    metadata:
      labels:
        app: spreed-signaling
      # Bump this to force a rollout whenever the render logic changes.
      annotations:
        config/hash: "6"
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      # Hard pod-affinity to Janus (in the `coturn` namespace, label app=janus).
      # Janus runs hostNetwork:true and is pinned to ${TURN_NODE} via its own
      # nodeSelector. Colocating spreed-signaling on the same node means the
      # WebSocket connection to ws://janus.coturn:8188 resolves to a hostPort
      # on the local node and traffic stays on the loopback path, bypassing:
      #   - kube-proxy DNAT to the node's public IP (37.27.251.38 on korczewski),
      #     which the allow-signaling-coturn-egress NetworkPolicy does not cover
      #   - the Hetzner per-host firewall, which blocks 8188 cross-node
      # Using podAffinity (not a hard nodeSelector on ${TURN_NODE}) means this
      # auto-tracks Janus wherever it ends up scheduled. The legacy soft
      # preference NotIn k3d-dev-agent-4 is dropped — that node was a dev-only
      # workaround for a kube-proxy MCU reachability bug that this colocation
      # rule fixes structurally.
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: janus
              namespaces:
                - coturn
              topologyKey: kubernetes.io/hostname
      initContainers:
        # Render /shared/server.conf from the template by substituting
        # @@VAR@@ placeholders with values sourced from workspace-secrets.
        # Uses busybox sed (POSIX, no external tools) and `|` as the sed
        # delimiter so base64-safe secret values don't collide.
        - name: render-config
          image: busybox:1.36
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
          command: ["sh", "-c"]
          args:
            - |
              set -eu
              sed \
                -e "s|@@SIGNALING_SECRET@@|${SIGNALING_SECRET}|g" \
                -e "s|@@TURN_SECRET@@|${TURN_SECRET}|g" \
                -e "s|@@SESSION_HASHKEY@@|${SESSION_HASHKEY}|g" \
                -e "s|@@SESSION_BLOCKKEY@@|${SESSION_BLOCKKEY}|g" \
                -e "s|@@CLIENTS_INTERNALSECRET@@|${CLIENTS_INTERNALSECRET}|g" \
                -e "s|@@TURN_APIKEY@@|${TURN_APIKEY}|g" \
                /tpl/server.conf.template > /shared/server.conf
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          env:
            - name: SIGNALING_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: SIGNALING_SECRET
            - name: TURN_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: TURN_SECRET
            # The remaining keys are not rotated secrets — they only need
            # to be stable within the pod's lifetime. Hardcoding them in
            # the Deployment env (not git-committed secrets) is fine.
            - name: SESSION_HASHKEY
              value: "devsignalinghashkey1234567890abcd"
            - name: SESSION_BLOCKKEY
              value: "devsignalingblockkey123456789012"
            - name: CLIENTS_INTERNALSECRET
              value: "devsignalinginternalsecret123456"
            - name: TURN_APIKEY
              value: "devturnapikey1234567890"
          volumeMounts:
            - name: config-template
              mountPath: /tpl
              readOnly: true
            - name: rendered-config
              mountPath: /shared
      containers:
        - name: signaling
          image: strukturag/nextcloud-spreed-signaling:2.1.1
          imagePullPolicy: Always
          # Bypass su-exec (needs CAP_SETGID which is dropped) by calling binary directly.
          # The image entrypoint uses su-exec to switch users, but we're already UID 65534.
          command: ["/usr/bin/nextcloud-spreed-signaling"]
          args: ["--config=/etc/signaling/server.conf"]
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: rendered-config
              mountPath: /etc/signaling/server.conf
              subPath: server.conf
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/v1/welcome
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 128Mi
              cpu: "200m"
            limits:
              memory: 512Mi
              cpu: "1"
      volumes:
        - name: config-template
          configMap:
            name: signaling-config
            items:
              - key: server.conf.template
                path: server.conf.template
        - name: rendered-config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: spreed-signaling
spec:
  selector:
    app: spreed-signaling
  ports:
    - port: 8080
      targetPort: 8080
