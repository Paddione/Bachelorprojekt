# ═══════════════════════════════════════════════════════════════════
# Nextcloud Talk — High Performance Backend (HPB)
# ═══════════════════════════════════════════════════════════════════
# Components: NATS (message bus), spreed-signaling (coordination)
# Janus (the SFU) lives in k3d/janus.yaml inside the privileged
# `coturn` namespace because it requires hostNetwork.
# ═══════════════════════════════════════════════════════════════════

# ── NATS (internal message bus) ─────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  labels:
    app: nats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          ports:
            - containerPort: 4222
          resources:
            requests:
              memory: 64Mi
              cpu: "100m"
            limits:
              memory: 256Mi
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: nats
spec:
  selector:
    app: nats
  ports:
    - port: 4222
      targetPort: 4222

---
# ── spreed-signaling (HPB coordination) ─────────────────────────
# Required environment substitutions (kustomize-envsubst):
#   ${PROD_DOMAIN} — backend URL + TURN hostname (turn.${PROD_DOMAIN})
apiVersion: v1
kind: ConfigMap
metadata:
  name: signaling-config
data:
  server.conf: |
    [http]
    listen = 0.0.0.0:8080

    [app]
    debug = false

    [sessions]
    hashkey = devsignalinghashkey1234567890abcd
    blockkey = devsignalingblockkey123456789012

    [clients]
    internalsecret = devsignalinginternalsecret123456

    [backend]
    backends = backend-1
    allowall = false
    timeout = 10
    connectionsperhost = 8

    [backend-1]
    url = https://files.${PROD_DOMAIN}
    secret = devsignalingsecret1234567890abcdef
    maxstreambitrate = 0
    maxscreenbitrate = 0

    [nats]
    url = nats://nats:4222

    [mcu]
    type = janus
    url = ws://janus.coturn:8188

    [turn]
    apikey = devturnapikey1234567890
    secret = devturnpassword1234
    servers = turn:turn.${PROD_DOMAIN}:3478?transport=udp,turn:turn.${PROD_DOMAIN}:3478?transport=tcp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spreed-signaling
  labels:
    app: spreed-signaling
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spreed-signaling
  template:
    metadata:
      labels:
        app: spreed-signaling
    spec:
      containers:
        - name: signaling
          image: strukturag/nextcloud-spreed-signaling:2.1.1
          env:
            - name: CONFIG
              value: /etc/signaling/server.conf
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /etc/signaling/server.conf
              subPath: server.conf
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/v1/welcome
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 128Mi
              cpu: "200m"
            limits:
              memory: 512Mi
              cpu: "1"
      volumes:
        - name: config
          configMap:
            name: signaling-config
---
apiVersion: v1
kind: Service
metadata:
  name: spreed-signaling
spec:
  selector:
    app: spreed-signaling
  ports:
    - port: 8080
      targetPort: 8080
