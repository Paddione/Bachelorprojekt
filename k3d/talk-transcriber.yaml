# ── Nextcloud Talk Post-Meeting-Transkription ─────────────────────────────────
# Pollt auf aktive Calls, tritt headless bei (Firefox + PulseAudio),
# schickt Audio-Chunks an Whisper. Nach Gespraechsende sendet der Bot das
# vollstaendige Transkript an die Website-API (/api/meeting/save-transcript),
# die es in der Datenbank und als Markdown-Datei in Nextcloud speichert.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: talk-transcriber
  labels:
    app: talk-transcriber
spec:
  replicas: 1
  selector:
    matchLabels:
      app: talk-transcriber
  template:
    metadata:
      labels:
        app: talk-transcriber
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: transcriber
          image: registry.localhost:5000/talk-transcriber:latest
          imagePullPolicy: Always
          env:
            - name: NC_DOMAIN
              value: "nextcloud"
            - name: NC_PROTOCOL
              value: "http"
            - name: TRANSCRIBER_BOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: TRANSCRIBER_BOT_PASSWORD
            - name: TRANSCRIBER_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: TRANSCRIBER_SECRET
            - name: WEBSITE_URL
              value: "http://website.website.svc.cluster.local"
            - name: NC_VERIFY_SSL
              value: "false"
            - name: CHUNK_SECONDS
              value: "5"
            - name: MAX_SESSIONS
              value: "3"
          ports:
            - containerPort: 8000
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: "2"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: talk-transcriber
spec:
  selector:
    app: talk-transcriber
  ports:
    - port: 8000
      targetPort: 8000
