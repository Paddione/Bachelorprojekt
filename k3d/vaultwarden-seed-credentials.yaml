apiVersion: v1
kind: Secret
metadata:
  name: vaultwarden-seed-credentials
  namespace: workspace
type: Opaque
stringData:
  # The email address of the Vaultwarden admin account
  # Created manually after first login at http://vault.localhost
  BW_EMAIL: "admin@workspace.local"
  
  # The master password for the admin account
  BW_PASSWORD: "CHANGE_ME_AFTER_FIRST_LOGIN"
  
  # Optional: API Key for non-interactive login
  # BW_CLIENTID: ""
  # BW_CLIENTSECRET: ""
