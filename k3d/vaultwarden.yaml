# ═══════════════════════════════════════════════════════════════════
# Vaultwarden — self-hosted Bitwarden-compatible password manager
# SSO via Keycloak OIDC; database on shared PostgreSQL
# ═══════════════════════════════════════════════════════════════════
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vaultwarden-data-pvc
spec:
  storageClassName: local-path
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden
  labels:
    app: vaultwarden
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vaultwarden
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: vaultwarden
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: vaultwarden
          image: vaultwarden/server:1.35.3-alpine
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: VAULTWARDEN_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: VAULTWARDEN_DB_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://vaultwarden:$(VAULTWARDEN_DB_PASSWORD)@shared-db:5432/vaultwarden?sslmode=prefer"
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: VAULTWARDEN_ADMIN_TOKEN
            - name: DOMAIN
              value: "http://vault.localhost"
            - name: VAULT_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: domain-config
                  key: VAULT_DOMAIN
            # ── SSO via Keycloak ──────────────────────────────────
            # Bitwarden/Vaultwarden speichert Accounts nach E-Mail; der Master-
            # Passwort-Flow ist unvermeidbar (Vault-Verschlüsselung). SSO hier
            # ersetzt nur das Login-Passwort — die E-Mail wird aus dem OIDC-
            # Token vorbefüllt, nicht manuell abgefragt.
            - name: SSO_ENABLED
              value: "true"
            - name: SSO_ONLY
              value: "true"
            - name: SSO_PKCE
              value: "true"
            - name: SSO_SCOPES
              value: "email profile"
            - name: SSO_CLIENT_ID
              value: "vaultwarden"
            - name: SSO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: VAULTWARDEN_OIDC_SECRET
            - name: SSO_AUTHORITY
              value: "http://keycloak:8080/realms/workspace"
            - name: SIGNUPS_ALLOWED
              value: "true"
            - name: KC_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: domain-config
                  key: KC_DOMAIN
            # ── SMTP via Mailpit (dev) ────────────────────────────
            - name: SMTP_HOST
              value: "mailpit"
            - name: SMTP_PORT
              value: "1025"
            - name: SMTP_SECURITY
              value: "off"
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: SMTP_FROM
            - name: SMTP_FROM_NAME
              value: "Vaultwarden"
            - name: TZ
              value: Europe/Berlin
          ports:
            - containerPort: 80
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /alive
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /alive
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              memory: 128Mi
              cpu: "100m"
            limits:
              memory: 512Mi
              cpu: "500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vaultwarden-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: vaultwarden
spec:
  selector:
    app: vaultwarden
  ports:
    - port: 80
      targetPort: 80
