# ── Website Content-Publish Token (dev placeholder) ─────────────────────────
# T001490 Task 9 — fine-grained GitHub PAT consumed by the content publish
# pipeline (website/src/lib/content-publish.ts → GitHub Contents + PR APIs).
#
# In dev this placeholder is fine; publishContent() never actually fires in
# dev because the save.ts handlers are only reached from authenticated
# admin requests, and the test suite mocks the GitHub client.
#
# In prod each brand's SealedSecret is generated by `task env:seal ENV=<env>`
# from the plaintext value in environments/.secrets/<env>.yaml. The
# GITHUB_CONTENT_TOKEN secret entry in environments/schema.yaml wires it into
# the `website-content-token` Secret in the website namespace.
apiVersion: v1
kind: Secret
metadata:
  name: website-content-token
  namespace: ${WEBSITE_NAMESPACE}
  labels:
    app: website
    component: content-publish
type: Opaque
stringData:
  GITHUB_CONTENT_TOKEN: "devgithubcontenttoken_change_me_placeholder_only"
