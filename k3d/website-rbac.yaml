apiVersion: v1
kind: ServiceAccount
metadata:
  name: website
  namespace: website
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: website-monitoring-role
  namespace: workspace
rules:
  - apiGroups: [""]
    resources: ["pods", "events"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: website-monitoring-rolebinding
  namespace: workspace
subjects:
  - kind: ServiceAccount
    name: website
    namespace: website
roleRef:
  kind: Role
  name: website-monitoring-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: website-monitoring-clusterrole
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: website-monitoring-clusterrolebinding
subjects:
  - kind: ServiceAccount
    name: website
    namespace: website
roleRef:
  kind: ClusterRole
  name: website-monitoring-clusterrole
  apiGroup: rbac.authorization.k8s.io
