# ── Namespace ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: website
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
---
# ── Website ConfigMap ─────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: website-config
  namespace: website
data:
  # Brand
  BRAND: "${BRAND_ID}"
  # Mattermost
  MATTERMOST_WEBHOOK_URL: ""
  MATTERMOST_CHANNEL: "anfragen"
  MATTERMOST_URL: "http://mattermost.workspace.svc.cluster.local:8065"
  BUG_REPORT_CHANNEL: "bugs"
  # Keycloak
  KEYCLOAK_URL: "http://keycloak.workspace.svc.cluster.local:8080"
  KEYCLOAK_REALM: "workspace"
  KEYCLOAK_ADMIN_USER: "admin"
  KEYCLOAK_ADMIN_PASSWORD: "devadmin"
  # SMTP (dev: Mailpit; prod: smtp.mailbox.org via env registry)
  SMTP_HOST: "${SMTP_HOST}"
  SMTP_PORT: "${SMTP_PORT}"
  SMTP_SECURE: "false"
  SMTP_USER: "${SMTP_FROM}"
  SMTP_PASS: ""
  FROM_EMAIL: "${CONTACT_EMAIL}"
  FROM_NAME: "${BRAND_NAME}"
  # Legal / Impressum
  BRAND_NAME: "${BRAND_NAME}"
  CONTACT_NAME: "${CONTACT_NAME}"
  CONTACT_EMAIL: "${CONTACT_EMAIL}"
  CONTACT_PHONE: "${CONTACT_PHONE}"
  CONTACT_CITY: "${CONTACT_CITY}"
  LEGAL_STREET: "${LEGAL_STREET}"
  LEGAL_ZIP: "${LEGAL_ZIP}"
  LEGAL_JOBTITLE: "${LEGAL_JOBTITLE}"
  LEGAL_CHAMBER: "${LEGAL_CHAMBER}"
  LEGAL_UST_ID: "${LEGAL_UST_ID}"
  LEGAL_WEBSITE: "${LEGAL_WEBSITE}"
  # Nextcloud
  NEXTCLOUD_URL: "http://nextcloud.workspace.svc.cluster.local"
  NEXTCLOUD_EXTERNAL_URL: "http://files.localhost"
  NEXTCLOUD_ADMIN_USER: "admin"
  NEXTCLOUD_ADMIN_PASS: "devnextcloudadmin"
  NEXTCLOUD_CALDAV_USER: "admin"
  NEXTCLOUD_CALDAV_PASSWORD: "devnextcloudadmin"
  KEYCLOAK_FRONTEND_URL: "${KEYCLOAK_FRONTEND_URL}"
  # Mattermost signing channel
  MATTERMOST_SIGNING_CHANNEL: "signing"
  # Portal admin
  PORTAL_ADMIN_USERNAME: "gekko,paddione"
  CALENDAR_NAME: "personal"
  WORK_START_HOUR: "9"
  WORK_END_HOUR: "17"
  SLOT_DURATION_MIN: "60"
  WORK_DAYS: "1,2,3,4,5"
  BOOKING_HORIZON_DAYS: "21"
  MIN_ADVANCE_HOURS: "24"
  # InvoiceNinja
  INVOICENINJA_URL: "http://invoiceninja.workspace.svc.cluster.local/api/v1"
  INVOICENINJA_API_TOKEN: ""
  # Whisper + Outline
  WHISPER_URL: "http://whisper.workspace.svc.cluster.local:8000"
  OUTLINE_URL: "http://outline.workspace.svc.cluster.local"
  OUTLINE_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  # Site
  SITE_URL: "${WEBSITE_SITE_URL}"
---
# ── Website Deployment ────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: website
  namespace: website
spec:
  replicas: 1
  selector:
    matchLabels:
      app: website
  template:
    metadata:
      labels:
        app: website
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - pk-hetzner
      containers:
        - name: website
          image: ghcr.io/paddione/${WEBSITE_IMAGE}:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: website-config
          env:
            - name: WEBSITE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: website-secrets
                  key: WEBSITE_DB_PASSWORD
            - name: SESSIONS_DATABASE_URL
              value: "postgresql://website:$(WEBSITE_DB_PASSWORD)@shared-db.workspace.svc.cluster.local:5432/website"
            - name: MATTERMOST_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: website-secrets
                  key: MATTERMOST_BOT_TOKEN
            - name: WEBSITE_OIDC_SECRET
              valueFrom:
                secretKeyRef:
                  name: website-secrets
                  key: WEBSITE_OIDC_SECRET
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: website-secrets
                  key: SMTP_PASS
          ports:
            - containerPort: 4321
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /
              port: 4321
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 4321
            initialDelaySeconds: 3
            periodSeconds: 10
---
# ── Website Service ───────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: website
  namespace: website
spec:
  selector:
    app: website
  ports:
    - port: 80
      targetPort: 4321
---
# ── IngressRoute ─────────────────────────────────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: website
  namespace: website
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`${WEBSITE_HOST}`)
      services:
        - name: website
          port: 80
---
# ── Reminder CronJob (every minute) ─────────────────────────────────────────
apiVersion: batch/v1
kind: CronJob
metadata:
  name: meeting-reminders
  namespace: website
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 25
      template:
        spec:
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: website
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: trigger
              image: curlimages/curl:latest
              imagePullPolicy: Always
              command: ["curl", "-sf", "--max-time", "15", "-X", "POST", "http://website.website.svc.cluster.local/api/reminders/process"]
          restartPolicy: Never
---
# ── NetworkPolicies: website-Namespace ───────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: website
spec:
  podSelector: {}
  policyTypes:
  - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: website
spec:
  podSelector: {}
  policyTypes:
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: website
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
---
# Website-Pod darf workspace-Services erreichen
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-workspace
  namespace: website
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: workspace
---
# Traefik-Ingress aus kube-system erlauben
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-ingress
  namespace: website
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          app.kubernetes.io/name: traefik
---
# CronJob-zu-Website-Service innerhalb website-Namespace (meeting-reminders)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace-egress
  namespace: website
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace-ingress
  namespace: website
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector: {}
---
# kube-router IPSet race fix: kurzlebige Job-Pods (z.B. meeting-reminders CronJob)
# werden ggf. nicht schnell genug in das podSelector-IPSet aufgenommen. Das ipBlock-
# Prädikat wird sofort ausgewertet — kein Lookup nötig.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-pod-cidr-ingress
  namespace: website
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - ipBlock:
        cidr: 10.42.0.0/16
---
# Service-CIDR Egress: CronJob-Pods müssen ClusterIP-Services erreichen können.
# podSelector: {} deckt nur Pod-IPs ab, nicht 10.43.x.x ClusterIPs.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-service-cidr-egress
  namespace: website
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - ipBlock:
        cidr: 10.43.0.0/16
---
# SMTP Egress: Website-Pod darf externen SMTP-Server erreichen (Mailpit dev / mailbox.org prod)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-smtp-egress
  namespace: website
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - ports:
    - port: 587
      protocol: TCP
    - port: 1025
      protocol: TCP
