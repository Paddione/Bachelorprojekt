# ── Namespace ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: ${WEBSITE_NAMESPACE}
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
---
# ── Website ConfigMap ─────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: website-config
  namespace: ${WEBSITE_NAMESPACE}
data:
  # Brand
  BRAND: "${BRAND_ID}"
  PROD_DOMAIN: "${PROD_DOMAIN}"
  CLUSTER_ENV: "${CLUSTER_ENV}"
  DOCS_URL: "${DOCS_URL}"
  AUTH_EXTERNAL_URL: "${AUTH_EXTERNAL_URL}"
  VAULT_EXTERNAL_URL: "${VAULT_EXTERNAL_URL}"
  WHITEBOARD_EXTERNAL_URL: "${WHITEBOARD_EXTERNAL_URL}"
  BUG_REPORT_CHANNEL: "bugs"
  # Keycloak
  KEYCLOAK_URL: "http://keycloak.${WORKSPACE_NAMESPACE}.svc.cluster.local:8080"
  KEYCLOAK_REALM: "workspace"
  KEYCLOAK_ADMIN_USER: "admin"
  # SMTP (dev: Mailpit; prod: smtp.mailbox.org via env registry)
  SMTP_HOST: "${SMTP_HOST}"
  SMTP_PORT: "${SMTP_PORT}"
  SMTP_SECURE: "${SMTP_SECURE}"
  SMTP_USER: "${SMTP_USER}"
  FROM_EMAIL: "${CONTACT_EMAIL}"
  FROM_NAME: "${BRAND_NAME}"
  # Legal / Impressum
  BRAND_NAME: "${BRAND_NAME}"
  CONTACT_NAME: "${CONTACT_NAME}"
  CONTACT_EMAIL: "${CONTACT_EMAIL}"
  CONTACT_PHONE: "${CONTACT_PHONE}"
  CONTACT_CITY: "${CONTACT_CITY}"
  LEGAL_STREET: "${LEGAL_STREET}"
  LEGAL_ZIP: "${LEGAL_ZIP}"
  LEGAL_JOBTITLE: "${LEGAL_JOBTITLE}"
  LEGAL_UST_ID: "${LEGAL_UST_ID}"
  LEGAL_WEBSITE: "${LEGAL_WEBSITE}"
  # Nextcloud
  NEXTCLOUD_URL: "http://nextcloud.${WORKSPACE_NAMESPACE}.svc.cluster.local"
  NEXTCLOUD_EXTERNAL_URL: "${NEXTCLOUD_EXTERNAL_URL}"
  NEXTCLOUD_ADMIN_USER: "admin"
  NEXTCLOUD_CALDAV_USER: "admin"
  KEYCLOAK_FRONTEND_URL: "${KEYCLOAK_FRONTEND_URL}"
  TRAEFIK_EXTERNAL_URL: "${TRAEFIK_EXTERNAL_URL}"
  MAIL_EXTERNAL_URL: "${MAIL_EXTERNAL_URL}"
  # Portal admin
  PORTAL_ADMIN_USERNAME: "gekko,paddione"
  CALENDAR_NAME: "personal"
  WORK_START_HOUR: "9"
  WORK_END_HOUR: "17"
  SLOT_DURATION_MIN: "60"
  WORK_DAYS: "1,2,3,4,5"
  BOOKING_HORIZON_DAYS: "21"
  MIN_ADVANCE_HOURS: "24"
  # Whisper
  WHISPER_URL: "http://whisper.${WORKSPACE_NAMESPACE}.svc.cluster.local:8000"
  ANTHROPIC_API_KEY: ""
  # Stripe (publishable key is not secret — env-specific, injected via ConfigMap)
  STRIPE_PUBLISHABLE_KEY: "${STRIPE_PUBLISHABLE_KEY}"
  # Brett
  BRETT_DOMAIN: "${BRETT_DOMAIN}"
  # LiveKit
  LIVEKIT_DOMAIN: "livekit.${PROD_DOMAIN}"
  STREAM_DOMAIN: "stream.${PROD_DOMAIN}"
  # Site
  SITE_URL: "${WEBSITE_SITE_URL}"
---
# ── Monitoring RBAC ──────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: website
  namespace: ${WEBSITE_NAMESPACE}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ${WEBSITE_NAMESPACE}-monitoring-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "events", "nodes", "namespaces", "configmaps", "persistentvolumeclaims", "services"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["batch"]
    resources: ["cronjobs", "jobs"]
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list"]
  - apiGroups: ["traefik.io", "traefik.containo.us"]
    resources: ["ingressroutes"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ${WEBSITE_NAMESPACE}-monitoring-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ${WEBSITE_NAMESPACE}-monitoring-reader
subjects:
  - kind: ServiceAccount
    name: website
    namespace: ${WEBSITE_NAMESPACE}
---
# ── Website Deployment ────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: website
  namespace: ${WEBSITE_NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: website
  template:
    metadata:
      labels:
        app: website
    spec:
      serviceAccountName: website
      imagePullSecrets:
        - name: ghcr-pull-secret
      # Lower ndots so FQDNs like shared-db.${WORKSPACE_NAMESPACE}.svc.cluster.local (4 dots)
      # are resolved as absolute names without iterating through search-path suffixes.
      # On clusters where the node inherits a home-router search domain (e.g. fritz.box),
      # the default ndots:5 causes those lookups to time out and Node.js (musl libc)
      # returns EAI_AGAIN — breaking the pg-pool connection on first use.
      dnsConfig:
        options:
          - name: ndots
            value: "3"
      nodeSelector:
        kubernetes.io/arch: amd64
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - gekko-hetzner-2
                      - gekko-hetzner-3
      containers:
        - name: website
          image: ghcr.io/paddione/${WEBSITE_IMAGE}:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          envFrom:
            - configMapRef:
                name: website-config
          env:
            - name: WEBSITE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: website-secrets
                  key: WEBSITE_DB_PASSWORD
            - name: SESSIONS_DATABASE_URL
              value: "postgresql://website:$(WEBSITE_DB_PASSWORD)@shared-db.${WORKSPACE_NAMESPACE}.svc.cluster.local:5432/website"
            - name: CRON_SECRET
              valueFrom:
                secretKeyRef:
                  name: website-secrets
                  key: CRON_SECRET
            - name: WEBSITE_OIDC_SECRET
              valueFrom:
                secretKeyRef:
                  name: website-secrets
                  key: WEBSITE_OIDC_SECRET
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: website-secrets
                  key: SMTP_PASSWORD
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: website-secrets
                  key: STRIPE_SECRET_KEY
            - name: STRIPE_PUBLISHABLE_KEY
              valueFrom:
                configMapKeyRef:
                  name: website-config
                  key: STRIPE_PUBLISHABLE_KEY
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: website-secrets
                  key: STRIPE_WEBHOOK_SECRET
            - name: SEPA_CREDITOR_IBAN
              valueFrom:
                secretKeyRef:
                  name: website-secrets
                  key: SEPA_CREDITOR_IBAN
                  optional: true
            - name: SEPA_CREDITOR_BIC
              valueFrom:
                secretKeyRef:
                  name: website-secrets
                  key: SEPA_CREDITOR_BIC
                  optional: true
            - name: SEPA_CREDITOR_ID
              valueFrom:
                secretKeyRef:
                  name: website-secrets
                  key: SEPA_CREDITOR_ID
                  optional: true
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: website-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
                  optional: true
            - name: NEXTCLOUD_ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: website-secrets
                  key: NEXTCLOUD_ADMIN_PASS
            - name: NEXTCLOUD_CALDAV_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: website-secrets
                  key: NEXTCLOUD_CALDAV_PASSWORD
            - name: DOCUSEAL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: website-secrets
                  key: DOCUSEAL_API_TOKEN
                  optional: true
            - name: DOCUSEAL_INTERNAL_URL
              value: "http://docuseal.${WORKSPACE_NAMESPACE}.svc.cluster.local:3000"
            - name: SELLER_NAME
              valueFrom:
                configMapKeyRef:
                  name: website-seller-config
                  key: SELLER_NAME
            - name: SELLER_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: website-seller-config
                  key: SELLER_ADDRESS
            - name: SELLER_POSTAL_CODE
              valueFrom:
                configMapKeyRef:
                  name: website-seller-config
                  key: SELLER_POSTAL_CODE
            - name: SELLER_CITY
              valueFrom:
                configMapKeyRef:
                  name: website-seller-config
                  key: SELLER_CITY
            - name: SELLER_COUNTRY
              valueFrom:
                configMapKeyRef:
                  name: website-seller-config
                  key: SELLER_COUNTRY
            - name: SELLER_VAT_ID
              valueFrom:
                configMapKeyRef:
                  name: website-seller-config
                  key: SELLER_VAT_ID
            - name: SELLER_TAX_NUMBER
              valueFrom:
                configMapKeyRef:
                  name: website-seller-config
                  key: SELLER_TAX_NUMBER
            - name: BRETT_BOT_SECRET
              valueFrom:
                secretKeyRef:
                  name: website-secrets
                  key: BRETT_BOT_SECRET
            - name: STALENESS_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: website-secrets
                  key: STALENESS_WEBHOOK_SECRET
            - name: MONITORING_WEBHOOK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: website-secrets
                  key: MONITORING_WEBHOOK_TOKEN
            # Nextcloud Talk DB connection — used by /api/admin/brett/broadcast
            # to find rooms with active calls (OCS API is user-scoped and only
            # lists rooms the configured admin is a participant of, which misses
            # most ongoing calls). Read-only query against oc_talk_rooms.
            - name: NEXTCLOUD_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: website-secrets
                  key: NEXTCLOUD_DB_PASSWORD
            - name: STREAM_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: website-config
                  key: STREAM_DOMAIN
            - name: LIVEKIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: website-secrets
                  key: LIVEKIT_API_KEY
            - name: LIVEKIT_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: website-secrets
                  key: LIVEKIT_API_SECRET
            - name: LIVEKIT_RTMP_KEY
              valueFrom:
                secretKeyRef:
                  name: website-secrets
                  key: LIVEKIT_RTMP_KEY
            - name: INTERNAL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: website-secrets
                  key: INTERNAL_API_TOKEN
            - name: LIVEKIT_SERVICE_URL
              value: "http://livekit-server.${WORKSPACE_NAMESPACE}.svc.cluster.local:7880"
          ports:
            - containerPort: 4321
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4321
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4321
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
---
# ── Website Service ───────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: website
  namespace: ${WEBSITE_NAMESPACE}
spec:
  selector:
    app: website
  ports:
    - port: 80
      targetPort: 4321
---
# ── IngressRoute ─────────────────────────────────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: website
  namespace: ${WEBSITE_NAMESPACE}
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`${WEBSITE_HOST}`)
      services:
        - name: website
          port: 80
---
# ── Reminder CronJob (every minute) ─────────────────────────────────────────
apiVersion: batch/v1
kind: CronJob
metadata:
  name: meeting-reminders
  namespace: ${WEBSITE_NAMESPACE}
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 25
      template:
        spec:
          dnsConfig:
            options:
              - name: ndots
                value: "3"
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: website
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: trigger
              image: curlimages/curl:8.7.1
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 65534
                capabilities:
                  drop: ["ALL"]
              command: ["curl", "-sf", "--max-time", "15", "-X", "POST", "http://website.${WEBSITE_NAMESPACE}.svc.cluster.local/api/reminders/process"]
          restartPolicy: Never
---
# ── NetworkPolicies: website-Namespace ───────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: ${WEBSITE_NAMESPACE}
spec:
  podSelector: {}
  policyTypes:
  - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: ${WEBSITE_NAMESPACE}
spec:
  podSelector: {}
  policyTypes:
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: ${WEBSITE_NAMESPACE}
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
---
# Website-Pod darf workspace-Services erreichen
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-workspace
  namespace: ${WEBSITE_NAMESPACE}
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ${WORKSPACE_NAMESPACE}
---
# Traefik-Ingress aus kube-system erlauben
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-ingress
  namespace: ${WEBSITE_NAMESPACE}
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          app.kubernetes.io/name: traefik
---
# CronJob-zu-Website-Service innerhalb website-Namespace (meeting-reminders)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace-egress
  namespace: ${WEBSITE_NAMESPACE}
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace-ingress
  namespace: ${WEBSITE_NAMESPACE}
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector: {}
---
# kube-router IPSet race fix: kurzlebige Job-Pods (z.B. meeting-reminders CronJob)
# werden ggf. nicht schnell genug in das podSelector-IPSet aufgenommen. Das ipBlock-
# Prädikat wird sofort ausgewertet — kein Lookup nötig.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-pod-cidr-ingress
  namespace: ${WEBSITE_NAMESPACE}
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - ipBlock:
        cidr: 10.42.0.0/16
---
# Service-CIDR Egress: CronJob-Pods müssen ClusterIP-Services erreichen können.
# podSelector: {} deckt nur Pod-IPs ab, nicht 10.43.x.x ClusterIPs.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-service-cidr-egress
  namespace: ${WEBSITE_NAMESPACE}
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - ipBlock:
        cidr: 10.43.0.0/16
---
# LiveKit management port: kube-router enforces egress NetworkPolicies AFTER iptables DNAT.
# livekit-server uses hostNetwork so its endpoint IP is the node IP (not in pod/service CIDR).
# Allowing port 7880 by port (not destination) covers the post-DNAT node IP.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-livekit-management-egress
  namespace: ${WEBSITE_NAMESPACE}
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - ports:
    - port: 7880
      protocol: TCP
---
# SMTP Egress: Website-Pod darf externen SMTP-Server erreichen (Mailpit dev / mailbox.org prod)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-smtp-egress
  namespace: ${WEBSITE_NAMESPACE}
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - ports:
    - port: 587
      protocol: TCP
    - port: 1025
      protocol: TCP
---
# Stripe API Egress: Website-Pod darf api.stripe.com (HTTPS) und andere externe HTTPS-Dienste erreichen
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-https-egress
  namespace: ${WEBSITE_NAMESPACE}
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - ports:
    - port: 443
      protocol: TCP
    - port: 6443
      protocol: TCP
