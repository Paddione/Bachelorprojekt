apiVersion: v1
kind: Service
metadata:
  name: whisper
spec:
  # No selector: manually managed Endpoints point to external GPU worker
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Endpoints
metadata:
  name: whisper
subsets:
  - addresses:
      - ip: __HOST_IP__
    ports:
      - port: 8000
