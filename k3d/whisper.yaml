
# ── faster-whisper Transcription Service ─────────────────────────────────────
# CPU-only, medium model. REST API: POST /asr with audio file → transcript.
# Image: fedirz/faster-whisper-server (OpenAI-compatible API)
#
# Usage:
#   curl -X POST http://whisper.workspace.svc.cluster.local:8000/v1/audio/transcriptions \
#     -F "file=@meeting.wav" -F "model=Systran/faster-whisper-medium" -F "language=de"
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whisper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whisper
  template:
    metadata:
      labels:
        app: whisper
    spec:
      containers:
        - name: whisper
          image: fedirz/faster-whisper-server:1.0.0-cpu
          env:
            - name: WHISPER__MODEL
              value: "Systran/faster-whisper-medium"
            - name: WHISPER__COMPUTE_TYPE
              value: "int8"
            - name: WHISPER__DEVICE
              value: "cpu"
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "4Gi"
              cpu: "4000m"
          # Model download can take a few minutes on first start
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: whisper
spec:
  selector:
    app: whisper
  ports:
    - port: 8000
      targetPort: 8000
