# ═══════════════════════════════════════════════════════════════════
# Nextcloud Whiteboard — collaborative whiteboard server
#
# The Nextcloud `whiteboard` app must be installed and its `jwt_secret_key`
# app config must match this Deployment's JWT_SECRET_KEY, otherwise the client
# shows "Problem mit Authentifizierungskonfiguration".
#
# Automated via `task workspace:whiteboard-setup` (also run from post-setup).
# ═══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whiteboard
  labels:
    app: whiteboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whiteboard
  template:
    metadata:
      labels:
        app: whiteboard
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: whiteboard
          image: ghcr.io/nextcloud-releases/whiteboard:v1.5.7
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: NEXTCLOUD_URL
              value: "http://nextcloud"
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: WHITEBOARD_JWT_SECRET
          ports:
            - containerPort: 3002
          readinessProbe:
            httpGet:
              path: /
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: 256Mi
              cpu: "200m"
            limits:
              memory: 512Mi
              cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: whiteboard
spec:
  selector:
    app: whiteboard
  ports:
    - port: 3002
      targetPort: 3002
