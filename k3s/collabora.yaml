# Collabora Online — Document editing (WOPI) for production
apiVersion: apps/v1
kind: Deployment
metadata:
  name: collabora
  namespace: workspace
  labels:
    app: collabora
spec:
  replicas: 1
  selector:
    matchLabels:
      app: collabora
  template:
    metadata:
      labels:
        app: collabora
    spec:
      containers:
        - name: collabora
          image: collabora/code:latest
          env:
            - name: aliasgroup1
              value: "https://files.${PROD_DOMAIN}"
            - name: username
              value: admin
            - name: password
              value: collabora-admin-prod
            - name: server_name
              value: office.${PROD_DOMAIN}
            - name: dictionaries
              value: "de_DE en_US"
            - name: extra_params
              value: "--o:ssl.enable=false --o:ssl.termination=true"
          ports:
            - containerPort: 9980
          readinessProbe:
            httpGet:
              path: /
              port: 9980
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              memory: 256Mi
              cpu: 200m
            limits:
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: collabora
  namespace: workspace
spec:
  selector:
    app: collabora
  ports:
    - port: 9980
      targetPort: 9980
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: collabora
  namespace: workspace
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`office.${PROD_DOMAIN}`)
      middlewares:
        - name: default-chain
          namespace: korczewski-infra
      services:
        - name: collabora
          port: 9980
  tls:
    secretName: korczewski-tls
