# ── Production IngressRoute for korczewski-website ──────────────────────────
# HTTPS + Let's Encrypt via Traefik certResolver
# Deployment uses image ghcr.io/paddione/workspace-website:latest (shared image).
# All env vars (BRAND, SITE_URL, SMTP_*, MATTERMOST_*, KEYCLOAK_*, etc.) are
# injected via the ConfigMap in k3d/korczewski-website.yaml.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: korczewski-website
  namespace: korczewski-website
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`web.korczewski.de`)
      services:
        - name: korczewski-website
          port: 80
  tls:
    certResolver: letsencrypt
