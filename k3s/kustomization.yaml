apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: workspace

# Base: dev manifests from k3d/
resources:
  - ../k3d

# Production overrides
patches:
  # ── Domain ConfigMap ─────────────────────────────────────────────
  - target:
      kind: ConfigMap
      name: domain-config
    patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: domain-config
      data:
        KC_DOMAIN: "auth.${PROD_DOMAIN}"
        NC_DOMAIN: "files.${PROD_DOMAIN}"
        SIGNALING_DOMAIN: "signaling.${PROD_DOMAIN}"
        COLLABORA_DOMAIN: "office.${PROD_DOMAIN}"
        WHITEBOARD_DOMAIN: "board.${PROD_DOMAIN}"
        VAULT_DOMAIN: "vault.${PROD_DOMAIN}"
        MAIL_DOMAIN: "mail.${PROD_DOMAIN}"
        DOCS_DOMAIN: "docs.${PROD_DOMAIN}"
        BILLING_DOMAIN: "billing.${PROD_DOMAIN}"
        WEB_DOMAIN: "web.${PROD_DOMAIN}"

  # ── Ingress: production domains + Traefik ────────────────────────
  - target:
      kind: Ingress
      name: workspace-ingress
    path: patches/ingress.yaml

  # ── Nextcloud: trusted domains + HTTPS ───────────────────────────
  - target:
      kind: Deployment
      name: nextcloud
    path: patches/nextcloud.yaml

  # Collabora is deployed via the separate office-stack ArgoCD
  # Application (k3d/office-stack + argocd/applicationset-office.yaml)
  # because it needs CAP_SYS_ADMIN in a dedicated privileged ns.

  # ── Vaultwarden: production DOMAIN + SSO authority ──────────────
  - target:
      kind: Deployment
      name: vaultwarden
    path: patches/vaultwarden.yaml

  # ── Storage: use local-path provisioner (no SMB CSI driver) ────────
  - path: patches/storage.yaml

  # ── DB pods: securityContext for runAsUser consistency ───────────
  - target:
      kind: Deployment
      name: keycloak-db
    path: patches/db-security.yaml
  - target:
      kind: Deployment
  - target:
      kind: Deployment
      name: nextcloud-db
    path: patches/db-security.yaml

# Production realm template (https:// redirect URIs, sslRequired: external)
configMapGenerator:
  - name: realm-template
    behavior: replace
    files:
      - realm-workspace.json=realm-workspace-prod.json

generatorOptions:
  disableNameSuffixHash: true
