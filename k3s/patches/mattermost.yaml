apiVersion: apps/v1
kind: Deployment
metadata:
  name: mattermost
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: mattermost
          env:
            - name: MM_SERVICESETTINGS_SITEURL
              value: "https://chat.wbhprojekt.ipv64.de"
            - name: MM_GITLABSETTINGS_AUTHENDPOINT
              value: "https://auth.wbhprojekt.ipv64.de/realms/homeoffice/protocol/openid-connect/auth"
