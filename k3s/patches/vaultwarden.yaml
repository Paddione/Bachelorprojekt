apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden
spec:
  template:
    spec:
      containers:
        - name: vaultwarden
          env:
            - name: DOMAIN
              value: "https://vault.${PROD_DOMAIN}"
            - name: SSO_AUTHORITY
              value: "https://auth.${PROD_DOMAIN}/realms/workspace"
