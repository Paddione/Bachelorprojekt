apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden
spec:
  template:
    spec:
      containers:
        - name: vaultwarden
          env:
            - name: DOMAIN
              value: "https://vault.korczewski.de"
            - name: SSO_AUTHORITY
              value: "https://auth.korczewski.de/realms/workspace"
