# Nextcloud Talk — High Performance Backend for production
# Components: NATS, Janus (WebRTC SFU), spreed-signaling, coturn

# ── NATS ─────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: workspace
  labels:
    app: nats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          ports:
            - containerPort: 4222
          resources:
            requests:
              memory: 32Mi
              cpu: 50m
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: workspace
spec:
  selector:
    app: nats
  ports:
    - port: 4222
      targetPort: 4222

---
# ── Janus WebRTC Gateway ─────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: janus-config
  namespace: workspace
data:
  janus.jcfg: |
    general: { admin_secret = "prodjanusadmin" }
    nat: {
      stun_server = "coturn"
      stun_port = 3478
      turn_server = "coturn"
      turn_port = 3478
      turn_type = "udp"
      turn_user = "talk"
      turn_pwd = "prodturnpassword"
    }
    media: { rtp_port_range = "20000-40000" }
  janus.plugin.videoroom.jcfg: |
    general: { admin_key = "prodvideoroomadmin" }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: janus
  namespace: workspace
  labels:
    app: janus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: janus
  template:
    metadata:
      labels:
        app: janus
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: janus
          image: canyan/janus-gateway:latest
          ports:
            - containerPort: 8188
          volumeMounts:
            - name: config
              mountPath: /usr/local/etc/janus/janus.jcfg
              subPath: janus.jcfg
            - name: config
              mountPath: /usr/local/etc/janus/janus.plugin.videoroom.jcfg
              subPath: janus.plugin.videoroom.jcfg
          resources:
            requests:
              memory: 128Mi
              cpu: 200m
            limits:
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: janus-config
---
apiVersion: v1
kind: Service
metadata:
  name: janus
  namespace: workspace
spec:
  selector:
    app: janus
  ports:
    - port: 8188
      targetPort: 8188

---
# ── coturn (TURN/STUN) ──────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coturn
  namespace: workspace
  labels:
    app: coturn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coturn
  template:
    metadata:
      labels:
        app: coturn
    spec:
      containers:
        - name: coturn
          image: coturn/coturn:4.6-alpine
          args:
            - --no-tls
            - --no-dtls
            - --realm=${PROD_DOMAIN}
            - --user=talk:prodturnpassword
            - --lt-cred-mech
          ports:
            - containerPort: 3478
              protocol: UDP
            - containerPort: 3478
              protocol: TCP
          resources:
            requests:
              memory: 32Mi
              cpu: 50m
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: coturn
  namespace: workspace
spec:
  selector:
    app: coturn
  ports:
    - name: turn-udp
      port: 3478
      targetPort: 3478
      protocol: UDP
    - name: turn-tcp
      port: 3478
      targetPort: 3478
      protocol: TCP

---
# ── spreed-signaling (HPB coordination) ─────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: signaling-config
  namespace: workspace
data:
  server.conf: |
    [http]
    listen = 0.0.0.0:8080

    [sessions]
    hashkey = a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6a7b8c9d0e1f2a3b4c5d6a7b8c9d0e1f2
    blockkey = a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6

    [backend]
    backends = backend-1

    [backend-1]
    url = https://files.${PROD_DOMAIN}
    secret = prodsignalingsecret1234567890abcdef

    [nats]
    url = nats://nats:4222

    [mcu]
    type = janus
    url = ws://janus:8188

    [turn]
    apikey = prodturnapikey1234567890
    secret = prodturnpassword
    servers = turn:coturn:3478?transport=udp,turn:coturn:3478?transport=tcp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spreed-signaling
  namespace: workspace
  labels:
    app: spreed-signaling
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spreed-signaling
  template:
    metadata:
      labels:
        app: spreed-signaling
    spec:
      containers:
        - name: signaling
          image: strukturag/nextcloud-spreed-signaling:1.2.4
          env:
            - name: CONFIG
              value: /etc/signaling/server.conf
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /etc/signaling/server.conf
              subPath: server.conf
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/v1/welcome
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 64Mi
              cpu: 100m
            limits:
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: signaling-config
---
apiVersion: v1
kind: Service
metadata:
  name: spreed-signaling
  namespace: workspace
spec:
  selector:
    app: spreed-signaling
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: signaling
  namespace: workspace
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`signaling.${PROD_DOMAIN}`)
      middlewares:
        - name: default-chain
          namespace: ${INFRA_NAMESPACE}
      services:
        - name: spreed-signaling
          port: 8080
  tls:
    secretName: ${TLS_SECRET_NAME}
