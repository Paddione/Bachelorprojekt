# ── Production IngressRoute override ─────────────────────────────────────────
# Replaces the dev IngressRoute with HTTPS + Let's Encrypt for production.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: website
  namespace: website
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`web.korczewski.de`)
      middlewares:
        - name: default-chain
          namespace: korczewski-infra
      services:
        - name: website
          port: 80
  tls:
    certResolver: letsencrypt
