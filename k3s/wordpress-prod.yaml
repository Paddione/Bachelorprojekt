# ── WordPress — Production Deployment ─────────────────────────────────────────
# Standalone manifest (outside Kustomize stack — apply separately).
#
# Apply:
#   kubectl apply -f k3s/wordpress-prod.yaml
#
# Then run the init Job and Anfragen setup:
#   kubectl apply -f k3d/wordpress-init-job.yaml
#   kubectl wait --for=condition=complete job/wordpress-init -n wordpress --timeout=300s
#   bash scripts/mattermost-anfragen-setup.sh
#
# IMPORTANT: Replace all placeholder secrets below before applying to production.
# Use: kubectl create secret generic mariadb-secret -n wordpress \
#        --from-literal=MYSQL_ROOT_PASSWORD=<strong-password> \
#        --from-literal=MYSQL_DATABASE=wordpress \
#        --from-literal=MYSQL_USER=wordpress \
#        --from-literal=MYSQL_PASSWORD=<strong-password> \
#        --dry-run=client -o yaml | kubectl apply -f -
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: wordpress
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
---
# ── MariaDB Secret ────────────────────────────────────────────────────────────
# Replace values with production-strength passwords before applying.
apiVersion: v1
kind: Secret
metadata:
  name: mariadb-secret
  namespace: wordpress
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "REPLACE_WITH_STRONG_ROOT_PASSWORD"
  MYSQL_DATABASE: "wordpress"
  MYSQL_USER: "wordpress"
  MYSQL_PASSWORD: "REPLACE_WITH_STRONG_DB_PASSWORD"
---
# ── WordPress OIDC Secret ─────────────────────────────────────────────────────
# Must match WORDPRESS_OIDC_SECRET in homeoffice-secrets (k3d/secrets.yaml).
apiVersion: v1
kind: Secret
metadata:
  name: wordpress-oidc-secret
  namespace: wordpress
type: Opaque
stringData:
  client-secret: "REPLACE_WITH_WORDPRESS_OIDC_SECRET"
---
# ── PHP Upload Limits ConfigMap ───────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: wordpress-php-config
  namespace: wordpress
data:
  uploads.ini: |
    upload_max_filesize = 512M
    post_max_size       = 512M
    memory_limit        = 512M
    max_execution_time  = 300
    max_input_time      = 300
---
# ── MariaDB PVC ───────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mariadb-pvc
  namespace: wordpress
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: smb-storage
  resources:
    requests:
      storage: 5Gi
---
# ── MariaDB Deployment ────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
  namespace: wordpress
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
        - name: mariadb
          image: mariadb:11
          envFrom:
            - secretRef:
                name: mariadb-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
          livenessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mariadb-pvc
---
# ── MariaDB Service ───────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: mariadb
  namespace: wordpress
spec:
  selector:
    app: mariadb
  ports:
    - port: 3306
---
# ── MariaDB Service alias (mysql) ────────────────────────────
# wp-config.php may store DB_HOST as "mysql" if the site was first initialised
# with that hostname. This alias ensures WP-CLI and any legacy config can
# resolve the same endpoint as the "mariadb" Service.
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: wordpress
spec:
  selector:
    app: mariadb
  ports:
    - port: 3306
---
# ── WordPress PVC ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wordpress-pvc
  namespace: wordpress
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: smb-storage
  resources:
    requests:
      storage: 5Gi
---
# ── WordPress Deployment ──────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
  namespace: wordpress
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wordpress
  template:
    metadata:
      labels:
        app: wordpress
    spec:
      containers:
        - name: wordpress
          image: wordpress:6-apache
          env:
            - name: WORDPRESS_DB_HOST
              value: "mariadb:3306"
            - name: WORDPRESS_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: MYSQL_DATABASE
            - name: WORDPRESS_DB_USER
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: MYSQL_USER
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: MYSQL_PASSWORD
            # Trust Traefik's X-Forwarded-Proto so WordPress generates https:// URLs.
            # Without this, WP generates http:// asset URLs behind the HTTPS ingress,
            # causing mixed-content errors and redirect loops.
            - name: WORDPRESS_CONFIG_EXTRA
              value: |
                define('FORCE_SSL_ADMIN', true);
                if (isset($_SERVER['HTTP_X_FORWARDED_PROTO']) && strpos($_SERVER['HTTP_X_FORWARDED_PROTO'], 'https') !== false) {
                    $_SERVER['HTTPS'] = 'on';
                }
          volumeMounts:
            - name: data
              mountPath: /var/www/html
            - name: php-config
              mountPath: /usr/local/etc/php/conf.d/uploads.ini
              subPath: uploads.ini
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
          # TCP probe avoids following FORCE_SSL_ADMIN redirects to the
          # external HTTPS URL, which causes the httpGet probe to time out.
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: wordpress-pvc
        - name: php-config
          configMap:
            name: wordpress-php-config
---
# ── WordPress Service ─────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: wordpress
  namespace: wordpress
spec:
  selector:
    app: wordpress
  ports:
    - port: 80
---
# ── IngressRoute (HTTPS) ──────────────────────────────────────────────────────
# Traefik built-in ACME — TLS cert obtained automatically on first request.
# No cert-manager needed.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: wordpress
  namespace: wordpress
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`web.wbhprojekt.ipv64.de`)
      middlewares:
        - name: default-chain
          namespace: korczewski-infra
      services:
        - name: wordpress
          port: 80
  tls:
    certResolver: letsencrypt
