server {
    listen 8081;

    # Proxy for Mattermost GitLab OAuth: translates ?access_token=xxx
    # to Authorization: Bearer xxx (Keycloak only accepts the header).
    location /userinfo {
        set $token $arg_access_token;
        proxy_set_header Authorization "Bearer $token";
        proxy_set_header Host $proxy_host;
        proxy_pass http://keycloak:8080/realms/homeoffice/protocol/openid-connect/userinfo;
    }
}
