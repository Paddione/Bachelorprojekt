log_format proxy_log '$remote_addr [$time_local] "$request" $status args="$args"';

server {
    listen 8081;
    access_log /var/log/nginx/access.log proxy_log;

    location / {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Token endpoint proxy (for debugging)
    location /token {
        proxy_set_header Host $proxy_host;
        proxy_pass http://keycloak:8080/realms/workspace/protocol/openid-connect/token;
    }

    # Userinfo proxy: translates ?access_token=xxx to Bearer header,
    # AND forwards any existing Authorization header.
    location /userinfo {
        set $bearer $http_authorization;
        if ($arg_access_token) {
            set $bearer "Bearer $arg_access_token";
        }
        proxy_set_header Authorization $bearer;
        proxy_set_header Host $proxy_host;
        proxy_pass http://keycloak:8080/realms/workspace/protocol/openid-connect/userinfo;
    }
}
