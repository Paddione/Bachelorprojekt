  # Sessions Server
  - prefix: k3d/sessions-server
    spec: sessions-server
  - prefix: scripts/session-hub
    spec: sessions-server
  - prefix: Taskfile.session
    spec: sessions-server

  # Fleet Operations
  - prefix: wireguard/
    spec: fleet-operations
  - prefix: scripts/fleet
    spec: fleet-operations
  - prefix: scripts/wg-mesh
    spec: fleet-operations
  - prefix: prod-fleet/
    spec: fleet-operations

  # Monitoring / Alerts
  - prefix: k3d/prometheus
    spec: monitoring-alerts
  - prefix: k3d/alertmanager
    spec: monitoring-alerts
  - prefix: k3d/grafana
    spec: monitoring-alerts

  # LLM Local Dev (Openclaw)
  - prefix: openclaw/
    spec: llm-local-dev
  - prefix: Taskfile.openclaw
    spec: llm-local-dev

  # MCP Gateway
  - prefix: deploy/mcp/
    spec: mcp-gateway
  - prefix: .claude/skills/references/mcp-tool-guide
    spec: mcp-gateway
  - prefix: scripts/mcp
    spec: mcp-gateway
