schema: spec-driven

context: |
  Stack: Astro 5 + Svelte 5, Node.js 22, TypeScript, PostgreSQL 16, Kubernetes/k3s (k3d lokal)
  Auth: Keycloak OIDC (SSO für alle Services — Website, Nextcloud, Vaultwarden, DocuSeal, Claude Code)
  Multi-brand: mentolder (namespace: workspace), korczewski (namespace: workspace-korczewski), beide auf Fleet-Cluster
  CI: GitHub Actions — Offline-Tests (BATS + Kustomize), Security Scan, Vitest, Playwright E2E (nightly)
  Conventions: Conventional Commits, squash-merge, Branches: feature/* fix/* chore/*
  Deploy: push-basiert via `task workspace:deploy ENV=<brand>` — kein GitOps-Reconciler
  Testing: BATS (unit), Playwright (E2E), task test:all = CI-Gate
  Services: Traefik, Keycloak, Nextcloud+Talk, Collabora, Vaultwarden, DocuSeal, LiveKit, Website, Brett, Sidekick, Software-Factory
  LLM: lokaler GPU-Host (RTX 5070 Ti) via Ollama + TEI — beide Brands geteilt, kollektions-isoliert
  Secrets: SealedSecrets (prod) / k3d/secrets.yaml (dev)
  OpenSpec-Komponenten: |
    active-sessions-hub, admin-cockpit, astro-type-check, auth-sso, backup-pipeline,
    billing-pipeline, brett, centralized-logging, coaching-sessions-polish-guide, chat-inbox, ci-cd,
    collabora-integration, database, datev-export, decouple-tickets-db, dev-flow-plan,
    fleet-operations, grilling-flow, livekit-integration, llm-local-dev, llm-pipeline,
    loc-budget, mcp-gateway, mcp-skill-integration, mcp-task-runner, mediaviewer,
    monitoring-alerts, newsletter-system, nextcloud-integration, openspec-pgvector,
    openspec-upstream-cli, openspec-workflow, planning-office, portal,
    projekttickets-cockpit, questionnaire-system, react-homepage-blocks,
    react-login-edit-homepage, secret-rotation, secrets-deploy-automation, security,
    sessions-server, sidekick-assistant, software-factory, t1224-lockfile-drift,
    ticket-system, vaultwarden-integration, website-core, workspace-deploy,
    divergence-guard, g-cq02-any-types-batch1, t001352-seed-invoice-counter-conflict,
    t001361-fe01-a11y


rules:
  proposal:
    - Schreibe Requirements auf Deutsch, Scenarios auf Englisch (GIVEN/WHEN/THEN)
    - Jede Requirement-ID eindeutig und sprechend (z.B. REQ-COCKPIT-AUTH-001)
    - Non-Goals explizit benennen wenn Abgrenzung wichtig
    - Delta-Specs referenzieren den SSOT-Spec der betroffenen Komponente
  tasks:
    - Aufgaben auf max. 2 Stunden Aufwand begrenzen
    - Jeden Task einem konkreten Dateipfad zuordnen wenn möglich
  specs:
    - Jede SSOT-Spec deklariert ## Purpose + ## Requirements H2-Header (enforced by scripts/openspec-validate.ts)
    - Purpose-Text auf Deutsch, Requirements + Scenarios auf Englisch (GIVEN/WHEN/THEN)
    - H3 ist ### Requirement: (H2 Requirement: ist verboten)
  design:
    - Goals und Non-Goals explizit trennen
    - Decisions mit Begründung und ggf. Trade-offs dokumentieren
