apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: workspace-dev

resources:
  - ../../k3d/dev-stack

patches:
  - target:
      kind: Namespace
      name: monitoring
    patch: |-
      $patch: delete
