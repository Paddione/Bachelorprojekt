apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# korczewski brand on fleet — reuse the existing prod-korczewski overlay (already
# pins pk nodes), then apply fleet-common to delete the cluster singletons the
# platform layer owns. Namespace stays workspace-korczewski.
resources:
  - ../../prod-korczewski
  - ../../prod/monitoring
  - ../../prod/patch-oauth2-proxy-brain-deployment.yaml
  - ../../prod/patch-oauth2-proxy-brett-deployment.yaml
  - ../../prod/patch-oauth2-proxy-comfy-deployment.yaml
  - ../../prod/patch-oauth2-proxy-docs-deployment.yaml
  - ../../prod/patch-oauth2-proxy-downloads-deployment.yaml
  - ../../prod/patch-oauth2-proxy-mailpit-deployment.yaml
  - ../../prod/patch-oauth2-proxy-mediaviewer-deployment.yaml
  - ../../prod/patch-oauth2-proxy-rustdesk-web-deployment.yaml
  - ../../prod/patch-oauth2-proxy-studio-deployment.yaml
  - ../../prod/patch-oauth2-proxy-traefik-deployment.yaml
  - ../../prod/patch-oauth2-proxy-videovault-deployment.yaml
components:
  - ../components/fleet-common
