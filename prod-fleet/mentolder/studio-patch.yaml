# ═══════════════════════════════════════════════════════════════════
# Coaching Studio — prod overlay for mentolder brand on the fleet
# cluster. Pins image-digest, prod-issuer, prod TLS, and node-affinity
# for fleet pk nodes. (T001002)
# ═══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: studio-server
  labels:
    app: studio-server
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: [pk-hetzner-4, pk-hetzner-6, pk-hetzner-8]
      containers:
        - name: studio-server
          image: ${STUDIO_IMAGE}@${STUDIO_IMAGE_DIGEST}
