apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Staging environment on fleet — fully isolated workspace-staging namespace.
# Wraps the k3d base + prod patches (same full service stack as prod brands),
# then applies fleet-common to delete cluster singletons owned by prod-fleet/platform.
# Namespace is workspace-staging (not workspace — no collision with mentolder).
namespace: workspace-staging

resources:
  - ../../prod
  - wildcard-certificate.yaml

# monitoring is NOT included — the monitoring Namespace object from
# k3d/monitoring/namespace.yaml would collide with the k3d/base workspace
# Namespace when kustomize renames both to workspace-staging. Staging reuses
# the fleet cluster's existing monitoring infrastructure (no need for
# duplicate Prometheus/Grafana/Otel on staging).

components:
  - ../components/fleet-common

# realm-template removed — Keycloak decommissioned
generatorOptions:
  disableNameSuffixHash: true

patches:
  # ── Delete the prod wildcard Certificate — staging provides its own
  #     (prod-fleet/staging/wildcard-certificate.yaml) with staging-specific
  #     reflector annotations pointing at WEBSITE_NAMESPACE=website-staging.
  - target: { group: cert-manager.io, version: v1, kind: Certificate, name: workspace-wildcard }
    patch: |-
      $patch: delete
      apiVersion: cert-manager.io/v1
      kind: Certificate
      metadata: { name: workspace-wildcard }
  # ── Node-affinity repoints for fleet pk nodes ──
  #     Most workloads schedule fine via NotIn on home workers (from prod-mentolder).
  #     whisper needs a fleet node (no GPU, but at least schedules instead of Pending).
  - target:
      kind: Deployment
      name: whisper
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: whisper
      spec:
        template:
          spec:
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: kubernetes.io/hostname
                          operator: In
                          values: [pk-hetzner-4, pk-hetzner-6, pk-hetzner-8]
  # ── Lower resource requests for staging footprint reduction ──
  - target:
      kind: Deployment
      name: shared-db
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: shared-db
      spec:
        template:
          spec:
            containers:
              - name: postgres
                resources:
                  requests:
                    cpu: "100m"
                    memory: "256Mi"
