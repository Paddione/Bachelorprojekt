apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: website-ingress-web
  namespace: website
  annotations:
    # T002052: use the website-scoped security-headers (no noindex) so the public
    # site stays crawlable. Internal services keep workspace-security-headers (noindex).
    traefik.ingress.kubernetes.io/router.middlewares: >-
      workspace-redirect-https@kubernetescrd,workspace-hsts-headers@kubernetescrd,website-website-security-headers@kubernetescrd,workspace-rate-limit-web@kubernetescrd,website-website-compress@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - web.${PROD_DOMAIN}
      secretName: workspace-wildcard-tls
  rules:
    - host: web.${PROD_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: website
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: website-ingress-astro
  namespace: website
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: >-
      website-website-compress@kubernetescrd,website-website-static-cache@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - web.${PROD_DOMAIN}
      secretName: workspace-wildcard-tls
  rules:
    - host: web.${PROD_DOMAIN}
      http:
        paths:
          - path: /_astro/
            pathType: Prefix
            backend:
              service:
                name: website
                port:
                  number: 80
