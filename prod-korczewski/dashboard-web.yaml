apiVersion: v1
kind: ServiceAccount
metadata:
  name: dashboard-web
  namespace: workspace
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dashboard-readonly
  namespace: workspace
rules:
  - apiGroups: [""]
    resources: [pods, services]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get, list]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses]
    verbs: [get, list, watch]
  - apiGroups: [traefik.io]
    resources: [ingressroutes]
    verbs: [get, list, watch]
  - apiGroups: [batch]
    resources: [jobs]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dashboard-readonly
  namespace: workspace
subjects:
  - kind: ServiceAccount
    name: dashboard-web
    namespace: workspace
roleRef:
  kind: Role
  name: dashboard-readonly
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dashboard-readonly-argocd
  namespace: argocd
rules:
  - apiGroups: [argoproj.io]
    resources: [applications]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dashboard-readonly-argocd
  namespace: argocd
subjects:
  - kind: ServiceAccount
    name: dashboard-web
    namespace: workspace
roleRef:
  kind: Role
  name: dashboard-readonly-argocd
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-web
  namespace: workspace
  labels:
    app: dashboard-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-web
  template:
    metadata:
      labels:
        app: dashboard-web
    spec:
      serviceAccountName: dashboard-web
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dashboard-web
          image: ghcr.io/paddione/workspace-dashboard:0.2.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: BRAND
              value: "${BRAND_ID}"
            - name: PORTAL_ADMIN_USERNAME
              value: "${KC_USER1_USERNAME},${KC_USER2_USERNAME}"
            - name: PGHOST
              value: shared-db.workspace.svc.cluster.local
            - name: PGUSER
              value: website
            - name: PGDATABASE
              value: website
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: WEBSITE_DB_PASSWORD
          readinessProbe:
            httpGet: { path: /healthz, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: art-library
              mountPath: /app/public/art-library
              readOnly: true
          resources:
            requests: { memory: 128Mi, cpu: "50m" }
            limits:   { memory: 256Mi, cpu: "300m" }
      volumes:
        - name: art-library
          configMap:
            name: art-library
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-web
  namespace: workspace
spec:
  selector: { app: dashboard-web }
  ports:
    - port: 3000
      targetPort: 3000
