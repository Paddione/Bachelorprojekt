apiVersion: v1
kind: ServiceAccount
metadata:
  name: ddns-updater
  namespace: workspace
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ddns-updater
  namespace: workspace
rules:
  - apiGroups: [""]
    resources: [configmaps]
    resourceNames: [ddns-last-ip]
    verbs: [get, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ddns-updater
  namespace: workspace
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ddns-updater
subjects:
  - kind: ServiceAccount
    name: ddns-updater
    namespace: workspace
---
# Stores the last successfully pushed IP so the CronJob can skip no-op updates.
# Written by ddns-updater; initial value is empty (triggers first-run update).
apiVersion: v1
kind: ConfigMap
metadata:
  name: ddns-last-ip
  namespace: workspace
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
data:
  ip: ""
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ddns-updater
  namespace: workspace
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ddns-updater
          restartPolicy: OnFailure
          containers:
            - name: updater
              image: curlimages/curl:latest
              imagePullPolicy: IfNotPresent
              env:
                - name: IPV64_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: ddns-ipv64-key
                      key: IPV64_API_KEY
                - name: DDNS_HOSTNAME
                  value: "korczewski.de"
                - name: DDNS_ALIASES
                  value: "web.korczewski.de"
              command: ["/bin/sh", "-c"]
              args:
                - |
                  CURRENT_IP=$(curl -sf --max-time 5 https://api.ipify.org \
                    || curl -sf --max-time 5 https://ifconfig.me \
                    || curl -sf --max-time 5 https://icanhazip.com || true)

                  if [ -z "$CURRENT_IP" ]; then
                    echo "ERROR: could not determine public IP" >&2
                    exit 1
                  fi

                  TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                  CACERT=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                  NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
                  KUBE=https://kubernetes.default.svc

                  LAST_IP=$(curl -sf --cacert "$CACERT" \
                    -H "Authorization: Bearer $TOKEN" \
                    "$KUBE/api/v1/namespaces/$NS/configmaps/ddns-last-ip" \
                    | grep -o '"ip":"[^"]*"' | sed 's/"ip":"//;s/"//g' || true)

                  if [ "$CURRENT_IP" = "$LAST_IP" ]; then
                    echo "IP unchanged ($CURRENT_IP) — skipping update"
                    exit 0
                  fi

                  echo "IP changed: '${LAST_IP:-<none>}' -> '$CURRENT_IP' — updating ipv64..."

                  HTTP_STATUS=$(curl -o /dev/null -w "%{http_code}" --max-time 10 \
                    -H "Authorization: Bearer $IPV64_API_KEY" \
                    "https://ipv64.net/api?update_record=$DDNS_HOSTNAME&type=A&content=$CURRENT_IP" \
                    || echo "000")

                  if [ "$HTTP_STATUS" != "200" ]; then
                    echo "ERROR: ipv64 returned HTTP $HTTP_STATUS for $DDNS_HOSTNAME" >&2
                    exit 1
                  fi

                  for ALIAS in $DDNS_ALIASES; do
                    ALIAS_STATUS=$(curl -o /dev/null -w "%{http_code}" --max-time 10 \
                      -H "Authorization: Bearer $IPV64_API_KEY" \
                      "https://ipv64.net/api?update_record=$ALIAS&type=A&content=$CURRENT_IP" \
                      || echo "000")
                    if [ "$ALIAS_STATUS" != "200" ]; then
                      echo "WARN: ipv64 returned HTTP $ALIAS_STATUS for $ALIAS" >&2
                    else
                      echo "✓ $ALIAS -> $CURRENT_IP"
                    fi
                  done

                  # Persist new IP — non-fatal; DNS update already succeeded above
                  if curl -sf --cacert "$CACERT" \
                    -H "Authorization: Bearer $TOKEN" \
                    -H "Content-Type: application/merge-patch+json" \
                    -X PATCH \
                    "$KUBE/api/v1/namespaces/$NS/configmaps/ddns-last-ip" \
                    -d "{\"data\":{\"ip\":\"$CURRENT_IP\"}}" > /dev/null 2>&1; then
                    echo "✓ $DDNS_HOSTNAME -> $CURRENT_IP"
                  else
                    echo "WARN: failed to persist IP to ConfigMap; next run will re-check" >&2
                    echo "✓ $DDNS_HOSTNAME -> $CURRENT_IP (DNS updated)"
                  fi
