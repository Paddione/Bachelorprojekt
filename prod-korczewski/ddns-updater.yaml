apiVersion: v1
kind: ServiceAccount
metadata:
  name: ddns-updater
  namespace: workspace
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ddns-updater
  namespace: workspace
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: ddns-updater
        spec:
          serviceAccountName: ddns-updater
          restartPolicy: OnFailure
          containers:
            - name: updater
              image: curlimages/curl:8.7.1
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  cpu: "10m"
                  memory: "32Mi"
                limits:
                  cpu: "200m"
                  memory: "64Mi"
              env:
                - name: IPV64_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: ddns-ipv64-key
                      key: IPV64_API_KEY
                - name: DDNS_HOSTNAME
                  value: "korczewski.de"
                - name: DDNS_ALIASES
                  value: "web.korczewski.de"
              command: ["/bin/sh", "-c"]
              args:
                - |
                  CURRENT_IP=$(curl -sf --max-time 5 https://api.ipify.org \
                    || curl -sf --max-time 5 https://ifconfig.me \
                    || curl -sf --max-time 5 https://icanhazip.com || true)

                  if [ -z "$CURRENT_IP" ]; then
                    echo "ERROR: could not determine public IP" >&2
                    exit 1
                  fi

                  echo "Current IP: $CURRENT_IP — updating ipv64..."

                  HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
                    -H "Authorization: Bearer $IPV64_API_KEY" \
                    "https://ipv64.net/api?update_record=$DDNS_HOSTNAME&type=A&content=$CURRENT_IP" \
                    || echo "000")

                  if [ "$HTTP_STATUS" != "200" ]; then
                    echo "ERROR: ipv64 returned HTTP $HTTP_STATUS for $DDNS_HOSTNAME" >&2
                    exit 1
                  fi
                  echo "✓ $DDNS_HOSTNAME -> $CURRENT_IP"

                  for ALIAS in $DDNS_ALIASES; do
                    ALIAS_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
                      -H "Authorization: Bearer $IPV64_API_KEY" \
                      "https://ipv64.net/api?update_record=$ALIAS&type=A&content=$CURRENT_IP" \
                      || echo "000")
                    if [ "$ALIAS_STATUS" != "200" ]; then
                      echo "WARN: ipv64 returned HTTP $ALIAS_STATUS for $ALIAS" >&2
                    else
                      echo "✓ $ALIAS -> $CURRENT_IP"
                    fi
                  done
