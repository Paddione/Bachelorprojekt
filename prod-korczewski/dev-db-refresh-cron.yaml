# ════════════════════════════════════════════════════════════════════
# dev-db-refresh — nightly refresh of the dev k3d shared-db-dev from prod.
# Pinned to $DEV_NODE with hostNetwork so it can reach the k3d-published
# Postgres NodePort at 127.0.0.1:15432.
#
# T000286 (mentolder): the dev node has no Longhorn CSI driver, so this pod
# can never attach the RWO Longhorn backup-pvc. Fix: drop the backup-pvc
# mount and stream a live pg_dump from the prod shared-db Service over the
# cluster network (dnsPolicy ClusterFirstWithHostNet resolves shared-db)
# straight into dev Postgres. Mirrored here for parity (this CronJob is not
# currently wired into prod-korczewski/kustomization.yaml).
# The script (scripts/dev-db-refresh.sh, mounted via ConfigMap by
# prod-korczewski/kustomization.yaml) takes the live path when SOURCE_PGHOST
# is set; the local `task dev:db:refresh` path still restores snapshot files.
# ════════════════════════════════════════════════════════════════════
apiVersion: batch/v1
kind: CronJob
metadata:
  name: dev-db-refresh
  namespace: ${WORKSPACE_NAMESPACE}
spec:
  schedule: "30 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
          nodeSelector:
            kubernetes.io/hostname: ${DEV_NODE}
          containers:
            - name: refresh
              image: pgvector/pgvector:0.8.0-pg16@sha256:a132765ec351c65111b5b675928a3a0515a466a40f97277329db8b8209ad8bc9
              command: [/bin/bash, /scripts/dev-db-refresh.sh]
              env:
                # Destination: dev k3d Postgres via the k3d NodePort.
                - name: PGHOST
                  value: 127.0.0.1
                - name: PGPORT
                  value: "15432"
                # Source: live prod shared-db over the cluster network.
                # Resolves via ClusterFirstWithHostNet → shared-db.<ns>.svc.
                - name: SOURCE_PGHOST
                  value: shared-db
                - name: SOURCE_PGPORT
                  value: "5432"
                - name: SOURCE_DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: workspace-secrets
                      key: WEBSITE_DB_PASSWORD
                - name: DEV_SHARED_DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: workspace-secrets
                      key: DEV_SHARED_DB_PASSWORD
                - name: DEV_WEBSITE_DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: workspace-secrets
                      key: DEV_WEBSITE_DB_PASSWORD
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
              resources:
                requests:
                  memory: 256Mi
                  cpu: 100m
                limits:
                  memory: 1Gi
                  cpu: 1000m
          volumes:
            - name: scripts
              configMap:
                name: dev-db-refresh-script
                defaultMode: 0755
