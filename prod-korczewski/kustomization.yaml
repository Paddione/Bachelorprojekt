apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: workspace-korczewski

# Inherit full prod overlay (k3d base + all prod patches)
resources:
  - ../k3d/migrations-arena.yaml
  - ../k3d/arena.yaml
  - ../prod
  - ddns-updater.yaml
  - netpol-cross-namespace.yaml
  # Whisper (faster-whisper transcription) — korczewski-only.
  # Removed from the shared base in #623 because mentolder couldn't
  # spare the 2-CPU request after the cluster split. korczewski
  # has 3× 8-CPU nodes, so transcription stays alive here.
  - whisper.yaml
  # Talk-Transcriber bot — korczewski-only, calls whisper.
  # Moved out of the shared base because the bot is useless without
  # a whisper backend, and whisper only lives on korczewski.
  - talk-transcriber.yaml

# Override realm with korczewski-specific config
configMapGenerator:
  - name: realm-template
    behavior: replace
    files:
      - realm-workspace.json=realm-workspace-korczewski.json
  - name: nextcloud-extra-config
    behavior: replace
    files:
      - zz-extra.config.php=nextcloud-extra-config-korczewski.php
generatorOptions:
  disableNameSuffixHash: true

# korczewski standalone cluster (korczewski).
#
# Three-node dedicated cluster: pk-hetzner-4 (control-plane,etcd),
# pk-hetzner-6 + pk-hetzner-8 (workers). All cluster-scoped resources
# (ClusterIssuer letsencrypt-prod, ClusterRole/Binding tls-sync,
# ClusterRole/Binding claude-code-agent, IngressClass traefik) are
# created on this cluster — unlike the previous unified-cluster overlay
# which had to delete them to avoid SharedResourceWarning with the
# mentolder workspace-hetzner overlay.
#
# livekit-server / livekit-redis / livekit-egress / livekit-ingress are
# pinned to pk-hetzner-6 by patch-livekit.yaml (hostNetwork + STUN
# discovers the real public IP via TURN_PUBLIC_IP=37.27.251.38).
patches:
  # livekit-recordings-pvc uses the base manifest's storage class.
  # Longhorn is NOT installed on korczewski; recordings live on local-path,
  # tied to the livekit pin-node (pk-hetzner-6). This is acceptable because
  # livekit-* are pinned to that node anyway via patch-livekit.yaml.
  - path: patch-livekit.yaml
  - path: patch-backup-config.yaml
  - path: patch-cronjob-urls.yaml
  - path: patch-mcp-config.yaml

  # ── Standalone korczewski node placement ──────────────────────
  # Base manifests pin certain workloads to the mentolder Hetzner CPs
  # (gekko-hetzner-2/3/4, pk-hetzner/-2/-3) which do NOT exist on
  # korczewski. Override the node values list to korczewski's
  # nodes (pk-hetzner-4, pk-hetzner-6, pk-hetzner-8) so workloads can
  # actually schedule. Replace operates on the whole values array.

  # website Deployment (k3d/website.yaml) — base pin: gekko-hetzner-2/3
  - target:
      kind: Deployment
      name: website
    patch: |-
      - op: replace
        path: /spec/template/spec/affinity/nodeAffinity/requiredDuringSchedulingIgnoredDuringExecution/nodeSelectorTerms/0/matchExpressions/0/values
        value:
          - pk-hetzner-4
          - pk-hetzner-6
          - pk-hetzner-8

  # arena-server Deployment (k3d/arena.yaml) — base pin: node-location=hetzner.
  # Replace with explicit hostname-based placement on korczewski nodes.
  - target:
      kind: Deployment
      name: arena-server
    patch: |-
      - op: replace
        path: /spec/template/spec/affinity/nodeAffinity/requiredDuringSchedulingIgnoredDuringExecution/nodeSelectorTerms/0/matchExpressions/0
        value:
          key: kubernetes.io/hostname
          operator: In
          values:
            - pk-hetzner-4
            - pk-hetzner-6
            - pk-hetzner-8

  # brett Deployment (k3d/brett.yaml) — base uses NotIn against pk-hetzner
  # and gekko-hetzner-4 (mentolder home-worker exclusion). On korczewski
  # neither node is in our pool, so the NotIn list is vacuous; flip to a
  # positive In selector against korczewski nodes for clarity.
  - target:
      kind: Deployment
      name: brett
    patch: |-
      - op: replace
        path: /spec/template/spec/affinity/nodeAffinity/requiredDuringSchedulingIgnoredDuringExecution/nodeSelectorTerms/0/matchExpressions/0
        value:
          key: kubernetes.io/hostname
          operator: In
          values:
            - pk-hetzner-4
            - pk-hetzner-6
            - pk-hetzner-8

  # CronJobs that pin to mentolder Hetzner CPs:
  #   - tests-retention      (k3d/tests-retention-cronjob.yaml — applied separately, not via kustomize)
  #   - knowledge-ingest     (init + main containers both pinned)
  #   - bug-tickets-ingest   (k3d/bug-tickets-ingest-cronjob.yaml)
  #   - feedback-tickets-ingest
  #
  # Note: tests-retention-cronjob.yaml is applied OUTSIDE kustomize (see
  # workspace:deploy task line ~1304). The base affinity there must also
  # be safe on korczewski; on this 3-node cluster the In-list misses,
  # so the pod stays Pending. The CronJob is best-effort — flag for follow-up.
  #
  # CronJobs in k3d/knowledge-ingest-cronjob.yaml — 4 of them, all pinned to
  # mentolder Hetzner CPs in base. Repoint to korczewski node pool.
  - target:
      kind: CronJob
      name: knowledge-ingest-prs
    patch: |-
      - op: replace
        path: /spec/jobTemplate/spec/template/spec/affinity/nodeAffinity/requiredDuringSchedulingIgnoredDuringExecution/nodeSelectorTerms/0/matchExpressions/0/values
        value:
          - pk-hetzner-4
          - pk-hetzner-6
          - pk-hetzner-8
  - target:
      kind: CronJob
      name: knowledge-ingest-markdown
    patch: |-
      - op: replace
        path: /spec/jobTemplate/spec/template/spec/affinity/nodeAffinity/requiredDuringSchedulingIgnoredDuringExecution/nodeSelectorTerms/0/matchExpressions/0/values
        value:
          - pk-hetzner-4
          - pk-hetzner-6
          - pk-hetzner-8
  - target:
      kind: CronJob
      name: knowledge-ingest-bugs
    patch: |-
      - op: replace
        path: /spec/jobTemplate/spec/template/spec/affinity/nodeAffinity/requiredDuringSchedulingIgnoredDuringExecution/nodeSelectorTerms/0/matchExpressions/0/values
        value:
          - pk-hetzner-4
          - pk-hetzner-6
          - pk-hetzner-8
  - target:
      kind: CronJob
      name: knowledge-reindex-all
    patch: |-
      - op: replace
        path: /spec/jobTemplate/spec/template/spec/affinity/nodeAffinity/requiredDuringSchedulingIgnoredDuringExecution/nodeSelectorTerms/0/matchExpressions/0/values
        value:
          - pk-hetzner-4
          - pk-hetzner-6
          - pk-hetzner-8
