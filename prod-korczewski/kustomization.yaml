apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: workspace

# Inherit full prod overlay (k3d base + all prod patches)
resources:
  - ../prod

# Override realm with korczewski-specific config
configMapGenerator:
  - name: realm-template
    behavior: replace
    files:
      - realm-workspace.json=realm-workspace-korczewski.json
generatorOptions:
  disableNameSuffixHash: true

patches:
  - path: patch-oauth2-proxy-args.yaml

