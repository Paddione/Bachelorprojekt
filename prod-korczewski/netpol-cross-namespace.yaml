# Cross-namespace egress for workspace-korczewski.
#
# Cronjobs in workspace-korczewski need to reach:
#   - shared-db.workspace.svc.cluster.local (tracking-import writes
#     feature events into mentolder's bachelorprojekt.features by design)
#   - website.website-korczewski.svc.cluster.local (billing-dunning-
#     detection, notify-unread, monthly-billing trigger korczewski's
#     own website API)
#
# default-deny-egress + allow-internet-egress (which excludes RFC1918)
# block these by default. Without this policy the cronjobs crashloop
# with ECONNREFUSED.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-workspace
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: workspace-korczewski
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-website-korczewski
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: website-korczewski
---
# shared-db: allow ingress from website-korczewski so the website pod can
# connect to postgres for user/session data across namespace boundary.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-website-korczewski-to-shared-db-ingress
spec:
  podSelector:
    matchLabels:
      app: shared-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: website-korczewski
      ports:
        - port: 5432
          protocol: TCP
---
# keycloak: allow ingress from website-korczewski so the auth callback can
# exchange the OIDC code for tokens via the internal service URL.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-website-korczewski-to-keycloak-ingress
spec:
  podSelector:
    matchLabels:
      app: keycloak
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: website-korczewski
      ports:
        - port: 8080
          protocol: TCP
