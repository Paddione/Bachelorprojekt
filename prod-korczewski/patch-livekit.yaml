# Pin all livekit-* Deployments to pk-hetzner-6 (37.27.251.38).
#
# Standalone korczewski cluster: 3 nodes (pk-hetzner-4 control-plane,
# pk-hetzner-6 + pk-hetzner-8 workers). livekit-server uses hostNetwork: true;
# on the dedicated public node STUN discovers the real public IP. All four
# components are co-located on the same node so livekit-egress / livekit-ingress
# reach livekit-server and livekit-redis via normal DNS.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit-server
  namespace: workspace
spec:
  template:
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - pk-hetzner-6
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit-redis
  namespace: workspace
spec:
  template:
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - pk-hetzner-6
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit-egress
  namespace: workspace
spec:
  template:
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - pk-hetzner-6
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit-ingress
  namespace: workspace
spec:
  template:
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - pk-hetzner-6
