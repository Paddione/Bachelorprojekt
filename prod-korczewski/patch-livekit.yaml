# Switch recordings PVC from local-path to longhorn.
# local-path binds to whichever node livekit-egress first scheduled on; if it
# ever reschedules to a different node the pod stays Pending. longhorn replicates
# across nodes so the volume is always accessible.
# One-time live migration: delete livekit-recordings-pvc on the cluster, then
# re-sync (ArgoCD will recreate it with longhorn). Existing recordings are lost.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: livekit-recordings-pvc
  namespace: workspace-korczewski
spec:
  storageClassName: longhorn
---
# Pin all livekit-* Deployments to gekko-hetzner-4 (178.104.159.79).
#
# livekit-server uses hostNetwork: true; on a Hetzner node STUN discovers
# the real public IP. All four components are co-located so livekit-egress /
# livekit-ingress reach livekit-server and livekit-redis via normal DNS
# (CoreDNS is reachable from Hetzner nodes).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit-server
  namespace: workspace
spec:
  template:
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - gekko-hetzner-4
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit-redis
  namespace: workspace
spec:
  template:
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - gekko-hetzner-4
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit-egress
  namespace: workspace
spec:
  template:
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - gekko-hetzner-4
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit-ingress
  namespace: workspace
spec:
  template:
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - gekko-hetzner-4
