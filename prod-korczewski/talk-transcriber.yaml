# Nextcloud Talk Post-Meeting-Transkription — korczewski only.
# Pollt auf aktive Calls, tritt headless bei (Firefox + PulseAudio),
# schickt Audio-Chunks an Whisper. Nach Gesprächsende sendet der Bot
# das vollständige Transkript an die Website-API
# (/api/meeting/save-transcript), die es in der DB und als
# Markdown-Datei in Nextcloud speichert.
#
# Lives under prod-korczewski/ alongside whisper.yaml: the whisper
# backend only runs on korczewski, so the bot only makes sense
# there. PROD_DOMAIN is substituted by envsubst at deploy time.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: talk-transcriber
  labels:
    app: talk-transcriber
spec:
  replicas: 1
  selector:
    matchLabels:
      app: talk-transcriber
  template:
    metadata:
      labels:
        app: talk-transcriber
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: transcriber
          image: ghcr.io/paddione/talk-transcriber@sha256:8ac351f10e4b8fbc121fb57f21088d5b5359524e7f909760444b283ea3ace55f
          imagePullPolicy: IfNotPresent
          env:
            - name: NC_DOMAIN
              value: "files.${PROD_DOMAIN}"
            - name: NC_PROTOCOL
              value: "https"
            - name: NC_VERIFY_SSL
              value: "true"
            - name: NC_ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: NEXTCLOUD_ADMIN_PASSWORD
            - name: NC_DB_HOST
              value: "shared-db"
            - name: NC_DB_NAME
              value: "nextcloud"
            - name: NC_DB_USER
              value: "nextcloud"
            - name: NC_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: NEXTCLOUD_DB_PASSWORD
            - name: WEBSITE_URL
              value: "https://web.${PROD_DOMAIN}"
            - name: TRANSCRIBER_BOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: TRANSCRIBER_BOT_PASSWORD
            - name: TRANSCRIBER_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: TRANSCRIBER_SECRET
            - name: CHUNK_SECONDS
              value: "5"
            - name: MAX_SESSIONS
              value: "3"
          ports:
            - containerPort: 8000
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: "2"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: talk-transcriber
spec:
  selector:
    app: talk-transcriber
  ports:
    - port: 8000
      targetPort: 8000
