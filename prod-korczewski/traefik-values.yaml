deployment:
  kind: DaemonSet
ingressRoute:
  dashboard:
    enabled: false
ports:
  web:
    hostPort: 80
  websecure:
    hostPort: 443
# hostPort bindings prevent maxSurge>0: two pods on same node can't share ports.
# Use maxUnavailable=1 so the old pod is evicted before the new one schedules.
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 0
# Restrict Traefik to the 3 public Hetzner nodes only.
# pk-l-1 (WSL, no public IP) must not bind hostPort 80/443.
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - pk-hetzner-4
                - pk-hetzner-6
                - pk-hetzner-8
