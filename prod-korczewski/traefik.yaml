# Traefik ingress controller for korczewski — manually managed (not Helm).
#
# Intentionally uses hostNetwork:true on the control-plane node (pk-hetzner).
# Mentolder uses a Helm DaemonSet with hostPort, which assumes working pod
# networking across all nodes. Korczewski has a CNI partition (pk-hetzner →
# LAN workers) that makes cross-node pod routing unreliable; hostNetwork
# bypasses the CNI layer so Traefik uses the host's routing table to reach
# backends on 192.168.100.x. pk-hetzner is also the only node with a public
# IP, so a DaemonSet spread would serve no purpose.
#
# Apply via: task korczewski:traefik:apply
# Do NOT include in kustomization.yaml — the namespace:workspace override
# would move these kube-system resources into the wrong namespace.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: traefik-manual
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: traefik-manual
rules:
  - apiGroups: [""]
    resources: [services, endpoints, secrets]
    verbs: [get, list, watch]
  - apiGroups: [extensions, networking.k8s.io]
    resources: [ingresses, ingressclasses]
    verbs: [get, list, watch]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses/status]
    verbs: [update]
  - apiGroups: [traefik.io]
    resources:
      - ingressroutes
      - middlewares
      - ingressroutetcps
      - ingressrouteudps
      - tlsoptions
      - tlsstores
      - traefikservices
      - serverstransports
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: traefik-manual
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: traefik-manual
subjects:
  - kind: ServiceAccount
    name: traefik-manual
    namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: traefik-manual-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: traefik-manual
    namespace: kube-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik-manual
  namespace: kube-system
  labels:
    app.kubernetes.io/instance: traefik-kube-system
    app.kubernetes.io/name: traefik
spec:
  replicas: 1
  # hostNetwork binds ports 80/443 directly on the host — two pods cannot
  # coexist on the same node, so RollingUpdate would deadlock.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/instance: traefik-kube-system
      app.kubernetes.io/name: traefik
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: traefik-kube-system
        app.kubernetes.io/name: traefik
    spec:
      serviceAccountName: traefik-manual
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      containers:
        - name: traefik
          image: traefik:v3.6.12
          args:
            - --providers.kubernetesingress
            - --providers.kubernetescrd
            # Traefik runs in kube-system but every Ingress/IngressRoute
            # references middlewares living in the `workspace` ns
            # (e.g. `workspace-security-headers@kubernetescrd`). Without
            # cross-namespace lookup the kubernetescrd provider rejects
            # those refs and Traefik returns 404 for every host.
            - --providers.kubernetescrd.allowCrossNamespace=true
            - --providers.kubernetesingress.allowExternalNameServices=true
            - --entrypoints.web.address=:80
            - --entrypoints.websecure.address=:443
            - --entryPoints.websecure.http.tls=true
            - --entrypoints.traefik.address=:9000
            - --api.dashboard=true
            - --ping=true
            - --accesslog=true
            # NOTE: do NOT set --providers.kubernetesingress.ingressclass.
            # The flag forces legacy annotation-based class matching, which
            # silently drops every Ingress that uses the modern
            # `spec.ingressClassName: traefik` (i.e. all of ours). Traefik
            # already binds to the IngressClass via its controller name
            # (`traefik.io/ingress-controller`).
            # pk-hetzner is the only public-IP node; pin Ingress
            # status.loadBalancer.ingress to the single real public IP
            # so kubectl get ingress reports something usable instead
            # of the stale 7-IP DaemonSet list inherited from a previous
            # Helm install.
            - --providers.kubernetesingress.ingressendpoint.ip=62.238.9.39
          ports:
            - name: web
              containerPort: 80
              hostPort: 80
            - name: websecure
              containerPort: 443
              hostPort: 443
            - name: traefik
              containerPort: 9000
          livenessProbe:
            httpGet:
              path: /ping
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ping
              port: 9000
            initialDelaySeconds: 2
            periodSeconds: 10
            failureThreshold: 1
---
apiVersion: v1
kind: Service
metadata:
  name: traefik
  namespace: kube-system
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: traefik-kube-system
    app.kubernetes.io/name: traefik
  ports:
    - name: web
      port: 80
      targetPort: web
    - name: websecure
      port: 443
      targetPort: websecure
    - name: traefik
      port: 9000
      targetPort: traefik
