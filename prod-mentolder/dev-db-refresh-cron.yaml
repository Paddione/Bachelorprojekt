# ════════════════════════════════════════════════════════════════════
# dev-db-refresh — nightly refresh of the devc HA dev shared-db-dev from prod.
# Pinned to k3s-1 (fleet worker) so the prod shared-db NetworkPolicy allows
# ingress from k3s-1's pod CIDR (see prod-mentolder/dev-db-refresh-netpol.yaml).
# hostNetwork + ClusterFirstWithHostNet lets it resolve shared-db in prod while
# reaching 10.0.0.20:15432 (devc VIP, shared-db-dev-lb LoadBalancer).
#
# T000286: k3s-1 has NO Longhorn CSI driver (Longhorn runs only on the
# gekko-hetzner-* nodes), so this pod can NEVER attach the RWO Longhorn
# backup-pvc — it hung in ContainerCreating with FailedAttachVolume.
# Fix: drop the backup-pvc mount entirely and stream a live pg_dump from
# the prod shared-db Service over the cluster network (dnsPolicy
# ClusterFirstWithHostNet resolves shared-db) straight into dev Postgres.
# The script (scripts/dev-db-refresh.sh, mounted via ConfigMap by
# prod-mentolder/kustomization.yaml) takes the live path when SOURCE_PGHOST
# is set; the local `task dev:db:refresh` path still restores snapshot files.
# ════════════════════════════════════════════════════════════════════
apiVersion: batch/v1
kind: CronJob
metadata:
  name: dev-db-refresh
  namespace: ${WORKSPACE_NAMESPACE}
spec:
  schedule: "30 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
          nodeSelector:
            kubernetes.io/hostname: ${DEV_NODE}
          containers:
            - name: refresh
              image: pgvector/pgvector:0.8.0-pg16@sha256:a132765ec351c65111b5b675928a3a0515a466a40f97277329db8b8209ad8bc9
              command: [/bin/bash, /scripts/dev-db-refresh.sh]
              env:
                # Destination: dev Postgres via the HA dev-cluster VIP LoadBalancer.
                - name: PGHOST
                  value: 10.0.0.20
                - name: PGPORT
                  value: "15432"
                # Source: live prod shared-db over the cluster network.
                # Resolves via ClusterFirstWithHostNet → shared-db.<ns>.svc.
                - name: SOURCE_PGHOST
                  value: shared-db
                - name: SOURCE_PGPORT
                  value: "5432"
                - name: SOURCE_DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: workspace-secrets
                      key: WEBSITE_DB_PASSWORD
                - name: DEV_SHARED_DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: workspace-secrets
                      key: DEV_SHARED_DB_PASSWORD
                - name: DEV_WEBSITE_DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: workspace-secrets
                      key: DEV_WEBSITE_DB_PASSWORD
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
              resources:
                requests:
                  memory: 256Mi
                  cpu: 100m
                limits:
                  memory: 1Gi
                  cpu: 1000m
          volumes:
            - name: scripts
              configMap:
                name: dev-db-refresh-script
                defaultMode: 0755
