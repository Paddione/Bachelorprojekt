apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: workspace

# Inherit full prod overlay (k3d base + all prod patches)
resources:
  - ../prod
  # ── dev.mentolder.de stack (prod-side SSO gate + TLS) ─────────────
  - cert-dev-wildcard.yaml
  - oauth2-proxy-dev.yaml
  - oauth2-proxy-dev-middleware.yaml
  - dev-ingress.yaml
  - dev-db-refresh-cron.yaml
  # ── brainstorm.mentolder.de reverse-SSH broker (sish) ─────────────
  - ../k3d/brainstorm-sish.yaml

# Override realm with mentolder-specific config
configMapGenerator:
  - name: realm-template
    behavior: replace
    files:
      - realm-workspace.json=realm-workspace-mentolder.json
  # ── dev.mentolder.de — mount scripts/dev-db-refresh.sh as ConfigMap ──
  - name: dev-db-refresh-script
    namespace: workspace
    files:
      - ../scripts/dev-db-refresh.sh
generatorOptions:
  disableNameSuffixHash: true

# Prevent pods from drifting to home workers (k3s-1/2/3, k3w-1/2/3)
patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: _placeholder_
      spec:
        template:
          spec:
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: kubernetes.io/hostname
                          operator: NotIn
                          values:
                            - k3s-1
                            - k3s-2
                            - k3s-3
                            - k3w-1
                            - k3w-2
                            - k3w-3
    target:
      kind: Deployment
  - patch: |-
      apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: _placeholder_
      spec:
        jobTemplate:
          spec:
            template:
              spec:
                affinity:
                  nodeAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      nodeSelectorTerms:
                        - matchExpressions:
                            - key: kubernetes.io/hostname
                              operator: NotIn
                              values:
                                - k3s-1
                                - k3s-2
                                - k3s-3
                                - k3w-1
                                - k3w-2
                                - k3w-3
    target:
      kind: CronJob
  - patch: |-
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: _placeholder_
      spec:
        template:
          spec:
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: kubernetes.io/hostname
                          operator: NotIn
                          values:
                            - k3s-1
                            - k3s-2
                            - k3s-3
                            - k3w-1
                            - k3w-2
                            - k3w-3
    target:
      kind: Job
  - path: patch-backup-config.yaml
  - path: patch-livekit.yaml
