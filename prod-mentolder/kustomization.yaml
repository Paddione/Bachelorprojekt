apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: workspace

# Inherit full prod overlay (k3d base + all prod patches)
resources:
  - ../prod
  # ── dev.mentolder.de stack ───────────────────────────────────────
  # The dev SSO gate + TLS edge (oauth2-proxy-dev, dev-ingress,
  # cert-dev-wildcard, oauth2-proxy-dev-middleware) moved into the
  # self-contained k3d dev stack (k3d/dev-stack/) — [T000363].
  - dev-db-refresh-cron.yaml
  - dev-db-refresh-netpol.yaml  # T000286: allow dev-node hostNetwork → shared-db:5432
  # Whisper + Talk-Transcriber — now also on mentolder.
  # k3s home workers (k3s-1/2/3: amd64, 8–16 GB, <5% util) have headroom.
  # See whisper placement override in patches below.
  - whisper.yaml
  - talk-transcriber.yaml

# realm-template removed — Keycloak decommissioned
configMapGenerator:
  # ── dev.mentolder.de — mount scripts/dev-db-refresh.sh as ConfigMap ──
  - name: dev-db-refresh-script
    namespace: workspace
    files:
      - dev-db-refresh.sh
generatorOptions:
  disableNameSuffixHash: true

# Prevent pods from drifting to home workers (k3s-1/2/3, k3w-1/2/3)
patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: _placeholder_
      spec:
        template:
          spec:
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: kubernetes.io/hostname
                          operator: NotIn
                          values:
                            - k3s-1
                            - k3s-2
                            - k3s-3
                            - k3w-1
                            - k3w-2
                            - k3w-3
    target:
      kind: Deployment
  - patch: |-
      apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: _placeholder_
      spec:
        jobTemplate:
          spec:
            template:
              spec:
                affinity:
                  nodeAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      nodeSelectorTerms:
                        - matchExpressions:
                            - key: kubernetes.io/hostname
                              operator: NotIn
                              values:
                                - k3s-1
                                - k3s-2
                                - k3s-3
                                - k3w-1
                                - k3w-2
                                - k3w-3
    target:
      kind: CronJob
  - patch: |-
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: _placeholder_
      spec:
        template:
          spec:
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: kubernetes.io/hostname
                          operator: NotIn
                          values:
                            - k3s-1
                            - k3s-2
                            - k3s-3
                            - k3w-1
                            - k3w-2
                            - k3w-3
    target:
      kind: Job
  - path: patch-backup-config.yaml
  - path: patch-data-pvc-storage.yaml
  # whisper Deployment: override the global NotIn patch so it lands on
  # k3s-1/2/3 (amd64, 8–16 GB, <5% util) not on the already-loaded Hetzner CPs.
  # Path matches what the global strategic-merge patch created.
  - target:
      kind: Deployment
      name: whisper
    patch: |-
      - op: replace
        path: /spec/template/spec/affinity/nodeAffinity/requiredDuringSchedulingIgnoredDuringExecution/nodeSelectorTerms/0/matchExpressions/0
        value:
          key: kubernetes.io/hostname
          operator: In
          values:
            - k3s-1
            - k3s-2
            - k3s-3
  # dev-db-refresh CronJob: must run on DEV_NODE (k3s-1) — uses hostNetwork to
  # reach the k3d Postgres at 127.0.0.1:15432. Override the global CronJob
  # NotIn patch so k3s-1 is allowed. The JSON path includes jobTemplate because
  # CronJob wraps the PodSpec one level deeper than a Deployment.
  - target:
      kind: CronJob
      name: dev-db-refresh
    patch: |-
      - op: replace
        path: /spec/jobTemplate/spec/template/spec/affinity/nodeAffinity/requiredDuringSchedulingIgnoredDuringExecution/nodeSelectorTerms/0/matchExpressions/0
        value:
          key: kubernetes.io/hostname
          operator: In
          values:
            - k3s-1
  - target:
      kind: Deployment
      name: brett
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: brett
      spec:
        template:
          spec:
            containers:
              - name: brett
                env:
                  - name: BRETT_PUBLIC_URL
                    value: "https://brett.mentolder.de"
                  - name: WEBSITE_INTERNAL_URL
                    value: "http://website.website.svc.cluster.local"
