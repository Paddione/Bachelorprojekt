apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: workspace

# Inherit full prod overlay (k3d base + all prod patches)
resources:
  - ../prod
  - dashboard-web.yaml
  - oauth2-proxy-dashboard.yaml
  - ingress-dashboard.yaml

# Override realm with mentolder-specific config
configMapGenerator:
  - name: realm-template
    behavior: replace
    files:
      - realm-workspace.json=realm-workspace-mentolder.json
generatorOptions:
  disableNameSuffixHash: true

patches:
  - path: patch-backup-config.yaml
