apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: workspace

# Inherit full prod overlay (k3d base + all prod patches)
resources:
  - ../prod
  # ── dev.mentolder.de stack (prod-side SSO gate + TLS) ─────────────
  - cert-dev-wildcard.yaml
  - oauth2-proxy-dev.yaml
  - oauth2-proxy-dev-middleware.yaml
  - dev-ingress.yaml
  - dev-db-refresh-cron.yaml
  # ── brainstorm.mentolder.de reverse-SSH broker (sish) ─────────────
  - brainstorm-sish.yaml
  # Whisper + Talk-Transcriber — now also on mentolder.
  # k3s home workers (k3s-1/2/3: amd64, 8–16 GB, <5% util) have headroom.
  # See whisper placement override in patches below.
  - whisper.yaml
  - talk-transcriber.yaml

# Override realm with mentolder-specific config
configMapGenerator:
  - name: realm-template
    behavior: replace
    files:
      - realm-workspace.json=realm-workspace-mentolder.json
  # ── dev.mentolder.de — mount scripts/dev-db-refresh.sh as ConfigMap ──
  - name: dev-db-refresh-script
    namespace: workspace
    files:
      - dev-db-refresh.sh
generatorOptions:
  disableNameSuffixHash: true

# Prevent pods from drifting to home workers (k3s-1/2/3, k3w-1/2/3)
patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: _placeholder_
      spec:
        template:
          spec:
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: kubernetes.io/hostname
                          operator: NotIn
                          values:
                            - k3s-1
                            - k3s-2
                            - k3s-3
                            - k3w-1
                            - k3w-2
                            - k3w-3
    target:
      kind: Deployment
  - patch: |-
      apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: _placeholder_
      spec:
        jobTemplate:
          spec:
            template:
              spec:
                affinity:
                  nodeAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      nodeSelectorTerms:
                        - matchExpressions:
                            - key: kubernetes.io/hostname
                              operator: NotIn
                              values:
                                - k3s-1
                                - k3s-2
                                - k3s-3
                                - k3w-1
                                - k3w-2
                                - k3w-3
    target:
      kind: CronJob
  - patch: |-
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: _placeholder_
      spec:
        template:
          spec:
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: kubernetes.io/hostname
                          operator: NotIn
                          values:
                            - k3s-1
                            - k3s-2
                            - k3s-3
                            - k3w-1
                            - k3w-2
                            - k3w-3
    target:
      kind: Job
  - path: patch-backup-config.yaml
  - path: patch-livekit.yaml
  # whisper Deployment: override the global NotIn patch so it lands on
  # k3s-1/2/3 (amd64, 8–16 GB, <5% util) not on the already-loaded Hetzner CPs.
  # Path matches what the global strategic-merge patch created.
  - target:
      kind: Deployment
      name: whisper
    patch: |-
      - op: replace
        path: /spec/template/spec/affinity/nodeAffinity/requiredDuringSchedulingIgnoredDuringExecution/nodeSelectorTerms/0/matchExpressions/0
        value:
          key: kubernetes.io/hostname
          operator: In
          values:
            - k3s-1
            - k3s-2
            - k3s-3
  # oauth2-proxy-dev: must run on DEV_NODE (k3s-1) because it uses hostNetwork
  # to reach the k3d HTTP LB at 127.0.0.1:18080. Override the global NotIn patch
  # to allow k3s-1 (matching the nodeSelector already set in the manifest).
  - target:
      kind: Deployment
      name: oauth2-proxy-dev
    patch: |-
      - op: replace
        path: /spec/template/spec/affinity/nodeAffinity/requiredDuringSchedulingIgnoredDuringExecution/nodeSelectorTerms/0/matchExpressions/0
        value:
          key: kubernetes.io/hostname
          operator: In
          values:
            - k3s-1
  - target:
      kind: Deployment
      name: brett
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/7/value
        value: "https://brett.mentolder.de"
      - op: replace
        path: /spec/template/spec/containers/0/env/8/value
        value: "http://website.website.svc.cluster.local"
