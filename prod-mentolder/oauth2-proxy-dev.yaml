# ════════════════════════════════════════════════════════════════════
# oauth2-proxy-dev — SSO gate for *.dev.${PROD_DOMAIN}.
# Upstream is the k3d HTTP loadbalancer bound to 127.0.0.1:18080 on
# the k3s-1 node, reached via hostNetwork + nodeSelector.
# Acts as a full reverse proxy: unauthenticated requests are redirected
# to Keycloak; authenticated requests are proxied to 127.0.0.1:18080.
# The ForwardAuth Middleware in oauth2-proxy-dev-middleware.yaml is
# kept for services that need header injection but NOT on dev-ingress.
# ════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy-dev
  namespace: ${WORKSPACE_NAMESPACE}
  labels:
    app: oauth2-proxy-dev
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: oauth2-proxy-dev
  template:
    metadata:
      labels:
        app: oauth2-proxy-dev
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: ${DEV_NODE}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: write-cookie-secret
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - printf 'cookie_secret = "%s"\n' "$(printf '%s' "$DEV_OAUTH2_PROXY_COOKIE_SECRET" | cut -c1-32)" > /run/config/oauth2-extra.cfg
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          env:
            - name: DEV_OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: DEV_OAUTH2_PROXY_COOKIE_SECRET
          volumeMounts:
            - name: oauth2-config
              mountPath: /run/config
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.9.0
          args:
            - --config=/run/config/oauth2-extra.cfg
            - --provider=keycloak-oidc
            - --client-id=workspace-dev
            - --client-secret=${DEV_WORKSPACE_OIDC_SECRET}
            - --oidc-issuer-url=https://auth.${PROD_DOMAIN}/realms/workspace
            - --redirect-url=https://${DEV_DOMAIN}/oauth2/callback
            - --upstream=http://10.0.0.20:80
            - --http-address=0.0.0.0:4181
            - --reverse-proxy=true
            - --whitelist-domain=.${DEV_DOMAIN}
            - --cookie-domain=.${DEV_DOMAIN}
            - --cookie-name=_oauth2_dev
            - --cookie-secure=true
            - --email-domain=*
            - --pass-access-token=true
            - --pass-authorization-header=true
            - --set-xauthrequest=true
            - --skip-provider-button=true
            - --code-challenge-method=S256
            - --insecure-oidc-allow-unverified-email=true
            - --scope=openid email profile
            - --keycloak-group=/dev-access
            # Bypass the OIDC gate for the dev MCP path prefixes so token-auth
            # MCP clients (which cannot do the browser OIDC dance) reach the k3d
            # cluster. Skipped requests are still reverse-proxied to 18080; the
            # real control is the dev-side ForwardAuth (mcp-auth-proxy-dev).
            # Path-scoped, so it only matters on the mcp.dev host — web.dev /
            # brett.dev define no such backends and 404 at the k3d layer.
            - --skip-auth-route=^/(kubernetes|postgres|github|browser)(/|$)
          env:
            - name: DEV_WORKSPACE_OIDC_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: DEV_WORKSPACE_OIDC_SECRET
          ports:
            - containerPort: 4181
              hostPort: 4181
              name: http
          readinessProbe:
            httpGet:
              path: /ping
              port: 4181
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 4181
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: 64Mi
              cpu: "50m"
            limits:
              memory: 128Mi
              cpu: "200m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: oauth2-config
              mountPath: /run/config
              readOnly: true
      volumes:
        - name: oauth2-config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy-dev
  namespace: ${WORKSPACE_NAMESPACE}
spec:
  selector:
    app: oauth2-proxy-dev
  ports:
    - name: http
      port: 4181
      targetPort: 4181
