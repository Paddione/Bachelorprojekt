# ════════════════════════════════════════════════════════════════════
# oauth2-proxy-dev — SSO gate for *.dev.${PROD_DOMAIN}.
# Upstream is the k3d HTTP loadbalancer bound to 127.0.0.1:18080 on
# the gekko-hetzner-2 node, reached via hostNetwork + nodeSelector.
# Same pod serves both the ForwardAuth /oauth2/auth probe (called by
# the Traefik Middleware in prod-mentolder/oauth2-proxy-dev-middleware.yaml)
# AND the reverse-proxy data path (proxying authenticated requests to
# 127.0.0.1:18080).
# ════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy-dev
  namespace: ${WORKSPACE_NAMESPACE}
  labels:
    app: oauth2-proxy-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy-dev
  template:
    metadata:
      labels:
        app: oauth2-proxy-dev
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: ${DEV_NODE}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: write-cookie-secret
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - printf 'cookie_secret = "%s"\n' "$(printf '%s' "$DEV_OAUTH2_PROXY_COOKIE_SECRET" | cut -c1-32)" > /run/config/oauth2-extra.cfg
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          env:
            - name: DEV_OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: DEV_OAUTH2_PROXY_COOKIE_SECRET
          volumeMounts:
            - name: oauth2-config
              mountPath: /run/config
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.9.0
          args:
            - --config=/run/config/oauth2-extra.cfg
            - --provider=keycloak-oidc
            - --client-id=workspace-dev
            - --client-secret=$(DEV_WORKSPACE_OIDC_SECRET)
            - --oidc-issuer-url=https://auth.${PROD_DOMAIN}/realms/workspace
            - --redirect-url=https://${DEV_DOMAIN}/oauth2/callback
            - --upstream=http://127.0.0.1:18080
            - --http-address=0.0.0.0:4181
            - --reverse-proxy=true
            - --whitelist-domain=.${DEV_DOMAIN}
            - --cookie-domain=.${DEV_DOMAIN}
            - --cookie-name=_oauth2_dev
            - --cookie-secure=true
            - --email-domain=*
            - --pass-access-token=true
            - --pass-authorization-header=true
            - --set-xauthrequest=true
            - --skip-provider-button=true
            - --code-challenge-method=S256
            - --insecure-oidc-allow-unverified-email=true
            - --scope=openid email profile
            - --keycloak-group=/dev-access
          env:
            - name: DEV_WORKSPACE_OIDC_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: DEV_WORKSPACE_OIDC_SECRET
          ports:
            - containerPort: 4181
              hostPort: 4181
              name: http
          readinessProbe:
            httpGet:
              path: /ping
              port: 4181
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 4181
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: 64Mi
              cpu: "50m"
            limits:
              memory: 128Mi
              cpu: "200m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: oauth2-config
              mountPath: /run/config
              readOnly: true
      volumes:
        - name: oauth2-config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy-dev
  namespace: ${WORKSPACE_NAMESPACE}
spec:
  selector:
    app: oauth2-proxy-dev
  ports:
    - name: http
      port: 4181
      targetPort: 4181
