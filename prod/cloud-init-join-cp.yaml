#cloud-config
# Usage: paste as Hetzner server "User data" when adding a node that joins
#        an existing k3s cluster as an additional control-plane (HA etcd member).
# Before using: fill in SERVER_URL and K3S_TOKEN below.
# For starting a new cluster use prod/cloud-init.yaml (cluster-init: true).
# For a worker/agent node use prod/cloud-init-worker.yaml.
# See .claude/skills/hetzner-node/SKILL.md for the full provisioning runbook.
users:
  - default
  - name: patrick
    groups: sudo
    shell: /bin/bash
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    lock_passwd: true
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFN75CnuOz7YXaJipTFxWMVDgm35heu64JKN1QL+Z84+ patrick@korczewski.de
  - name: gekko
    groups: sudo
    shell: /bin/bash
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    lock_passwd: true
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIH43aUqN4w9u7DIt3gUREOJY4pmVIWvIbqFsG/fPSlV0 gekko@mentolder-20260513

ssh_pwauth: false

package_update: true
package_upgrade: true

packages:
  - curl
  - wget
  - git
  - htop
  - unattended-upgrades
  - apt-transport-https
  - open-iscsi
  - nfs-common
  - jq
  - fail2ban
  - ufw
  - wireguard-tools

write_files:
  - path: /etc/wireguard/wg-mesh.conf
    permissions: '0600'
    owner: root:root
    content: |
      [Interface]
      PrivateKey = REPLACEME_WG_PRIVATE_KEY
      Address = REPLACEME_WG_NODE_IP/24
      ListenPort = 51820

      REPLACEME_WG_PEERS_BLOCK

  - path: /etc/rancher/k3s/config.yaml
    content: |
      # FILL IN before provisioning:
      server: "https://EXISTING_CP_IP:6443"
      token: "K3S_TOKEN_HERE"
      tls-san:
        - PROD_DOMAIN
        - "*.PROD_DOMAIN"
      disable:
        - traefik
        - servicelb
      kubelet-arg:
        - "max-pods=110"
      kube-apiserver-arg:
        - "default-not-ready-toleration-seconds=30"
        - "default-unreachable-toleration-seconds=30"
      write-kubeconfig-mode: "0644"
      secrets-encryption: true
      flannel-iface: wg-mesh

  - path: /etc/sysctl.d/99-k3s.conf
    content: |
      net.core.somaxconn=32768
      net.ipv4.ip_forward=1
      net.bridge.bridge-nf-call-iptables=1
      net.ipv4.conf.all.forwarding=1
      fs.inotify.max_user_watches=524288
      fs.inotify.max_user_instances=512
      vm.max_map_count=262144

  - path: /etc/fail2ban/jail.local
    content: |
      [sshd]
      enabled = true
      port = 22
      maxretry = 5
      bantime = 3600
      findtime = 600

  - path: /etc/ssh/sshd_config.d/hardened.conf
    content: |
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      PermitRootLogin no
      AllowUsers patrick gekko

runcmd:
  - sysctl --system

  # Firewall
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw allow 6443/tcp
  - ufw allow 10250/tcp
  - ufw allow 8472/udp
  - ufw allow 51820/udp
  - ufw allow 3478/tcp
  - ufw allow 3478/udp
  - ufw allow 5349/tcp
  - ufw allow 49152:49252/udp
  - ufw allow 2379:2380/tcp
  - ufw allow 7880/tcp
  - ufw allow 7881/tcp
  - ufw allow 50000:60000/udp
  - ufw allow 30000:40000/udp
  - ufw deny 2222/tcp comment "sish - default deny"
  - ufw --force enable

  # Services
  - systemctl enable fail2ban
  - systemctl start fail2ban
  - systemctl restart sshd
  - systemctl enable unattended-upgrades
  - systemctl start unattended-upgrades
  - systemctl enable --now iscsid

  # WireGuard mesh — must be up before k3s so Flannel can bind flannel-iface=wg-mesh
  - systemctl enable wg-quick@wg-mesh
  - systemctl start wg-quick@wg-mesh
  - until ip addr show wg-mesh 2>/dev/null | grep -q 'inet'; do sleep 2; done

  # Install k3s (joins cluster — server/token come from config.yaml above)
  - curl -sfL https://get.k3s.io | INSTALL_K3S_CHANNEL=stable sh -
  - until kubectl get nodes; do sleep 2; done

  # Kubeconfig for patrick
  - mkdir -p /home/patrick/.kube
  - cp /etc/rancher/k3s/k3s.yaml /home/patrick/.kube/config
  - sed -i "s/127.0.0.1/$(curl -s http://169.254.169.254/hetzner/v1/metadata/public-ipv4)/g" /home/patrick/.kube/config
  - chown -R patrick:patrick /home/patrick/.kube

  # Install Helm
  - curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

  # Install task
  - sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin

final_message: "k3s control-plane (join) ready on $(hostname) - $(date)"
