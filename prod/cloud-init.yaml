#cloud-config
# Usage: paste as Hetzner server "User data" when creating a NEW node
#        that will initialise a new k3s cluster (cluster-init: true).
# For joining an existing cluster use prod/cloud-init-join-cp.yaml (control-plane)
# or prod/cloud-init-worker.yaml (agent/worker).
# See .claude/skills/hetzner-node/SKILL.md for the full provisioning runbook.
users:
  - default
  - name: patrick
    groups: sudo
    shell: /bin/bash
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    lock_passwd: true
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFN75CnuOz7YXaJipTFxWMVDgm35heu64JKN1QL+Z84+ patrick@korczewski.de
  - name: gekko
    groups: sudo
    shell: /bin/bash
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    lock_passwd: true
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIH43aUqN4w9u7DIt3gUREOJY4pmVIWvIbqFsG/fPSlV0 gekko@mentolder-20260513

ssh_pwauth: false

package_update: true
package_upgrade: true

packages:
  - curl
  - wget
  - git
  - htop
  - unattended-upgrades
  - apt-transport-https
  - open-iscsi
  - nfs-common
  - jq
  - fail2ban
  - ufw
  - wireguard-tools

write_files:
  # wg-mesh.conf — written with placeholder values by cloud-init.
  # The hetzner-node skill substitutes REPLACEME_ values before provisioning
  # so the correct private key and peer list are embedded here.
  # Having this file present at boot means wg-quick@wg-mesh can start
  # immediately and k3s finds the flannel-iface before it tries to bind.
  - path: /etc/wireguard/wg-mesh.conf
    permissions: '0600'
    owner: root:root
    content: |
      [Interface]
      PrivateKey = REPLACEME_WG_PRIVATE_KEY
      Address = REPLACEME_WG_NODE_IP/24
      ListenPort = 51820

      REPLACEME_WG_PEERS_BLOCK

  - path: /etc/rancher/k3s/config.yaml
    content: |
      tls-san:
        - ${PROD_DOMAIN}
        - "*.${PROD_DOMAIN}"
        - REPLACEME_NODE_PUBLIC_IP
      disable:
        - traefik
        - servicelb
      kubelet-arg:
        - "max-pods=110"
      kube-apiserver-arg:
        - "default-not-ready-toleration-seconds=30"
        - "default-unreachable-toleration-seconds=30"
      write-kubeconfig-mode: "0644"
      cluster-init: true
      secrets-encryption: true
      flannel-iface: wg-mesh

  - path: /etc/sysctl.d/99-k3s.conf
    content: |
      net.core.somaxconn=32768
      net.ipv4.ip_forward=1
      net.bridge.bridge-nf-call-iptables=1
      net.ipv4.conf.all.forwarding=1
      fs.inotify.max_user_watches=524288
      fs.inotify.max_user_instances=512
      vm.max_map_count=262144

  - path: /etc/fail2ban/jail.local
    content: |
      [sshd]
      enabled = true
      port = 22
      maxretry = 5
      bantime = 3600
      findtime = 600

  - path: /etc/ssh/sshd_config.d/hardened.conf
    content: |
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      PermitRootLogin no
      AllowUsers patrick gekko

runcmd:
  - sysctl --system

  # Firewall
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw allow 6443/tcp
  - ufw allow 10250/tcp
  - ufw allow 8472/udp
  - ufw allow 51820/udp    # WireGuard GPU worker tunnel
  - ufw allow 3478/tcp     # coturn TURN/STUN (TCP)
  - ufw allow 3478/udp     # coturn TURN/STUN (UDP)
  - ufw allow 5349/tcp     # coturn TURNS (TLS TURN — iOS/iPhone)
  - ufw allow 49152:49252/udp  # coturn TURN relay port range
  - ufw allow 2379:2380/tcp
  # LiveKit ports — Hetzner host firewall blocks inter-node traffic on every
  # port except 80/443 by default. Without these the host-network livekit-server
  # pod is unreachable from Traefik on other nodes (see k3d/livekit.yaml).
  - ufw allow 7880/tcp     # LiveKit signaling (HTTP/WS)
  - ufw allow 7881/tcp     # LiveKit RTC TCP fallback
  - ufw allow 50000:60000/udp  # LiveKit RTC media range
  - ufw allow 30000:40000/udp  # LiveKit TURN relay range
  # ── dev.mentolder.de — sish SSH (2222/tcp) ─────────────────────────
  # Deny-by-default. Explicit allow rules are applied per-CIDR from
  # DEV_SSH_ALLOWLIST by `task dev:firewall:open` (Taskfile.dev-stack.yml)
  # — they're runtime state, not cloud-init.
  - ufw deny 2222/tcp comment "sish - default deny"
  - ufw --force enable

  # Services
  - systemctl enable fail2ban
  - systemctl start fail2ban
  - systemctl restart ssh
  - systemctl enable unattended-upgrades
  - systemctl start unattended-upgrades
  - systemctl enable --now iscsid

  # WireGuard mesh — must be up before k3s so Flannel can bind flannel-iface=wg-mesh
  - systemctl enable wg-quick@wg-mesh
  - systemctl start wg-quick@wg-mesh
  - until ip addr show wg-mesh 2>/dev/null | grep -q 'inet'; do sleep 2; done

  # Install k3s
  - curl -sfL https://get.k3s.io | INSTALL_K3S_CHANNEL=stable sh -
  - until kubectl get nodes; do sleep 2; done

  # Kubeconfig for patrick
  - mkdir -p /home/patrick/.kube
  - cp /etc/rancher/k3s/k3s.yaml /home/patrick/.kube/config
  - sed -i "s/127.0.0.1/$(curl -s http://169.254.169.254/hetzner/v1/metadata/public-ipv4)/g" /home/patrick/.kube/config
  - chown -R patrick:patrick /home/patrick/.kube

  # Install Helm
  - curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

  # Install task
  - sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin

  # Dev toolchain for the gekko-hetzner-2 dev box.
  # The script is hostname-guarded and is a no-op on every other node,
  # so it is safe to leave this in the shared cloud-init template.
  - curl -fsSL https://raw.githubusercontent.com/Paddione/Bachelorprojekt/main/scripts/install-dev-tools.sh -o /usr/local/sbin/install-dev-tools.sh
  - chmod +x /usr/local/sbin/install-dev-tools.sh
  - /usr/local/sbin/install-dev-tools.sh || true

  # Install Traefik via Helm
  - su - patrick -c "helm repo add traefik https://traefik.github.io/charts"
  - su - patrick -c "helm repo update"
  # The Traefik chart creates an IngressClass named "traefik" by default;
  # we deliberately do NOT pass --set providers.kubernetesingress.ingressClass=traefik
  # because the live mentolder install does not have that arg either, and
  # adding it would force a chart upgrade just to match the docs.
  - su - patrick -c "KUBECONFIG=/home/patrick/.kube/config helm install traefik traefik/traefik -n kube-system --set ports.web.hostPort=80 --set ports.websecure.hostPort=443 --set deployment.kind=DaemonSet --set ingressRoute.dashboard.enabled=false"

final_message: "k3s control plane ready on $(hostname) - $(date)"
