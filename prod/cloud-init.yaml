#cloud-config
users:
  - default
  - name: patrick
    groups: sudo
    shell: /bin/bash
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    lock_passwd: true
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFN75CnuOz7YXaJipTFxWMVDgm35heu64JKN1QL+Z84+ patrick@${PROD_DOMAIN}

ssh_pwauth: false

package_update: true
package_upgrade: true

packages:
  - curl
  - wget
  - git
  - htop
  - unattended-upgrades
  - apt-transport-https
  - open-iscsi
  - nfs-common
  - jq
  - fail2ban
  - ufw

write_files:
  - path: /etc/rancher/k3s/config.yaml
    content: |
      tls-san:
        - ${PROD_DOMAIN}
        - "*.${PROD_DOMAIN}"
      disable:
        - traefik
        - servicelb
      kubelet-arg:
        - "max-pods=110"
      kube-apiserver-arg:
        - "default-not-ready-toleration-seconds=30"
        - "default-unreachable-toleration-seconds=30"
      write-kubeconfig-mode: "0644"
      cluster-init: true
      secrets-encryption: true

  - path: /etc/sysctl.d/99-k3s.conf
    content: |
      net.core.somaxconn=32768
      net.ipv4.ip_forward=1
      net.bridge.bridge-nf-call-iptables=1
      net.ipv4.conf.all.forwarding=1
      fs.inotify.max_user_watches=524288
      fs.inotify.max_user_instances=512
      vm.max_map_count=262144

  - path: /etc/fail2ban/jail.local
    content: |
      [sshd]
      enabled = true
      port = 22
      maxretry = 5
      bantime = 3600
      findtime = 600

  - path: /etc/ssh/sshd_config.d/hardened.conf
    content: |
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      PermitRootLogin no
      AllowUsers patrick

runcmd:
  - sysctl --system

  # Firewall
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw allow 6443/tcp
  - ufw allow 10250/tcp
  - ufw allow 8472/udp
  - ufw allow 51820/udp    # WireGuard GPU worker tunnel
  - ufw allow 3478/tcp     # coturn TURN/STUN (TCP)
  - ufw allow 3478/udp     # coturn TURN/STUN (UDP)
  - ufw allow 5349/tcp     # coturn TURNS (TLS TURN — iOS/iPhone)
  - ufw allow 49152:49252/udp  # coturn TURN relay port range
  - ufw allow 2379:2380/tcp
  - ufw --force enable

  # Services
  - systemctl enable fail2ban
  - systemctl start fail2ban
  - systemctl restart sshd
  - systemctl enable unattended-upgrades
  - systemctl start unattended-upgrades

  # Install k3s
  - curl -sfL https://get.k3s.io | INSTALL_K3S_CHANNEL=stable sh -
  - until kubectl get nodes; do sleep 2; done

  # Kubeconfig for patrick
  - mkdir -p /home/patrick/.kube
  - cp /etc/rancher/k3s/k3s.yaml /home/patrick/.kube/config
  - sed -i "s/127.0.0.1/$(curl -s http://169.254.169.254/hetzner/v1/metadata/public-ipv4)/g" /home/patrick/.kube/config
  - chown -R patrick:patrick /home/patrick/.kube

  # Install Helm
  - curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

  # Install task
  - sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin

  # Install Traefik via Helm
  - su - patrick -c "helm repo add traefik https://traefik.github.io/charts"
  - su - patrick -c "helm repo update"
  - su - patrick -c "KUBECONFIG=/home/patrick/.kube/config helm install traefik traefik/traefik -n kube-system --set ports.web.hostPort=80 --set ports.websecure.hostPort=443 --set deployment.kind=DaemonSet --set ingressRoute.dashboard.enabled=false --set providers.kubernetesingress.ingressClass=traefik"

final_message: "k3s control plane ready on $(hostname) - $(date)"
