apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: noreply-bachelorprojekt@mailbox.org
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - dns01:
          webhook:
            groupName: cert-manager-webhook-ipv64
            solverName: cert-manager-webhook-ipv64
            config:
              secretName: ipv64-token
              subdomain: korczewski.de
              email: noreply-bachelorprojekt@mailbox.org
