# CoreDNS-Override: signaling.<domain> → Traefik ClusterIP
#
# Nextcloud Talk's PHP-Backend ruft die signaling_servers-URL server-seitig auf
# (z.B. POST /api/v1/room/<id>). Die externe IP ist aus dem Cluster heraus durch
# die NetworkPolicy (allow-internet-egress blockt RFC1918) nicht erreichbar.
# Diese Konfiguration überschreibt die DNS-Auflösung cluster-intern so, dass
# signaling.korczewski.de auf die Traefik-ClusterIP zeigt, die innerhalb des
# Clusters per HTTPS erreichbar ist (NetworkPolicy: allow-traefik-egress).
#
# Deployment: kubectl --context korczewski apply -f prod/coredns-signaling-override.yaml
# (wird von task workspace:post-setup / talk-hpb-setup.sh angewendet)
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom
  namespace: kube-system
data:
  korczewski.override: |
    rewrite name signaling.korczewski.de traefik.kube-system.svc.cluster.local
