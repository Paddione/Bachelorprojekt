# DDNS Updater — keeps wbhprojekt.ipv64.net A-record in sync with the cluster's public IP.
# Optional component: not included in kustomization.yaml.
# Deploy with: task ddns:deploy -- <ipv64-api-key>
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ddns-updater
  namespace: workspace
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ddns-updater
  namespace: workspace
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["ddns-last-ip"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ddns-updater
  namespace: workspace
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ddns-updater
subjects:
  - kind: ServiceAccount
    name: ddns-updater
    namespace: workspace
---
# Stores last known public IP — prevents redundant API calls
apiVersion: v1
kind: ConfigMap
metadata:
  name: ddns-last-ip
  namespace: workspace
data:
  ip: ""
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ddns-updater
  namespace: workspace
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ddns-updater
          restartPolicy: OnFailure
          containers:
            - name: updater
              image: curlimages/curl:8
              env:
                - name: IPV64_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: ddns-ipv64-key
                      key: IPV64_API_KEY
                - name: DDNS_HOSTNAME
                  value: "wbhprojekt.ipv64.net"
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  # Resolve current public IP (try multiple sources)
                  CURRENT_IP=$(curl -sf --max-time 5 https://api.ipify.org \
                    || curl -sf --max-time 5 https://ifconfig.me \
                    || curl -sf --max-time 5 https://icanhazip.com || true)

                  if [ -z "$CURRENT_IP" ]; then
                    echo "ERROR: could not determine public IP" >&2
                    exit 1
                  fi

                  # Read last known IP from ConfigMap via in-cluster Kubernetes API
                  TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                  CACERT=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                  NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
                  KUBE=https://kubernetes.default.svc

                  LAST_IP=$(curl -sf --cacert "$CACERT" \
                    -H "Authorization: Bearer $TOKEN" \
                    "$KUBE/api/v1/namespaces/$NS/configmaps/ddns-last-ip" \
                    | grep -o '"ip":"[^"]*"' | sed 's/"ip":"//;s/"//g' || true)

                  if [ "$CURRENT_IP" = "$LAST_IP" ]; then
                    echo "IP unchanged ($CURRENT_IP) — skipping update"
                    exit 0
                  fi

                  echo "IP changed: '${LAST_IP:-<none>}' -> '$CURRENT_IP' — updating ipv64..."

                  # Update A record via ipv64 DynDNS2 protocol
                  # See: https://ipv64.net/dyndns_updater_api.html
                  HTTP_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
                    --max-time 10 \
                    -u "workspace:$IPV64_API_KEY" \
                    "https://ipv64.net/nic/update?hostname=$DDNS_HOSTNAME&myip=$CURRENT_IP")

                  if [ "$HTTP_STATUS" != "200" ]; then
                    echo "ERROR: ipv64 returned HTTP $HTTP_STATUS" >&2
                    exit 1
                  fi

                  # Persist new IP so next run can skip
                  curl -sf --cacert "$CACERT" \
                    -H "Authorization: Bearer $TOKEN" \
                    -H "Content-Type: application/merge-patch+json" \
                    -X PATCH \
                    "$KUBE/api/v1/namespaces/$NS/configmaps/ddns-last-ip" \
                    -d "{\"data\":{\"ip\":\"$CURRENT_IP\"}}" > /dev/null

                  echo "✓ $DDNS_HOSTNAME -> $CURRENT_IP"
