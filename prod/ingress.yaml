# ═══════════════════════════════════════════════════════════════════
# Production Ingress — per-Service mit Traefik-Middlewares
# ═══════════════════════════════════════════════════════════════════

# ── Apex Domain → web.PROD_DOMAIN (permanent redirect) ─────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: workspace-ingress-apex
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: "${WORKSPACE_NAMESPACE}-redirect-https@kubernetescrd,${WORKSPACE_NAMESPACE}-redirect-apex-to-web@kubernetescrd,${WORKSPACE_NAMESPACE}-hsts-headers@kubernetescrd,${WORKSPACE_NAMESPACE}-security-headers@kubernetescrd"
spec:
  tls:
    - hosts:
        - ${PROD_DOMAIN}
      secretName: ${TLS_SECRET_NAME}
  rules:
    - host: ${PROD_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: old-webspace
                port:
                  number: 443
---
# ── Pocket ID (Auth / SSO) — Rate-Limiting ──────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: workspace-ingress-auth
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: "${WORKSPACE_NAMESPACE}-redirect-https@kubernetescrd,${WORKSPACE_NAMESPACE}-hsts-headers@kubernetescrd,${WORKSPACE_NAMESPACE}-security-headers@kubernetescrd,${WORKSPACE_NAMESPACE}-rate-limit-auth@kubernetescrd"
spec:
  tls:
    - hosts:
        - auth.${PROD_DOMAIN}
      secretName: ${TLS_SECRET_NAME}
  rules:
    - host: auth.${PROD_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pocket-id
                port:
                  number: 1411
---
