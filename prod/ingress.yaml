apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: workspace-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: "workspace-redirect-https@kubernetescrd,workspace-hsts-headers@kubernetescrd"
spec:
  tls:
    - hosts:
        - auth.${PROD_DOMAIN}
        - chat.${PROD_DOMAIN}
        - files.${PROD_DOMAIN}
        - meet.${PROD_DOMAIN}
        - office.${PROD_DOMAIN}
        - board.${PROD_DOMAIN}
        - signaling.${PROD_DOMAIN}
        - mail.${PROD_DOMAIN}
        - docs.${PROD_DOMAIN}
        - billing.${PROD_DOMAIN}
        - vault.${PROD_DOMAIN}
        - ai.${PROD_DOMAIN}
        - wiki.${PROD_DOMAIN}
      secretName: workspace-wildcard-tls
  rules:
    # Keycloak (SSO)
    - host: auth.${PROD_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080

    # Mattermost (Chat)
    - host: chat.${PROD_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mattermost
                port:
                  number: 8065

    # Nextcloud (Dateien)
    - host: files.${PROD_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nextcloud
                port:
                  number: 80

    # Nextcloud Talk HPB Signaling (meet.* alias)
    - host: meet.${PROD_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spreed-signaling
                port:
                  number: 8080

    # Collabora Online (Dokumentenbearbeitung)
    - host: office.${PROD_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: collabora
                port:
                  number: 9980

    # Nextcloud Whiteboard
    - host: board.${PROD_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: whiteboard
                port:
                  number: 3002

    # Talk HPB Signaling
    - host: signaling.${PROD_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spreed-signaling
                port:
                  number: 8080

    # Mailpit (SMTP Web-UI)
    - host: mail.${PROD_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mailpit
                port:
                  number: 8025

    # Docs
    - host: docs.${PROD_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: docs
                port:
                  number: 80

    # Invoice Ninja (Buchhaltung, via OAuth2-Proxy)
    - host: billing.${PROD_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: oauth2-proxy-invoiceninja
                port:
                  number: 4180

    # Vaultwarden (Passwortmanager)
    - host: vault.${PROD_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vaultwarden
                port:
                  number: 80

    # MCP Status (replaces Claude Code WebUI)
    - host: ai.${PROD_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mcp-status
                port:
                  number: 80

    # Website (Astro) — routed via IngressRoute in website namespace (k3s/website-prod.yaml)

    # Wiki (Outline)
    - host: wiki.${PROD_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: outline
                port:
                  number: 80
