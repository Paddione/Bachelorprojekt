apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: workspace-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - auth.korczewski.de
        - chat.korczewski.de
        - files.korczewski.de
        - meet.korczewski.de
      secretName: korczewski-tls
  rules:
    # Keycloak (SSO)
    - host: auth.korczewski.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080

    # Mattermost (Chat)
    - host: chat.korczewski.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mattermost
                port:
                  number: 8065

    # Nextcloud (Dateien)
    - host: files.korczewski.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nextcloud
                port:
                  number: 80

    # Jitsi: OIDC Adapter (higher priority)
    - host: meet.korczewski.de
      http:
        paths:
          - path: /oidc
            pathType: Prefix
            backend:
              service:
                name: jitsi-keycloak-adapter
                port:
                  number: 9000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jitsi-web
                port:
                  number: 80
