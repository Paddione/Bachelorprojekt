apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: workspace

# Base kustomization (all deployments, services, PVCs from k3d/)
resources:
  - ../k3d
  # Production-only (no equivalent in base)
  - ../k3d/llm-gpu.yaml
  - ../k3d/llm-router.yaml
  - cluster-issuer.yaml
  - reflector.yaml
  - wildcard-certificate.yaml
  - ingressclass.yaml
  - traefik-middlewares.yaml
  - tlsoption.yaml
  - old-webspace.yaml
  - ingress.yaml
  - traefik-dashboard.yaml
  - mail-ingressroute.yaml

# Production ConfigMaps (override base realm + OIDC, add scripts from deploy.sh)
configMapGenerator:
  - name: realm-template
    behavior: replace
    files:
      - realm-workspace.json=realm-workspace-prod.json
  - name: nextcloud-oidc-config
    behavior: replace
    files:
      - oidc.config.php=nextcloud-oidc-prod.php
  - name: keycloak-import-script
    behavior: replace
    files:
      - import-entrypoint.sh
generatorOptions:
  disableNameSuffixHash: true

# Strategic merge patches
patches:
  # Drop the dev-placeholder workspace-secrets Secret from prod output.
  # In production, workspace-secrets is managed exclusively by SealedSecrets
  # (environments/sealed-secrets/<env>.yaml). Applying the dev values from
  # k3d/secrets.yaml would overwrite the real secrets on every deploy.
  - target:
      kind: Secret
      name: workspace-secrets
    patch: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: workspace-secrets
      $patch: delete
  # Drop dev-placeholder backup-passphrase — in production this secret is
  # managed directly on the cluster (never reset by ArgoCD).
  - target:
      kind: Secret
      name: backup-passphrase
    patch: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: backup-passphrase
      $patch: delete
  # Drop dev-placeholder vaultwarden-seed-credentials — the file lives in k3d/
  # as an operator template (BW_PASSWORD: CHANGE_ME_AFTER_FIRST_LOGIN). It is
  # not currently referenced by k3d/kustomization.yaml, but this $patch: delete
  # entry is defensive: if the file is ever added to the base, the prod overlay
  # will still strip it so `kubectl apply -k prod-*` cannot overwrite the real
  # admin credentials set on the cluster after first login.
  - target:
      kind: Secret
      name: vaultwarden-seed-credentials
    patch: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: vaultwarden-seed-credentials
      $patch: delete
  # Drop k3d-only localhost ingresses — production uses per-service ingresses
  # in prod/ingress.yaml with real domains and TLS.
  - target:
      kind: Ingress
      name: workspace-ingress
    patch: |
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: workspace-ingress
      $patch: delete
  - target:
      kind: Ingress
      name: workspace-ingress-internal
    patch: |
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: workspace-ingress-internal
      $patch: delete
  - target:
      kind: Ingress
      name: bachelorprojekt
    patch: |
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: bachelorprojekt
      $patch: delete
  # API-only MCP servers (GitHub, Browser) run on the dev cluster only.
  # They reach the same external APIs from anywhere, so no prod deployment needed.
  - target:
      kind: Deployment
      name: mcp-github
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: mcp-github
      $patch: delete
  - target:
      kind: Service
      name: mcp-github
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: mcp-github
      $patch: delete
  - target:
      kind: Deployment
      name: mcp-browser
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: mcp-browser
      $patch: delete
  - target:
      kind: Service
      name: mcp-browser
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: mcp-browser
      $patch: delete
  # Override domains
  - path: configmap-domains.yaml
  # Override ingress (add TLS + real hostnames)
  - path: ingress.yaml
  - path: patch-nextcloud.yaml
  - path: patch-keycloak.yaml
  # Claude Code prod overrides
  - path: patch-claude-code-config.yaml
  # Production SMTP and service config
  - path: patch-vaultwarden.yaml
  - path: patch-docuseal.yaml
  - path: patch-oauth2-proxy-docs.yaml
  - path: patch-oauth2-proxy-traefik.yaml
  - path: patch-oauth2-proxy-mailpit.yaml
  - path: patch-oauth2-proxy-brett.yaml
  # Collabora lives in the workspace-office namespace via its own
  # ArgoCD Application (argocd/applicationset-office.yaml) — no
  # patch target on this overlay.
  # Reduce shared-db resource requests for smaller production clusters
  - path: patch-shared-db.yaml
  # Override signaling backend URL for production (HTTPS + real domain)
  - path: patch-signaling-backend.yaml
  # Traefik dashboard redirect-root uses http:// in dev; patch to https:// for prod
  - target:
      kind: Middleware
      name: traefik-dashboard-redirect-root
    patch: |
      apiVersion: traefik.io/v1alpha1
      kind: Middleware
      metadata:
        name: traefik-dashboard-redirect-root
        namespace: workspace
      spec:
        redirectRegex:
          regex: "^https://([^/]+)/?$"
          replacement: "https://$1/dashboard/"
          permanent: false
