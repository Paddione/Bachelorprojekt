apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: workspace

# Base kustomization (all deployments, services, PVCs from k3d/)
resources:
  - ../k3d
  # Production-only (no equivalent in base)
  - cluster-issuer.yaml
  - wildcard-certificate.yaml
  - traefik-middlewares.yaml
  - tlsoption.yaml
  - old-webspace.yaml
  - ingress.yaml

# Production ConfigMaps (override base realm + OIDC, add scripts from deploy.sh)
configMapGenerator:
  - name: realm-template
    behavior: replace
    files:
      - realm-workspace.json=realm-workspace-prod.json
  - name: nextcloud-oidc-config
    behavior: replace
    files:
      - oidc.config.php=nextcloud-oidc-prod.php
  - name: keycloak-import-script
    behavior: replace
    files:
      - import-entrypoint.sh
generatorOptions:
  disableNameSuffixHash: true

# Strategic merge patches
patches:
  # Drop the dev-placeholder workspace-secrets Secret from prod output.
  # In production, workspace-secrets is managed exclusively by SealedSecrets
  # (environments/sealed-secrets/<env>.yaml). Applying the dev values from
  # k3d/secrets.yaml would overwrite the real secrets on every deploy.
  - target:
      kind: Secret
      name: workspace-secrets
    patch: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: workspace-secrets
      $patch: delete
  # Override domains
  - path: configmap-domains.yaml
  # Override ingress (add TLS + real hostnames)
  - path: ingress.yaml
  - path: patch-nextcloud.yaml
  - path: patch-nextcloud-notify-push.yaml
  - path: patch-keycloak.yaml
  # Claude Code prod overrides
  - path: patch-claude-code-config.yaml
  # Production SMTP and service config
  - path: patch-vaultwarden.yaml
  - path: patch-oauth2-proxy-docs.yaml
  # Pin amd64-only images to amd64 nodes
  - path: patch-amd64-only.yaml
  - path: patch-mcp-browser.yaml
  # Collabora lives in the workspace-office namespace via its own
  # ArgoCD Application (argocd/applicationset-office.yaml) — no
  # patch target on this overlay.
  # Reduce shared-db resource requests for smaller production clusters
  - path: patch-shared-db.yaml
  # Use GHCR image for talk-transcriber in production
  - path: patch-talk-transcriber.yaml
  # Override signaling backend URL for production (HTTPS + real domain)
  - path: patch-signaling-backend.yaml
  # Whisper: use public Docker image in production (registry.localhost not accessible)
  - path: patch-whisper.yaml
