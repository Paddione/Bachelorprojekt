# ─────────────────────────────────────────────────────────────────────────────
# llm-gpu: external GPU peer (TEI embed, LM Studio chat)
#
# The GPU box runs on the wg-mesh overlay. Two Services + Endpoints route
# traffic to it from inside the cluster. ${LLM_HOST_IP} is filled by envsubst
# at deploy time from environments/<env>.yaml.
# ─────────────────────────────────────────────────────────────────────────────

# ── Embeddings (TEI bge-m3) ──────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: llm-gateway-embed
spec:
  ports:
    - name: http
      port: 8081
      targetPort: 8081
---
apiVersion: v1
kind: Endpoints
metadata:
  name: llm-gateway-embed
subsets:
  - addresses:
      - ip: ${LLM_HOST_IP}
    ports:
      - name: http
        port: 8081
---
# ── Chat (LM Studio — Windows, OpenAI-compatible) ─────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: llm-gateway-lmstudio
spec:
  ports:
    - name: http
      port: 1234
      targetPort: 1234
---
apiVersion: v1
kind: Endpoints
metadata:
  name: llm-gateway-lmstudio
subsets:
  - addresses:
      - ip: ${LLM_HOST_IP}
    ports:
      - name: http
        port: 1234
