# prod/mail-ingressroute.yaml
# Mailpit — OIDC-protected via oauth2-proxy (prod, HTTPS)
# Flow: ForwardAuth → 202 (pass) or 401 → errors middleware → Keycloak sign-in
# mailpit-auth and mailpit-errors Middlewares are defined in k3d/mail-ingressroute-dev.yaml (shared base)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mailpit
  namespace: workspace
spec:
  entryPoints:
    - websecure
  routes:
    # oauth2-proxy endpoints — no auth middleware
    - match: Host(`mail.${PROD_DOMAIN}`) && PathPrefix(`/oauth2`)
      kind: Rule
      middlewares:
        - name: hsts-headers
        - name: security-headers
      services:
        - name: oauth2-proxy-mailpit
          port: 4180
    # Mailpit UI — require auth
    - match: Host(`mail.${PROD_DOMAIN}`)
      kind: Rule
      middlewares:
        - name: hsts-headers
        - name: security-headers
        - name: mailpit-errors
        - name: mailpit-auth
      services:
        - name: mailpit
          port: 8025
  tls:
    secretName: workspace-wildcard-tls
