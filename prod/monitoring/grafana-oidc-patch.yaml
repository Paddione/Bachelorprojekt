# Enable Keycloak OIDC on Grafana in prod. The OIDC client_secret + admin
# password come from the `grafana-oidc` SealedSecret. Auth URLs use the
# mentolder realm (operator is admin in both realms). Brand-specific host is
# patched per-overlay in prod-fleet/*.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-grafana
  namespace: monitoring
spec:
  template:
    spec:
      containers:
        - name: grafana
          env:
            - name: GF_AUTH_GENERIC_OAUTH_ENABLED
              value: "true"
            - name: GF_AUTH_GENERIC_OAUTH_NAME
              value: "Keycloak"
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
              value: "grafana"
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: grafana-oidc
                  key: GRAFANA_OIDC_SECRET
            - name: GF_AUTH_GENERIC_OAUTH_SCOPES
              value: "openid email profile"
            - name: GF_AUTH_GENERIC_OAUTH_AUTH_URL
              value: "https://auth.mentolder.de/realms/workspace/protocol/openid-connect/auth"
            - name: GF_AUTH_GENERIC_OAUTH_TOKEN_URL
              value: "https://auth.mentolder.de/realms/workspace/protocol/openid-connect/token"
            - name: GF_AUTH_GENERIC_OAUTH_API_URL
              value: "https://auth.mentolder.de/realms/workspace/protocol/openid-connect/userinfo"
            - name: GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH
              value: "contains(groups[*], 'workspace-admins') && 'Admin' || 'Viewer'"
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-oidc
                  key: GRAFANA_ADMIN_PASSWORD
            - name: GF_SERVER_ROOT_URL
              value: "https://grafana.${PROD_DOMAIN}"
