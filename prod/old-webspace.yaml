# Proxy mentolder.de apex → old webspace at 185.30.32.28
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: old-webspace-transport
  namespace: workspace
spec:
  serverName: ${PROD_DOMAIN}
  insecureSkipVerify: true
---
apiVersion: v1
kind: Service
metadata:
  name: old-webspace
  namespace: workspace
  annotations:
    traefik.ingress.kubernetes.io/service.serversscheme: https
    traefik.ingress.kubernetes.io/service.serverstransport: workspace-old-webspace-transport@kubernetescrd
spec:
  ports:
    - port: 443
      targetPort: 443
---
apiVersion: v1
kind: Endpoints
metadata:
  name: old-webspace
  namespace: workspace
subsets:
  - addresses:
      - ip: 185.30.32.28
    ports:
      - port: 443
