# Patch: BRETT_INTERNAL_URL für den Admin-Brett-Proxy
# Wird vom Website-Pod genutzt um brett-v2.html intern abzurufen
# ohne über den externen Ingress zu gehen.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: website
spec:
  template:
    spec:
      containers:
        - name: website
          env:
            - name: BRETT_INTERNAL_URL
              value: "http://brett.workspace.svc.cluster.local:3000"
