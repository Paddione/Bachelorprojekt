apiVersion: apps/v1
kind: Deployment
metadata:
  name: invoiceninja
spec:
  template:
    spec:
      containers:
        - name: invoiceninja
          env:
            - name: APP_URL
              value: "https://billing.${PROD_DOMAIN}"
            - name: REQUIRE_HTTPS
              value: "true"
            - name: MAIL_FROM_ADDRESS
              value: "${CONTACT_EMAIL}"
            - name: MAIL_FROM_NAME
              value: "${BRAND_NAME} Billing"
