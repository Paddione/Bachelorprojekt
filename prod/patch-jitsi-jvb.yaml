apiVersion: apps/v1
kind: Deployment
metadata:
  name: jvb
spec:
  template:
    spec:
      containers:
        - name: jvb
          env:
            - name: JVB_ADVERTISE_IPS
              value: "65.109.231.78"
            - name: JVB_PORT
              value: "10000"
          ports:
            - containerPort: 10000
              protocol: UDP
              hostPort: 10000
