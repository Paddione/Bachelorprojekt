apiVersion: apps/v1
kind: Deployment
metadata:
  name: jitsi-keycloak-adapter
spec:
  template:
    spec:
      containers:
        - name: adapter
          env:
            - name: KEYCLOAK_ORIGIN
              value: "https://auth-wbhprojekt.ipv64.de"
            - name: ALLOW_UNSECURE_CERT
              value: "false"
