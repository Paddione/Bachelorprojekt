apiVersion: apps/v1
kind: Deployment
metadata:
  name: jitsi-web
spec:
  template:
    spec:
      containers:
        - name: web
          env:
            - name: PUBLIC_URL
              value: "https://meet-wbhprojekt.ipv64.de"
            - name: TOKEN_AUTH_URL
              value: "https://meet-wbhprojekt.ipv64.de/oidc/auth?state={state}"
