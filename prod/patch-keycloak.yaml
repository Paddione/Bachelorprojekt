apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
spec:
  template:
    spec:
      containers:
        - name: keycloak
          env:
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homeoffice-secrets
                  key: SMTP_PASSWORD
            - name: KC_HOSTNAME_STRICT
              value: "false"
