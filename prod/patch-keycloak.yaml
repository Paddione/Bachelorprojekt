apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
spec:
  template:
    spec:
      containers:
        - name: keycloak
          env:
            - name: PROD_DOMAIN
              value: "${PROD_DOMAIN}"
            - name: KC_HOSTNAME
              value: "https://auth.${PROD_DOMAIN}"
            - name: KC_HOSTNAME_STRICT
              value: "true"
            - name: KC_HOSTNAME_BACKCHANNEL_DYNAMIC
              value: "false"
            - name: SMTP_HOST
              value: "${SMTP_HOST}"
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: SMTP_FROM
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: SMTP_USER
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: SMTP_PASSWORD
            - name: DEV_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: domain-config
                  key: DEV_DOMAIN
            - name: DEV_WORKSPACE_OIDC_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: DEV_WORKSPACE_OIDC_SECRET
