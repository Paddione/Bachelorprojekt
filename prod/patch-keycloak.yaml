apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
spec:
  template:
    spec:
      containers:
        - name: keycloak
          env:
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: SMTP_PASSWORD
            - name: KC_HOSTNAME
              value: "https://auth.${PROD_DOMAIN}"
            - name: KC_HOSTNAME_STRICT
              value: "true"
            - name: KC_HOSTNAME_BACKCHANNEL_DYNAMIC
              value: "false"
