apiVersion: apps/v1
kind: Deployment
metadata:
  name: mattermost
spec:
  template:
    spec:
      containers:
        - name: mattermost
          env:
            - name: MM_SERVICESETTINGS_SITEURL
              value: "https://chat.${PROD_DOMAIN}"
            - name: MM_GITLABSETTINGS_AUTHENDPOINT
              value: "https://auth.${PROD_DOMAIN}/realms/workspace/protocol/openid-connect/auth"
            - name: MM_SUPPORTSETTINGS_HELPLINK
              value: "https://web.${PROD_DOMAIN}"
            - name: MM_SUPPORTSETTINGS_ABOUTLINK
              value: "https://web.${PROD_DOMAIN}"
            - name: MM_ANNOUNCEMENTSETTINGS_BANNERTEXT
              value: "Besuche unsere Website: web.${PROD_DOMAIN}"
            - name: MM_EMAILSETTINGS_SMTPSERVER
              value: "smtp.mailbox.org"
            - name: MM_EMAILSETTINGS_SMTPPORT
              value: "465"
            - name: MM_EMAILSETTINGS_CONNECTIONSECURITY
              value: "TLS"
            - name: MM_EMAILSETTINGS_ENABLESMTPAUTH
              value: "true"
            - name: MM_EMAILSETTINGS_SMTPUSERNAME
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: SMTP_FROM
            - name: MM_EMAILSETTINGS_SMTPPASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: SMTP_PASSWORD
            - name: MM_EMAILSETTINGS_FEEDBACKEMAIL
              value: "noreply@${PROD_DOMAIN}"
            - name: MM_EMAILSETTINGS_FEEDBACKNAME
              value: "${BRAND_NAME}"
            - name: MATTERMOST_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: MATTERMOST_DB_PASSWORD
            - name: MM_SQLSETTINGS_DATASOURCE
              value: "host=mattermost-db port=5432 user=mattermost password=$(MATTERMOST_DB_PASSWORD) dbname=mattermost sslmode=disable connect_timeout=10"
            - name: MM_LOGSETTINGS_ENABLEDIAGNOSTICS
              value: "false"
            - name: MM_SERVICESETTINGS_TRUSTEDPROXYIPHEADER
              value: '["X-Forwarded-For","X-Real-IP"]'
            - name: MM_ANNOUNCEMENTSETTINGS_BANNERCOLOR
              value: "#0f1623"
            - name: MM_ANNOUNCEMENTSETTINGS_BANNERTEXTCOLOR
              value: "#e8c870"
            - name: MM_DISPLAYSETTINGS_DEFAULTTHEME
              value: "mattermostDark"
