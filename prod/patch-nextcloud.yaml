apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud
spec:
  template:
    spec:
      containers:
        - name: nextcloud
          env:
            - name: OVERWRITEPROTOCOL
              value: "https"
            - name: OVERWRITECLIURL
              value: "https://files.${PROD_DOMAIN}"
            - name: OVERWRITEHOST
              value: "files.${PROD_DOMAIN}"
            - name: NEXTCLOUD_TRUSTED_DOMAINS
              value: "files.${PROD_DOMAIN} localhost"
            - name: SMTP_HOST
              value: "smtp.mailbox.org"
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_SECURE
              value: "tls"
            - name: SMTP_AUTHTYPE
              value: "LOGIN"
            - name: SMTP_NAME
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: SMTP_USER
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: SMTP_PASSWORD
            - name: MAIL_FROM_ADDRESS
              value: "${MAIL_FROM_LOCAL}"
            - name: MAIL_DOMAIN
              value: "${MAIL_FROM_DOMAIN}"
          readinessProbe:
            httpGet:
              httpHeaders:
                - name: Host
                  value: "localhost"
          livenessProbe:
            httpGet:
              httpHeaders:
                - name: Host
                  value: "localhost"
