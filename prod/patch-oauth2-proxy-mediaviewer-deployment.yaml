# prod/patch-oauth2-proxy-mediaviewer.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy-mediaviewer
spec:
  template:
    spec:
      containers:
        - name: oauth2-proxy
          args:
            - "--config=/run/config/oauth2-extra.cfg"
            - "--provider=oidc"
            - "--client-id=mediaviewer-widget"
            - "--client-secret=$(POCKET_ID_MEDIAVIEWER_SECRET)"
            - "--redirect-url=https://mediaviewer.${PROD_DOMAIN}/oauth2/callback"
            - "--oidc-issuer-url=https://auth.${PROD_DOMAIN}"
            - "--skip-oidc-discovery=true"
            - "--login-url=https://auth.${PROD_DOMAIN}/authorize"
            - "--redeem-url=https://auth.${PROD_DOMAIN}/api/oidc/token"
            - "--oidc-jwks-url=https://auth.${PROD_DOMAIN}/.well-known/jwks.json"
            - "--profile-url=https://auth.${PROD_DOMAIN}/api/oidc/userinfo"
            - "--upstream=http://mediaviewer-widget:80"
            - "--http-address=0.0.0.0:4180"
            - "--cookie-secure=true"
            - "--cookie-samesite=none"
            - "--cookie-name=_oauth2_proxy_mediaviewer"
            - "--pass-access-token=true"
            - "--pass-authorization-header=true"
            - "--set-xauthrequest=true"
            - "--skip-provider-button=true"
            - "--skip-auth-route=^/embed\\.html$"
            - "--skip-auth-route=^/assets/"
            - "--code-challenge-method=S256"
            - "--oidc-extra-audience=mediaviewer-widget"
            - "--scope=openid email profile groups"
            - "--oidc-groups-claim=groups"
            - "--email-domain=*"
            - "--allowed-group=workspace-users"
          env:
            - name: POCKET_ID_MEDIAVIEWER_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: POCKET_ID_MEDIAVIEWER_SECRET
