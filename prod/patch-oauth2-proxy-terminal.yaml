# prod/patch-oauth2-proxy-terminal.yaml — prod overlay for oauth2-proxy-terminal
# Replaces the dev localhost URLs with the real prod domain + HTTPS,
# cross-origin cookie settings, and the terminal-admins group gate.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy-terminal
spec:
  template:
    spec:
      containers:
        - name: oauth2-proxy
          args:
            - "--config=/run/config/oauth2-extra.cfg"
            - "--provider=oidc"
            # pocket-id server-generates a random UUID `id` on client create and
            # never accepts/echoes a caller-supplied id (T001327). This UUID is
            # the real id of the name=terminal-sidekick client registered in
            # pocket_id.oidc_clients on fleet (T001855, same pattern as brain
            # in T001854).
            - "--client-id=28b4ddc3-0759-42e1-a96b-52c454e85573"
            - "--client-secret=$(POCKET_ID_TERMINAL_SECRET)"
            - "--redirect-url=https://terminal.${PROD_DOMAIN}/oauth2/callback"
            - "--oidc-issuer-url=https://auth.${PROD_DOMAIN}"
            - "--skip-oidc-discovery=true"
            - "--login-url=https://auth.${PROD_DOMAIN}/authorize"
            - "--redeem-url=https://auth.${PROD_DOMAIN}/api/oidc/token"
            - "--oidc-jwks-url=https://auth.${PROD_DOMAIN}/.well-known/jwks.json"
            - "--profile-url=https://auth.${PROD_DOMAIN}/api/oidc/userinfo"
            - "--upstream=http://terminal-bridge:7681"
            - "--http-address=0.0.0.0:4180"
            - "--cookie-secure=true"
            - "--cookie-samesite=none"
            - "--cookie-name=_oauth2_proxy_terminal"
            - "--pass-access-token=true"
            - "--pass-authorization-header=true"
            - "--set-xauthrequest=true"
            - "--skip-provider-button=true"
            - "--code-challenge-method=S256"
            - "--oidc-extra-audience=terminal-sidekick"
            - "--scope=openid email profile groups"
            - "--oidc-groups-claim=groups"
            - "--email-domain=*"
            - "--allowed-group=terminal-admins"
          env:
            - name: POCKET_ID_TERMINAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: POCKET_ID_TERMINAL_SECRET
