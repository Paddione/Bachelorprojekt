apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy-traefik
spec:
  template:
    spec:
      containers:
        - name: oauth2-proxy
          args:
            - "--config=/run/config/oauth2-extra.cfg"
            - "--provider=oidc"
            - "--client-id=traefik-dashboard"
            - "--client-secret=$(POCKET_ID_TRAEFIK_SECRET)"
            - "--relative-redirect-url=true"
            - "--oidc-issuer-url=https://auth.${PROD_DOMAIN}"
            - "--skip-oidc-discovery=true"
            - "--login-url=https://auth.${PROD_DOMAIN}/authorize"
            - "--redeem-url=https://auth.${PROD_DOMAIN}/api/oidc/token"
            - "--oidc-jwks-url=https://auth.${PROD_DOMAIN}/.well-known/jwks.json"
            - "--profile-url=https://auth.${PROD_DOMAIN}/api/oidc/userinfo"
            - "--upstream=static://202"
            - "--reverse-proxy=true"
            - "--http-address=0.0.0.0:4180"
            - "--cookie-secure=true"
            - "--cookie-name=_oauth2_proxy_traefik"
            - "--authenticated-emails-file=/etc/oauth2/allowed-emails"
            - "--pass-access-token=true"
            - "--pass-authorization-header=true"
            - "--set-xauthrequest=true"
            - "--code-challenge-method=S256"
            - "--oidc-extra-audience=traefik-dashboard"
            - "--scope=openid email profile"
            - "--whitelist-domain=traefik.${PROD_DOMAIN}"
          env:
            - name: POCKET_ID_TRAEFIK_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: POCKET_ID_TRAEFIK_SECRET
