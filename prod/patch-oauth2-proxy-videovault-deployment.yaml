# prod/patch-oauth2-proxy-videovault.yaml — prod overlay for oauth2-proxy-videovault
# Replaces the dev localhost URLs with the real prod domain + HTTPS.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy-videovault
spec:
  template:
    spec:
      containers:
        - name: oauth2-proxy
          args:
            - "--config=/run/config/oauth2-extra.cfg"
            - "--provider=oidc"
            - "--client-id=videovault"
            - "--client-secret=$(POCKET_ID_VIDEOVAULT_SECRET)"
            - "--redirect-url=https://videovault.${PROD_DOMAIN}/oauth2/callback"
            - "--oidc-issuer-url=https://auth.${PROD_DOMAIN}"
            - "--skip-oidc-discovery=true"
            - "--login-url=https://auth.${PROD_DOMAIN}/authorize"
            - "--redeem-url=https://auth.${PROD_DOMAIN}/api/oidc/token"
            - "--oidc-jwks-url=https://auth.${PROD_DOMAIN}/.well-known/jwks.json"
            - "--profile-url=https://auth.${PROD_DOMAIN}/api/oidc/userinfo"
            - "--upstream=http://videovault:80"
            --allowed-groups=workspace-users
            --oidc-groups-claim=groups
            --scope=openid email profile groups
            - "--http-address=0.0.0.0:4180"
            - "--cookie-secure=true"
            - "--cookie-name=_oauth2_proxy_videovault"
            - "--pass-access-token=true"
            - "--pass-authorization-header=true"
            - "--set-xauthrequest=true"
            - "--skip-provider-button=true"
            - "--code-challenge-method=S256"
            - "--oidc-extra-audience=videovault"
            - "--scope=openid email profile"
          env:
            - name: POCKET_ID_VIDEOVAULT_SECRET
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: POCKET_ID_VIDEOVAULT_SECRET
