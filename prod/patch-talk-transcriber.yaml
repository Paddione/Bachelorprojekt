apiVersion: apps/v1
kind: Deployment
metadata:
  name: talk-transcriber
  namespace: workspace
spec:
  template:
    spec:
      containers:
        - name: transcriber
          image: ghcr.io/paddione/talk-transcriber:latest
          imagePullPolicy: Always
          env:
            - name: NC_DOMAIN
              value: "files.mentolder.de"
            - name: NC_PROTOCOL
              value: "https"
            - name: NC_VERIFY_SSL
              value: "true"
            - name: NC_ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: NEXTCLOUD_ADMIN_PASSWORD
            - name: NC_DB_HOST
              value: "shared-db"
            - name: NC_DB_NAME
              value: "nextcloud"
            - name: NC_DB_USER
              value: "nextcloud"
            - name: NC_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: NEXTCLOUD_DB_PASSWORD
