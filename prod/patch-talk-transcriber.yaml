apiVersion: apps/v1
kind: Deployment
metadata:
  name: talk-transcriber
  namespace: workspace
spec:
  template:
    spec:
      containers:
        - name: transcriber
          image: ghcr.io/paddione/talk-transcriber:latest
          imagePullPolicy: Always
          env:
            - name: NC_DOMAIN
              value: "files.mentolder.de"
            - name: NC_PROTOCOL
              value: "https"
            - name: NC_VERIFY_SSL
              value: "true"
