apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden
spec:
  template:
    spec:
      containers:
        - name: vaultwarden
          env:
            - name: DOMAIN
              value: "https://vault.${PROD_DOMAIN}"
            - name: SMTP_HOST
              value: "smtp.mailbox.org"
            - name: SMTP_PORT
              value: "465"
            - name: SMTP_SECURITY
              value: "force_tls"
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: SMTP_FROM
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workspace-secrets
                  key: SMTP_PASSWORD
            - name: SMTP_FROM
              value: "vaultwarden@${PROD_DOMAIN}"
            - name: SMTP_FROM_NAME
              value: "Vaultwarden"
