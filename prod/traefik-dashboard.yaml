# ═══════════════════════════════════════════════════════════════════
# Traefik Dashboard (api@internal) — OIDC-protected via oauth2-proxy
# Flow:
#   1. Browser hits https://traefik.<domain>/
#   2. ForwardAuth middleware calls oauth2-proxy /oauth2/auth → 202 or 401
#   3. On 401, the errors middleware serves oauth2-proxy /oauth2/sign_in
#      which presents a sign-in link to /oauth2/start?rd=<original>
#   4. /oauth2/start redirects to Keycloak, user authenticates, returns
#      via /oauth2/callback; session cookie is set; user retries /
# ═══════════════════════════════════════════════════════════════════
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: traefik-dashboard-auth
  namespace: workspace
spec:
  forwardAuth:
    address: http://oauth2-proxy-traefik.workspace.svc.cluster.local:4180/oauth2/auth
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - X-Auth-Request-Access-Token
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: traefik-dashboard-errors
  namespace: workspace
spec:
  errors:
    status:
      - "401"
    service:
      name: oauth2-proxy-traefik
      port: 4180
    query: "/oauth2/sign_in?rd={scheme}://{host}{url}"
---
# Redirect https://traefik.<domain>/  →  /dashboard/ (the actual dashboard URL)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: traefik-dashboard-redirect-root
  namespace: workspace
spec:
  redirectRegex:
    regex: "^https://([^/]+)/?$"
    replacement: "https://$1/dashboard/"
    permanent: false
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: workspace
spec:
  entryPoints:
    - websecure
  routes:
    # oauth2-proxy endpoints (sign-in, callback, sign_out, auth) — no auth middleware
    - match: Host(`traefik.${PROD_DOMAIN}`) && PathPrefix(`/oauth2`)
      kind: Rule
      middlewares:
        - name: hsts-headers
        - name: security-headers
      services:
        - name: oauth2-proxy-traefik
          port: 4180
    # Dashboard + API — require auth. Redirects bare `/` to `/dashboard/`.
    - match: Host(`traefik.${PROD_DOMAIN}`)
      kind: Rule
      middlewares:
        - name: hsts-headers
        - name: security-headers
        - name: traefik-dashboard-redirect-root
        - name: traefik-dashboard-errors
        - name: traefik-dashboard-auth
      services:
        - name: api@internal
          kind: TraefikService
  tls:
    secretName: workspace-wildcard-tls
