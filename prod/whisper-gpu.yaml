# ── GPU Worker override for k3s production cluster ───────────────────────────
# Routes whisper traffic through WireGuard tunnel to workstation GPU.
# WireGuard IP: 10.13.13.2 (WSL2 workstation)
#
# Apply:  task gpu-worker:switch-prod
# Revert: task gpu-worker:switch-prod-cpu
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: whisper
spec:
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Endpoints
metadata:
  name: whisper
subsets:
  - addresses:
      - ip: "10.13.13.2"
    ports:
      - port: 8000
