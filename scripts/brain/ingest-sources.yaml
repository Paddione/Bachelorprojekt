# brain/ingest-sources.yaml — Quellen-Manifest für Brain-Doku-Kompilierung

exclude:
  - docs/archive/
  - docs/generated/
  - generated/
  - legacy-html/
  - drift-reports/
  - openspec/specs/archive/
  # T001583 mishap 2: the worklist walks the whole --root tree and tags every
  # matching file "docs" — without excludes for dependency/tool-state/build
  # trees it emitted ~32.5k rows on first run (verified 2026-07-03), making
  # the Erst-Ingest LLM batch unbezahlbar. These are never doc sources:
  - node_modules/
  - .git/
  - .astro/
  - .taskmaster/
  - .agy/
  - .antigravitycli/
  - .design-sync/
  - .opencode/
  - dist/
  - tests/unit/lib/
  - .venv/
  - __pycache__/
  - .claude/commands/

groups:
  ssot-specs: openspec/specs/*.md
  runbooks: docs/runbooks/*.md
  adr: docs/adr/*.md
  gotchas-footguns: docs/superpowers/references/gotchas-footguns.md
  agent-guide-maps: docs/agent-guide/*.md
  core-docs: CLAUDE.md AGENTS.md
  health-goals: .claude/lib/goals.md
  diagrams: |
    docs/diagrams/*.md
    docs/db-schema-diagram.md

# Type mapping: group → default type, with path-based overrides.
# The ingest pipeline reads this to assign brain page types.
type_map:
  defaults:
    ssot-specs: note
    runbooks: runbook
    adr: decision
    gotchas-footguns: note
    agent-guide-maps: moc
    core-docs: moc
    health-goals: decision
    diagrams: note
  overrides:
    - pattern: "openspec/specs/security*.md"
      type: decision
    - pattern: "openspec/specs/database*.md"
      type: note
    - pattern: "openspec/specs/health-goals*.md"
      type: decision
    - pattern: "docs/agent-guide/surface-*.md"
      type: moc
    - pattern: "CLAUDE.md"
      type: moc
    - pattern: "AGENTS.md"
      type: moc

# Tag defaults per group. The LLM adds content-specific tags on top.
tag_defaults:
  ssot-specs: [ssot, spec]
  runbooks: [runbook, ops]
  adr: [adr, decision, architecture]
  gotchas-footguns: [gotchas, footguns]
  agent-guide-maps: [agent-guide, surface]
  core-docs: [core, meta]
  health-goals: [health, goals]
  diagrams: [diagram, architecture]
