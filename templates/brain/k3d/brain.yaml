# ═══════════════════════════════════════════════════════════════════
# Brain Static Site Deployment (Quartz) via ghcr.io/paddione/brain-site:latest
# ═══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: brain
  labels:
    app: brain
spec:
  replicas: 1
  selector:
    matchLabels:
      app: brain
  template:
    metadata:
      labels:
        app: brain
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: brain
          image: ghcr.io/paddione/brain-site:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: SERVER_ROOT
              value: /public
            - name: SERVER_PORT
              value: "8787"
            - name: SERVER_CACHE_CONTROL_HEADERS
              value: "false"
          ports:
            - containerPort: 8787
          resources:
            requests:
              memory: 32Mi
              cpu: "10m"
            limits:
              memory: 128Mi
              cpu: "50m"
          readinessProbe:
            httpGet:
              path: /
              port: 8787
---
apiVersion: v1
kind: Service
metadata:
  name: brain
  labels:
    app: brain
spec:
  selector:
    app: brain
  ports:
    - port: 80
      targetPort: 8787
