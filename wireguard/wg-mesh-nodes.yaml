# wireguard/wg-mesh-nodes.yaml
# WireGuard mesh node registry — used by .claude/skills/hetzner-node/SKILL.md
# to generate per-node wg-mesh.conf during provisioning and recovery.
#
# Public keys are NOT sensitive — commit them here once populated.
# Private keys are stored sealed in environments/.secrets/<env>.yaml under
# WG_MESH_<SCHEMA_KEY>_PRIVATE_KEY — never here.
#
# How to populate public_key after first provisioning:
#   ssh patrick@<NODE_IP> "sudo wg show wg-mesh public-key"
# How to get/set wg_ip: choose the next free IP in the wg_subnet.
#
# Endpoint format: "<public_ip>:<listen_port>"
# Home-LAN nodes that sit behind NAT have no fixed endpoint (leave "").
# They must set PersistentKeepalive so they initiate outbound to Hetzner peers.

mentolder:
  # Live subnet: 192.168.100.0/24, port 51821 (verified 2026-05-18)
  # Note: design doc originally said 10.13.13.0/24 / port 51820 — corrected here.
  wg_subnet: "192.168.100.0/24"
  listen_port: 51821
  # Hetzner control-plane nodes — direct public IPs, always reachable as endpoints
  nodes:
    - name: gekko-hetzner-2
      endpoint: "178.104.169.206:51821"
      wg_ip: "192.168.100.30"
      schema_key: WG_MESH_GEKKO2
      public_key: "iXnGP9bIwrofD6a96D5Fz5rM7smbIAc3gXJcUx5m6j0="

    - name: gekko-hetzner-3
      endpoint: "46.225.125.59:51821"
      wg_ip: "192.168.100.31"
      schema_key: WG_MESH_GEKKO3
      public_key: "UyOC2keZx+1L73sOw+tVN1jNksgSkjX5zb1sZY3W/x0="

    - name: gekko-hetzner-4
      endpoint: "178.104.159.79:51821"
      wg_ip: "192.168.100.32"
      schema_key: WG_MESH_GEKKO4
      public_key: "mHjkm8YbesFZfneadLPZ8gHwyobakn1gRc+Cx82rP0Y="

  # GPU host — WSL2 on Windows with LM Studio (RTX 5070 Ti, 16 GB)
  # Configured in commit 05dbf9a8. The wg-gpu interface on WSL2 uses 192.168.100.10;
  # iptables DNAT forwards 192.168.100.10:1234 → 10.10.0.3:1234 (Ollama/LM Studio).
  # Endpoint is dynamic (WSL2 behind Windows NAT) — the host initiates outbound.
  gpu_hosts:
    - name: wsl2-gpu-mentolder
      endpoint: ""        # dynamic NAT port (observed 45.155.142.74:51883, changes on reconnect)
      wg_ip: "192.168.100.10"
      schema_key: WG_MESH_WSL2_GPU
      public_key: "UIe+lddIq+YgFeE4wltrEPXYnwu3hAY1bsUUD2yNBkE="
      keepalive: 25

  # Proxmox home-LAN worker nodes — behind NAT (FritzBox), no fixed public endpoint.
  # Workers initiate outbound to Hetzner; PersistentKeepalive = 25 keeps NAT mapping alive.
  home_workers:
    - name: k3s-1
      endpoint: ""        # behind NAT (Proxmox vmid=100 on pvemain, LAN IP 10.0.3.1)
      wg_ip: "192.168.100.20"
      schema_key: WG_MESH_K3S1
      public_key: "bfEvZgmkMwGANBYapNdA0zNoLMgWfWyp5DmcEI3Awww="
      keepalive: 25

  # HA dev cluster servers — NOT on wg-mesh (direct Proxmox LAN 10.0.0.x, no WireGuard).
  # Formerly k3s-2/k3s-3; repurposed as devc cluster servers (2026-05-30).
  # Access: ssh devops@10.0.0.22 / 10.0.0.23 via k3s-1 jump, using pve2/pve3 root key.
  # WG IPs 192.168.100.21/.22 on Hetzner peers are stale — clean up with wg peer remove.
  devc_servers:
    - name: devc-2
      lan_ip: "10.0.0.22"
      proxmox_host: pve2
      ssh_user: devops
      ssh_pubkey: "ssh-rsa  root@pve2"

    - name: devc-3
      lan_ip: "10.0.0.23"
      proxmox_host: pve3
      ssh_user: devops
      ssh_pubkey: "ssh-rsa  root@pve3"

